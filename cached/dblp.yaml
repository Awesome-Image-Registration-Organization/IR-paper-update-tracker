- author: Xiuchao Sui, Shaohua Li 0003, Xue Geng, Yan Wu 0002, Xinxing Xu, Yong Liu
    0026, Rick Siow Mong Goh, Hongyuan Zhu 0002
  title: 'CRAFT: Cross-Attentional Flow Transformer for Robust Optical Flow.'
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/SuiLGWX0GZ22
  doi: 10.1109/CVPR52688.2022.01708
  ee: https://doi.org/10.1109/CVPR52688.2022.01708
  url: https://dblp.org/rec/conf/cvpr/SuiLGWX0GZ22
  abstract: Optical flow estimation aims to find the 2D motion field by identifying
    corresponding pixels between two images. Despite the tremendous progress of deep
    learning-based optical flow methods, it remains a challenge to accurately estimate
    large displacements with motion blur. This is mainly because the correlation volume,
    the basis of pixel matching, is computed as the dot product of the convolutional
    features of the two images. The locality of convolutional features makes the computed
    correlations susceptible to various noises. On large displacements with motion
    blur, noisy correlations could cause severe errors in the estimated flow. To overcome
    this challenge, we propose a new architecture “CRoss-Attentional Flow Trans-former”
    (CRAFT), aiming to revitalize the correlation volume computation. In CRAFT, a
    Semantic Smoothing Trans-former layer transforms the features of one frame, making
    them more global and semantically stable. In addition, the dot-product correlations
    are replaced with trans-former Cross-Frame Attention. This layer filters out feature
    noises through the Query and Key projections, and computes more accurate correlations.
    On Sintel (Final) and KITTI (foreground) benchmarks, CRAFT has achieved new state-of-the-art
    performance. Moreover, to test the robust-ness of different models on large motions,
    we designed an image shifting attack that shifts input images to generate large
    artificial motions. Under this attack, CRAFT per-forms much more robustly than
    two representative meth-ods, RAFT and GMA. The code of CRAFT is is available at
    https://github.com/askerlee/craft.
  related_code: https://github.com/askerlee/craft
