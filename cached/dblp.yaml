- author: Petter Risholm, James M. Balter, William M. Wells III
  title: 'Estimation of Delivered Dose in Radiotherapy: The Influence of Registration
    Uncertainty.'
  venue: MICCAI
  year: '2011'
  type: Conference and Workshop Papers
  access: open
  key: conf/miccai/RisholmBW11
  doi: 10.1007/978-3-642-23623-5_69
  ee: https://doi.org/10.1007/978-3-642-23623-5_69
  url: https://dblp.org/rec/conf/miccai/RisholmBW11
  abstract: We present a probabilistic framework to estimate the accumulated radiation
    dose and the corresponding dose uncertainty that is delivered to important anatomical
    structures, e.g. the primary tumor and healthy surrounding organs, during radiotherapy.
    The dose uncertainty we report is a direct result of uncertainties in the estimates
    of the deformation which aligns the daily cone-beam CT images with the planning
    CT. The accumulated radiation dose is an important measure to monitor during treatment,
    in particular to see if it significantly deviates from the planned dose which
    might indicate that either the patient was not properly positioned before treatment
    or that the anatomy has changed due to the treatment. In the case of the latter,
    the treatment plan should be adaptively changed to align with the current patient
    anatomy. We estimate the accumulated dose distribution, and its uncertainty, retrospectively
    on a dataset acquired during treatment of cancer in the neck and show the dose
    distributions in the form of dose volume histograms.
