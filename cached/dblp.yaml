- author: Bo Li 0088, Wiro J. Niessen, Stefan Klein 0001, Marius de Groot, Mohammad
    Arfan Ikram, Meike W. Vernooij, Esther E. Bron
  title: 'A Hybrid Deep Learning Framework for Integrated Segmentation and Registration:
    Evaluation on Longitudinal White Matter Tract Changes.'
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/LiN0GIVB19
  doi: 10.1007/978-3-030-32248-9_72
  ee: https://doi.org/10.1007/978-3-030-32248-9_72
  url: https://dblp.org/rec/conf/miccai/LiN0GIVB19
  abstract: To accurately analyze changes of anatomical structures in longitudinal
    imaging studies, consistent segmentation across multiple time-points is required.
    Existing solutions often involve independent registration and segmentation components.
    Registration between time-points is used either as a prior for segmentation in
    a subsequent time point or to perform segmentation in a common space. In this
    work, we propose a novel hybrid convolutional neural network (CNN) that integrates
    segmentation and registration into a single procedure. We hypothesize that the
    joint optimization leads to increased performance on both tasks. The hybrid CNN
    is trained by minimizing an integrated loss function composed of four different
    terms, measuring segmentation accuracy, similarity between registered images,
    deformation field smoothness, and segmentation consistency. We applied this method
    to the segmentation of white matter tracts, describing functionally grouped axonal
    fibers, using N=8045 longitudinal brain MRI data of 3249 individuals. The proposed
    method was compared with two multistage pipelines using two existing segmentation
    methods combined with a conventional deformable registration algorithm. In addition,
    we assessed the added value of the joint optimization for segmentation and registration
    separately. The hybrid CNN yielded significantly higher accuracy, consistency
    and reproducibility of segmentation than the multistage pipelines, and was orders
    of magnitude faster. Therefore, we expect it can serve as a novel tool to support
    clinical and epidemiological analyses on understanding microstructural brain changes
    over time.
- author: Lihao Liu, Xiaowei Hu 0001, Lei Zhu 0003, Pheng-Ann Heng
  title: Probabilistic Multilayer Regularization Network for Unsupervised 3D Brain
    Image Registration.
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/LiuH0H19
  doi: 10.1007/978-3-030-32245-8_39
  ee: https://doi.org/10.1007/978-3-030-32245-8_39
  url: https://dblp.org/rec/conf/miccai/LiuH0H19
  abstract: Brain image registration transforms a pair of images into one system with
    the matched imaging contents, which is of essential importance for brain image
    analysis. This paper presents a novel framework for unsupervised 3D brain image
    registration by capturing the feature-level transformation relationships between
    the unaligned image and reference image. To achieve this, we develop a feature-level
    probabilistic model to provide the direct regularization to the hidden layers
    of two deep convolutional neural networks, which are constructed from two input
    images. This model design is developed into multiple layers of these two networks
    to capture the transformation relationships at different levels. We employ two
    common benchmark datasets for 3D brain image registration and perform various
    experiments to evaluate our method. Experimental results show that our method
    clearly outperforms state-of-the-art methods on both benchmark datasets by a large
    margin.
- author: Jie Luo 0003, Alireza Sedghi, Karteek Popuri, Dana Cobzas, Miaomiao Zhang
    0002, Frank Preiswerk, Matthew Toews, Alexandra J. Golby, Masashi Sugiyama, William
    M. Wells III, Sarah F. Frisken
  title: On the Applicability of Registration Uncertainty.
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/LuoSPCZPTGSWF19
  doi: 10.1007/978-3-030-32245-8_46
  ee: https://doi.org/10.1007/978-3-030-32245-8_46
  url: https://dblp.org/rec/conf/miccai/LuoSPCZPTGSWF19
  abstract: 'Estimating the uncertainty in (probabilistic) image registration enables,
    e.g., surgeons to assess the operative risk based on the trustworthiness of the
    registered image data. If surgeons receive inaccurately calculated registration
    uncertainty and misplace unwarranted confidence in the alignment solutions, severe
    consequences may result. For probabilistic image registration (PIR), the predominant
    way to quantify the registration uncertainty is using summary statistics of the
    distribution of transformation parameters. The majority of existing research focuses
    on trying out different summary statistics as well as means to exploit them. Distinctively,
    in this paper, we study two rarely examined topics: (1) whether those summary
    statistics of the transformation distribution most informatively represent the
    registration uncertainty; (2) Does utilizing the registration uncertainty always
    be beneficial. We show that there are two types of uncertainties: the transformation
    uncertainty, \(U_\mathrm {t}\), and label uncertainty \(U_\mathrm {l}\). The conventional
    way of using \(U_\mathrm {t}\) to quantify \(U_\mathrm {l}\) is inappropriate
    and can be misleading. By a real data experiment, we also share a potentially
    critical finding that making use of the registration uncertainty may not always
    be an improvement.'
