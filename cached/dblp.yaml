  url: https://dblp.org/rec/conf/cvpr/0001WWZ0K25
  abstract: As a fundamental visual task, optical flow estimation has widespread applications
    in computer vision. However, it faces significant challenges under adverse lighting
    conditions, where low texture and noise make accurate optical flow estimation
    particularly difficult. In this paper, we propose an optical flow method that
    employs implicit image enhancement through multi-modal synergistic training. To
    supplement the scene information missing in the original low-quality image, we
    utilize a high-low frequency feature enhancement network. The enhancement network
    is implicitly guided by multi-modal data and the specific subsequent tasks, enabling
    the model to learn multi-modal knowledge that enhances feature information suitable
    for optical flow estimation during inference. By using RGBD multi-modal data,
    the proposed method avoids the reliance on the images captured from the same view,
    a common limitation in traditional image enhancement methods. During training,
    the encoded features extracted from the enhanced images are synergistically supervised
    by features from the RGBD fusion as well as by the optical flow task. Experiments
    conducted on both synthetic and real datasets demonstrate that the proposed method
    significantly improves performance on public datasets.
  related_code: ''
- author: Wensheng Cheng, Zhenghong Li, Jiaxiang Ren 0002, Hyomin Jeong, Congwu Du,
    Yingtian Pan, Haibin Ling
  title: Blood Flow Speed Estimation with Optical Coherence Tomography Angiography
    Images.
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/ChengL0JDPL25
  doi: 10.1109/CVPR52734.2025.00979
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Cheng_Blood_Flow_Speed_Estimation_with_Optical_Coherence_Tomography_Angiography_Images_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/ChengL0JDPL25
  abstract: Estimating blood flow speed is essential in many medical and physiological
    applications, yet it is extremely challenging due to complex vascular structure
    and flow dynamics, particularly for cerebral cortex regions. Existing techniques,
    such as Optical Doppler Tomography (ODT), generally require complex hardware control
    and signal processing, and still suffer from inherent system-level artifacts.
    To address these challenges, we propose a new learning-based approach named OCTA-Flow,
    which directly estimates vascular blood flow speed from Optical Coherence Tomography
    Angiography (OCTA) images that are commonly used for vascular structure analysis.
    OCTA-Flow employs several novel components to achieve this goal. First, using
    an encoder-decoder architecture, OCTA-Flow leverages ODT data as pseudo labels
    during training, thus bypassing the difficulty of collecting ground truth data.
    Second, to capture the relationship between vessels of varying scales and their
    flow speed, we design an Adaptive Window Fusion module that employs multiscale
    window attention. Third, to mitigate ODT artifacts, we incorporate a Conditional
    Random Field Decoder that promotes smoothness and consistency in the estimated
    blood flow. Together, these innovations enable OCTA-Flow to effectively produce
    accurate flow estimation, suppress the artifacts in ODT, and enhance practicality,
    benefiting from the established techniques of OCTA data acquisition. The code
    and data are available at https://github.com/Spritea/OCTA-Flow.
  related_code: https://github.com/Spritea/OCTA-Flow
- author: Wonjoon Jin, Qi Dai 0001, Chong Luo 0001, Seung-Hwan Baek, Sunghyun Cho
  title: 'FloVD: Optical Flow Meets Video Diffusion Model for Enhanced Camera-Controlled
    Video Synthesis.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/JinDLBC25
  doi: 10.1109/CVPR52734.2025.00196
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Jin_FloVD_Optical_Flow_Meets_Video_Diffusion_Model_for_Enhanced_Camera-Controlled_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/JinDLBC25
  abstract: We present FloVD, a novel video diffusion model for camera-controllable
    video generation. FloVD leverages optical flow to represent the motions of the
    camera and moving objects. This approach offers two key benefits. Since optical
    flow can be directly estimated from videos, our approach allows for the use of
    arbitrary training videos without groundtruth camera parameters. Moreover, as
    background optical flow encodes 3D correlation across different viewpoints, our
    method enables detailed camera control by leveraging the background motion. To
    synthesize natural object motion while supporting detailed camera control, our
    framework adopts a two-stage video synthesis pipeline consisting of optical flow
    generation and flow-conditioned video synthesis. Extensive experiments demonstrate
    the superiority of our method over previous approaches in terms of accurate camera
    control and natural object motion synthesis.
  related_code: ''
- author: Daikun Liu, Lei Cheng, Teng Wang 0006, Changyin Sun 0001
  title: 'EDCFlow: Exploring Temporally Dense Difference Maps for Event-based Optical
    Flow Estimation.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/LiuCWS25
  doi: 10.1109/CVPR52734.2025.00191
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Liu_EDCFlow_Exploring_Temporally_Dense_Difference_Maps_for_Event-based_Optical_Flow_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/LiuCWS25
  abstract: Recent learning-based methods for event-based optical flow estimation
    utilize cost volumes for pixel matching but suffer from redundant computations
    and limited scalability to higher resolutions for flow refinement. In this work,
    we take advantage of the complementarity between temporally dense feature differences
    of adjacent event frames and cost volume and present a lightweight event-based
    optical flow network (EDCFlow) to achieve high-quality flow estimation at a higher
    resolution. Specifically, an attention-based multi-scale temporal feature difference
    layer is developed to capture diverse motion patterns at high resolution in a
    computation-efficient manner. An adaptive fusion of high-resolution difference
    motion features and low-resolution correlation motion features is performed to
    enhance motion representation and model generalization. Notably, EDCFlow can serve
    as a plug-and-play refinement module for RAFT-like event-based methods to enhance
    flow details. Extensive experiments demonstrate that EDCFlow achieves better performance
    with lower complexity compared to existing methods, offering superior generalization.
    Codes and models will be available at here.
  related_code: ''
- author: Libo Long, Xiao Hu 0008, Jochen Lang 0001
  title: 'Shape and Texture: What Influences Reliable Optical Flow Estimation?'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/Long0025
  doi: 10.1109/CVPR52734.2025.02597
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Long_Shape_and_Texture_What_Influences_Reliable_Optical_Flow_Estimation_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/Long0025
  abstract: 'Recent methods have made significant progress in optical flow estimation.
    However, the evaluation of these methods focuses mainly on improved accuracy in
    benchmarks and often overlooks the analysis of network robustness, which may be
    important in safety-critical scenarios such as autonomous driving. In this paper,
    we propose a novel method for robustness evaluation by modifying data from original
    benchmarks. Unlike previous benchmarks that focus on complex scenes, we propose
    to modify shape and texture of objects from the original images in order to analyze
    the sensitivity to these changes observed in the output. Our aim is to identify
    common failure cases of state-of-the-art (SOTA) methods to evaluate their robustness
    and understand their behaviors. We show that: Optical flow methods are more sensitive
    to shape changes than to texture changes; and optical flow methods tend to "remember"
    objects seen during training and may "ignore" the motion of unseen objects. Our
    experimental results and findings provide a more in-depth understanding of the
    behavior of recent optical flow methods. (See https://github.com/llesky/Robustness-Analysis-Optical-Flow).'
  related_code: https://github.com/llesky/Robustness-Analysis-Optical-Flow
- author: Henrique Morimitsu, Xiaobin Zhu 0001, Roberto M. Cesar, Xiangyang Ji, Xu-Cheng
    Yin
  title: 'DPFlow: Adaptive Optical Flow Estimation with a Dual-Pyramid Framework.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/Morimitsu0CJY25
  doi: 10.1109/CVPR52734.2025.01659
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Morimitsu_DPFlow_Adaptive_Optical_Flow_Estimation_with_a_Dual-Pyramid_Framework_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/Morimitsu0CJY25
  abstract: Optical flow estimation is essential for video processing tasks, such
    as restoration and action recognition. The quality of videos is constantly increasing,
    with current standards reaching 8K resolution. However, optical flow methods are
    usually designed for low resolution and do not generalize to large inputs due
    to their rigid architectures. They adopt downscaling or input tiling to reduce
    the input size, causing a loss of details and global information. There is also
    a lack of optical flow benchmarks to judge the actual performance of existing
    methods on high-resolution samples. Previous works only conducted qualitative
    high-resolution evaluations on hand-picked samples. This paper fills this gap
    in optical flow estimation in two ways. We propose DPFlow, an adaptive optical
    flow architecture capable of generalizing up to 8K resolution inputs while trained
    with only low-resolution samples. We also introduce Kubric-NK, a new benchmark
    for evaluating optical flow methods with input resolutions ranging from 1K to
    8K. Our high-resolution evaluation pushes the boundaries of existing methods and
    reveals new insights about their generalization capabilities. Extensive experimental
    results show that DPFlow achieves state-of-the-art results on the MPI-Sintel,
    KITTI 2015, Spring, and other high-resolution benchmarks. The code and dataset
    are available at https://github.com/hmorimitsu/ptlflow/tree/main/ptlflow/models/dpflow.
  related_code: https://github.com/hmorimitsu/ptlflow/tree/main/ptlflow/models/dpflow
- author: Hyelin Nam, Jaemin Kim, Dohun Lee, Jong Chul Ye
  title: Optical-Flow Guided Prompt Optimization for Coherent Video Generation.
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/NamKLY25
  doi: 10.1109/CVPR52734.2025.00734
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Nam_Optical-Flow_Guided_Prompt_Optimization_for_Coherent_Video_Generation_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/NamKLY25
  abstract: 'While text-to-video diffusion models have made significant strides, many
    still face challenges in generating videos with temporal consistency. Within diffusion
    frameworks, guidance techniques have proven effective in enhancing output quality
    during inference; however, applying these methods to video diffusion models introduces
    additional complexity of handling computations across entire sequences.To address
    this, we propose a novel framework called MotionPrompt that guides the video generation
    process via optical flow. Specifically, we train a discriminator to distinguish
    optical flow between random pairs of frames from real videos and generated ones.
    Given that prompts can influence the entire video, we optimize learnable token
    embeddings during reverse sampling steps by using gradients from a trained discriminator
    applied to random frame pairs. This approach allows our method to generate visually
    coherent video sequences that closely reflect natural motion dynamics, without
    compromising the fidelity of the generated content. We demonstrate the effectiveness
    of our approach across various models. Project Page: https://motionprompt.github.io/'
  related_code: ''
- author: Qiaole Dong, Yanwei Fu 0001
  title: 'MemFlow: Optical Flow Estimation and Prediction with Memory.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/Dong024
  doi: 10.1109/CVPR52733.2024.01804
  ee: https://doi.org/10.1109/CVPR52733.2024.01804
  url: https://dblp.org/rec/conf/cvpr/Dong024
  abstract: 'Optical flow is a classical task that is important to the vision community.
    Classical optical flow estimation uses two frames as input, whilst some recent
    methods consider multiple frames to explicitly model long-range information. The
    former ones limit their ability to fully leverage temporal coherence along the
    video sequence; and the latter ones incur heavy computational overhead, typically
    not possible for real-time flow estimation. Some multi-frame-based approaches
    even necessitate unseen future frames for current estimation, compromising real-time
    applicability in safety-critical scenarios. To this end, we present MemFlow, a
    real-time method for optical flow estimation and prediction with memory. Our method
    enables memory readout and update modules for aggregating historical motion information
    in real-time. Furthermore, we integrate resolution-adaptive re-scaling to accommodate
    diverse video resolutions. Besides, our approach seamlessly extends to the future
    prediction of optical flow based on past observations. Leveraging effective historical
    motion aggregation, our method outperforms VideoFlow with fewer parameters and
    faster inference speed on Sintel and KITTI-15 datasets in terms of generalization
    performance. At the time of submission, MemFlow also leads in performance on the
    1080p Spring dataset. Codes and models will be available at: https://dqiaole.github.io/MemFlow/.'
  related_code: ''
- author: Jisoo Jeong, Hong Cai, Risheek Garrepalli, Jamie Menjay Lin, Munawar Hayat,
    Fatih Porikli
  title: 'OCAI: Improving Optical Flow Estimation by Occlusion and Consistency Aware
    Interpolation.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/JeongCGLHP24
  doi: 10.1109/CVPR52733.2024.01831
  ee: https://doi.org/10.1109/CVPR52733.2024.01831
  url: https://dblp.org/rec/conf/cvpr/JeongCGLHP24
  abstract: The scarcity of ground-truth labels poses one major challenge in developing
    optical flow estimation models that are both generalizable and robust. While current
    methods rely on data augmentation, they have yet to fully exploit the rich information
    available in labeled video sequences. We propose OCAI, a method that supports
    robust frame interpolation by generating intermediate video frames along-side
    optical flows in between. Utilizing a forward warping approach, OCAI employs occlusion
    awareness to resolve ambiguities in pixel values and fills in missing values by
    leveraging the forward-backward consistency of optical flows. Additionally, we
    introduce a teacher-student style semi-supervised learning method on top of the
    interpolated frames. Using a pair of unlabeled frames and the teacher model's
    predicted optical flow, we generate interpolated frames and flows to train a student
    model. The teacher's weights are maintained using Exponential Moving Averaging
    of the student. Our evaluations demonstrate perceptually superior interpolation
    quality and enhanced optical flow accuracy on established benchmarks such as Sintel
    and KITTI.
  related_code: ''
- author: Han Ling, Quansen Sun, Yinghui Sun, Xian Xu, Xingfeng Li 0004
  title: 'ADFactory: An Effective Framework for Generalizing Optical Flow With NeRF.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/LingSSX024
  doi: 10.1109/CVPR52733.2024.01946
  ee: https://doi.org/10.1109/CVPR52733.2024.01946
  url: https://dblp.org/rec/conf/cvpr/LingSSX024
  abstract: 'A significant challenge facing current optical flow meth-ods is the difficulty
    in generalizing them well to the real world. This is mainly due to the lack of
    large-scale real-world datasets, and existing self-supervised methods are limited
    by indirect loss and occlusions, resulting in fuzzy outcomes. To address this
    challenge, we introduce a novel optical flow training framework: automatic data
    factory (ADF). ADF only requires RGB images as input to effectively train the
    optical flow network on the target data do-main. Specifically, we use advanced
    NeRF technology to reconstruct scenes from photo groups collected by a monoc-ular
    camera, and then calculate optical flow labels between camera pose pairs based
    on the rendering results. To elimi-nate erroneous labels caused by defects in
    the scene reconstructed by NeRF, we screened the generated labels from multiple
    aspects, such as optical flow matching accuracy, radiation field confidence, and
    depth consistency. The fil-tered labels can be directly used for network supervision.
    Experimentally, the generalization ability of ADF on KITTI surpasses existing
    self-supervised optical flow and monoc-ular scene flow algorithms. In addition,
    ADF achieves impressive results in real-world zero-point generalization evaluations
    and surpasses most supervised methods11Code: https://github.com/HanLingsgjk/UnifiedGeneralization.'
  related_code: https://github.com/HanLingsgjk/UnifiedGeneralization
- author: Xinglong Luo, Ao Luo, Zhengning Wang, Chunyu Lin, Bing Zeng 0001, Shuaicheng
    Liu
  title: Efficient Meshflow and Optical Flow Estimation from Event Cameras.
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/LuoLWLZL24
  doi: 10.1109/CVPR52733.2024.01816
  ee: https://doi.org/10.1109/CVPR52733.2024.01816
  url: https://dblp.org/rec/conf/cvpr/LuoLWLZL24
  abstract: In this paper, we explore the problem of event-based meshflow estimation,
    a novel task that involves predicting a spatially smooth sparse motion field from
    event cameras. To start, we generate a large-scale High-Resolution Event Meshflow
    (HREM) dataset, which showcases its superiority by encompassing the merits of
    high resolution at 1280×720, handling dynamic objects and complex motion patterns,
    and offering both optical flow and meshflow labels. These aspects have not been
    fully explored in previous works. Besides, we propose Efficient Event-based MeshFlow
    (EEMFlow) network, a lightweight model featuring a specially crafted encoder-decoder
    architecture to facilitate swift and accurate meshflow estimation. Furthermore,
    we upgrade EEMFlow network to support dense event optical flow, in which a Confidence-induced
    Detail Completion (CDC) module is proposed to preserve sharp motion boundaries.
    We conduct comprehensive experiments to show the exceptional performance and runtime
    efficiency (39× faster) of our EEMFlow model compared to recent state-of-the-art
    flow methods. Our code is available at https://github.com/boomluo02/EEMFlow.
  related_code: https://github.com/boomluo02/EEMFlow
- author: Shuai Yuan, Lei Luo, Zhuo Hui, Can Pu, Xiaoyu Xiang, Rakesh Ranjan, Denis
    Demandolx
  title: 'UnSAMFlow: Unsupervised Optical Flow Guided by Segment Anything Model.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/YuanLHPXRD24
  doi: 10.1109/CVPR52733.2024.01800
  ee: https://doi.org/10.1109/CVPR52733.2024.01800
  url: https://dblp.org/rec/conf/cvpr/YuanLHPXRD24
  abstract: Traditional unsupervised optical flow methods are vul-nerable to occlusions
    and motion boundaries due to lack of object-level information. Therefore, we propose
    UnSAM-Flow, an unsupervised flow network that also leverages object information
    from the latest foundation model Segment Anything Model (SAM). We first include
    a self-supervised semantic augmentation module tailored to SAM masks. We also
    analyze the poor gradient landscapes of traditional smoothness losses and propose
    a new smoothness definition based on homography instead. A simple yet effective
    mask feature module has also been added to further ag-gregate features on the
    object level. With all these adaptations, our method produces clear optical flow
    estimation with sharp boundaries around objects, which outperforms state-of-the-art
    methods on both KITTI and Sintel datasets. Our method also generalizes well across
    domains and runs very efficiently.
  related_code: ''
- author: Qiaole Dong, Chenjie Cao, Yanwei Fu 0001
  title: Rethinking Optical Flow from Geometric Matching Consistent Perspective.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/DongCF23
  doi: 10.1109/CVPR52729.2023.00135
  ee: https://doi.org/10.1109/CVPR52729.2023.00135
  url: https://dblp.org/rec/conf/cvpr/DongCF23
  abstract: Optical flow estimation is a challenging problem remaining unsolved. Recent
    deep learning based optical flow models have achieved considerable success. However,
    these models often train networks from the scratch on standard optical flow data,
    which restricts their ability to robustly and geometrically match image features.
    In this paper, we propose a rethinking to previous optical flow estimation. We
    particularly leverage Geometric Image Matching (GIM) as a pre-training task for
    the optical flow estimation (MatchFlow) with better feature representations, as
    GIM shares some common challenges as optical flow estimation, and with massive
    labeled real-world data. Thus, matching static scenes helps to learn more fundamental
    feature correlations of objects and scenes with consistent displacements. Specifically,
    the proposed MatchFlow model employs a QuadTree attention-based network pre-trained
    on MegaDepth to extract coarse features for further flow regression. Extensive
    experiments show that our model has great cross-dataset generalization. Our method
    achieves 11.5% and 10.1% error reduction from GMA on Sintel clean pass and KITTI
    test set. At the time of anonymous submission, our MatchFlow(G) enjoys state-of-the-art
    performance on Sintel clean and final pass compared to published approaches with
    comparable computation and memory footprint. Codes and models will be released
    in https://github.com/DQiaole/MatchFlow.
  related_code: https://github.com/DQiaole/MatchFlow
- author: Jisoo Jeong, Hong Cai, Risheek Garrepalli, Fatih Porikli
  title: 'DistractFlow: Improving Optical Flow Estimation via Realistic Distractions
    and Pseudo-Labeling.'
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/JeongCGP23
  doi: 10.1109/CVPR52729.2023.01316
  ee: https://doi.org/10.1109/CVPR52729.2023.01316
  url: https://dblp.org/rec/conf/cvpr/JeongCGP23
  abstract: We propose a novel data augmentation approach, DistractFlow, for training
    optical flow estimation models by introducing realistic distractions to the input
    frames. Based on a mixing ratio, we combine one of the frames in the pair with
    a distractor image depicting a similar domain, which allows for inducing visual
    perturbations congruent with natural objects and scenes. We refer to such pairs
    as distracted pairs. Our intuition is that using semantically meaningful distractors
    enables the model to learn related variations and attain robustness against challenging
    deviations, compared to conventional augmentation schemes focusing only on low-level
    aspects and modifications. More specifically, in addition to the supervised loss
    computed between the estimated flow for the original pair and its ground-truth
    flow, we include a second supervised loss defined between the distracted pair's
    flow and the original pair's ground-truth flow, weighted with the same mixing
    ratio. Furthermore, when unlabeled data is available, we extend our augmentation
    approach to self-supervised settings through pseudo-labeling and cross-consistency
    regularization. Given an original pair and its distracted version, we enforce
    the estimated flow on the distracted pair to agree with the flow of the original
    pair. Our approach allows increasing the number of available training pairs significantly
    without requiring additional annotations. It is agnostic to the model architecture
    and can be applied to training any optical flow estimation models. Our extensive
    evaluations on multiple benchmarks, including Sintel, KITTI, and SlowFlow, show
    that DistractFlow improves existing models consistently, outperforming the latest
    state of the art.
  related_code: ''
- author: Hyunyoung Jung 0001, Zhuo Hui, Lei Luo, Haitao Yang, Feng Liu 0015, Sungjoo
    Yoo, Rakesh Ranjan, Denis Demandolx
  title: 'AnyFlow: Arbitrary Scale Optical Flow with Implicit Neural Representation.'
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/JungHLYLYRD23
  doi: 10.1109/CVPR52729.2023.00528
  ee: https://doi.org/10.1109/CVPR52729.2023.00528
  url: https://dblp.org/rec/conf/cvpr/JungHLYLYRD23
  abstract: To apply optical flow in practice, it is often necessary to resize the
    input to smaller dimensions in order to reduce computational costs. However, downsizing
    inputs makes the estimation more challenging because objects and motion ranges
    become smaller. Even though recent approaches have demonstrated high-quality flow
    estimation, they tend to fail to accurately model small objects and precise boundaries
    when the input resolution is lowered, restricting their applicability to high-resolution
    inputs. In this paper, we introduce AnyFlow, a robust network that estimates accurate
    flow from images of various resolutions. By representing optical flow as a continuous
    coordinate-based representation, AnyFlow generates outputs at arbitrary scales
    from low-resolution inputs, demonstrating superior performance over prior works
    in capturing tiny objects with detail preservation on a wide range of scenes.
    We establish a new state-of-the-art performance of cross-dataset generalization
    on the KITTI dataset, while achieving comparable accuracy on the online benchmarks
    to other SOTA methods.
  related_code: ''
- author: Jun Nagata, Yusuke Sekikawa
  title: Tangentially Elongated Gaussian Belief Propagation for Event-Based Incremental
    Optical Flow Estimation.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/NagataS23
  doi: 10.1109/CVPR52729.2023.02101
  ee: https://doi.org/10.1109/CVPR52729.2023.02101
  url: https://dblp.org/rec/conf/cvpr/NagataS23
  abstract: Optical flow estimation is a fundamental functionality in computer vision.
    An event-based camera, which asynchronously detects sparse intensity changes,
    is an ideal device for realizing low-latency estimation of the optical flow owing
    to its low-latency sensing mechanism. An existing method using local plane fitting
    of events could utilize the sparsity to realize incremental updates for low-latency
    estimation; however, its output is merely a normal component of the full optical
    flow. An alternative approach using a frame-based deep neural network could estimate
    the full flow; however, its intensive non-incremental dense operation prohibits
    the low-latency estimation. We propose tangentially elongated Gaussian (TEG) belief
    propagation (BP) that realizes incremental full-flow estimation. We model the
    probability of full flow as the joint distribution of TEGs from the normal flow
    measurements, such that the marginal of this distribution with correct prior equals
    the full flow. We formulate the marginalization using a message-passing based
    on the BP to realize efficient incremental updates using sparse measurements.
    In addition to the theoretical justification, we evaluate the effectiveness of
    the TEGBP in real-world datasets; it outperforms SOTA incremental quasi-full flow
    method by a large margin. (The code is available at https://github.com/DensoITLab/tegbp/).
  related_code: https://github.com/DensoITLab/tegbp/
- author: Shaojie Bai, Zhengyang Geng, Yash Savani, J. Zico Kolter
  title: Deep Equilibrium Optical Flow Estimation.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/BaiGSK22
  doi: 10.1109/CVPR52688.2022.00070
  ee: https://doi.org/10.1109/CVPR52688.2022.00070
  url: https://dblp.org/rec/conf/cvpr/BaiGSK22
  abstract: Many recent state-of-the-art (SOTA) optical flow models use finite-step
    recurrent update operations to emulate traditional algorithms by encouraging iterative
    refinements toward a stable flow estimation. However, these RNNs impose large
    computation and memory overheads, and are not directly trained to model such “stable
    estimation”. They can converge poorly and thereby suffer from performance degradation.
    To combat these drawbacks, we propose deep equilibrium (DEQ)flow estimators, an
    approach that directly solves for the flow as the infinite-level fixed point of
    an implicit layer (using any black-box solver) [3], and differentiates through
    this fixed point analytically (thus requiring $O(1)$ training memory). This implicit-depth
    approach is not predicated on any specific model, and thus can be applied to a
    wide range of SOTA flow estimation model designs (e.g., RAFT [1] and GMA [2]).
    The use of these DEQflow estimators allows us to compute the flow faster using,
    e.g., fixed-point reuse and inexact gradients, consumes $4\sim 6\times less$ training
    memory than the recurrent counterpart, and achieves better results with the same
    computation budget. In addition, we propose a novel, sparse fixed-point correction
    scheme to stabilize our DEQ flow estimators, which addresses a longstanding challenge
    for DEQ models in general. We test our approach in various realistic settings
    and show that it improves SOTA methods on Sintel and KITTI datasets with substantially
    better computational and memory efficiency.
  related_code: ''
- author: Liwen Hu 0002, Rui Zhao 0010, Ziluo Ding, Lei Ma 0008, Boxin Shi, Ruiqin
    Xiong, Tiejun Huang 0001
  title: Optical Flow Estimation for Spiking Camera.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/HuZD0SX022
  doi: 10.1109/CVPR52688.2022.01732
  ee: https://doi.org/10.1109/CVPR52688.2022.01732
  url: https://dblp.org/rec/conf/cvpr/HuZD0SX022
  abstract: As a bio-inspired sensor with high temporal resolution, the spiking camera
    has an enormous potential in real applications, especially for motion estimation
    in high-speed scenes. However, frame-based and event-based methods are not well
    suited to spike streams from the spiking camera due to the different data modalities.
    To this end, we present, SCFlow, a tailored deep learning pipeline to estimate
    optical flow in high-speed scenes from spike streams. Importantly, a novel input
    representation is introduced which can adaptively remove the motion blur in spike
    streams according to the prior motion. Further, for training SCFlow, we synthesize
    two sets of optical flow data for the spiking camera, SPIkingly Flying Things
    and Photo-realistic Highspeed Motion, denoted as SPIFT and PHM respectively, corresponding
    to random high-speed and well-designed scenes. Experimental results show that
    the SCFlow can predict optical flow from spike streams in different high-speed
    scenes. Moreover, SCFlow shows promising generalization on real spike streams.
    Codes and datasets refer to https://github.com/Acnext/Optical-Flow-For-Spiking-Camera.
  related_code: https://github.com/Acnext/Optical-Flow-For-Spiking-Camera
- author: Jisoo Jeong, Jamie Menjay Lin, Fatih Porikli, Nojun Kwak
  title: Imposing Consistency for Optical Flow Estimation.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/JeongLPK22
  doi: 10.1109/CVPR52688.2022.00318
  ee: https://doi.org/10.1109/CVPR52688.2022.00318
  url: https://dblp.org/rec/conf/cvpr/JeongLPK22
  abstract: Imposing consistency through proxy tasks has been shown to enhance data-driven
    learning and enable self-supervision in various tasks. This paper introduces novel
    and effective consistency strategies for optical flow estimation, a problem where
    labels from real-world data are very challenging to derive. More specifically,
    we propose occlusion consistency and zero forcing in the forms of self-supervised
    learning and transformation consistency in the form of semi-supervised learning.
    We apply these consistency techniques in a way that the network model learns to
    describe pixel-level motions better while requiring no additional annotations.
    We demonstrate that our consistency strategies applied to a strong baseline network
    model using the original datasets and labels provide further improvements, attaining
    the state-of-the-art results on the KITTI-2015 scene flow benchmark in the non-stereo
    category. Our method achieves the best foreground accuracy (4.33% in Fl-all) over
    both the stereo and non-stereo categories, even though using only monocular image
    inputs.
  related_code: ''
- author: Ao Luo, Fan Yang 0054, Xin Li 0079, Shuaicheng Liu
  title: Learning Optical Flow with Kernel Patch Attention.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/LuoYLL22
  doi: 10.1109/CVPR52688.2022.00870
  ee: https://doi.org/10.1109/CVPR52688.2022.00870
  url: https://dblp.org/rec/conf/cvpr/LuoYLL22
  abstract: Optical flow is a fundamental method used for quantitative motion estimation
    on the image plane. In the deep learning era, most works treat it as a task of
    ‘matching of features’, learning to pull matched pixels as close as possible in
    feature space and vice versa. However, spatial affinity (smoothness constraint),
    another important component for motion understanding, has been largely overlooked.
    In this paper, we introduce a novel approach, called kernel patch attention (KPA),
    to better resolve the ambiguity in dense matching by explicitly taking the local
    context relations into consideration. Our KPA operates on each local patch, and
    learns to mine the context affinities for better inferring the flow fields. It
    can be plugged into contemporary optical flow architecture and empower the model
    to conduct comprehensive motion analysis with both feature similarities and spatial
    relations. On Sintel dataset, the proposed KPA-Flow achieves the best performance
    with EPE of 1.35 on clean pass and 2.36 on final pass, and it sets a new record
    of 4.60% in F1-all on KITTI-15 benchmark. Code is publicly available at https://github.com/megvii-research/KPAFlow.
  related_code: https://github.com/megvii-research/KPAFlow
- author: Simon Schrodi, Tonmoy Saikia, Thomas Brox
  title: Towards Understanding Adversarial Robustness of Optical Flow Networks.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/SchrodiSB22
  doi: 10.1109/CVPR52688.2022.00871
  ee: https://doi.org/10.1109/CVPR52688.2022.00871
  url: https://dblp.org/rec/conf/cvpr/SchrodiSB22
  abstract: Recent work demonstrated the lack of robustness of optical flow networks
    to physical patch-based adversarial attacks. The possibility to physically attack
    a basic component of automotive systems is a reason for serious concerns. In this
    paper, we analyze the cause of the problem and show that the lack of robustness
    is rooted in the classical aperture problem of optical flow estimation in combination
    with bad choices in the details of the network architecture. We show how these
    mistakes can be rectified in order to make optical flow networks robust to physical
    patch-based attacks. Additionally, we take a look at global white-box attacks
    in the scope of optical flow. We find that targeted white-box attacks can be crafted
    to bias flow estimation models towards any desired output, but this requires access
    to the input images and model weights. However, in the case of universal attacks,
    we find that optical flow networks are robust. Code is available at https://github.com/lmb-freiburg/understanding_flow_robustness.
  related_code: https://github.com/lmb-freiburg/understanding_flow_robustness
- author: Haofei Xu, Jing Zhang 0037, Jianfei Cai 0001, Hamid Rezatofighi, Dacheng
    Tao
  title: 'GMFlow: Learning Optical Flow via Global Matching.'
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/XuZ0RT22
  doi: 10.1109/CVPR52688.2022.00795
  ee: https://doi.org/10.1109/CVPR52688.2022.00795
  url: https://dblp.org/rec/conf/cvpr/XuZ0RT22
  abstract: 'Learning-based optical flow estimation has been dominated with the pipeline
    of cost volume with convolutions for flow regression, which is inherently limited
    to local correlations and thus is hard to address the long-standing challenge
    of large displacements. To alleviate this, the state-of-the-art framework RAFT
    gradually improves its prediction quality by using a large number of iterative
    refinements, achieving remarkable performance but introducing linearly increasing
    inference time. To enable both high accuracy and efficiency, we completely revamp
    the dominant flow regression pipeline by reformulating optical flow as a global
    matching problem, which identifies the correspondences by directly comparing feature
    similarities. Specifically, we propose a GMFlow framework, which consists of three
    main components: a customized Transformer for feature enhancement, a correlation
    and softmax layer for global feature matching, and a self-attention layer for
    flow propagation. We further introduce a refinement step that reuses GMFlow at
    higher feature resolution for residual flow prediction. Our new framework outperforms
    31-refinements RAFT on the challenging Sintel benchmark, while using only one
    refinement and running faster, suggesting a new paradigm for accurate and efficient
    optical flow estimation. Code is available at https://github.com/haofeixu/gmflow.'
  related_code: https://github.com/haofeixu/gmflow
- author: Shiyu Zhao 0001, Long Zhao 0003, Zhixing Zhang, Enyu Zhou, Dimitris N. Metaxas
  title: Global Matching with Overlapping Attention for Optical Flow Estimation.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/ZhaoZZZM22
  doi: 10.1109/CVPR52688.2022.01707
  ee: https://doi.org/10.1109/CVPR52688.2022.01707
  url: https://dblp.org/rec/conf/cvpr/ZhaoZZZM22
  abstract: Optical flow estimation is a fundamental task in computer vision. Recent
    direct-regression methods using deep neural networks achieve remarkable performance
    improvement. However, they do not explicitly capture long-term motion correspondences
    and thus cannot handle large motions effectively. In this paper, inspired by the
    traditional matching-optimization methods where matching is introduced to handle
    large displacements before energy-based optimizations, we introduce a simple but
    effective global matching step before the direct regression and develop a learning-based
    matching-optimization framework, namely GMFlowNet. In GMFlowNet, global matching
    is efficiently calculated by applying argmax on 4D cost volumes. Additionally,
    to improve the matching quality, we propose patch-based overlapping attention
    to extract large context features. Extensive experiments demonstrate that GM-FlowNet
    outperforms RAFT, the most popular optimization-only method, by a large margin
    and achieves state-of-the-art performance on standard benchmarks. Thanks to the
    matching and overlapping attention, GMFlowNet obtains major improvements on the
    predictions for textureless regions and large motions. Our code is made publicly
    available at https://github.com/xiaofeng94/GMFlowNet.
  related_code: https://github.com/xiaofeng94/GMFlowNet
- author: Zihua Zheng, Ni Nie, Zhi Ling, Pengfei Xiong, Jiangyu Liu, Hao Wang, Jiankun
    Li
  title: 'DIP: Deep Inverse Patchmatch for High-Resolution Optical Flow.'
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/ZhengNLXLWL22
  doi: 10.1109/CVPR52688.2022.00872
  ee: https://doi.org/10.1109/CVPR52688.2022.00872
  url: https://dblp.org/rec/conf/cvpr/ZhengNLXLWL22
  abstract: Recently, the dense correlation volume method achieves state-of-the-art
    performance in optical flow. However, the correlation volume computation requires
    a lot of memory, which makes prediction difficult on high-resolution images. In
    this paper, we propose a novel Patchmatch-based framework to work on high-resolution
    optical flow estimation. Specifically, we introduce the first end-to-end Patchmatch
    based deep learning optical flow. It can get high-precision results with lower
    memory benefiting from propagation and local search of Patchmatch. Furthermore,
    a new inverse propagation is proposed to decouple the complex operations of propagation,
    which can significantly reduce calculations in multiple iterations. At the time
    of submission, our method ranks 1st on all the metrics on the popular KITTI2015
    [28] benchmark, and ranks 2nd on EPE on the Sintel [7] clean benchmark among published
    optical flow methods. Experiment shows our method has a strong cross-dataset generalization
    ability that the F1-all achieves 13.73%, reducing 21% from the best published
    result 17.4% on KITTI2015. What's more, our method shows a good details preserving
    result on the high-resolution dataset DAVIS [1] and consumes 2× less memory than
    RAFT [36]. Code will be available at github.com/zihuarheng/DIP
  related_code: ''
- author: Filippo Aleotti, Matteo Poggi, Stefano Mattoccia
  title: Learning Optical Flow From Still Images.
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/AleottiPM21
  doi: 10.1109/CVPR46437.2021.01495
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Aleotti_Learning_Optical_Flow_From_Still_Images_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/AleottiPM21
  abstract: This paper deals with the scarcity of data for training optical flow networks,
    highlighting the limitations of existing sources such as labeled synthetic datasets
    or unlabeled real videos. Specifically, we introduce a framework to generate accurate
    ground-truth optical flow annotations quickly and in large amounts from any readily
    available single real picture. Given an image, we use an off-the-shelf monocular
    depth estimation network to build a plausible point cloud for the observed scene.
    Then, we virtually move the camera in the reconstructed environment with known
    motion vectors and rotation angles, allowing us to synthesize both a novel view
    and the corresponding optical flow field connecting each pixel in the input image
    to the one in the new frame. When trained with our data, state-of-the-art optical
    flow networks achieve superior generalization to unseen real data compared to
    the same models trained either on annotated synthetic datasets or unlabeled videos,
    and better specialization if combined with synthetic images.
  related_code: ''
- author: Cheng Chi, Qingjie Wang, Tianyu Hao, Peng Guo 0001, Xin Yang 0008
  title: 'Feature-Level Collaboration: Joint Unsupervised Learning of Optical Flow,
    Stereo Depth and Camera Motion.'
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/ChiWHGY21
  doi: 10.1109/CVPR46437.2021.00249
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Chi_Feature-Level_Collaboration_Joint_Unsupervised_Learning_of_Optical_Flow_Stereo_Depth_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/ChiWHGY21
  abstract: 'Precise estimation of optical flow, stereo depth and camera motion are
    important for the real-world 3D scene understanding and visual perception. Since
    the three tasks are tightly coupled with the inherent 3D geometric constraints,
    current studies have demonstrated that the three tasks can be improved through
    jointly optimizing geometric loss functions of several individual networks. In
    this paper, we show that effective feature-level collaboration of the networks
    for the three respective tasks could achieve much greater performance improvement
    for all three tasks than only loss-level joint optimization. Specifically, we
    propose a single network to combine and improve the three tasks. The network extracts
    the features of two consecutive stereo images, and simultaneously estimates optical
    flow, stereo depth and camera motion. The whole network mainly contains four parts:
    (I) a feature-sharing encoder to extract features of input images, which can enhance
    features’ representation ability; (II) a pooled decoder to estimate both optical
    flow and stereo depth; (III) a camera pose estimation module which fuses optical
    flow and stereo depth information; (IV) a cost volume complement module to improve
    the performance of optical flow in static and occluded regions. Our method achieves
    state-of-the-art performance among the joint unsupervised methods, including optical
    flow and stereo depth estimation on KITTI 2012 and 2015 benchmarks, and camera
    motion estimation on KITTI VO dataset.'
  related_code: ''
- author: Shihao Jiang, Yao Lu, Hongdong Li, Richard Hartley 0001
  title: Learning Optical Flow From a Few Matches.
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/JiangLL021
  doi: 10.1109/CVPR46437.2021.01632
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Jiang_Learning_Optical_Flow_From_a_Few_Matches_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/JiangLL021
  abstract: State-of-the-art neural network models for optical flow estimation require
    a dense correlation volume at high resolutions for representing per-pixel displacement.
    Although the dense correlation volume is informative for accurate estimation,
    its heavy computation and memory usage hinders the efficient training and deployment
    of the models. In this paper, we show that the dense correlation volume representation
    is redundant and accurate flow estimation can be achieved with only a fraction
    of elements in it. Based on this observation, we propose an alternative displacement
    representation, named Sparse Correlation Volume, which is constructed directly
    by computing the k closest matches in one feature map for each feature vector
    in the other feature map and stored in a sparse data structure. Experiments show
    that our method can reduce computational cost and memory use significantly, while
    maintaining high accuracy compared to previous approaches with dense correlation
    volumes.
  related_code: ''
- author: Yang Jiao, Trac D. Tran, Guangming Shi
  title: 'EffiScene: Efficient Per-Pixel Rigidity Inference for Unsupervised Joint
    Learning of Optical Flow, Depth, Camera Pose and Motion Segmentation.'
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/JiaoTS21
  doi: 10.1109/CVPR46437.2021.00549
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Jiao_EffiScene_Efficient_Per-Pixel_Rigidity_Inference_for_Unsupervised_Joint_Learning_of_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/JiaoTS21
  abstract: 'This paper addresses the challenging unsupervised scene flow estimation
    problem by jointly learning four low-level vision sub-tasks: optical flow F, stereo-depth
    D, camera pose P and motion segmentation S. Our key insight is that the rigidity
    of the scene shares the same inherent geometrical structure with object movements
    and scene depth. Hence, rigidity from S can be inferred by jointly coupling F,
    D and P to achieve more robust estimation. To this end, we propose a novel scene
    flow framework named EffiScene with efficient joint rigidity learning, going beyond
    the existing pipeline with independent auxiliary structures. In EffiScene, we
    first estimate optical flow and depth at the coarse level and then compute camera
    pose by Perspective-n-Points method. To jointly learn local rigidity, we design
    a novel Rigidity From Motion (RfM) layer with three principal components: (i)
    correlation extraction; (ii) boundary learning; and (iii) outlier exclusion. Final
    outputs are fused based on the rigid map MR from RfM at finer levels. To efficiently
    train EffiScene, two new losses ℒbnd and ℒunc are designed to prevent trivial
    solutions and to regularize the flow boundary discontinuity. Extensive experiments
    on scene flow benchmark KITTI show that our method is effective and significantly
    improves the state-of-the-art approaches for all sub-tasks, i.e. optical flow
    (5.19→4.20), depth estimation (3.78→3.46), visual odometry (0.012→0.011) and motion
    segmentation (0.57→ 0.62).'
  related_code: ''
- author: Kunming Luo, Chuan Wang 0001, Shuaicheng Liu, Haoqiang Fan, Jue Wang 0001,
    Jian Sun 0001
  title: 'UPFlow: Upsampling Pyramid for Unsupervised Optical Flow Learning.'
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/Luo0LF0S21
  doi: 10.1109/CVPR46437.2021.00110
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Luo_UPFlow_Upsampling_Pyramid_for_Unsupervised_Optical_Flow_Learning_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/Luo0LF0S21
  abstract: We present an unsupervised learning approach for optical flow estimation
    by improving the upsampling and learning of pyramid network. We design a self-guided
    upsample module to tackle the interpolation blur problem caused by bilinear upsampling
    between pyramid levels. Moreover, we propose a pyramid distillation loss to add
    supervision for intermediate levels via distilling the finest flow as pseudo labels.
    By integrating these two components together, our method achieves the best performance
    for unsupervised optical flow learning on multiple leading benchmarks, including
    MPI-SIntel, KITTI 2012 and KITTI 2015. In particular, we achieve EPE=1.4 on KITTI
    2012 and F1=9.38% on KITTI 2015, which outperform the previous state-of-the-art
    methods by 22.2% and 15.7%, respectively.
  related_code: ''
- author: Deqing Sun, Daniel Vlasic, Charles Herrmann, Varun Jampani, Michael Krainin,
    Huiwen Chang, Ramin Zabih, William T. Freeman, Ce Liu 0001
  title: 'AutoFlow: Learning a Better Training Set for Optical Flow.'
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/SunVHJKCZFL21
  doi: 10.1109/CVPR46437.2021.00996
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Sun_AutoFlow_Learning_a_Better_Training_Set_for_Optical_Flow_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/SunVHJKCZFL21
  abstract: Synthetic datasets play a critical role in pre-training CNN models for
    optical flow, but they are painstaking to generate and hard to adapt to new applications.
    To automate the process, we present AutoFlow, a simple and effective method to
    render training data for optical flow that optimizes the performance of a model
    on a target dataset. AutoFlow takes a layered approach to render synthetic data,
    where the motion, shape, and appearance of each layer are controlled by learnable
    hyperparameters. Experimental results show that AutoFlow achieves state-of-the-art
    accuracy in pre-training both PWC-Net and RAFT. Our code and data are available
    at autoflow-google.github.io.
  related_code: ''
- author: Liang Liu 0007, Jiangning Zhang, Ruifei He, Yong Liu 0007, Yabiao Wang,
    Ying Tai, Donghao Luo 0001, Chengjie Wang 0001, Jilin Li, Feiyue Huang
  title: 'Learning by Analogy: Reliable Supervision From Transformations for Unsupervised
    Optical Flow Estimation.'
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/LiuZHLWTLWLH20
  doi: 10.1109/CVPR42600.2020.00652
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Liu_Learning_by_Analogy_Reliable_Supervision_From_Transformations_for_Unsupervised_Optical_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/LiuZHLWTLWLH20
  abstract: Unsupervised learning of optical flow, which leverages the supervision
    from view synthesis, has emerged as a promising alternative to supervised methods.
    However, the objective of unsupervised learning is likely to be unreliable in
    challenging scenes. In this work, we present a framework to use more reliable
    supervision from transformations. It simply twists the general unsupervised learning
    pipeline by running another forward pass with transformed data from augmentation,
    along with using transformed predictions of original data as the self-supervision
    signal. Besides, we further introduce a lightweight network with multiple frames
    by a highly-shared flow decoder. Our method consistently gets a leap of performance
    on several benchmarks with the best accuracy among deep unsupervised methods.
    Also, our method achieves competitive results to recent fully supervised methods
    while with much fewer parameters.
  related_code: ''
- author: Zhixiang Min, Yiding Yang, Enrique Dunn
  title: 'VOLDOR: Visual Odometry From Log-Logistic Dense Optical Flow Residuals.'
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/MinYD20
  doi: 10.1109/CVPR42600.2020.00495
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Min_VOLDOR_Visual_Odometry_From_Log-Logistic_Dense_Optical_Flow_Residuals_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/MinYD20
  abstract: We propose a dense indirect visual odometry method taking as input externally
    estimated optical flow fields instead of hand-crafted feature correspondences.
    We define our problem as a probabilistic model and develop a generalized-EM formulation
    for the joint inference of camera motion, pixel depth, and motion-track confidence.
    Contrary to traditional methods assuming Gaussian-distributed observation errors,
    we supervise our inference framework under an (empirically validated) adaptive
    log-logistic distribution model. Moreover, the log-logistic residual model generalizes
    well to different state-of-the-art optical flow methods, making our approach modular
    and agnostic to the choice of optical flow estimators. Our method achieved top-ranking
    results on both TUM RGB-D and KITTI odometry benchmarks. Our open-sourced implementation
    is inherently GPU-friendly with only linear computational and storage growth.
  related_code: ''
- author: Liyuan Pan, Miaomiao Liu 0001, Richard Hartley 0001
  title: Single Image Optical Flow Estimation With an Event Camera.
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/PanL020
  doi: 10.1109/CVPR42600.2020.00174
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Pan_Single_Image_Optical_Flow_Estimation_With_an_Event_Camera_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/PanL020
  abstract: Event cameras are bio-inspired sensors that asynchronously report intensity
    changes in microsecond resolution. DAVIS can capture high dynamics of a scene
    and simultaneously output high temporal resolution events and low frame-rate intensity
    images. In this paper, we propose a single image (potentially blurred) and events
    based optical flow estimation approach. First, we demonstrate how events can be
    used to improve flow estimates. To this end, we encode the relation between flow
    and events effectively by presenting an event-based photometric consistency formulation.
    Then, we consider the special case of image blur caused by high dynamics in the
    visual environments and show that including the blur formation in our model further
    constrains flow estimation. This is in sharp contrast to existing works that ignore
    the blurred images while our formulation can naturally handle either blurred or
    sharp images to achieve accurate flow estimation. Finally, we reduce flow estimation,
    as well as image deblurring, to an alternative optimization problem of an objective
    function using the primal-dual algorithm. Experimental results on both synthetic
    and real data (with blurred and non-blurred images) show the superiority of our
    model in comparison to state-of-the-art approaches.
  related_code: ''
- author: Jiyang Yu, Ravi Ramamoorthi
  title: Learning Video Stabilization Using Optical Flow.
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/YuR20
  doi: 10.1109/CVPR42600.2020.00818
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Yu_Learning_Video_Stabilization_Using_Optical_Flow_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/YuR20
  abstract: We propose a novel neural network that infers the per-pixel warp fields
    for video stabilization from the optical flow fields of the input video. While
    previous learning based video stabilization methods attempt to implicitly learn
    frame motions from color videos, our method resorts to optical flow for motion
    analysis and directly learns the stabilization using the optical flow. We also
    propose a pipeline that uses optical flow principal components for motion inpainting
    and warp field smoothing, making our method robust to moving objects, occlusion
    and optical flow inaccuracy, which is challenging for other video stabilization
    methods. Our method achieves quantitatively and visually better results than the
    state-of-the-art optimization based and deep learning based video stabilization
    methods. Our method also gives a ~3x speed improvement compared to the optimization
    based methods.
  related_code: ''
- author: Junhwa Hur, Stefan Roth 0001
  title: Iterative Residual Refinement for Joint Optical Flow and Occlusion Estimation.
  venue: CVPR
  year: '2019'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/Hur019
  doi: 10.1109/CVPR.2019.00590
  ee: http://openaccess.thecvf.com/content_CVPR_2019/html/Hur_Iterative_Residual_Refinement_for_Joint_Optical_Flow_and_Occlusion_Estimation_CVPR_2019_paper.html
  url: https://dblp.org/rec/conf/cvpr/Hur019
  abstract: Deep learning approaches to optical flow estimation have seen rapid progress
    over the recent years. One common trait of many networks is that they refine an
    initial flow estimate either through multiple stages or across the levels of a
    coarse-to-fine representation. While leading to more accurate results, the downside
    of this is an increased number of parameters. Taking inspiration from both classical
    energy minimization approaches as well as residual networks, we propose an iterative
    residual refinement (IRR) scheme based on weight sharing that can be combined
    with several backbone networks. It reduces the number of parameters, improves
    the accuracy, or even achieves both. Moreover, we show that integrating occlusion
    prediction and bi-directional flow estimation into our IRR scheme can further
    boost the accuracy. Our full network achieves state-of-the-art results for both
    optical flow and occlusion estimation across several standard datasets.
