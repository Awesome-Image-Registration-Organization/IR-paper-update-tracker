- author: Zhengwang Wu, Gang Li 0001, Yu Meng 0003, Li Wang 0026, Weili Lin, Dinggang
    Shen
  title: 4D Infant Cortical Surface Atlas Construction Using Spherical Patch-Based
    Sparse Representation.
  venue: MICCAI
  year: '2017'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/WuLMWLS17
  doi: 10.1007/978-3-319-66182-7_7
  ee: https://doi.org/10.1007/978-3-319-66182-7_7
  url: https://dblp.org/rec/conf/miccai/WuLMWLS17
  abstract: The 4D infant cortical surface atlas with densely sampled time points
    is highly needed for neuroimaging analysis of early brain development. In this
    paper, we build the 4D infant cortical surface atlas firstly covering 6 postnatal
    years with 11 time points (i.e., 1, 3, 6, 9, 12, 18, 24, 36, 48, 60, and 72 months),
    based on 339 longitudinal MRI scans from 50 healthy infants. To build the 4D cortical
    surface atlas, first, we adopt a two-stage groupwise surface registration strategy
    to ensure both longitudinal consistency and unbiasedness. Second, instead of simply
    averaging over the co-registered surfaces, a spherical patch-based sparse representation
    is developed to overcome possible surface registration errors across different
    subjects. The central idea is that, for each local spherical patch in the atlas
    space, we build a dictionary, which includes the samples of current local patches
    and their spatially-neighboring patches of all co-registered surfaces, and then
    the current local patch in the atlas is sparsely represented using the built dictionary.
    Compared to the atlas built with the conventional methods, the 4D infant cortical
    surface atlas constructed by our method preserves more details of cortical folding
    patterns, thus leading to boosted accuracy in registration of new infant cortical
    surfaces.
  related_code: ''
- author: Yuyao Zhang 0005, Feng Shi 0001, Pew-Thian Yap, Dinggang Shen
  title: Space-Frequency Detail-Preserving Construction of Neonatal Brain Atlases.
  venue: MICCAI
  year: '2015'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ZhangSYS15
  doi: 10.1007/978-3-319-24571-3_31
  ee: https://doi.org/10.1007/978-3-319-24571-3_31
  url: https://dblp.org/rec/conf/miccai/ZhangSYS15
  abstract: Brain atlases are an integral component of neuroimaging studies. However,
    most brain atlases are fuzzy and lack structural details, especially in the cortical
    regions. In particular, neonatal brain atlases are especially challenging to construct
    due to the low spatial resolution and low tissue contrast. This is mainly caused
    by the image averaging process involved in atlas construction, often smoothing
    out high-frequency contents that indicate fine anatomical details. In this paper,
    we propose a novel framework for detail-preserving construction of atlases. Our
    approach combines space and frequency information to better preserve image details.
    This is achieved by performing reconstruction in the space-frequency domain given
    by wavelet transform. Sparse patch-based atlas reconstruction is performed in
    each frequency subband. Combining the results for all these subbands will then
    result in a refined atlas. Compared with existing atlases, experimental results
    indicate that our approach has the ability to build an atlas with more structural
    details, thus leading to better performance when used to normalize a group of
    testing neonatal images.
