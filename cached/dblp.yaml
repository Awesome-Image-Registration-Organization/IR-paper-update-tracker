- author: Mattias P. Heinrich
  title: Closing the Gap Between Deep and Conventional Image Registration Using Probabilistic
    Dense Displacement Networks.
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/Heinrich19
  doi: 10.1007/978-3-030-32226-7_6
  ee: https://doi.org/10.1007/978-3-030-32226-7_6
  url: https://dblp.org/rec/conf/miccai/Heinrich19
  abstract: Nonlinear image registration continues to be a fundamentally important
    tool in medical image analysis. Diagnostic tasks, image-guided surgery and radiotherapy
    as well as motion analysis all rely heavily on accurate intra-patient alignment.
    Furthermore, inter-patient registration enables atlas-based segmentation or landmark
    localisation and shape analysis. When labelled scans are scarce and anatomical
    differences large, conventional registration has often remained superior to deep
    learning methods that have so far mainly dealt with relatively small or low-complexity
    deformations. We address this shortcoming by leveraging ideas from probabilistic
    dense displacement optimisation that has excelled in many registration tasks with
    large deformations. We propose to design a network with approximate min-convolutions
    and mean field inference for differentiable displacement regularisation within
    a discrete weakly-supervised registration setting. By employing these meaningful
    and theoretically proven constraints, our learnable registration algorithm contains
    very few trainable weights (primarily for feature extraction) and is easier to
    train with few labelled scans. It is very fast in training and inference and achieves
    state-of-the-art accuracies for the challenging inter-patient registration of
    abdominal CT outperforming previous deep learning approaches by 15% Dice overlap.
- author: Alessa Hering, Bram van Ginneken, Stefan Heldmann
  title: 'mlVIRNET: Multilevel Variational Image Registration Network.'
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/HeringGH19
  doi: 10.1007/978-3-030-32226-7_29
  ee: https://doi.org/10.1007/978-3-030-32226-7_29
  url: https://dblp.org/rec/conf/miccai/HeringGH19
  abstract: We present a novel multilevel approach for deep learning based image registration.
    Recently published deep learning based registration methods have shown promising
    results for a wide range of tasks. However, these algorithms are still limited
    to relatively small deformations. Our method addresses this shortcoming by introducing
    a multilevel framework, which computes deformation fields on different scales,
    similar to conventional methods. Thereby, a coarse-level alignment is obtained
    first, which is subsequently improved on finer levels. We demonstrate our method
    on the complex task of inhale-to-exhale lung registration. We show that the use
    of a deep learning multilevel approach leads to significantly better registration
    results.
- author: Yipeng Hu, Eli Gibson, Dean C. Barratt, Mark Emberton, J. Alison Noble,
    Tom Vercauteren
  title: Conditional Segmentation in Lieu of Image Registration.
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/HuGBENV19
  doi: 10.1007/978-3-030-32245-8_45
  ee: https://doi.org/10.1007/978-3-030-32245-8_45
  url: https://dblp.org/rec/conf/miccai/HuGBENV19
  abstract: Classical pairwise image registration methods search for a spatial transformation
    that optimises a numerical measure that indicates how well a pair of moving and
    fixed images are aligned. Current learning-based registration methods have adopted
    the same paradigm and typically predict, for any new input image pair, dense correspondences
    in the form of a dense displacement field or parameters of a spatial transformation
    model. However, in many applications of registration, the spatial transformation
    itself is only required to propagate points or regions of interest (ROIs). In
    such cases, detailed pixel- or voxel-level correspondence within or outside of
    these ROIs often have little clinical value. In this paper, we propose an alternative
    paradigm in which the location of corresponding image-specific ROIs, defined in
    one image, within another image is learnt. This results in replacing image registration
    by a conditional segmentation algorithm, which can build on typical image segmentation
    networks and their widely-adopted training strategies. Using the registration
    of 3D MRI and ultrasound images of the prostate as an example to demonstrate this
    new approach, we report a median target registration error (TRE) of 2.1 mm between
    the ground-truth ROIs defined on intraoperative ultrasound images and those propagated
    from the preoperative MR images. Significantly lower (>34%) TREs were obtained
    using the proposed conditional segmentation compared with those obtained from
    a previously-proposed spatial-transformation-predicting registration network trained
    with the same multiple ROI labels for individual image pairs. We conclude this
    work by using a quantitative bias-variance analysis to provide one explanation
    of the observed improvement in registration accuracy.
- author: Xiaojun Hu, Miao Kang, Weilin Huang, Matthew R. Scott, Roland Wiest, Mauricio
    Reyes 0001
  title: Dual-Stream Pyramid Registration Network.
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/HuKHSW019
  doi: 10.1007/978-3-030-32245-8_43
  ee: https://doi.org/10.1007/978-3-030-32245-8_43
  url: https://dblp.org/rec/conf/miccai/HuKHSW019
  abstract: 'We propose a Dual-Stream Pyramid Registration Network (referred as Dual-PRNet)
    for unsupervised 3D medical image registration. Unlike recent CNN-based registration
    approaches, such as VoxelMorph, which explores a single-stream encoder-decoder
    network to compute a registration fields from a pair of 3D volumes, we design
    a two-stream architecture able to compute multi-scale registration fields from
    convolutional feature pyramids. Our contributions are two-fold: (i) we design
    a two-stream 3D encoder-decoder network which computes two convolutional feature
    pyramids separately for a pair of input volumes, resulting in strong deep representations
    that are meaningful for deformation estimation; (ii) we propose a pyramid registration
    module able to predict multi-scale registration fields directly from the decoding
    feature pyramids. This allows it to refine the registration fields gradually in
    a coarse-to-fine manner via sequential warping, and enable the model with the
    capability for handling significant deformations between two volumes, such as
    large displacements in spatial domain or slice space. The proposed Dual-PRNet
    is evaluated on two standard benchmarks for brain MRI registration, where it outperforms
    the state-of-the-art approaches by a large margin, e.g., having improvements over
    recent VoxelMorph [2] with 0.683->0.778 on the LPBA40, and 0.511->0.631 on the
    Mindboggle101, in term of average Dice score.'
- author: Boah Kim, Jieun Kim, June-Goo Lee, Dong Hwan Kim, Seong Ho Park, Jong Chul
    Ye
  title: Unsupervised Deformable Image Registration Using Cycle-Consistent CNN.
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/KimKLKPY19
  doi: 10.1007/978-3-030-32226-7_19
  ee: https://doi.org/10.1007/978-3-030-32226-7_19
  url: https://dblp.org/rec/conf/miccai/KimKLKPY19
  abstract: Medical image registration is one of the key processing steps for biomedical
    image analysis such as cancer diagnosis. Recently, deep learning based supervised
    and unsupervised image registration methods have been extensively studied due
    to its excellent performance in spite of ultra-fast computational time compared
    to the classical approaches. In this paper, we present a novel unsupervised medical
    image registration method that trains deep neural network for deformable registration
    of 3D volumes using a cycle-consistency. Thanks to the cycle consistency, the
    proposed deep neural networks can take diverse pair of image data with severe
    deformation for accurate registration. Experimental results using multiphase liver
    CT images demonstrate that our method provides very precise 3D image registration
    within a few seconds, resulting in more accurate cancer size estimation.
- author: Matthew C. H. Lee, Ozan Oktay, Andreas Schuh, Michiel Schaap, Ben Glocker
  title: Image-and-Spatial Transformer Networks for Structure-Guided Image Registration.
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/LeeOSSG19
  doi: 10.1007/978-3-030-32245-8_38
  ee: https://doi.org/10.1007/978-3-030-32245-8_38
  url: https://dblp.org/rec/conf/miccai/LeeOSSG19
  abstract: Image registration with deep neural networks has become an active field
    of research and exciting avenue for a long standing problem in medical imaging.
    The goal is to learn a complex function that maps the appearance of input image
    pairs to parameters of a spatial transformation in order to align corresponding
    anatomical structures. We argue and show that the current direct, non-iterative
    approaches are sub-optimal, in particular if we seek accurate alignment of Structures-of-Interest
    (SoI). Information about SoI is often available at training time, for example,
    in form of segmentations or landmarks. We introduce a novel, generic framework,
    Image-and-Spatial Transformer Networks (ISTNs), to leverage SoI information allowing
    us to learn new image representations that are optimised for the downstream registration
    task. Thanks to these representations we can employ a test-specific, iterative
    refinement over the transformation parameters which yields highly accurate registration
    even with very limited training data. Performance is demonstrated on pairwise
    3D brain registration and illustrative synthetic data.
