- author: Anurag Ranjan, Joel Janai, Andreas Geiger 0001, Michael J. Black
  title: Attacking Optical Flow.
  venue: ICCV
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/RanjanJGB19
  doi: 10.1109/ICCV.2019.00249
  ee: https://doi.org/10.1109/ICCV.2019.00249
  url: https://dblp.org/rec/conf/iccv/RanjanJGB19
  abstract: Deep neural nets achieve state-of-the-art performance on the problem of
    optical flow estimation. Since optical flow is used in several safety-critical
    applications like self-driving cars, it is important to gain insights into the
    robustness of those techniques. Recently, it has been shown that adversarial attacks
    easily fool deep neural networks to misclassify objects. The robustness of optical
    flow networks to adversarial attacks, however, has not been studied so far. In
    this paper, we extend adversarial patch attacks to optical flow networks and show
    that such attacks can compromise their performance. We show that corrupting a
    small patch of less than 1% of the image size can significantly affect optical
    flow estimates. Our attacks lead to noisy flow estimates that extend significantly
    beyond the region of the attack, in many cases even completely erasing the motion
    of objects in the scene. While networks using an encoder-decoder architecture
    are very sensitive to these attacks, we found that networks using a spatial pyramid
    architecture are less affected. We analyse the success and failure of attacking
    both architectures by visualizing their feature maps and comparing them to classical
    optical flow techniques which are robust to these attacks. We also demonstrate
    that such attacks are practical by placing a printed pattern into real scenes.
  related_code: ''
- author: Jingchun Cheng, Yi-Hsuan Tsai, Shengjin Wang, Ming-Hsuan Yang 0001
  title: 'SegFlow: Joint Learning for Video Object Segmentation and Optical Flow.'
  venue: ICCV
  year: '2017'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ChengTW017
  doi: 10.1109/ICCV.2017.81
  ee: https://doi.org/10.1109/ICCV.2017.81
  url: https://dblp.org/rec/conf/iccv/ChengTW017
  abstract: This paper proposes an end-to-end trainable network, SegFlow, for simultaneously
    predicting pixel-wise object segmentation and optical flow in videos. The proposed
    SegFlow has two branches where useful information of object segmentation and optical
    flow is propagated bidirectionally in a unified framework. The segmentation branch
    is based on a fully convolutional network, which has been proved effective in
    image segmentation task, and the optical flow branch takes advantage of the FlowNet
    model. The unified framework is trained iteratively offline to learn a generic
    notion, and fine-tuned online for specific objects. Extensive experiments on both
    the video object segmentation and optical flow datasets demonstrate that introducing
    optical flow improves the performance of segmentation and vice versa, against
    the state-of-the-art algorithms.
  related_code: ''
- author: Junhwa Hur, Stefan Roth 0001
  title: 'MirrorFlow: Exploiting Symmetries in Joint Optical Flow and Occlusion Estimation.'
  venue: ICCV
  year: '2017'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/Hur017
  doi: 10.1109/ICCV.2017.42
  ee: https://doi.org/10.1109/ICCV.2017.42
  url: https://dblp.org/rec/conf/iccv/Hur017
  abstract: Optical flow estimation is one of the most studied problems in computer
    vision, yet recent benchmark datasets continue to reveal problem areas of today’s
    approaches. Occlusions have remained one of the key challenges. In this paper,
    we propose a symmetric optical flow method to address the well-known chicken-and-egg
    relation between optical flow and occlusions. In contrast to many state-ofthe-
    art methods that consider occlusions as outliers, possibly filtered out during
    post-processing, we highlight the importance of joint occlusion reasoning in the
    optimization and show how to utilize occlusion as an important cue for estimating
    optical flow. The key feature of our model is to fully exploit the symmetry properties
    that characterize optical flow and occlusions in the two consecutive images. Specifically
    through utilizing forward-backward consistency and occlusion-disocclusion symmetry
    in the energy, our model jointly estimates optical flow in both forward and backward
    direction, as well as consistent occlusion maps in both views. We demonstrate
    significant performance benefits on standard benchmarks, especially from the occlusiondisocclusion
    symmetry. On the challenging KITTI dataset we report the most accurate two-frame
    results to date.
  related_code: ''
- author: Anne S. Wannenwetsch, Margret Keuper, Stefan Roth 0001
  title: 'ProbFlow: Joint Optical Flow and Uncertainty Estimation.'
  venue: ICCV
  year: '2017'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/WannenwetschK017
  doi: 10.1109/ICCV.2017.133
  ee: https://doi.org/10.1109/ICCV.2017.133
  url: https://dblp.org/rec/conf/iccv/WannenwetschK017
  abstract: Optical flow estimation remains challenging due to untextured areas, motion
    boundaries, occlusions, and more. Thus, the estimated flow is not equally reliable
    across the image. To that end, post-hoc confidence measures have been introduced
    to assess the per-pixel reliability of the flow. We overcome the artificial separation
    of optical flow and confidence estimation by introducing a method that jointly
    predicts optical flow and its underlying uncertainty. Starting from common energy-based
    formulations, we rely on the corresponding posterior distribution of the flow
    given the images. We derive a variational inference scheme based on mean field,
    which incorporates best practices from energy minimization. An uncertainty measure
    is obtained along the flow at every pixel as the (marginal) entropy of the variational
    distribution. We demonstrate the flexibility of our probabilistic approach by
    applying it to two different energies and on two benchmarks. We not only obtain
    flow results that are competitive with the underlying energy minimization approach,
    but also a reliable uncertainty measure that significantly outperforms existing
    post-hoc approaches.
  related_code: ''
- author: Jacob Walker, Abhinav Gupta 0001, Martial Hebert
  title: Dense Optical Flow Prediction from a Static Image.
  venue: ICCV
  year: '2015'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/WalkerGH15
  doi: 10.1109/ICCV.2015.281
  ee: https://doi.org/10.1109/ICCV.2015.281
  url: https://dblp.org/rec/conf/iccv/WalkerGH15
  abstract: Given a scene, what is going to move, and in what direction will it move?
    Such a question could be considered a non-semantic form of action prediction.
    In this work, we present a convolutional neural network (CNN) based approach for
    motion prediction. Given a static image, this CNN predicts the future motion of
    each and every pixel in the image in terms of optical flow. Our CNN model leverages
    the data in tens of thousands of realistic videos to train our model. Our method
    relies on absolutely no human labeling and is able to predict motion based on
    the context of the scene. Because our CNN model makes no assumptions about the
    underlying scene, it can predict future optical flow on a diverse set of scenarios.
    We outperform all previous approaches by large margins.
