- author: Stefan Klein 0001, Josien P. W. Pluim, Marius Staring, Max A. Viergever
  title: Adaptive Stochastic Gradient Descent Optimisation for Image Registration.
  venue: Int. J. Comput. Vis.
  year: '2009'
  type: Journal Articles
  access: closed
  key: journals/ijcv/KleinPSV09
  doi: 10.1007/S11263-008-0168-Y
  ee: https://doi.org/10.1007/s11263-008-0168-y
  url: https://dblp.org/rec/journals/ijcv/KleinPSV09
  abstract: We present a stochastic gradient descent optimisation method for image
    registration with adaptive step size prediction. The method is based on the theoretical
    work by Plakhov and Cruz (J. Math. Sci. 120(1):964–973, 2004). Our main methodological
    contribution is the derivation of an image-driven mechanism to select proper values
    for the most important free parameters of the method. The selection mechanism
    employs general characteristics of the cost functions that commonly occur in intensity-based
    image registration. Also, the theoretical convergence conditions of the optimisation
    method are taken into account. The proposed adaptive stochastic gradient descent
    (ASGD) method is compared to a standard, non-adaptive Robbins-Monro (RM) algorithm.
    Both ASGD and RM employ a stochastic subsampling technique to accelerate the optimisation
    process. Registration experiments were performed on 3D CT and MR data of the head,
    lungs, and prostate, using various similarity measures and transformation models.
    The results indicate that ASGD is robust to these variations in the registration
    framework and is less sensitive to the settings of the user-defined parameters
    than RM. The main disadvantage of RM is the need for a predetermined step size
    function. The ASGD method provides a solution for that issue.
