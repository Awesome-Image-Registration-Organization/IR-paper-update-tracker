  abstract: We study the relation between the correlation-based target functions of
    low-resolution and high-resolution intensity-based registration for the class
    of rigid transformations. Our results show that low-resolution target values can
    tightly bound the high-resolution target function in natural images. This can
    help with analyzing and better understanding the process of multiresolution image
    registration. It also gives a guideline for designing multiresolution algorithms
    in which the search space in higher resolution registration is restricted given
    the fitness values for lower resolution image pairs. To demonstrate this, we incorporate
    our multiresolution technique into a Lipschitz global optimization framework.
    We show that using the multiresolution scheme can result in large gains in the
