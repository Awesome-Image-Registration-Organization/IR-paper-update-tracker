- author: Shiyan Chen, Zhaofei Yu, Tiejun Huang 0001
  title: Self-Supervised Joint Dynamic Scene Reconstruction and Optical Flow Estimation
    for Spiking Camera.
  venue: AAAI
  year: '2023'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ChenY023
  doi: 10.1609/AAAI.V37I1.25108
  ee: https://doi.org/10.1609/aaai.v37i1.25108
  url: https://dblp.org/rec/conf/aaai/ChenY023
  abstract: Spiking camera, a novel retina-inspired vision sensor, has shown its great
    potential for capturing high-speed dynamic scenes with a sampling rate of 40,000
    Hz. The spiking camera abandons the concept of exposure window, with each of its
    photosensitive units continuously capturing photons and firing spikes asynchronously.
    However, the special sampling mechanism prevents the frame-based algorithm from
    being used to spiking camera. It remains to be a challenge to reconstruct dynamic
    scenes and perform common computer vision tasks for spiking camera. In this paper,
    we propose a self-supervised joint learning framework for optical flow estimation
    and reconstruction of spiking camera. The framework reconstructs clean frame-based
    spiking representations in a self-supervised manner, and then uses them to train
    the optical flow networks. We also propose an optical flow based inverse rendering
    process to achieve self-supervision by minimizing the difference with respect
    to the original spiking temporal aggregation image. The experimental results demonstrate
    that our method bridges the gap between synthetic and real-world scenes and achieves
    desired results in real-world scenarios. To the best of our knowledge, this is
    the first attempt to jointly reconstruct dynamic scenes and estimate optical flow
    for spiking camera from a self-supervised learning perspective.
  related_code: ''
- author: Gangwei Xu, Haotong Lin, Zhaoxing Zhang, Hongcheng Luo, Haiyang Sun, Xin
    Yang 0008
  title: 'BAT: Learning Event-based Optical Flow with Bidirectional Adaptive Temporal
    Correlation.'
  venue: AAAI
  year: '2026'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/XuLZLSY26
  doi: 10.1609/AAAI.V40I13.38100
  ee: https://doi.org/10.1609/aaai.v40i13.38100
  url: https://dblp.org/rec/conf/aaai/XuLZLSY26
  abstract: 'Event cameras deliver visual information characterized by a high dynamic
    range and high temporal resolution, offering significant advantages in estimating
    optical flow for complex lighting conditions and fast-moving objects. Current
    advanced optical flow methods for event cameras largely adopt established image-based
    frameworks. However, the spatial sparsity of event data limits their performance.
    In this paper, we present BAT, an innovative framework that estimates event-based
    optical flow using bidirectional adaptive temporal correlation. BAT includes three
    novel designs: 1) a bidirectional temporal correlation that transforms bidirectional
    temporally dense motion cues into spatially dense ones, enabling accurate and
    spatially dense optical flow estimation; 2) an adaptive temporal sampling strategy
    for maintaining temporal consistency in correlation; 3) spatially adaptive temporal
    motion aggregation to efficiently and adaptively aggregate consistent target motion
    features into adjacent motion features while suppressing inconsistent ones. Our
    BAT achieves state-of-the-art performance on the DSEC-Flow benchmark, outperforming
    existing methods by a large margin while also exhibiting sharp edges and high-quality
    details. Our BAT can accurately predict future optical flow using only past events,
    significantly outperforming E-RAFT’s warm-start approach.'
