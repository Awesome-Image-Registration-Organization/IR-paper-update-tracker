- author: Jun Yu 0001, Zhongpeng Cai, Shenshen Du, Xiaxin Shen, Lei Wang 0203, Fang
    Gao 0001
  title: Efficient Micro-Expression Spotting Based on Main Directional Mean Optical
    Flow Feature.
  venue: ACM Multimedia
