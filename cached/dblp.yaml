- author: Chaokang Jiang, Dalong Du, Jiuming Liu, Siting Zhu 0001, Zhenqiang Liu,
    Zhuang Ma, Zhujin Liang, Jie Zhou 0001
  title: 'NeuroGauss4D-PCI: 4D Neural Fields and Gaussian Deformation Fields for Point
    Cloud Interpolation.'
  venue: NeurIPS
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/JiangDLZLML024
  doi: 10.52202/079017-2979
  ee: http://papers.nips.cc/paper_files/paper/2024/hash/aa9508b2577e0d9c824da9e2e27fe9d6-Abstract-Conference.html
  url: https://dblp.org/rec/conf/nips/JiangDLZLML024
  abstract: Point Cloud Interpolation confronts challenges from point sparsity, complex
    spatiotemporal dynamics, and the difficulty of deriving complete 3D point clouds
    from sparse temporal information. This paper presents NeuroGauss4D-PCI, which
    excels at modeling complex non-rigid deformations across varied dynamic scenes.
    The method begins with an iterative Gaussian cloud soft clustering module, offering
    structured temporal point cloud representations. The proposed temporal radial
    basis function Gaussian residual utilizes Gaussian parameter interpolation over
    time, enabling smooth parameter transitions and capturing temporal residuals of
    Gaussian distributions. Additionally, a 4D Gaussian deformation field tracks the
    evolution of these parameters, creating continuous spatiotemporal deformation
    fields. A 4D neural field transforms low-dimensional spatiotemporal coordinates
    ($x,y,z,t$) into a high-dimensional latent space. Finally, we adaptively and efficiently
    fuse the latent features from neural fields and the geometric features from Gaussian
    deformation fields. NeuroGauss4D-PCI outperforms existing methods in point cloud
    frame interpolation, delivering leading performance on both object-level (DHB)
    and large-scale autonomous driving datasets (NL-Drive), with scalability to auto-labeling
    and point cloud densification tasks. The source code is released at https://github.com/jiangchaokang/NeuroGauss4D-PCI.
  related_code: https://github.com/jiangchaokang/NeuroGauss4D-PCI
- author: Navami Kairanda, Marc Habermann, Christian Theobalt, Vladislav Golyanik
  title: 'NeuralClothSim: Neural Deformation Fields Meet the Thin Shell Theory.'
  venue: NeurIPS
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/KairandaHTG24
  doi: 10.52202/079017-3509
  ee: http://papers.nips.cc/paper_files/paper/2024/hash/c7649eeb93d2fad0ced9a3b974260710-Abstract-Conference.html
  url: https://dblp.org/rec/conf/nips/KairandaHTG24
  abstract: 'Despite existing 3D cloth simulators producing realistic results, they
    predominantly operate on discrete surface representations (e.g. points and meshes)
    with a fixed spatial resolution, which often leads to large memory consumption
    and resolution-dependent simulations. Moreover, back-propagating gradients through
    the existing solvers is difficult, and they cannot be easily integrated into modern
    neural architectures. In response, this paper re-thinks physically plausible cloth
    simulation: We propose NeuralClothSim, i.e., a new quasistatic cloth simulator
    using thin shells, in which surface deformation is encoded in neural network weights
    in the form of a neural field. Our memory-efficient solver operates on a new continuous
    coordinate-based surface representation called neural deformation fields (NDFs);
    it supervises NDF equilibria with the laws of the non-linear Kirchhoff-Love shell
    theory with a non-linear anisotropic material model. NDFs are adaptive: They 1)
    allocate their capacity to the deformation details and 2) allow surface state
    queries at arbitrary spatial resolutions without re-training. We show how to train
    NeuralClothSim while imposing hard boundary conditions and demonstrate multiple
    applications, such as material interpolation and simulation editing. The experimental
    results highlight the effectiveness of our continuous neural formulation. See
    our project page: https://4dqv.mpi-inf.mpg.de/NeuralClothSim/.'
  related_code: ''
- author: Yicong Peng, Yichao Yan, Shengqi Liu, Yuhao Cheng, Shanyan Guan, Bowen Pan,
    Guangtao Zhai, Xiaokang Yang 0001
  title: 'CageNeRF: Cage-based Neural Radiance Field for Generalized 3D Deformation
    and Animation.'
  venue: NeurIPS
  year: '2022'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/PengYLCGPZY22
  doi: 10.52202/068431-2277
  ee: http://papers.nips.cc/paper_files/paper/2022/hash/cb78e6b5246b03e0b82b4acc8b11cc21-Abstract-Conference.html
  url: https://dblp.org/rec/conf/nips/PengYLCGPZY22
  abstract: While implicit representations have achieved high-fidelity results in
    3D rendering, it remains challenging to deforming and animating the implicit field.
    Existing works typically leverage data-dependent models as deformation priors,
    such as SMPL for human body animation. However, this dependency on category-specific
    priors limits them to generalize to other objects. To solve this problem, we propose
    a novel framework for deforming and animating the neural radiance field learned
    on arbitrary objects. The key insight is that we introduce a cage-based representation
    as deformation prior, which is category-agnostic. Specifically, the deformation
    is performed based on an enclosing polygon mesh with sparsely defined vertices
    called cage inside the rendering space, where each point is projected into a novel
    position based on the barycentric interpolation of the deformed cage vertices.
    In this way, we transform the cage into a generalized constraint, which is able
    to deform and animate arbitrary target objects while preserving geometry details.
    Based on extensive experiments, we demonstrate the effectiveness of our framework
    in the task of geometry editing, object animation and deformation transfer. The
    code and supplementary materials are available at https://pengyicong.github.io/CageNeRF/.
  related_code: ''
- author: Ramana Sundararaman, Riccardo Marin, Emanuele Rodolà, Maks Ovsjanikov
  title: Reduced Representation of Deformation Fields for Effective Non-rigid Shape
    Matching.
  venue: NeurIPS
  year: '2022'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/SundararamanMRO22
  doi: 10.52202/068431-0756
  ee: http://papers.nips.cc/paper_files/paper/2022/hash/43d1d3bdd92204c96fa4ac3c578f6a33-Abstract-Conference.html
  url: https://dblp.org/rec/conf/nips/SundararamanMRO22
  abstract: 'In this work we present a novel approach for computing correspondences
    between non-rigid objects, by exploiting a reduced representation of deformation
    fields. Different from existing works that represent deformation fields by training
    a general-purpose neural network, we advocate for an approximation based on mesh-free
    methods. By letting the network learn deformation parameters at a sparse set of
    positions in space (nodes), we reconstruct the continuous deformation field in
    a closed-form with guaranteed smoothness. With this reduction in degrees of freedom,
    we show significant improvement in terms of data-efficiency thus enabling limited
    supervision. Furthermore, our approximation provides direct access to first-order
    derivatives of deformation fields, which facilitates enforcing desirable regularization
    effectively. Our resulting model has high expressive power and is able to capture
    complex deformations. We illustrate its effectiveness through state-of-the-art
    results across multiple deformable shape matching benchmarks. Our code and data
    are publicly available at: https://github.com/Sentient07/DeformationBasis.'
  related_code: https://github.com/Sentient07/DeformationBasis
