  title: Cross contrast multi-channel image registration using image synthesis for
    MR brain images.
  venue: Medical Image Anal.
  year: '2017'
  type: Journal Articles
  access: closed
  key: journals/mia/ChenCJLRP17
  doi: 10.1016/J.MEDIA.2016.10.005
  ee: https://doi.org/10.1016/j.media.2016.10.005
  url: https://dblp.org/rec/journals/mia/ChenCJLRP17
  abstract: HIGHLIGHTSWe present a new approach for registering images with different
    modalities.Image synthesis is used to generate the missing modalities in a two‐channel
    registration framework.Enables the use of mono‐modal similarity measures with
    existing multi‐channel algorithms.Validated using deformation recovery, boundary
    alignment, and label transfer experiments.Produced significant improvements over
    single channel counterparts using mutual information. ABSTRACT Multi‐modal deformable
    registration is important for many medical image analysis tasks such as atlas
    alignment, image fusion, and distortion correction. Whereas a conventional method
    would register images with different modalities using modality independent features
    or information theoretic metrics such as mutual information, this paper presents
    a new framework that addresses the problem using a two‐channel registration algorithm
    capable of using mono‐modal similarity measures such as sum of squared differences
    or cross‐correlation. To make it possible to use these same‐modality measures,
    image synthesis is used to create proxy images for the opposite modality as well
    as intensity‐normalized images from each of the two available images. The new
    deformable registration framework was evaluated by performing intra‐subject deformation
    recovery, intra‐subject boundary alignment, and inter‐subject label transfer experiments
    using multi‐contrast magnetic resonance brain imaging data. Three different multi‐channel
    registration algorithms were evaluated, revealing that the framework is robust
    to the multi‐channel deformable registration algorithm that is used. With a single
    exception, all results demonstrated improvements when compared against single
    channel registrations using the same algorithm with mutual information.
