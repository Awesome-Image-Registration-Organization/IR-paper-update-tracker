  abstract: We present a novel method for the geometric alignment of autoradiographs
    of the brain. The method is based on finding the spatial mapping and the one-to-one
    correspondences (or homologies) between point features extracted from the images
    and rejecting non-homologies as outliers. In this way, we attempt to account for
    the local, natural and artifactual differences between the autoradiograph slices.
    We have used the resulting automated algorithm on a set of left prefrontal cortex
    autoradiograph slices, specifically demonstrated its ability to perform point
    outlier rejection, validated its robustness property using synthetically generated
    spatial mappings and provided an anecdotal visual comparison with the well-known
    iterated closest-point (ICP) algorithm. Visualization of a stack of aligned left
    prefrontal cortex autoradiograph slices is also provided.
