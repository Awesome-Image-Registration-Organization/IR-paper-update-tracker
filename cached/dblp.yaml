- author: Tinglin Huang 0001, Tianyu Liu 0005, Mehrtash Babadi, Wengong Jin, Rex Ying
  title: Scalable Generation of Spatial Transcriptomics from Histology Images via
    Whole-Slide Flow Matching.
  venue: ICML
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/icml/0001LBJY25
  doi: 10.48550/arXiv.2506.05361
  ee: https://proceedings.mlr.press/v267/huang25t.html
  url: https://dblp.org/rec/conf/icml/0001LBJY25
  abstract: Spatial transcriptomics (ST) has emerged as a powerful technology for
    bridging histology imaging with gene expression profiling. However, its application
    has been limited by low throughput and the need for specialized experimental facilities.
    Prior works sought to predict ST from whole-slide histology images to accelerate
    this process, but they suffer from two major limitations. First, they do not explicitly
    model cell-cell interaction as they factorize the joint distribution of whole-slide
    ST data and predict the gene expression of each spot independently. Second, their
    encoders struggle with memory constraints due to the large number of spots (often
    exceeding 10,000) in typical ST datasets. Herein, we propose STFlow, a flow matching
    generative model that considers cell-cell interaction by modeling the joint distribution
    of gene expression of an entire slide. It also employs an efficient slide-level
    encoder with local spatial attention, enabling whole-slide processing without
    excessive memory overhead. On the recently curated HEST-1k and STImage-1K4M benchmarks,
    STFlow substantially outperforms state-of-the-art baselines and achieves over
    18% relative improvements over the pathology foundation models.
  related_code: ''
- author: Sucheng Ren, Qihang Yu, Ju He, Xiaohui Shen, Alan L. Yuille, Liang-Chieh
    Chen
  title: 'FlowAR: Scale-wise Autoregressive Image Generation Meets Flow Matching.'
  venue: ICML
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/icml/RenYHSYC25
  doi: 10.48550/arXiv.2412.15205
  ee: https://proceedings.mlr.press/v267/ren25e.html
  url: https://dblp.org/rec/conf/icml/RenYHSYC25
  abstract: 'Autoregressive (AR) modeling has achieved remarkable success in natural
    language processing by enabling models to generate text with coherence and contextual
    understanding through next token prediction. Recently, in image generation, VAR
    proposes scale-wise autoregressive modeling, which extends the next token prediction
    to the next scale prediction, preserving the 2D structure of images. However,
    VAR encounters two primary challenges: (1) its complex and rigid scale design
    limits generalization in next scale prediction, and (2) the generator''s dependence
    on a discrete tokenizer with the same complex scale structure restricts modularity
    and flexibility in updating the tokenizer. To address these limitations, we introduce
    FlowAR, a general next scale prediction method featuring a streamlined scale design,
    where each subsequent scale is simply double the previous one. This eliminates
    the need for VAR''s intricate multi-scale residual tokenizer and enables the use
    of any off-the-shelf Variational AutoEncoder (VAE). Our simplified design enhances
    generalization in next scale prediction and facilitates the integration of Flow
    Matching for high-quality image synthesis. We validate the effectiveness of FlowAR
    on the challenging ImageNet-256 benchmark, demonstrating superior generation performance
    compared to previous methods. Codes will be available at \url{https://github.com/OliverRensu/FlowAR}.'
  related_code: https://github.com/OliverRensu/FlowAR
