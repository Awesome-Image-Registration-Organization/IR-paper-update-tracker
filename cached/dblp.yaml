- author: Chuanpu Li, Zeli Chen, Yiwen Zhang, Liming Zhong, Wei Yang 0006
  title: Boosting Medical Image Synthesis via Registration-Guided Consistency and
    Disentanglement Learning.
  venue: MICCAI
