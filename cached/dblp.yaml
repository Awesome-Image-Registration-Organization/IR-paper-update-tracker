  title: A hybrid patient-specific biomechanical model based image registration method
    for the motion estimation of lungs.
  venue: Medical Image Anal.
  year: '2017'
  type: Journal Articles
  access: closed
  key: journals/mia/HanDMHHB17
  doi: 10.1016/J.MEDIA.2017.04.003
  ee: https://doi.org/10.1016/j.media.2017.04.003
  url: https://dblp.org/rec/journals/mia/HanDMHHB17
  abstract: HighlightsA hybrid image registration approach for lung motion estimation
    is proposed.Biomechanical models estimate lung motion with compensation from image
    registration.The method allows more accurate motion estimations on lung surface
    regions.Displacement compensation analysis can help optimising biomechanical models.
    Graphical abstract Figure. No Caption available. ABSTRACT This paper presents
    a new hybrid biomechanical model‐based non‐rigid image registration method for
    lung motion estimation. In the proposed method, a patient‐specific biomechanical
    modelling process captures major physically realistic deformations with explicit
    physical modelling of sliding motion, whilst a subsequent non‐rigid image registration
    process compensates for small residuals. The proposed algorithm was evaluated
    with 10 4D CT datasets of lung cancer patients. The target registration error
    (TRE), defined as the Euclidean distance of landmark pairs, was significantly
    lower with the proposed method (TRE = 1.37 mm) than with biomechanical modelling
    (TRE = 3.81 mm) and intensity‐based image registration without specific considerations
    for sliding motion (TRE = 4.57 mm). The proposed method achieved a comparable
    accuracy as several recently developed intensity‐based registration algorithms
    with sliding handling on the same datasets. A detailed comparison on the distributions
    of TREs with three non‐rigid intensity‐based algorithms showed that the proposed
    method performed especially well on estimating the displacement field of lung
    surface regions (mean TRE = 1.33 mm, maximum TRE = 5.3 mm). The effects of biomechanical
    model parameters (such as Poisson’s ratio, friction and tissue heterogeneity)
    on displacement estimation were investigated. The potential of the algorithm in
    optimising biomechanical models of lungs through analysing the pattern of displacement
    compensation from the image registration process has also been demonstrated.
- author: Rui Hua, Jose M. Pozo, Zeike A. Taylor, Alejandro F. Frangi
