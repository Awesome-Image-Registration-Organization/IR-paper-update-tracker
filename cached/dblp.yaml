- author: Zi Li, Lin Tian 0001, Tony C. W. Mok, Xiaoyu Bai, Puyang Wang, Jia Ge, Jingren
    Zhou 0001, Le Lu 0001, Xianghua Ye, Ke Yan 0006, Dakai Jin
  title: 'SAMConvex: Fast Discrete Optimization for CT Registration Using Self-supervised
    Anatomical Embedding and Correlation Pyramid.'
  venue: MICCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/LiTMBWGZLYYJ23
  doi: 10.1007/978-3-031-43999-5_53
  ee: https://doi.org/10.1007/978-3-031-43999-5_53
  url: https://dblp.org/rec/conf/miccai/LiTMBWGZLYYJ23
  abstract: Estimating displacement vector field via a cost volume computed in the
    feature space has shown great success in image registration, but it suffers excessive
    computation burdens. Moreover, existing feature descriptors only extract local
    features incapable of representing the global semantic information, which is especially
    important for solving large transformations. To address the discussed issues,
    we propose SAMConvex, a fast coarse-to-fine discrete optimization method for CT
    registration that includes a decoupled convex optimization procedure to obtain
    deformation fields based on a self-supervised anatomical embedding (SAM) feature
    extractor that captures both local and global information. To be specific, SAMConvex
    extracts per-voxel features and builds 6D correlation volumes based on SAM features,
    and iteratively updates a flow field by performing lookups on the correlation
    volumes with a coarse-to-fine scheme. SAMConvex outperforms the state-of-the-art
    learning-based methods and optimization-based methods over two inter-patient registration
    datasets (Abdomen CT and HeadNeck CT) and one intra-patient registration dataset
    (Lung CT). Moreover, as an optimization-based method, SAMConvex only takes $\sim2$s
    ($\sim5s$ with instance optimization) for one paired images.
- author: Yang Liu, Shi Gu
  title: Co-learning Semantic-Aware Unsupervised Segmentation for Pathological Image
    Registration.
  venue: MICCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/LiuG23
  doi: 10.1007/978-3-031-43999-5_51
  ee: https://doi.org/10.1007/978-3-031-43999-5_51
  url: https://dblp.org/rec/conf/miccai/LiuG23
  abstract: The registration of pathological images plays an important role in medical
    applications. Despite its significance, most researchers in this field primarily
    focus on the registration of normal tissue into normal tissue. The negative impact
    of focal tissue, such as the loss of spatial correspondence information and the
    abnormal distortion of tissue, are rarely considered. In this paper, we propose
    GIRNet, a novel unsupervised approach for pathological image registration by incorporating
    segmentation and inpainting through the principles of Generation, Inpainting,
    and Registration (GIR). The registration, segmentation, and inpainting modules
    are trained simultaneously in a co-learning manner so that the segmentation of
    the focal area and the registration of inpainted pairs can improve collaboratively.
    Overall, the registration of pathological images is achieved in a completely unsupervised
    learning framework. Experimental results on multiple datasets, including Magnetic
    Resonance Imaging (MRI) of T1 sequences, demonstrate the efficacy of our proposed
    method. Our results show that our method can accurately achieve the registration
    of pathological images and identify lesions even in challenging imaging modalities.
    Our unsupervised approach offers a promising solution for the efficient and cost-effective
    registration of pathological images. Our code is available at https://github.com/brain-intelligence-lab/GIRNet.
