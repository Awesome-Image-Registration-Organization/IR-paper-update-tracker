- author: Jimmy Addison Lee, Peng Liu 0049, Jun Cheng 0003, Huazhu Fu
  title: A Deep Step Pattern Representation for Multimodal Retinal Image Registration.
  venue: ICCV
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LeeL0F19
  doi: 10.1109/ICCV.2019.00518
  ee: https://doi.org/10.1109/ICCV.2019.00518
  url: https://dblp.org/rec/conf/iccv/LeeL0F19
  abstract: This paper presents a novel feature-based method that is built upon a
    convolutional neural network (CNN) to learn the deep representation for multimodal
    retinal image registration. We coined the algorithm deep step patterns, in short
    DeepSPa. Most existing deep learning based methods require a set of manually labeled
    training data with known corresponding spatial transformations, which limits the
    size of training datasets. By contrast, our method is fully automatic and scale
    well to different image modalities with no human intervention. We generate feature
    classes from simple step patterns within patches of connecting edges formed by
    vascular junctions in multiple retinal imaging modalities. We leverage CNN to
    learn and optimize the input patches to be used for image registration. Spatial
    transformations are estimated based on the output possibility of the fully connected
    layer of CNN for a pair of images. One of the key advantages of the proposed algorithm
    is its robustness to non-linear intensity changes, which widely exist on retinal
    images due to the difference of acquisition modalities. We validate our algorithm
    on extensive challenging datasets comprising poor quality multimodal retinal images
    which are adversely affected by pathologies (diseases), speckle noise and low
    resolutions. The experimental results demonstrate the robustness and accuracy
    over state-of-the-art multimodal image registration algorithms.
  related_code: ''
- author: Weixin Lu, Guowei Wan, Yao Zhou, Xiangyu Fu, Pengfei Yuan, Shiyu Song
  title: 'DeepVCP: An End-to-End Deep Neural Network for Point Cloud Registration.'
  venue: ICCV
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LuWZFYS19
  doi: 10.1109/ICCV.2019.00010
  ee: https://doi.org/10.1109/ICCV.2019.00010
  url: https://dblp.org/rec/conf/iccv/LuWZFYS19
  abstract: We present DeepVCP - a novel end-to-end learning-based 3D point cloud
    registration framework that achieves comparable registration accuracy to prior
    state-of-the-art geometric methods. Different from other keypoint based methods
    where a RANSAC procedure is usually needed, we implement the use of various deep
    neural network structures to establish an end-to-end trainable network. Our keypoint
    detector is trained through this end-to-end structure and enables the system to
    avoid the interference of dynamic objects, leverages the help of sufficiently
    salient features on stationary objects, and as a result, achieves high robustness.
    Rather than searching the corresponding points among existing points, the key
    contribution is that we innovatively generate them based on learned matching probabilities
    among a group of candidates, which can boost the registration accuracy. We comprehensively
    validate the effectiveness of our approach using both the KITTI dataset and the
    Apollo-SouthBay dataset. Results demonstrate that our method achieves comparable
    registration accuracy and runtime efficiency to the state-of-the-art geometry-based
    methods, but with higher robustness to inaccurate initial poses. Detailed ablation
    and visualization analysis are included to further illustrate the behavior and
    insights of our network. The low registration error and high robustness of our
    method make it attractive to the substantial applications relying on the point
    cloud registration task.
