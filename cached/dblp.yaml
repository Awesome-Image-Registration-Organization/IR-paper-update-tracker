  title: Anatomically Constrained Video-CT Registration via the V-IMLOP Algorithm.
  venue: MICCAI
  year: '2016'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/BillingsSRLIHT16
  doi: 10.1007/978-3-319-46726-9_16
  ee: https://doi.org/10.1007/978-3-319-46726-9_16
