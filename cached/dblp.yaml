- author: Shangkun Sun, Jiaming Liu, Huaxia Li, Guoqing Liu, Thomas H. Li, Wei Gao
    0003
  title: 'StreamFlow: Streamlined Multi-Frame Optical Flow Estimation for Video Sequences.'
  venue: NeurIPS
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/SunLLLL024
  doi: 10.52202/079017-0292
  ee: http://papers.nips.cc/paper_files/paper/2024/hash/116a952bc0a8cb03113408c1a215be7c-Abstract-Conference.html
  url: https://dblp.org/rec/conf/nips/SunLLLL024
  abstract: Occlusions between consecutive frames have long posed a significant challenge
    in optical flow estimation. The inherent ambiguity introduced by occlusions directly
    violates the brightness constancy constraint and considerably hinders pixel-to-pixel
    matching. To address this issue, multi-frame optical flow methods leverage adjacent
    frames to mitigate the local ambiguity. Nevertheless, prior multi-frame methods
    predominantly adopt recursive flow estimation, resulting in a considerable computational
    overlap. In contrast, we propose a streamlined in-batch framework that eliminates
    the need for extensive redundant recursive computations while concurrently developing
    effective spatio-temporal modeling approaches under in-batch estimation constraints.
    Specifically, we present a Streamlined In-batch Multi-frame (SIM) pipeline tailored
    to video input, attaining a similar level of time efficiency to two-frame networks.
    Furthermore, we introduce an efficient Integrative Spatio-temporal Coherence (ISC)
    modeling method for effective spatio-temporal modeling during the encoding phase,
    which introduces no additional parameter overhead. Additionally, we devise a Global
    Temporal Regressor (GTR) that effectively explores temporal relations during decoding.
    Benefiting from the efficient SIM pipeline and effective modules, StreamFlow not
    only excels in terms of performance on the challenging KITTI and Sintel datasets,
    with particular improvement in occluded areas but also attains a remarkable $63.82\%$
    enhancement in speed compared with previous multi-frame methods. The code will
    be available soon at https://github.com/littlespray/StreamFlow.
  related_code: https://github.com/littlespray/StreamFlow
- author: Jianqin Luo, Zhexiong Wan, Yuxin Mao, Bo Li 0090, Yuchao Dai
  title: Continuous Parametric Optical Flow.
  venue: NeurIPS
  year: '2023'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/LuoWMLD23
  doi: 10.52202/075280-1020
  ee: http://papers.nips.cc/paper_files/paper/2023/hash/49f42aafbcce59b2665640cb9f3d794f-Abstract-Conference.html
  url: https://dblp.org/rec/conf/nips/LuoWMLD23
  abstract: In this paper, we present continuous parametric optical flow , a parametric
    representation of dense and continuous motion over arbitrary time interval . In
    contrast to existing discrete-time representations ( i.e. flow in between consecutive
    frames), this new representation transforms the frame-to-frame pixel correspondences
    to dense continuous flow. In particular, we present a temporal-parametric model
    that employs B-splines to fit point trajectories using a limited number of frames.
    To further improve the stability and robustness of the trajectories, we also add
    an encoder with a neural ordinary differential equation (NODE) to represent features
    associated with specific times. We also contribute a synthetic dataset and introduce
    two evaluation perspectives to measure the accuracy and robustness of continuous
    flow estimation. Benefiting from the combination of explicit parametric modeling
    and implicit feature optimization, our model focuses on motion continuity and
    outperforms the flow-based and point-tracking approaches for fitting long-term
    and variable sequences.
  related_code: ''
- author: Zhaoying Pan, Daniel Geng, Andrew Owens
  title: Self-Supervised Motion Magnification by Backpropagating Through Optical Flow.
  venue: NeurIPS
  year: '2023'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/PanGO23
  doi: 10.52202/075280-0013
  ee: http://papers.nips.cc/paper_files/paper/2023/hash/00ed9ab006311be67879ecef8f80d7c5-Abstract-Conference.html
  url: https://dblp.org/rec/conf/nips/PanGO23
  abstract: 'This paper presents a simple, self-supervised method for magnifying subtle
    motions in video: given an input video and a magnification factor, we manipulate
    the video such that its new optical flow is scaled by the desired amount. To train
    our model, we propose a loss function that estimates the optical flow of the generated
    video and penalizes how far if deviates from the given magnification factor. Thus,
    training involves differentiating through a pretrained optical flow network. Since
    our model is self-supervised, we can further improve its performance through test-time
    adaptation, by finetuning it on the input video. It can also be easily extended
    to magnify the motions of only user-selected objects. Our approach avoids the
    need for synthetic magnification datasets that have been used to train prior learning-based
    approaches. Instead, it leverages the existing capabilities of off-the-shelf motion
    estimators. We demonstrate the effectiveness of our method through evaluations
    of both visual quality and quantitative metrics on a range of real-world and synthetic
    videos, and we show our method works for both supervised and unsupervised optical
    flow methods.'
