  title: 'Equilibrated warping: Finite element image registration with finite strain
    equilibrium gap regularization.'
  venue: Medical Image Anal.
  year: '2018'
  type: Journal Articles
  access: closed
  key: journals/mia/GenetSDLK18
  doi: 10.1016/J.MEDIA.2018.07.007
  ee: https://doi.org/10.1016/j.media.2018.07.007
  url: https://dblp.org/rec/journals/mia/GenetSDLK18
  abstract: '&NA; In this paper, we propose a novel continuum finite strain formulation
    of the equilibrium gap regularization for image registration. The equilibrium
    gap regularization essentially penalizes any deviation from the solution of a
    hyperelastic body in equilibrium with arbitrary loads prescribed at the boundary.
    It thus represents a regularization with strong mechanical basis, especially suited
    for cardiac image analysis. We describe the consistent linearization and discretization
    of the regularized image registration problem, in the framework of the finite
    elements method. The method is implemented using FEniCS & VTK, and distributed
    as a freely available python library. We show that the equilibrated warping method
    is effective and robust: regularization strength and image noise have minimal
    impact on motion tracking, especially when compared to strain‐based regularization
    methods such as hyperelastic warping. We also show that equilibrated warping is
    able to extract main deformation features on both tagged and untagged cardiac
    magnetic resonance images.'
- author: Yipeng Hu, Marc Modat, Eli Gibson, Wenqi Li 0001, Nooshin Ghavami, Ester
    Bonmati, Guotai Wang, Steven Bandula, Caroline M. Moore, Mark Emberton, Sébastien
    Ourselin, J. Alison Noble, Dean C. Barratt, Tom Vercauteren
  title: Weakly-supervised convolutional neural networks for multimodal image registration.
  venue: Medical Image Anal.
  year: '2018'
  type: Journal Articles
  access: open
  key: journals/mia/HuMGLGBWBMEONBV18
  doi: 10.1016/J.MEDIA.2018.07.002
  ee: https://doi.org/10.1016/j.media.2018.07.002
  url: https://dblp.org/rec/journals/mia/HuMGLGBWBMEONBV18
  abstract: HighlightsA method to infer voxel‐level correspondence from higher‐level
    anatomical labels.Efficient and fully‐automated registration for MR and ultrasound
    prostate images.Validation experiments with 108 pairs of labelled interventional
    patient images.Open‐source implementation. ABSTRACT One of the fundamental challenges
    in supervised learning for multimodal image registration is the lack of ground‐truth
    for voxel‐level spatial correspondence. This work describes a method to infer
    voxel‐level transformation from higher‐level correspondence information contained
    in anatomical labels. We argue that such labels are more reliable and practical
    to obtain for reference sets of image pairs than voxel‐level correspondence. Typical
    anatomical labels of interest may include solid organs, vessels, ducts, structure
    boundaries and other subject‐specific ad hoc landmarks. The proposed end‐to‐end
    convolutional neural network approach aims to predict displacement fields to align
    multiple labelled corresponding structures for individual image pairs during the
    training, while only unlabelled image pairs are used as the network input for
    inference. We highlight the versatility of the proposed strategy, for training,
    utilising diverse types of anatomical labels, which need not to be identifiable
    over all training image pairs. At inference, the resulting 3D deformable image
    registration algorithm runs in real‐time and is fully‐automated without requiring
    any anatomical labels or initialisation. Several network architecture variants
    are compared for registering T2‐weighted magnetic resonance images and 3D transrectal
    ultrasound images from prostate cancer patients. A median target registration
    error of 3.6 mm on landmark centroids and a median Dice of 0.87 on prostate glands
    are achieved from cross‐validation experiments, in which 108 pairs of multimodal
    images from 76 patients were tested with high‐quality anatomical labels. Graphical
    abstract Figure. No caption available.
- author: Juan Eugenio Iglesias, Marc Modat, Loïc Peter, Allison Stevens, Roberto
    Annunziata, Tom Vercauteren, Ed S. Lein, Bruce Fischl, Sébastien Ourselin
  title: Joint registration and synthesis using a probabilistic model for alignment
    of MRI and histological sections.
  venue: Medical Image Anal.
  year: '2018'
  type: Journal Articles
  access: open
  key: journals/mia/IglesiasMPSAVLF18
  doi: 10.1016/J.MEDIA.2018.09.002
  ee: https://doi.org/10.1016/j.media.2018.09.002
  url: https://dblp.org/rec/journals/mia/IglesiasMPSAVLF18
  abstract: '&NA; Nonlinear registration of 2D histological sections with corresponding
    slices of MRI data is a critical step of 3D histology reconstruction algorithms.
    This registration is difficult due to the large differences in image contrast
    and resolution, as well as the complex nonrigid deformations and artefacts produced
    when sectioning the sample and mounting it on the glass slide. It has been shown
    in brain MRI registration that better spatial alignment across modalities can
    be obtained by synthesising one modality from the other and then using intra‐modality
    registration metrics, rather than by using information theory based metrics to
    solve the problem directly. However, such an approach typically requires a database
    of aligned images from the two modalities, which is very difficult to obtain for
    histology and MRI. Here, we overcome this limitation with a probabilistic method
    that simultaneously solves for deformable registration and synthesis directly
    on the target images, without requiring any training data. The method is based
    on a probabilistic model in which the MRI slice is assumed to be a contrast‐warped,
    spatially deformed version of the histological section. We use approximate Bayesian
    inference to iteratively refine the probabilistic estimate of the synthesis and
    the registration, while accounting for each other''s uncertainty. Moreover, manually
    placed landmarks can be seamlessly integrated in the framework for increased performance
    and robustness. Experiments on a synthetic dataset of MRI slices show that, compared
    with mutual information based registration, the proposed method makes it possible
    to use a much more flexible deformation model in the registration to improve its
    accuracy, without compromising robustness. Moreover, our framework also exploits
    information in manually placed landmarks more efficiently than mutual information:
    landmarks constrain the deformation field in both methods, but in our algorithm,
    it also has a positive effect on the synthesis – which further improves the registration.
    We also show results on two real, publicly available datasets: the Allen and BigBrain
    atlases. In both of them, the proposed method provides a clear improvement over
    mutual information based registration, both qualitatively (visual inspection)
    and quantitatively (registration error measured with pairs of manually annotated
    landmarks).'
