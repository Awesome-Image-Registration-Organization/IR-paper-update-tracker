- author: Wending Yan, Aashish Sharma, Robby T. Tan
  title: Optical Flow in Dense Foggy Scenes Using Semi-Supervised Learning.
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/YanST20
  doi: 10.1109/CVPR42600.2020.01327
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Yan_Optical_Flow_in_Dense_Foggy_Scenes_Using_Semi-Supervised_Learning_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/YanST20
  abstract: In dense foggy scenes, existing optical flow methods are erroneous. This
    is due to the degradation caused by dense fog particles that break the optical
    flow basic assumptions such as brightness and gradient constancy. To address the
    problem, we introduce a semi-supervised deep learning technique that employs real
    fog images without optical flow ground-truths in the training process. Our network
    integrates the domain transformation and optical flow networks in one framework.
    Initially, given a pair of synthetic fog images, its corresponding clean images
    and optical flow ground-truths, in one training batch we train our network in
    a supervised manner. Subsequently, given a pair of real fog images and a pair
    of clean images that are not corresponding to each other (unpaired), in the next
    training batch, we train our network in an unsupervised manner. We then alternate
    the training of synthetic and real data iteratively. We use real data without
    ground-truths, since to have ground-truths in such conditions is intractable,
    and also to avoid the overfitting problem of synthetic data training, where the
    knowledge learned on synthetic data cannot be generalized to real data testing.
    Together with the network architecture design, we propose a new training strategy
    that combines supervised synthetic-data training and unsupervised real-data training.
    Experimental results show that our method is effective and outperforms the state-of-the-art
    methods in estimating optical flow in dense foggy scenes.
  related_code: ''
- author: Jonas Wulff, Laura Sevilla-Lara, Michael J. Black
  title: Optical Flow in Mostly Rigid Scenes.
  venue: CVPR
  year: '2017'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/WulffSB17
  doi: 10.1109/CVPR.2017.731
  ee: https://doi.org/10.1109/CVPR.2017.731
  url: https://dblp.org/rec/conf/cvpr/WulffSB17
  abstract: The optical flow of natural scenes is a combination of the motion of the
    observer and the independent motion of objects. Existing algorithms typically
    focus on either recovering motion and structure under the assumption of a purely
    static world or optical flow for general unconstrained scenes. We combine these
    approaches in an optical flow algorithm that estimates an explicit segmentation
    of moving objects from appearance and physical constraints. In static regions
    we take advantage of strong constraints to jointly estimate the camera motion
    and the 3D structure of the scene over multiple frames. This allows us to also
    regularize the structure instead of the motion. Our formulation uses a Plane+Parallax
    framework, which works even under small baselines, and reduces the motion estimation
    to a one-dimensional search problem, resulting in more accurate estimation. In
    moving regions the flow is treated as unconstrained, and computed with an existing
    optical flow method. The resulting Mostly-Rigid Flow (MR-Flow) method achieves
    state-of-the-art results on both the MPI-Sintel and KITTI-2015 benchmarks.
