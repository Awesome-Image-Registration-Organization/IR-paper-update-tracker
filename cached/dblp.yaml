- author: Lin Ma, Zhengdong Lu, Lifeng Shang, Hang Li 0001
  title: Multimodal Convolutional Neural Networks for Matching Image and Sentence.
  venue: ICCV
  year: '2015'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/MaLSL15
  doi: 10.1109/ICCV.2015.301
  ee: https://doi.org/10.1109/ICCV.2015.301
  url: https://dblp.org/rec/conf/iccv/MaLSL15
  abstract: In this paper, we propose multimodal convolutional neural networks (m-CNNs)
    for matching image and sentence. Our m-CNN provides an end-to-end framework with
    convolutional architectures to exploit image representation, word composition,
    and the matching relations between the two modalities. More specifically, it consists
    of one image CNN encoding the image content and one matching CNN modeling the
    joint representation of image and sentence. The matching CNN composes different
    semantic fragments from words and learns the inter-modal relations between image
    and the composed fragments at different levels, thus fully exploit the matching
    relations between image and sentence. Experimental results demonstrate that the
    proposed m-CNNs can effectively capture the information necessary for image and
    sentence matching. More specifically, our proposed m-CNNs significantly outperform
    the state-of-the-art approaches for bidirectional image and sentence retrieval
    on the Flickr8K and Flickr30K datasets.
  related_code: ''
- author: Xiaowei Zhou 0001, Menglong Zhu, Kostas Daniilidis
  title: Multi-image Matching via Fast Alternating Minimization.
  venue: ICCV
  year: '2015'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ZhouZD15
  doi: 10.1109/ICCV.2015.459
  ee: https://doi.org/10.1109/ICCV.2015.459
  url: https://dblp.org/rec/conf/iccv/ZhouZD15
  abstract: In this paper we propose a global optimization-based approach to jointly
    matching a set of images. The estimated correspondences simultaneously maximize
    pairwise feature affinities and cycle consistency across multiple images. Unlike
    previous convex methods relying on semidefinite programming, we formulate the
    problem as a low-rank matrix recovery problem and show that the desired semidefiniteness
    of a solution can be spontaneously fulfilled. The low-rank formulation enables
    us to derive a fast alternating minimization algorithm in order to handle practical
    problems with thousands of features. Both simulation and real experiments demonstrate
    that the proposed algorithm can achieve a competitive performance with an order
    of magnitude speedup compared to the state-of-the-art algorithm. In the end, we
    demonstrate the applicability of the proposed method to match the images of different
    object instances and as a result the potential to reconstruct category-specific
    object models from those images.
