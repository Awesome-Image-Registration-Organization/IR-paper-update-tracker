- author: Wenmiao Hu, Yichen Zhang 0002, Yuxuan Liang 0002, Yifang Yin, Andrei Georgescu,
    An Tran, Hannes Kruppa, See-Kiong Ng, Roger Zimmermann
  title: 'Beyond Geo-localization: Fine-grained Orientation of Street-view Images
    by Cross-view Matching with Satellite Imagery.'
  venue: ACM Multimedia
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/HuZLYGTKNZ22
  doi: 10.1145/3503161.3548102
  ee: https://doi.org/10.1145/3503161.3548102
  url: https://dblp.org/rec/conf/mm/HuZLYGTKNZ22
  abstract: Street-view imagery provides us with novel experiences to explore different
    places remotely. Carefully calibrated street-view images (e.g., Google Street
    View) can be used for different downstream tasks, e.g., navigation, map features
    extraction. As personal high-quality cameras have become much more affordable
    and portable, an enormous amount of crowdsourced street-view images are uploaded
    to the internet, but commonly with missing or noisy sensor information. To prepare
    this hidden treasure for "ready-to-use" status, determining missing location information
    and camera orientation angles are two equally important tasks. Recent methods
    have achieved high performance on geo-localization of street-view images by cross-view
    matching with a pool of geo-referenced satellite imagery. However, most of the
    existing works focus more on geo-localization than estimating the image orientation.
    In this work, we re-state the importance of finding fine-grained orientation for
    street-view images, formally define the problem and provide a set of evaluation
    metrics to assess the quality of the orientation estimation. We propose two methods
    to improve the granularity of the orientation estimation, achieving 82.4% and
    72.3% accuracy for images with estimated angle errors below 2 degrees for CVUSA
    and CVACT datasets, corresponding to 34.9% and 28.2% absolute improvement compared
    to previous works. Integrating fine-grained orientation estimation in training
    also improves the performance on geo-localization, giving top 1 recall 95.5%/85.5%
    and 86.8%/80.4% for orientation known/unknown tests on the two datasets.
  related_code: ''
- author: Shihua Zhang, Jiayi Ma 0001
  title: 'DiffGlue: Diffusion-Aided Image Feature Matching.'
  venue: ACM Multimedia
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/Zhang024a
  doi: 10.1145/3664647.3681069
  ee: https://doi.org/10.1145/3664647.3681069
  url: https://dblp.org/rec/conf/mm/Zhang024a
  abstract: As one of the most fundamental computer vision problems, image feature
    matching aims to establish correct correspondences between two-view images. Existing
    studies enhance the descriptions of feature points with graph neural network (GNN),
    identifying correspondences with the predicted assignment matrix. However, this
    pipeline easily falls into a suboptimal result during training for the solution
    space is extremely complex, and is inaccessible to the prior that can guide the
    information propagation and network convergence. In this paper, we propose a novel
    method called DiffGlue that introduces the Diffusion Model into the sparse image
    feature matching framework. Concretely, based on the incrementally iterative diffusion
    and denoising processes, DiffGlue can be guided by the prior from the Diffusion
    Model and trained step by step on the optimization path, approaching the optimal
    solution progressively. Besides, it contains a special Assignment-Guided Attention
    as a bridge to merge the Diffusion Model and sparse image feature matching, which
    injects the inherent prior into GNN thereby ameliorating the message delivery.
    Extensive experiments reveal that DiffGlue converges faster and better, outperforming
    state-of-the-arts on several applications such as homography estimation, relative
    pose estimation, and visual localization. The code is available at https://github.com/SuhZhang/DiffGlue.
  related_code: https://github.com/SuhZhang/DiffGlue
- author: André Araújo 0001
  title: Deep Image Features for Instance-level Recognition and Matching.
  venue: SUMAC @ ACM Multimedia
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/Araujo20
  doi: 10.1145/3423323.3423414
  ee: https://doi.org/10.1145/3423323.3423414
  url: https://dblp.org/rec/conf/mm/Araujo20
  abstract: 'In this talk, I will discuss recent work from our team at Google Research,
    covering novel methods and datasets. Instance-level recognition, retrieval and
    matching are key computer vision problems which generally depend on effective
    image representations, both global and local. Our team has proposed a suite of
    state-of-the-art models to address these tasks: DELF (ICCV''17), one of the first
    deep learning methods for joint detection & description of local image features;
    Detect-to-Retrieve (CVPR''19), where deep local features can be efficiently aggregated
    guided by a trained object detector; DELG (ECCV''20), the first end-to-end trained
    deep model for joint local and global feature extraction. I will also present
    our team''s efforts on pushing for larger scale and more realistic benchmarks
    in this area, with the Google Landmarks Dataset (CVPR''20), and three workshops
    at computer vision conferences (CVPR''18, CVPR''19, ECCV''20).'
