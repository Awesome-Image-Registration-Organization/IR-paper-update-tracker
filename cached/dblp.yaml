- author: Gengshan Yang, Deva Ramanan
  title: Upgrading Optical Flow to 3D Scene Flow Through Optical Expansion.
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/YangR20
  doi: 10.1109/CVPR42600.2020.00141
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Yang_Upgrading_Optical_Flow_to_3D_Scene_Flow_Through_Optical_Expansion_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/YangR20
  abstract: We describe an approach for upgrading 2D optical flow to 3D scene flow.
    Our key insight is that dense optical expansion – which can be reliably inferred
    from monocular frame pairs – reveals changes in depth of scene elements, e.g.,
    things moving closer will get bigger. When integrated with camera intrinsics,
    optical expansion can be converted into a normalized 3D scene flow vectors that
    provide meaningful directions of 3D movement, but not their magnitude (due to
    an underlying scale ambiguity). Normalized scene flow can be further “upgraded”
    to the true 3D scene flow knowing depth in one frame. We show that dense optical
    expansion between two views can be learned from annotated optical flow maps or
    unlabeled video sequences, and applied to a variety of dynamic 3D perception tasks
    including optical scene flow, LiDAR scene flow, time-to-collision estimation and
    depth estimation, often demonstrating significant improvement over the prior art.
  related_code: ''
- author: Lukas Mehl, Jenny Schmalfuss, Azin Jahedi, Yaroslava Nalivayko, Andrés Bruhn
  title: 'Spring: A High-Resolution High-Detail Dataset and Benchmark for Scene Flow,
    Optical Flow and Stereo.'
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/MehlSJNB23
  doi: 10.1109/CVPR52729.2023.00482
  ee: https://doi.org/10.1109/CVPR52729.2023.00482
  url: https://dblp.org/rec/conf/cvpr/MehlSJNB23
  abstract: While recent methods for motion and stereo estimation recover an unprecedented
    amount of details, such highly detailed structures are neither adequately reflected
    in the data of existing benchmarks nor their evaluation methodology. Hence, we
    introduce Spring - a large, high-resolution, high-detail, computer-generated benchmark
    for scene flow, optical flow, and stereo. Based on rendered scenes from the open-source
    Blender movie “Spring”, it provides photo-realistic HD datasets with state-of-the-art
    visual effects and ground truth training data. Furthermore, we provide a website
    to upload, analyze and compare results. Using a novel evaluation methodology based
    on a super-resolved UHD ground truth, our Spring benchmark can assess the quality
    of fine structures and provides further detailed performance statistics on different
    image regions. Regarding the number of ground truth frames, Spring is 60× larger
    than the only scene flow benchmark, KITTI 2015, and 15× larger than the well-established
    MPI Sintel optical flow benchmark. Initial results for recent methods on our benchmark
    show that estimating fine details is indeed challenging, as their accuracy leaves
    significant room for improvement. The Spring benchmark and the corresponding datasets
    are available at http://spring-benchmark.org.
  related_code: ''
