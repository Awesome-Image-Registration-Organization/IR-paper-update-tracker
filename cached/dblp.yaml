- author: Jun Yu 0001, Yaohui Zhang, Gongpeng Zhao, Peng He 0004, Zerui Zhang, Zhongpeng
    Cai, Qingsong Liu, Jianqing Sun, Jiaen Liang
  title: Micro-Expression Spotting Based on Optical Flow Feature with Boundary Calibration.
  venue: ACM Multimedia
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/0001ZZHZCLSL24
  doi: 10.1145/3664647.3689142
  ee: https://doi.org/10.1145/3664647.3689142
  url: https://dblp.org/rec/conf/mm/0001ZZHZCLSL24
  abstract: Micro-expressions, as a type of facial expression corresponding to macro-expressions,
    usually have a short duration and low intensity. Due to these characteristics,
    micro-expression spotting holds significant value in medical care and public safety.
    Recent years have witnessed advancements in micro-expression spotting methods;
    however, spotting micro-expressions remains a challenging task due to their brief
    duration and low intensity. In this paper, we propose a micro-expression spotting
    method based on optical flow features with boundary calibration. We first perform
    face detection, cropping, and alignment on images containing faces. Then, regions
    of interest (ROIs) are defined, and optical flow features are extracted. Furthermore,
    candidate expression segments are identified based on the magnitude of the processed
    optical flows. Finally, a boundary calibration module is utilized to calibrate
    the boundaries. The effectiveness of the proposed method is evaluated on the MEGC2024
    test set, resulting in an overall F1-score of 0.27.
  related_code: ''
- author: Yiran Cheng, Bintao He, Fa Zhang 0001, Renmin Han
  title: Serial Section Microscopy Image Inpainting Guided by Axial Optical Flow.
  venue: ACM Multimedia
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/ChengH0H24
  doi: 10.1145/3664647.3681023
  ee: https://doi.org/10.1145/3664647.3681023
  url: https://dblp.org/rec/conf/mm/ChengH0H24
  abstract: Volume electron microscopy (vEM) is becoming a prominent technique in
    three-dimensional (3D) cellular visualization. vEM collects a series of two-dimensional
    (2D) images and reconstructs ultrastructures at the nanometer scale by rational
    axial interpolation between neighboring sections. However, section damage inevitably
    occurs in the sample preparation and imaging process, suffering from manual operational
    errors or occasional mechanical failures. The damaged regions present blurry and
    contaminated structure information, even local blank holes. Despite significant
    progress in single-image inpainting, it is still a great challenge to recover
    missing biological structures, that satisfy 3D structural continuity among sections.
    In this paper, we propose an optical flow-based serial section inpainting architecture
    to effectively combine the 3D structure information from neighboring sections
    and 2D image features from surrounding regions. We design a two-stage reference
    generation strategy to predict a rational and detailed intermediate state image
    from coarse to fine. Then, a GAN-based inpainting network is adopted to integrate
    all reference information and guide the restoration of missing structures, while
    ensuring consistent distribution of pixel values across the 2D image. Extensive
    experimental results well demonstrate the superiority of our method over existing
    inpainting tools. Our code is available at https://github.com/chengyr1999/FlowInpaint/.
  related_code: https://github.com/chengyr1999/FlowInpaint/
- author: Zibin Liu, Banglei Guan, Yang Shang, Shunkun Liang, Zhenbao Yu, Qifeng Yu
  title: Optical Flow-Guided 6DoF Object Pose Tracking with an Event Camera.
  venue: ACM Multimedia
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/LiuGSLYY24
  doi: 10.1145/3664647.3680992
  ee: https://doi.org/10.1145/3664647.3680992
  url: https://dblp.org/rec/conf/mm/LiuGSLYY24
  abstract: Object pose tracking is one of the pivotal technologies in multimedia,
    attracting ever-growing attention in recent years. Existing methods employing
    traditional cameras encounter numerous challenges such as motion blur, sensor
    noise, partial occlusion, and changing lighting conditions. The emerging bio-inspired
    sensors, particularly event cameras, possess advantages such as high dynamic range
    and low latency, which hold the potential to address the aforementioned challenges.
    In this work, we present an optical flow-guided 6DoF object pose tracking method
    with an event camera. A 2D-3D hybrid feature extraction strategy is firstly utilized
    to detect corners and edges from events and object models, which characterizes
    object motion precisely. Then, we search for the optical flow of corners by maximizing
    the event-associated probability within a spatio-temporal window, and establish
    the correlation between corners and edges guided by optical flow. Furthermore,
    by minimizing the distances between corners and edges, the 6DoF object pose is
    iteratively optimized to achieve continuous pose tracking. Experimental results
    of both simulated and real events demonstrate that our methods outperform event-based
    state-of-the-art methods in terms of both accuracy and robustness.
  related_code: ''
- author: Jianzhi Lu, Ruian He, Shili Zhou, Weimin Tan, Bo Yan 0001
  title: 'FacialFlowNet: Advancing Facial Optical Flow Estimation with a Diverse Dataset
    and a Decomposed Model.'
  venue: ACM Multimedia
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/LuHZT024
  doi: 10.1145/3664647.3680921
  ee: https://doi.org/10.1145/3664647.3680921
  url: https://dblp.org/rec/conf/mm/LuHZT024
  abstract: Facial movements play a crucial role in conveying altitude and intentions,
    and facial optical flow provides a dynamic and detailed representation of it.
    However, the scarcity of datasets and a modern baseline hinders the progress in
    facial optical flow research. This paper proposes FacialFlowNet (FFN), a novel
    large-scale facial optical flow dataset, and the Decomposed Facial Flow Model
    (DecFlow), the first method capable of decomposing facial flow. FFN comprises
    9,635 identities and 105,970 image pairs, offering unprecedented diversity for
    detailed facial and head motion analysis. DecFlow features a facial semantic-aware
    encoder and a decomposed flow decoder, excelling in accurately estimating and
    decomposing facial flow into head and expression components. Comprehensive experiments
    demonstrate that FFN significantly enhances the accuracy of facial flow estimation
    across various optical flow methods, achieving up to an 11% reduction in Endpoint
    Error (EPE) (from 3.91 to 3.48). Moreover, DecFlow, when coupled with FFN, outperforms
    existing methods in both synthetic and real-world scenarios, enhancing facial
    expression analysis. The decomposed expression flow achieves a substantial accuracy
    improvement of 18% (from 69.1% to 82.1%) in micro-expressions recognition. These
    contributions represent a significant advancement in facial motion analysis and
    optical flow estimation. Codes and datasets can be found here.
  related_code: ''
- author: Zhengye Zhang, Sirui Zhao, Xinglong Mao, Shifeng Liu, Hao Wang 0076, Tong
    Xu 0001, Enhong Chen
  title: A Multi-scale Feature Learning Network with Optical Flow Correction for Micro-
    and Macro-expression Spotting.
  venue: ACM Multimedia
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/ZhangZMLWXC24
  doi: 10.1145/3664647.3689143
  ee: https://doi.org/10.1145/3664647.3689143
  url: https://dblp.org/rec/conf/mm/ZhangZMLWXC24
  abstract: Recently, automatic micro-expression (ME) analysis has attracted increasing
    attention, since ME is a spontaneous facial expression that can truly reflect
    the emotional state an individual tries to conceal. As a crucial step in ME analysis,
    Micro- and Macro-expression (MaE) spotting aims to sequentially identify the occurrence
    intervals of MEs and MaEs within a long video sequence. However, the subtle spatiotemporal
    movements of MEs and the scarcity of well-labeled data pose great challenges for
    accurately spotting them. To this end, this paper proposes a novel spotting framework
    based on Multi-scale Feature Learning Network with Optical Flow Correction. Specifically,
    we first integrate the pre-trained VideoMAE and customized convolutional layers
    as a visual feature extraction module to learn the facial motion features in long
    video sequences. Then, to comprehensively locate and identify the existing ME
    and MaE segments, we introduce a multi-scale candidate segment generation method
    based on the ActionFormer. In particular, a multi-start points optical flow filtering
    method is proposed to improve the precision of expression spotting. Finally, we
    conduct comprehensive experiments on the MEGC2024 spotting task, and the experimental
    results demonstrate the effectiveness of our method, which ranks second in this
    task. The implemented code is also publicly available at https://github.com/zzy188zzy/megc_spotting_code.
  related_code: https://github.com/zzy188zzy/megc_spotting_code
- author: Yang Zhao, Gangwei Xu, Gang Wu
  title: Hybrid Cost Volume for Memory-Efficient Optical Flow.
  venue: ACM Multimedia
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/ZhaoXW24
  doi: 10.1145/3664647.3680643
  ee: https://doi.org/10.1145/3664647.3680643
  url: https://dblp.org/rec/conf/mm/ZhaoXW24
  abstract: Current state-of-the-art flow methods are mostly based on dense all-pairs
    cost volumes. However, as image resolution increases, the computational and spatial
    complexity of constructing these cost volumes grows at a quartic rate, making
    these methods impractical for high-resolution images. In this paper, we propose
    a novel Hybrid Cost Volume for memory-efficient optical flow, named HCV. To construct
    HCV, we first propose a Top-k strategy to separate the 4D cost volume into two
    global 3D cost volumes. These volumes significantly reduce memory usage while
    retaining a substantial amount of matching information. We further introduce a
    local 4D cost volume with a local search space to supplement the local information
    for HCV. Based on HCV, we design a memory-efficient optical flow network, named
    HCVFlow. Compared to the recurrent flow methods based the all-pairs cost volumes,
    our HCVFlow significantly reduces memory consumption while ensuring high accuracy.
    We validate the effectiveness and efficiency of our method on the Sintel and KITTI
    datasets and real-world 4K (2160 × 3840) resolution images. Extensive experiments
    show that our HCVFlow has very low memory usage and outperforms other memory-efficient
    methods in terms of accuracy. The code is publicly available at https://github.com/gangweiX/HCVFlow.
  related_code: https://github.com/gangweiX/HCVFlow
- author: Wenfeng Qin, Bochao Zou, Xin Li 0034, Weiping Wang 0007, Huimin Ma 0001
  title: Micro-Expression Spotting with Face Alignment and Optical Flow.
  venue: ACM Multimedia
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/QinZLWM23
  doi: 10.1145/3581783.3612853
  ee: https://doi.org/10.1145/3581783.3612853
  url: https://dblp.org/rec/conf/mm/QinZLWM23
  abstract: Facial expression spotting holds significant importance as it can signify
    emotional changes. Particularly, micro-expressions possess the potential to reveal
    genuine emotions, making them even more valuable in practical domains such as
    public safety and finance. However, spotting micro-expressions proves challenging
    due to their subtle movements and brief duration. This paper proposes an expression
    spotting method based on face alignment and optical flow. We first use a finer
    crop-align technique to preprocess the facial videos by aligning the face and
    the nose tip. Then, regions of interest (ROIs) are defined by analyzing the statistics
    of action units. The optical flow features are then extracted and subjected to
    low-pass filtering to eliminate high-frequency noise. Furthermore, candidate expression
    segments are identified based on the magnitude of the processed optical flows.
    Finally, non-maximum suppression is utilized to remove overlapping segments. The
    effectiveness of the proposed method is evaluated on the challenge test set, resulting
    in an overall F1-score of 0.19. Additional results obtained from CAS(ME)2 and
    SAMM Long videos provide further verification of the method's efficacy. The code
    is available online.
