- author: Hao Xu 0018, Shuaicheng Liu, Guangfu Wang, Guanghui Liu 0001, Bing Zeng
    0001
  title: 'OMNet: Learning Overlapping Mask for Partial-to-Partial Point Cloud Registration.'
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/XuLWLZ21
  doi: 10.1109/ICCV48922.2021.00312
  ee: https://doi.org/10.1109/ICCV48922.2021.00312
  url: https://dblp.org/rec/conf/iccv/XuLWLZ21
  abstract: Point cloud registration is a key task in many computational fields. Previous
    correspondence matching based methods require the inputs to have distinctive geometric
    structures to fit a 3D rigid transformation according to point-wise sparse feature
    matches. However, the accuracy of transformation heavily relies on the quality
    of extracted features, which are prone to errors with respect to partiality and
    noise. In addition, they can not utilize the geometric knowledge of all the overlapping
    regions. On the other hand, previous global feature based approaches can utilize
    the entire point cloud for the registration, however they ignore the negative
    effect of non-overlapping points when aggregating global features. In this paper,
    we present OM-Net, a global feature based iterative network for partial-to-partial
    point cloud registration. We learn overlapping masks to reject non-overlapping
    regions, which converts the partial-to-partial registration to the registration
    of the same shape. Moreover, the previously used data is sampled only once from
    the CAD models for each object, resulting in the same point clouds for the source
    and reference. We propose a more practical manner of data generation where a CAD
    model is sampled twice for the source and reference, avoiding the previously prevalent
    over-fitting issue. Experimental results show that our method achieves state-of-the-art
    performance compared to traditional and deep learning based methods. Code is available
    at https://github.com/megvii-research/OMNet.
  related_code: https://github.com/megvii-research/OMNet
- author: Uttaran Bhattacharya, Venu Madhav Govindu
  title: Efficient and Robust Registration on the 3D Special Euclidean Group.
  venue: ICCV
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/BhattacharyaG19
  doi: 10.1109/ICCV.2019.00598
  ee: https://doi.org/10.1109/ICCV.2019.00598
  url: https://dblp.org/rec/conf/iccv/BhattacharyaG19
  abstract: We present a robust, fast and accurate method for registration of 3D scans.
    Using correspondences, our method optimizes a robust cost function on the intrinsic
    representation of rigid motions, i.e., the Special Euclidean group SE(3). We exploit
    the geometric properties of Lie groups as well as the robustness afforded by an
    iteratively reweighted least squares optimization. We also generalize our approach
    to a joint multiview method that simultaneously solves for the registration of
    a set of scans. Our approach significantly outperforms the state-of-the-art robust
    3D registration method based on a line process in terms of both speed and accuracy.
    We show that this line process method is a special case of our principled geometric
    solution. Finally, we also present scenarios where global registration based on
    feature correspondences fails but multiview ICP based on our robust motion estimation
    is successful.
