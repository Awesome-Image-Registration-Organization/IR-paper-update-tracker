- author: Vincent Le Guen, Clément Rambour, Nicolas Thome
  title: Complementing Brightness Constancy with Deep Networks for Optical Flow Prediction.
  venue: ECCV
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/GuenRT22
  doi: 10.1007/978-3-031-19803-8_8
  ee: https://doi.org/10.1007/978-3-031-19803-8_8
  url: https://dblp.org/rec/conf/eccv/GuenRT22
  abstract: State-of-the-art methods for optical flow estimation rely on deep learning,
    which require complex sequential training schemes to reach optimal performances
    on real-world data. In this work, we introduce the COMBO deep network that explicitly
    exploits the brightness constancy (BC) model used in traditional methods. Since
    BC is an approximate physical model violated in several situations, we propose
    to train a physically-constrained network complemented with a data-driven network.
    We introduce a unique and meaningful flow decomposition between the physical prior
    and the data-driven complement, including an uncertainty quantification of the
    BC model. We derive a joint training scheme for learning the different components
    of the decomposition ensuring an optimal cooperation, in a supervised but also
    in a semi-supervised context. Experiments show that COMBO can improve performances
    over state-of-the-art supervised networks, e.g. RAFT, reaching state-of-the-art
    results on several benchmarks. We highlight how COMBO can leverage the BC model
    and adapt to its limitations. Finally, we show that our semi-supervised method
    can significantly simplify the training procedure.
  related_code: ''
- author: Yunhui Han, Kunming Luo, Ao Luo, Jiangyu Liu, Haoqiang Fan, Guiming Luo,
    Shuaicheng Liu
  title: 'RealFlow: EM-Based Realistic Optical Flow Dataset Generation from Videos.'
  venue: ECCV
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/HanLLLFLL22
  doi: 10.1007/978-3-031-19800-7_17
  ee: https://doi.org/10.1007/978-3-031-19800-7_17
  url: https://dblp.org/rec/conf/eccv/HanLLLFLL22
  abstract: Obtaining the ground truth labels from a video is challenging since the
    manual annotation of pixel-wise flow labels is prohibitively expensive and laborious.
    Besides, existing approaches try to adapt the trained model on synthetic datasets
    to authentic videos, which inevitably suffers from domain discrepancy and hinders
    the performance for real-world applications. To solve these problems, we propose
    RealFlow, an Expectation-Maximization based framework that can create large-scale
    optical flow datasets directly from any unlabeled realistic videos. Specifically,
    we first estimate optical flow between a pair of video frames, and then synthesize
    a new image from this pair based on the predicted flow. Thus the new image pairs
    and their corresponding flows can be regarded as a new training set. Besides,
    we design a Realistic Image Pair Rendering (RIPR) module that adopts softmax splatting
    and bi-directional hole filling techniques to alleviate the artifacts of the image
    synthesis. In the E-step, RIPR renders new images to create a large quantity of
    training data. In the M-step, we utilize the generated training data to train
    an optical flow network, which can be used to estimate optical flows in the next
    E-step. During the iterative learning steps, the capability of the flow network
    is gradually improved, so is the accuracy of the flow, as well as the quality
    of the synthesized dataset. Experimental results show that RealFlow outperforms
    previous dataset generation methods by a considerably large margin. Moreover,
    based on the generated dataset, our approach achieves state-of-the-art performance
