- author: S. Mazdak Abulnaga, Andrew Hoopes, Neel Dey, Malte Hoffmann, Bruce Fischl,
    John V. Guttag, Adrian V. Dalca
  title: 'MultiMorph: On-demand Atlas Construction.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/AbulnagaHDHFGD25
  doi: 10.1109/CVPR52734.2025.02878
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Abulnaga_MultiMorph_On-demand_Atlas_Construction_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/AbulnagaHDHFGD25
  abstract: We present MultiMorph, a fast and efficient method for constructing anatomical
    atlases on the fly. Atlases capture the canonical structure of a collection of
    images and are essential for quantifying anatomical variability across populations.
    However, current atlas construction methods often require days to weeks of computation,
    thereby discouraging rapid experimentation. As a result, many scientific studies
    rely on suboptimal, precomputed atlases from mismatched populations, negatively
    impacting downstream analyses. MultiMorph addresses these challenges with a feedfor-ward
    model that rapidly produces high-quality, population-specific atlases in a single
    forward pass for any 3D brain dataset, without any fine-tuning or optimization.
    Multi-Morph is based on a linear group-interaction layer that aggregates and shares
    features within the group of input images. Further, by leveraging auxiliary synthetic
    data, Mul-Timorph generalizes to new imaging modalities and population groups
    at test-time. Experimentally, MultiMorph outperforms state-of-the-art optimization-based
    and learning-based atlas construction methods in both small and large population
    settings, with a 100-fold reduction in time. This makes MultiMorph an accessible
    framework for biomedical researchers without machine learning expertise, enabling
    rapid, high-quality atlas generation for diverse studies.
