- author: Ziqi Xie, Weidong Zhao, Xianhui Liu, Jian Zhao, Ning Jia 0003
  title: 'Reconstructing the Image Stitching Pipeline: Integrating Fusion and Rectangling
    into a Unified Inpainting Model.'
  venue: NeurIPS
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/XieZLZJ24
  doi: 10.52202/079017-3935
  ee: http://papers.nips.cc/paper_files/paper/2024/hash/dfa1106ea7065899b13f2be9da04efb4-Abstract-Conference.html
  url: https://dblp.org/rec/conf/nips/XieZLZJ24
  abstract: 'Deep learning-based image stitching pipelines are typically divided into
    three cascading stages: registration, fusion, and rectangling. Each stage requires
    its own network training and is tightly coupled to the others, leading to error
    propagation and posing significant challenges to parameter tuning and system stability.
    This paper proposes the Simple and Robust Stitcher (SRStitcher), which revolutionizes
    the image stitching pipeline by simplifying the fusion and rectangling stages
    into a unified inpainting model, requiring no model training or fine-tuning. We
    reformulate the problem definitions of the fusion and rectangling stages and demonstrate
    that they can be effectively integrated into an inpainting task. Furthermore,
    we design the weighted masks to guide the reverse process in a pre-trained largescale
    diffusion model, implementing this integrated inpainting task in a single inference.
    Through extensive experimentation, we verify the interpretability and generalization
    capabilities of this unified model, demonstrating that SRStitcher outperforms
    state-of-the-art methods in both performance and stability. Code: https://github.com/yayoyo66/SRStitcher'
  related_code: https://github.com/yayoyo66/SRStitcher
- author: Mark Hamilton, Stephanie Fu, Mindren Lu, Johnny Bui, Darius Bopp, Zhenbang
    Chen, Felix Tran, Margaret Wang, Marina Rogers, Lei Zhang 0001, Chris Hoder, William
    T. Freeman
  title: 'MosAIc: Finding Artistic Connections across Culture with Conditional Image
    Retrieval.'
  venue: NeurIPS
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/HamiltonFLBBCTW20
  doi: ''
  ee: http://proceedings.mlr.press/v133/hamilton21a.html
  url: https://dblp.org/rec/conf/nips/HamiltonFLBBCTW20
  abstract: We introduce MosAIc, an interactive web app that allows users to find
    pairs of semantically related artworks that span different cultures, media, and
    millennia. To create this application, we introduce Conditional Image Retrieval
    (CIR) which combines visual similarity search with user supplied filters or "conditions".
    This technique allows one to find pairs of similar images that span distinct subsets
    of the image corpus. We provide a generic way to adapt existing image retrieval
    data-structures to this new domain and provide theoretical bounds on our approach's
    efficiency. To quantify the performance of CIR systems, we introduce new datasets
    for evaluating CIR methods and show that CIR performs non-parametric style transfer.
    Finally, we demonstrate that our CIR data-structures can identify "blind spots"
    in Generative Adversarial Networks (GAN) where they fail to properly model the
    true data distribution.
  related_code: ''
stitch%7Cpanorama%7Cmosaic%20venue%3AICML%3A:
- author: Seungho Baek, Tae-Geon Park, Jongchan Park, Seungjun Oh, Yusung Kim 0001
  title: Graph-Assisted Stitching for Offline Hierarchical Reinforcement Learning.
  venue: ICML
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/icml/BaekPPO025
  doi: 10.48550/arXiv.2506.07744
  ee: https://proceedings.mlr.press/v267/baek25a.html
  url: https://dblp.org/rec/conf/icml/BaekPPO025
  abstract: 'Existing offline hierarchical reinforcement learning methods rely on
    high-level policy learning to generate subgoal sequences. However, their efficiency
    degrades as task horizons increase, and they lack effective strategies for stitching
    useful state transitions across different trajectories. We propose Graph-Assisted
    Stitching (GAS), a novel framework that formulates subgoal selection as a graph
    search problem rather than learning an explicit high-level policy. By embedding
    states into a Temporal Distance Representation (TDR) space, GAS clusters semantically
    similar states from different trajectories into unified graph nodes, enabling
    efficient transition stitching. A shortest-path algorithm is then applied to select
    subgoal sequences within the graph, while a low-level policy learns to reach the
    subgoals. To improve graph quality, we introduce the Temporal Efficiency (TE)
    metric, which filters out noisy or inefficient transition states, significantly
    enhancing task performance. GAS outperforms prior offline HRL methods across locomotion,
    navigation, and manipulation tasks. Notably, in the most stitching-critical task,
    it achieves a score of 88.3, dramatically surpassing the previous state-of-the-art
    score of 1.0. Our source code is available at: https://github.com/qortmdgh4141/GAS.'
  related_code: https://github.com/qortmdgh4141/GAS
stitch%7Cpanorama%7Cmosaic%20venue%3AICLR%3A:
- author: Nikolai Kalischek, Michael Oechsle, Fabian Manhardt, Philipp Henzler, Konrad
    Schindler, Federico Tombari
  title: 'CubeDiff: Repurposing Diffusion-Based Image Models for Panorama Generation.'
  venue: ICLR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/iclr/KalischekOMHST25
  doi: 10.48550/arXiv.2501.17162
  ee: https://openreview.net/forum?id=M2SsqpxGtc
  url: https://dblp.org/rec/conf/iclr/KalischekOMHST25
  abstract: 'We introduce a novel method for generating 360{\deg} panoramas from text
    prompts or images. Our approach leverages recent advances in 3D generation by
    employing multi-view diffusion models to jointly synthesize the six faces of a
    cubemap. Unlike previous methods that rely on processing equirectangular projections
    or autoregressive generation, our method treats each face as a standard perspective
    image, simplifying the generation process and enabling the use of existing multi-view
    diffusion models. We demonstrate that these models can be adapted to produce high-quality
    cubemaps without requiring correspondence-aware attention layers. Our model allows
    for fine-grained text control, generates high resolution panorama images and generalizes
    well beyond its training set, whilst achieving state-of-the-art results, both
    qualitatively and quantitatively. Project page: https://cubediff.github.io/'
  related_code: ''
