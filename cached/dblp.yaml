  url: https://dblp.org/rec/journals/pami/ShibaKAG24
  abstract: Event cameras respond to scene dynamics and provide signals naturally
    suitable for motion estimation with advantages, such as high dynamic range. The
    emerging field of event-based vision motivates a revisit of fundamental computer
    vision tasks related to motion, such as optical flow and depth estimation. However,
    state-of-the-art event-based optical flow methods tend to originate in frame-based
    deep-learning methods, which require several adaptations (data conversion, loss
    function, etc.) as they have very different properties. We develop a principled
    method to extend the Contrast Maximization framework to estimate dense optical
    flow, depth, and ego-motion from events alone. The proposed method sensibly models
    the space-time properties of event data and tackles the event alignment problem.
    It designs the objective function to prevent overfitting, deals better with occlusions,
    and improves convergence using a multi-scale approach. With these key elements,
    our method ranks first among unsupervised methods on the MVSEC benchmark and is
    competitive on the DSEC benchmark. Moreover, it allows us to simultaneously estimate
    dense depth and ego-motion, exposes the limitations of current flow benchmarks,
    and produces remarkable results when it is transferred to unsupervised learning
    settings. Along with various downstream applications shown, we hope the proposed
    method becomes a cornerstone on event-based motion-related tasks.
