  title: 'Test-Time Domain Generalization via Universe Learning: A Multi-Graph Matching
    Approach for Medical Image Segmentation.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/LvDWYZPJ025
  doi: 10.1109/CVPR52734.2025.01456
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Lv_Test-Time_Domain_Generalization_via_Universe_Learning_A_Multi-Graph_Matching_Approach_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/LvDWYZPJ025
  abstract: Despite domain generalization (DG) has significantly addressed the performance
    degradation of pre-trained models caused by domain shifts, it often falls short
    in real-world deployment. Test-time adaptation (TTA), which adjusts a learned
    model using unlabeled test data, presents a promising solution. However, most
    existing TTA methods struggle to deliver strong performance in medical image segmentation,
    primarily because they overlook the crucial prior knowledge inherent to medical
    images. To address this challenge, we incorporate morphological information and
    propose a framework based on multi-graph matching. Specifically, we introduce
    learnable universe embeddings that integrate morphological priors during multi-source
    training, along with novel unsupervised test-time paradigms for domain adaptation.
    This approach guarantees cycle-consistency in multi-matching while enabling the
    model to more effectively capture the invariant priors of unseen data, significantly
    mitigating the effects of domain shifts. Extensive experiments demonstrate that
    our method outperforms other state-of-the-art approaches on two medical image
    segmentation benchmarks for both multi-source and single-source domain generalization
    tasks. The source code is available at https://github.com/Yore0/TTDG-MGM.
  related_code: https://github.com/Yore0/TTDG-MGM
- author: Chunxiao Liu, Zhendong Mao 0001, Tianzhu Zhang 0001, Hongtao Xie, Bin Wang
    0004, Yongdong Zhang 0001
  title: Graph Structured Network for Image-Text Matching.
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/LiuMZX0Z20
  doi: 10.1109/CVPR42600.2020.01093
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Liu_Graph_Structured_Network_for_Image-Text_Matching_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/LiuMZX0Z20
  abstract: 'Image-text matching has received growing interest since it bridges vision
    and language. The key challenge lies in how to learn correspondence between image
    and text. Existing works learn coarse correspondence based on object co-occurrence
    statistics, while failing to learn fine-grained phrase correspondence. In this
    paper, we present a novel Graph Structured Matching Network (GSMN) to learn fine-grained
    correspondence. The GSMN explicitly models object, relation and attribute as a
    structured phrase, which not only allows to learn correspondence of object, relation
    and attribute separately, but also benefits to learn fine-grained correspondence
    of structured phrase. This is achieved by node-level matching and structure-level
    matching. The node-level matching associates each node with its relevant nodes
    from another modality, where the node can be object, relation or attribute. The
    associated nodes then jointly infer fine-grained correspondence by fusing neighborhood
    associations at structure-level matching. Comprehensive experiments show that
    GSMN outperforms state-of-the-art methods on benchmarks, with relative Recall@1
    improvements of nearly 7% and 2% on Flickr30K and MSCOCO, respectively. Code will
    be released at: https://github.com/CrossmodalGroup/GSMN.'
  related_code: https://github.com/CrossmodalGroup/GSMN
- author: Gengshan Yang, Joshua Manela, Michael Happold, Deva Ramanan
  title: Hierarchical Deep Stereo Matching on High-Resolution Images.
  venue: CVPR
  year: '2019'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/YangMHR19
  doi: 10.1109/CVPR.2019.00566
  ee: http://openaccess.thecvf.com/content_CVPR_2019/html/Yang_Hierarchical_Deep_Stereo_Matching_on_High-Resolution_Images_CVPR_2019_paper.html
  url: https://dblp.org/rec/conf/cvpr/YangMHR19
  abstract: We explore the problem of real-time stereo matching on high-res imagery.
    Many state-of-the-art (SOTA) methods struggle to process high-res imagery because
    of memory constraints or speed limitations. To address this issue, we propose
    an end-to-end framework that searches for correspondences incrementally over a
    coarse-to-fine hierarchy. Because high-res stereo datasets are relatively rare,
    we introduce a dataset with high-res stereo pairs for both training and evaluation.
    Our approach achieved SOTA performance on Middlebury-v3 and KITTI-15 while running
    significantly faster than its competitors. The hierarchical design also naturally
    allows for anytime on-demand reports of disparity by capping intermediate coarse
    results, allowing us to accurately predict disparity for near-range structures
    with low latency (30ms). We demonstrate that the performance-vs-speed tradeoff
    afforded by on-demand hierarchies may address sensing needs for time-critical
    applications such as autonomous driving.
