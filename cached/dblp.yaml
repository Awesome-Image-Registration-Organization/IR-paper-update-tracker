- author: Nikolaus Mayer, Eddy Ilg, Philipp Fischer, Caner Hazirbas, Daniel Cremers,
    Alexey Dosovitskiy, Thomas Brox
  title: What Makes Good Synthetic Training Data for Learning Disparity and Optical
    Flow Estimation?
  venue: Int. J. Comput. Vis.
  year: '2018'
  type: Journal Articles
  access: closed
  key: journals/ijcv/MayerIFHCDB18
  doi: 10.1007/S11263-018-1082-6
  ee: https://doi.org/10.1007/s11263-018-1082-6
  url: https://dblp.org/rec/journals/ijcv/MayerIFHCDB18
  abstract: The finding that very large networks can be trained efficiently and reliably
    has led to a paradigm shift in computer vision from engineered solutions to learning
    formulations. As a result, the research challenge shifts from devising algorithms
    to creating suitable and abundant training data for supervised learning. How to
    efficiently create such training data? The dominant data acquisition method in
    visual recognition is based on web data and manual annotation. Yet, for many computer
    vision problems, such as stereo or optical flow estimation, this approach is not
    feasible because humans cannot manually enter a pixel-accurate flow field. In
    this paper, we promote the use of synthetically generated data for the purpose
    of training deep networks on such tasks. We suggest multiple ways to generate
    such data and evaluate the influence of dataset properties on the performance
    and generalization properties of the resulting networks. We also demonstrate the
    benefit of learning schedules that use different types of data at selected stages
    of the training process.
  related_code: ''
- author: Deqing Sun, Stefan Roth 0001, Michael J. Black
  title: A Quantitative Analysis of Current Practices in Optical Flow Estimation and
    the Principles Behind Them.
  venue: Int. J. Comput. Vis.
  year: '2014'
  type: Journal Articles
  access: open
  key: journals/ijcv/SunRB14
  doi: 10.1007/S11263-013-0644-X
  ee: https://doi.org/10.1007/s11263-013-0644-x
  url: https://dblp.org/rec/journals/ijcv/SunRB14
  abstract: The accuracy of optical flow estimation algorithms has been improving
    steadily as evidenced by results on the Middlebury optical flow benchmark. The
    typical formulation, however, has changed little since the work of Horn and Schunck.
    We attempt to uncover what has made recent advances possible through a thorough
    analysis of how the objective function, the optimization method, and modern implementation
    practices influence accuracy. We discover that “classical” flow formulations perform
    surprisingly well when combined with modern optimization and implementation techniques.
    One key implementation detail is the median filtering of intermediate flow fields
    during optimization. While this improves the robustness of classical methods it
    actually leads to higher energy solutions, meaning that these methods are not
    optimizing the original objective function. To understand the principles behind
    this phenomenon, we derive a new objective function that formalizes the median
    filtering heuristic. This objective function includes a non-local smoothness term
    that robustly integrates flow estimates over large spatial neighborhoods. By modifying
    this new term to include information about flow and image boundaries we develop
    a method that can better preserve motion details. To take advantage of the trend
    towards video in wide-screen format, we further introduce an asymmetric pyramid
    downsampling scheme that enables the estimation of longer range horizontal motions.
    The methods are evaluated on the Middlebury, MPI Sintel, and KITTI datasets using
    the same parameter settings.
  related_code: ''
