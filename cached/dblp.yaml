- author: Luuk J. Spreeuwers
  title: Fast and Accurate 3D Face Recognition - Using Registration to an Intrinsic
    Coordinate System and Fusion of Multiple Region Classifiers.
  venue: Int. J. Comput. Vis.
  year: '2011'
  type: Journal Articles
  access: closed
  key: journals/ijcv/Spreeuwers11
  doi: 10.1007/S11263-011-0426-2
  ee: https://doi.org/10.1007/s11263-011-0426-2
  url: https://dblp.org/rec/journals/ijcv/Spreeuwers11
  abstract: 'In this paper we present a new robust approach for 3D face registration
    to an intrinsic coordinate system of the face. The intrinsic coordinate system
    is defined by the vertical symmetry plane through the nose, the tip of the nose
    and the slope of the bridge of the nose. In addition, we propose a 3D face classifier
    based on the fusion of many dependent region classifiers for overlapping face
    regions. The region classifiers use PCA-LDA for feature extraction and the likelihood
    ratio as a matching score. Fusion is realised using straightforward majority voting
    for the identification scenario. For verification, a voting approach is used as
    well and the decision is defined by comparing the number of votes to a threshold.
    Using the proposed registration method combined with a classifier consisting of
    60 fused region classifiers we obtain a 99.0% identification rate on the all vs
    first identification test of the FRGC v2 data. A verification rate of 94.6% at
    FAR=0.1% was obtained for the all vs all verification test on the FRGC v2 data
    using fusion of 120 region classifiers. The first is the highest reported performance
    and the second is in the top-5 of best performing systems on these tests. In addition,
    our approach is much faster than other methods, taking only 2.5 seconds per image
    for registration and less than 0.1 ms per comparison. Because we apply feature
    extraction using PCA and LDA, the resulting template size is also very small:
    6 kB for 60 region classifiers.'
