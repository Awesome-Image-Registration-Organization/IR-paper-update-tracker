- author: Seokju Cho, Jiahui Huang, Seungryong Kim, Joon-Young Lee
  title: 'FlowTrack: Revisiting Optical Flow for Long-Range Dense Tracking.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/ChoHKL24
  doi: 10.1109/CVPR52733.2024.01823
