- author: EungGu Kang, Byeonghun Lee, Sunghoon Im 0001, Kyong Hwan Jin
  title: 'BurstM: Deep Burst Multi-scale SR Using Fourier Space with Optical Flow.'
  venue: ECCV
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/KangLIJ24
  doi: 10.1007/978-3-031-72946-1_26
  ee: https://doi.org/10.1007/978-3-031-72946-1_26
  url: https://dblp.org/rec/conf/eccv/KangLIJ24
  abstract: Multi frame super-resolution(MFSR) achieves higher performance than single
    image super-resolution (SISR), because MFSR leverages abundant information from
    multiple frames. Recent MFSR approaches adapt the deformable convolution network
    (DCN) to align the frames. However, the existing MFSR suffers from misalignments
    between the reference and source frames due to the limitations of DCN, such as
    small receptive fields and the predefined number of kernels. From these problems,
    existing MFSR approaches struggle to represent high-frequency information. To
    this end, we propose Deep Burst Multi-scale SR using Fourier Space with Optical
    Flow (BurstM). The proposed method estimates the optical flow offset for accurate
    alignment and predicts the continuous Fourier coefficient of each frame for representing
    high-frequency textures. In addition, we have enhanced the network flexibility
    by supporting various super-resolution (SR) scale factors with the unimodel. We
    demonstrate that our method has the highest performance and flexibility than the
    existing MFSR methods. Our source code is available at https://github.com/Egkang-Luis/burstm
  related_code: https://github.com/Egkang-Luis/burstm
- author: Yihan Wang, Lahav Lipson, Jia Deng 0001
  title: 'SEA-RAFT: Simple, Efficient, Accurate RAFT for Optical Flow.'
  venue: ECCV
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/WangLD24
  doi: 10.1007/978-3-031-72667-5_3
  ee: https://doi.org/10.1007/978-3-031-72667-5_3
  url: https://dblp.org/rec/conf/eccv/WangLD24
  abstract: We introduce SEA-RAFT, a more simple, efficient, and accurate RAFT for
    optical flow. Compared with RAFT, SEA-RAFT is trained with a new loss (mixture
    of Laplace). It directly regresses an initial flow for faster convergence in iterative
    refinements and introduces rigid-motion pre-training to improve generalization.
    SEA-RAFT achieves state-of-the-art accuracy on the Spring benchmark with a 3.69
    endpoint-error (EPE) and a 0.36 1-pixel outlier rate (1px), representing 22.9%
    and 17.8% error reduction from best published results. In addition, SEA-RAFT obtains
    the best cross-dataset generalization on KITTI and Spring. With its high efficiency,
    SEA-RAFT operates at least 2.3x faster than existing methods while maintaining
    competitive performance. The code is publicly available at https://github.com/princeton-vl/SEA-RAFT.
  related_code: https://github.com/princeton-vl/SEA-RAFT
