- author: Thomas Vissers, Peter Janssen, Wouter Joosen, Lieven Desmet
  title: Assessing the Effectiveness of Domain Blacklisting Against Malicious DNS
    Registrations.
  venue: IEEE Symposium on Security and Privacy Workshops
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/sp/VissersJJD19
  doi: 10.1109/SPW.2019.00045
  ee: https://doi.org/10.1109/SPW.2019.00045
  url: https://dblp.org/rec/conf/sp/VissersJJD19
  abstract: Domain blacklists are widely-used in security research. However, given
    their proprietary nature, there is little insight into how they operate and how
    effective they are. In this paper, we analyze a unique combination of DNS traffic
    measurements with domain registration and blacklisting data. We focus in particular
    on large-scale malicious campaigns that register thousands of domain names used
    in orchestrated attacks. This allows us to gain insights into how blacklists and
    cybercriminals interact with each other. Furthermore, it enables us to pinpoint
    scenarios where blacklist operators struggle to detect campaign registrations.
