- author: Yongyi Tang, Lin Ma 0002, Lianqiang Zhou
  title: Hallucinating Optical Flow Features for Video Classification.
  venue: IJCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/Tang0Z19
  doi: 10.24963/IJCAI.2019/130
