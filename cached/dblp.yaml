- author: Ruiying Lu, Bo Chen 0001, Guanliang Liu, Ziheng Cheng 0001, Mu Qiao, Xin
    Yuan 0002
  title: Dual-view Snapshot Compressive Imaging via Optical Flow Aided Recurrent Neural
    Network.
  venue: Int. J. Comput. Vis.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/ijcv/LuCLCQY21
  doi: 10.1007/S11263-021-01532-1
