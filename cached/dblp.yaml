- author: Yang Liu 0271, Peiran Wu, Jiayu Huo, Gongyu Zhang, Zhen Yuan, Christos Bergeles,
    Rachel Sparks, Prokar Dasgupta, Alejandro Granados, Sébastien Ourselin
  title: Motion-Boundary-Driven Unsupervised Surgical Instrument Segmentation in Low-Quality
    Optical Flow.
  venue: MICCAI
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/LiuWHZYBSDGO25
  doi: 10.1007/978-3-032-05114-1_36
  ee: https://doi.org/10.1007/978-3-032-05114-1_36
  url: https://dblp.org/rec/conf/miccai/LiuWHZYBSDGO25
  abstract: Unsupervised video-based surgical instrument segmentation has the potential
    to accelerate the adoption of robot-assisted procedures by reducing the reliance
    on manual annotations. However, the generally low quality of optical flow in endoscopic
    footage poses a great challenge for unsupervised methods that rely heavily on
    motion cues. To overcome this limitation, we propose a novel approach that pinpoints
    motion boundaries, regions with abrupt flow changes, while selectively discarding
    frames with globally low-quality flow and adapting to varying motion patterns.
    Experiments on the EndoVis2017 VOS and EndoVis2017 Challenge datasets show that
    our method achieves mean Intersection-over-Union (mIoU) scores of 0.75 and 0.72,
    respectively, effectively alleviating the constraints imposed by suboptimal optical
    flow. This enables a more scalable and robust surgical instrument segmentation
    solution in clinical settings. The code will be publicly released.
