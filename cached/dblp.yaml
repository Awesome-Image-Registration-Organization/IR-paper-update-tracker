- author: Tianyi Zeng, Jiazhen Zhang, Eléonore V. Lieffrig, Zhuotong Cai, Fuyao Chen,
    Chenyu You, Mika Naganawa, Yihuan Lu, John A. Onofrey
  title: Fast Reconstruction for Deep Learning PET Head Motion Correction.
  venue: MICCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ZengZLCCYNLO23
  doi: 10.1007/978-3-031-43999-5_67
  ee: https://doi.org/10.1007/978-3-031-43999-5_67
  url: https://dblp.org/rec/conf/miccai/ZengZLCCYNLO23
  abstract: 'Head motion correction is an essential component of brain PET imaging,
    in which even motion of small magnitude can greatly degrade image quality and
    introduce artifacts. Building upon previous work, we propose a new head motion
    correction framework taking fast reconstructions as input. The main characteristics
    of the proposed method are: (i) the adoption of a high-resolution short-frame
    fast reconstruction workflow; (ii) the development of a novel encoder for PET
    data representation extraction; and (iii) the implementation of data augmentation
    techniques. Ablation studies are conducted to assess the individual contributions
    of each of these design choices. Furthermore, multi-subject studies are conducted
    on an 18F-FPEB dataset, and the method performance is qualitatively and quantitatively
    evaluated by MOLAR reconstruction study and corresponding brain Region of Interest
    (ROI) Standard Uptake Values (SUV) evaluation. Additionally, we also compared
    our method with a conventional intensity-based registration method. Our results
    demonstrate that the proposed method outperforms other methods on all subjects,
    and can accurately estimate motion for subjects out of the training set. All code
    is publicly available on GitHub: https://github.com/OnofreyLab/dl-hmc_fast_recon_miccai2023.'
  related_code: https://github.com/OnofreyLab/dl-hmc_fast_recon_miccai2023
