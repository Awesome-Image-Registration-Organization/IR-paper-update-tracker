- author: Ali Can, Charles V. Stewart, Badrinath Roysam, Howard L. Tanenbaum
  title: 'A Feature-Based Technique for Joint Linear Estimation of High-Order Image-to-Mosaic
    Transformations: Mosaicing the Curved Human Retina.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2002'
  type: Journal Articles
  access: closed
  key: journals/pami/CanSRT02a
  doi: 10.1109/34.990145
