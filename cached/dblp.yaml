  ee: https://doi.org/10.1609/aaai.v40i4.37280
  url: https://dblp.org/rec/conf/aaai/ChenFX26
  abstract: 'Recent vision-language model (VLM)-based methods have achieved promising
    results in zero-shot out-of-distribution (OOD) detection by effectively leveraging
    the local patch features. However, the zero-shot nature inherently comes with
    two limitations: 1) imperfect local feature prototypes; 2) lack of OOD prototypes.
    In this paper, we propose Intra-Image Mining (IIM), a lightweight framework designed
    to overcome these limitations in a few-shot manner. IIM is motivated by the fact
    that local patches within an image often exhibit diverse semantics, with some
    patches deviating from the main class concept. Therefore, for each image, we first
    select the top-k class prototype-related patches as positive samples and leverage
    them to refine and optimize the local feature prototype. Then, the next top-k
    among the remaining patches are selected as negatives—serving as OOD signals to
    construct OOD prototypes. This process yields coherent local positives and challenging
    negatives, effectively enhancing the model’s local feature discrimination. Besides,
    we propose a novel inference strategy named Symmetric Maximum Concept Matching
    (S-MCM). While existing approaches typically adopt an image-to-text scheme—comparing
    the image features to textual class prototypes—S-MCM further incorporate a text-to-image
    perspective, leading to more reliable OOD detection. We also propose two benchmarks
    to analyze the impact of semantic diversity within ID dataset. Built on a frozen
    VLM, IIM, in conjunction with S-MCM, achieves consistent gains in OOD detection
    on ImageNet-1k and other benchmarks, outperforming prior methods in FPR95 and
    AUROC across various few-shot settings.'
  related_code: ''
- author: Yuxin Deng 0002, Botian Wang, Kaining Zhang, Hao Zhang 0073, Jiayi Ma 0001
  title: 'SGPFeat: Semantic and Geometric Priors for Multi-modal Image Matching.'
  venue: AAAI
  year: '2026'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/DengWZZM26
  doi: 10.1609/AAAI.V40I5.37355
  ee: https://doi.org/10.1609/aaai.v40i5.37355
  url: https://dblp.org/rec/conf/aaai/DengWZZM26
  abstract: Multi-modal image matching is a fundamental task in multi-view and multi-modal
    image processing. Its key challenge lies in extracting features that remain consistent
    despite drastic appearance variations across modalities. However, the learning
    of the feature is hindered by the scarcity and the inaccurate alignment of existing
    multi-modal datasets. To address this, we propose a knowledge distillation framework
    termed SGPFeat that transfers rich prior knowledge from large-scale unimodal tasks
    to enhance multi-modal representation learning. Specifically, semantic priors
    from a vision foundation model guide the feature extractor to identify shared
    semantic structures across modalities, enabling better generalization under large
    appearance gaps. In parallel, geometric priors derived from accurately aligned
    visible-light datasets improve detection precision on noisy aligned multi-modal
    pairs. Furthermore, we introduce a Heterogeneous Feature Aggregation (HFA) module
    to facilitate effective distillation and feature representation. Extensive experiments
    demonstrate that semantic and geometric priors bring significant improvement for
    our SGPFeat across diverse multi-modal image matching benchmarks.
  related_code: ''
- author: Fanding Li, Xiangyu Li 0004, Xianghe Su, Xingyu Qiu, Suyu Dong, Wei Wang
    0169, Kuanquan Wang, Gongning Luo, Shuo Li 0001
  title: Ambiguity-aware Truncated Flow Matching for Ambiguous Medical Image Segmentation.
  venue: AAAI
  year: '2026'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/LiLSQDWWLL26
  doi: 10.1609/AAAI.V40I8.37532
  ee: https://doi.org/10.1609/aaai.v40i8.37532
  url: https://dblp.org/rec/conf/aaai/LiLSQDWWLL26
  abstract: A simultaneous enhancement of accuracy and diversity of predictions remains
    a challenge in ambiguous medical image segmentation (AMIS) due to the inherent
    trade-offs. While truncated diffusion probabilistic models (TDPMs) hold strong
    potential with a paradigm optimization, existing TDPMs suffer from entangled accuracy
    and diversity of predictions with insufficient fidelity and plausibility. To address
    the aforementioned challenges, we propose Ambiguity-aware Truncated Flow Matching
    (ATFM), which introduces a novel inference paradigm and dedicated model components.
    Firstly, we propose Data-Hierarchical Inference, a redefinition of AMIS-specific
    inference paradigm, which enhances accuracy and diversity at data-distribution
    and data-sample level, respectively, for an effective disentanglement. Secondly,
    Gaussian Truncation Representation (GTR) is introduced to enhance both fidelity
    of predictions and reliability of truncation distribution, by explicitly modeling
    it as a Gaussian distribution at Ttrunc instead of using sampling-based approximations.
    Thirdly, Segmentation Flow Matching (SFM) is proposed to enhance the plausibility
    of diverse predictions by extending semantic-aware flow transformation in Flow
    Matching (FM). Comprehensive evaluations on LIDC and ISIC3 datasets demonstrate
    that ATFM outperforms SOTA methods and simultaneously achieves a more efficient
    inference. ATFM improves GED and HM-IoU by up to 12% and 7.3% compared to advanced
    methods.
  related_code: ''
- author: Zhen Liu 0022, Diedong Feng, Hai Jiang 0006, Liaoyuan Zeng, Hao Wang 0073,
    Chaoyu Feng, Lei Lei, Bing Zeng 0001, Shuaicheng Liu
  title: 'RAW-Flow: Advancing RGB-to-RAW Image Reconstruction with Deterministic Latent
    Flow Matching.'
  venue: AAAI
  year: '2026'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/LiuFJZWFLZL26
  doi: 10.1609/AAAI.V40I9.37682
  ee: https://doi.org/10.1609/aaai.v40i9.37682
  url: https://dblp.org/rec/conf/aaai/LiuFJZWFLZL26
  abstract: RGB-to-RAW reconstruction, or the reverse modeling of a camera Image Signal
    Processing (ISP) pipeline, aims to recover high-fidelity RAW data from RGB images.
    Despite notable progress, existing learning-based methods typically treat this
    task as a direct regression objective and still struggle with detail inconsistency
    and color deviation, due to the ill-posed nature of inverse ISP and the inherent
    information loss in quantized RGB images. To address these limitations, we pioneer
    a generative perspective by reformulating RGB-to-RAW reconstruction as a deterministic
    latent transport problem and introduce a novel framework named RAW-Flow, which
    leverages flow matching to learn a deterministic vector field in latent space,
    to effectively bridge the gap between RGB and RAW representations and enable accurate
    reconstruction of structural details and color information. To further enhance
    latent transport, we introduce a cross-scale context guidance module that injects
    hierarchical RGB features into the flow estimation process. Moreover, we design
    a Dual-domain Latent Autoencoder (DLAE) with a feature alignment constraint to
    support the proposed latent transport framework, which jointly encodes RGB and
    RAW inputs while promoting stable training and high-fidelity reconstruction. Extensive
    experiments demonstrate that RAW-Flow outperforms state-of-the-art approaches
    both quantitatively and visually.
  related_code: ''
- author: Pengxiang Ouyang, Qing Ma, Zheng Wang 0059, Cong Bai
  title: 'PMPGuard: Catching Pseudo-Matched Pairs in Remote Sensing Image-Text Retrieval.'
  venue: AAAI
  year: '2026'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/OuyangMWB26
  doi: 10.1609/AAAI.V40I10.37767
  ee: https://doi.org/10.1609/aaai.v40i10.37767
  url: https://dblp.org/rec/conf/aaai/OuyangMWB26
  abstract: Remote sensing (RS) image–text retrieval faces significant challenges
    in real-world datasets due to the presence of Pseudo-Matched Pairs (PMPs), semantically
    mismatched or weakly aligned image–text pairs, which hinder the learning of reliable
    cross-modal alignments. To address this issue, we propose a novel retrieval framework
    that leverages Cross-Modal Gated Attention and a Positive–Negative Awareness Attention
    mechanism to mitigate the impact of such noisy associations. The gated module
    dynamically regulates cross-modal information flow, while the awareness mechanism
    explicitly distinguishes informative (positive) cues from misleading (negative)
    ones during alignment learning. Extensive experiments on three benchmark RS datasets,
    i.e., RSICD, RSITMD, and RS5M, demonstrate that our method consistently achieves
    state-of-the-art performance, highlighting its robustness and effectiveness in
    handling real-world mismatches and PMPs in RS image–text retrieval tasks.
  related_code: ''
- author: Yuntian Bo, Yazhou Zhu 0001, Lunbo Li, Haofeng Zhang 0001
  title: 'FAMNet: Frequency-aware Matching Network for Cross-domain Few-shot Medical
    Image Segmentation.'
  venue: AAAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/BoZL025
  doi: 10.1609/AAAI.V39I2.32184
  ee: https://doi.org/10.1609/aaai.v39i2.32184
  url: https://dblp.org/rec/conf/aaai/BoZL025
  abstract: 'Existing few-shot medical image segmentation (FSMIS) models fail to address
    a practical issue in medical imaging: the domain shift caused by different imaging
    techniques, which limits the applicability to current FSMIS tasks. To overcome
    this limitation, we focus on the cross-domain few-shot medical image segmentation
    (CD-FSMIS) task, aiming to develop a generalized model capable of adapting to
    a broader range of medical image segmentation scenarios with limited labeled data
    from the novel target domain. Inspired by the characteristics of frequency domain
    similarity across different domains, we propose a Frequency-aware Matching Network
    (FAMNet), which includes two key components: a Frequency-aware Matching (FAM)
    module and a Multi-Spectral Fusion (MSF) module. The FAM module tackles two problems
    during the meta-learning phase: 1) intra-domain variance caused by the inherent
    support-query bias, due to the different appearances of organs and lesions, and
    2) inter-domain variance caused by different medical imaging techniques. Additionally,
    we design an MSF module to integrate the different frequency features decoupled
    by the FAM module, and further mitigate the impact of inter-domain variance on
    the model''s segmentation performance. Combining these two modules, our FAMNet
    surpasses existing FSMIS models and Cross-domain Few-shot Semantic Segmentation
    models on three cross-domain datasets, achieving state-of-the-art performance
    in the CD-FSMIS task.'
  related_code: ''
- author: Jiwan Chung, Seungwon Lim, Sangkyu Lee, Youngjae Yu
  title: 'MASS: Overcoming Language Bias in Image-Text Matching.'
  venue: AAAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ChungLLY25
  doi: 10.1609/AAAI.V39I3.32262
  ee: https://doi.org/10.1609/aaai.v39i3.32262
  url: https://dblp.org/rec/conf/aaai/ChungLLY25
  abstract: Pretrained visual-language models have made significant advancements in
    multimodal tasks, including image-text retrieval. However, a major challenge in
    image-text matching lies in language bias, where models predominantly rely on
    language priors and neglect to adequately consider the visual content. We thus
    present Multimodal ASsociation Score (MASS), a framework that reduces the reliance
    on language priors for better visual accuracy in image-text matching problems.
    It can be seamlessly incorporated into existing visual-language models without
    necessitating additional training. Our experiments have shown that \modelname
    effectively lessens language bias without losing an understanding of linguistic
    compositionality. Overall, MASS offers a promising solution for enhancing image-text
    matching performance in visual-language models.
  related_code: ''
- author: Zhao Zhou, Weizhong Zhang, Xiangcheng Du, Yingbin Zheng, Cheng Jin 0001
  title: 'Expanding the Scope of Negatives: Boosting Image-Text Matching with Negatives
    Distribution Guided Learning.'
  venue: AAAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ZhouZDZ025
  doi: 10.1609/AAAI.V39I10.33183
  ee: https://doi.org/10.1609/aaai.v39i10.33183
  url: https://dblp.org/rec/conf/aaai/ZhouZDZ025
  abstract: Image-text matching is a crucial task that bridges visual and linguistic
    modalities. Recent research typically formulates it into the problem of maximizing
    the margin with the truly hardest negatives to enhance the learning efficiency
    and avoid the poor local optima. We argue that such formulation can lead to a
    serious limitation, i.e., under this formulation, conventional trainers would
    confine their horizon within the hardest negative examples, while other negative
    examples offer a range of semantic differences not present in the hardest negatives.
    In this paper, we propose an efficient negative distribution guided training framework
    for image-text matching to unlock the substantial promotion space left by the
    above limitation. Rather than simply incorporating additional negative examples
    into the training objective, which could diminish both the leading role of the
    hardest negatives in training and the effect of a large margin learning in producing
    a robust matching model, our central idea is to supply the objective with distributional
    information on the entire set of negative examples. To be precise, we first construct
    the sample similarity matrix based on several pretrained models to extract the
    distributional information of the entire negative sample dataset. Then we encode
    it into a margin regularization module to smooth the similarities differences
    of all negatives. This enhancement facilitates the capture of fine-grained semantic
    differences and guides the main learning process by maximizing the margin with
    hard negative examples. Furthermore, we propose a hardest negative rectification
    module to address the instability in hardest negative selection based on predicted
    similarity and to correct erroneous hardest negatives. We evaluate our method
    in combination with several state-of-the-art image-text matching methods, and
    our quantitative and qualitative experiments demonstrate its significant generalizability
    and effectiveness.
  related_code: ''
- author: Cong Wang 0018, Jinshan Pan, Wei Wang 0335, Gang Fu, Siyuan Liang, Mengzhu
    Wang, Xiao-Ming Wu 0003, Jun Liu 0036
  title: Correlation Matching Transformation Transformers for UHD Image Restoration.
  venue: AAAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/0018P0FLWWL24
  doi: 10.1609/AAAI.V38I6.28341
  ee: https://doi.org/10.1609/aaai.v38i6.28341
  url: https://dblp.org/rec/conf/aaai/0018P0FLWWL24
  abstract: 'This paper proposes UHDformer, a general Transformer for Ultra-High-Definition
    (UHD) image restoration. UHDformer contains two learning spaces: (a) learning
    in high-resolution space and (b) learning in low-resolution space. The former
    learns multi-level high-resolution features and fuses low-high features and reconstructs
    the residual images, while the latter explores more representative features learning
    from the high-resolution ones to facilitate better restoration. To better improve
    feature representation in low-resolution space, we propose to build feature transformation
    from the high-resolution space to the low-resolution one. To that end, we propose
    two new modules: Dual-path Correlation Matching Transformation module (DualCMT)
    and Adaptive Channel Modulator (ACM). The DualCMT selects top C/r (r is greater
    or equal to 1 which controls the squeezing level) correlation channels from the
    max-pooling/mean-pooling high-resolution features to replace low-resolution ones
    in Transformers, which can effectively squeeze useless content to improve the
    feature representation in low-resolution space to facilitate better recovery.
    The ACM is exploited to adaptively modulate multi-level high-resolution features,
    enabling to provide more useful features to low-resolution space for better learning.
    Experimental results show that our UHDformer reduces about ninety-seven percent
    model sizes compared with most state-of-the-art methods while significantly improving
    performance under different training sets on 3 UHD image restoration tasks, including
    low-light image enhancement, image dehazing, and image deblurring. The source
    codes will be made available at https://github.com/supersupercong/UHDformer.'
  related_code: https://github.com/supersupercong/UHDformer
- author: Huatian Zhang 0001, Lei Zhang 0119, Kun Zhang 0040, Zhendong Mao 0001
  title: Identification of Necessary Semantic Undertakers in the Causal View for Image-Text
    Matching.
  venue: AAAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ZhangZZM24
  doi: 10.1609/AAAI.V38I7.28538
  ee: https://doi.org/10.1609/aaai.v38i7.28538
  url: https://dblp.org/rec/conf/aaai/ZhangZZM24
  abstract: Image-text matching bridges vision and language, which is a fundamental
    task in multimodal intelligence. Its key challenge lies in how to capture visual-semantic
    relevance. Fine-grained semantic interactions come from fragment alignments between
    image regions and text words. However, not all fragments contribute to image-text
    relevance, and many existing methods are devoted to mining the vital ones to measure
    the relevance accurately. How well image and text relate depends on the degree
    of semantic sharing between them. Treating the degree as an effect and fragments
    as its possible causes, we define those indispensable causes for the generation
    of the degree as necessary undertakers, i.e., if any of them did not occur, the
    relevance would be no longer valid. In this paper, we revisit image-text matching
    in the causal view and uncover inherent causal properties of relevance generation.
    Then we propose a novel theoretical prototype for estimating the probability-of-necessity
    of fragments, PN_f, for the degree of semantic sharing by means of causal inference,
    and further design a Necessary Undertaker Identification Framework (NUIF) for
    image-text matching, which explicitly formalizes the fragment's contribution to
    image-text relevance by modeling PN_f in two ways. Extensive experiments show
    our method achieves state-of-the-art on benchmarks Flickr30K and MSCOCO.
  related_code: ''
- author: Junyoung Seo, Gyuseong Lee, Seokju Cho, Jiyoung Lee 0005, Seungryong Kim
  title: 'MIDMs: Matching Interleaved Diffusion Models for Exemplar-Based Image Translation.'
  venue: AAAI
  year: '2023'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/SeoLCLK23
  doi: 10.1609/AAAI.V37I2.25313
  ee: https://doi.org/10.1609/aaai.v37i2.25313
  url: https://dblp.org/rec/conf/aaai/SeoLCLK23
  abstract: We present a novel method for exemplar-based image translation, called
    matching interleaved diffusion models (MIDMs). Most existing methods for this
    task were formulated as GAN-based matching-then-generation framework. However,
    in this framework, matching errors induced by the difficulty of semantic matching
    across cross-domain, e.g., sketch and photo, can be easily propagated to the generation
    step, which in turn leads to the degenerated results. Motivated by the recent
    success of diffusion models, overcoming the shortcomings of GANs, we incorporate
    the diffusion models to overcome these limitations. Specifically, we formulate
    a diffusion-based matching-and-generation framework that interleaves cross-domain
    matching and diffusion steps in the latent space by iteratively feeding the intermediate
    warp into the noising process and denoising it to generate a translated image.
    In addition, to improve the reliability of diffusion process, we design confidence-aware
    process using cycle-consistency to consider only confident regions during translation.
    Experimental results show that our MIDMs generate more plausible images than state-of-the-art
    methods.
  related_code: ''
- author: Huatian Zhang 0001, Zhendong Mao 0001, Kun Zhang 0040, Yongdong Zhang 0001
  title: 'Show Your Faith: Cross-Modal Confidence-Aware Network for Image-Text Matching.'
  venue: AAAI
  year: '2022'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ZhangMZ022
  doi: 10.1609/AAAI.V36I3.20235
  ee: https://doi.org/10.1609/aaai.v36i3.20235
  url: https://dblp.org/rec/conf/aaai/ZhangMZ022
  abstract: Image-text matching bridges vision and language, which is a crucial task
    in the field of multi-modal intelligence. The key challenge lies in how to measure
    image-text relevance accurately as matching evidence. Most existing works aggregate
    the local semantic similarities of matched region-word pairs as the overall relevance,
    and they typically assume that the matched pairs are equally reliable. However,
    although a region-word pair is locally matched across modalities, it may be inconsistent/unreliable
    from the global perspective of image-text, resulting in inaccurate relevance measurement.
    In this paper, we propose a novel Cross-Modal Confidence-Aware Network to infer
    the matching confidence that indicates the reliability of matched region-word
    pairs, which is combined with the local semantic similarities to refine the relevance
    measurement. Specifically, we first calculate the matching confidence via the
    relevance between the semantic of image regions and the complete described semantic
    in the image, with the text as a bridge. Further, to richly express the region
    semantics, we extend the region to its visual context in the image. Then, local
    semantic similarities are weighted with the inferred confidence to filter out
    unreliable matched pairs in aggregating. Comprehensive experiments show that our
    method achieves state-of-the-art performance on benchmarks Flickr30K and MSCOCO.
  related_code: ''
- author: Haiwen Diao, Ying Zhang 0021, Lin Ma, Huchuan Lu
  title: Similarity Reasoning and Filtration for Image-Text Matching.
  venue: AAAI
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/DiaoZML21
  doi: 10.1609/AAAI.V35I2.16209
  ee: https://doi.org/10.1609/aaai.v35i2.16209
  url: https://dblp.org/rec/conf/aaai/DiaoZML21
  abstract: Image-text matching plays a critical role in bridging the vision and language,
    and great progress has been made by exploiting the global alignment between image
    and sentence, or local alignments between regions and words. However, how to make
    the most of these alignments to infer more accurate matching scores is still underexplored.
    In this paper, we propose a novel Similarity Graph Reasoning and Attention Filtration
    (SGRAF) network for image-text matching. Specifically, the vector-based similarity
    representations are firstly learned to characterize the local and global alignments
    in a more comprehensive manner, and then the Similarity Graph Reasoning (SGR)
    module relying on one graph convolutional neural network is introduced to infer
    relation-aware similarities with both the local and global alignments. The Similarity
    Attention Filtration (SAF) module is further developed to integrate these alignments
    effectively by selectively attending on the significant and representative alignments
    and meanwhile casting aside the interferences of non-meaningful alignments. We
    demonstrate the superiority of the proposed method with achieving state-of-the-art
    performances on the Flickr30K and MSCOCO datasets, and the good interpretability
    of SGR and SAF with extensive qualitative experiments and analyses.
  related_code: ''
- author: Barak Itkin, Lior Wolf, Nachum Dershowitz
  title: 'Computational Visual Ceramicology: Matching Image Outlines to Catalog Sketches.'
  venue: AAAI
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ItkinWD21
  doi: 10.1609/AAAI.V35I17.17740
  ee: https://doi.org/10.1609/aaai.v35i17.17740
  url: https://dblp.org/rec/conf/aaai/ItkinWD21
  abstract: 'Field archeologists are called upon to identify potsherds, for which
    they rely on their professional experience and on reference works. We have developed
    a recognition method starting from images captured on site, which relies on the
    shape of the sherd''s fracture outline. The method sets up a new target for deep-learning,
    integrating information from points along inner and outer surfaces to learn about
    shapes. Training the classifiers required tackling multiple challenges that arose
    on account of our working with real-world archeological data: paucity of labeled
    data; extreme imbalance between instances of different categories; and the need
    to avoid neglecting rare classes and to take note of minute distinguishing features
    of some classes. The scarcity of training data was overcome by using synthetically-produced
    virtual potsherds and by employing multiple data-augmentation techniques. A novel
    form of training loss allowed us to overcome classification problems caused by
    under-populated classes and inhomogeneous distribution of discriminative features.'
  related_code: ''
- author: Zejun Li, Zhongyu Wei, Zhihao Fan, Haijun Shan, Xuanjing Huang 0001
  title: An Unsupervised Sampling Approach for Image-Sentence Matching Using Document-level
    Structural Information.
  venue: AAAI
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/LiWFSH21
  doi: 10.1609/AAAI.V35I15.17573
  ee: https://doi.org/10.1609/aaai.v35i15.17573
  url: https://dblp.org/rec/conf/aaai/LiWFSH21
  abstract: In this paper, we focus on the problem of unsupervised image-sentence
    matching. Existing research explores to utilize document-level structural information
    to sample positive and negative instances for model training. Although the approach
    achieves positive results, it introduces a sampling bias and fails to distinguish
    instances with high semantic similarity. To alleviate the bias, we propose a new
    sampling strategy to select additional intra-document image-sentence pairs as
    positive or negative samples. Furthermore, to recognize the complex pattern in
    intra-document samples, we propose a Transformer based model to capture fine-grained
    features and implicitly construct a graph for each document, where concepts in
    a document are introduced to bridge the representation learning of images and
    sentences in the context of a document. Experimental results show the effectiveness
    of our approach to alleviate the bias and learn well-aligned multimodal representations.
  related_code: ''
- author: Tianlang Chen, Jiebo Luo 0001
  title: 'Expressing Objects Just Like Words: Recurrent Visual Embedding for Image-Text
    Matching.'
  venue: AAAI
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ChenL20a
  doi: 10.1609/AAAI.V34I07.6631
  ee: https://doi.org/10.1609/aaai.v34i07.6631
  url: https://dblp.org/rec/conf/aaai/ChenL20a
  abstract: Existing image-text matching approaches typically infer the similarity
    of an image-text pair by capturing and aggregating the affinities between the
    text and each independent object of the image. However, they ignore the connections
    between the objects that are semantically related. These objects may collectively
    determine whether the image corresponds to a text or not. To address this problem,
    we propose a Dual Path Recurrent Neural Network (DP-RNN) which processes images
    and sentences symmetrically by recurrent neural networks (RNN). In particular,
    given an input image-text pair, our model reorders the image objects based on
    the positions of their most related words in the text. In the same way as extracting
    the hidden features from word embeddings, the model leverages RNN to extract high-level
    object features from the reordered object inputs. We validate that the high-level
    object features contain useful joint information of semantically related objects,
    which benefit the retrieval task. To compute the image-text similarity, we incorporate
    a Multi-attention Cross Matching Model into DP-RNN. It aggregates the affinity
    between objects and words with cross-modality guided attention and self-attention.
    Our model achieves the state-of-the-art performance on Flickr30K dataset and competitive
    performance on MS-COCO dataset. Extensive experiments demonstrate the effectiveness
    of our model.
  related_code: ''
- author: Fangyu Liu 0001, Rongtian Ye, Xun Wang, Shuaipeng Li
  title: 'HAL: Improved Text-Image Matching by Mitigating Visual Semantic Hubs.'
  venue: AAAI
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/LiuYWL20
  doi: 10.1609/AAAI.V34I07.6823
  ee: https://doi.org/10.1609/aaai.v34i07.6823
  url: https://dblp.org/rec/conf/aaai/LiuYWL20
  abstract: The hubness problem widely exists in high-dimensional embedding space
    and is a fundamental source of error for cross-modal matching tasks. In this work,
    we study the emergence of hubs in Visual Semantic Embeddings (VSE) with application
    to text-image matching. We analyze the pros and cons of two widely adopted optimization
    objectives for training VSE and propose a novel hubness-aware loss function (Hal)
    that addresses previous methods' defects. Unlike (Faghri et al. 2018) which simply
    takes the hardest sample within a mini-batch, Hal takes all samples into account,
    using both local and global statistics to scale up the weights of “hubs”. We experiment
    our method with various configurations of model architectures and datasets. The
    method exhibits exceptionally good robustness and brings consistent improvement
    on the task of text-image matching across all settings. Specifically, under the
    same model architectures as (Faghri et al. 2018) and (Lee et al. 2018), by switching
