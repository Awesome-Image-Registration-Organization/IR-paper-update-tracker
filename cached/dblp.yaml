- author: Zhibin He, Wuyang Li, Tianming Liu 0001, Xiang Li 0001, Junwei Han 0001,
    Tuo Zhang, Yixuan Yuan
  title: 'GAGM: Geometry-aware graph matching framework for weakly supervised gyral
    hinge correspondence.'
  venue: Medical Image Anal.
  year: '2026'
  type: Journal Articles
  access: closed
  key: journals/mia/HeLLLHZY26
  doi: 10.1016/J.MEDIA.2025.103820
  ee: https://doi.org/10.1016/j.media.2025.103820
  url: https://dblp.org/rec/journals/mia/HeLLLHZY26
  abstract: 'Achieving precise alignment of inter-subject brain landmarks, such as
    the gyral hinge (GH), would enhance the correspondence of brain function across
    subjects, thereby advancing our understanding of brain anatomy-function relationship
    and brain mechanisms. Recent methods mainly focus on identifying the correspondences
    of GHs by utilizing point-to-point ground truth. However, labeling point-to-point
    GH correspondences between subjects for the entire brain is laborious and time-consuming,
    given the presence of over 400 GHs per brain. To remedy this problem, we propose
    a Geometry-Aware Graph Matching framework, dubbed GAGM, for weakly supervised
    gyral hinge correspondence solely based on brain prior information. Specifically,
    we propose a Shape-Aware Graph Establishment (SAGE) module to ensure a comprehensive
    representation of geometry features in GH. SAGE constructs a structured graph
    by incorporating GH coordinates, shapes, and inter-GH relationships to model entire
    brain GHs and learns the spatial relation between them. Moreover, to reduce the
    optimization difficulties, Region-Aware Graph Matching (RAGM) module is proposed
    for multi-scale matching. RAGM leverages prior knowledge of the multi-scale relationship
    between GHs and brain regions and incorporates inter-scale semantic consistency
    to ensure both intra-region consistency and inter-region variability of GH features,
    ultimately achieving accurate GH matching. Extensive experiments on two public
    datasets, HCP and CHCP, demonstrate the superiority of our method over state-of-the-art
    methods. Our code: https://github.com/ZhibinHe/GAGM.'
  related_code: https://github.com/ZhibinHe/GAGM
- author: Chen Zhao, Michele Esposito, Zhihui Xu, Weihua Zhou
  title: 'HAGMN-UQ: Hyper association graph matching network with uncertainty quantification
    for coronary artery semantic labeling.'
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/ZhaoEXZ25
  doi: 10.1016/J.MEDIA.2024.103374
  ee: https://doi.org/10.1016/j.media.2024.103374
  url: https://dblp.org/rec/journals/mia/ZhaoEXZ25
  abstract: Coronary artery disease (CAD) is one of the leading causes of death worldwide.
    Accurate extraction of individual arterial branches from invasive coronary angiograms
    (ICA) is critical for CAD diagnosis and detection of stenosis. Generating semantic
    segmentation for coronary arteries through deep learning-based models presents
    challenges due to the morphological similarity among different types of coronary
    arteries, making it difficult to maintain high accuracy while keeping low computational
    complexity. To address this challenge, we propose an innovative approach using
    the hyper association graph-matching neural network with uncertainty quantification
    (HAGMN-UQ) for coronary artery semantic labeling on ICAs. The graph-matching procedure
    maps the arterial branches between two individual graphs, so that the unlabeled
    arterial segments are classified by the labeled segments, and the coronary artery
    semantic labeling is achieved. Leveraging hypergraphs not only extends representation
    capabilities beyond pairwise relationships, but also improves the robustness and
    accuracy of the graph matching by enabling the modeling of higher-order associations.
    In addition, employing the uncertainty quantification to determine the trustworthiness
    of graph matching reduces the required number of comparisons, so as to accelerate
    the inference speed. Consequently, our model achieved an accuracy of 0.9211 for
    coronary artery semantic labeling with a fast inference speed, leading to an effective
    and efficient prediction in real-time clinical decision-making scenarios.
