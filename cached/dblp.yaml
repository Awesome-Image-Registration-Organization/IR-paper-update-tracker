- author: Quangui He, Jiahui Qu, Wenqian Dong, Song Xiao 0001, Qinghao Gao
  title: Cycle-Consistent Mamba-Based Registration-Fusion Joint Network for Unregistered
    Hyperspectral Image Super-Resolution.
  venue: ACM Multimedia
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/HeQD0G25
  doi: 10.1145/3746027.3755406
  ee: https://doi.org/10.1145/3746027.3755406
  url: https://dblp.org/rec/conf/mm/HeQD0G25
  abstract: Hyperspectral image super-resolution (HSI-SR) has attracted significant
    attention in high-resolution HSI reconstruction. Most existing fusion-based HSI-SR
    methods assume that multi-source images are perfectly registered, which is impractical
    due to varying imaging conditions. Furthermore, methods that consider the registration
    issue typically treat registration and fusion as two separate steps, resulting
    in the accumulation of registration errors during the fusion process. To address
    these issues, we propose a Cycle-Consistent Mamba-Based Registration-Fusion Joint
    Network (CCM-RFJN), which step-wise optimizes the Registration-Fusion Unified
    Module (RFUM) through multiple cyclic iterative SR processes. Specifically, in
    each SR iteration, we map the super-resolved HR-HSI obtained through the RFUM
    back to the unregistered LR-HSI for the next SR, with cycle-consistency constraints
    imposed on both LR-HSI and HR-HSI to adaptively optimize the RFUM based on the
    reciprocal training strategy. In RFUM, we integrate the proposed Interactive Mamba
    Registration Module (IMR) and Dual-attention Mamba Fusion Module (DAMF), thereby
    achieving registration-fusion joint optimization. Specifically, IMR is developed
    to incorporate the interactive Mamba encoder into a pyramid architecture to facilitate
    multi-level information interactions, generating the deformation field to correct
    non-rigid misalignments. DAMF is designed to utilize the dual-attention Mamba
    mechanism to highlight and aggregate key features, thereby enhancing fusion performance.
    Experiments on three public datasets demonstrate that CCM-RFJN achieves the state-of-the-art
    performance. The code is available at https://github.com/Jiahuiqu/CCM-RFJN.
  related_code: https://github.com/Jiahuiqu/CCM-RFJN
- author: Kyungjune Lee, Seongjean Kim, Hoseok Tong, Hyucksang Lee, Seongmin Lee 0002,
    Weisi Lin, Ping An, Sanghoon Lee 0001
  title: Domain Crossover Non-Rigid Registration for 3D Human Meshes.
  venue: ACM Multimedia
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/LeeKTL0LA025
  doi: 10.1145/3746027.3754705
  ee: https://doi.org/10.1145/3746027.3754705
  url: https://dblp.org/rec/conf/mm/LeeKTL0LA025
  abstract: 'Non-rigid registration is essential for reconstructing dynamic and incomplete
    3D human meshes, yet traditional methods often fail to achieve robust alignment
    in the sequence of high-motion deformations and missing geometry. We propose a
    domain crossover non-rigid registration (DCNRR) framework that addresses these
    challenges by effectively transferring informative features from 2D image space
    into the 3D mesh domain of three key stages: multi-view projection, hierarchical
    non-rigid registration, and topology-consistent completion. In the first stage,
    multi-view projections are used to extract 2D joint locations and deep features,
    which guide deformation in the 3D space. In the second stage, hierarchical joint
    priors and deep features collaboratively guide mesh alignment, enabling more accurate
    deformation in distal regions and complex poses. In the final stage, we apply
    a diffusion-based completion process in UV coordinates to reconstruct incomplete
    surface normals and refine missing mesh areas with topological consistency. Our
    approach achieves highly detailed and perceptually accurate mesh deformation.
    To validate our approach, we evaluate performance on a newly constructed dynamic
    human motion (DHM) dataset, as well as public datasets. Our method demonstrates
    state-of-the-art results in both geometric accuracy and stability, showing particular
    robustness in dynamic and incomplete mesh sequences.'
  related_code: ''
- author: Yating Liu, Yang Zou 0004, Xingyuan Li 0005, Xingyue Zhu, Kaiqi Han, Zhiying
    Jiang, Long Ma 0002, Jinyuan Liu 0001
  title: Toward a Training-Free Plug-and-Play Refinement Framework for Infrared and
    Visible Image Registration and Fusion.
  venue: ACM Multimedia
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/Liu00ZHJ0025
  doi: 10.1145/3746027.3755087
  ee: https://doi.org/10.1145/3746027.3755087
  url: https://dblp.org/rec/conf/mm/Liu00ZHJ0025
  abstract: Infrared and Visible Image Fusion (IVIF) under unregistered conditions
    has been of great interest in various visual tasks under challenging environments.
    While existing approaches often demonstrate promising results on specific benchmarks,
    they tend to exhibit performance drops in unseen scenarios and incur high computational
    overhead when retrained on new datasets. To address these challenges, we propose
    TRACE, a Training-free Reinforcement-based Alignment method for Cross-modality
    Enhancement, which incorporates Evaluator, a rewarding network, into an evaluation-driven
    Reinforcement Learning (RL) framework, enabling efficient and plug-and-play refinement
    of any existing registration approach. Specifically, TRACE constructs the Evaluator
    network to assess the alignment quality of the given registration model, generating
    confidence scores and adjustment masks via spatial and channel attention. Leveraging
    these cues as RL rewards, TRACE iteratively refines the registration network to
    mitigate misalignments until the accumulated improvement is satisfied. Due to
    its training-free and plug-and-play nature, TRACE notably enhances fusion results
    across diverse and unseen scenarios. TRACE achieves impressive improvements in
    different methods across diverse datasets with minimal computational cost. The
    project page is available at https://github.com/pubyLu/TRACE.
  related_code: https://github.com/pubyLu/TRACE
- author: Sidun Liu, Wenyu Li, Peng Qiao, Yong Dou
  title: 'Regist3R: Incremental Registration with Stereo Foundation Model.'
  venue: ACM Multimedia
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/LiuLQD25
  doi: 10.1145/3746027.3755466
  ee: https://doi.org/10.1145/3746027.3755466
  url: https://dblp.org/rec/conf/mm/LiuLQD25
  abstract: Multi-view 3D reconstruction has remained an essential yet challenging
    problem in the field of computer vision. While DUSt3R and its successors have
    achieved breakthroughs in 3D reconstruction from unposed images, these methods
    exhibit significant limitations when scaling to multi-view scenarios, including
    high computational cost and cumulative error induced by global alignment. To address
    these challenges, we propose Regist3R, a novel stereo foundation model tailored
    for efficient and scalable incremental reconstruction. Regist3R leverages an incremental
    reconstruction paradigm, enabling large-scale 3D reconstructions from unordered
    and many-view image collections. We evaluate Regist3R on public datasets for camera
    pose estimation and 3D reconstruction. Our experiments demonstrate that Regist3R
    achieves comparable performance with optimization-based methods while significantly
    improving computational efficiency, and outperforms existing multi-view reconstruction
    models. Furthermore, to assess its performance in real-world applications, we
    introduce a challenging oblique aerial dataset which has long spatial spans and
    hundreds of views. The results highlight the effectiveness of Regist3R. We also
    demonstrate the first attempt to reconstruct large-scale scenes encompassing over
    thousands of views through pointmap-based foundation models, showcasing its potential
    for practical applications in large-scale 3D reconstruction tasks, including urban
    modeling, aerial mapping, and beyond.
  related_code: ''
- author: Jingtao Wang, Zechao Li
  title: '3DPCP-Net: A Lightweight Progressive 3D Correspondence Pruning Network for
    Accurate and Efficient Point Cloud Registration.'
  venue: ACM Multimedia
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/WangL24
  doi: 10.1145/3664647.3681320
  ee: https://doi.org/10.1145/3664647.3681320
  url: https://dblp.org/rec/conf/mm/WangL24
  abstract: Accurately identifying correct correspondence (inlier) within initial
    ones is pivotal for robust feature-based point cloud registration. Current methods
    typically rely on one-shot 3D correspondence classification with a single coherence
    constraint to obtain inlier. These approaches are either insufficiently accurate
    or inefficient, often requiring more network parameters. To address this issue,
    we propose a lightweight network, 3DPCP-Net, for fast and robust registration.
    Its core design lies in progressive correspondence pruning through mining deep
    spatial geometric coherence, which can effectively learn pairwise 3D spatial distance
    and angular features to progressively remove outlier (mismatched correspondence)
    for accurate pose estimation. Moreover, we also propose an efficient feature-based
    hypothesis proposer that leverages the geometric consistency features to generate
    reliable model hypotheses for each reliable correspondence explicitly. Extensive
    experiments on 3DMatch, 3DLoMatch, KITTI and Augmented ICL-NUIM demonstrate the
    accurate and efficient of our method for outlier removal and pose estimation tasks.
    Furthermore, our method is highly versatile and can be easily integrated into
    both learning-based and geometry-based frameworks, enabling them to achieve state-of-the-art
    results. Code is available at https://github.com/jtw220/3DPCP-Net.
  related_code: https://github.com/jtw220/3DPCP-Net
- author: Lijian Yang, Weisheng Li 0001, Yucheng Shu, Jian-Xun Mi, Yuping Huang, Bin
    Xiao 0002
  title: 'ShiftMorph: A Fast and Robust Convolutional Neural Network for 3D Deformable
    Medical Image Registration.'
  venue: ACM Multimedia
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/Yang0SMH024
  doi: 10.1145/3664647.3680828
  ee: https://doi.org/10.1145/3664647.3680828
  url: https://dblp.org/rec/conf/mm/Yang0SMH024
  abstract: Deformable image registration (DIR) is crucial for many medical image
    applications. In recent years, learning-based methods utilizing the convolutional
    neural network (CNN) or the Transformer have demonstrated their superiority in
    image registration, dominating a new era for DIR. However, very few of these methods
    can satisfy the demands of real-time applications due to the high spatial resolution
    of 3D volumes and the high complexity of 3D operators. To tackle this, we propose
    losslessly downsampling by shifting the strided convolution. A grouping strategy
    is then used to reduce redundant computations and support self-consistency learning.
    As an inherent regularizer of the network design, self-consistency learning improves
    the deformation quality and enables halving the proposed network after training.
    Furthermore, the proposed shifted connection converts the decoding operations
    into a lower-dimensional space, significantly reducing decoding overhead. Extensive
    experimental results on medical image registration demonstrate that our method
    is competitive with state-of-the-art methods in terms of registration performance,
    and additionally, it achieves over 3× the speed of most of them.
  related_code: ''
- author: Weiguang Zhang, Qiufeng Wang 0001, Kaizhu Huang, Xiaowei Huang 0001, Fengjun
    Guo, Xiaomeng Gu
  title: 'Document Registration: Towards Automated Labeling of Pixel-Level Alignment
    Between Warped-Flat Documents.'
  venue: ACM Multimedia
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/Zhang0H0GG24
  doi: 10.1145/3664647.3681548
  ee: https://doi.org/10.1145/3664647.3681548
  url: https://dblp.org/rec/conf/mm/Zhang0H0GG24
  abstract: Photographed documents are prevalent but often suffer from deformations
    like curves or folds, hindering readability. Consequently, document dewarping
    has been widely studied, however its performance is still not satisfied due to
    lack of real training samples with pixel-level annotation. To obtain the pixel-level
    labels, we leverage a document registration pipeline to automatically align warped-flat
    documents. Unlike general image registration works, registering documents poses
    unique challenges due to their severe deformations and fine-grained textures.
    In this paper, we introduce a coarse-to-fine framework including a coarse registration
    network (CRN) aiming to eliminate severe deformations then a fine registration
    network (FRN) focusing on fine-grained features. In addition, we utilize self-supervised
    learning to initialize our document registration model, where we propose a cross-reconstruction
    pre-training task on the pair of warped-flat documents. Extensive experiments
    show that we can achieve satisfied document registration performance, consequently
    obtaining a high-quality registered document dataset with pixel-level annotation.
    Without bells and whistles, we re-train two popular document dewarping models
    on our registered document dataset WarpDoc-R, and obtain superior performance
    with those using almost 100× scale of synthetic training data, verifying the label
    quality of our document registration method.
  related_code: ''
- author: Boyang Wang 0003, Yan Wang 0068, Qing Zhao 0007, Junxiong Lin, Zeng Tao,
    Pinxue Guo, Zhaoyu Chen 0001, Kaixun Jiang, Shaoqi Yan, Shuyong Gao, Wenqiang
    Zhang
  title: A Capture to Registration Framework for Realistic Image Super-Resolution
    in the Industry Environment.
  venue: ACM Multimedia
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/WangWZLTGCJYGZ23
  doi: 10.1145/3581783.3611973
  ee: https://doi.org/10.1145/3581783.3611973
  url: https://dblp.org/rec/conf/mm/WangWZLTGCJYGZ23
  abstract: The acquisition and processing of visual data in industrial environments
    are of paramount importance. High-resolution (HR) images offer superior clarity
    and richer textural detail compared to low-resolution (LR) images. On the one
    hand, owing to the incorporation of richer information, HR images demonstrate
    substantially enhanced performance compared to LR images in downstream applications,
    such as anomaly detection. On the other hand, they provide valuable insights to
    designers and quality inspectors who require a detailed understanding of the images.
    Currently, the majority of research on super-resolution focuses on natural scenes
    such as cities and fields, however, the development of datasets for industrial
    scenes is still in its infancy. To address the image distortion in building realistic
    LR-HR image pairs in the industry environment, we design a capture to registration
    framework. It consists of the standard imaging system, physical calibration of
    the imaging system, as well as the rigid to elastic registration of the LR-HR
    image pairs. Thus, we build the first realistic industrial sence super-resolution
    dataset (IndSR), comprises of 50 sets of calibrated images with three scale factors
    and five typical defects. To benchmark IndSR, we employ quantitative, qualitative,
    and task-oriented studies to evaluate the representative super-resolution and
    anomaly detection methods. Besides, we systematically investigate and discuss
    the performances and results of the existing SISR methods to advance research
    in the field of super-resolution in industry environment. The IndSR dataset can
    be available from https://byw4ng.github.io/IndSR/.
  related_code: ''
- author: Tingting Wang 0007, Yongxu Ye, Faming Fang, Guixu Zhang, Ming Xu 0010
  title: Deep Algorithm Unrolling with Registration Embedding for Pansharpening.
  venue: ACM Multimedia
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/WangYFZX23
  doi: 10.1145/3581783.3613754
  ee: https://doi.org/10.1145/3581783.3613754
  url: https://dblp.org/rec/conf/mm/WangYFZX23
  abstract: Pansharpening aims to sharpen low resolution (LR) multispectral (MS) images
    with the help of corresponding high resolution (HR) panchromatic (PAN) images
    to obtain HRMS images. Model-based pansharpening methods manually design objective
    functions via observation model and hand-crafted priors. However, inevitable performance
    degradation may occur in the case that the prior is invalid. Although many deep
    learning based end-to-end pansharpening methods have been proposed recently, they
    still need to be improved due to the insufficient study on HRMS related domain
    knowledge. Besides, existing pansharpening methods rarely consider the misalignments
    between MS and PAN images, leading to poor performance. To tackle these issues,
    this paper proposes to unrolling the observation model with registration embedding
    for pansharpening. Inspired by the optical flow estimation, we embed the registration
    operation into the observation model to reconstruct the pansharpening function
    with the help of a deep prior of HRMS images, and then unroll the iterative solution
    into a novel deep convolutional network.. Apart from the single HRMS supervision,
    we also introduce a consistency loss to supervise the two degradation processes.
    The use of consistency loss enables the degradation sub-networks to learn more
    realistic degradation. Experimental results at reduced-resolution and full-resolution
    are reported to demonstrate the superiority of the proposed method to other state-of-the-art
    pansharpening methods. In GaoFen-2 dataset evaluation, our method achieves 1.2dB
    higher PSNR than SOTA techniques.
  related_code: ''
- author: Haiping Wang 0004, Yuan Liu 0025, Zhen Dong 0005, Wenping Wang 0001
  title: 'You Only Hypothesize Once: Point Cloud Registration with Rotation-equivariant
    Descriptors.'
  venue: ACM Multimedia
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/WangLDW22
  doi: 10.1145/3503161.3548023
  ee: https://doi.org/10.1145/3503161.3548023
  url: https://dblp.org/rec/conf/mm/WangLDW22
  abstract: 'In this paper, we propose a novel local descriptor-based framework, called
    You Only Hypothesize Once (YOHO), for the registration of two unaligned point
    clouds. In contrast to most existing local descriptors which rely on a fragile
    local reference frame to gain rotation invariance, the proposed descriptor achieves
    the rotation invariance by recent technologies of group equivariant feature learning,
    which brings more robustness to point density and noise. Meanwhile, the descriptor
    in YOHO also has a rotation-equivariant part, which enables us to estimate the
    registration from just one correspondence hypothesis. Such property reduces the
    searching space for feasible transformations, thus greatly improving both the
    accuracy and the efficiency of YOHO. Extensive experiments show that YOHO achieves
    superior performances with much fewer needed RANSAC iterations on four widely-used
    datasets, the 3DMatch/3DLoMatch datasets, the ETH dataset and the WHU-TLS dataset.
    More details are shown in our project page: https://hpwang-whu.github.io/YOHO/.'
  related_code: ''
- author: Zijie Yang, Lingxi Xie, Xinyue Huo, Sheng Tang, Qi Tian 0001, Yongdong Zhang
    0001
  title: Finding the Host from the Lesion by Iteratively Mining the Registration Graph.
  venue: ACM Multimedia
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/YangXHT0022
  doi: 10.1145/3503161.3548192
  ee: https://doi.org/10.1145/3503161.3548192
  url: https://dblp.org/rec/conf/mm/YangXHT0022
  abstract: Voxel-level annotation has always been a burden of training medical image
    segmentation models. This paper investigates an interesting problem that finds
    the host organ of a lesion without actually labeling the organ. To remedy the
    missing annotation, we construct a graph using an off-the-shelf registration algorithm,
    on which lesion labels over the training set are accumulated to obtain the pseudo
    organ for each case. These pseudo labels are used to train a deep network, whose
    predictions determine the affinity of each lesion on the registration graph. We
    iteratively update the pseudo labels with the affinity until the training convergence.
    Our method is evaluated on the MSD Liver and KiTS datasets, without seeing any
    organ annotation, we achieve the test Dice score of 93% for liver and 92% for
    kidney, and boosts the accuracy of tumor segmentation to a considerable degree,
    $3%$, which even surpasses the model trained with ground-truth of both organ and
    tumor.
  related_code: ''
- author: Axel Schaffland, Tri Hiep Bui, Oliver Vornberger, Gunther Heidemann
  title: New Interactive Methods for Image Registration with Applications in Repeat
    Photography.
  venue: SUMAC @ ACM Multimedia
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/SchafflandBVH20
  doi: 10.1145/3423323.3425749
  ee: https://doi.org/10.1145/3423323.3425749
  url: https://dblp.org/rec/conf/mm/SchafflandBVH20
  abstract: We present two methods to interactively register images, which can not
    be registered automatically due to the large differences between them. Those difference
    may occur with images which are multitemporal, multisensory, or multipositional.
    Our methods are used to register repeat photography compilations consisting of
    a historic image and a contemporary image of the same scene. Method I iteratively
    computes a rigid transformation registering the two images based on user added
    point pairs. More complex transformations are generated with more added point
    pairs starting from a translation with one point pair to an optimized perspective
    transformation with more than four user added point pairs. Method II allows users
    to grab and drag one of the images to be registered and pin it to the second image.
    Depending on the number of positions at which the images are pinned together more
    complex transformations are computed. Further we present a third method aiding
    already at the creation of the second image. Method III allows the user to compare
    a life camera stream (e.g. from a smartphone camera or webcam) with a first image
    using different composition forms such allowing users to check if they reached
    the camera position of the first image. All methods give direct feedback to the
    user during the registration process and run on client side on a web browser without
    additional software. Further, they are planned to be integrated into our repeat
    photography web portal.
