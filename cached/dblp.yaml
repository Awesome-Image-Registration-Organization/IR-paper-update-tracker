- author: Yancong Lin, Holger Caesar
  title: 'ICP-Flow: LiDAR Scene Flow Estimation with ICP.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/LinC24
  doi: 10.1109/CVPR52733.2024.01468
  ee: https://doi.org/10.1109/CVPR52733.2024.01468
  url: https://dblp.org/rec/conf/cvpr/LinC24
  abstract: Scene flow characterizes the 3D motion between two Li-DAR scans captured
    by an autonomous vehicle at nearby timesteps. Prevalent methods consider scene
    flow as point-wise unconstrained flow vectors that can be learned by either large-scale
    training beforehand or time-consuming optimization at inference. However, these
    methods do not take into account that objects in autonomous driving often move
    rigidly. We incorporate this rigid-motion assumption into our design, where the
    goal is to associate objects over scans and then estimate the locally rigid transformations.
    We propose ICP-Flow, a learning-free flow estimator. The core of our design is
    the conventional Iterative Closest Point (ICP) algorithm, which aligns the objects
    over time and outputs the corresponding rigid transformations. Crucially, to aid
    ICP, we propose a histogram-based initialization that discovers the most likely
    translation, thus providing a good starting point for ICP. The complete scene
    flow is then recovered from the rigid transformations. We outperform state-of-the-art
    baselines, including supervised models, on the Waymo dataset and perform competitively
    on Argoverse-v2 and nuScenes. Further, we train a feedforward neural network,
    supervised by the pseudo labels from our model, and achieve top performance among
    all models capable of real-time inference. We validate the advantage of our model
    on scene flow estimation with longer temporal gaps, up to 0.4 seconds where other
    models fail to deliver meaningful results.
  related_code: ''
- author: Xin Luo, Xueming Fu, Zihang Jiang, S. Kevin Zhou
  title: 'ICP: Immediate Compensation Pruning for Mid-to-high Sparsity.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/LuoFJZ25
  doi: 10.1109/CVPR52734.2025.00886
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Luo_ICP_Immediate_Compensation_Pruning_for_Mid-to-high_Sparsity_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/LuoFJZ25
  abstract: The increasing adoption of large-scale models under 7 billion parameters
    in both language and vision domains enables inference tasks on a single consumer-grade
    GPU but makes fine-tuning models of this scale, especially 7B models, challenging.
    This limits the applicability of pruning methods that require full fine-tuning.
    Meanwhile, pruning methods that do not require fine-tuning perform well at low
    sparsity levels (10%-50%) but struggle at mid-to-high sparsity levels (50%-70%),
    where the error behaves equivalently to that of semi-structured pruning. To address
    these issues, this paper introduces ICP, which finds a balance between full fine-tuning
    and zero fine-tuning. First, Sparsity Rearrange is used to reorganize the predefined
    sparsity levels, followed by Block-wise Compensate Pruning, which alternates pruning
    and compensation on the model’s backbone, fully utilizing inference results while
    avoiding full model fine-tuning. Experiments show that ICP improves performance
    at mid-to-high sparsity levels compared to baselines, with only a slight increase
    in pruning time and no additional peak memory overhead.
  related_code: ''
- author: Hamid Izadinia, Steven M. Seitz
  title: Scene Recomposition by Learning-Based ICP.
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/IzadiniaS20
  doi: 10.1109/CVPR42600.2020.00101
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Izadinia_Scene_Recomposition_by_Learning-Based_ICP_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/IzadiniaS20
  abstract: By moving a depth sensor around a room, we compute a 3D CAD model of the
    environment, capturing the room shape and contents such as chairs, desks, sofas,
    and tables. Rather than reconstructing geometry, we match, place, and align each
    object in the scene to thousands of CAD models of objects. In addition to the
    fully automatic system, the key technical contribution is a novel approach for
    aligning CAD models to 3D scans, based on deep reinforcement learning. This approach,
    which we call Learning-based ICP, outperforms prior ICP methods in the literature,
    by learning the best points to match and conditioning on object viewpoint. LICP
    learns to align using only synthetic data and does not require ground truth annotation
    of object pose or keypoint pair matching in real scene scans. While LICP is trained
    on synthetic data and without 3D real scene annotations, it outperforms both learned
    local deep feature matching and geometric based alignment methods in real scenes.
    The proposed method is evaluated on real scenes datasets of SceneNN and ScanNet
    as well as synthetic scenes of SUNCG. High quality results are demonstrated on
    a range of real world scenes, with robustness to clutter, viewpoint, and occlusion.
  related_code: ''
