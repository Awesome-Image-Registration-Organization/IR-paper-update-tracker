- author: Zekun Qian, Wei Feng 0005, Feifan Wang, Ruize Han
  title: 'BEVTrack: Multi-View Multi-Human Registration and Tracking in the Bird&apos;s
    Eye View.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2026'
  type: Journal Articles
  access: closed
