- author: Tianli Liao, Chenyang Zhao, Lei Li 0065, Heling Cao
  title: Leveraging Local Patch Alignment to Seam-Cutting for Large Parallax Image
    Stitching.
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LiaoZLC25
  doi: 10.1109/ICCV51701.2025.02531
  ee: https://doi.org/10.1109/ICCV51701.2025.02531
  url: https://dblp.org/rec/conf/iccv/LiaoZLC25
  abstract: Seam cutting has shown significant effectiveness in the composition phase
    of image stitching, particularly for scenarios involving parallax. However, conventional
    implementations typically position seam-cutting as a downstream process contingent
    upon successful image alignment. This approach inherently assumes the existence
    of locally aligned regions where visually plausible seams can be established.
    Current alignment methods frequently fail to satisfy this prerequisite in large
    parallax scenarios despite considerable research efforts dedicated to improving
    alignment accuracy. In this paper, we propose an alignment-compensation paradigm
    that dissociates seam quality from initial alignment accuracy by integrating a
    Local Patch Alignment Module (LPAM) into the seam-cutting pipeline. Concretely,
    given the aligned images with an estimated initial seam, our method first identifies
    low-quality pixels along the seam through a seam quality assessment, then performs
    localized SIFT-flow alignment on the critical patches enclosing these pixels.
    Finally, we recomposite the aligned patches using adaptive seam-cutting and merge
    them into the original aligned images to generate the final mosaic. Comprehensive
    experiments on large parallax stitching datasets demonstrate that LPAM significantly
    enhances stitching quality while maintaining computational efficiency. The code
    is available at https://github.com/tlliao/LPAM_seam-cutting.
  related_code: https://github.com/tlliao/LPAM_seam-cutting
- author: Lang Nie, Chunyu Lin, Kang Liao, Shuaicheng Liu, Yao Zhao 0001
  title: Parallax-Tolerant Unsupervised Deep Image Stitching.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/NieLLLZ23
  doi: 10.1109/ICCV51070.2023.00680
  ee: https://doi.org/10.1109/ICCV51070.2023.00680
  url: https://dblp.org/rec/conf/iccv/NieLLLZ23
  abstract: Traditional image stitching approaches tend to leverage increasingly complex
    geometric features (e.g., point, line, edge, etc.) for better performance. However,
    these hand-crafted features are only suitable for specific natural scenes with
    adequate geometric structures. In contrast, deep stitching schemes overcome adverse
    conditions by adaptively learning robust semantic features, but they cannot handle
    large-parallax cases.To solve these issues, we propose a parallax-tolerant unsupervised
    deep image stitching technique. First, we propose a robust and flexible warp to
    model the image registration from global homography to local thin-plate spline
    motion. It provides accurate alignment for overlapping regions and shape preservation
    for non-overlapping regions by joint optimization concerning alignment and distortion.
    Subsequently, to improve the generalization capability, we design a simple but
    effective iterative strategy to enhance the warp adaption in cross-dataset and
    cross-resolution applications. Finally, to further eliminate the parallax artifacts,
    we propose to composite the stitched image seamlessly by unsupervised learning
    for seam-driven composition masks. Compared with existing methods, our solution
    is parallax-tolerant and free from laborious designs of complicated geometric
    features for specific scenes. Extensive experiments show our superiority over
    the SoTA methods, both quantitatively and qualitatively. The code is available
    at https://github.com/nie-lang/UDIS2.
  related_code: https://github.com/nie-lang/UDIS2
- author: Cheng Zhang 0014, Tai-Yu Pan, Yandong Li, Hexiang Hu, Dong Xuan, Soravit
    Changpinyo, Boqing Gong, Wei-Lun Chao
  title: 'MosaicOS: A Simple and Effective Use of Object-Centric Images for Long-Tailed
    Object Detection.'
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ZhangPLHXCGC21
  doi: 10.1109/ICCV48922.2021.00047
  ee: https://doi.org/10.1109/ICCV48922.2021.00047
  url: https://dblp.org/rec/conf/iccv/ZhangPLHXCGC21
  abstract: 'Many objects do not appear frequently enough in complex scenes (e.g.,
    certain handbags in living rooms) for training an accurate object detector, but
    are often found frequently by themselves (e.g., in product images). Yet, these
    object-centric images are not effectively leveraged for improving object detection
    in scene-centric images. In this paper, we propose Mosaic of Object-centric images
    as Scene-centric images (MosaicOS), a simple and novel framework that is surprisingly
    effective at tackling the challenges of long-tailed object detection. Keys to
    our approach are three-fold: (i) pseudo scene-centric image construction from
    object-centric images for mitigating domain differences, (ii) high-quality bounding
    box imputation using the object-centric images’ class labels, and (iii) a multi-stage
    training procedure. On LVIS object detection (and instance segmentation), MosaicOS
    leads to a massive 60% (and 23%) relative improvement in average precision for
    rare object categories. We also show that our framework can be compatibly used
    with other existing approaches to achieve even further gains. Our pre-trained
    models are publicly available at https://github.com/czhang0528/MosaicOS/.'
  related_code: https://github.com/czhang0528/MosaicOS/
- author: Chen Zhao 0002, Ali K. Thabet, Bernard Ghanem
  title: Video Self-Stitching Graph Network for Temporal Action Localization.
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ZhaoTG21
  doi: 10.1109/ICCV48922.2021.01340
  ee: https://doi.org/10.1109/ICCV48922.2021.01340
  url: https://dblp.org/rec/conf/iccv/ZhaoTG21
  abstract: 'Temporal action localization (TAL) in videos is a challenging task, especially
    due to the large variation in action temporal scales. Short actions usually occupy
    a major proportion in the datasets, but tend to have the lowest performance. In
    this paper, we confront the challenge of short actions and propose a multi-level
    cross-scale solution dubbed as video self-stitching graph network (VSGN). We have
    two key components in VSGN: video self-stitching (VSS) and cross-scale graph pyramid
    network (xGPN). In VSS, we focus on a short period of a video and magnify it along
    the temporal dimension to obtain a larger scale. We stitch the original clip and
    its magnified counterpart in one input sequence to take advantage of the complementary
    properties of both scales. The xGPN component further exploits the cross-scale
    correlations by a pyramid of cross-scale graph networks, each containing a hybrid
    module to aggregate features from across scales as well as within the same scale.
    Our VSGN not only enhances the feature representations, but also generates more
    positive anchors for short actions and more short training samples. Experiments
    demonstrate that VSGN obviously improves the localization performance of short
    actions as well as achieving the state-of-the-art overall performance on THUMOS-14
    and ActivityNet-v1.3. VSGN code is available at https://github.com/coolbay/VSGN.'
  related_code: https://github.com/coolbay/VSGN
