- author: Le Dong, Jinghao Bian, Jingyang Hou, Jingliang Hu, Yilei Shi, Weisheng Dong,
    Xiaoxiang Zhu 0001, Lichao Mou
  title: High-Order Progressive Trajectory Matching for Medical Image Dataset Distillation.
  venue: MICCAI
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/DongBHHSDZM25
  doi: 10.1007/978-3-032-05185-1_27
  ee: https://doi.org/10.1007/978-3-032-05185-1_27
  url: https://dblp.org/rec/conf/miccai/DongBHHSDZM25
  abstract: Medical image analysis faces significant challenges in data sharing due
    to privacy regulations and complex institutional protocols. Dataset distillation
    offers a solution to address these challenges by synthesizing compact datasets
    that capture essential information from real, large medical datasets. Trajectory
    matching has emerged as a promising methodology for dataset distillation; however,
    existing methods primarily focus on terminal states, overlooking crucial information
    in intermediate optimization states. We address this limitation by proposing a
    shape-wise potential that captures the geometric structure of parameter trajectories,
    and an easy-to-complex matching strategy that progressively addresses parameters
    based on their complexity. Experiments on medical image classification tasks demonstrate
    that our method improves distillation performance while preserving privacy and
    maintaining model accuracy comparable to training on the original datasets. Our
    code is available at https://github.com/Bian-jh/HoP-TM.
  related_code: https://github.com/Bian-jh/HoP-TM
- author: Vasilis Siomos, Jonathan Passerat-Palmbach, Giacomo Tarroni
  title: 'FedCLAM: Client Adaptive Momentum with Foreground Intensity Matching for
    Federated Medical Image Segmentation.'
  venue: MICCAI
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/SiomosPT25
  doi: 10.1007/978-3-032-04978-0_24
  ee: https://doi.org/10.1007/978-3-032-04978-0_24
  url: https://dblp.org/rec/conf/miccai/SiomosPT25
  abstract: Federated learning is a decentralized training approach that keeps data
    under stakeholder control while achieving superior performance over isolated training.
    While inter-institutional feature discrepancies pose a challenge in all federated
    settings, medical imaging is particularly affected due to diverse imaging devices
    and population variances, which can diminish the global model's effectiveness.
    Existing aggregation methods generally fail to adapt across varied circumstances.
    To address this, we propose FedCLAM, which integrates \textit{client-adaptive
    momentum} terms derived from each client's loss reduction during local training,
    as well as a \textit{personalized dampening factor} to curb overfitting. We further
    introduce a novel \textit{intensity alignment} loss that matches predicted and
    ground-truth foreground distributions to handle heterogeneous image intensity
    profiles across institutions and devices. Extensive evaluations on two datasets
    show that FedCLAM surpasses eight cutting-edge methods in medical segmentation
    tasks, underscoring its efficacy. The code is available at https://github.com/siomvas/FedCLAM.
  related_code: https://github.com/siomvas/FedCLAM
