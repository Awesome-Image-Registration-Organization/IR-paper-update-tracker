- author: Boladji Vinny Adjibi, Athanasios Avgetidis, Manos Antonakakis, Michael D.
    Bailey, Fabian Monrose
  title: 'The Guardians of Name Street: Studying the Defensive Registration Practices
    of the Fortune 500.'
