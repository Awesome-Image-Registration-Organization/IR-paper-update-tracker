- author: Hao Yu 0010, Fu Li, Mahdi Saleh, Benjamin Busam, Slobodan Ilic
  title: 'CoFiNet: Reliable Coarse-to-fine Correspondences for Robust PointCloud Registration.'
  venue: NeurIPS
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/YuLSBI21
  doi: 10.1109/lra.2024.3466068
  ee: https://proceedings.neurips.cc/paper/2021/hash/c85b2ea9a678e74fdc8bafe5d0707c31-Abstract.html
  url: https://dblp.org/rec/conf/nips/YuLSBI21
  abstract: Image-to-point cloud (I2P) registration is a fundamental task for robots
    and autonomous vehicles to achieve cross-modality data fusion and localization.
    Current I2P registration methods primarily focus on estimating correspondences
    at the point or pixel level, often neglecting global alignment. As a result, I2P
    matching can easily converge to a local optimum if it lacks high-level guidance
    from global constraints. To improve the success rate and general robustness, this
    letter introduces CoFiI2P, a novel I2P registration network that extracts correspondences
    in a coarse-to-fine manner. First, the image and point cloud data are processed
    through a two-stream encoder-decoder network for hierarchical feature extraction.
    Second, a coarse-to-fine matching module is designed to leverage these features
    and establish robust feature correspondences. Specifically, in the coarse matching
    phase, a novel I2P transformer module is employed to capture both homogeneous
    and heterogeneous global information from the image and point cloud data. This
    enables the estimation of coarse super-point/super-pixel matching pairs with discriminative
    descriptors. In the fine matching module, point/pixel pairs are established with
    the guidance of super-point/super-pixel correspondences. Finally, based on matching
    pairs, the transformation matrix is estimated with the EPnP-RANSAC algorithm.
    Experiments conducted on the KITTI Odometry dataset demonstrate that CoFiI2P achieves
    impressive results, with a relative rotation error (RRE) of 1.14 degrees and a
    relative translation error (RTE) of 0.29 meters, while maintaining real-time speed.
    These results represent a significant improvement of 84% in RRE and 89% in RTE
    compared to the current state-of-the-art (SOTA) method. Additional experiments
    on the Nuscenes dataset confirm our method's generalizability.
