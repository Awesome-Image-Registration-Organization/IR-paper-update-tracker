  access: closed
  key: conf/miccai/XuMGGIA22
  doi: 10.1007/978-3-031-16446-0_1
  ee: https://doi.org/10.1007/978-3-031-16446-0_1
  url: https://dblp.org/rec/conf/miccai/XuMGGIA22
  abstract: Volumetric reconstruction of fetal brains from multiple stacks of MR slices,
    acquired in the presence of almost unpredictable and often severe subject motion,
    is a challenging task that is highly sensitive to the initialization of slice-to-volume
    transformations. We propose a novel slice-to-volume registration method using
    Transformers trained on synthetically transformed data, which model multiple stacks
    of MR slices as a sequence. With the attention mechanism, our model automatically
    detects the relevance between slices and predicts the transformation of one slice
    using information from other slices. We also estimate the underlying 3D volume
    to assist slice-to-volume registration and update the volume and transformations
    alternately to improve accuracy. Results on synthetic data show that our method
    achieves lower registration error and better reconstruction quality compared with
    existing state-of-the-art methods. Experiments with real-world MRI data are also
    performed to demonstrate the ability of the proposed model to improve the quality
    of 3D reconstruction under severe fetal motion.
