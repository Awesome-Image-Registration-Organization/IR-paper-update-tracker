- author: Yue Wang 0041, Justin M. Solomon
  title: 'PRNet: Self-Supervised Learning for Partial-to-Partial Registration.'
  venue: NeurIPS
  year: '2019'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/WangS19
  doi: ''
  ee: https://proceedings.neurips.cc/paper/2019/hash/ebad33b3c9fa1d10327bb55f9e79e2f3-Abstract.html
  url: https://dblp.org/rec/conf/nips/WangS19
  abstract: We present a simple, flexible, and general framework titled Partial Registration
    Network (PRNet), for partial-to-partial point cloud registration. Inspired by
    recently-proposed learning-based methods for registration, we use deep networks
    to tackle non-convexity of the alignment and partial correspondence problems.
    While previous learning-based methods assume the entire shape is visible, PRNet
    is suitable for partial-to-partial registration, outperforming PointNetLK, DCP,
    and non-learning methods on synthetic data. PRNet is self-supervised, jointly
    learning an appropriate geometric representation, a keypoint detector that finds
    points in common between partial views, and keypoint-to-keypoint correspondences.
    We show PRNet predicts keypoints and correspondences consistently across views
    and objects. Furthermore, the learned representation is transferable to classification.
