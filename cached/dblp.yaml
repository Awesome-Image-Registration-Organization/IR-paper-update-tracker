- author: Andrew Mastin, Jeremy Kepner, John W. Fisher III
  title: Automatic registration of LIDAR and optical images of urban scenes.
  venue: CVPR
  year: '2009'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/MastinKF09
  doi: 10.1109/CVPR.2009.5206539
  ee: https://doi.org/10.1109/CVPR.2009.5206539
  url: https://dblp.org/rec/conf/cvpr/MastinKF09
  abstract: Fusion of 3D laser radar (LIDAR) imagery and aerial optical imagery is
    an efficient method for constructing 3D virtual reality models. One difficult
    aspect of creating such models is registering the optical image with the LIDAR
    point cloud, which is characterized as a camera pose estimation problem. We propose
    a novel application of mutual information registration methods, which exploits
    the statistical dependency in urban scenes of optical appearance with measured
    LIDAR elevation. We utilize the well known downhill simplex optimization to infer
    camera pose parameters. We discuss three methods for measuring mutual information
    between LIDAR imagery and optical imagery. Utilization of OpenGL and graphics
    hardware in the optimization process yields registration times dramatically lower
    than previous methods. Using an initial registration comparable to GPS/INS accuracy,
    we demonstrate the utility of our algorithm with a collection of urban images
    and present 3D models created with the fused imagery.
