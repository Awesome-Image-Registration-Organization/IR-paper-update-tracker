- author: Zekun Qian, Ruize Han, Wei Feng 0005, Song Wang 0002
  title: 'From a Bird&apos;s Eye View to See: Joint Camera and Subject Registration
    without the Camera Calibration.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/QianH0024
  doi: 10.1109/CVPR52733.2024.00088
  ee: https://doi.org/10.1109/CVPR52733.2024.00088
  url: https://dblp.org/rec/conf/cvpr/QianH0024
  abstract: 'We tackle a new problem of multi-view camera and sub-ject registration
    in the bird’ s eye view (BEV) without pregiven camera calibration, which promotes
    the multi-view subject registration problem to a new calibration-free stage. This
    greatly alleviates the limitation in many practical applications. However, this
    is a very challenging problem since its only input is several RGB images from
    different first-person views (FPVs), without the BEV image and the calibration
    of the FPVs, while the output is a unified plane aggregated from all views with
    the positions and orientations of both the subjects and cameras in a BEV. For
    this purpose, we propose an end-to-end framework solving cam-era and subject registration
    together by taking advantage of their mutual dependence, whose main idea is as
    below: i) creating a subject view-transform module (VTM) to project each pedestrian
    from FPV to a virtual BEV, ii) deriving a multi-view geometry-based spatial alignment
    module (SAM) to estimate the relative camera pose in a unified BEV, iii) selecting
    and refining the subject and camera registration results within the unified BEV.
    We collect a new large-scale synthetic dataset with rich annotations for training
    and evaluation. Additionally, we also collect a real dataset for cross-domain
    evaluation. The experimental results show the remarkable effectiveness of our
    method. The code and proposed datasets are available at BEVSee.'
  related_code: ''
- author: Zhiyuan Yu, Zheng Qin 0002, Lintao Zheng, Kai Xu 0004
  title: Learning Instance-Aware Correspondences for Robust Multi-Instance Point Cloud
