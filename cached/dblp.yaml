- author: Xueyang Kang, Zhaoliang Luan, Kourosh Khoshelham, Bing Wang 0013
  title: 'Equi-GSPR: Equivariant SE(3) Graph Network Model for Sparse Point Cloud
    Registration.'
  venue: ECCV
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/KangLKW24
  doi: 10.1007/978-3-031-73235-5_9
  ee: https://doi.org/10.1007/978-3-031-73235-5_9
  url: https://dblp.org/rec/conf/eccv/KangLKW24
  abstract: Point cloud registration is a foundational task for 3D alignment and reconstruction
    applications. While both traditional and learning-based registration approaches
    have succeeded, leveraging the intrinsic symmetry of point cloud data, including
    rotation equivariance, has received insufficient attention. This prohibits the
    model from learning effectively, resulting in a requirement for more training
    data and increased model complexity. To address these challenges, we propose a
    graph neural network model embedded with a local Spherical Euclidean 3D equivariance
    property through SE(3) message passing based propagation. Our model is composed
    mainly of a descriptor module, equivariant graph layers, match similarity, and
    the final regression layers. Such modular design enables us to utilize sparsely
    sampled input points and initialize the descriptor by self-trained or pre-trained
    geometric feature descriptors easily. Experiments conducted on the 3DMatch and
    KITTI datasets exhibit the compelling and robust performance of our model compared
    to state-of-the-art approaches, while the model complexity remains relatively
    low at the same time.
- author: Riccardo Marin, Enric Corona, Gerard Pons-Moll
  title: 'NICP: Neural ICP for 3D Human Registration at Scale.'
  venue: ECCV
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/MarinCP24
  doi: 10.1007/978-3-031-73636-0_16
  ee: https://doi.org/10.1007/978-3-031-73636-0_16
  url: https://dblp.org/rec/conf/eccv/MarinCP24
  abstract: Aligning a template to 3D human point clouds is a long-standing problem
    crucial for tasks like animation, reconstruction, and enabling supervised learning
    pipelines. Recent data-driven methods leverage predicted surface correspondences.
    However, they are not robust to varied poses, identities, or noise. In contrast,
    industrial solutions often rely on expensive manual annotations or multi-view
    capturing systems. Recently, neural fields have shown promising results. Still,
    their purely data-driven and extrinsic nature does not incorporate any guidance
    toward the target surface, often resulting in a trivial misalignment of the template
    registration. Currently, no method can be considered the standard for 3D Human
    registration, limiting the scalability of downstream applications. In this work,
    we propose a neural scalable registration method, NSR, a pipeline that, for the
    first time, generalizes and scales across thousands of shapes and more than ten
    different data sources. Our essential contribution is NICP, an ICP-style self-supervised
    task tailored to neural fields. NSR takes a few seconds, is self-supervised, and
    works out of the box on pre-trained neural fields. NSR combines NICP with a localized
    neural field trained on a large MoCap dataset, achieving the state of the art
    over public benchmarks. The release of our code and checkpoints provides a powerful
    tool useful for many downstream tasks like dataset alignments, cleaning, or asset
    animation.
- author: Chaitanya Patel, Shaojie Bai, Te-Li Wang, Jason M. Saragih, Shih-En Wei
  title: Fast Registration of Photorealistic Avatars for VR Facial Animation.
  venue: ECCV
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/PatelBWSW24
  doi: 10.1007/978-3-031-73033-7_23
  ee: https://doi.org/10.1007/978-3-031-73033-7_23
  url: https://dblp.org/rec/conf/eccv/PatelBWSW24
  abstract: 'Virtual Reality (VR) bares promise of social interactions that can feel
    more immersive than other media. Key to this is the ability to accurately animate
    a personalized photorealistic avatar, and hence the acquisition of the labels
    for headset-mounted camera (HMC) images need to be efficient and accurate, while
    wearing a VR headset. This is challenging due to oblique camera views and differences
    in image modality. In this work, we first show that the domain gap between the
    avatar and HMC images is one of the primary sources of difficulty, where a transformer-based
    architecture achieves high accuracy on domain-consistent data, but degrades when
    the domain-gap is re-introduced. Building on this finding, we propose a system
    split into two parts: an iterative refinement module that takes in-domain inputs,
    and a generic avatar-guided image-to-image domain transfer module conditioned
    on current estimates. These two modules reinforce each other: domain transfer
    becomes easier when close-to-groundtruth examples are shown, and better domain-gap
    removal in turn improves the registration. Our system obviates the need for costly
    offline optimization, and produces online registration of higher quality than
    direct regression method. We validate the accuracy and efficiency of our approach
    through extensive experiments on a commodity headset, demonstrating significant
    improvements over these baselines. To stimulate further research in this direction,
    we make our large-scale dataset and code publicly available.'
- author: Leo Segre, Shai Avidan
  title: 'VF-NeRF: Viewshed Fields for Rigid NeRF Registration.'
  venue: ECCV
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/SegreA24
  doi: 10.1007/978-3-031-73027-6_10
  ee: https://doi.org/10.1007/978-3-031-73027-6_10
  url: https://dblp.org/rec/conf/eccv/SegreA24
  abstract: 3D scene registration is a fundamental problem in computer vision that
    seeks the best 6-DoF alignment between two scenes. This problem was extensively
    investigated in the case of point clouds and meshes, but there has been relatively
    limited work regarding Neural Radiance Fields (NeRF). In this paper, we consider
    the problem of rigid registration between two NeRFs when the position of the original
    cameras is not given. Our key novelty is the introduction of Viewshed Fields (VF),
    an implicit function that determines, for each 3D point, how likely it is to be
    viewed by the original cameras. We demonstrate how VF can help in the various
    stages of NeRF registration, with an extensive evaluation showing that VF-NeRF
    achieves SOTA results on various datasets with different capturing approaches
    such as LLFF and Objaverese.
- author: Yujiao Shi 0002, Hongdong Li, Akhil Perincherry, Ankit Vora
  title: Weakly-Supervised Camera Localization by Ground-to-Satellite Image Registration.
  venue: ECCV
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/ShiLPV24
  doi: 10.1007/978-3-031-72673-6_3
  ee: https://doi.org/10.1007/978-3-031-72673-6_3
  url: https://dblp.org/rec/conf/eccv/ShiLPV24
  abstract: The ground-to-satellite image matching/retrieval was initially proposed
    for city-scale ground camera localization. This work addresses the problem of
    improving camera pose accuracy by ground-to-satellite image matching after a coarse
    location and orientation have been obtained, either from the city-scale retrieval
    or from consumer-level GPS and compass sensors. Existing learning-based methods
    for solving this task require accurate GPS labels of ground images for network
    training. However, obtaining such accurate GPS labels is difficult, often requiring
    an expensive {\color{black}Real Time Kinematics (RTK)} setup and suffering from
    signal occlusion, multi-path signal disruptions, \etc. To alleviate this issue,
    this paper proposes a weakly supervised learning strategy for ground-to-satellite
    image registration when only noisy pose labels for ground images are available
    for network training. It derives positive and negative satellite images for each
    ground image and leverages contrastive learning to learn feature representations
    for ground and satellite images useful for translation estimation. We also propose
    a self-supervision strategy for cross-view image relative rotation estimation,
    which trains the network by creating pseudo query and reference image pairs. Experimental
    results show that our weakly supervised learning strategy achieves the best performance
    on cross-area evaluation compared to recent state-of-the-art methods that are
    reliant on accurate pose labels for supervision.
