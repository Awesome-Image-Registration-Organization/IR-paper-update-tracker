- author: Junwen Huang 0001, Hao Yu 0010, Kuan-Ting Yu, Nassir Navab, Slobodan Ilic,
    Benjamin Busam
  title: 'MatchU: Matching Unseen Objects for 6D Pose Estimation from RGB-D Images.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/Huang0YNIB24
  doi: 10.1109/CVPR52733.2024.00962
  ee: https://doi.org/10.1109/CVPR52733.2024.00962
  url: https://dblp.org/rec/conf/cvpr/Huang0YNIB24
  abstract: Recent learning methods for object pose estimation require resource-intensive
    training for each individual object instance or category, hampering their scalability
    in real applications when confronted with previously unseen objects. In this paper,
    we propose MatchU, a Fuse-Describe-Match strategy for 6D pose estimation from
    RGB-D images. MatchU is a generic approach that fuses 2D texture and 3D geometric
    cues for 6D pose prediction of unseen objects. We rely on learning geometric 3D
    descriptors that are rotation-invariant by design. By encoding pose-agnostic geometry,
    the learned descriptors naturally generalize to unseen objects and capture symmetries.
    To tackle ambiguous associations using 3D geometry only, we fuse additional RGB
    information into our descriptor. This is achieved through a novel attention-based
    mechanism that fuses cross-modal information, together with a matching loss that
    leverages the latent space learned from RGB data to guide the descriptor learning
    process. Extensive experiments reveal the generalizability of both the RGB-D fusion
    strategy as well as the descriptor efficacy. Benefiting from the novel designs,
    MatchU surpasses all existing methods by a significant margin in terms of both
    accuracy and speed, even without the requirement of expensive re-training or rendering.
  related_code: ''
- author: Yuan Wang 0064, Rui Sun 0006, Naisong Luo, Yuwen Pan, Tianzhu Zhang 0001
  title: 'Image-to-Image Matching via Foundation Models: A New Perspective for Open-Vocabulary
    Semantic Segmentation.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/WangSLPZ24
  doi: 10.1109/CVPR52733.2024.00379
  ee: https://doi.org/10.1109/CVPR52733.2024.00379
  url: https://dblp.org/rec/conf/cvpr/WangSLPZ24
  abstract: Open-vocabulary semantic segmentation (OVS) aims to segment images of
    arbitrary categories specified by class labels or captions. However, most previous
    best-performing methods, whether pixel grouping methods or region recognition
    methods, suffer from false matches between image features and category labels.
    We attribute this to the natural gap between the textual features and visual features.
    In this work, we rethink how to mitigate false matches from the perspective of
    image-to-image matching and propose a novel relation-aware intra-modal matching
    (RIM) framework for OVS based on visual foundation models. RIM achieves robust
    region classification by firstly constructing diverse image-modal reference features
    and then matching them with region features based on relation-aware ranking distribution.
    The proposed RIM enjoys several merits. First, the intra-modal reference features
    are better aligned, circumventing potential ambiguities that may arise in cross-modal
    matching. Second, the ranking-based matching process harnesses the structure information
    implicit in the inter-class relationships, making it more robust than comparing
    individually. Extensive experiments on three benchmarks demonstrate that RIM outperforms
    previous state-of-the-art methods by large margins, obtaining a lead of more than
    10% in mIoU on PASCAL VOC benchmark.
  related_code: ''
- author: Yuanen Zhou, Meng Wang 0001, Daqing Liu, Zhenzhen Hu 0004, Hanwang Zhang
  title: More Grounded Image Captioning by Distilling Image-Text Matching Model.
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/ZhouWLHZ20
  doi: 10.1109/CVPR42600.2020.00483
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Zhou_More_Grounded_Image_Captioning_by_Distilling_Image-Text_Matching_Model_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/ZhouWLHZ20
  abstract: 'Visual attention not only improves the performance of image captioners,
    but also serves as a visual interpretation to qualitatively measure the caption
    rationality and model transparency. Specifically, we expect that a captioner can
    fix its attentive gaze on the correct objects while generating the corresponding
    words. This ability is also known as grounded image captioning. However, the grounding
    accuracy of existing captioners is far from satisfactory.To improve the grounding
    accuracy while retaining the captioning quality, it is expensive to collect the
    word-region alignment as strong supervision.To this end, we propose a Part-of-Speech
    (POS) enhanced image-text matching model (SCAN): POS-SCAN, as the effective knowledge
    distillation for more grounded image captioning. The benefits are two-fold: 1)
    given a sentence and an image, POS-SCAN can ground the objects more accurately
    than SCAN; 2) POS-SCAN serves as a word-region alignment regularization for the
    captioner''s visual attention module. By showing benchmark experimental results,
    we demonstrate that conventional image captioners equipped with POS-SCAN can significantly
    improve the grounding accuracy without strong supervision. Last but not the least,
    we explore the indispensable Self-Critical Sequence Training (SCST) in the context
    of grounded image captioning and show that the image-text matching score can serve
    as a reward for more grounded captioning.'
  related_code: ''
