- author: Lin Bie, Shouan Pan, Siqi Li 0001, Yining Zhao, Yue Gao 0002
  title: 'GraphI2P: Image-to-Point Cloud Registration with Exploring Pattern of Correspondence
    via Graph Learning.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/BieP0Z025
  doi: 10.1109/CVPR52734.2025.02064
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Bie_GraphI2P_Image-to-Point_Cloud_Registration_with_Exploring_Pattern_of_Correspondence_via_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/BieP0Z025
  abstract: Although the fusion of images and LiDAR point clouds is crucial to many
    applications in computer vision, the relative poses of cameras and LiDAR scanners
    are often unknown. However, due to the modality and domain gap between images
    and LiDAR point clouds, Image-to-Point Cloud Registration is a significant challenge,
    especially when the image and point cloud come from non-synchronized frames. To
    tackle these issues, we introduce the virtual point cloud as a bridge to alleviate
    the cross-modality gap between images and LiDAR point clouds. In this way, the
    modality gap is converted to the domain gap of point clouds. Moreover, we introduce
    a virtual-spherical representation achieving orthogonal decoupling between pixel
    location and predicted depth. As for the domain gap, we propose a distribution-based
    adaptive sample module to generate a unified distribution of two types of point
    clouds. Then, we explore the correct correspondence pattern consistency and prune
    the false correspondences through a graph-based selection process. Experimental
    results demonstrate that our method outperforms the state-of-the-art methods by
    more than 10.77% and 12.53% performance on the KITTI Odometry and nuScenes datasets,
    respectively. The results demonstrate that our method can effectively solve non-synchronized
    random-frame registration.
- author: Xinxing Cheng, Tianyang Zhang 0003, Wenqi Lu 0001, Qingjie Meng, Alejandro
    F. Frangi, Jinming Duan 0001
  title: 'SACB-Net: Spatial-awareness Convolutions for Medical Image Registration.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/Cheng00MF025
  doi: 10.1109/CVPR52734.2025.00493
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Cheng_SACB-Net_Spatial-awareness_Convolutions_for_Medical_Image_Registration_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/Cheng00MF025
  abstract: Deep learning-based image registration methods have shown state-of-the-art
    performance and rapid inference speeds. Despite these advances, many existing
    approaches fall short in capturing spatially varying information in non-local
    regions of feature maps due to the reliance on spatially-shared convolution kernels.
    This limitation leads to suboptimal estimation of deformation fields. In this
    paper, we propose a 3D Spatial-Awareness Convolution Block (SACB) to enhance the
    spatial information within feature representations. Our SACB estimates the spatial
    clusters within feature maps by leveraging feature similarity and subsequently
    parameterizes the adaptive convolution kernels across diverse regions. This adaptive
    mechanism generates the convolution kernels (weights and biases) tailored to spatial
    variations, thereby enabling the network to effectively capture spatially varying
    information. Building on SACB, we introduce a pyramid flow estimator (named SACB-Net)
    that integrates SACBs to facilitate multi-scale flow composition, particularly
    addressing large deformations. Experimental results on the brain IXI and LPBA
    datasets as well as Abdomen CT datasets demonstrate the effectiveness of SACB
    and the superiority of SACB-Net over the state-of-the-art learning-based registration
    methods. The code is available at https://github.com/x-xc/SACB_Net.
- author: Johan Edstedt, André Mateus 0001, Alberto Jaenal
  title: 'ColabSfM: Collaborative Structure-from-Motion by Point Cloud Registration.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/Edstedt0J25
  doi: 10.1109/CVPR52734.2025.00616
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Edstedt_ColabSfM_Collaborative_Structure-from-Motion_by_Point_Cloud_Registration_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/Edstedt0J25
  abstract: Structure-from-Motion (SfM) is the task of estimating 3D structure and
    camera poses from images. We define Collaborative SfM (ColabSfM) as sharing distributed
    SfM reconstructions. Sharing maps requires estimating a joint reference frame,
    which is typically referred to as registration. However, there is a lack of scalable
    methods and training datasets for registering SfM reconstructions. In this paper,
    we tackle this challenge by proposing the scalable task of point cloud registration
    for SfM reconstructions. We find that current registration methods cannot register
    SfM point clouds when trained on existing datasets. To this end, we propose a
    SfM registration dataset generation pipeline, leveraging partial reconstructions
    from synthetically generated camera trajectories for each scene. Finally, we propose
    a simple but impactful neural refiner on top of the SotA registration method RoITr
    that yields significant improvements, which we call RefineRoITr. Our extensive
    experimental evaluation shows that our proposed pipeline and model enables ColabSfM.
    Code is available at https://github.com/EricssonResearch/ColabSfM
- author: Kexue Fu 0001, Mingzhi Yuan, Changwei Wang 0001, Weiguang Pang, Jing Chi,
    Manning Wang, Longxiang Gao
  title: Dual Focus-Attention Transformer for Robust Point Cloud Registration.
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/FuY0PCWG25
  doi: 10.1109/CVPR52734.2025.01099
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Fu_Dual_Focus-Attention_Transformer_for_Robust_Point_Cloud_Registration_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/FuY0PCWG25
  abstract: Recently, coarse-to-fine methods for point cloud registration have achieved
    great success, but few works deeply explore the impact of feature interaction
    at both coarse and fine scales. By visualizing attention scores and correspondences,
    we find that existing methods fail to achieve effective feature aggregation at
    the two scales during the feature interaction. To tackle this issue, we propose
    a Dual Focus-Attention Transformer framework, which only focuses on points relevant
    to the current point for feature interaction, avoiding interactions with irrelevant
    points. For the coarse scale, we design a superpoint focus-attention transformer
    guided by sparse keypoints, which are selected from the neighborhood of superpoints.
    For the fine scale, we only perform feature interaction between the point sets
    that belong to the same superpoint. Experiments show that our method achieve the
    state-of-the-art performance on three standard benchmarks. The code and pre-trained
    models are available at https://github.com/fukexue/DFAT.git.
- author: Thomas Hastings Greer, Lin Tian 0001, François-Xavier Vialard, Roland Kwitt,
    Raúl San José Estépar, Marc Niethammer
  title: 'CARL: A Framework for Equivariant Image Registration.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/Greer0VKEN25
  doi: 10.1109/CVPR52734.2025.02423
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Greer_CARL_A_Framework_for_Equivariant_Image_Registration_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/Greer0VKEN25
  abstract: Image registration estimates spatial correspondences between image pairs.
    These estimates are typically obtained via numerical optimization or regression
    by a deep network. A desirable property is that a correspondence estimate (e.g.,
    the true oracle correspondence) for an image pair is maintained under deformations
    of the input images. Formally, the estimator should be equivariant to a desired
    class of image transformations. In this work, we present careful analyses of equivariance
    properties in the context of multi-step deep registration networks. Based on these
    analyses we 1) introduce the notions of [U, U] equivariance (network equivariance
    to the same deformations of the input images) and [W, U] equivariance (where input
    images can undergo different deformations); we 2) show that in a suitable multi-step
    registration setup it is sufficient for overall [W, U] equivariance if the first
    step has [W, U] equivariance and all others have [U, U] equivariance; we 3) show
    that common displacement-predicting networks only exhibit [U, U] equivariance
    to translations instead of the more powerful [W, U] equivariance; and we 4) show
    how to achieve multi-step [W, U] equivariance via a coordinate-attention mechanism
    combined with displacement-predicting networks. Our approach obtains excellent
    practical performance for 3D abdomen, lung, and brain medical image registration.
    We match or outperform state-of-the-art (SOTA) registration approaches on all
    the datasets with a particularly strong performance for the challenging abdomen
    registration.
- author: Haobo Jiang, Jin Xie 0001, Jian Yang 0003, Liang Yu, Jianmin Zheng
  title: Zero-shot RGB-D Point Cloud Registration with Pre-trained Large Vision Model.
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/JiangXYYZ25
  doi: 10.1109/CVPR52734.2025.01579
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Jiang_Zero-shot_RGB-D_Point_Cloud_Registration_with_Pre-trained_Large_Vision_Model_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/JiangXYYZ25
  abstract: This paper introduces ZeroMatch, a novel zero-shot RGB-D point cloud registration
    framework, aimed at achieving robust 3D matching on unseen data without any task-specific
    training. Our core idea is to utilize the powerful zero-shot image representation
    of Stable Diffusion, achieved through extensive pre-training on large-scale data,
    to enhance point-cloud geometric descriptors for robust matching. Specifically,
    we combine the handcrafted geometric descriptor FPFH with Stable-Diffusion features
    to create point descriptors that are both locally and contextually aware, enabling
    reliable RGB-D registration with zero-shot capability. This approach is based
    on our observation that Stable-Diffusion features effectively encode discriminative
    global contextual cues, naturally alleviating the feature ambiguity that FPFH
    often encounters in scenes with repetitive patterns or low overlap. To further
    enhance cross-view consistency of Stable-Diffusion features for improved matching,
    we propose a coupled-image input mode that concatenates the source and target
    images into a single input, replacing the original single-image mode. This design
    achieves both inter-image and prompt-to-image consistency attentions, facilitating
    robust cross-view feature interaction and alignment. Finally, we leverage feature
    nearest neighbors to construct putative correspondences for hypothesize-and-verify
    transformation estimation. Extensive experiments on 3DMatch, ScanNet, and ScanLoNet
    verify the excellent zero-shot matching ability of our method. [Code]
- author: Kim Jun-Seong, GeonU Kim, Kim Yu-Ji, Yu-Chiang Frank Wang, Jaesung Choe,
    Tae-Hyun Oh
  title: 'Dr. Splat: Directly Referring 3D Gaussian Splatting via Direct Language
    Embedding Registration.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/Jun-SeongKYWCO25
  doi: 10.1109/CVPR52734.2025.01319
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Jun-Seong_Dr._Splat_Directly_Referring_3D_Gaussian_Splatting_via_Direct_Language_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/Jun-SeongKYWCO25
  abstract: 'We introduce Dr. Splat, a novel approach for open-vocabulary 3D scene
    understanding leveraging 3D Gaussian Splatting. Unlike existing language-embedded
    3DGS methods, which rely on a rendering process, our method directly associates
    language-aligned CLIP embeddings with 3D Gaussians for holistic 3D scene understanding.
    The key of our method is a language feature registration technique where CLIP
    embeddings are assigned to the dominant Gaussians intersected by each pixel-ray.
    Moreover, we integrate Product Quantization (PQ) trained on general large-scale
    image data to compactly represent embeddings without per-scene optimization. Experiments
    demonstrate that our approach significantly outperforms existing approaches in
    3D perception benchmarks, such as openvocabulary 3D semantic segmentation, 3D
    object localization, and 3D object selection tasks. For video results, please
    visit : https://drsplat.github.io/'
- author: Xinjun Li, Wenfei Yang, Jiacheng Deng 0002, Zhixin Cheng, Xu Zhou, Tianzhu
    Zhang 0001
  title: Implicit Correspondence Learning for Image-to-Point Cloud Registration.
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/LiY0CZZ25
  doi: 10.1109/CVPR52734.2025.01577
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Li_Implicit_Correspondence_Learning_for_Image-to-Point_Cloud_Registration_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/LiY0CZZ25
  abstract: Image-to-point cloud registration aims to estimate the camera pose of
    a given image within a 3D scene point cloud. In this area, matching-based methods
    have achieved leading performance by first detecting the overlapping region, then
    matching point and pixel features learned by neural networks and finally using
    the PnP-RANSAC algorithm to estimate camera pose. However, achieving accurate
    image-to-point cloud registration remains challenging because the overlapping
    region detection is unreliable merely relying on point-wise classification, direct
    alignment of cross-modal data is difficult and indirect optimization objective
    leads to unstable registration results. To address these challenges, we propose
    a novel implicit correspondence learning method, including a Geometric Prior-guided
    overlapping region Detection Module (GPDM), an Implicit Correspondence Learning
    Module (ICLM), and a Pose Regression Module (PRM). The proposed method enjoys
    several merits. First, the proposed GPDM can precisely detect the overlapping
    region. Second, the ICLM can generate robust cross-modality correspondences. Third,
    the PRM can enable end-to-end optimization. Extensive experimental results on
    KITTI and nuScenes datasets demonstrate that the proposed model sets a new state-of-the-art
    performance in registration accuracy.
- author: Jiong Lin, Lechen Zhang, Kwansoo Lee, Jialong Ning, Judah Goldfeder, Hod
    Lipson
  title: 'AutoURDF: Unsupervised Robot Modeling from Point Cloud Frames Using Cluster
    Registration.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/LinZLNGL25
  doi: 10.1109/CVPR52734.2025.02573
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Lin_AutoURDF_Unsupervised_Robot_Modeling_from_Point_Cloud_Frames_Using_Cluster_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/LinZLNGL25
  abstract: 'Robot description models are essential for simulation and control, yet
    their creation often requires significant manual effort. To streamline this modeling
    process, we introduce AutoURDF, an unsupervised approach for constructing description
    files of unseen robots from point cloud frames. Our method leverages a cluster-based
    point cloud registration model that tracks the 6-DoF transformations of point
    clusters. Through analyzing cluster movements, we hierarchically address the following
    challenges: (1) moving part segmentation, (2) body topology inference, and (3)
    joint parameter estimation. The complete pipeline produces robot description files
    that are fully compatible with existing simulators. We validate our method across
    a variety of robots, using both synthetic and real-world scan data. Results indicate
    that our approach outperforms previous methods in registration and body topology
    estimation accuracy, offering a scalable solution for automated robot modeling.'
- author: Haolin Liu 0004, Xiaohang Zhan, Zizheng Yan, Zhongjin Luo, Yuxin Wen, Xiaoguang
    Han 0001
  title: 'Stable-SCore: A Stable Registration-based Framework for 3D Shape Correspondence.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/LiuZYLW025
  doi: 10.1109/CVPR52734.2025.00094
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Liu_Stable-SCore_A_Stable_Registration-based_Framework_for_3D_Shape_Correspondence_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/LiuZYLW025
  abstract: 'Establishing character shape correspondence is a critical and fundamental
    task in computer vision and graphics, with diverse applications including re-topology,
    attribute transfer, and shape interpolation. Current dominant functional map methods,
    while effective in controlled scenarios, struggle in real situations with more
    complex challenges such as non-isometric shape discrepancies. In response, we
    revisit registration-for-correspondence methods and tap their potential for more
    stable shape correspondence estimation. To overcome their common issues including
    unstable deformations and the necessity for careful pre-alignment or high-quality
    initial 3D correspondences, we introduce Stable-SCore: A Stable Registration-based
    Framework for 3D Shape Correspondence. We first re-purpose a foundation model
    for 2D character correspondence that ensures reliable and stable 2D mappings.
    Crucially, we propose a novel Semantic Flow Guided Registration approach that
    leverages 2D correspondence to guide mesh deformations. Our framework significantly
    surpasses existing methods in challenging scenarios, and brings possibilities
    for a wide array of real applications, as demonstrated in our results.'
- author: Shasha Mao, Shiming Lu, Zhaolong Du, Licheng Jiao, Shuiping Gou, Luntian
    Mou, Xuequan Lu, Lin Xiong, Yimeng Zhang
  title: Cross-Rejective Open-Set SAR Image Registration.
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/MaoLDJGMLXZ25
  doi: 10.1109/CVPR52734.2025.02144
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Mao_Cross-Rejective_Open-Set_SAR_Image_Registration_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/MaoLDJGMLXZ25
  abstract: 'Synthetic Aperture Radar (SAR) image registration is an essential upstream
    task in geoscience applications, in which pre-detected keypoints from two images
    are employed as observed objects to seek matched-point pairs. In general, the
    registration is regarded as a typical closed-set classification, which forces
    each keypoint to be classified into the given classes, but ignoring an essential
    issue that numerous redundant keypoints are beyond the given classes, which unavoidably
    results in capturing incorrect matched-point pairs. Based on this, we propose
    a Cross-Rejective Open-set SAR Image Registration (CroR-OSIR) method. In this
    work, these redundant keypoints are regarded as out-of-distribution (OOD) samples,
    and we formulate the registration as a special open-set task with two modules:
    supervised contrastive feature-tuning and cross-rejective open-set recognition
    (CroR-OSR). Unlike traditional open-set recognition, all samples, including OOD
    samples, are available in the CroR-OSR module. CroR-OSR conducts the closed-set
    classifications in individual open-set domains from two images, meanwhile employing
    the cross-domain rejection during training, to exclude these OOD samples based
    on confidence and consistency. Moreover, a new supervised contrastive tuning strategy
    is incorporated for feature-tuning. Especially, the cross-domain estimation labels
    obtained by CroR-OSR are fed back to the feature-tuning module for feature-tuning,
    to enhance feature discriminability. The experimental results illustrate that
    the proposed method achieves more precise registration than the state-of-the-art
    methods. The code is released at https://github.com/XDyaoshi/CroR-OSIR-main.'
- author: Shaocheng Yan, Yiming Wang, Kaiyan Zhao, Pengcheng Shi, Zhenjun Zhao, Yongjun
    Zhang 0002, Jiayuan Li 0001
  title: 'HeMoRa: Unsupervised Heuristic Consensus Sampling for Robust Point Cloud
    Registration.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/YanWZSZ0L25
  doi: 10.1109/CVPR52734.2025.00135
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Yan_HeMoRa_Unsupervised_Heuristic_Consensus_Sampling_for_Robust_Point_Cloud_Registration_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/YanWZSZ0L25
  abstract: Heuristic information for consensus set sampling is essential for correspondence-based
    point cloud registration, but existing approaches typically rely on supervised
    learning or expert-driven parameter tuning. In this work, we propose HeMoRa, a
    new unsupervised framework that trains a Heuristic information Generator (HeGen)
    to estimate sampling probabilities for correspondences using a Multi-order Reward
    Aggregator (MoRa) loss. The core of MoRa is to train HeGen through extensive trials
    and feedback, enabling unsupervised learning. While this process can be implemented
    using policy optimization, directly applying the policy gradient to optimize HeGen
    presents challenges such as sensitivity to noise and low reward efficiency. To
    address these issues, we propose a Maximal Reward Propagation (MRP) mechanism
    that enhances the training process by prioritizing noise-free signals and improving
    reward utilization. Experimental results show that equipped with HeMoRa, the consensus
    set sampler achieves improvements in both robustness and accuracy. For example,
    on the 3DMatch dataset with FCGF feature, the registration recall of our unsupervised
    methods (Ours+SM and Ours+SC2) even outperforms the state-of-the-art supervised
    method VBreg. Our code is available at HeMoRa.
- author: Zhenxuan Zeng, Qiao Wu, Xiyu Zhang 0001, Lin Yuanbo Wu, Pei An, Jiaqi Yang
    0002, Ji Wang, Peng Wang 0015
  title: Unlocking Generalization Power in LiDAR Point Cloud Registration.
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/ZengW0WAYWW25
  doi: 10.1109/CVPR52734.2025.02072
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Zeng_Unlocking_Generalization_Power_in_LiDAR_Point_Cloud_Registration_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/ZengW0WAYWW25
  abstract: In real-world environments, a LiDAR point cloud registration method with
    robust generalization capabilities (across varying distances and datasets) is
    crucial for ensuring safety in autonomous driving and other LiDAR-based applications.
    However, current methods fall short in achieving this level of generalization.
    To address these limitations, we propose UGP, a pruned framework designed to enhance
    generalization power for LiDAR point cloud registration. The core insight in UGP
    is the elimination of cross-attention mechanisms to improve generalization, allowing
    the network to concentrate on intra-frame feature extraction. Additionally, we
    introduce a progressive self-attention module to reduce ambiguity in large-scale
    scenes and integrate Bird’s Eye View (BEV) features to incorporate semantic information
    about scene elements. Together, these enhancements significantly boost the network’s
    generalization performance. We validated our approach through various generalization
    experiments in multiple outdoor scenes. In cross-distance generalization experiments
    on KITTI and nuScenes, UGP achieved state-of-the-art mean Registration Recall
    rates of 94.5% and 91.4%, respectively. In cross-dataset generalization from nuScenes
    to KITTI, UGP achieved a state-of-the-art mean Registration Recall of 90.9%. Code
    will be available at https://github.com/peakpang/UGP
- author: Guiyu Zhao, Sheng Ao, Ye Zhang 0037, Kai Xu 0004, Yulan Guo
  title: Progressive Correspondence Regenerator for Robust 3D Registration.
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/ZhaoAZXG25
  doi: 10.1109/CVPR52734.2025.00121
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Zhao_Progressive_Correspondence_Regenerator_for_Robust_3D_Registration_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/ZhaoAZXG25
  abstract: Obtaining enough high-quality correspondences is crucial for robust registration.
    Existing correspondence refinement methods mostly follow the paradigm of outlier
    removal, which either fails to correctly identify the accurate correspondences
    under extreme outlier ratios, or select too few correct correspondences to support
    robust registration. To address this challenge, we propose a novel approach named
    Regor, which is a progressive correspondence regenerator that generates higher-quality
    matches whist sufficiently robust for numerous outliers. In each iteration, we
    first apply prior-guided local grouping and generalized mutual matching to generate
    the local region correspondences. A powerful center-aware three-point consistency
    is then presented to achieve local correspondence correction, instead of removal.
    Further, we employ global correspondence refinement to obtain accurate correspondences
    from a global perspective. Through progressive iterations, this process yields
    a large number of high-quality correspondences. Extensive experiments on both
    indoor and outdoor datasets demonstrate that the proposed Regor significantly
    outperforms existing outlier removal techniques. More critically, our approach
    obtain 10 times more correct correspondences than outlier removal methods. As
    a result, our method is able to achieve robust registration even with weak features.
    The code is available at [Regor].
