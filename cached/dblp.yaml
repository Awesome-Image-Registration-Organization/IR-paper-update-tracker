- author: Bingbing Zhuang, Quoc-Huy Tran
  title: Image Stitching and Rectification for Hand-Held Cameras.
  venue: ECCV
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/ZhuangT20
  doi: 10.1007/978-3-030-58571-6_15
  ee: https://doi.org/10.1007/978-3-030-58571-6_15
  url: https://dblp.org/rec/conf/eccv/ZhuangT20
  abstract: In this paper, we derive a new differential homography that can account
    for the scanline-varying camera poses in Rolling Shutter (RS) cameras, and demonstrate
    its application to carry out RS-aware image stitching and rectification at one
    stroke. Despite the high complexity of RS geometry, we focus in this paper on
    a special yet common input -- two consecutive frames from a video stream, wherein
    the inter-frame motion is restricted from being arbitrarily large. This allows
    us to adopt simpler differential motion model, leading to a straightforward and
    practical minimal solver. To deal with non-planar scene and camera parallax in
    stitching, we further propose an RS-aware spatially-varying homography field in
    the principle of As-Projective-As-Possible (APAP). We show superior performance
    over state-of-the-art methods both in RS image stitching and rectification, especially
    for images captured by hand-held shaking cameras.
  related_code: ''
- author: Charles Herrmann, Chen Wang 0050, Richard Strong Bowen, Emil Keyder, Ramin
    Zabih
  title: Object-Centered Image Stitching.
  venue: ECCV
  year: '2018'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/HerrmannWBKZ18
  doi: 10.1007/978-3-030-01219-9_50
  ee: https://doi.org/10.1007/978-3-030-01219-9_50
  url: https://dblp.org/rec/conf/eccv/HerrmannWBKZ18
  abstract: 'Image stitching is typically decomposed into three phases: registration,
    which aligns the source images with a common target image; seam finding, which
    determines for each target pixel the source image it should come from; and blending,
    which smooths transitions over the seams. As described in [1], the seam finding
    phase attempts to place seams between pixels where the transition between source
    images is not noticeable. Here, we observe that the most problematic failures
    of this approach occur when objects are cropped, omitted, or duplicated. We therefore
    take an object-centered approach to the problem, leveraging recent advances in
    object detection [2, 3, 4]. We penalize candidate solutions with this class of
    error by modifying the energy function used in the seam finding stage. This produces
    substantially more realistic stitching results on challenging imagery. In addition,
    these methods can be used to determine when there is non-recoverable occlusion
    in the input data, and also suggest a simple evaluation metric that can be used
    to evaluate the output of stitching algorithms.'
