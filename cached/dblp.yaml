- author: Adrià Casamitjana, Marco Lorenzi, Sebastiano Ferraris, Loïc Peter, Marc
    Modat, Allison Stevens, Bruce Fischl, Tom Vercauteren, Juan Eugenio Iglesias
  title: 'Robust joint registration of multiple stains and MRI for multimodal 3D histology
    reconstruction: Application to the Allen human brain atlas.'
  venue: Medical Image Anal.
  year: '2022'
  type: Journal Articles
  access: closed
  key: journals/mia/CasamitjanaLFPM22
  doi: 10.1016/J.MEDIA.2021.102265
  ee: https://doi.org/10.1016/j.media.2021.102265
  url: https://dblp.org/rec/journals/mia/CasamitjanaLFPM22
  abstract: 'Joint registration of a stack of 2D histological sections to recover
    3D structure ("3D histology reconstruction") finds application in areas such as
    atlas building and validation of in vivo imaging. Straightforward pairwise registration
    of neighbouring sections yields smooth reconstructions but has well-known problems
    such as "banana effect" (straightening of curved structures) and "z-shift" (drift).
    While these problems can be alleviated with an external, linearly aligned reference
    (e.g., Magnetic Resonance (MR) images), registration is often inaccurate due to
    contrast differences and the strong nonlinear distortion of the tissue, including
    artefacts such as folds and tears. In this paper, we present a probabilistic model
    of spatial deformation that yields reconstructions for multiple histological stains
    that that are jointly smooth, robust to outliers, and follow the reference shape.
    The model relies on a spanning tree of latent transforms connecting all the sections
    and slices of the reference volume, and assumes that the registration between
    any pair of images can be see as a noisy version of the composition of (possibly
    inverted) latent transforms connecting the two images. Bayesian inference is used
    to compute the most likely latent transforms given a set of pairwise registrations
    between image pairs within and across modalities. We consider two likelihood models:
    Gaussian (ℓ2 norm, which can be minimised in closed form) and Laplacian (ℓ1 norm,
    minimised with linear programming). Results on synthetic deformations on multiple
    MR modalities, show that our method can accurately and robustly register multiple
    contrasts even in the presence of outliers. The framework is used for accurate
    3D reconstruction of two stains (Nissl and parvalbumin) from the Allen human brain
    atlas, showing its benefits on real data with severe distortions. Moreover, we
    also provide the registration of the reconstructed volume to MNI space, bridging
    the gaps between two of the most widely used atlases in histology and MRI. The
    3D reconstructed volumes and atlas registration can be downloaded from https://openneuro.org/datasets/ds003590.
    The code is freely available at https://github.com/acasamitjana/3dhirest.'
- author: Junyu Chen 0002, Eric C. Frey, Yufan He, William Paul Segars, Ye Li, Yong
    Du 0002
  title: 'TransMorph: Transformer for unsupervised medical image registration.'
  venue: Medical Image Anal.
  year: '2022'
  type: Journal Articles
  access: closed
  key: journals/mia/ChenFHSLD22
  doi: 10.1016/J.MEDIA.2022.102615
  ee: https://doi.org/10.1016/j.media.2022.102615
  url: https://dblp.org/rec/journals/mia/ChenFHSLD22
  abstract: 'In the last decade, convolutional neural networks (ConvNets) have been
    a major focus of research in medical image analysis. However, the performances
    of ConvNets may be limited by a lack of explicit consideration of the long-range
    spatial relationships in an image. Recently, Vision Transformer architectures
    have been proposed to address the shortcomings of ConvNets and have produced state-of-the-art
    performances in many medical imaging applications. Transformers may be a strong
    candidate for image registration because their substantially larger receptive
    field enables a more precise comprehension of the spatial correspondence between
    moving and fixed images. Here, we present TransMorph, a hybrid Transformer-ConvNet
    model for volumetric medical image registration. This paper also presents diffeomorphic
    and Bayesian variants of TransMorph: the diffeomorphic variants ensure the topology-preserving
    deformations, and the Bayesian variant produces a well-calibrated registration
    uncertainty estimate. We extensively validated the proposed models using 3D medical
    images from three applications: inter-patient and atlas-to-patient brain MRI registration
    and phantom-to-CT registration. The proposed models are evaluated in comparison
    to a variety of existing registration methods and Transformer architectures. Qualitative
    and quantitative results demonstrate that the proposed Transformer-based model
    leads to a substantial performance improvement over the baseline methods, confirming
    the effectiveness of Transformers for medical image registration.'
- author: Runze Han, Craig K. Jones, Junghoon Lee, Pengwei Wu, Prasad Vagdargi, Ali
    Uneri, Patrick A. Helm, Mark G. Luciano, William S. Anderson, Jeffrey H. Siewerdsen
  title: Deformable MR-CT image registration using an unsupervised, dual-channel network
    for neurosurgical guidance.
  venue: Medical Image Anal.
  year: '2022'
  type: Journal Articles
  access: closed
  key: journals/mia/HanJLWVUHLAS22
  doi: 10.1016/J.MEDIA.2021.102292
  ee: https://doi.org/10.1016/j.media.2021.102292
  url: https://dblp.org/rec/journals/mia/HanJLWVUHLAS22
  abstract: 'PURPOSE The accuracy of minimally invasive, intracranial neurosurgery
    can be challenged by deformation of brain tissue - e.g., up to 10 mm due to egress
    of cerebrospinal fluid during neuroendoscopic approach. We report an unsupervised,
    deep learning-based registration framework to resolve such deformations between
    preoperative MR and intraoperative CT with fast runtime for neurosurgical guidance.
    METHOD The framework incorporates subnetworks for MR and CT image synthesis with
    a dual-channel registration subnetwork (with synthesis uncertainty providing spatially
    varying weights on the dual-channel loss) to estimate a diffeomorphic deformation
    field from both the MR and CT channels. An end-to-end training is proposed that
    jointly optimizes both the synthesis and registration subnetworks. The proposed
    framework was investigated using three datasets: (1) paired MR/CT with simulated
    deformations; (2) paired MR/CT with real deformations; and (3) a neurosurgery
    dataset with real deformation. Two state-of-the-art methods (Symmetric Normalization
    and VoxelMorph) were implemented as a basis of comparison, and variations in the
    proposed dual-channel network were investigated, including single-channel registration,
    fusion without uncertainty weighting, and conventional sequential training of
    the synthesis and registration subnetworks. RESULTS The proposed method achieved:
    (1) Dice coefficient = 0.82±0.07 and TRE = 1.2 ± 0.6 mm on paired MR/CT with simulated
    deformations; (2) Dice coefficient = 0.83 ± 0.07 and TRE = 1.4 ± 0.7 mm on paired
    MR/CT with real deformations; and (3) Dice = 0.79 ± 0.13 and TRE = 1.6 ± 1.0 mm
    on the neurosurgery dataset with real deformations. The dual-channel registration
    with uncertainty weighting demonstrated superior performance (e.g., TRE = 1.2
    ± 0.6 mm) compared to single-channel registration (TRE = 1.6 ± 1.0 mm, p < 0.05
    for CT channel and TRE = 1.3 ± 0.7 mm for MR channel) and dual-channel registration
    without uncertainty weighting (TRE = 1.4 ± 0.8 mm, p < 0.05). End-to-end training
    of the synthesis and registration subnetworks also improved performance compared
    to the conventional sequential training strategy (TRE = 1.3 ± 0.6 mm). Registration
    runtime with the proposed network was ∼3 s. CONCLUSION The deformable registration
    framework based on dual-channel MR/CT registration with spatially varying weights
    and end-to-end training achieved geometric accuracy and runtime that was superior
    to state-of-the-art baseline methods and various ablations of the proposed network.
    The accuracy and runtime of the method may be compatible with the requirements
    of high-precision neurosurgery.'
- author: Miao Kang, Xiaojun Hu, Weilin Huang, Matthew R. Scott, Mauricio Reyes 0001
  title: Dual-stream pyramid registration network.
  venue: Medical Image Anal.
  year: '2022'
  type: Journal Articles
  access: closed
  key: journals/mia/KangHHSR22
  doi: 10.1016/J.MEDIA.2022.102379
  ee: https://doi.org/10.1016/j.media.2022.102379
  url: https://dblp.org/rec/journals/mia/KangHHSR22
  abstract: 'We propose a Dual-stream Pyramid Registration Network (referred as Dual-PRNet)
    for unsupervised 3D brain image registration. Unlike recent CNN-based registration
    approaches, such as VoxelMorph, which computes a registration field from a pair
    of 3D volumes using a single-stream network, we design a two-stream architecture
    able to estimate multi-level registration fields sequentially from a pair of feature
    pyramids. Our main contributions are: (i) we design a two-stream 3D encoder-decoder
    network that computes two convolutional feature pyramids separately from two input
    volumes; (ii) we propose sequential pyramid registration where a sequence of pyramid
    registration (PR) modules is designed to predict multi-level registration fields
    directly from the decoding feature pyramids. The registration fields are refined
    gradually in a coarse-to-fine manner via sequential warping, which equips the
    model with a strong capability for handling large deformations; (iii) the PR modules
    can be further enhanced by computing local 3D correlations between the feature
    pyramids, resulting in the improved Dual-PRNet++ able to aggregate rich detailed
    anatomical structure of the brain; (iv) our Dual-PRNet++ can be integrated into
    a 3D segmentation framework for joint registration and segmentation, by precisely
    warping voxel-level annotations. Our methods are evaluated on two standard benchmarks
    for brain MRI registration, where Dual-PRNet++ outperforms the state-of-the-art
    approaches by a large margin, i.e., improving recent VoxelMorph from 0.511 to
    0.748 (Dice score) on the Mindboggle101 dataset. In addition, we further demonstrate
    that our methods can greatly facilitate the segmentation task in a joint learning
    framework, by leveraging limited annotations.'
- author: Matthew Sinclair, Andreas Schuh, Karl Hahn, Kersten Petersen, Ying Bai,
    James Batten, Michiel Schaap, Ben Glocker
  title: 'Atlas-ISTN: Joint segmentation, registration and atlas construction with
    image-and-spatial transformer networks.'
  venue: Medical Image Anal.
  year: '2022'
  type: Journal Articles
  access: open
  key: journals/mia/SinclairSHPBBSG22
  doi: 10.1016/J.MEDIA.2022.102383
  ee: https://doi.org/10.1016/j.media.2022.102383
  url: https://dblp.org/rec/journals/mia/SinclairSHPBBSG22
  abstract: Deep learning models for semantic segmentation are able to learn powerful
    representations for pixel-wise predictions, but are sensitive to noise at test
    time and may lead to implausible topologies. Image registration models on the
    other hand are able to warp known topologies to target images as a means of segmentation,
    but typically require large amounts of training data, and have not widely been
    benchmarked against pixel-wise segmentation models. We propose the Atlas Image-and-Spatial
    Transformer Network (Atlas-ISTN), a framework that jointly learns segmentation
    and registration on 2D and 3D image data, and constructs a population-derived
    atlas in the process. Atlas-ISTN learns to segment multiple structures of interest
    and to register the constructed atlas labelmap to an intermediate pixel-wise segmentation.
    Additionally, Atlas-ISTN allows for test time refinement of the model's parameters
    to optimize the alignment of the atlas labelmap to an intermediate pixel-wise
    segmentation. This process both mitigates for noise in the target image that can
    result in spurious pixel-wise predictions, as well as improves upon the one-pass
    prediction of the model. Benefits of the Atlas-ISTN framework are demonstrated
    qualitatively and quantitatively on 2D synthetic data and 3D cardiac computed
    tomography and brain magnetic resonance image data, out-performing both segmentation
    and registration baseline models. Atlas-ISTN also provides inter-subject correspondence
    of the structures of interest.
- author: Xinrui Song, Hanqing Chao, Xuanang Xu, Hengtao Guo, Sheng Xu 0001, Baris
    Turkbey, Bradford J. Wood, Thomas Sanford, Ge Wang 0001, Pingkun Yan
  title: Cross-modal attention for multi-modal image registration.
  venue: Medical Image Anal.
  year: '2022'
  type: Journal Articles
  access: closed
  key: journals/mia/SongCXGXTWSWY22
  doi: 10.1016/J.MEDIA.2022.102612
  ee: https://doi.org/10.1016/j.media.2022.102612
  url: https://dblp.org/rec/journals/mia/SongCXGXTWSWY22
  abstract: In the past few years, convolutional neural networks (CNNs) have been
    proven powerful in extracting image features crucial for medical image registration.
    However, challenging applications and recent advances in computer vision suggest
    that CNNs are limited in their ability to understand the spatial correspondence
    between features, which is at the core of image registration. The issue is further
    exaggerated when it comes to multi-modal image registration, where the appearances
    of input images can differ significantly. This paper presents a novel cross-modal
    attention mechanism for correlating features extracted from the multi-modal input
    images and mapping such correlation to image registration transformation. To efficiently
    train the developed network, a contrastive learning-based pre-training method
    is also proposed to aid the network in extracting high-level features across the
    input modalities for the following cross-modal attention learning. We validated
    the proposed method on transrectal ultrasound (TRUS) to magnetic resonance (MR)
    registration, a clinically important procedure that benefits prostate cancer biopsy.
    Our experimental results demonstrate that for MR-TRUS registration, a deep neural
    network embedded with the cross-modal attention block outperforms other advanced
    CNN-based networks with ten times its size. We also incorporated visualization
    techniques to improve the interpretability of our network, which helps bring insights
    into the deep learning based image registration methods. The source code of our
    work is available at https://github.com/DIAL-RPI/Attention-Reg.
- author: Maarten L. Terpstra, Matteo Maspero, Alessandro Sbrizzi, Cornelis A. T.
    van den Berg
  title: '⊥-loss: A symmetric loss function for magnetic resonance imaging reconstruction
    and image registration with deep learning.'
  venue: Medical Image Anal.
  year: '2022'
  type: Journal Articles
  access: open
  key: journals/mia/TerpstraMSB22
  doi: 10.1016/J.MEDIA.2022.102509
  ee: https://doi.org/10.1016/j.media.2022.102509
  url: https://dblp.org/rec/journals/mia/TerpstraMSB22
  abstract: Convolutional neural networks (CNNs) are increasingly adopted in medical
    imaging, e.g., to reconstruct high-quality images from undersampled magnetic resonance
    imaging (MRI) acquisitions or estimate subject motion during an examination. MRI
    is naturally acquired in the complex domain C, obtaining magnitude and phase information
    in k-space. However, CNNs in complex regression tasks are almost exclusively trained
    to minimize the L2 loss or maximizing the magnitude structural similarity (SSIM),
    which are possibly not optimal as they do not take full advantage of the magnitude
    and phase information present in the complex domain. This work identifies that
    minimizing the L2 loss in the complex field has an asymmetry in the magnitude/phase
    loss landscape and is biased, underestimating the reconstructed magnitude. To
    resolve this, we propose a new loss function for regression in the complex domain
    called ⊥-loss, which adds a novel phase term to established magnitude loss functions,
    e.g., L2 or SSIM. We show ⊥-loss is symmetric in the magnitude/phase domain and
    has favourable properties when applied to regression in the complex domain. Specifically,
    we evaluate the ⊥+ℓ2-loss and ⊥+SSIM-loss for complex undersampled MR image reconstruction
    tasks and MR image registration tasks. We show that training a model to minimize
    the ⊥+ℓ2-loss outperforms models trained to minimize the L2 loss and results in
    similar performance compared to models trained to maximize the magnitude SSIM
    while offering high-quality phase reconstruction. Moreover, ⊥-loss is defined
    in Rn, and we apply the loss function to the R2 domain by learning 2D deformation
    vector fields for image registration. We show that a model trained to minimize
    the ⊥+ℓ2-loss outperforms models trained to minimize the end-point error loss.
- author: Heying Wang, Qince Li, Yongfeng Yuan, Ze Zhang, Kuanquan Wang, Henggui Zhang
  title: Inter-subject registration-based one-shot segmentation with alternating union
    network for cardiac MRI images.
  venue: Medical Image Anal.
  year: '2022'
  type: Journal Articles
  access: closed
  key: journals/mia/WangLYZWZ22
  doi: 10.1016/J.MEDIA.2022.102455
  ee: https://doi.org/10.1016/j.media.2022.102455
  url: https://dblp.org/rec/journals/mia/WangLYZWZ22
  abstract: Medical image segmentation based on deep-learning networks makes great
    progress in assisting disease diagnosis. However, currently, the training of most
    networks still requires a large amount of data with labels. In reality, labeling
    a considerable number of medical images is challenging and time-consuming. In
    order to tackle this challenge, a new one-shot segmentation framework for cardiac
    MRI images based on an inter-subject registration model called Alternating Union
    Network (AUN) is proposed in this study. The label of the source image is warped
    with deformation fields discovered from AUN to segment target images directly.
    Initially, the volumes are pre-processed by aligning affinely and adjusting the
    global intensity to simplify subsequent deformation registration. AUN consists
    of two kinds of subnetworks trained alternately to optimize segmentation gradually.
    The first kind of subnetwork takes a pair of volumes as inputs and registers them
    using global intensity similarity. The second kind of subnetwork, which takes
    the predicted labels generated from the previous subnetwork and the labels refined
    using the information of intrinsic anatomical structures of interest as inputs,
    is intensity-independent and focuses attention on registering structures of interest.
    Specifically, the input of AUN is a pair of a labeled image with the texture in
    regions of interest removed and a target image. Additionally, a new similarity
    measurement more appropriate for registering such image pair is defined as Local
    Squared Error (LSE). The proposed registration-based one-shot segmentation pays
    attention to the problem of the lack of labeled medical images. In AUN, only one
    labeled volume is required and a large number of unlabeled ones can be leveraged
    to improve segmentation performance, which has great advantages in clinical application.
    In addition, the intensity-independent subnetwork and LSE proposed in this study
    empower the framework to segment medical images with complicated intensity distribution.
- author: Di Wang, Yue Pan 0013, Oguz C. Durumeric, Joseph M. Reinhardt, Eric A. Hoffman,
    Joyce D. Schroeder, Gary E. Christensen
  title: 'PLOSL: Population learning followed by one shot learning pulmonary image
    registration using tissue volume preserving and vesselness constraints.'
  venue: Medical Image Anal.
  year: '2022'
  type: Journal Articles
  access: open
  key: journals/mia/WangPDRHSC22
  doi: 10.1016/J.MEDIA.2022.102434
  ee: https://doi.org/10.1016/j.media.2022.102434
  url: https://dblp.org/rec/journals/mia/WangPDRHSC22
  abstract: This paper presents the Population Learning followed by One Shot Learning
    (PLOSL) pulmonary image registration method. PLOSL is a fast unsupervised learning-based
    framework for 3D-CT pulmonary image registration algorithm based on combining
    population learning (PL) and one-shot learning (OSL). The PLOSL image registration
    has the advantages of the PL and OSL approaches while reducing their respective
    drawbacks. The advantages of PLOSL include improved performance over PL, substantially
    reducing OSL training time and reducing the likelihood of OSL getting stuck in
    local minima. PLOSL pulmonary image registration uses tissue volume preserving
    and vesselness constraints for registration of inspiration-to-expiration and expiration-to-inspiration
    pulmonary CT images. A coarse-to-fine convolution encoder-decoder CNN architecture
    is used to register large and small shape features. During training, the sum of
    squared tissue volume difference (SSTVD) compensates for intensity differences
    between inspiration and expiration computed tomography (CT) images and the sum
    of squared vesselness measure difference (SSVMD) helps match the lung vessel tree.
    Results show that the PLOSL (SSTVD+SSVMD) algorithm achieved subvoxel landmark
    error while preserving pulmonary topology on the SPIROMICS data set, the public
    DIR-LAB COPDGene and 4DCT data sets.
- author: Pablo Alvarez 0001, Simon Rouzé, Michael I. Miga, Yohan Payan, Jean-Louis
    Dillenseger, Matthieu Chabanas
  title: A hybrid, image-based and biomechanics-based registration approach to markerless
    intraoperative nodule localization during video-assisted thoracoscopic surgery.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/mia/0001RMPDC21
  doi: 10.1016/J.MEDIA.2021.101983
  ee: https://doi.org/10.1016/j.media.2021.101983
  url: https://dblp.org/rec/journals/mia/0001RMPDC21
  abstract: 'The resection of small, low-dense or deep lung nodules during video-assisted
    thoracoscopic surgery (VATS) is surgically challenging. Nodule localization methods
    in clinical practice typically rely on the preoperative placement of markers,
    which may lead to clinical complications. We propose a markerless lung nodule
    localization framework for VATS based on a hybrid method combining intraoperative
    cone-beam CT (CBCT) imaging, free-form deformation image registration, and a poroelastic
    lung model with allowance for air evacuation. The difficult problem of estimating
    intraoperative lung deformations is decomposed into two more tractable sub-problems:
    (i) estimating the deformation due the change of patient pose from preoperative
    CT (supine) to intraoperative CBCT (lateral decubitus); and (ii) estimating the
    pneumothorax deformation, i.e. a collapse of the lung within the thoracic cage.
    We were able to demonstrate the feasibility of our localization framework with
    a retrospective validation study on 5 VATS clinical cases. Average initial errors
    in the range of 22 to 38 mm were reduced to the range of 4 to 14 mm, corresponding
    to an error correction in the range of 63 to 85%. To our knowledge, this is the
    first markerless lung deformation compensation method dedicated to VATS and validated
    on actual clinical data.'
- author: Zachary M. C. Baum, Yipeng Hu, Dean C. Barratt
  title: Real-time multimodal image registration with partial intraoperative point-set
    data.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: open
  key: journals/mia/BaumHB21
  doi: 10.1016/J.MEDIA.2021.102231
  ee: https://doi.org/10.1016/j.media.2021.102231
  url: https://dblp.org/rec/journals/mia/BaumHB21
  abstract: Highlights • Network predicts non-rigid point displacements for of MR-TRUS
    prostate volume registration.• Adopts “model-free” deformation via data-driven
    learning without heuristic constraints.• Network architecture accepts variable
    number of points in training or at inference.• Registration accuracy on sparse
    data similar to complete data in MR-TRUS registration.
- author: Riddhish Bhalodia, Shireen Y. Elhabian, Ladislav Kavan, Ross T. Whitaker
  title: Leveraging unsupervised image registration for discovery of landmark shape
    descriptor.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/mia/BhalodiaEKW21
  doi: 10.1016/J.MEDIA.2021.102157
  ee: https://doi.org/10.1016/j.media.2021.102157
  url: https://dblp.org/rec/journals/mia/BhalodiaEKW21
  abstract: In current biological and medical research, statistical shape modeling
    (SSM) provides an essential framework for the characterization of anatomy/morphology.
    Such analysis is often driven by the identification of a relatively small number
    of geometrically consistent features found across the samples of a population.
    These features can subsequently provide information about the population shape
    variation. Dense correspondence models can provide ease of computation and yield
    an interpretable low-dimensional shape descriptor when followed by dimensionality
    reduction. However, automatic methods for obtaining such correspondences usually
    require image segmentation followed by significant preprocessing, which is taxing
    in terms of both computation as well as human resources. In many cases, the segmentation
    and subsequent processing require manual guidance and anatomy specific domain
    expertise. This paper proposes a self-supervised deep learning approach for discovering
    landmarks from images that can directly be used as a shape descriptor for subsequent
    analysis. We use landmark-driven image registration as the primary task to force
    the neural network to discover landmarks that register the images well. We also
    propose a regularization term that allows for robust optimization of the neural
    network and ensures that the landmarks uniformly span the image domain. The proposed
    method circumvents segmentation and preprocessing and directly produces a usable
    shape descriptor using just 2D or 3D images. In addition, we also propose two
    variants on the training loss function that allows for prior shape information
    to be integrated into the model. We apply this framework on several 2D and 3D
    datasets to obtain their shape descriptors. We analyze these shape descriptors
    in their efficacy of capturing shape information by performing different shape-driven
    applications depending on the data ranging from shape clustering to severity prediction
    to outcome diagnosis.
- author: Max Blendowski, Lasse Hansen, Mattias P. Heinrich
  title: Weakly-supervised learning of multi-modal features for regularised iterative
    descent in 3D image registration.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/mia/BlendowskiHH21
  doi: 10.1016/J.MEDIA.2020.101822
  ee: https://doi.org/10.1016/j.media.2020.101822
  url: https://dblp.org/rec/journals/mia/BlendowskiHH21
  abstract: Methods for deep learning based medical image registration have only recently
    approached the quality of classical model-based image alignment. The dual challenge
    of both a very large trainable parameter space and often insufficient availability
    of expert supervised correspondence annotations has led to slower progress compared
    to other domains such as image segmentation. Yet, image registration could also
    more directly benefit from an iterative solution than segmentation. We therefore
    believe that significant improvements, in particular for multi-modal registration,
    can be achieved by disentangling appearance-based feature learning and deformation
    estimation. In this work, we examine an end-to-end trainable, weakly-supervised
    deep learning-based feature extraction approach that is able to map the complex
    appearance to a common space. Our results on thoracoabdominal CT and MRI image
    registration show that the proposed method compares favourably well to state-of-the-art
    hand-crafted multi-modal features, Mutual Information-based approaches and fully-integrated
    CNN-based methods - and handles even the limitation of small and only weakly-labeled
    training data sets.
- author: Xiang Chen 0008, Nishant Ravikumar, Yan Xia 0002, Rahman Attar, Andres Diaz-Pinto,
    Stefan K. Piechnik, Stefan Neubauer, Steffen E. Petersen, Alejandro F. Frangi
  title: Shape registration with learned deformations for 3D shape reconstruction
    from sparse and incomplete point clouds.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: open
  key: journals/mia/ChenRXADPNPF21
  doi: 10.1016/J.MEDIA.2021.102228
  ee: https://doi.org/10.1016/j.media.2021.102228
  url: https://dblp.org/rec/journals/mia/ChenRXADPNPF21
  abstract: Shape reconstruction from sparse point clouds/images is a challenging
    and relevant task required for a variety of applications in computer vision and
    medical image analysis (e.g. surgical navigation, cardiac motion analysis, augmented/virtual
    reality systems). A subset of such methods, viz. 3D shape reconstruction from
    2D contours, is especially relevant for computer-aided diagnosis and intervention
    applications involving meshes derived from multiple 2D image slices, views or
    projections. We propose a deep learning architecture, coined Mesh Reconstruction
    Network (MR-Net), which tackles this problem. MR-Net enables accurate 3D mesh
    reconstruction in real-time despite missing data and with sparse annotations.
    Using 3D cardiac shape reconstruction from 2D contours defined on short-axis cardiac
    magnetic resonance image slices as an exemplar, we demonstrate that our approach
    consistently outperforms state-of-the-art techniques for shape reconstruction
    from unstructured point clouds. Our approach can reconstruct 3D cardiac meshes
    to within 2.5-mm point-to-point error, concerning the ground-truth data (the original
    image spatial resolution is ∼1.8×1.8×10mm3). We further evaluate the robustness
    of the proposed approach to incomplete data, and contours estimated using an automatic
    segmentation algorithm. MR-Net is generic and could reconstruct shapes of other
    organs, making it compelling as a tool for various applications in medical image
    analysis.
- author: Veronica Corona, Angelica I. Avilés-Rivero, Noémie Debroux, Carole Le Guyader,
    Carola-Bibiane Schönlieb
  title: 'Variational multi-task MRI reconstruction: Joint reconstruction, registration
    and super-resolution.'
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/mia/CoronaADGS21
  doi: 10.1016/J.MEDIA.2020.101941
  ee: https://doi.org/10.1016/j.media.2020.101941
  url: https://dblp.org/rec/journals/mia/CoronaADGS21
  abstract: 'Motion degradation is a central problem in Magnetic Resonance Imaging
    (MRI). This work addresses the problem of how to obtain higher quality, super-resolved
    motion-free reconstructions from highly undersampled MRI data. In this work, we
    present for the first time a variational multi-task framework that allows joining
    three relevant tasks in MRI: reconstruction, registration and super-resolution.
    Our framework takes a set of multiple undersampled MR acquisitions corrupted by
    motion into a novel multi-task optimisation model, which is composed of an L2
    fidelity term that allows sharing representation between tasks, super-resolution
    foundations and hyperelastic deformations to model biological tissue behaviors.
    We demonstrate that this combination yields significant improvements over sequential
    models and other bi-task methods. Our results exhibit fine details and compensate
    for motion producing sharp and highly textured images compared to state of the
    art methods while keeping low CPU time. Our improvements are appraised on both
    clinical assessment and statistical analysis.'
- author: Robert Frysch, Tim Pfeiffer, Georg Rose
  title: A novel approach to 2D/3D registration of X-ray images using Grangeat&apos;s
    relation.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: open
  key: journals/mia/FryschPR21
  doi: 10.1016/J.MEDIA.2020.101815
  ee: https://doi.org/10.1016/j.media.2020.101815
  url: https://dblp.org/rec/journals/mia/FryschPR21
  abstract: Fast and accurate 2D/3D registration plays an important role in many applications,
    ranging from scientific and engineering domains all the way to medical care. Today's
    predominant methods are based on computationally expensive approaches, such as
    virtual forward or back projections, that limit the real-time applicability of
    the routines. Here, we present a novel concept that makes use of Grangeat's relation
    to intertwine information from the 3D volume and the 2D projection space in a
    way that allows pre-computation of all time-intensive steps. The main effort within
    actual registration tasks is reduced to simple resampling of the pre-calculated
    values, which can be executed rapidly on modern GPU hardware. We analyze the applicability
    of the proposed method on simulated data under various conditions and evaluate
    the findings on real data from a C-arm CT scanner. Our results show high registration
    quality in both simulated as well as real data scenarios and demonstrate a reduction
    in computation time for the crucial computation step by a factor of six to eight
    when compared to state-of-the-art routines. With minor trade-offs in accuracy,
    this speed-up can even be increased up to a factor of 100 in particular settings.
    To our knowledge, this is the first application of Grangeat's relation to the
    topic of 2D/3D registration. Due to its high computational efficiency and broad
    range of potential applications, we believe it constitutes a highly relevant approach
    for various problems dealing with cone beam transmission images.
- author: Yabo Fu, Yang Lei 0002, Tonghe Wang, Pretesh Patel, Ashesh B. Jani, Hui
    Mao, Walter J. Curran, Tian Liu 0004, Xiaofeng Yang 0005
  title: Biomechanically constrained non-rigid MR-TRUS prostate registration using
    deep learning based 3D point cloud matching.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/mia/FuLWPJMCLY21
  doi: 10.1016/J.MEDIA.2020.101845
  ee: https://doi.org/10.1016/j.media.2020.101845
  url: https://dblp.org/rec/journals/mia/FuLWPJMCLY21
  abstract: A non-rigid MR-TRUS image registration framework is proposed for prostate
    interventions. The registration framework consists of a convolutional neural networks
    (CNN) for MR prostate segmentation, a CNN for TRUS prostate segmentation and a
    point-cloud based network for rapid 3D point cloud matching. Volumetric prostate
    point clouds were generated from the segmented prostate masks using tetrahedron
    meshing. The point cloud matching network was trained using deformation field
    that was generated by finite element analysis. Therefore, the network implicitly
    models the underlying biomechanical constraint when performing point cloud matching.
    A total of 50 patients' datasets were used for the network training and testing.
    Alignment of prostate shapes after registration was evaluated using three metrics
    including Dice similarity coefficient (DSC), mean surface distance (MSD) and Hausdorff
    distance (HD). Internal point-to-point registration accuracy was assessed using
    target registration error (TRE). Jacobian determinant and strain tensors of the
    predicted deformation field were calculated to analyze the physical fidelity of
    the deformation field. On average, the mean and standard deviation were 0.94±0.02,
    0.90±0.23 mm, 2.96±1.00 mm and 1.57±0.77 mm for DSC, MSD, HD and TRE, respectively.
    Robustness of our method to point cloud noise was evaluated by adding different
    levels of noise to the query point clouds. Our results demonstrated that the proposed
    method could rapidly perform MR-TRUS image registration with good registration
    accuracy and robustness.
- author: Runze Han, Ali Uneri, Rohan C. Vijayan, Pengwei Wu, Prasad Vagdargi, Niral
    Sheth, Sebastian Vogt 0001, Gerhard Kleinszig, G. M. Osgood, Jeffrey H. Siewerdsen
  title: Fracture reduction planning and guidance in orthopaedic trauma surgery via
    multi-body image registration.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/mia/HanUVWVSVKOS21
  doi: 10.1016/J.MEDIA.2020.101917
  ee: https://doi.org/10.1016/j.media.2020.101917
  url: https://dblp.org/rec/journals/mia/HanUVWVSVKOS21
  abstract: 'PURPOSES Surgical reduction of pelvic fracture is a challenging procedure,
    and accurate restoration of natural morphology is essential to obtaining positive
    functional outcome. The procedure often requires extensive preoperative planning,
    long fluoroscopic exposure time, and trial-and-error to achieve accurate reduction.
    We report a multi-body registration framework for reduction planning using preoperative
    CT and intraoperative guidance using routine 2D fluoroscopy that could help address
    such challenges. METHOD The framework starts with semi-automatic segmentation
    of fractured bone fragments in preoperative CT using continuous max-flow. For
    reduction planning, a multi-to-one registration is performed to register bone
    fragments to an adaptive template that adjusts to patient-specific bone shapes
    and poses. The framework further registers bone fragments to intraoperative fluoroscopy
    to provide 2D fluoroscopy guidance and/or 3D navigation relative to the reduction
    plan. The framework was investigated in three studies: (1) a simulation study
    of 40 CT images simulating three fracture categories (unilateral two-body, unilateral
    three-body, and bilateral two-body); (2) a proof-of-concept cadaver study to mimic
    clinical scenario; and (3) a retrospective clinical study investigating feasibility
    in three cases of increasing severity and accuracy requirement. RESULTS Segmentation
    of simulated pelvic fracture demonstrated Dice coefficient of 0.92±0.06. Reduction
    planning using the adaptive template achieved 2-3 mm and 2-3° error for the three
    fracture categories, significantly better than planning based on mirroring of
    contralateral anatomy. 3D-2D registration yielded ~2 mm and 0.5° accuracy, providing
    accurate guidance with respect to the preoperative reduction plan. The cadaver
    study and retrospective clinical study demonstrated comparable accuracy: ~0.90
    Dice coefficient in segmentation, ~3 mm accuracy in reduction planning, and ~2
    mm accuracy in 3D-2D registration. CONCLUSION The registration framework demonstrated
    planning and guidance accuracy within clinical requirements in both simulation
    and clinical feasibility studies for a broad range of fracture-dislocation patterns.
    Using routinely acquired preoperative CT and intraoperative fluoroscopy, the framework
    could improve the accuracy of pelvic fracture reduction, reduce radiation dose,
    and could integrate well with common clinical workflow without the need for additional
    navigation systems.'
- author: Alessa Hering, Stephanie Häger, Jan Hendrik Moltz, Nikolas Lessmann, Stefan
    Heldmann, Bram van Ginneken
  title: CNN-based lung CT registration with multiple anatomical constraints.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: open
  key: journals/mia/HeringHMLHG21
  doi: 10.1016/J.MEDIA.2021.102139
  ee: https://doi.org/10.1016/j.media.2021.102139
  url: https://dblp.org/rec/journals/mia/HeringHMLHG21
  abstract: Deep-learning-based registration methods emerged as a fast alternative
    to conventional registration methods. However, these methods often still cannot
    achieve the same performance as conventional registration methods because they
    are either limited to small deformation or they fail to handle a superposition
    of large and small deformations without producing implausible deformation fields
    with foldings inside. In this paper, we identify important strategies of conventional
    registration methods for lung registration and successfully developed the deep-learning
    counterpart. We employ a Gaussian-pyramid-based multilevel framework that can
    solve the image registration optimization in a coarse-to-fine fashion. Furthermore,
    we prevent foldings of the deformation field and restrict the determinant of the
    Jacobian to physiologically meaningful values by combining a volume change penalty
    with a curvature regularizer in the loss function. Keypoint correspondences are
    integrated to focus on the alignment of smaller structures. We perform an extensive
    evaluation to assess the accuracy, the robustness, the plausibility of the estimated
    deformation fields, and the transferability of our registration approach. We show
    that it achieves state-of-the-art results on the COPDGene dataset compared to
    conventional registration method with much shorter execution time. In our experiments
    on the DIRLab exhale to inhale lung registration, we demonstrate substantial improvements
    (TRE below 1.2 mm) over other deep learning methods. Our algorithm is publicly
    available at https://grand-challenge.org/algorithms/deep-learning-based-ct-lung-registration/.
- author: Jing Hu 0009, Ziwei Luo 0002, Xin Wang 0045, Shanhui Sun, Youbing Yin, Kunlin
    Cao, Qi Song 0001, Siwei Lyu, Xi Wu 0004
  title: End-to-end multimodal image registration via reinforcement learning.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/mia/HuLWSYCSLW21
  doi: 10.1016/J.MEDIA.2020.101878
  ee: https://doi.org/10.1016/j.media.2020.101878
  url: https://dblp.org/rec/journals/mia/HuLWSYCSLW21
  abstract: 'Multimodal image registration is a vital initial step in several medical
    image applications for providing complementary information from different data
    modalities. Since images with different modalities do not exhibit the same characteristics,
    finding their accurate correspondences remains a challenge. For convolutional
    multimodal registration methods, two components are quite significant: descriptive
    image feature as well as the suited similarity metric. However, these two components
    are often custom-designed and are infeasible to the high diversity of tissue appearance
    across modalities. In this paper, we translate image registration into a decision-making
    problem, where registration is achieved via an artificial agent trained by asynchronous
    reinforcement learning. More specifically, convolutional long-short-term-memory
    is incorporated after stacked convolutional layers in this method to extract spatial-temporal
    image features and learn the similarity metric implicitly. A customized reward
    function driven by landmark error is advocated to guide the agent to the correct
    registration direction. A Monte Carlo rollout strategy is also leveraged to perform
    as a look-ahead inference in the testing stage, to increase registration accuracy
    further. Experiments on paired CT and MR images of patients diagnosed as nasopharyngeal
    carcinoma demonstrate that our method achieves state-of-the-art performance in
    medical image registration.'
- author: Yunzhi Huang, Sahar Ahmad, Jingfan Fan, Dinggang Shen, Pew-Thian Yap
  title: Difficulty-aware hierarchical convolutional neural networks for deformable
    registration of brain MR images.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/mia/HuangAFSY21
  doi: 10.1016/J.MEDIA.2020.101817
  ee: https://doi.org/10.1016/j.media.2020.101817
  url: https://dblp.org/rec/journals/mia/HuangAFSY21
  abstract: The aim of deformable brain image registration is to align anatomical
    structures, which can potentially vary with large and complex deformations. Anatomical
    structures vary in size and shape, requiring the registration algorithm to estimate
    deformation fields at various degrees of complexity. Here, we present a difficulty-aware
    model based on an attention mechanism to automatically identify hard-to-register
    regions, allowing better estimation of large complex deformations. The difficulty-aware
    model is incorporated into a cascaded neural network consisting of three sub-networks
    to fully leverage both global and local contextual information for effective registration.
    The first sub-network is trained at the image level to predict a coarse-scale
    deformation field, which is then used for initializing the subsequent sub-network.
    The next two sub-networks progressively optimize at the patch level with different
    resolutions to predict a fine-scale deformation field. Embedding difficulty-aware
    learning into the hierarchical neural network allows harder patches to be identified
    in the deeper sub-networks at higher resolutions for refining the deformation
    field. Experiments conducted on four public datasets validate that our method
    achieves promising registration accuracy with better preservation of topology,
    compared with state-of-the-art registration methods.
- author: Boah Kim, Dong Hwan Kim, Seong Ho Park, Jieun Kim, June-Goo Lee, Jong Chul
    Ye
  title: 'CycleMorph: Cycle consistent unsupervised deformable image registration.'
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/mia/KimKPKLY21
  doi: 10.1016/J.MEDIA.2021.102036
  ee: https://doi.org/10.1016/j.media.2021.102036
  url: https://dblp.org/rec/journals/mia/KimKPKLY21
  abstract: Image registration is a fundamental task in medical image analysis. Recently,
    many deep learning based image registration methods have been extensively investigated
    due to their comparable performance with the state-of-the-art classical approaches
    despite the ultra-fast computational time. However, the existing deep learning
    methods still have limitations in the preservation of original topology during
    the deformation with registration vector fields. To address this issues, here
    we present a cycle-consistent deformable image registration, dubbed CycleMorph.
    The cycle consistency enhances image registration performance by providing an
    implicit regularization to preserve topology during the deformation. The proposed
    method is so flexible that it can beapplied for both 2D and 3D registration problems
    for various applications, and can be easily extended to multi-scale implementation
    to deal with the memory issues in large volume registration. Experimental results
    on various datasets from medical and non-medical applications demonstrate that
    the proposed method provides effective and accurate registration on diverse image
    pairs within a few seconds. Qualitative and quantitative evaluations on deformation
    fields also verify the effectiveness of the cycle consistency of the proposed
    method.
- author: Jiulong Liu, Angelica I. Avilés-Rivero, Hui Ji 0002, Carola-Bibiane Schönlieb
  title: 'Rethinking medical image reconstruction via shape prior, going deeper and
    faster: Deep joint indirect registration and reconstruction.'
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/mia/LiuAJS21
  doi: 10.1016/J.MEDIA.2020.101930
  ee: https://doi.org/10.1016/j.media.2020.101930
  url: https://dblp.org/rec/journals/mia/LiuAJS21
  abstract: Indirect image registration is a promising technique to improve image
    reconstruction quality by providing a shape prior for the reconstruction task.
    In this paper, we propose a novel hybrid method that seeks to reconstruct high
    quality images from few measurements whilst requiring low computational cost.
    With this purpose, our framework intertwines indirect registration and reconstruction
    tasks is a single functional. It is based on two major novelties. Firstly, we
    introduce a model based on deep nets to solve the indirect registration problem,
    in which the inversion and registration mappings are recurrently connected through
    a fixed-point interaction based sparse optimisation. Secondly, we introduce specific
    inversion blocks, that use the explicit physical forward operator, to map the
    acquired measurements to the image reconstruction. We also introduce registration
    blocks based deep nets to predict the registration parameters and warp transformation
    accurately and efficiently. We demonstrate, through extensive numerical and visual
    experiments, that our framework outperforms significantly classic reconstruction
    schemes and other bi-task method; this in terms of both image quality and computational
    time. Finally, we show generalisation capabilities of our approach by demonstrating
    their performance on fast Magnetic Resonance Imaging (MRI), sparse view computed
    tomography (CT) and low dose CT with measurements much below the Nyquist limit.
- author: Megumi Nakao, Kotaro Kobayashi, Junko Tokuno, Toyofumi Chen-Yoshikawa, Hiroshi
    Date, Tetsuya Matsuda
  title: Deformation analysis of surface and bronchial structures in intraoperative
    pneumothorax using deformable mesh registration.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: open
  key: journals/mia/NakaoKTCDM21
  doi: 10.1016/J.MEDIA.2021.102181
  ee: https://doi.org/10.1016/j.media.2021.102181
  url: https://dblp.org/rec/journals/mia/NakaoKTCDM21
  abstract: The positions of nodules can change because of intraoperative lung deflation,
    and the modeling of pneumothorax-associated deformation remains a challenging
    issue for intraoperative tumor localization. In this study, we introduce spatial
    and geometric analysis methods for inflated/deflated lungs and discuss heterogeneity
    in pneumothorax-associated lung deformation. Contrast-enhanced CT images simulating
    intraoperative conditions were acquired from live Beagle dogs. The images contain
    the overall shape of the lungs, including all lobes and internal bronchial structures,
    and were analyzed to provide a statistical deformation model that could be used
    as prior knowledge to predict pneumothorax. To address the difficulties of mapping
    pneumothorax CT images with topological changes and CT intensity shifts, we designed
    deformable mesh registration techniques for mixed data structures including the
    lobe surfaces and the bronchial centerlines. Three global-to-local registration
    steps were performed under the constraint that the deformation was spatially continuous
    and smooth, while matching visible bronchial tree structures as much as possible.
    The developed framework achieved stable registration with a Hausdorff distance
    of less than 1 mm and a target registration error of less than 5 mm, and visualized
    deformation fields that demonstrate per-lobe contractions and rotations with high
    variability between subjects. The deformation analysis results show that the strain
    of lung parenchyma was 35% higher than that of bronchi, and that deformation in
    the deflated lung is heterogeneous.
- author: Xavier Rafael-Palou, Anton Aubanell, Ilaria Bonavita, Mario Ceresa, Gemma
    Piella, Vicent J. Ribas, Miguel Ángel González Ballester
  title: Re-Identification and growth detection of pulmonary nodules without image
    registration using 3D siamese neural networks.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/mia/Rafael-PalouABC21
  doi: 10.1016/J.MEDIA.2020.101823
  ee: https://doi.org/10.1016/j.media.2020.101823
  url: https://dblp.org/rec/journals/mia/Rafael-PalouABC21
  abstract: Lung cancer follow-up is a complex, error prone, and time consuming task
    for clinical radiologists. Several lung CT scan images taken at different time
    points of a given patient need to be individually inspected, looking for possible
    cancerogenous nodules. Radiologists mainly focus their attention in nodule size,
    density, and growth to assess the existence of malignancy. In this study, we present
    a novel method based on a 3D siamese neural network, for the re-identification
    of nodules in a pair of CT scans of the same patient without the need for image
    registration. The network was integrated into a two-stage automatic pipeline to
    detect, match, and predict nodule growth given pairs of CT scans. Results on an
    independent test set reported a nodule detection sensitivity of 94.7%, an accuracy
    for temporal nodule matching of 88.8%, and a sensitivity of 92.0% with a precision
    of 88.4% for nodule growth detection.
- author: Alireza Sedghi, Lauren J. O&apos;Donnell, Tina Kapur, Erik G. Learned-Miller,
    Parvin Mousavi, William M. Wells III
  title: 'Image registration: Maximum likelihood, minimum entropy and deep learning.'
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/mia/SedghiOKLMW21
  doi: 10.1016/J.MEDIA.2020.101939
  ee: https://doi.org/10.1016/j.media.2020.101939
  url: https://dblp.org/rec/journals/mia/SedghiOKLMW21
  abstract: In this work, we propose a theoretical framework based on maximum profile
    likelihood for pairwise and groupwise registration. By an asymptotic analysis,
    we demonstrate that maximum profile likelihood registration minimizes an upper
    bound on the joint entropy of the distribution that generates the joint image
    data. Further, we derive the congealing method for groupwise registration by optimizing
    the profile likelihood in closed form, and using coordinate ascent, or iterative
    model refinement. We also describe a method for feature based registration in
    the same framework and demonstrate it on groupwise tractographic registration.
    In the second part of the article, we propose an approach to deep metric registration
    that implements maximum likelihood registration using deep discriminative classifiers.
    We show further that this approach can be used for maximum profile likelihood
    registration to discharge the need for well-registered training data, using iterative
    model refinement. We demonstrate that the method succeeds on a challenging registration
    problem where the standard mutual information approach does not perform well.
- author: Wei Shao 0008, Linda Banh, Christian A. Kunder, Richard E. Fan, Simon John
    Christoph Soerensen, Jeffrey B. Wang, Nikola C. Teslovich, Nikhil Madhuripan,
    Anugayathri Jawahar, Pejman Ghanouni, James D. Brooks, Geoffrey A. Sonn, Mirabela
    Rusu
  title: 'ProsRegNet: A deep learning framework for registration of MRI and histopathology
    images of the prostate.'
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: open
  key: journals/mia/ShaoBKFSWTMJGBS21
  doi: 10.1016/J.MEDIA.2020.101919
  ee: https://doi.org/10.1016/j.media.2020.101919
  url: https://dblp.org/rec/journals/mia/ShaoBKFSWTMJGBS21
  abstract: Magnetic resonance imaging (MRI) is an increasingly important tool for
    the diagnosis and treatment of prostate cancer. However, interpretation of MRI
    suffers from high inter-observer variability across radiologists, thereby contributing
    to missed clinically significant cancers, overdiagnosed low-risk cancers, and
    frequent false positives. Interpretation of MRI could be greatly improved by providing
    radiologists with an answer key that clearly shows cancer locations on MRI. Registration
    of histopathology images from patients who had radical prostatectomy to pre-operative
    MRI allows such mapping of ground truth cancer labels onto MRI. However, traditional
    MRI-histopathology registration approaches are computationally expensive and require
    careful choices of the cost function and registration hyperparameters. This paper
    presents ProsRegNet, a deep learning-based pipeline to accelerate and simplify
    MRI-histopathology image registration in prostate cancer. Our pipeline consists
    of image preprocessing, estimation of affine and deformable transformations by
    deep neural networks, and mapping cancer labels from histopathology images onto
    MRI using estimated transformations. We trained our neural network using MR and
    histopathology images of 99 patients from our internal cohort (Cohort 1) and evaluated
    its performance using 53 patients from three different cohorts (an additional
    12 from Cohort 1 and 41 from two public cohorts). Results show that our deep learning
    pipeline has achieved more accurate registration results and is at least 20 times
    faster than a state-of-the-art registration algorithm. This important advance
    will provide radiologists with highly accurate prostate MRI answer keys, thereby
    facilitating improvements in the detection of prostate cancer on MRI. Our code
    is freely available at https://github.com/pimed//ProsRegNet.
- author: Rewa Sood, Wei Shao 0008, Christian Kunder, Nikola C. Teslovich, Jeffrey
    B. Wang, Simon John Christoph Soerensen, Nikhil Madhuripan, Anugayathri Jawahar,
    James D. Brooks, Pejman Ghanouni, Richard E. Fan, Geoffrey A. Sonn, Mirabela Rusu
  title: 3D Registration of pre-surgical prostate MRI and histopathology images via
    super-resolution volume reconstruction.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: open
  key: journals/mia/Sood0KTWSMJBGFS21
  doi: 10.1016/J.MEDIA.2021.101957
  ee: https://doi.org/10.1016/j.media.2021.101957
  url: https://dblp.org/rec/journals/mia/Sood0KTWSMJBGFS21
  abstract: The use of MRI for prostate cancer diagnosis and treatment is increasing
    rapidly. However, identifying the presence and extent of cancer on MRI remains
    challenging, leading to high variability in detection even among expert radiologists.
    Improvement in cancer detection on MRI is essential to reducing this variability
    and maximizing the clinical utility of MRI. To date, such improvement has been
    limited by the lack of accurately labeled MRI datasets. Data from patients who
    underwent radical prostatectomy enables the spatial alignment of digitized histopathology
    images of the resected prostate with corresponding pre-surgical MRI. This alignment
    facilitates the delineation of detailed cancer labels on MRI via the projection
    of cancer from histopathology images onto MRI. We introduce a framework that performs
    3D registration of whole-mount histopathology images to pre-surgical MRI in three
    steps. First, we developed a novel multi-image super-resolution generative adversarial
    network (miSRGAN), which learns information useful for 3D registration by producing
    a reconstructed 3D MRI. Second, we trained the network to learn information between
    histopathology slices to facilitate the application of 3D registration methods.
    Third, we registered the reconstructed 3D histopathology volumes to the reconstructed
    3D MRI, mapping the extent of cancer from histopathology images onto MRI without
    the need for slice-to-slice correspondence. When compared to interpolation methods,
    our super-resolution reconstruction resulted in the highest PSNR relative to clinical
    3D MRI (32.15 dB vs 30.16 dB for BSpline interpolation). Moreover, the registration
    of 3D volumes reconstructed via super-resolution for both MRI and histopathology
    images showed the best alignment of cancer regions when compared to (1) the state-of-the-art
    RAPSODI approach, (2) volumes that were not reconstructed, or (3) volumes that
    were reconstructed using nearest neighbor, linear, or BSpline interpolations.
    The improved 3D alignment of histopathology images and MRI facilitates the projection
    of accurate cancer labels on MRI, allowing for the development of improved MRI
    interpretation schemes and machine learning models to automatically detect cancer
    on MRI.
- author: Yue Zhang 0033, Jiong Wu, Yilong Liu, Yifan Chen 0001, Wei Chen, Ed X. Wu,
    Chunming Li, Xiaoying Tang 0001
  title: A deep learning framework for pancreas segmentation with multi-atlas registration
    and 3D level-set.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/mia/ZhangWLCCWLT21
  doi: 10.1016/J.MEDIA.2020.101884
  ee: https://doi.org/10.1016/j.media.2020.101884
  url: https://dblp.org/rec/journals/mia/ZhangWLCCWLT21
  abstract: In this paper, we propose and validate a deep learning framework that
    incorporates both multi-atlas registration and level-set for segmenting pancreas
    from CT volume images. The proposed segmentation pipeline consists of three stages,
    namely coarse, fine, and refine stages. Firstly, a coarse segmentation is obtained
    through multi-atlas based 3D diffeomorphic registration and fusion. After that,
    to learn the connection feature, a 3D patch-based convolutional neural network
    (CNN) and three 2D slice-based CNNs are jointly used to predict a fine segmentation
    based on a bounding box determined from the coarse segmentation. Finally, a 3D
    level-set method is used, with the fine segmentation being one of its constraints,
    to integrate information of the original image and the CNN-derived probability
    map to achieve a refine segmentation. In other words, we jointly utilize global
    3D location information (registration), contextual information (patch-based 3D
    CNN), shape information (slice-based 2.5D CNN) and edge information (3D level-set)
    in the proposed framework. These components form our cascaded coarse-fine-refine
    segmentation framework. We test the proposed framework on three different datasets
    with varying intensity ranges obtained from different resources, respectively
    containing 36, 82 and 281 CT volume images. In each dataset, we achieve an average
    Dice score over 82%, being superior or comparable to other existing state-of-the-art
    pancreas segmentation algorithms.
- author: Rémi Agier, Sébastien Valette, Razmig Kéchichian, Laurent Fanton, Rémy Prost
  title: Hubless keypoint-based 3D deformable groupwise registration.
  venue: Medical Image Anal.
  year: '2020'
  type: Journal Articles
  access: closed
  key: journals/mia/AgierVKFP20
  doi: 10.1016/J.MEDIA.2019.101564
  ee: https://doi.org/10.1016/j.media.2019.101564
  url: https://dblp.org/rec/journals/mia/AgierVKFP20
  abstract: We present a novel algorithm for Fast Registration Of image Groups (FROG),
    applied to large 3D image groups. Our approach extracts 3D SURF keypoints from
    images, computes matched pairs of keypoints and registers the group by minimizing
    pair distances in a hubless way i.e. without computing any central mean image.
    Using keypoints significantly reduces the problem complexity compared to voxel-based
    approaches, and enables us to provide an in-core global optimization, similar
    to the Bundle Adjustment for 3D reconstruction. As we aim to register images of
    different patients, the matching step yields many outliers. Then we propose a
    new EM-weighting algorithm which efficiently discards outliers. Global optimization
    is carried out with a fast gradient descent algorithm. This allows our approach
    to robustly register large datasets. The result is a set of diffeomorphic half
    transforms which link the volumes together and can be subsequently exploited for
    computational anatomy and landmark detection. We show experimental results on
    whole-body CT scans, with groups of up to 103 volumes. On a benchmark based on
    anatomical landmarks, our algorithm compares favorably with the star-groupwise
    voxel-based ANTs and NiftyReg approaches while being much faster. We also discuss
    the limitations of our approach for lower resolution images such as brain MRI.
- author: Florian Dubost, Marleen de Bruijne, Marco Nardin, Adrian V. Dalca, Kathleen
    L. Donahue, Anne-Katrin Giese, Mark R. Etherton, Ona Wu, Marius de Groot, Wiro
    J. Niessen, Meike W. Vernooij, Natalia S. Rost, Markus D. Schirmer
  title: Multi-atlas image registration of clinical data with automated quality assessment
    using ventricle segmentation.
  venue: Medical Image Anal.
  year: '2020'
  type: Journal Articles
  access: closed
  key: journals/mia/DubostBNDDGEWGN20
  doi: 10.1016/J.MEDIA.2020.101698
  ee: https://doi.org/10.1016/j.media.2020.101698
  url: https://dblp.org/rec/journals/mia/DubostBNDDGEWGN20
  abstract: Registration is a core component of many imaging pipelines. In case of
    clinical scans, with lower resolution and sometimes substantial motion artifacts,
    registration can produce poor results. Visual assessment of registration quality
    in large clinical datasets is inefficient. In this work, we propose to automatically
    assess the quality of registration to an atlas in clinical FLAIR MRI scans of
    the brain. The method consists of automatically segmenting the ventricles of a
    given scan using a neural network, and comparing the segmentation to the atlas
    ventricles propagated to image space. We used the proposed method to improve clinical
    image registration to a general atlas by computing multiple registrations - one
    directly to the general atlas and others via different age-specific atlases -
    and then selecting the registration that yielded the highest ventricle overlap.
    Finally, as an example application of the complete pipeline, a voxelwise map of
    white matter hyperintensity burden was computed using only the scans with registration
    quality above a predefined threshold. Methods were evaluated in a single-site
    dataset of more than 1000 scans, as well as a multi-center dataset comprising
    142 clinical scans from 12 sites. The automated ventricle segmentation reached
    a Dice coefficient with manual annotations of 0.89 in the single-site dataset,
    and 0.83 in the multi-center dataset. Registration via age-specific atlases could
    improve ventricle overlap compared to a direct registration to the general atlas
    (Dice similarity coefficient increase up to 0.15). Experiments also showed that
    selecting scans with the registration quality assessment method could improve
    the quality of average maps of white matter hyperintensity burden, instead of
    using all scans for the computation of the white matter hyperintensity map. In
    this work, we demonstrated the utility of an automated tool for assessing image
    registration quality in clinical scans. This image quality assessment step could
    ultimately assist in the translation of automated neuroimaging pipelines to the
    clinic.
- author: Tianyu Fu 0003, Jian Yang 0009, Qin Li, Danni Ai, Hong Song 0003, Yurong
    Jiang, Yongtian Wang, Alejandro F. Frangi
  title: Groupwise registration with global-local graph shrinkage in atlas construction.
  venue: Medical Image Anal.
  year: '2020'
  type: Journal Articles
  access: closed
  key: journals/mia/FuYLASJWF20
  doi: 10.1016/J.MEDIA.2020.101711
  ee: https://doi.org/10.1016/j.media.2020.101711
  url: https://dblp.org/rec/journals/mia/FuYLASJWF20
  abstract: Graph-based groupwise registration methods are widely used in atlas construction.
    Given a group of images, a graph is built whose nodes represent the images, and
    whose edges represent a geodesic path between two nodes. The distribution of images
    on an image manifold is explored through edge traversal in a graph. The final
    atlas is a mean image at the population center of the distribution on the manifold.
    The procedure of warping all images to the mean image turns to dynamic graph shrinkage
    in which nodes become closer to each other. Most conventional groupwise registration
    frameworks construct and shrink a graph without considering the local distribution
    of images on the dataset manifold and the local structure variations between image
    pairs. Neglecting the local information fundamentally decrease the accuracy and
    efficiency when population atlases are built for organs with large inter-subject
    anatomical variabilities. To overcome the problem, this paper proposes a global-local
    graph shrinkage approach that can generate accurate atlas. A connected graph is
    constructed automatically based on global similarities across the images to explore
    the global distribution. A local image distribution obtained by image clustering
    is used to simplify the edges of the constructed graph. Subsequently, local image
    similarities refine the deformation estimated through global image similarity
    for each image warping along the graph edges. Through the image warping, the overall
    simplified graph shrinks gradually to yield the atlas with respecting both global
    and local features. The proposed method is evaluated on 61 synthetic and 20 clinical
    liver datasets, and the results are compared with those of six state-of-the-art
    groupwise registration methods. The experimental results show that the proposed
    method outperforms non-global-local method approaches in terms of accuracy.
- author: Dongming Wei, Sahar Ahmad, Jiayu Huo, Pu Huang, Pew-Thian Yap, Zhong Xue,
    Jianqi Sun, Wentao Li, Dinggang Shen, Qian Wang 0001
  title: 'SLIR: Synthesis, localization, inpainting, and registration for image-guided
    thermal ablation of liver tumors.'
  venue: Medical Image Anal.
  year: '2020'
  type: Journal Articles
  access: closed
  key: journals/mia/WeiAHHYXSLSW20
  doi: 10.1016/J.MEDIA.2020.101763
  ee: https://doi.org/10.1016/j.media.2020.101763
  url: https://dblp.org/rec/journals/mia/WeiAHHYXSLSW20
  abstract: Thermal ablation is a minimally invasive procedure for treating small
    or unresectable tumors. Although CT is widely used for guiding ablation procedures,
    yet the contrast of tumors against normal soft tissues is often poor in CT scans,
    aggravating the accurate thermal ablation. In this paper, we propose a fast MR-CT
    image registration method to overlay pre-procedural MR (pMR) and pre-procedural
    CT (pCT) images onto an intra-procedural CT (iCT) image to guide the thermal ablation
    of liver tumors. At the pre-procedural stage, the Cycle-GAN model with mutual
    information constraint is employed to generate the synthesized CT (sCT) image
    from the input pMR. Then, pMR-pCT image registration is carried out via traditional
    mono-modal sCT-pCT image registration. At the intra-procedural stage, the region
    of the probe and its artifacts are automatically localized and inpainted in the
    iCT image. Then, an unsupervised registration network (UR-Net) is used to efficiently
    align the pCT with the inpainted iCT (inpCT) image. The final transform from pMR
    to iCT is obtained by concatenating the two estimated transforms, i.e., (i) from
    pMR image space to pCT image space (via sCT) and (ii) from pCT image space to
    iCT image space (via inpCT). The proposed method has been evaluated over a real
    clinical dataset and compared with state-of-the-art methods. Experimental results
    confirm that the proposed method achieves high registration accuracy with fast
    computation speed.
- author: Sahar Ahmad, Zhengwang Wu, Gang Li 0001, Li Wang 0026, Weili Lin, Pew-Thian
    Yap, Dinggang Shen
  title: Surface-constrained volumetric registration for the early developing brain.
  venue: Medical Image Anal.
  year: '2019'
  type: Journal Articles
  access: closed
  key: journals/mia/AhmadWLWLYS19
  doi: 10.1016/J.MEDIA.2019.101540
  ee: https://doi.org/10.1016/j.media.2019.101540
  url: https://dblp.org/rec/journals/mia/AhmadWLWLYS19
  abstract: 'The T1-weighted and T2-weighted MRI contrasts of the infant brain evolve
    drastically during the first year of life. This poses significant challenges to
    inter- and intra-subject registration, which is key to subsequent statistical
    analyses. Existing registration methods that do not consider temporal contrast
    changes are ineffective for infant brain MRI data. To address this problem, we
    present in this paper a method for deformable registration of infant brain MRI.
    The key advantage of our method is threefold: (i) To deal with appearance changes,
    registration is performed based on segmented tissue maps instead of image intensity.
    Segmentation is performed by using an infant-centric algorithm previously developed
    by our group. (ii) Registration is carried out with respect to both cortical surfaces
    and volumetric tissue maps, thus allowing precise alignment of both cortical and
    subcortical structures. (iii) A dynamic elasticity model is utilized to allow
    large non-linear deformation. Experimental results in comparison with well-established
    registration methods indicate that our method yields superior accuracy in both
    cortical and subcortical alignment.'
- author: Jyotirmoy Banerjee, Yuanyuan Sun, Camiel Klink, Renske Gahrmann, Wiro J.
    Niessen, Adriaan Moelker, Theo van Walsum
  title: Multiple-correlation similarity for block-matching based fast CT to ultrasound
    registration in liver interventions.
  venue: Medical Image Anal.
  year: '2019'
  type: Journal Articles
  access: closed
  key: journals/mia/BanerjeeSKGNMW19
  doi: 10.1016/J.MEDIA.2019.02.003
  ee: https://doi.org/10.1016/j.media.2019.02.003
  url: https://dblp.org/rec/journals/mia/BanerjeeSKGNMW19
  abstract: HighlightsCT‐US registration method based on block‐matching.Smart point
    selection for efficient registration.Outlier rejection based on dominant set theory,
    including geometric and smoothness criteria.Evaluation on 29 patient datasets.
    Graphical abstract Figure. No Caption available. ABSTRACT In this work we present
    a fast approach to perform registration of computed tomography to ultrasound volumes
    for image guided intervention applications. The method is based on a combination
    of block‐matching and outlier rejection. The block‐matching uses a correlation
    based multimodal similarity metric, where the intensity and the gradient of the
    computed tomography images along with the ultrasound volumes are the input images
    to find correspondences between blocks in the computed tomography and the ultrasound
    volumes. A variance and octree based feature point‐set selection method is used
    for selecting distinct and evenly spread point locations for block‐matching. Geometric
    consistency and smoothness criteria are imposed in an outlier rejection step to
    refine the block‐matching results. The block‐matching results after outlier rejection
    are used to determine the affine transformation between the computed tomography
    and the ultrasound volumes. Various experiments are carried out to assess the
    optimal performance and the influence of parameters on accuracy and computational
    time of the registration. A leave‐one‐patient‐out cross‐validation registration
    error of 3.6 mm is achieved over 29 datasets, acquired from 17 patients.
- author: Adrian V. Dalca, Guha Balakrishnan, John V. Guttag, Mert R. Sabuncu
  title: Unsupervised learning of probabilistic diffeomorphic registration for images
    and surfaces.
  venue: Medical Image Anal.
  year: '2019'
  type: Journal Articles
  access: closed
  key: journals/mia/DalcaBGS19
  doi: 10.1016/J.MEDIA.2019.07.006
  ee: https://doi.org/10.1016/j.media.2019.07.006
  url: https://dblp.org/rec/journals/mia/DalcaBGS19
  abstract: Classical deformable registration techniques achieve impressive results
    and offer a rigorous theoretical treatment, but are computationally intensive
    since they solve an optimization problem for each image pair. Recently, learning-based
    methods have facilitated fast registration by learning spatial deformation functions.
    However, these approaches use restricted deformation models, require supervised
    labels, or do not guarantee a diffeomorphic (topology-preserving) registration.
    Furthermore, learning-based registration tools have not been derived from a probabilistic
    framework that can offer uncertainty estimates. In this paper, we build a connection
    between classical and learning-based methods. We present a probabilistic generative
    model and derive an unsupervised learning-based inference algorithm that uses
    insights from classical registration methods and makes use of recent developments
    in convolutional neural networks (CNNs). We demonstrate our method on a 3D brain
    registration task for both images and anatomical surfaces, and provide extensive
    empirical analyses of the algorithm. Our principled approach results in state
    of the art accuracy and very fast runtimes, while providing diffeomorphic guarantees.
    Our implementation is available online at http://voxelmorph.csail.mit.edu.
- author: Jingfan Fan, Xiaohuan Cao, Qian Wang 0001, Pew-Thian Yap, Dinggang Shen
  title: Adversarial learning for mono- or multi-modal registration.
  venue: Medical Image Anal.
  year: '2019'
  type: Journal Articles
  access: closed
  key: journals/mia/FanCWYS19
  doi: 10.1016/J.MEDIA.2019.101545
  ee: https://doi.org/10.1016/j.media.2019.101545
  url: https://dblp.org/rec/journals/mia/FanCWYS19
  abstract: This paper introduces an unsupervised adversarial similarity network for
    image registration. Unlike existing deep learning registration methods, our approach
    can train a deformable registration network without the need of ground-truth deformations
    and specific similarity metrics. We connect a registration network and a discrimination
    network with a deformable transformation layer. The registration network is trained
    with the feedback from the discrimination network, which is designed to judge
    whether a pair of registered images are sufficiently similar. Using adversarial
    training, the registration network is trained to predict deformations that are
    accurate enough to fool the discrimination network. The proposed method is thus
    a general registration framework, which can be applied for both mono-modal and
    multi-modal image registration. Experiments on four brain MRI datasets and a multi-modal
    pelvic image dataset indicate that our method yields promising registration performance
    in accuracy, efficiency and generalizability compared with state-of-the-art registration
    methods, including those based on deep learning.
- author: Jingfan Fan, Xiaohuan Cao, Pew-Thian Yap, Dinggang Shen
  title: 'BIRNet: Brain image registration using dual-supervised fully convolutional
    networks.'
  venue: Medical Image Anal.
  year: '2019'
  type: Journal Articles
  access: closed
  key: journals/mia/FanCYS19
  doi: 10.1016/J.MEDIA.2019.03.006
  ee: https://doi.org/10.1016/j.media.2019.03.006
  url: https://dblp.org/rec/journals/mia/FanCYS19
  abstract: '&NA; In this paper, we propose a deep learning approach for image registration
    by predicting deformation from image appearance. Since obtaining ground‐truth
    deformation fields for training can be challenging, we design a fully convolutional
    network that is subject to dual‐guidance: (1) Ground‐truth guidance using deformation
    fields obtained by an existing registration method; and (2) Image dissimilarity
    guidance using the difference between the images after registration. The latter
    guidance helps avoid overly relying on the supervision from the training deformation
    fields, which could be inaccurate. For effective training, we further improve
    the deep convolutional network with gap filling, hierarchical loss, and multi‐source
    strategies. Experiments on a variety of datasets show promising registration accuracy
    and efficiency compared with state‐of‐the‐art methods.'
- author: Eloy García 0001, Yago Diez, Oliver Díaz, Xavier Lladó, Albert Gubern-Mérida,
    Robert Martí, Joan Martí, Arnau Oliver
  title: Breast MRI and X-ray mammography registration using gradient values.
  venue: Medical Image Anal.
  year: '2019'
  type: Journal Articles
  access: open
  key: journals/mia/GarciaDDLGMMO19
  doi: 10.1016/J.MEDIA.2019.02.013
  ee: https://doi.org/10.1016/j.media.2019.02.013
  url: https://dblp.org/rec/journals/mia/GarciaDDLGMMO19
  abstract: '&NA; Breast magnetic resonance imaging (MRI) and X‐ray mammography are
    two image modalities widely used for early detection and diagnosis of breast diseases
    in women. The combination of these modalities, traditionally done using intensity‐based
    registration algorithms, leads to a more accurate diagnosis and treatment, due
    to the capability of co‐localizing lesions and susceptibles areas between the
    two image modalities. In this work, we present the first attempt to register breast
    MRI and X‐ray mammographic images using intensity gradients as the similarity
    measure. Specifically, a patient‐specific biomechanical model of the breast, extracted
    from the MRI image, is used to mimic the mammographic acquisition. The intensity
    gradients of the glandular tissue are directly projected from the 3D MRI volume
    to the 2D mammographic space, and two different gradient‐based metrics are tested
    to lead the registration, the normalized cross‐correlation of the scalar gradient
    values and the gradient correlation of the vectoral gradients. We compare these
    two approaches to an intensity‐based algorithm, where the MRI volume is transformed
    to a synthetic computed tomography (pseudo‐CT) image using the partial volume
    effect obtained by the glandular tissue segmentation performed by means of an
    Expectation‐Maximization algorithm. This allows us to obtain the digitally reconstructed
    radiographies by a direct intensity projection. The best results are obtained
    using the scalar gradient approach along with a transversal isotropic material
    model, obtaining a target registration error (TRE), in millimeters, of 5.65 ±
    2.76 for CC‐ and of 7.83 ± 3.04 for MLO‐mammograms, while the TRE is 7.33 ± 3.62
    in the 3D MRI. We also evaluate the effect of the glandularity of the breast as
    well as the landmark position on the TRE, obtaining moderated correlation values
    (0.65 and 0.77 respectively), concluding that these aspects need to be considered
    to increase the accuracy in further approaches.'
- author: Nooshin Ghavami, Yipeng Hu, Eli Gibson, Ester Bonmati, Mark Emberton, Caroline
    M. Moore, Dean C. Barratt
  title: 'Automatic segmentation of prostate MRI using convolutional neural networks:
    Investigating the impact of network architecture on the accuracy of volume measurement
    and MRI-ultrasound registration.'
  venue: Medical Image Anal.
  year: '2019'
  type: Journal Articles
  access: open
  key: journals/mia/GhavamiHGBEMB19
  doi: 10.1016/J.MEDIA.2019.101558
  ee: https://doi.org/10.1016/j.media.2019.101558
  url: https://dblp.org/rec/journals/mia/GhavamiHGBEMB19
  abstract: Highlights • Six openly-available neural networks for prostate MR segmentation
    were compared, based on experiment results using 232-patient clinical imaging
    and label data.• Statistically significant difference in segmentation accuracy
    was found in one network.• No statistically significant difference was found in
    subsequent clinical applications, for volume estimation or image registration
    where these segmentations were used.
- author: Ilwoo Lyu, Hakmook Kang, Neil D. Woodward, Martin A. Styner, Bennett A.
    Landman
  title: Hierarchical spherical deformation for cortical surface registration.
  venue: Medical Image Anal.
  year: '2019'
  type: Journal Articles
  access: closed
  key: journals/mia/LyuKWSL19
  doi: 10.1016/J.MEDIA.2019.06.013
  ee: https://doi.org/10.1016/j.media.2019.06.013
  url: https://dblp.org/rec/journals/mia/LyuKWSL19
  abstract: We present hierarchical spherical deformation for a group-wise shape correspondence
    to address template selection bias and to minimize registration distortion. In
    this work, we aim at a continuous and smooth deformation field to guide accurate
    cortical surface registration. In conventional spherical registration methods,
    a global rigid alignment and local deformation are independently performed. Motivated
    by the composition of precession and intrinsic rotation, we simultaneously optimize
    global rigid rotation and non-rigid local deformation by utilizing spherical harmonics
    interpolation of local composite rotations in a single framework. To this end,
    we indirectly encode local displacements by such local composite rotations as
    functions of spherical locations. Furthermore, we introduce an additional regularization
    term to the spherical deformation, which maximizes its rigidity while reducing
    registration distortion. To improve surface registration performance, we employ
    the second order approximation of the energy function that enables fast convergence
    of the optimization. In the experiments, we validate our method on healthy normal
    subjects with manual cortical surface parcellation in registration accuracy and
    distortion. We show an improved shape correspondence with high accuracy in cortical
    surface parcellation and significantly low registration distortion in surface
    area and edge length. In addition to validation, we discuss parameter tuning,
    optimization, and implementation design with potential acceleration.
- author: Caroline H. Roney, Ali Pashaei, Marianna Meo, Rémi Dubois, Patrick M. Boyle,
    Natalia A. Trayanova, Hubert Cochet, Steven A. Niederer, Edward J. Vigmond
  title: Universal atrial coordinates applied to visualisation, registration and construction
    of patient specific meshes.
  venue: Medical Image Anal.
  year: '2019'
  type: Journal Articles
  access: open
  key: journals/mia/RoneyPMDBTCNV19
  doi: 10.1016/J.MEDIA.2019.04.004
  ee: https://doi.org/10.1016/j.media.2019.04.004
  url: https://dblp.org/rec/journals/mia/RoneyPMDBTCNV19
  abstract: Highlights • We introduce a coordinate system for the atria based on anatomical
    landmarks.• We construct the coordinates from solutions to Laplace’s equation.•
    We demonstrate the mapping of both scalar and vector data between different atria.•
    The coordinate system was used for registration and 2D visualisation of multimodal
    data.• Patient specific meshes with atrial structures and fibre direction were
    constructed using just five landmark points.
- author: Hessam Sokooti, Gorkem Saygili, Ben Glocker, Boudewijn P. F. Lelieveldt,
    Marius Staring
  title: Quantitative error prediction of medical image registration using regression
    forests.
  venue: Medical Image Anal.
  year: '2019'
  type: Journal Articles
  access: closed
  key: journals/mia/SokootiSGLS19
  doi: 10.1016/J.MEDIA.2019.05.005
  ee: https://doi.org/10.1016/j.media.2019.05.005
  url: https://dblp.org/rec/journals/mia/SokootiSGLS19
  abstract: 'Predicting registration error can be useful for evaluation of registration
    procedures, which is important for the adoption of registration techniques in
    the clinic. In addition, quantitative error prediction can be helpful in improving
    the registration quality. The task of predicting registration error is demanding
    due to the lack of a ground truth in medical images. This paper proposes a new
    automatic method to predict the registration error in a quantitative manner, and
    is applied to chest CT scans. A random regression forest is utilized to predict
    the registration error locally. The forest is built with features related to the
    transformation model and features related to the dissimilarity after registration.
    The forest is trained and tested using manually annotated corresponding points
    between pairs of chest CT scans in two experiments: SPREAD (trained and tested
    on SPREAD) and inter-database (including three databases SPREAD, DIR-Lab-4DCT
    and DIR-Lab-COPDgene). The results show that the mean absolute errors of regression
    are 1.07 ± 1.86 and 1.76 ± 2.59 mm for the SPREAD and inter-database experiment,
    respectively. The overall accuracy of classification in three classes (correct,
    poor and wrong registration) is 90.7% and 75.4%, for SPREAD and inter-database
    respectively. The good performance of the proposed method enables important applications
    such as automatic quality control in large-scale image analysis.'
- author: Bob D. de Vos, Floris F. Berendsen, Max A. Viergever, Hessam Sokooti, Marius
    Staring, Ivana Isgum
  title: A deep learning framework for unsupervised affine and deformable image registration.
  venue: Medical Image Anal.
  year: '2019'
  type: Journal Articles
  access: closed
  key: journals/mia/VosBVSSI19
  doi: 10.1016/J.MEDIA.2018.11.010
  ee: https://doi.org/10.1016/j.media.2018.11.010
  url: https://dblp.org/rec/journals/mia/VosBVSSI19
  abstract: HighlightsUnsupervised Deep Learning Image Registration (DLIR) is feasible
    for affine and deformable image registration.The method is unsupervised; no registration
    examples are necessary to train a ConvNet for image registration.Once a ConvNet
    is trained, image registration can be performed on unseen images in one‐shot.Registration,
    including image resampling, is near real‐time.Unsupervised DLIR yields image registration
    performance similar to a conventional approach. Graphical abstract Figure. No
    caption available. ABSTRACT Image registration, the process of aligning two or
    more images, is the core technique of many (semi‐)automatic medical image analysis
    tasks. Recent studies have shown that deep learning methods, notably convolutional
    neural networks (ConvNets), can be used for image registration. Thus far training
    of ConvNets for registration was supervised using predefined example registrations.
    However, obtaining example registrations is not trivial. To circumvent the need
    for predefined examples, and thereby to increase convenience of training ConvNets
    for image registration, we propose the Deep Learning Image Registration (DLIR)
    framework for unsupervised affine and deformable image registration. In the DLIR
    framework ConvNets are trained for image registration by exploiting image similarity
    analogous to conventional intensity‐based image registration. After a ConvNet
    has been trained with the DLIR framework, it can be used to register pairs of
    unseen images in one shot. We propose flexible ConvNets designs for affine image
    registration and for deformable image registration. By stacking multiple of these
    ConvNets into a larger architecture, we are able to perform coarse‐to‐fine image
    registration. We show for registration of cardiac cine MRI and registration of
    chest CT that performance of the DLIR framework is comparable to conventional
    image registration while being several orders of magnitude faster.
