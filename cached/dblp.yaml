- author: Jie Luo 0003, Sarah F. Frisken, Duo Wang, Alexandra J. Golby, Masashi Sugiyama,
    William M. Wells III
  title: Are Registration Uncertainty and Error Monotonically Associated?
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/LuoFWGSW20
  doi: 10.1007/978-3-030-59716-0_26
  ee: https://doi.org/10.1007/978-3-030-59716-0_26
  url: https://dblp.org/rec/conf/miccai/LuoFWGSW20
  abstract: In image-guided neurosurgery, current commercial systems usually provide
    only rigid registration, partly because it is harder to predict, validate and
    understand non-rigid registration error. For instance, when surgeons see a discrepancy
    in aligned image features, they may not be able to distinguish between registration
    error and actual tissue deformation caused by tumor resection. In this case, the
    spatial distribution of registration error could help them make more informed
    decisions, e.g., ignoring the registration where the estimated error is high.
    However, error estimates are difficult to acquire. Probabilistic image registration
    (PIR) methods provide measures of registration uncertainty, which could be a surrogate
    for assessing the registration error. It is intuitive and believed by many clinicians
    that high uncertainty indicates a large error. However, the monotonic association
    between uncertainty and error has not been examined in image registration literature.
    In this pilot study, we attempt to address this fundamental problem by looking
    at one PIR method, the Gaussian process (GP) registration. We systematically investigate
    the relation between GP uncertainty and error based on clinical data and show
    empirically that there is a weak-to-moderate positive monotonic correlation between
    point-wise GP registration uncertainty and non-rigid registration error.
- author: Xinzhe Luo, Xiahai Zhuang
  title: 'MvMM-RegNet: A New Image Registration Framework Based on Multivariate Mixture
    Model and Neural Network Estimation.'
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/LuoZ20
  doi: 10.1007/978-3-030-59716-0_15
  ee: https://doi.org/10.1007/978-3-030-59716-0_15
  url: https://dblp.org/rec/conf/miccai/LuoZ20
  abstract: Current deep-learning-based registration algorithms often exploit intensity-based
    similarity measures as the loss function, where dense correspondence between a
    pair of moving and fixed images is optimized through backpropagation during training.
    However, intensity-based metrics can be misleading when the assumption of intensity
    class correspondence is violated, especially in cross-modality or contrast-enhanced
    images. Moreover, existing learning-based registration methods are predominantly
    applicable to pairwise registration and are rarely extended to groupwise registration
    or simultaneous registration with multiple images. In this paper, we propose a
    new image registration framework based on multivariate mixture model (MvMM) and
    neural network estimation. A generative model consolidating both appearance and
    anatomical information is established to derive a novel loss function capable
    of implementing groupwise registration. We highlight the versatility of the proposed
    framework for various applications on multimodal cardiac images, including single-atlas-based
    segmentation (SAS) via pairwise registration and multi-atlas segmentation (MAS)
    unified by groupwise registration. We evaluated performance on two publicly available
    datasets, i.e. MM-WHS-2017 and MS-CMRSeg-2019. The results show that the proposed
    framework achieved an average Dice score of \(0.871\pm 0.025\) for whole-heart
    segmentation on MR images and \(0.783\pm 0.082\) for myocardium segmentation on
    LGE MR images (Code is available from https://zmiclab.github.io/projects.html).
- author: Tony C. W. Mok, Albert C. S. Chung
  title: Large Deformation Diffeomorphic Image Registration with Laplacian Pyramid
    Networks.
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/MokC20
  doi: 10.1007/978-3-030-59716-0_21
  ee: https://doi.org/10.1007/978-3-030-59716-0_21
  url: https://dblp.org/rec/conf/miccai/MokC20
  abstract: Deep learning-based methods have recently demonstrated promising results
    in deformable image registration for a wide range of medical image analysis tasks.
    However, existing deep learning-based methods are usually limited to small deformation
    settings, and desirable properties of the transformation including bijective mapping
    and topology preservation are often being ignored by these approaches. In this
    paper, we propose a deep Laplacian Pyramid Image Registration Network, which can
    solve the image registration optimization problem in a coarse-to-fine fashion
    within the space of diffeomorphic maps. Extensive quantitative and qualitative
    evaluations on two MR brain scan datasets show that our method outperforms the
    existing methods by a significant margin while maintaining desirable diffeomorphic
    properties and promising registration speed.
- author: Tony C. W. Mok, Albert C. S. Chung
  title: Large Deformation Image Registration with Anatomy-Aware Laplacian Pyramid
    Networks.
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/MokC20a
  doi: 10.1007/978-3-030-71827-5_7
  ee: https://doi.org/10.1007/978-3-030-71827-5_7
  url: https://dblp.org/rec/conf/miccai/MokC20a
  abstract: Deep learning-based methods have recently demonstrated remarkable results
    in deformable image registration for a wide range of medical image analysis tasks.
    However, most of the deep learning-based approaches are often limited to small
    deformation settings. In this paper, we describe a deformable image registration
    approach for the Learn2Reg 2020 challenge based on the Laplacian pyramid image
    registration networks. Our approach won 1st place in the Learn2Reg 2020 challenge.
- author: Micha Pfeiffer, Carina Riediger, Stefan Leger, Jens-Peter Kühn, Danilo Seppelt,
    Ralf-Thorsten Hoffmann, Jürgen Weitz, Stefanie Speidel
  title: Non-Rigid Volume to Surface Registration Using a Data-Driven Biomechanical
    Model.
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/PfeifferRLKSHWS20
  doi: 10.1007/978-3-030-59719-1_70
  ee: https://doi.org/10.1007/978-3-030-59719-1_70
  url: https://dblp.org/rec/conf/miccai/PfeifferRLKSHWS20
  abstract: Non-rigid registration is a key component in soft-tissue navigation. We
    focus on laparoscopic liver surgery, where we register the organ model obtained
    from a preoperative CT scan to the intraoperative partial organ surface, reconstructed
    from the laparoscopic video. This is a challenging task due to sparse and noisy
    intraoperative data, real-time requirements and many unknowns - such as tissue
    properties and boundary conditions. Furthermore, establishing correspondences
    between pre- and intraoperative data can be extremely difficult since the liver
    usually lacks distinct surface features and the used imaging modalities suffer
    from very different types of noise. In this work, we train a convolutional neural
    network to perform both the search for surface correspondences as well as the
    non-rigid registration in one step. The network is trained on physically accurate
    biomechanical simulations of randomly generated, deforming organ-like structures.
    This enables the network to immediately generalize to a new patient organ without
    the need to re-train. We add various amounts of noise to the intraoperative surfaces
    during training, making the network robust to noisy intraoperative data. During
    inference, the network outputs the displacement field which matches the preoperative
    volume to the partial intraoperative surface. In multiple experiments, we show
    that the network translates well to real data while maintaining a high inference
    speed. Our code is made available online.
- author: Zhengyang Shen, Zhenlin Xu, Sahin Olut, Marc Niethammer
  title: Anatomical Data Augmentation via Fluid-Based Image Registration.
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ShenXON20
  doi: 10.1007/978-3-030-59716-0_31
  ee: https://doi.org/10.1007/978-3-030-59716-0_31
  url: https://dblp.org/rec/conf/miccai/ShenXON20
  abstract: 'We introduce a fluid-based image augmentation method for medical image
    analysis. In contrast to existing methods, our framework generates anatomically
    meaningful images via interpolation from the geodesic subspace underlying given
    samples. Our approach consists of three steps: 1) given a source image and a set
    of target images, we construct a geodesic subspace using the Large Deformation
    Diffeomorphic Metric Mapping (LDDMM) model; 2) we sample transformations from
    the resulting geodesic subspace; 3) we obtain deformed images and segmentations
    via interpolation. Experiments on brain (LPBA) and knee (OAI) data illustrate
    the performance of our approach on two tasks: 1) data augmentation during training
    and testing for image segmentation; 2) one-shot learning for single atlas image
    segmentation. We demonstrate that our approach generates anatomically meaningful
    data and improves performance on these tasks over competing approaches. Code is
    available at https://github.com/uncbiag/easyreg.'
