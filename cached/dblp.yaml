- author: Qin Yuan 0001, Zhenyu Wen, Jiaxu Qian, Ye Yuan 0001, Guoren Wang
  title: 'CrossETR: A Semantic-Driven Framework for Entity Matching Across Images
    and Graph.'
  venue: ICDE
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/icde/YuanWQYW25
  doi: 10.1109/ICDE65448.2025.00054
  ee: https://doi.org/10.1109/ICDE65448.2025.00054
  url: https://dblp.org/rec/conf/icde/YuanWQYW25
  abstract: Entity matching (EM) aims to identify whether two entities from different
    data sources refer to the same real-world entity. Most existing cross-modal EM
    assume that images have simple scenes containing few objects, or do not fully
    consider the cross-modal knowledge associated with entities. To support more practical
    application scenarios such as multi-modal knowledge graph integration and visual
    question answering in data lakes, we introduce our problem of semantic-driven
    EM across graph and images in this paper. Current semantically matching solutions
    over cross-modal data face the obstacle of low training efficiency, since their
    time complexity quadratically grows with the number of entities. To alleviate
    this issue, we present a novel framework (namely CrossETR) that follows an exploration-then-refinement
    paradigm. Firstly, a candidate exploration policy is proposed to boost the training
    efficiency. It explores candidate pairs according to entity correlations and captures
    structural semantics by adaptive sampling the most informative neighborhood subgraphs.
    Secondly, the cross-modal entity representations are refined to break modality
    heterogeneity to support unsupervised matching prediction. Extensive experimental
    evaluations on three publicly available benchmarks demonstrate the superiority
    of CrossETR over state-of-the-art approaches in terms of effectiveness and efficiency.
    Furthermore, a case study highlights that our proposed semantic-driven EM is promising
    to improve the performance of downstream tasks such as multi-modal knowledge graph
    integration.
  related_code: ''
