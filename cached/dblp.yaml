- author: Yaxing Wang, Luis Herranz, Joost van de Weijer 0001
  title: 'Mix and Match Networks: Cross-Modal Alignment for Zero-Pair Image-to-Image
    Translation.'
  venue: Int. J. Comput. Vis.
  year: '2020'
  type: Journal Articles
  access: closed
  key: journals/ijcv/WangHW20
  doi: 10.1007/S11263-020-01340-Z
