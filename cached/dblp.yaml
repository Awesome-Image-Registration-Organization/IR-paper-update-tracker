  doi: 10.1016/J.MEDIA.2013.09.002
  ee: https://doi.org/10.1016/j.media.2013.09.002
  url: https://dblp.org/rec/journals/mia/Fernandez-de-ManuelWKJTRDSPL14
  abstract: Accurate detection of liver lesions is of great importance in hepatic
    surgery planning. Recent studies have shown that the detection rate of liver lesions
    is significantly higher in gadoxetic acid-enhanced magnetic resonance imaging
    (Gd-EOB-DTPA-enhanced MRI) than in contrast-enhanced portal-phase computed tomography
    (CT); however, the latter remains essential because of its high specificity, good
    performance in estimating liver volumes and better vessel visibility. To characterize
    liver lesions using both the above image modalities, we propose a multimodal nonrigid
    registration framework using organ-focused mutual information (OF-MI). This proposal
    tries to improve mutual information (MI) based registration by adding spatial
    information, benefiting from the availability of expert liver segmentation in
    clinical protocols. The incorporation of an additional information channel containing
    liver segmentation information was studied. A dataset of real clinical images
    and simulated images was used in the validation process. A Gd-EOB-DTPA-enhanced
    MRI simulation framework is presented. To evaluate results, warping index errors
    were calculated for the simulated data, and landmark-based and surface-based errors
    were calculated for the real data. An improvement of the registration accuracy
    for OF-MI as compared with MI was found for both simulated and real datasets.
    Statistical significance of the difference was tested and confirmed in the simulated
    dataset (p<0.01).
