- author: Ryoma Bise, Yingqiang Zheng, Imari Sato, Masakazu Toi
  title: Vascular Registration in Photoacoustic Imaging by Low-Rank Alignment via
    Foreground, Background and Complement Decomposition.
  venue: MICCAI
  year: '2016'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/BiseZST16
  doi: 10.1007/978-3-319-46726-9_38
  ee: https://doi.org/10.1007/978-3-319-46726-9_38
  url: https://dblp.org/rec/conf/miccai/BiseZST16
  abstract: Photoacoustic (PA) imaging has been gaining attention as a new imaging
    modality that can non-invasively visualize blood vessels inside biological tissues.
    In the process of imaging large body parts through multi-scan fusion, alignment
    turns out to be an important issue, since body motion degrades image quality.
    In this paper, we carefully examine the characteristics of PA images and propose
    a novel registration method that achieves better alignment while effectively decomposing
    the shot volumes into low-rank foreground (blood vessels), dense background (noise),
    and sparse complement (corruption) components on the basis of the PA characteristics.
    The results of experiments using a challenging real data-set demonstrate the efficacy
    of the proposed method, which significantly improved image quality, and had the
    best alignment accuracy among the state-of-the-art methods tested.
