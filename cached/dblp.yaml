- author: Shichao Dong 0001, Jin Wang 0039, Jiajun Liang, Haoqiang Fan, Renhe Ji
  title: Explaining Deepfake Detection by Analysing Image Matching.
  venue: ECCV
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/DongWLFJ22
  doi: 10.1007/978-3-031-19781-9_2
  ee: https://doi.org/10.1007/978-3-031-19781-9_2
  url: https://dblp.org/rec/conf/eccv/DongWLFJ22
  abstract: This paper aims to interpret how deepfake detection models learn artifact
    features of images when just supervised by binary labels. To this end, three hypotheses
    from the perspective of image matching are proposed as follows. 1. Deepfake detection
    models indicate real/fake images based on visual concepts that are neither source-relevant
    nor target-relevant, that is, considering such visual concepts as artifact-relevant.
    2. Besides the supervision of binary labels, deepfake detection models implicitly
    learn artifact-relevant visual concepts through the FST-Matching (i.e. the matching
    fake, source, target images) in the training set. 3. Implicitly learned artifact
    visual concepts through the FST-Matching in the raw training set are vulnerable
    to video compression. In experiments, the above hypotheses are verified among
    various DNNs. Furthermore, based on this understanding, we propose the FST-Matching
    Deepfake Detection Model to boost the performance of forgery detection on compressed
    videos. Experiment results show that our method achieves great performance, especially
    on highly-compressed (e.g. c40) videos.
  related_code: ''
- author: Ariel Elnekave, Yair Weiss
  title: Generating Natural Images with Direct Patch Distributions Matching.
  venue: ECCV
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/ElnekaveW22
  doi: 10.1007/978-3-031-19790-1_33
  ee: https://doi.org/10.1007/978-3-031-19790-1_33
  url: https://dblp.org/rec/conf/eccv/ElnekaveW22
  abstract: Many traditional computer vision algorithms generate realistic images
    by requiring that each patch in the generated image be similar to a patch in a
    training image and vice versa. Recently, this classical approach has been replaced
    by adversarial training with a patch discriminator. The adversarial approach avoids
    the computational burden of finding nearest neighbors of patches but often requires
    very long training times and may fail to match the distribution of patches. In
    this paper we leverage the recently developed Sliced Wasserstein Distance and
    develop an algorithm that explicitly and efficiently minimizes the distance between
    patch distributions in two images. Our method is conceptually simple, requires
    no training and can be implemented in a few lines of codes. On a number of image
    generation tasks we show that our results are often superior to single-image-GANs,
    require no training, and can generate high quality images in a few seconds. Our
    implementation is available at https://github.com/ariel415el/GPDM
  related_code: https://github.com/ariel415el/GPDM
- author: Tianlang Chen, Jiajun Deng, Jiebo Luo 0001
  title: Adaptive Offline Quintuplet Loss for Image-Text Matching.
  venue: ECCV
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/ChenDL20
  doi: 10.1007/978-3-030-58601-0_33
  ee: https://doi.org/10.1007/978-3-030-58601-0_33
  url: https://dblp.org/rec/conf/eccv/ChenDL20
  abstract: 'Existing image-text matching approaches typically leverage triplet loss
    with online hard negatives to train the model. For each image or text anchor in
    a training mini-batch, the model is trained to distinguish between a positive
    and the most confusing negative of the anchor mined from the mini-batch (i.e.
    online hard negative). This strategy improves the model''s capacity to discover
    fine-grained correspondences and non-correspondences between image and text inputs.
    However, the above approach has the following drawbacks: (1) the negative selection
    strategy still provides limited chances for the model to learn from very hard-to-distinguish
    cases. (2) The trained model has weak generalization capability from the training
    set to the testing set. (3) The penalty lacks hierarchy and adaptiveness for hard
    negatives with different "hardness" degrees. In this paper, we propose solutions
    by sampling negatives offline from the whole training set. It provides "harder"
    offline negatives than online hard negatives for the model to distinguish. Based
    on the offline hard negatives, a quintuplet loss is proposed to improve the model''s
    generalization capability to distinguish positives and negatives. In addition,
    a novel loss function that combines the knowledge of positives, offline hard negatives
    and online hard negatives is created. It leverages offline hard negatives as the
    intermediary to adaptively penalize them based on their distance relations to
    the anchor. We evaluate the proposed training approach on three state-of-the-art
    image-text models on the MS-COCO and Flickr30K datasets. Significant performance
    improvements are observed for all the models, proving the effectiveness and generality
    of our approach. Code is available at this https URL'
  related_code: ''
- author: Bryan A. Plummer, Mariya I. Vasileva, Vitali Petsiuk, Kate Saenko, David
    A. Forsyth
  title: Why Do These Match? Explaining the Behavior of Image Similarity Models.
  venue: ECCV
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/PlummerVPSF20
  doi: 10.1007/978-3-030-58621-8_38
  ee: https://doi.org/10.1007/978-3-030-58621-8_38
  url: https://dblp.org/rec/conf/eccv/PlummerVPSF20
  abstract: 'Explaining a deep learning model can help users understand its behavior
    and allow researchers to discern its shortcomings. Recent work has primarily focused
    on explaining models for tasks like image classification or visual question answering.
    In this paper, we introduce Salient Attributes for Network Explanation (SANE)
    to explain image similarity models, where a model''s output is a score measuring
    the similarity of two inputs rather than a classification score. In this task,
    an explanation depends on both of the input images, so standard methods do not
    apply. Our SANE explanations pairs a saliency map identifying important image
    regions with an attribute that best explains the match. We find that our explanations
    provide additional information not typically captured by saliency maps alone,
    and can also improve performance on the classic task of attribute recognition.
    Our approach''s ability to generalize is demonstrated on two datasets from diverse
    domains, Polyvore Outfits and Animals with Attributes 2. Code available at: this
    https URL'
  related_code: ''
- author: Haoran Wang 0004, Ying Zhang, Zhong Ji, Yanwei Pang, Lin Ma
  title: Consensus-Aware Visual-Semantic Embedding for Image-Text Matching.
  venue: ECCV
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/WangZJPM20
  doi: 10.1007/978-3-030-58586-0_2
  ee: https://doi.org/10.1007/978-3-030-58586-0_2
  url: https://dblp.org/rec/conf/eccv/WangZJPM20
  abstract: 'Image-text matching plays a central role in bridging vision and language.
    Most existing approaches only rely on the image-text instance pair to learn their
    representations, thereby exploiting their matching relationships and making the
    corresponding alignments. Such approaches only exploit the superficial associations
    contained in the instance pairwise data, with no consideration of any external
    commonsense knowledge, which may hinder their capabilities to reason the higher-level
    relationships between image and text. In this paper, we propose a Consensus-aware
    Visual-Semantic Embedding (CVSE) model to incorporate the consensus information,
    namely the commonsense knowledge shared between both modalities, into image-text
    matching. Specifically, the consensus information is exploited by computing the
    statistical co-occurrence correlations between the semantic concepts from the
    image captioning corpus and deploying the constructed concept correlation graph
    to yield the consensus-aware concept (CAC) representations. Afterwards, CVSE learns
    the associations and alignments between image and text based on the exploited
    consensus as well as the instance-level representations for both modalities. Extensive
    experiments conducted on two public datasets verify that the exploited consensus
    makes significant contributions to constructing more meaningful visual-semantic
    embeddings, with the superior performances over the state-of-the-art approaches
    on the bidirectional image and text retrieval task. Our code of this paper is
    available at: this https URL.'
  related_code: ''
- author: Kuang-Huei Lee, Xi Chen, Gang Hua 0001, Houdong Hu, Xiaodong He 0001
  title: Stacked Cross Attention for Image-Text Matching.
  venue: ECCV
  year: '2018'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/LeeCHHH18
  doi: 10.1007/978-3-030-01225-0_13
  ee: https://doi.org/10.1007/978-3-030-01225-0_13
  url: https://dblp.org/rec/conf/eccv/LeeCHHH18
  abstract: In this paper, we study the problem of image-text matching. Inferring
    the latent semantic alignment between objects or other salient stuffs (e.g. snow,
    sky, lawn) and the corresponding words in sentences allows to capture fine-grained
    interplay between vision and language, and makes image-text matching more interpretable.
    Prior works either simply aggregate the similarity of all possible pairs of regions
    and words without attending differentially to more and less important words or
    regions, or use a multi-step attentional process to capture limited number of
    semantic alignments which is less interpretable. In this paper, we present Stacked
    Cross Attention to discover the full latent alignments using both image regions
    and words in sentence as context and infer the image-text similarity. Our approach
    achieves the state-of-the-art results on the MS-COCO and Flickr30K datasets. On
    Flickr30K, our approach outperforms the current best methods by 22.1% in text
    retrieval from image query, and 18.2% in image retrieval with text query (based
    on Recall@1). On MS-COCO, our approach improves sentence retrieval by 17.8% and
    image retrieval by 16.6% (based on Recall@1 using the 5K test set).
  related_code: ''
- author: Yuhang Song 0003, Chao Yang 0011, Zhe Lin 0001, Xiaofeng Liu 0001, Qin Huang
    0006, Hao Li 0015, C.-C. Jay Kuo
  title: 'Contextual-Based Image Inpainting: Infer, Match, and Translate.'
  venue: ECCV
  year: '2018'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/SongYLLHLK18
  doi: 10.1007/978-3-030-01216-8_1
  ee: https://doi.org/10.1007/978-3-030-01216-8_1
  url: https://dblp.org/rec/conf/eccv/SongYLLHLK18
  abstract: We study the task of image inpainting, which is to fill in the missing
    region of an incomplete image with plausible contents. To this end, we propose
    a learning-based approach to generate visually coherent completion given a high-resolution
    image with missing components. In order to overcome the difficulty to directly
    learn the distribution of high-dimensional image data, we divide the task into
    inference and translation as two separate steps and model each step with a deep
    neural network. We also use simple heuristics to guide the propagation of local
    textures from the boundary to the hole. We show that, by using such techniques,
    inpainting reduces to the problem of learning two image-feature translation functions
    in much smaller space and hence easier to train. We evaluate our method on several
    public datasets and show that we generate results of better visual quality than
    previous state-of-the-art methods.
