- author: Zhexiong Wan, Yuxin Mao, Jing Zhang 0052, Yuchao Dai
  title: 'RPEFlow: Multimodal Fusion of RGB-PointCloud-Event for Joint Optical Flow
    and Scene Flow Estimation.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/WanMZD23
  doi: 10.1109/ICCV51070.2023.00920
  ee: https://doi.org/10.1109/ICCV51070.2023.00920
  url: https://dblp.org/rec/conf/iccv/WanMZD23
  abstract: Recently, the RGB images and point clouds fusion methods have been proposed
    to jointly estimate 2D optical flow and 3D scene flow. However, as both conventional
    RGB cameras and LiDAR sensors adopt a frame-based data acquisition mechanism,
    their performance is limited by the fixed low sampling rates, especially in highly-dynamic
    scenes. By contrast, the event camera can asynchronously capture the intensity
    changes with a very high temporal resolution, providing complementary dynamic
    information of the observed scenes. In this paper, we incorporate RGB images,
    Point clouds and Events for joint optical flow and scene flow estimation with
    our proposed multi-stage multimodal fusion model, RPEFlow. First, we present an
    attention fusion module with a cross-attention mechanism to implicitly explore
    the internal cross-modal correlation for 2D and 3D branches, respectively. Second,
    we introduce a mutual information regularization term to explicitly model the
    complementary information of three modalities for effective multimodal feature
    learning. We also contribute a new synthetic dataset to advocate further research.
    Experiments on both synthetic and real datasets show that our model outperforms
    the existing state-of-theart by a wide margin. Code and dataset is available at
    https://npucvr.github.io/RPEFlow.
  related_code: ''
- author: Longliang Liu, Miaojie Feng, Junda Cheng, Jijun Xiang, Xuan Zhu 0009, Xin
    Yang 0008
  title: 'PriOr-Flow: Enhancing Primitive Panoramic Optical Flow with Orthogonal View.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LiuFCXZY25
  doi: 10.1109/ICCV51701.2025.00506
  ee: https://doi.org/10.1109/ICCV51701.2025.00506
  url: https://dblp.org/rec/conf/iccv/LiuFCXZY25
  abstract: 'Panoramic optical flow enables a comprehensive understanding of temporal
    dynamics across wide fields of view. However, severe distortions caused by sphere-toplane
    projections, such as the equirectangular projection (ERP), significantly degrade
    the performance of conventional perspective-based optical flow methods, especially
    in polar regions. To address this challenge, we propose PriOr-Flow, a novel dual-branch
    framework that leverages the low-distortion nature of the orthogonal view to enhance
    optical flow estimation in these regions. Specifically, we introduce the Dual-Cost
    Collaborative Lookup (DCCL) operator, which jointly retrieves correlation information
    from both the primitive and orthogonal cost volumes, effectively mitigating distortion
    noise during cost volume construction. Furthermore, our Ortho-Driven Distortion
    Compensation (ODDC) module iteratively refines motion features of the primitive
    branch, further suppressing polar distortions. Extensive experiments demonstrate
    that PriOrFlow is compatible with various perspective-based iterative optical
    flow methods and consistently achieves state-of-the-art performance on publicly
    available panoramic optical flow datasets, setting a new benchmark for widefield
    motion estimation. The code is publicly available at: https://github.com/longliangLiu/PriOr-Flow.'
  related_code: https://github.com/longliangLiu/PriOr-Flow
- author: Ruyang Liu, Shangkun Sun, Haoran Tang, Wei Gao 0003, Ge Li 0002
  title: 'Flow4Agent: Long-form Video Understanding via Motion Prior from Optical
    Flow.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LiuSTGL25
  doi: 10.1109/ICCV51701.2025.02211
  ee: https://doi.org/10.1109/ICCV51701.2025.02211
  url: https://dblp.org/rec/conf/iccv/LiuSTGL25
  abstract: 'Long-form video understanding has always been a challenging problem due
    to the significant redundancy in both temporal and spatial contents. This challenge
    is further exacerbated by the limited context length of Multimodal Large Language
    Models (MLLMs). To address this issue, many previous works have attempted to extract
    key video information, where the “key” is typically semantic-aware and heavily
    dependent on the CLIP model as prior. In this paper, we propose Flow4Agent, a
    novel framework that pioneeringly incorporates motion priors from optical flow
    to facilitate LLM-based long video understanding. Flow4Agent mitigates the redundancy
    in long videos at both temporal and spatial levels through two core modules: Temporal
    Granularity Optimization (TGO) adaptively refines framelevel hierarchies, which
    first leverages coarse flow priors to group similar visual contents and then applies
    semantic priors to filter out highly irrelevant scene information. Motion Token
    Pruning (MTP) further refines the intra-frame visual representations, pruning
    high-redundancy video tokens using fine-grained optical flow information. Extensive
    experiments demonstrate that our Flow4Agent outperforms existing methods across
    a wide range of video MLLM benchmarks, especially for hour-level video understanding
    tasks, achieving 64.7% on Video-MME, 71.4% on MLVU and 60.4% on LongVideoBench.'
  related_code: ''
- author: Matteo Poggi, Fabio Tosi
  title: 'FlowSeek: Optical Flow Made Easier with Depth Foundation Models and Motion
    Bases.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/PoggiT25
  doi: 10.1109/ICCV51701.2025.00537
  ee: https://doi.org/10.1109/ICCV51701.2025.00537
  url: https://dblp.org/rec/conf/iccv/PoggiT25
  abstract: We present FlowSeek, a novel framework for optical flow requiring minimal
    hardware resources for training. FlowSeek marries the latest advances on the design
    space of optical flow networks with cutting-edge single-image depth foundation
    models and classical low-dimensional motion parametrization, implementing a compact,
    yet accurate architecture. FlowSeek is trained on a single consumer-grade GPU,
    a hardware budget about $8 \times$ lower compared to most recent methods, and
    still achieves superior cross-dataset generalization on Sintel Final and KITTI,
    with a relative improvement of 10 and 15% over the previous state-of-the-art SEA-RAFT,
    as well as on Spring and LayeredFlow datasets.
  related_code: ''
- author: Yingping Liang, Jiaming Liu, Debing Zhang, Ying Fu 0001
  title: 'MPI-Flow: Learning Realistic Optical Flow with Multiplane Images.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LiangLZ023
  doi: 10.1109/ICCV51070.2023.01274
  ee: https://doi.org/10.1109/ICCV51070.2023.01274
  url: https://dblp.org/rec/conf/iccv/LiangLZ023
  abstract: 'The accuracy of learning-based optical flow estimation models heavily
    relies on the realism of the training datasets. Current approaches for generating
    such datasets either employ synthetic data or generate images with limited realism.
    However, the domain gap of these data with real-world scenes constrains the generalization
    of the trained model to real-world applications. To address this issue, we investigate
    generating realistic optical flow datasets from real-world images. Firstly, to
    generate highly realistic new images, we construct a layered depth representation,
    known as multiplane images (MPI), from single-view images. This allows us to generate
    novel view images that are highly realistic. To generate optical flow maps that
    correspond accurately to the new image, we calculate the optical flows of each
    plane using the camera matrix and plane depths. We then project these layered
    optical flows into the output optical flow map with volume rendering. Secondly,
    to ensure the realism of motion, we present an independent object motion module
    that can separate the camera and dynamic object motion in MPI. This module addresses
    the deficiency in MPI-based single-view methods, where optical flow is generated
    only by camera motion and does not account for any object movement. We additionally
    devise a depth-aware inpainting module to merge new images with dynamic objects
    and address unnatural motion occlusions. We show the superior performance of our
    method through extensive experiments on real-world datasets. Moreover, our approach
    achieves state-of-the-art performance in both unsupervised and supervised training
    of learning-based models. The code will be made publicly available at: https://github.com/Sharpiless/MPI-Flow.'
  related_code: https://github.com/Sharpiless/MPI-Flow
- author: Feihu Zhang, Oliver J. Woodford, Victor Prisacariu, Philip H. S. Torr
  title: 'Separable Flow: Learning Motion Cost Volumes for Optical Flow Estimation.'
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ZhangWPT21
  doi: 10.1109/ICCV48922.2021.01063
  ee: https://doi.org/10.1109/ICCV48922.2021.01063
  url: https://dblp.org/rec/conf/iccv/ZhangWPT21
  abstract: Full-motion cost volumes play a central role in current state-of-the-art
    optical flow methods. However, constructed using simple feature correlations,
    they lack the ability to encapsulate prior, or even non-local knowledge. This
    creates artifacts in poorly constrained ambiguous regions, such as occluded and
    textureless areas. We propose a separable cost volume module, a drop-in replacement
    to correlation cost volumes, that uses non-local aggregation layers to exploit
    global context cues and prior knowledge, in order to disambiguate motions in these
    regions. Our method leads both the now standard Sintel and KITTI optical flow
    benchmarks in terms of accuracy, and is also shown to generalize better from synthetic
    to real data.
  related_code: ''
- author: Alexey Dosovitskiy, Philipp Fischer, Eddy Ilg, Philip Häusser, Caner Hazirbas,
    Vladimir Golkov, Patrick van der Smagt, Daniel Cremers, Thomas Brox
  title: 'FlowNet: Learning Optical Flow with Convolutional Networks.'
  venue: ICCV
  year: '2015'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/DosovitskiyFIHH15
  doi: 10.1109/ICCV.2015.316
  ee: https://doi.org/10.1109/ICCV.2015.316
  url: https://dblp.org/rec/conf/iccv/DosovitskiyFIHH15
  abstract: 'Convolutional neural networks (CNNs) have recently been very successful
    in a variety of computer vision tasks, especially on those linked to recognition.
    Optical flow estimation has not been among the tasks CNNs succeeded at. In this
    paper we construct CNNs which are capable of solving the optical flow estimation
    problem as a supervised learning task. We propose and compare two architectures:
    a generic architecture and another one including a layer that correlates feature
    vectors at different image locations. Since existing ground truth data sets are
    not sufficiently large to train a CNN, we generate a large synthetic Flying Chairs
    dataset. We show that networks trained on this unrealistic data still generalize
    very well to existing datasets such as Sintel and KITTI, achieving competitive
    accuracy at frame rates of 5 to 10 fps.'
  related_code: ''
- author: Vladislav Bargatin, Egor Chistov, Alexander Yakovenko, Dmitriy S. Vatolin
  title: 'MEMFOF: High-Resolution Training for Memory-Efficient Multi-Frame Optical
    Flow Estimation.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/BargatinCYV25
  doi: 10.1109/ICCV51701.2025.00767
  ee: https://doi.org/10.1109/ICCV51701.2025.00767
  url: https://dblp.org/rec/conf/iccv/BargatinCYV25
  abstract: 'Recent advances in optical flow estimation have prioritized accuracy
    at the cost of growing GPU memory consumption, particularly for high-resolution
    (FullHD) inputs. We introduce MEMFOF, a memory-efficient multi-frame optical flow
    method that identifies a favorable trade-off between multi-frame estimation and
    GPU memory usage. Notably, MEMFOF requires only 2.09 GB of GPU memory at runtime
    for 1080 p inputs, and 28.5 GB during training, which uniquely positions our method
    to be trained at native 1080p without the need for cropping or downsampling. We
    systematically revisit design choices from RAFT-like architectures, integrating
    reduced correlation volumes and high-resolution training protocols alongside multi-frame
    estimation, to achieve state-of-the-art performance across multiple benchmarks
    while substantially reducing memory overhead. Our method outperforms more resource-intensive
    alternatives in both accuracy and runtime efficiency, validating its robustness
    for flow estimation at high resolutions. At the time of submission, our method
    ranks first on the Spring benchmark with a 1 -pixel (1px) outlier rate of 3.289,
    leads Sintel (clean) with an endpoint error (EPE) of 0.963, and achieves the best
    Fl-all error on KITTI-2015 at 2.94%. The code is available at: https://github.com/msu-video-group/memfof.'
  related_code: https://github.com/msu-video-group/memfof
- author: Hoonhee Cho, Yuhwan Jeong, Kuk-Jin Yoon
  title: Learning Large Motion Estimation from Intermediate Representations with a
    High-Resolution Optical Flow Dataset Featuring Long-Range Dynamic Motion.
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
