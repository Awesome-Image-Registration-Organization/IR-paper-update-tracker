- author: Lucas Fidon, Michael Ebner, Luis C. García-Peraza-Herrera, Marc Modat, Sébastien
    Ourselin, Tom Vercauteren
  title: Incompressible Image Registration Using Divergence-Conforming B-Splines.
  venue: MICCAI
  year: '2019'
