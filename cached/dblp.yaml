  url: https://dblp.org/rec/journals/mia/VigneaultPTBN18
  abstract: 'HIGHLIGHTSA pipeline for quantifying cardiac function from computed tomography
    is proposed.Patient‐specific meshes modelling cardiac anatomy are automatically
    constructed.Cardiac mesh models are fitted to the endocardium in all frames simultaneously.Model
    fitting is formulated so as to encourage biologically plausible motion.Functional
    cardiac parameters are validated against the prior state‐of‐the‐art. ABSTRACT
    Recent improvements in cardiac computed tomography (CCT) allow for whole‐heart
    functional studies to be acquired at low radiation dose (<2mSv) and high‐temporal
    resolution (<100ms) in a single heart beat. Although the extraction of regional
    functional information from these images is of great clinical interest, there
    is a paucity of research into the quantification of regional function from CCT,
    contrasting with the large body of work in echocardiography and cardiac MR. Here
    we present the Simultaneous Subdivision Surface Registration (SiSSR) method: a
    fast, semi‐automated image analysis pipeline for quantifying regional function
    from contrast‐enhanced CCT. For each of thirteen adult male canines, we construct
    an anatomical reference mesh representing the left ventricular (LV) endocardium,
    obviating the need for a template mesh to be manually sculpted and initialized.
    We treat this generated mesh as a Loop subdivision surface, and adapt a technique
    previously described in the context of 3‐D echocardiography to register these
    surfaces to the endocardium efficiently across all cardiac frames simultaneously.
    Although previous work performs the registration at a single resolution, we observe
    that subdivision surfaces naturally suggest a multiresolution approach, leading
    to faster convergence and avoiding local minima. We additionally make two notable
    changes to the cost function of the optimization, explicitly encouraging plausible
    biological motion and high mesh quality. Finally, we calculate an accepted functional
    metric for CCT from the registered surfaces, and compare our results to an alternate
    state‐of‐the‐art CCT method.'
