  url: https://dblp.org/rec/journals/ijcv/LuCLCQY21
  abstract: Dual-view snapshot compressive imaging (SCI) aims to capture videos from
    two field-of-views (FoVs) using a 2D sensor (detector) in a single snapshot, achieving
    joint FoV and temporal compressive sensing, and thus enjoying the advantages of
    low-bandwidth, low-power and low-cost. However, it is challenging for existing
    model-based decoding algorithms to reconstruct each individual scene, which usually
    require exhaustive parameter tuning with extremely long running time for large
    scale data. In this paper, we propose an optical flow-aided recurrent neural network
    for dual video SCI systems, which provides high-quality decoding in seconds. Firstly,
    we develop a diversity amplification method to enlarge the differences between
    scenes of two FoVs, and design a deep convolutional neural network with dual branches
    to separate different scenes from the single measurement. Secondly, we integrate
    the bidirectional optical flow extracted from adjacent frames with the recurrent
    neural network to jointly reconstruct each video in a sequential manner. Extensive
    results on both simulation and real data demonstrate the superior performance
    of our proposed model in short inference time. The code and data are available
    at https://github.com/RuiyingLu/OFaNet-for-Dual-view-SCI.
  related_code: https://github.com/RuiyingLu/OFaNet-for-Dual-view-SCI
- author: Anurag Ranjan, David T. Hoffmann, Dimitrios Tzionas, Siyu Tang 0001, Javier
    Romero 0002, Michael J. Black
  title: Learning Multi-human Optical Flow.
  venue: Int. J. Comput. Vis.
  year: '2020'
  type: Journal Articles
  access: open
  key: journals/ijcv/RanjanHTTRB20
  doi: 10.1007/S11263-019-01279-W
  ee: https://doi.org/10.1007/s11263-019-01279-w
  url: https://dblp.org/rec/journals/ijcv/RanjanHTTRB20
  abstract: AbstractThe optical flow of humans is well known to be useful for the
    analysis of human action. Recent optical flow methods focus on training deep networks
    to approach the problem. However, the training data used by them does not cover
    the domain of human motion. Therefore, we develop a dataset of multi-human optical
    flow and train optical flow networks on this dataset. We use a 3D model of the
    human body and motion capture data to synthesize realistic flow fields in both
    single- and multi-person images. We then train optical flow networks to estimate
    human flow fields from pairs of images. We demonstrate that our trained networks
    are more accurate than a wide range of top methods on held-out test data and that
    they can generalize well to real image sequences. The code, trained models and
    the dataset are available for research.
