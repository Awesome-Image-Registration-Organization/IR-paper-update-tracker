- author: Xueqi Guo, Bo Zhou 0009, David Pigg, Bruce Spottiswoode, Michael E. Casey,
    Chi Liu 0001, Nicha C. Dvornek
  title: Unsupervised inter-frame motion correction for whole-body dynamic PET using
    convolutional long short-term memory in a convolutional neural network.
  venue: Medical Image Anal.
  year: '2022'
  type: Journal Articles
  access: closed
  key: journals/mia/Guo0PSCLD22
  doi: 10.1016/J.MEDIA.2022.102524
  ee: https://doi.org/10.1016/j.media.2022.102524
  url: https://dblp.org/rec/journals/mia/Guo0PSCLD22
  abstract: Subject motion in whole-body dynamic PET introduces inter-frame mismatch
    and seriously impacts parametric imaging. Traditional non-rigid registration methods
    are generally computationally intense and time-consuming. Deep learning approaches
    are promising in achieving high accuracy with fast speed, but have yet been investigated
    with consideration for tracer distribution changes or in the whole-body scope.
    In this work, we developed an unsupervised automatic deep learning-based framework
    to correct inter-frame body motion. The motion estimation network is a convolutional
    neural network with a combined convolutional long short-term memory layer, fully
    utilizing dynamic temporal features and spatial information. Our dataset contains
    27 subjects each under a 90-min FDG whole-body dynamic PET scan. Evaluating performance
    in motion simulation studies and a 9-fold cross-validation on the human subject
    dataset, compared with both traditional and deep learning baselines, we demonstrated
    that the proposed network achieved the lowest motion prediction error, obtained
    superior performance in enhanced qualitative and quantitative spatial alignment
    between parametric Ki and Vb images, and significantly reduced parametric fitting
    error. We also showed the potential of the proposed motion correction method for
    impacting downstream analysis of the estimated parametric images, improving the
    ability to distinguish malignant from benign hypermetabolic regions of interest.
    Once trained, the motion estimation inference time of our proposed network was
    around 460 times faster than the conventional registration baseline, showing its
    potential to be easily applied in clinical settings.
