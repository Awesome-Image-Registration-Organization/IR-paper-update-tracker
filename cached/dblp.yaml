- author: Haipeng Li 0001, Kunming Luo, Bing Zeng 0001, Shuaicheng Liu
  title: 'GyroFlow+: Gyroscope-Guided Unsupervised Deep Homography and Optical Flow
    Learning.'
  venue: Int. J. Comput. Vis.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/ijcv/LiLZL24a
  doi: 10.1007/S11263-023-01978-5
