- author: Bingli Wu, Jie Ma 0003, Gaojie Chen 0003, Pei An
  title: Feature Interactive Representation for Point Cloud Registration.
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/WuMCA21
  doi: 10.1109/ICCV48922.2021.00548
  ee: https://doi.org/10.1109/ICCV48922.2021.00548
  url: https://dblp.org/rec/conf/iccv/WuMCA21
  abstract: Point cloud registration is the process of using the common structures
    in two point clouds to splice them together. To find out these common structures
    and make these structures match more accurately, interacting information of the
    source and target point clouds is essential. However, limited attention has been
    paid to explicitly model such feature interaction. To this end, we propose a Feature
    Interactive Representation learning Network (FIRE-Net), which can explore feature
    interaction among the source and target point clouds from different levels. Specifically,
    we first introduce a Combined Feature Encoder (CFE) based on feature interaction
    intra point cloud. The CFE extracts interactive features intra each point cloud
    and combines them to enhance the ability of the network to describe the local
    geometric structure. Then, we propose a feature interaction mechanism inter point
    clouds which includes a Local Interaction Unit (LIU) and a Global Interaction
    Unit (GIU). The former is used to interact information between point pairs across
    two point clouds, thus the point features in one point cloud and its similar point
    features in another point cloud can be aware of each other. The latter is applied
    to change the per-point features depending on the global cross information of
    two point clouds, thus one point cloud has the global perception of another. Extensive
    experiments on partially overlapping point cloud registration show that our method
    achieves state-of-the-art performance.
