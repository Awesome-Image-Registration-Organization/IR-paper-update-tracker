- author: Neel Dey, Jo Schlemper, Seyed Sadegh Mohseni Salehi, Bo Zhou 0009, Guido
    Gerig, Michal Sofka
  title: 'ContraReg: Contrastive Learning of Multi-modality Unsupervised Deformable
    Image Registration.'
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/DeySSZGS22
  doi: 10.1007/978-3-031-16446-0_7
  ee: https://doi.org/10.1007/978-3-031-16446-0_7
  url: https://dblp.org/rec/conf/miccai/DeySSZGS22
  abstract: Establishing voxelwise semantic correspondence across distinct imaging
    modalities is a foundational yet formidable computer vision task. Current multi-modality
    registration techniques maximize hand-crafted inter-domain similarity functions,
    are limited in modeling nonlinear intensity-relationships and deformations, and
    may require significant re-engineering or underperform on new tasks, datasets,
    and domain pairs. This work presents ContraReg, an unsupervised contrastive representation
    learning approach to multi-modality deformable registration. By projecting learned
    multi-scale local patch features onto a jointly learned inter-domain embedding
    space, ContraReg obtains representations useful for non-rigid multi-modality alignment.
    Experimentally, ContraReg achieves accurate and robust results with smooth and
    invertible deformations across a series of baselines and ablations on a neonatal
    T1-T2 brain MRI registration task with all methods validated over a wide range
    of deformation regularization strengths.
