- author: Fan Yang 0088, Lin Guo 0019, Zhi Chen 0011, Wenbing Tao
  title: 'One-Inlier is First: Towards Efficient Position Encoding for Point Cloud
    Registration.'
  venue: NeurIPS
  year: '2022'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/YangGCT22
  doi: 10.52202/068431-0506
  ee: http://papers.nips.cc/paper_files/paper/2022/hash/2e163450c1ae3167832971e6da29f38d-Abstract-Conference.html
  url: https://dblp.org/rec/conf/nips/YangGCT22
  abstract: Transformer architecture has shown great potential for many visual tasks,
    including point cloud registration. As an order-aware module, position encoding
    plays an important role in Transformer architecture applied to point cloud registration
    task. In this paper, we propose OIF-PCR, a one-inlier based position encoding
    method for point cloud registration network. Speciﬁcally, we ﬁrst ﬁnd one correspondence
    by a differentiable optimal transport layer, and use it to normalize each point
    for position encoding. It can eliminate the challenges brought by the different
    reference frames of two point clouds, and mitigate the feature ambiguity by learning
    the spatial consistency. Then, we propose a joint approach for establishing correspondence
    and position encoding, presenting an iterative optimization process. Finally,
    we design a progressive way for point cloud alignment and feature learning to
    gradually optimize the rigid transformation. The proposed position encoding is
    very efﬁcient, requiring only a small addition of memory and computing overhead.
    Extensive experiments demonstrate the proposed method can achieve competitive
    performance with the state-of-the-art methods in both indoor and outdoor scenes.
