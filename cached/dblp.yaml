- author: Lixuan Chen, Xuanyu Tian, Jiangjie Wu, Guoyan Lao, Yuyao Zhang 0005, Hongjiang
    Wei
  title: 'COLLATOR: Consistent spatial-temporal longitudinal atlas construction via
    implicit neural representation.'
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/ChenTWLZW25
  doi: 10.1016/J.MEDIA.2024.103396
  ee: https://doi.org/10.1016/j.media.2024.103396
  url: https://dblp.org/rec/journals/mia/ChenTWLZW25
  abstract: 'Longitudinal brain atlases that present brain development trend along
    time, are essential tools for brain development studies. However, conventional
    methods construct these atlases by independently averaging brain images from different
    individuals at discrete time points. This approach could introduce temporal inconsistencies
    due to variations in ontogenetic trends among samples, potentially affecting accuracy
    of brain developmental characteristic analysis. In this paper, we propose an implicit
    neural representation (INR)-based framework to improve the temporal consistency
    in longitudinal atlases. We treat temporal inconsistency as a 4-dimensional (4D)
    image denoising task, where the data consists of 3D spatial information and 1D
    temporal progression. We formulate the longitudinal atlas as an implicit function
    of the spatial-temporal coordinates, allowing structural inconsistency over the
    time to be considered as 3D image noise along age. Inspired by recent self-supervised
    denoising methods (e.g. Noise2Noise), our approach learns the noise-free and temporally
    continuous implicit function from inconsistent longitudinal atlas data. Finally,
    the time-consistent longitudinal brain atlas can be reconstructed by evaluating
    the denoised 4D INR function at critical brain developing time points. We evaluate
    our approach on three longitudinal brain atlases of different MRI modalities,
    demonstrating that our method significantly improves temporal consistency while
    accurately preserving brain structures. Additionally, the continuous functions
    generated by our method enable the creation of 4D atlases with higher spatial
    and temporal resolution. Code: https://github.com/maopaom/COLLATOR.'
  related_code: https://github.com/maopaom/COLLATOR
- author: Gang Li 0001, Li Wang 0026, Feng Shi 0001, John H. Gilmore, Weili Lin, Dinggang
    Shen
  title: 'Construction of 4D high-definition cortical surface atlases of infants:
    Methods and applications.'
  venue: Medical Image Anal.
  year: '2015'
  type: Journal Articles
  access: closed
  key: journals/mia/Li0SGLS15
  doi: 10.1016/J.MEDIA.2015.04.005
  ee: https://doi.org/10.1016/j.media.2015.04.005
  url: https://dblp.org/rec/journals/mia/Li0SGLS15
  abstract: In neuroimaging, cortical surface atlases play a fundamental role for
    spatial normalization, analysis, visualization, and comparison of results across
    individuals and different studies. However, existing cortical surface atlases
    created for adults are not suitable for infant brains during the first two years
    of life, which is the most dynamic period of postnatal structural and functional
    development of the highly-folded cerebral cortex. Therefore, spatiotemporal cortical
    surface atlases for infant brains are highly desired yet still lacking for accurate
    mapping of early dynamic brain development. To bridge this significant gap, leveraging
    our infant-dedicated computational pipeline for cortical surface-based analysis
    and the unique longitudinal infant MRI dataset acquired in our research center,
    in this paper, we construct the first spatiotemporal (4D) high-definition cortical
    surface atlases for the dynamic developing infant cortical structures at 7 time
    points, including 1, 3, 6, 9, 12, 18, and 24 months of age, based on 202 serial
    MRI scans from 35 healthy infants. For this purpose, we develop a novel method
    to ensure the longitudinal consistency and unbiasedness to any specific subject
    and age in our 4D infant cortical surface atlases. Specifically, we first compute
    the within-subject mean cortical folding by unbiased groupwise registration of
    longitudinal cortical surfaces of each infant. Then we establish longitudinally-consistent
    and unbiased inter-subject cortical correspondences by groupwise registration
    of the geometric features of within-subject mean cortical folding across all infants.
    Our 4D surface atlases capture both longitudinally-consistent dynamic mean shape
    changes and the individual variability of cortical folding during early brain
    development. Experimental results on two independent infant MRI datasets show
    that using our 4D infant cortical surface atlases as templates leads to significantly
    improved accuracy for spatial normalization of cortical surfaces across infant
    individuals, in comparison to the infant surface atlases constructed without longitudinal
    consistency and also the FreeSurfer adult surface atlas. Moreover, based on our
    4D infant surface atlases, for the first time, we reveal the spatially-detailed,
    region-specific correlation patterns of the dynamic cortical developmental trajectories
    between different cortical regions during early brain development.
  related_code: ''
- author: Yi Hong 0006, Brad Davis, J. S. Marron, Roland Kwitt, Nikhil Singh 0002,
