- author: Jie Luo 0003, Sarah F. Frisken, Duo Wang, Alexandra J. Golby, Masashi Sugiyama,
    William M. Wells III
  title: Are Registration Uncertainty and Error Monotonically Associated?
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/LuoFWGSW20
  doi: 10.1007/978-3-030-59716-0_26
  ee: https://doi.org/10.1007/978-3-030-59716-0_26
  url: https://dblp.org/rec/conf/miccai/LuoFWGSW20
  abstract: In image-guided neurosurgery, current commercial systems usually provide
    only rigid registration, partly because it is harder to predict, validate and
    understand non-rigid registration error. For instance, when surgeons see a discrepancy
    in aligned image features, they may not be able to distinguish between registration
    error and actual tissue deformation caused by tumor resection. In this case, the
    spatial distribution of registration error could help them make more informed
    decisions, e.g., ignoring the registration where the estimated error is high.
    However, error estimates are difficult to acquire. Probabilistic image registration
    (PIR) methods provide measures of registration uncertainty, which could be a surrogate
    for assessing the registration error. It is intuitive and believed by many clinicians
    that high uncertainty indicates a large error. However, the monotonic association
    between uncertainty and error has not been examined in image registration literature.
    In this pilot study, we attempt to address this fundamental problem by looking
    at one PIR method, the Gaussian process (GP) registration. We systematically investigate
    the relation between GP uncertainty and error based on clinical data and show
    empirically that there is a weak-to-moderate positive monotonic correlation between
    point-wise GP registration uncertainty and non-rigid registration error.
  related_code: ''
- author: Xinzhe Luo, Xiahai Zhuang
  title: 'MvMM-RegNet: A New Image Registration Framework Based on Multivariate Mixture
    Model and Neural Network Estimation.'
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/LuoZ20
  doi: 10.1007/978-3-030-59716-0_15
  ee: https://doi.org/10.1007/978-3-030-59716-0_15
  url: https://dblp.org/rec/conf/miccai/LuoZ20
  abstract: Current deep-learning-based registration algorithms often exploit intensity-based
    similarity measures as the loss function, where dense correspondence between a
    pair of moving and fixed images is optimized through backpropagation during training.
    However, intensity-based metrics can be misleading when the assumption of intensity
    class correspondence is violated, especially in cross-modality or contrast-enhanced
    images. Moreover, existing learning-based registration methods are predominantly
    applicable to pairwise registration and are rarely extended to groupwise registration
    or simultaneous registration with multiple images. In this paper, we propose a
    new image registration framework based on multivariate mixture model (MvMM) and
    neural network estimation. A generative model consolidating both appearance and
    anatomical information is established to derive a novel loss function capable
    of implementing groupwise registration. We highlight the versatility of the proposed
    framework for various applications on multimodal cardiac images, including single-atlas-based
    segmentation (SAS) via pairwise registration and multi-atlas segmentation (MAS)
    unified by groupwise registration. We evaluated performance on two publicly available
    datasets, i.e. MM-WHS-2017 and MS-CMRSeg-2019. The results show that the proposed
    framework achieved an average Dice score of \(0.871\pm 0.025\) for whole-heart
    segmentation on MR images and \(0.783\pm 0.082\) for myocardium segmentation on
    LGE MR images (Code is available from https://zmiclab.github.io/projects.html).
