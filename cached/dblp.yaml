  title: 'BlinkVision: A Benchmark for Optical Flow, Scene Flow and Point Tracking
    Estimation Using RGB Frames and Events.'
  venue: ECCV
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/LiSHCBSWSBCZL24
  doi: 10.1007/978-3-031-72855-6_2
  ee: https://doi.org/10.1007/978-3-031-72855-6_2
  url: https://dblp.org/rec/conf/eccv/LiSHCBSWSBCZL24
  abstract: 'Recent advances in event-based vision suggest that these systems complement
    traditional cameras by providing continuous observation without frame rate limitations
    and a high dynamic range, making them well-suited for correspondence tasks such
    as optical flow and point tracking. However, there is still a lack of comprehensive
    benchmarks for correspondence tasks that include both event data and images. To
    address this gap, we propose BlinkVision, a large-scale and diverse benchmark
    with multiple modalities and dense correspondence annotations. BlinkVision offers
    several valuable features: 1) Rich modalities: It includes both event data and
    RGB images. 2) Extensive annotations: It provides dense per-pixel annotations
    covering optical flow, scene flow, and point tracking. 3) Large vocabulary: It
    contains 410 everyday categories, sharing common classes with popular 2D and 3D
    datasets like LVIS and ShapeNet. 4) Naturalistic: It delivers photorealistic data
    and covers various naturalistic factors, such as camera shake and deformation.
    BlinkVision enables extensive benchmarks on three types of correspondence tasks
    (optical flow, point tracking, and scene flow estimation) for both image-based
    and event-based methods, offering new observations, practices, and insights for
    future research. The benchmark website is https://www.blinkvision.net/.'
  related_code: ''
- author: Eddy Ilg, Tonmoy Saikia, Margret Keuper, Thomas Brox
  title: Occlusions, Motion and Depth Boundaries with a Generic Network for Disparity,
    Optical Flow or Scene Flow Estimation.
  venue: ECCV
  year: '2018'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/IlgSKB18
  doi: 10.1007/978-3-030-01258-8_38
  ee: https://doi.org/10.1007/978-3-030-01258-8_38
  url: https://dblp.org/rec/conf/eccv/IlgSKB18
  abstract: Occlusions play an important role in disparity and optical flow estimation,
    since matching costs are not available in occluded areas and occlusions indicate
    depth or motion boundaries. Moreover, occlusions are relevant for motion segmentation
    and scene flow estimation. In this paper, we present an efficient learning-based
    approach to estimate occlusion areas jointly with disparities or optical flow.
    The estimated occlusions and motion boundaries clearly improve over the state-of-the-art.
    Moreover, we present networks with state-of-the-art performance on the popular
    KITTI benchmark and good generic performance. Making use of the estimated occlusions,
    we also show improved results on motion segmentation and scene flow estimation.
