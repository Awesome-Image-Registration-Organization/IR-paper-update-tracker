  url: https://dblp.org/rec/journals/pami/Dong0WWSY21
  abstract: 'We present supervision by registration and triangulation (SRT), an unsupervised
    approach that utilizes unlabeled multi-view video to improve the accuracy and
    precision of landmark detectors. Being able to utilize unlabeled data enables
    our detectors to learn from massive amounts of unlabeled data freely available
    and not be limited by the quality and quantity of manual human annotations. To
    utilize unlabeled data, there are two key observations: (I) The detections of
    the same landmark in adjacent frames should be coherent with registration, i.e.,
    optical flow. (II) The detections of the same landmark in multiple synchronized
    and geometrically calibrated views should correspond to a single 3D point, i.e.,
    multi-view consistency. Registration and multi-view consistency are sources of
    supervision that do not require manual labeling, thus it can be leveraged to augment
    existing training data during detector training. End-to-end training is made possible
    by differentiable registration and 3D triangulation modules. Experiments with
    11 datasets and a newly proposed metric to measure precision demonstrate accuracy
    and precision improvements in landmark detection on both images and video.'
