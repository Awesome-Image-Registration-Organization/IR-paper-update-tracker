  url: https://dblp.org/rec/conf/mm/YuCDSWG23
  abstract: 'Human facial expressions can convey a great deal of information in daily
    life. Spotting macro-expression (MaE) and micro-expression (ME) intervals from
    long video sequences is a difficult challenge. In this paper, we propose an efficient
    framework for the expression spotting task. This framework consists of three main
    modules: Face Cropping and Alignment Module (FCAM), optical flow Feature Extraction
    Module (FEM), and expression Proposal Generation Module (PGM). The noise of optical
    flow features is reduced by face cropping and alignment, and the Main Directional
    Mean Optical Flow Feature of the regions of interest is extracted as the feature
    for expression spotting. Finally, the expression intervals are spotted by our
    designed expression proposal generation module. Our approach achieves very good
    results on the SAMM Long Videos and CAS(ME)^2. To demonstrate the transferability
    of our method, we tested it on the MEGC2023 unseen dataset and finally achieved
    the third place, proving the effectiveness of our method.'
