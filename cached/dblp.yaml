- author: Yevheniya Nosyk, Maciej Korczynski, Carlos Gañán, Sourena Maroofi, Jan Bayer,
    Zul Odgerel, Samaneh Tajalizadehkhoob, Andrzej Duda
  title: 'Exposing the Roots of DNS Abuse: A Data-Driven Analysis of Key Factors Behind
    Phishing Domain Registrations.'
  venue: CCS
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/ccs/NosykKGMBOTD25
  doi: 10.1145/3719027.3744869
  ee: https://doi.org/10.1145/3719027.3744869
  url: https://dblp.org/rec/conf/ccs/NosykKGMBOTD25
  abstract: 'Cybercriminals have long depended on domain names for phishing, spam,
    malware distribution, and botnet operation. To facilitate the malicious activities,
    they continually register new domain names for exploitation. Previous work revealed
    an abnormally high concentration of malicious registrations in a handful of registrars
    and TLDs. However, no existing study systematically analyzed the factors driving
    abuse, leaving a critical gap in understanding how different variables influence
    malicious registrations. In this paper, we carefully distill the inclinations
    and aversions of malicious actors during the registration of new phishing domain
    names. Having compiled a list of 14.5 k malicious and 15.4 k benign domains, we
    collect a comprehensive set of 73 features for all the domains encompassing three
    main latent factors: registration attributes, proactive verification, and reactive
    security practices. With a GLM regression analysis, we found that each dollar
    reduction in registration fees corresponds to a 49% increase in malicious domain
    registrations. The availability of free bundled services, such as web hosting,
    drives an 88% surge in phishing activities. Conversely, stringent registration
    restrictions cut down abuse by 63%, while registrars providing API access for
    domain registration or account creation experience a staggering 401% rise in malicious
    domains. The results enable intermediaries involved in domain registration to
    develop tailored anti-abuse practices, yet aligning them with their economic interests.'
