  url: https://dblp.org/rec/journals/pami/ChenYJL21
  abstract: Estimating depth from multi-view images captured by a localized monocular
    camera is an essential task in computer vision and robotics. In this study, we
    demonstrate that learning a convolutional neural network (CNN) for depth estimation
    with an auxiliary optical flow network and the epipolar geometry constraint can
    greatly benefit the depth estimation task and in turn yield large improvements
    in both accuracy and speed. Our architecture is composed of two tightly-coupled
    encoder-decoder networks, i.e., an optical flow net and a depth net, the core
    part being a list of exchange blocks between the two nets and an epipolar feature
    layer in the optical flow net to improve predictions of both depth and optical
    flow. Our architecture allows to input arbitrary number of multiview images with
    a linearly growing time cost for optical flow and depth estimation. Experimental
    result on five public datasets demonstrates that our method, named DENAO, runs
    at 38.46fps on a single Nvidia TITAN Xp GPU which is 5.15X$\sim$∼142X faster than
    the state-of-the-art depth estimation methods Meanwhile, our DENAO can concurrently
    output predictions of both depth and optical flow, and performs on par with or
    outperforms the state-of-the-art depth estimation methods and optical flow methods.
  related_code: ''
- author: Tak-Wai Hui, Xiaoou Tang, Chen Change Loy
  title: A Lightweight Optical Flow CNN - Revisiting Data Fidelity and Regularization.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/pami/HuiTL21
  doi: 10.1109/TPAMI.2020.2976928
  ee: https://doi.org/10.1109/TPAMI.2020.2976928
  url: https://dblp.org/rec/journals/pami/HuiTL21
  abstract: Over four decades, the majority addresses the problem of optical flow
    estimation using variational methods. With the advance of machine learning, some
    recent works have attempted to address the problem using convolutional neural
    network (CNN) and have showed promising results. FlowNet2 [1] , the state-of-the-art
    CNN, requires over 160M parameters to achieve accurate flow estimation. Our LiteFlowNet2
    outperforms FlowNet2 on Sintel and KITTI benchmarks, while being 25.3 times smaller
    in the model size and 3.1 times faster in the running speed. LiteFlowNet2 is built
    on the foundation laid by conventional methods and resembles the corresponding
    roles as data fidelity and regularization in variational methods. We compute optical
    flow in a spatial-pyramid formulation as SPyNet [2] but through a novel lightweight
    cascaded flow inference. It provides high flow estimation accuracy through early
    correction with seamless incorporation of descriptor matching. Flow regularization
    is used to ameliorate the issue of outliers and vague flow boundaries through
    feature-driven local convolutions. Our network also owns an effective structure
    for pyramidal feature extraction and embraces feature warping rather than image
    warping as practiced in FlowNet2 and SPyNet. Comparing to LiteFlowNet [3] , LiteFlowNet2
    improves the optical flow accuracy on Sintel Clean by 23.3 percent, Sintel Final
    by 12.8 percent, KITTI 2012 by 19.6 percent, and KITTI 2015 by 18.8 percent, while
    being 2.2 times faster. Our network protocol and trained models are made publicly
    available on https://github.com/twhui/LiteFlowNet2.
