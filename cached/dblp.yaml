- author: Haoran Dou, Ning Bi, Luyi Han, Yuhao Huang 0001, Ritse Mann, Xin Yang 0009,
    Dong Ni 0001, Nishant Ravikumar, Alejandro F. Frangi, Yunzhi Huang
  title: 'GSMorph: Gradient Surgery for Cine-MRI Cardiac Deformable Registration.'
  venue: MICCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/DouBHHMYNRFH23
  doi: 10.1007/978-3-031-43999-5_58
  ee: https://doi.org/10.1007/978-3-031-43999-5_58
  url: https://dblp.org/rec/conf/miccai/DouBHHMYNRFH23
  abstract: Deep learning-based deformable registration methods have been widely investigated
    in diverse medical applications. Learning-based deformable registration relies
    on weighted objective functions trading off registration accuracy and smoothness
    of the deformation field. Therefore, they inevitably require tuning the hyperparameter
    for optimal registration performance. Tuning the hyperparameters is highly computationally
    expensive and introduces undesired dependencies on domain knowledge. In this study,
    we construct a registration model based on the gradient surgery mechanism, named
    GSMorph, to achieve a hyperparameter-free balance on multiple losses. In GSMorph,
    we reformulate the optimization procedure by projecting the gradient of similarity
    loss orthogonally to the plane associated with the smoothness constraint, rather
    than additionally introducing a hyperparameter to balance these two competing
    terms. Furthermore, our method is model-agnostic and can be merged into any deep
    registration network without introducing extra parameters or slowing down inference.
    In this study, We compared our method with state-of-the-art (SOTA) deformable
    registration approaches over two publicly available cardiac MRI datasets. GSMorph
    proves superior to five SOTA learning-based registration models and two conventional
    registration techniques, SyN and Demons, on both registration accuracy and smoothness.
  related_code: ''
