  url: https://dblp.org/rec/journals/mia/DehghanLFKDLBSPF12
  abstract: Prostate brachytherapy is a treatment for prostate cancer using radioactive
    seeds that are permanently implanted in the prostate. The treatment success depends
    on adequate coverage of the target gland with a therapeutic dose, while sparing
    the surrounding tissue. Since seed implantation is performed under transrectal
    ultrasound (TRUS) imaging, intraoperative localization of the seeds in ultrasound
    can provide physicians with dynamic dose assessment and plan modification. However,
    since all seeds cannot be seen in the ultrasound images, registration between
    ultrasound and fluoroscopy is a practical solution for intraoperative dosimetry.
    In this manuscript, we introduce a new image-based nonrigid registration method
    that obviates the need for manual seed segmentation in TRUS images and compensates
    for the prostate displacement and deformation due to TRUS probe pressure. First,
    we filter the ultrasound images for subsequent registration using thresholding
    and Gaussian blurring. Second, a computationally efficient point-to-volume similarity
    metric, an affine transformation and an evolutionary optimizer are used in the
    registration loop. A phantom study showed final registration errors of 0.84 ±
    0.45 mm compared to ground truth. In a study on data from 10 patients, the registration
    algorithm showed overall seed-to-seed errors of 1.7 ± 1.0 mm and 1.5 ± 0.9 mm
    for rigid and nonrigid registration methods, respectively, performed in approximately
    30 seconds per patient.
