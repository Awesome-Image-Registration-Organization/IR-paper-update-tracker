- author: Weiye Xu 0001, Wenfan Song, Jianwei Liu 0008, Yajie Liu, Xin Cui, Yuanqing
    Zheng, Jinsong Han, Xinhuai Wang, Kui Ren 0001
  title: 'Mask does not matter: anti-spoofing face authentication using mmWave without
    on-site registration.'
  venue: MobiCom
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mobicom/XuSLLCZHW022
  doi: 10.1145/3495243.3560515
  ee: https://doi.org/10.1145/3495243.3560515
  url: https://dblp.org/rec/conf/mobicom/XuSLLCZHW022
  abstract: Face authentication (FA) schemes are universally adopted. However, current
    FA systems are mainly camera-based and hence susceptible to face occlusion (e.g.,
    facial masks) and vulnerable to spoofing attacks (e.g., 3D-printed masks). This
    paper exploits the penetrability, material sensitivity, and fine-grained sensing
    capability of millimeter wave (mmWave) to build an anti-spoofing FA system, named
    mmFace. It scans the human face by moving a commodity off-the-shelf (COTS) mmWave
    radar along a specific trajectory. The mmWave signals bounced off the human face
    carry the facial biometric features and structure features, which allows mmFace
    to achieve reliable liveness detection and FA. Due to the penetrability of mmWave,
    mmFace can still work well even if users wear masks. We explore a distance-resistant
    facial structure feature to suppress the impact of unstable face-to-device distance.
    To avoid inconvenient on-site registration, we also propose a novel virtual registration
    approach based on the core idea of cross-modal transformation from photos to mmWave
    signals. We implement mmFace with various antenna configurations and prototype
    two typical modes of mmFace. Extensive experiments show that mmFace can realize
    accurate FA as well as reliable liveness detection.
  related_code: ''
- author: Yuze He, Li Ma, Zhehao Jiang, Yi Tang 0008, Guoliang Xing
  title: 'VI-eye: semantic-based 3D point cloud registration for infrastructure-assisted
    autonomous driving.'
  venue: MobiCom
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mobicom/HeMJ0X21
  doi: 10.1145/3447993.3483276
  ee: https://doi.org/10.1145/3447993.3483276
  url: https://dblp.org/rec/conf/mobicom/HeMJ0X21
  abstract: Infrastructure-assisted autonomous driving is an emerging paradigm that
    aims to make affordable autonomous vehicles a reality. A key technology for realizing
    this vision is real-time point cloud registration which allows a vehicle to fuse
    the 3D point clouds generated by its own LiDAR and those on roadside infrastructures
    such as smart lampposts, which can deliver increased sensing range, more robust
    object detection, and centimeter-level navigation. Unfortunately, the existing
    methods for point cloud registration assume two clouds to share a similar perspective
    and large overlap, which result in significant delay and inaccuracy in real-world
    infrastructure-assisted driving settings. This paper proposes VI-Eye - the first
    system that can align vehicle-infrastructure point clouds at centimeter accuracy
    in real-time. Our key idea is to exploit traffic domain knowledge by detecting
    a set of key semantic objects including road, lane lines, curbs, and traffic signs.
    Based on the inherent regular geometries of such semantic objects, VI-Eye extracts
    a small number of saliency points and leverage them to achieve real-time registration
    of two point clouds. By allowing vehicles and infrastructures to extract the semantic
    information in parallel, VI-Eye leads to a highly scalable architecture for infrastructure-assisted
    autonomous driving. To evaluate the performance of VI-Eye, we collect two new
    multiview LiDAR point cloud datasets on an indoor autonomous driving testbed and
    a campus smart lamppost testbed, respectively. They contain total 915 point cloud
    pairs and cover three roads of 1.12km. Experiment results show that VI-Eye achieves
    centimeter-level accuracy within around 0.2s, and delivers a 5X improvement in
    accuracy and 2X speedup over state-of-the-art baselines.
  related_code: ''
