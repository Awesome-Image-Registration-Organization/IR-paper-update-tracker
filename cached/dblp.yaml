- author: Peining Zhen, Xiaotao Yan, Wei Wang, Hao Wei, Hai-Bao Chen
  title: A Highly Compressed Accelerator With Temporal Optical Flow Feature Fusion
    and Tensorized LSTM for Video Action Recognition on Terminal Device.
  venue: IEEE Trans. Comput. Aided Des. Integr. Circuits Syst.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/tcad/ZhenYWWC23
  doi: 10.1109/TCAD.2023.3241113
  ee: https://doi.org/10.1109/TCAD.2023.3241113
  url: https://dblp.org/rec/journals/tcad/ZhenYWWC23
  abstract: Deep learning-based action recognition has become ubiquitous in the video
    analysis area; however, large neural networks require enormous computations to
    achieve high performance, which hinder them from mobile applications that are
    tightly constrained by hardware resources. In this work, we introduce a highly
    compact and fast neural network-based action recognition accelerator named ARA
    on the terminal device. We build an LSTM-based spatio-temporal action recognition
    model with extracted time-series features from RGB frames and flow features from
    optical flow fields. Then the LSTM-based spatio-temporal model is deeply compressed
    with tensor decomposition to further reduce redundant parameters and lessen computation
    overhead. Based on the datasets UCF-11, UCF-101, and HMDB51, our proposed method
    achieves 95.87%, 94.08%, and 75.71% classification accuracy, being comparable
    with other state-of-the-art methods. In particular, our proposed method significantly
    compresses the parameter of the LSTM model $215\times $ on the UCF-101 dataset.
    The proposed system can also achieve a fast running speed of 157.7 FPS on GPU.
    Furthermore, we validate the performance of the proposed system on an ARM-based
    terminal device; the results show it only has 0.017-s latency and 4.73-W power
    consumption.
