  abstract: Feature matching plays a fundamental role in many computer vision tasks,
    yet existing methods rely on scarce and clean multi-view image collections, which
    constrains their generalization to diverse and challenging scenarios. Moreover,
    conventional feature encoders are typically trained on single-view 2D images,
    limiting their capacity to capture 3D-aware correspondences. In this paper, we
    propose a novel two-stage framework that lifts 2D images to 3D space, named as
    Lift to Match (L2M), taking full advantage of large-scale and diverse single-view
    images. To be specific, in the first stage, we learn a 3D-aware feature encoder
    using a combination of multi-view image synthesis and 3D feature Gaussian representation,
    which injects 3D geometry knowledge into the encoder. In the second stage, a novelview
    rendering strategy, combined with large-scale synthetic data generation from single-view
    images, is employed to learn a feature decoder for robust feature matching, thus
    achieving generalization across diverse domains. Extensive experiments demonstrate
    that our method achieves superior generalization across zero-shot evaluation benchmarks,
    highlighting the effectiveness of the proposed framework for robust feature matching.
    Code is available at https://github.com/Sharpiless/L2M.
