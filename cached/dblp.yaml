- author: Shaocheng Yan, Pengcheng Shi, Zhenjun Zhao, Kaixin Wang, Kuang Cao, Ji Wu,
    Jiayuan Li 0001
  title: 'Turboreg: Turboclique for Robust and Efficient Point Cloud Registration.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/YanSZWCWL25
  doi: 10.1109/ICCV51701.2025.02447
  ee: https://doi.org/10.1109/ICCV51701.2025.02447
  url: https://dblp.org/rec/conf/iccv/YanSZWCWL25
  abstract: Robust estimation is essential in correspondence-based Point Cloud Registration
    (PCR). Existing methods using maximal clique search in compatibility graphs achieve
    high recall but suffer from exponential time complexity, limiting their use in
    time-sensitive applications. To address this challenge, we propose a fast and
    robust estimator, TurboReg, built upon a novel lightweight clique, TurboClique,
    and a highly parallelizable Pivot-Guided Search (PGS) algorithm. First, we define
    the TurboClique as a 3-clique within a highlyconstrained compatibility graph.
    The lightweight nature of the 3-clique allows for efficient parallel searching,
    and the highly-constrained compatibility graph ensures robust spatial consistency
    for stable transformation estimation. Next, PGS selects matching pairs with high
    SC2 scores as pivots, effectively guiding the search toward TurboCliques with
    higher inlier ratios. Moreover, the PGS algorithm has linear time complexity and
    is significantly more efficient than the maximal clique search with exponential
    time complexity. Extensive experiments show that TurboReg achieves state-of-the-art
    performance across multiple real-world datasets, with substantial speed improvements.
    For example, on the 3DMatch+FCGF dataset, TurboReg (1K) operates $208.22 \times$
    faster than 3DMAC while also achieving higher recall. Our code is accessible at
    TurboReg.
  related_code: ''
- author: Weihao Yu 0004, Xiaoqing Guo, Xinyu Liu 0001, Yifan Liu, Hao Zheng, Yawen
    Huang, Yixuan Yuan
  title: 'GaussianReg: Rapid 2D/3D Registration for Emergency Surgery Via Explicit
    3D Modeling with Gaussian Primitives.'
  venue: ICCV
