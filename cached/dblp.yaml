- author: Hongkai Chen, Zixin Luo, Lei Zhou 0011, Yurun Tian, Mingmin Zhen, Tian Fang,
    David McKinnon, Yanghai Tsin, Long Quan
  title: 'ASpanFormer: Detector-Free Image Matching with Adaptive Span Transformer.'
  venue: ECCV
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/ChenLZTZFMTQ22
  doi: 10.1007/978-3-031-19824-3_2
  ee: https://doi.org/10.1007/978-3-031-19824-3_2
  url: https://dblp.org/rec/conf/eccv/ChenLZTZFMTQ22
  abstract: Generating robust and reliable correspondences across images is a fundamental
    task for a diversity of applications. To capture context at both global and local
    granularity, we propose ASpanFormer, a Transformer-based detector-free matcher
    that is built on hierarchical attention structure, adopting a novel attention
    operation which is capable of adjusting attention span in a self-adaptive manner.
    To achieve this goal, first, flow maps are regressed in each cross attention phase
    to locate the center of search region. Next, a sampling grid is generated around
    the center, whose size, instead of being empirically configured as fixed, is adaptively
    computed from a pixel uncertainty estimated along with the flow map. Finally,
    attention is computed across two images within derived regions, referred to as
    attention span. By these means, we are able to not only maintain long-range dependencies,
    but also enable fine-grained attention among pixels of high relevance that compensates
    essential locality and piece-wise smoothness in matching tasks. State-of-the-art
    accuracy on a wide range of evaluation benchmarks validates the strong matching
    capability of our method.
