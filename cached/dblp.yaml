- author: Lu Sang, Zehranaz Canfes, Dongliang Cao, Florian Bernard 0001, Daniel Cremers
  title: Implicit Neural Surface Deformation with Explicit Velocity Fields.
  venue: ICLR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/iclr/SangCCBC25
  doi: ''
  ee: https://openreview.net/forum?id=sYAFiHP6qr
  url: https://dblp.org/rec/conf/iclr/SangCCBC25
  abstract: In this work, we introduce the first unsupervised method that simultaneously
    predicts time-varying neural implicit surfaces and deformations between pairs
    of point clouds. We propose to model the point movement using an explicit velocity
    field and directly deform a time-varying implicit field using the modified level-set
    equation. This equation utilizes an iso-surface evolution with Eikonal constraints
    in a compact formulation, ensuring the integrity of the signed distance field.
    By applying a smooth, volume-preserving constraint to the velocity field, our
    method successfully recovers physically plausible intermediate shapes. Our method
    is able to handle both rigid and non-rigid deformations without any intermediate
    shape supervision. Our experimental results demonstrate that our method significantly
    outperforms existing works, delivering superior results in both quality and efficiency.
  related_code: ''
- author: Hang Gao, Xizhou Zhu, Stephen Lin 0001, Jifeng Dai
  title: 'Deformable Kernels: Adapting Effective Receptive Fields for Object Deformation.'
  venue: ICLR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/iclr/GaoZLD20
  doi: ''
  ee: https://openreview.net/forum?id=SkxSv6VFvS
  url: https://dblp.org/rec/conf/iclr/GaoZLD20
  abstract: Convolutional networks are not aware of an object's geometric variations,
    which leads to inefficient utilization of model and data capacity. To overcome
    this issue, recent works on deformation modeling seek to spatially reconfigure
    the data towards a common arrangement such that semantic recognition suffers less
    from deformation. This is typically done by augmenting static operators with learned
    free-form sampling grids in the image space, dynamically tuned to the data and
    task for adapting the receptive field. Yet adapting the receptive field does not
    quite reach the actual goal -- what really matters to the network is the "effective"
    receptive field (ERF), which reflects how much each pixel contributes. It is thus
    natural to design other approaches to adapt the ERF directly during runtime. In
    this work, we instantiate one possible solution as Deformable Kernels (DKs), a
    family of novel and generic convolutional operators for handling object deformations
    by directly adapting the ERF while leaving the receptive field untouched. At the
    heart of our method is the ability to resample the original kernel space towards
    recovering the deformation of objects. This approach is justified with theoretical
    insights that the ERF is strictly determined by data sampling locations and kernel
    values. We implement DKs as generic drop-in replacements of rigid kernels and
    conduct a series of empirical studies whose results conform with our theories.
    Over several tasks and standard base models, our approach compares favorably against
    prior works that adapt during runtime. In addition, further experiments suggest
    a working mechanism orthogonal and complementary to previous works.
  related_code: ''
