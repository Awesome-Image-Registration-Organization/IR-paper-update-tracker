- author: Vivek Gopalakrishnan, Neel Dey, Polina Golland
  title: Intraoperative 2D/3D Image Registration via Differentiable X-Ray Rendering.
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/GopalakrishnanD24
  doi: 10.1109/CVPR52733.2024.01108
  ee: https://doi.org/10.1109/CVPR52733.2024.01108
  url: https://dblp.org/rec/conf/cvpr/GopalakrishnanD24
  abstract: 'Surgical decisions are informed by aligning rapid portable 2D intraoperative
    images (e.g. X-rays) to a high-fidelity 3D preoperative reference scan (e.g. CT).
    However, 2D/3D registration can often fail in practice: conventional optimization
    methods are prohibitively slow and suscepti-ble to local minima, while neural
    networks trained on small datasets fail on new patients or require impractical
    land-mark supervision. We present DiffPose, a self-supervised approach that leverages
    patient-specific simulation and differentiable physics-based rendering to achieve
    accurate 2D/3D registration without relying on manually labeled data. Preoperatively,
    a CNN is trained to regress the pose of a randomly oriented synthetic X-ray rendered
    from the pre-operative CT. The CNN then initializes rapid intraoperative test-time
    optimization that uses the differentiable X-ray ren-derer to refine the solution.
    Our work further proposes several geometrically principled methods for sampling
    camera poses from SE (3), for sparse differentiable rendering, and for driving
    registration in the tangent space sc(3) with geodesic and multiscale locality-sensitive
    losses. DiffPose achieves sub-millimeter accuracy across surgical datasets at
    intraoperative speeds, improving upon existing unsupervised methods by an order
    of magnitude and even outperforming supervised baselines. Our implementation is
    at https://github.com/eigenvivek/DiffPose.'
  related_code: https://github.com/eigenvivek/DiffPose
- author: Tianyu Huang, Liangzu Peng, René Vidal, Yun-Hui Liu 0001
  title: Scalable 3D Registration via Truncated Entry-Wise Absolute Residuals.
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/HuangPV024
  doi: 10.1109/CVPR52733.2024.02594
  ee: https://doi.org/10.1109/CVPR52733.2024.02594
  url: https://dblp.org/rec/conf/cvpr/HuangPV024
  abstract: Given an input set of 3D point pairs, the goal of outlier-robust 3D registration
    is to compute some rotation and translation that align as many point pairs as
    possible. This is an important problem in computer vision, for which many highly
    accurate approaches have been recently proposed. Despite their impressive performance,
    these approaches lack scalability, often overflowing the 16GB of memory of a standard
    laptop to handle roughly 30,000 point pairs. In this paper, we propose a 3D registration
    approach that can process more than ten million (107) point pairs with over 99%
    random outliers. Moreover, our method is efficient, entails low memory costs,
    and maintains high accuracy at the same time. We call our method TEAR 11https://github.com/tyhuang98/TEAR-release,
    as it involves minimizing an outlier-robust loss that computes Truncated Entry-wise
    Absolute Residuals. To minimize this loss, we decompose the original 6-dimensional
    problem into two subproblems of dimensions 3 and 2, respectively, solved in succession
    to global optimality via a customized branch-and-bound method. While branch-and-bound
    is often slow and unscalable, this does not apply to TEAR as we propose novel
    bounding functions that are tight and computationally efficient. Experiments on
    various datasets are conducted to validate the scalability and efficiency of our
    method.
  related_code: ''
- author: Dong Lao, Congli Wang, Alex Wong 0001, Stefano Soatto
  title: Diffeomorphic Template Registration for Atmospheric Turbulence Mitigation.
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/LaoW0S24
  doi: 10.1109/CVPR52733.2024.02372
  ee: https://doi.org/10.1109/CVPR52733.2024.02372
  url: https://dblp.org/rec/conf/cvpr/LaoW0S24
  abstract: We describe a method for recovering the irradiance underlying a collection
    of images corrupted by atmospheric turbulence. Since supervised data is often
    technically im-possible to obtain, assumptions and biases have to be im-posed
    to solve this inverse problem, and we choose to model them explicitly. Rather
    than initializing a latent irradiance (“template”) by heuristics to estimate deformation,
    we se-lect one of the images as a reference, and model the de-formation in this
    image by the aggregation of the optical flow from it to other images, exploiting
    a prior imposed by Central Limit Theorem. Then with a novel flow inversion module,
    the model registers each image TO the template but WITHOUT the template, avoiding
    artifacts related to poor template initialization. To illustrate the robustness
    of the method, we simply (i) select the first frame as the ref-erence and (ii)
    use the simplest optical flow to estimate the warpings, yet the improvement in
    registration is decisive in the final reconstruction, as we achieve state-of-the-art
    per-formance despite its simplicity. The method establishes a strong baseline
    that can be further improved by integrating it seamlessly into more sophisticated
    pipelines, or with domain-specific methods if so desired.
  related_code: ''
- author: Quan Liu 0006, Hongzi Zhu, Zhenxi Wang, Yunsong Zhou, Shan Chang, Minyi
    Guo
  title: 'Extend Your Own Correspondences: Unsupervised Distant Point Cloud Registration
    by Progressive Distance Extension.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/LiuZWZCG24
  doi: 10.1109/CVPR52733.2024.01967
  ee: https://doi.org/10.1109/CVPR52733.2024.01967
  url: https://dblp.org/rec/conf/cvpr/LiuZWZCG24
  abstract: Registration of point clouds collected from a pair of distant vehicles
    provides a comprehensive and accurate 3D view of the driving scenario, which is
    vital for driving safety related applications, yet existing literature suffers
    from the expensive pose label acquisition and the deficiency to gen-eralize to
    new data distributions. In this paper, we propose EYOC, an unsupervised distant
    point cloud registration method that adapts to new point cloud distributions on
    the fly, requiring no global pose labels. The core idea of EYOC is to train a
    feature extractor in a progressive fashion, where in each round, the feature extractor,
    trained with near point cloud pairs, can label slightly farther point cloud pairs,
    enabling self-supervision on such far point cloud pairs. This process continues
    until the derived ex-tractor can be used to register distant point clouds. Par-ticularly,
    to enable high-fidelity correspondence label gen-eration, we devise an effective
    spatial filtering scheme to select the most representative correspondences to
    register a point cloud pair, and then utilize the aligned point clouds to discover
    more correct correspondences. Experiments show that EYOC can achieve comparable
    performance with state-of-the-art supervised methods at a lower training cost.
    Moreover, it outwits supervised methods regarding generalization performance on
    new data distributions.
