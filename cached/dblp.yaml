- author: Arman Afrasiyabi, Hugo Larochelle, Jean-François Lalonde, Christian Gagné
    0001
  title: Matching Feature Sets for Few-Shot Image Classification.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/AfrasiyabiLL022
  doi: 10.1109/CVPR52688.2022.00881
  ee: https://doi.org/10.1109/CVPR52688.2022.00881
  url: https://dblp.org/rec/conf/cvpr/AfrasiyabiLL022
  abstract: In image classification, it is common practice to train deep networks
    to extract a single feature vector per input image. Few-shot classification methods
    also mostly follow this trend. In this work, we depart from this established direction
    and instead propose to extract sets of feature vectors for each image. We argue
    that a set-based representation intrinsically builds a richer representation of
    images from the base classes, which can subsequently better transfer to the few-shot
    classes. To do so, we propose to adapt existing feature extractors to instead
    produce sets of feature vectors from images. Our approach, dubbed SetFeat, embeds
    shallow self-attention mechanisms inside existing encoder architectures. The attention
    modules are lightweight, and as such our method results in encoders that have
    approximately the same number of parameters as their original versions. During
    training and inference, a set-to-set matching metric is used to perform image
    classification. The effectiveness of our proposed architecture and metrics is
    demonstrated via thorough experiments on standard few-shot datasets-namely miniImageNet,
    tieredImageNet, and CUB-in both the 1- and 5-shot scenarios. In all cases but
    one, our method outperforms the state-of-the-art.
  related_code: ''
- author: Qianqian Wang 0002, Xiaowei Zhou 0001, Kostas Daniilidis
  title: Multi-Image Semantic Matching by Mining Consistent Features.
  venue: CVPR
  year: '2018'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/WangZD18
  doi: 10.1109/CVPR.2018.00078
  ee: http://openaccess.thecvf.com/content_cvpr_2018/html/Wang_Multi-Image_Semantic_Matching_CVPR_2018_paper.html
  url: https://dblp.org/rec/conf/cvpr/WangZD18
  abstract: This work proposes a multi-image matching method to estimate semantic
    correspondences across multiple images. In contrast to the previous methods that
    optimize all pairwise correspondences, the proposed method identifies and matches
    only a sparse set of reliable features in the image collection. In this way, the
    proposed method is able to prune nonrepeatable features and also highly scalable
    to handle thousands of images. We additionally propose a low-rank constraint to
    ensure the geometric consistency of feature correspondences over the whole image
    collection. Besides the competitive performance on multi-graph matching and semantic
    flow benchmarks, we also demonstrate the applicability of the proposed method
    for reconstructing object-class models and discovering object-class landmarks
    from images without using any annotation.
