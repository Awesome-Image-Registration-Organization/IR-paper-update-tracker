- author: Jian Cheng 0001, Cong Leng, Jiaxiang Wu 0001, Hainan Cui, Hanqing Lu
  title: Fast and Accurate Image Matching with Cascade Hashing for 3D Reconstruction.
  venue: CVPR
  year: '2014'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/ChengLWCL14
  doi: 10.1109/CVPR.2014.8
  ee: https://doi.org/10.1109/CVPR.2014.8
  url: https://dblp.org/rec/conf/cvpr/ChengLWCL14
  abstract: 'Image matching is one of the most challenging stages in 3D reconstruction,
    which usually occupies half of computational cost and inaccurate matching may
    lead to failure of reconstruction. Therefore, fast and accurate image matching
    is very crucial for 3D reconstruction. In this paper, we proposed a Cascade Hashing
    strategy to speed up the image matching. In order to accelerate the image matching,
    the proposed Cascade Hashing method is designed to be three-layer structure: hashing
    lookup, hashing remapping, and hashing ranking. Each layer adopts different measures
    and filtering strategies, which is demonstrated to be less sensitive to noise.
    Extensive experiments show that image matching can be accelerated by our approach
    in hundreds times than brute force matching, even achieves ten times or more than
    Kd-tree based matching while retaining comparable accuracy.'
