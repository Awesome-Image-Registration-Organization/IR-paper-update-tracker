- author: Pei An, Jiaqi Yang 0002, Muyao Peng, You Yang 0002, Qiong Liu 0001, Jie
    Ma 0003, Liangliang Nan
  title: 'Top-I2P: Explore Open-Domain Image-to-Point Cloud Registration Using Topology
    Relationship.'
  venue: IJCAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/AnYPY00N25
  doi: 10.24963/IJCAI.2025/76
  ee: https://doi.org/10.24963/ijcai.2025/76
  url: https://dblp.org/rec/conf/ijcai/AnYPY00N25
  abstract: Image-to-point cloud (I2P) registration is a fundamental task in computer
    vision, which aims to align pixels in 2D images with corresponding points in 3D
    point clouds. While deep learning based methods dominate this field, they often
    fail to generalize to the open domain. In this paper, we address open-domain I2P
    registration from the topology relationships perspective. Firstly, we find that
    topology relationships reflect sparse connections between pixels and points, which
    shows the significant potential in enhancing cross-modality feature interaction
    in the open domain. Building on this insight, we develop an I2P registration framework
    using topology relationships. After that, to construct and leverage the topology
    relationships between the heterogeneous 2D and 3D spaces, we design a registration
    network, Top-I2P, with correction-based topology reasoning and fast topology feature
    interaction modules. Extensive experiments on 7-Scenes, RGBD-V2, ScanNet, and
    self-collected I2P datasets demonstrate that Top-I2P achieves superior registration
    performance in open-domain scenarios.
- author: Weikang Gu, Mingyue Han, Li Xue, Heng Dong, Changcai Yang, Riqing Chen,
    Lifang Wei
  title: 'GPI-Net: Gestalt-Guided Parallel Interaction Network via Orthogonal Geometric
    Consistency for Robust Point Cloud Registration.'
  venue: IJCAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/GuHXDYCW25
  doi: 10.24963/IJCAI.2025/118
  ee: https://doi.org/10.24963/ijcai.2025/118
  url: https://dblp.org/rec/conf/ijcai/GuHXDYCW25
  abstract: The accurate identification of high-quality correspondences is a prerequisite
    task in feature-based point cloud registration. However, it is extremely challenging
    to handle the fusion of local and global features due to feature redundancy and
    complex spatial relationships. Given that Gestalt principles provide key advantages
    in analyzing local and global relationships, we propose a novel Gestalt-guided
    Parallel Interaction Network via orthogonal geometric consistency (GPI-Net) in
    this paper. It utilizes Gestalt principles to facilitate complementary communication
    between local and global information. Specifically, we introduce an orthogonal
    integration strategy to optimally reduce redundant information and generate a
    more compact global structure for high-quality correspondences. To capture geometric
    features in correspondences, we leverage a Gestalt Feature Attention (GFA) block
    through a hybrid utilization of self-attention and cross-attention mechanisms.
    Furthermore, to facilitate the integration of local detail information into the
    global structure, we design an innovative Dual-path Multi-Granularity parallel
    interaction aggregation (DMG) block to promote information exchange across different
    granularities. Extensive experiments on various challenging tasks demonstrate
    the superior performance of our proposed GPI-Net in comparison to existing methods.
    The code will be released at https://github.com/XXX/GPI-Net.
