  abstract: 'Diffusion tensor based cardiovascular magnetic resonance (DT-CMR) offers
    a non-invasive method to visualize the myocardial microstructure. With the assumption
    that the heart is stationary, frames are acquired with multiple repetitions for
    different diffusion encoding directions. However, motion from poor breath-holding
    and imprecise cardiac triggering complicates DT-CMR analysis, further challenged
    by its inherently low SNR, varied contrasts, and diffusion induced textures. Our
    solution is a novel framework employing groupwise registration with an implicit
    template to isolate respiratory and cardiac motions, while a tensor-embedded branch
    preserves diffusion contrast textures. We have devised a loss refinement tailored
    for non-linear least squares fitting and low SNR conditions. Additionally, we
    introduce new physics-based and clinical metrics for performance evaluation. Access
    code and supplementary materials at: https://github.com/ayanglab/DTCMR-Reg'
  related_code: https://github.com/ayanglab/DTCMR-Reg
- author: Bomin Wang, Xinzhe Luo, Xiahai Zhuang
  title: Toward Universal Medical Image Registration via Sharpness-Aware Meta-Continual
    Learning.
  venue: MICCAI
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/WangLZ24
  doi: 10.1007/978-3-031-72069-7_69
  ee: https://doi.org/10.1007/978-3-031-72069-7_69
  url: https://dblp.org/rec/conf/miccai/WangLZ24
  abstract: Current deep learning approaches in medical image registration usually
    face the challenges of distribution shift and data collection, hindering real-world
    deployment. In contrast, universal medical image registration aims to perform
    registration on a wide range of clinically relevant tasks simultaneously, thus
    having tremendous potential for clinical applications. In this paper, we present
    the first attempt to achieve the goal of universal 3D medical image registration
    in sequential learning scenarios by proposing a continual learning method. Specifically,
    we utilize meta-learning with experience replay to mitigating the problem of catastrophic
    forgetting. To promote the generalizability of meta-continual learning, we further
    propose sharpness-aware meta-continual learning (SAMCL). We validate the effectiveness
    of our method on four datasets in a continual learning setup, including brain
    MR, abdomen CT, lung CT, and abdomen MR-CT image pairs. Results have shown the
    potential of SAMCL in realizing universal image registration, which performs better
    than or on par with vanilla sequential or centralized multi-task training strategies.The
    source code will be available from https://github.com/xzluo97/Continual-Reg.
  related_code: https://github.com/xzluo97/Continual-Reg
- author: Nian Wu, Jiarui Xing, Miaomiao Zhang 0002
  title: 'TLRN: Temporal Latent Residual Networks for Large Deformation Image Registration.'
  venue: MICCAI
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/WuXZ24
  doi: 10.1007/978-3-031-72069-7_68
  ee: https://doi.org/10.1007/978-3-031-72069-7_68
  url: https://dblp.org/rec/conf/miccai/WuXZ24
  abstract: This paper presents a novel approach, termed {\em Temporal Latent Residual
    Network (TLRN)}, to predict a sequence of deformation fields in time-series image
    registration. The challenge of registering time-series images often lies in the
    occurrence of large motions, especially when images differ significantly from
    a reference (e.g., the start of a cardiac cycle compared to the peak stretching
    phase). To achieve accurate and robust registration results, we leverage the nature
    of motion continuity and exploit the temporal smoothness in consecutive image
    frames. Our proposed TLRN highlights a temporal residual network with residual
    blocks carefully designed in latent deformation spaces, which are parameterized
    by time-sequential initial velocity fields. We treat a sequence of residual blocks
    over time as a dynamic training system, where each block is designed to learn
    the residual function between desired deformation features and current input accumulated
    from previous time frames. We validate the effectivenss of TLRN on both synthetic
    data and real-world cine cardiac magnetic resonance (CMR) image videos. Our experimental
    results shows that TLRN is able to achieve substantially improved registration
    accuracy compared to the state-of-the-art. Our code is publicly available at https://github.com/nellie689/TLRN.
  related_code: https://github.com/nellie689/TLRN
