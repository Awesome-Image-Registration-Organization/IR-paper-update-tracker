- author: Dongming Wei, Sahar Ahmad, Jiayu Huo, Wen Peng, Yunhao Ge, Zhong Xue, Pew-Thian
    Yap, Wentao Li, Dinggang Shen, Qian Wang 0001
  title: Synthesis and Inpainting-Based MR-CT Registration for Image-Guided Thermal
    Ablation of Liver Tumors.
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/WeiAHPGXYLSW19
  doi: 10.1007/978-3-030-32254-0_57
  ee: https://doi.org/10.1007/978-3-030-32254-0_57
  url: https://dblp.org/rec/conf/miccai/WeiAHPGXYLSW19
  abstract: Thermal ablation is a minimally invasive procedure for treat-ing small
    or unresectable tumors. Although CT is widely used for guiding ablation procedures,
    the contrast of tumors against surrounding normal tissues in CT images is often
    poor, aggravating the difficulty in accurate thermal ablation. In this paper,
    we propose a fast MR-CT image registration method to overlay a pre-procedural
    MR (pMR) image onto an intra-procedural CT (iCT) image for guiding the thermal
    ablation of liver tumors. By first using a Cycle-GAN model with mutual information
    constraint to generate synthesized CT (sCT) image from the cor-responding pMR,
    pre-procedural MR-CT image registration is carried out through traditional mono-modality
    CT-CT image registration. At the intra-procedural stage, a partial-convolution-based
    network is first used to inpaint the probe and its artifacts in the iCT image.
    Then, an unsupervised registration network is used to efficiently align the pre-procedural
    CT (pCT) with the inpainted iCT (inpCT) image. The final transformation from pMR
    to iCT is obtained by combining the two estimated transformations,i.e., (1) from
    the pMR image space to the pCT image space (through sCT) and (2) from the pCT
    image space to the iCT image space (through inpCT). Experimental results confirm
    that the proposed method achieves high registration accuracy with a very fast
    computational speed.
- author: Zhenlin Xu, Marc Niethammer
  title: 'DeepAtlas: Joint Semi-supervised Learning of Image Registration and Segmentation.'
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/XuN19
  doi: 10.1007/978-3-030-32245-8_47
  ee: https://doi.org/10.1007/978-3-030-32245-8_47
  url: https://dblp.org/rec/conf/miccai/XuN19
  abstract: Deep convolutional neural networks (CNNs) are state-of-the-art for semantic
    image segmentation, but typically require many labeled training samples. Obtaining
    3D segmentations of medical images for supervised training is difficult and labor
    intensive. Motivated by classical approaches for joint segmentation and registration
    we therefore propose a deep learning framework that jointly learns networks for
    image registration and image segmentation. In contrast to previous work on deep
    unsupervised image registration, which showed the benefit of weak supervision
    via image segmentations, our approach can use existing segmentations when available
    and computes them via the segmentation network otherwise, thereby providing the
    same registration benefit. Conversely, segmentation network training benefits
    from the registration, which essentially provides a realistic form of data augmentation.
    Experiments on knee and brain 3D magnetic resonance (MR) images show that our
    approach achieves large simultaneous improvements of segmentation and registration
    accuracy (over independently trained networks) and allows training high-quality
    models with very limited training data. Specifically, in a one-shot-scenario (with
    only one manually labeled image) our approach increases Dice scores (%) over an
    unsupervised registration network by 2.7 and 1.8 on the knee and brain images
    respectively.
