  url: https://dblp.org/rec/journals/mia/LecomteVDC25
  abstract: We present a method for estimating, in real time, a 3D displacement field
    from a single fluoroscopic image. Our approach uses a fully convolutional network
    architecture to solve the associated inverse problem. Supervised learning is performed
    on synthetic data, using Digitally Reconstructed Radiographs as input and displacement
    fields as output. We use randomized Gaussian kernels to produce a synthetic training
    dataset with displacement fields that are smooth and diffeomorphic. In contrast
    to other 2D-3D registration methods, our novel data generation approach does not
    rely on a statistical motion model. This enables our model to accurately predict
    deformations unrelated to breathing or other predetermined motion patterns. As
    an example of clinical application, we show that our model is able to predict
    deformations related to percutaneous needle insertions accurately, potentially
    removing the need for contrast agent injection.
  related_code: ''
- author: Hengjie Liu, Elizabeth McKenzie, Di Xu 0003, Qifan Xu, Robert K. Chin, Dan
    Ruan, Ke Sheng
  title: MUsculo-Skeleton-Aware (MUSA) deep learning for anatomically guided head-and-neck
    CT deformable registration.
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/LiuMXXCRS25
  doi: 10.1016/J.MEDIA.2024.103351
  ee: https://doi.org/10.1016/j.media.2024.103351
  url: https://dblp.org/rec/journals/mia/LiuMXXCRS25
  abstract: Deep-learning-based deformable image registration (DL-DIR) has demonstrated
    improved accuracy compared to time-consuming non-DL methods across various anatomical
    sites. However, DL-DIR is still challenging in heterogeneous tissue regions with
    large deformation. In fact, several state-of-the-art DL-DIR methods fail to capture
    the large, anatomically plausible deformation when tested on head-and-neck computed
    tomography (CT) images. These results allude to the possibility that such complex
    head-and-neck deformation may be beyond the capacity of a single network structure
    or a homogeneous smoothness regularization. To address the challenge of combined
    multi-scale musculoskeletal motion and soft tissue deformation in the head-and-neck
    region, we propose a MUsculo-Skeleton-Aware (MUSA) framework to anatomically guide
    DL-DIR by leveraging the explicit multiresolution strategy and the inhomogeneous
    deformation constraints between the bony structures and soft tissue. The proposed
    method decomposes the complex deformation into a bulk posture change and residual
    fine deformation. It can accommodate both inter- and intra- subject registration.
    Our results show that the MUSA framework can consistently improve registration
    accuracy and, more importantly, the plausibility of deformation for various network
    architectures. The code will be publicly available at https://github.com/HengjieLiu/DIR-MUSA.
  related_code: https://github.com/HengjieLiu/DIR-MUSA
- author: Yuxuan Liu 0013, Jiasheng Zhou, Yating Luo, Sung-Liang Chen, Yao Guo 0002,
    Guang-Zhong Yang
  title: 'FPM-R2Net: Fused Photoacoustic and operating Microscopic imaging with cross-modality
    Representation and Registration Network.'
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/LiuZLCGY25
  doi: 10.1016/J.MEDIA.2025.103698
