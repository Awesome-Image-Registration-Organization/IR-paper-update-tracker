- author: Tauseef ur Rehman, Eldad Haber, Gallagher Pryor, John Melonakos, Allen R.
    Tannenbaum
  title: 3D nonrigid registration via optimal mass transport on the GPU.
  venue: Medical Image Anal.
  year: '2009'
  type: Journal Articles
  access: closed
  key: journals/mia/RehmanHPMT09
  doi: 10.1016/J.MEDIA.2008.10.008
  ee: https://doi.org/10.1016/j.media.2008.10.008
  url: https://dblp.org/rec/journals/mia/RehmanHPMT09
  abstract: In this paper, we present a new computationally efficient numerical scheme
    for the minimizing flow approach for optimal mass transport (OMT) with applications
    to non-rigid 3D image registration. The approach utilizes all of the gray-scale
    data in both images, and the optimal mapping from image A to image B is the inverse
    of the optimal mapping from B to A. Further, no landmarks need to be specified,
    and the minimizer of the distance functional involved is unique. Our implementation
    also employs multigrid, and parallel methodologies on a consumer graphics processing
    unit (GPU) for fast computation. Although computing the optimal map has been shown
    to be computationally expensive in the past, we show that our approach is orders
    of magnitude faster then previous work and is capable of finding transport maps
    with optimality measures (mean curl) previously unattainable by other works (which
    directly influences the accuracy of registration). We give results where the algorithm
    was used to compute non-rigid registrations of 3D synthetic data as well as intra-patient
    pre-operative and post-operative 3D brain MRI datasets.
