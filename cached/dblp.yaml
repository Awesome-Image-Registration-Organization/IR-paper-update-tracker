- author: Quentin Bammey, Rafael Grompone von Gioi, Jean-Michel Morel
  title: An Adaptive Neural Network for Unsupervised Mosaic Consistency Analysis in
    Image Forensics.
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/BammeyGM20
  doi: 10.1109/CVPR42600.2020.01420
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Bammey_An_Adaptive_Neural_Network_for_Unsupervised_Mosaic_Consistency_Analysis_in_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/BammeyGM20
  abstract: Automatically finding suspicious regions in a potentially forged image
    by splicing, inpainting or copy-move remains a widely open problem. Blind detection
    neural networks trained on benchmark data are flourishing. Yet, these methods
    do not provide an explanation of their detections. The more traditional methods
    try to provide such evidence by pointing out local inconsistencies in the image
    noise, JPEG compression, chromatic aberration, or in the mosaic. In this paper
    we develop a blind method that can train directly on unlabelled and potentially
    forged images to point out local mosaic inconsistencies. To this aim we designed
    a CNN structure inspired from demosaicing algorithms and directed at classifying
    image blocks by their position in the image modulo (2 × 2). Creating a diversified
    benchmark database using varied demosaicing methods, we explore the efficiency
    of the method and its ability to adapt quickly to any new data.
