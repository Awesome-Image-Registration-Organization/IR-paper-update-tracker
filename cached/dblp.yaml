  url: https://dblp.org/rec/conf/aaai/MiaoPFTMML18
  abstract: 2D/3D image registration to align a 3D volume and 2D X-ray images is a
    challenging problem due to its ill-posed nature and various artifacts presented
    in 2D X-ray images. In this paper, we propose a multi-agent system with an auto
    attention mechanism for robust and efficient 2D/3D image registration. Specifically,
    an individual agent is trained with dilated Fully Convolutional Network (FCN)
    to perform registration in a Markov Decision Process (MDP) by observing a local
    region, and the final action is then taken based on the proposals from multiple
    agents and weighted by their corresponding confidence levels. The contributions
    of this paper are threefold. First, we formulate 2D/3D registration as a MDP with
    observations, actions, and rewards properly defined with respect to X-ray imaging
    systems. Second, to handle various artifacts in 2D X-ray images, multiple local
    agents are employed efficiently via FCN-based structures, and an auto attention
    mechanism is proposed to favor the proposals from regions with more reliable visual
    cues. Third, a dilated FCN-based training mechanism is proposed to significantly
    reduce the Degree of Freedom in the simulation of registration environment, and
    drastically improve training efficiency by an order of magnitude compared to standard
    CNN-based training method. We demonstrate that the proposed method achieves high
    robustness on both spine cone beam Computed Tomography data with a low signal-to-noise
    ratio and data from minimally invasive spine surgery where severe image artifacts
    and occlusions are presented due to metal screws and guide wires, outperforming
    other state-of-the-art methods (single agent-based and optimization-based) by
    a large margin.
  related_code: ''
- author: Rui Liao, Shun Miao, Pierre de Tournemire, Sasa Grbic, Ali Kamen, Tommaso
    Mansi, Dorin Comaniciu
  title: An Artificial Agent for Robust Image Registration.
  venue: AAAI
  year: '2017'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/LiaoMTGKMC17
  doi: 10.1609/AAAI.V31I1.11230
  ee: https://doi.org/10.1609/aaai.v31i1.11230
  url: https://dblp.org/rec/conf/aaai/LiaoMTGKMC17
  abstract: 3-D image registration, which involves aligning two or more images, is
    a critical step in a variety of medical applications from diagnosis to therapy.
    Image registration is commonly performed by optimizing an image matching metric
    as a cost function. However this task is challenging due to the non-convex nature
    of the matching metric over the plausible registration parameter space and insufficient
    approches for a robust optimization. As a result, current approaches are often
    customized to a specific problem and sensitive to image quality and artifacts.
    In this paper, we propose a completely different approach to image registration,
    inspired by how experts perform the task. We first cast the image registration
    problem as a "strategic learning" process, where the goal is to find the best
    sequence of motion actions (e.g. up, down, etc) that yields image alignment. Within
    this approach, an artificial agent is learned, modeled using deep convolutional
    neural networks, with 3D raw image data as the input, and the next optimal action
    as the output. To copy with the dimensionality of the problem, we propose a greedy
    supervised approach for an end-to-end training, coupled with attention-driven
    hierarchical strategy. The resulting registration approach inherently encodes
    both a data-driven matching metric and an optimal registration strategy (policy).
    We demonstrate on two 3-D/3-D medical image registration examples with drastically
    different nature of challenges, that the artificial agent outperforms several
    state-of-the-art registration methods by a large margin in terms of both accuracy
    and robustness.
  related_code: ''
- author: Jiayi Ma 0001, Ji Zhao 0001, Junjun Jiang, Huabing Zhou
  title: Non-Rigid Point Set Registration with Robust Transformation Estimation under
    Manifold Regularization.
  venue: AAAI
  year: '2017'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/Ma0JZ17
  doi: 10.1609/AAAI.V31I1.11195
  ee: https://doi.org/10.1609/aaai.v31i1.11195
  url: https://dblp.org/rec/conf/aaai/Ma0JZ17
  abstract: In this paper, we propose a robust transformation estimation method based
    on manifold regularization for non-rigid point set registration. The method iteratively
    recovers the point correspondence and estimates the spatial transformation between
    two point sets. The correspondence is established based on existing local feature
    descriptors which typically results in a number of outliers. To achieve an accurate
    estimate of the transformation from such putative point correspondence, we formulate
    the registration problem by a mixture model with a set of latent variables introduced
    to identify outliers, and a prior involving manifold regularization is imposed
    on the transformation to capture the underlying intrinsic geometry of the input
    data. The non-rigid transformation is specified in a reproducing kernel Hilbert
    space and a sparse approximation is adopted to achieve a fast implementation.
    Extensive experiments on both 2D and 3D data demonstrate that our method can yield
    superior results compared to other state-of-the-arts, especially in case of badly
    degraded data.
