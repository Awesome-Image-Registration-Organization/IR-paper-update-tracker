- author: Hao Wu, Hongdi Liu, Tao Ding 0006, Lin Hua, Dahu Zhu
  title: 'PAVM: Progressive and Adaptive Variance Minimization Algorithm for Robust
    Registration.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2026'
  type: Journal Articles
  access: closed
  key: journals/pami/WuLDHZ26
  doi: 10.1109/TPAMI.2025.3625992
  ee: https://doi.org/10.1109/TPAMI.2025.3625992
  url: https://dblp.org/rec/journals/pami/WuLDHZ26
  abstract: Robust rigid point cloud registration is effective for accurate positioning
    and measurement of complex components. The existing registration algorithms, however,
    fail to overcome the matching distortion caused by structural deviation, unknown
    abnormal allowance, and various measurement inherent defects. Although the recently
    proposed VMM and WPMAVM algorithms can inhibit the matching distortion to some
    extent, they still fail in the presence of numerous abnormal points. In this study,
    we present a progressive and adaptive variance minimization (PAVM) algorithm to
    address these issues. A progressive de-pseudo weight is established to ensure
    the involvement of all point pairs in optimization at the initial registration
    stage. Then, an approximately truncated weight function is employed to mitigate
    the influence of abnormal points on registration results. Furthermore, a novel
    adaptive coordination distance function is established by improving the symmetric
    point-to-plane distance metric and combining the first-order approximate point-to-point
    distance metric, which enhances the algorithm speed and stability. The analysis
    investigates the anti-abnormal interference ability and quadratic convergence,
    validating the feasibility of the PAVM algorithm. Experiments are undertaken to
    illustrate the notable benefits of our algorithm in convergence stability, matching
    speed, and universality. These attributes render the algorithm well-suited for
    registration tasks involving diverse complex components.
- author: Fan Yang 0088, Zhi Chen 0011, Nanjun Yuan, Lin Guo 0019, Wenbing Tao
  title: 'OIF-PCR++: Point Cloud Registration via Progressive Distillation of Conditional
    Positional Encoding.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2026'
  type: Journal Articles
  access: closed
  key: journals/pami/YangCYGT26
  doi: 10.1109/TPAMI.2026.3652316
  ee: https://doi.org/10.1109/TPAMI.2026.3652316
  url: https://dblp.org/rec/journals/pami/YangCYGT26
  abstract: 'Transformer architecture has shown significant potential in various visual
    tasks, including point cloud registration. Positional encoding, as an order-aware
    module, plays a crucial role in Transformer framework. In this paper, we propose
    OIF-PCR++, a conditional positional encoding (CPE) method for point cloud registration.
    The core CPE module utilizes length and vector encoding at different stages, conditioned
    on the relative pose states between the point clouds to be registered. As a result,
    it progressively alleviates feature ambiguity through the incorporation of geometric
    cues. Building upon CPE, we introduce an iterative positional encoding optimization
    pipeline comprising two stages: 1) We find one correspondence via a differentiable
    optimal transport layer, and use it to encode length information into point cloud
    features, enhancing spatial consistency across different reference frames. 2)
    We apply a progressive direction alignment strategy to achieve rough alignment
    between paired point clouds, and then gradually incorporate direction information
    with the aid of this alignment, further enhancing feature distinctiveness and
    reducing feature ambiguity. Through this iterative optimization process, length
    and direction information are effectively integrated to achieve consistent and
    distinctive positional encoding, enabling the learning of discriminative point
    cloud features. Additionally, we present an inlier propagation mechanism that
    harmoniously integrates consistent geometric information for positional encoding.
    The proposed method is highly efficient, introducing marginal computational overhead
    while significantly improving feature distinguishability. Extensive experiments
    demonstrate superior performance over state-of-the-art methods on indoor, outdoor,
    object-level, and multi-way benchmarks, as well as strong generalization to complex
    real-world scenarios.'
- author: Jinyang Wang, Xuequan Lu, Mohammed Bennamoun, Bin Sheng 0001
  title: Non-Rigid Point Cloud Registration via Anisotropic Hybrid Field Harmonization.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/pami/WangLBS25
  doi: 10.1109/TPAMI.2025.3572584
  ee: https://doi.org/10.1109/TPAMI.2025.3572584
  url: https://dblp.org/rec/journals/pami/WangLBS25
  abstract: Current point cloud registration algorithms struggle to effectively handle
    both deformations and occlusions simultaneously. Our manifold analysis reveals
    this limitation arises from the inaccurate modeling of the shape's underlying
    manifold and the lack of an effective optimization strategy for fragmented manifold
    structures. In this paper, we present AniSym-Net, a novel non-rigid registration
    framework designed to address near-isometric deformation registration in the presence
    of occlusions. To encode object's coarse topological properties and local geometric
    information, AniSym-Net introduces a novel anisotropic hybrid shape-motion deformation
    field. The effectiveness of the anisotropic hybrid shape-motion fields relies
    on both the holonomic constraints from the symplectic structure modeling in AniSym-Net
    and the motion-conditional cross-attention during fusion, which calibrates geometric
    features using velocity-boundary constrained point motion patterns. The harmonization
    of correspondences derived from anisotropic hybrid fields and those from motion-shape
    fields significantly mitigates registration errors and occlusions. This is achieved
    through the optimization of loop closures of cotangent bundles within the symplectic
    manifold framework. We conduct comprehensive evaluation across five popular benchmarks,
    namely CAPE, DT4D, SAPIEN, FAUST, and DeepDeform, to demonstrate our AniSym-Net's
    superior performance compared to the state-of-the-art methods. Code will be publicly
    available.
- author: Yuxin Yao 0001, Bailin Deng, Junhui Hou, Juyong Zhang
  title: 'SPARE: Symmetrized Point-to-Plane Distance for Robust Non-Rigid 3D Registration.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/pami/YaoDHZ25
  doi: 10.1109/TPAMI.2025.3598630
  ee: https://doi.org/10.1109/TPAMI.2025.3598630
  url: https://dblp.org/rec/journals/pami/YaoDHZ25
  abstract: Existing optimization-based methods for non-rigid registration typically
    minimize an alignment error metric based on the point-to-point or point-to-plane
    distance between corresponding point pairs on the source surface and target surface.
    However, these metrics can result in slow convergence or a loss of detail. In
    this paper, we propose SPARE, a novel formulation that utilizes a symmetrized
    point-to-plane distance for robust non-rigid registration. The symmetrized point-to-plane
    distance relies on both the positions and normals of the corresponding points,
    resulting in a more accurate approximation of the underlying geometry and can
    achieve higher accuracy than existing methods. To solve this optimization problem
    efficiently, we introduce an as-rigid-as-possible regulation term to estimate
    the deformed normals and propose an alternating minimization solver using a majorization-minimization
    strategy. Moreover, for effective initialization of the solver, we incorporate
    a deformation graph-based coarse alignment that improves registration quality
    and efficiency. Extensive experiments show that the proposed method greatly improves
    the accuracy of non-rigid registration problems and maintains relatively high
    solution efficiency.
- author: Zheng Dang, Lizhou Wang, Yu Guo 0006, Mathieu Salzmann
  title: 'Match Normalization: Learning-Based Point Cloud Registration for 6D Object
    Pose Estimation in the Real World.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/pami/DangWGS24
  doi: 10.1109/TPAMI.2024.3355198
  ee: https://doi.org/10.1109/TPAMI.2024.3355198
  url: https://dblp.org/rec/journals/pami/DangWGS24
  abstract: 'In this work, we tackle the task of estimating the 6D pose of an object
    from point cloud data. While recent learning-based approaches have shown remarkable
    success on synthetic datasets, we have observed them to fail in the presence of
    real-world data. We investigate the root causes of these failures and identify
    two main challenges: The sensitivity of the widely-used SVD-based loss function
    to the range of rotation between the two point clouds, and the difference in feature
    distributions between the source and target point clouds. We address the first
    challenge by introducing a directly supervised loss function that does not utilize
    the SVD operation. To tackle the second, we introduce a new normalization strategy,
    Match Normalization. Our two contributions are general and can be applied to many
    existing learning-based 3D object registration frameworks, which we illustrate
    by implementing them in two of them, DCP and IDAM. Our experiments on the real-scene
    TUD-L Hodan et al. 2018, LINEMOD Hinterstoisser et al. 2012 and Occluded-LINEMOD
    Brachmann et al. 2014 datasets evidence the benefits of our strategies. They allow
    for the first-time learning-based 3D object registration methods to achieve meaningful
    results on real-world data. We therefore expect them to be key to the future developments
    of point cloud registration methods.'
- author: Tianyu Huang, Haoang Li, Liangzu Peng, Yinlong Liu, Yun-Hui Liu 0001
  title: Efficient and Robust Point Cloud Registration via Heuristics-Guided Parameter
    Search.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/pami/HuangLPLL24
  doi: 10.1109/TPAMI.2024.3387553
  ee: https://doi.org/10.1109/TPAMI.2024.3387553
  url: https://dblp.org/rec/journals/pami/HuangLPLL24
  abstract: Estimating the rigid transformation with 6 degrees of freedom based on
    a putative 3D correspondence set is a crucial procedure in point cloud registration.
    Existing correspondence identification methods usually lead to large outlier ratios
    (>95% is common), underscoring the significance of robust registration methods.
    Many researchers turn to parameter search-based strategies (e.g., Branch-and-Bround)
    for robust registration. Although related methods show high robustness, their
    efficiency is limited to the high-dimensional search space. This paper proposes
    a heuristics-guided parameter search strategy to accelerate the search while maintaining
    high robustness. We first sample some correspondences (i.e., heuristics) and then
    just need to sequentially search the feasible regions that make each sample an
    inlier. Our strategy largely reduces the search space and can guarantee accuracy
    with only a few inlier samples, therefore enjoying an excellent trade-off between
    efficiency and robustness. Since directly parameterizing the 6-dimensional nonlinear
    feasible region for efficient search is intractable, we construct a three-stage
    decomposition pipeline to reparameterize the feasible region, resulting in three
    lower-dimensional sub-problems that are easily solvable via our strategy. Besides
    reducing the searching dimension, our decomposition enables the leverage of 1-dimensional
    interval stabbing at all three stages for searching acceleration. Moreover, we
    propose a valid sampling strategy to guarantee our sampling effectiveness, and
    a compatibility verification setup to further accelerate our search. Extensive
    experiments on both simulated and real-world datasets demonstrate that our approach
    exhibits comparable robustness with state-of-the-art methods while achieving a
    significant efficiency boost.
- author: Xinyi Li, Zijian Ma, Yinlong Liu, Walter Zimmer, Hu Cao, Feihu Zhang, Alois
    Knoll
  title: Transformation Decoupling Strategy Based on Screw Theory for Deterministic
    Point Cloud Registration With Gravity Prior.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/pami/LiMLZCZK24
  doi: 10.1109/TPAMI.2024.3442234
  ee: https://doi.org/10.1109/TPAMI.2024.3442234
  url: https://dblp.org/rec/journals/pami/LiMLZCZK24
  abstract: Point cloud registration is challenging in the presence of heavy outlier
    correspondences. This paper focuses on addressing the robust correspondence-based
    registration problem with gravity prior that often arises in practice. The gravity
    directions are typically obtained by inertial measurement units (IMUs) and can
    reduce the degree of freedom (DOF) of rotation from 3 to 1. We propose a novel
    transformation decoupling strategy by leveraging the screw theory. This strategy
    decomposes the original 4-DOF problem into three sub-problems with 1-DOF, 2-DOF,
    and 1-DOF, respectively, enhancing computation efficiency. Specifically, the first
    1-DOF represents the translation along the rotation axis, and we propose an interval
    stabbing-based method to solve it. The second 2-DOF represents the pole which
    is an auxiliary variable in screw theory, and we utilize a branch-and-bound method
    to solve it. The last 1-DOF represents the rotation angle, and we propose a global
    voting method for its estimation. The proposed method solves three consensus maximization
    sub-problems sequentially, leading to efficient and deterministic registration.
    In particular, it can even handle the correspondence-free registration problem
    due to its significant robustness. Extensive experiments on both synthetic and
    real-world datasets demonstrate that our method is more efficient and robust than
    state-of-the-art methods, even when dealing with outlier rates exceeding 99%.
- author: Jiaqi Yang 0002, Xiyu Zhang 0001, Peng Wang 0015, Yulan Guo, Kun Sun 0002,
    Qiao Wu, Shikun Zhang, Yanning Zhang 0001
  title: 'MAC: Maximal Cliques for 3D Registration.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2024'
  type: Journal Articles
  access: open
  key: journals/pami/YangZWGSWZZ24
  doi: 10.1109/TPAMI.2024.3442911
  ee: https://doi.org/10.1109/TPAMI.2024.3442911
  url: https://dblp.org/rec/journals/pami/YangZWGSWZZ24
  abstract: 'This paper presents a 3D registration method with maximal cliques (MAC)
    for 3D point cloud registration (PCR). The key insight is to loosen the previous
    maximum clique constraint and mine more local consensus information in a graph
    for accurate pose hypotheses generation: 1) A compatibility graph is constructed
    to render the affinity relationship between initial correspondences. 2) We search
    for maximal cliques in the graph, each representing a consensus set. 3) Transformation
    hypotheses are computed for the selected cliques by the SVD algorithm and the
    best hypothesis is used to perform registration. In addition, we present a variant
    of MAC if given overlap prior, called MAC-OP. Overlap prior further enhances MAC
    from many technical aspects, such as graph construction with re-weighted nodes,
    hypotheses generation from cliques with additional constraints, and hypothesis
    evaluation with overlap-aware weights. Extensive experiments demonstrate that
    both MAC and MAC-OP effectively increase registration recall, outperform various
    state-of-the-art methods, and boost the performance of deep-learned methods. For
    instance, MAC combined with GeoTransformer achieves a state-of-the-art registration
    recall of $\text{95.7}\% / \text{78.9}\%$95.7%/78.9% on 3DMatch / 3DLoMatch. We
    perform synthetic experiments on 3DMatch-LIR / 3DLoMatch-LIR, a dataset with extremely
    low inlier ratios for 3D registration in ultra-challenging cases.'
- author: Hao Yu 0010, Ji Hou, Zheng Qin 0002, Mahdi Saleh, Ivan Shugurov, Kai Wang
    0037, Benjamin Busam, Slobodan Ilic
  title: 'RIGA: Rotation-Invariant and Globally-Aware Descriptors for Point Cloud
    Registration.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/pami/YuHQSSWBI24
  doi: 10.1109/TPAMI.2023.3349199
  ee: https://doi.org/10.1109/TPAMI.2023.3349199
  url: https://dblp.org/rec/journals/pami/YuHQSSWBI24
  abstract: Successful point cloud registration relies on accurate correspondences
    established upon powerful descriptors. However, existing neural descriptors either
    leverage a rotation-variant backbone whose performance declines under large rotations,
    or encode local geometry that is less distinctive. To address this issue, we introduce
    RIGA to learn descriptors that are Rotation-Invariant by design and Globally-Aware.
    From the Point Pair Features (PPFs) of sparse local regions, rotation-invariant
    local geometry is encoded into geometric descriptors. Global awareness of 3D structures
    and geometric context is subsequently incorporated, both in a rotation-invariant
    fashion. More specifically, 3D structures of the whole frame are first represented
    by our global PPF signatures, from which structural descriptors are learned to
    help geometric descriptors sense the 3D world beyond local regions. Geometric
    context from the whole scene is then globally aggregated into descriptors. Finally,
    the description of sparse regions is interpolated to dense point descriptors,
    from which correspondences are extracted for registration. To validate our approach,
    we conduct extensive experiments on both object- and scene-level data. With large
    rotations, RIGA surpasses the state-of-the-art methods by a margin of 8${}^\circ$∘
    in terms of the Relative Rotation Error on ModelNet40 and improves the Feature
    Matching Recall by at least 5 percentage points on 3DLoMatch.
- author: Zexi Chen, Yiyi Liao, Haozhe Du, Haodong Zhang, Xuecheng Xu, Haojian Lu,
    Rong Xiong, Yue Wang 0020
  title: 'DPCN++: Differentiable Phase Correlation Network for Versatile Pose Registration.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/ChenLDZXLXW23
  doi: 10.1109/TPAMI.2023.3317501
  ee: https://doi.org/10.1109/TPAMI.2023.3317501
  url: https://dblp.org/rec/journals/pami/ChenLDZXLXW23
  abstract: Pose registration is critical in vision and robotics. This article focuses
    on the challenging task of initialization-free pose registration up to 7DoF for
    homogeneous and heterogeneous measurements. While recent learning-based methods
    show promise using differentiable solvers, they either rely on heuristically defined
    correspondences or require initialization. Phase correlation seeks solutions in
    the spectral domain and is correspondence-free and initialization-free. Following
    this, we propose a differentiable solver and combine it with simple feature extraction
    networks, namely DPCN++. It can perform registration for homo/hetero inputs and
    generalizes well on unseen objects. Specifically, the feature extraction networks
    first learn dense feature grids from a pair of homogeneous/heterogeneous measurements.
    These feature grids are then transformed into a translation and scale invariant
    spectrum representation based on Fourier transform and spherical radial aggregation,
    decoupling translation and scale from rotation. Next, the rotation, scale, and
    translation are independently and efficiently estimated in the spectrum step-by-step.
    The entire pipeline is differentiable and trained end-to-end. We evaluate DCPN++
    on a wide range of tasks taking different input modalities, including 2D bird’s-eye
    view images, 3D object and scene measurements, and medical images. Experimental
    results demonstrate that DCPN++ outperforms both classical and learning-based
    baselines, especially on partially observed and heterogeneous measurements.
- author: Zhi Chen 0011, Kun Sun 0002, Fan Yang 0088, Lin Guo 0019, Wenbing Tao
  title: 'SC${2}$2-PCR++: Rethinking the Generation and Selection for Efficient and
    Robust Point Cloud Registration.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/ChenSYGT23
  doi: 10.1109/TPAMI.2023.3272557
  ee: https://doi.org/10.1109/TPAMI.2023.3272557
  url: https://dblp.org/rec/journals/pami/ChenSYGT23
  abstract: ''
- author: Kexue Fu 0001, Jiazheng Luo, Xiaoyuan Luo, Shaolei Liu, Chenxi Zhang 0004,
    Manning Wang
  title: Robust Point Cloud Registration Framework Based on Deep Graph Matching.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/FuLLLZW23
  doi: 10.1109/TPAMI.2022.3204713
  ee: https://doi.org/10.1109/TPAMI.2022.3204713
  url: https://dblp.org/rec/journals/pami/FuLLLZW23
  abstract: 3D point cloud registration is a fundamental problem in computer vision
    and robotics. Recently, learning-based point cloud registration methods have made
    great progress. However, these methods are sensitive to outliers, which lead to
    more incorrect correspondences. In this paper, we propose a novel deep graph matching-based
    framework for point cloud registration. Specifically, we first transform point
    clouds into graphs and extract deep features for each point. Then, we develop
    a module based on deep graph matching to calculate a soft correspondence matrix.
    By using graph matching, not only the local geometry of each point but also its
    structure and topology in a larger range are considered in establishing correspondences,
    so that more correct correspondences are found. We train the network with a loss
    directly defined on the correspondences, and in the test stage the soft correspondences
    are transformed into hard one-to-one correspondences so that registration can
    be performed by a correspondence-based solver. Furthermore, we introduce a transformer-based
    method to generate edges for graph construction, which further improves the quality
    of the correspondences. Extensive experiments on object-level and scene-level
    benchmark datasets show that the proposed method achieves state-of-the-art performance.
- author: Jiahui Huang, Tolga Birdal, Zan Gojcic, Leonidas J. Guibas, Shi-Min Hu 0001
  title: Multiway Non-Rigid Point Cloud Registration via Learned Functional Map Synchronization.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/HuangBGGH23
  doi: 10.1109/TPAMI.2022.3164653
  ee: https://doi.org/10.1109/TPAMI.2022.3164653
  url: https://dblp.org/rec/journals/pami/HuangBGGH23
  abstract: We present SyNoRiM, a novel way to jointly register multiple non-rigid
    shapes by synchronizing the maps that relate learned functions defined on the
    point clouds. Even though the ability to process non-rigid shapes is critical
    in various applications ranging from computer animation to 3D digitization, the
    literature still lacks a robust and flexible framework to match and align a collection
    of real, noisy scans observed under occlusions. Given a set of such point clouds,
    our method first computes the pairwise correspondences parameterized via functional
    maps. We simultaneously learn potentially non-orthogonal basis functions to effectively
    regularize the deformations, while handling the occlusions in an elegant way.
    To maximally benefit from the multi-way information provided by the inferred pairwise
    deformation fields, we synchronize the pairwise functional maps into a cycle-consistent
    whole thanks to our novel and principled optimization formulation. We demonstrate
    via extensive experiments that our method achieves a state-of-the-art performance
    in registration accuracy, while being flexible and efficient as we handle both
    non-rigid and multi-body cases in a unified framework and avoid the costly optimization
    over point-wise permutations by the use of basis function maps.
- author: Jiayuan Li 0001, Pengcheng Shi, Qingwu Hu, Yongjun Zhang 0002
  title: 'QGORE: Quadratic-Time Guaranteed Outlier Removal for Point Cloud Registration.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/LiSHZ23
  doi: 10.1109/TPAMI.2023.3262780
  ee: https://doi.org/10.1109/TPAMI.2023.3262780
  url: https://dblp.org/rec/journals/pami/LiSHZ23
  abstract: With the development of 3D matching technology, correspondence-based point
    cloud registration gains more attention. Unfortunately, 3D keypoint techniques
    inevitably produce a large number of outliers, i.e., outlier rate is often larger
    than 95%. Guaranteed outlier removal (GORE) Bustos and Chin has shown very good
    robustness to extreme outliers. However, the high computational cost (exponential
    in the worst case) largely limits its usages in practice. In this paper, we propose
    the first $O(N^{2})$O(N2) time GORE method, called quadratic-time GORE (QGORE),
    which preserves the globally optimal solution while largely increases the efficiency.
    QGORE leverages a simple but effective voting idea via geometric consistency for
    upper bound estimation, which achieves almost the same tightness as the one in
    GORE. We also present a one-point RANSAC by exploring “rotation correspondence”
    for lower bound estimation, which largely reduces the number of iterations of
    traditional 3-point RANSAC. Further, we propose a l$_{p}$p-like adaptive estimator
    for optimization. Extensive experiments show that QGORE achieves the same robustness
    and optimality as GORE while being 1$\sim$∼2 orders faster. The source code will
    be made publicly available.
- author: Fan Lu 0001, Guang Chen 0001, Yinlong Liu, Yibing Zhan, Zhijun Li 0001,
    Dacheng Tao, Changjun Jiang 0002
  title: Sparse-to-Dense Matching Network for Large-Scale LiDAR Point Cloud Registration.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/LuCLZLTJ23
  doi: 10.1109/TPAMI.2023.3265531
  ee: https://doi.org/10.1109/TPAMI.2023.3265531
  url: https://dblp.org/rec/journals/pami/LuCLZLTJ23
  abstract: 'Point cloud registration is a fundamental problem in 3D computer vision.
    Previous learning-based methods for LiDAR point cloud registration can be categorized
    into two schemes: dense-to-dense matching methods and sparse-to-sparse matching
    methods. However, for large-scale outdoor LiDAR point clouds, solving dense point
    correspondences is time-consuming, whereas sparse keypoint matching easily suffers
    from keypoint detection error. In this paper, we propose SDMNet, a novel Sparse-to-Dense
    Matching Network for large-scale outdoor LiDAR point cloud registration. Specifically,
    SDMNet performs registration in two sequential stages: sparse matching stage and
    local-dense matching stage. In the sparse matching stage, we sample a set of sparse
    points from the source point cloud and then match them to the dense target point
    cloud using a spatial consistency enhanced soft matching network and a robust
    outlier rejection module. Furthermore, a novel neighborhood matching module is
    developed to incorporate local neighborhood consensus, significantly improving
    performance. The local-dense matching stage is followed for fine-grained performance,
    where dense correspondences are efficiently obtained by performing point matching
    in local spatial neighborhoods of high-confidence sparse correspondences. Extensive
    experiments on three large-scale outdoor LiDAR point cloud datasets demonstrate
    that the proposed SDMNet achieves state-of-the-art performance with high efficiency.'
- author: Fan Lu 0001, Guang Chen 0001, Yinlong Liu, Lijun Zhang, Sanqing Qu, Shu
    Liu, Rongqi Gu, Changjun Jiang 0002
  title: 'HRegNet: A Hierarchical Network for Efficient and Accurate Outdoor LiDAR
    Point Cloud Registration.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/LuCLZQLGJ23
  doi: 10.1109/TPAMI.2023.3284896
  ee: https://doi.org/10.1109/TPAMI.2023.3284896
  url: https://dblp.org/rec/journals/pami/LuCLZQLGJ23
  abstract: Point cloud registration is a fundamental problem in 3D computer vision.
    Outdoor LiDAR point clouds are typically large-scale and complexly distributed,
    which makes the registration challenging. In this paper, we propose an efficient
    hierarchical network named HRegNet for large-scale outdoor LiDAR point cloud registration.
    Instead of using all points in the point clouds, HRegNet performs registration
    on hierarchically extracted keypoints and descriptors. The overall framework combines
    the reliable features in deeper layer and the precise position information in
    shallower layers to achieve robust and precise registration. We present a correspondence
    network to generate correct and accurate keypoints correspondences. Moreover,
    bilateral consensus and neighborhood consensus are introduced for keypoints matching,
    and novel similarity features are designed to incorporate them into the correspondence
    network, which significantly improves the registration performance. In addition,
    we design a consistency propagation strategy to effectively incorporate spatial
    consistency into the registration pipeline. The whole network is also highly efficient
    since only a small number of keypoints are used for registration. Extensive experiments
    are conducted on three large-scale outdoor LiDAR point cloud datasets to demonstrate
    the high accuracy and efficiency of the proposed HRegNet. The source code of the
    proposed HRegNet is available at https://github.com/ispc-lab/HRegNet2.
- author: Xinzhe Luo, Xiahai Zhuang
  title: '$\mathcal {X}$-Metric: An N-Dimensional Information-Theoretic Framework
    for Groupwise Registration and Deep Combined Computing.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/LuoZ23
  doi: 10.1109/TPAMI.2022.3225418
  ee: https://doi.org/10.1109/TPAMI.2022.3225418
  url: https://dblp.org/rec/journals/pami/LuoZ23
  abstract: This article presents a generic probabilistic framework for estimating
    the statistical dependency and finding the anatomical correspondences among an
    arbitrary number of medical images. The method builds on a novel formulation of
    the $N$N-dimensional joint intensity distribution by representing the common anatomy
    as latent variables and estimating the appearance model with nonparametric estimators.
    Through connection to maximum likelihood and the expectation-maximization algorithm,
    an information-theoretic metric called $\mathcal {X}$X-metric and a co-registration
    algorithm named $\mathcal {X}$X-CoReg are induced, allowing groupwise registration
    of the $N$N observed images with computational complexity of $\mathcal {O}(N)$O(N).
    Moreover, the method naturally extends for a weakly-supervised scenario where
    anatomical labels of certain images are provided. This leads to a combined-computing
    framework implemented with deep learning, which performs registration and segmentation
    simultaneously and collaboratively in an end-to-end fashion. Extensive experiments
    were conducted to demonstrate the versatility and applicability of our model,
    including multimodal groupwise registration, motion correction for dynamic contrast
    enhanced magnetic resonance images, and deep combined computing for multimodal
    medical images. Results show the superiority of our method in various applications
    in terms of both accuracy and efficiency, highlighting the advantage of the proposed
    representation of the imaging process. Code is available from https://zmiclab.github.io/projects.html.
- author: Fabio Poiesi, Davide Boscaini
  title: Learning General and Distinctive 3D Local Deep Descriptors for Point Cloud
    Registration.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/PoiesiB23
  doi: 10.1109/TPAMI.2022.3175371
  ee: https://doi.org/10.1109/TPAMI.2022.3175371
  url: https://dblp.org/rec/journals/pami/PoiesiB23
  abstract: An effective 3D descriptor should be invariant to different geometric
    transformations, such as scale and rotation, robust to occlusions and clutter,
    and capable of generalising to different application domains. We present a simple
    yet effective method to learn general and distinctive 3D local descriptors that
    can be used to register point clouds that are captured in different domains. Point
    cloud patches are extracted, canonicalised with respect to their local reference
    frame, and encoded into scale and rotation-invariant compact descriptors by a
    deep neural network that is invariant to permutations of the input points. This
    design is what enables our descriptors to generalise across domains. We evaluate
    and compare our descriptors with alternative handcrafted and deep learning-based
    descriptors on several indoor and outdoor datasets that are reconstructed by using
    both RGBD sensors and laser scanners. Our descriptors outperform most recent descriptors
    by a large margin in terms of generalisation, and also become the state of the
    art in benchmarks where training and testing are performed in the same domain.
- author: Zheng Qin 0002, Hao Yu 0010, Changjian Wang, Yulan Guo, Yuxing Peng 0001,
    Slobodan Ilic, Dewen Hu, Kai Xu 0004
  title: 'GeoTransformer: Fast and Robust Point Cloud Registration With Geometric
    Transformer.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/QinYWGPIHX23
  doi: 10.1109/TPAMI.2023.3259038
  ee: https://doi.org/10.1109/TPAMI.2023.3259038
  url: https://dblp.org/rec/journals/pami/QinYWGPIHX23
  abstract: We study the problem of extracting accurate correspondences for point
    cloud registration. Recent keypoint-free methods have shown great potential through
    bypassing the detection of repeatable keypoints which is difficult to do especially
    in low-overlap scenarios. They seek correspondences over downsampled superpoints,
    which are then propagated to dense points. Superpoints are matched based on whether
    their neighboring patches overlap. Such sparse and loose matching requires contextual
    features capturing the geometric structure of the point clouds. We propose Geometric
    Transformer, or GeoTransformer for short, to learn geometric feature for robust
    superpoint matching. It encodes pair-wise distances and triplet-wise angles, making
    it invariant to rigid transformation and robust in low-overlap cases. The simplistic
    design attains surprisingly high matching accuracy such that no RANSAC is required
    in the estimation of alignment transformation, leading to 100 times acceleration.
    Extensive experiments on rich benchmarks encompassing indoor, outdoor, synthetic,
    multiway and non-rigid demonstrate the efficacy of GeoTransformer. Notably, our
    method improves the inlier ratio by $18{\sim }31$18∼31 percentage points and the
    registration recall by over 7 points on the challenging 3DLoMatch benchmark.
- author: Yohai Reani, Omer Bobrowski
  title: Cycle Registration in Persistent Homology With Applications in Topological
    Bootstrap.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/ReaniB23
  doi: 10.1109/TPAMI.2022.3217443
  ee: https://doi.org/10.1109/TPAMI.2022.3217443
  url: https://dblp.org/rec/journals/pami/ReaniB23
  abstract: We propose a novel approach for comparing the persistent homology representations
    of two spaces (or filtrations). Commonly used methods are based on numerical summaries
    such as persistence diagrams and persistence landscapes, along with suitable metrics
    (e.g., Wasserstein). These summaries are useful for computational purposes, but
    they are merely a marginal of the actual topological information that persistent
    homology can provide. Instead, our approach compares between two topological representations
    directly in the data space. We do so by defining a correspondence relation between
    individual persistent cycles of two different spaces, and devising a method for
    computing this correspondence. Our matching of cycles is based on both the persistence
    intervals and the spatial placement of each feature. We demonstrate our new framework
    in the context of topological inference, where we use statistical bootstrap methods
    in order to differentiate between real features and noise in point cloud data.
- author: Yujie Wang, Chenggang Yan 0001, Yutong Feng, Shaoyi Du, Qionghai Dai, Yue
    Gao 0002
  title: 'STORM: Structure-Based Overlap Matching for Partial Point Cloud Registration.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/Wang0FDD023
  doi: 10.1109/TPAMI.2022.3148308
  ee: https://doi.org/10.1109/TPAMI.2022.3148308
  url: https://dblp.org/rec/journals/pami/Wang0FDD023
  abstract: Partial point cloud registration aims to transform partial scans into
    a common coordinate system. It is an important preprocessing step to generate
    complete 3D shapes. Although previous registration methods have made great progress
    in recent decades, traditional registration methods, such as Iterative Closest
    Point (ICP) and its variants, all these methods highly depend on the sufficient
    overlaps between two point clouds, because they cannot distinguish outlier correspondences.
    Note that the overlap between point clouds could always be small, which limits
    the application of these methods. To tackle this problem, we present a StrucTure-based
    OveRlap Matching (STORM) method for partial point cloud registration. In our method,
    an overlap prediction module with differentiable sampling is designed to detect
    points in overlap utilizing structure information, and facilitates exact partial
    correspondence generation, which is based on discriminative pointwise feature
    similarity. The pointwise features which contain effective structural information
    are extracted by graph-based methods. Experimental results and comparison with
    state-of-the-art methods demonstrate that STORM can achieve better performance.
    Moreover, most registration methods perform worse when the overlap ratio decreases,
    while STORM can still achieve satisfactory performance when the overlap ratio
    is small.
- author: Haiping Wang 0004, Yuan Liu 0025, Qingyong Hu, Bing Wang 0013, Jianguo Chen,
    Zhen Dong 0005, Yulan Guo, Wenping Wang 0001, Bisheng Yang
  title: 'RoReg: Pairwise Point Cloud Registration With Oriented Descriptors and Local
    Rotations.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/WangLHWCDGWY23
  doi: 10.1109/TPAMI.2023.3244951
  ee: https://doi.org/10.1109/TPAMI.2023.3244951
  url: https://dblp.org/rec/journals/pami/WangLHWCDGWY23
  abstract: We present RoReg, a novel point cloud registration framework that fully
    exploits oriented descriptors and estimated local rotations in the whole registration
    pipeline. Previous methods mainly focus on extracting rotation-invariant descriptors
    for registration but unanimously neglect the orientations of descriptors. In this
    paper, we show that the oriented descriptors and the estimated local rotations
    are very useful in the whole registration pipeline, including feature description,
    feature detection, feature matching, and transformation estimation. Consequently,
    we design a novel oriented descriptor RoReg-Desc and apply RoReg-Desc to estimate
    the local rotations. Such estimated local rotations enable us to develop a rotation-guided
    detector, a rotation coherence matcher, and a one-shot-estimation RANSAC, all
    of which greatly improve the registration performance. Extensive experiments demonstrate
    that RoReg achieves state-of-the-art performance on the widely-used 3DMatch and
    3DLoMatch datasets, and also generalizes well to the outdoor ETH dataset. In particular,
    we also provide in-depth analysis on each component of RoReg, validating the improvements
    brought by oriented descriptors and the estimated local rotations. Source code
    and supplementary material are available at https://github.com/HpWang-whu/RoReg.
- author: Han Xu 0001, Jiteng Yuan, Jiayi Ma 0001
  title: 'MURF: Mutually Reinforcing Multi-Modal Image Registration and Fusion.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/XuYM23
  doi: 10.1109/TPAMI.2023.3283682
  ee: https://doi.org/10.1109/TPAMI.2023.3283682
  url: https://dblp.org/rec/journals/pami/XuYM23
  abstract: 'Existing image fusion methods are typically limited to aligned source
    images and have to “tolerate” parallaxes when images are unaligned. Simultaneously,
    the large variances between different modalities pose a significant challenge
    for multi-modal image registration. This study proposes a novel method called
    MURF, where for the first time, image registration and fusion are mutually reinforced
    rather than being treated as separate issues. MURF leverages three modules: shared
    information extraction module (SIEM), multi-scale coarse registration module (MCRM),
    and fine registration and fusion module (F2M). The registration is carried out
    in a coarse-to-fine manner. During coarse registration, SIEM first transforms
    multi-modal images into mono-modal shared information to eliminate the modal variances.
    Then, MCRM progressively corrects the global rigid parallaxes. Subsequently, fine
    registration to repair local non-rigid offsets and image fusion are uniformly
    implemented in F2M. The fused image provides feedback to improve registration
    accuracy, and the improved registration result further improves the fusion result.
    For image fusion, rather than solely preserving the original source information
    in existing methods, we attempt to incorporate texture enhancement into image
    fusion. We test on four types of multi-modal data (RGB-IR, RGB-NIR, PET-MRI, and
    CT-MRI). Extensive registration and fusion results validate the superiority and
    universality of MURF.'
- author: Li Yan 0003, Pengcheng Wei, Hong Xie 0002, Jicheng Dai, Hao Wu, Ming Huang
  title: A New Outlier Removal Strategy Based on Reliability of Correspondence Graph
    for Fast Point Cloud Registration.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/YanWXDWH23
  doi: 10.1109/TPAMI.2022.3226498
  ee: https://doi.org/10.1109/TPAMI.2022.3226498
  url: https://dblp.org/rec/journals/pami/YanWXDWH23
  abstract: Registration is a basic yet crucial task in point cloud processing. In
    correspondence-based point cloud registration, matching correspondences by point
    feature techniques may lead to an extremely high outlier (false correspondence)
    ratio. Current outlier removal methods still suffer from low efficiency, accuracy,
    and recall rate. We use an intuitive method to describe the 6-DOF (degree of freedom)
    curtailment process in point cloud registration and propose an outlier removal
    strategy based on the reliability of the correspondence graph. The method constructs
    the corresponding graph according to the given correspondences and designs the
    concept of the reliability degree of the graph node for optimal candidate selection
    and the reliability degree of the graph edge to obtain the global maximum consensus
    set. The presented method achieves fast and accurate outliers removal along with
    gradual aligning parameters estimation. Extensive experiments on simulations and
    challenging real-world datasets demonstrate that the proposed method can still
    perform effective point cloud registration even the correspondence outlier ratio
    is over 99%, and the efficiency is better than the state-of-the-art. Code is available
    at https://github.com/WPC-WHU/GROR.
- author: Runzhao Yao, Shaoyi Du, Wenting Cui, Aixue Ye, Feng Wen, Hongbo Zhang 0004,
    Zhiqiang Tian, Yue Gao 0002
  title: 'Hunter: Exploring High-Order Consistency for Point Cloud Registration With
    Severe Outliers.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/YaoDCYWZTG23
  doi: 10.1109/TPAMI.2023.3312592
  ee: https://doi.org/10.1109/TPAMI.2023.3312592
  url: https://dblp.org/rec/journals/pami/YaoDCYWZTG23
  abstract: After decades of investigation, point cloud registration is still a challenging
    task in practice, especially when the correspondences are contaminated by a large
    number of outliers. It may result in a rapidly decreasing probability of generating
    a hypothesis close to the true transformation, leading to the failure of point
    cloud registration. To tackle this problem, we propose a transformation estimation
    method, named Hunter, for robust point cloud registration with severe outliers.
    The core of Hunter is to design a global-to-local exploration scheme to robustly
    find the correct correspondences. The global exploration aims to exploit guided
    sampling to generate promising initial alignments. To this end, a hypergraph-based
    consistency reasoning module is introduced to learn the high-order consistency
    among correct correspondences, which is able to yield a more distinct inlier cluster
    that facilitates the generation of all-inlier hypotheses. Moreover, we propose
    a preference-based local exploration module that exploits the preference information
    of top-$k$k promising hypotheses to find a better transformation. This module
    can efficiently obtain multiple reliable transformation hypotheses by using a
    multi-initialization searching strategy. Finally, we present a distance-angle
    based hypothesis selection criterion to choose the most reliable transformation,
    which can avoid selecting symmetrically aligned false transformations. Experimental
    results on simulated, indoor, and outdoor datasets, demonstrate that Hunter can
    achieve significant superiority over the state-of-the-art methods, including both
    learning-based and traditional methods (as shown in Fig. 1). Moreover, experimental
    results also indicate that Hunter can achieve more stable performance compared
    with all other methods with severe outliers.
- author: Yuxin Yao 0001, Bailin Deng, Weiwei Xu 0003, Juyong Zhang
  title: Fast and Robust Non-Rigid Registration Using Accelerated Majorization-Minimization.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/YaoDXZ23
  doi: 10.1109/TPAMI.2023.3247603
  ee: https://doi.org/10.1109/TPAMI.2023.3247603
  url: https://dblp.org/rec/journals/pami/YaoDXZ23
  abstract: Non-rigid 3D registration, which deforms a source 3D shape in a non-rigid
    way to align with a target 3D shape, is a classical problem in computer vision.
    Such problems can be challenging because of imperfect data (noise, outliers and
    partial overlap) and high degrees of freedom. Existing methods typically adopt
    the $\ell _{p}$ℓp type robust norm to measure the alignment error and regularize
    the smoothness of deformation, and use a proximal algorithm to solve the resulting
    non-smooth optimization problem. However, the slow convergence of such algorithms
    limits their wide applications. In this paper, we propose a formulation for robust
    non-rigid registration based on a globally smooth robust norm for alignment and
    regularization, which can effectively handle outliers and partial overlaps. The
    problem is solved using the majorization-minimization algorithm, which reduces
    each iteration to a convex quadratic problem with a closed-form solution. We further
    apply Anderson acceleration to speed up the convergence of the solver, enabling
    the solver to run efficiently on devices with limited compute capability. Extensive
    experiments demonstrate the effectiveness of our method for non-rigid alignment
    between two shapes with outliers and partial overlaps, with quantitative evaluation
    showing that it outperforms state-of-the-art methods in terms of registration
    accuracy and computational speed. The source code is available at https://github.com/yaoyx689/AMM_NRR.
