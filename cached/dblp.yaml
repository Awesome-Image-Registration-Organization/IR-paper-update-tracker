- author: Zhixin Cheng, Jiacheng Deng 0002, Xinjun Li, Xiaotian Yin, Bohao Liao, Baoqun
    Yin, Wenfei Yang, Tianzhu Zhang 0001
  title: 'CA-I2P: Channel-Adaptive Registration Network with Global Optimal Selection.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ChengDLYLYYZ25
  doi: 10.1109/ICCV51701.2025.02575
  ee: https://doi.org/10.1109/ICCV51701.2025.02575
  url: https://dblp.org/rec/conf/iccv/ChengDLYLYYZ25
  abstract: Detection-free methods typically follow a coarse-to-fine pipeline, extracting
    image and point cloud features for patch-level matching and refining dense pixel-to-point
    correspondences. However, differences in feature channel attention between images
    and point clouds may lead to degraded matching results, ultimately impairing registration
    accuracy. Furthermore, similar structures in the scene could lead to redundant
    correspondences in cross-modal matching. To address these issues, we propose Channel
    Adaptive Adjustment Module (CAA) and Global Optimal Selection Module (GOS). CAA
    enhances intra-modal features and suppresses cross-modal sensitivity, while GOS
    replaces local selection with global optimization. Experiments on RGB-D Scenes
    V2 and 7-Scenes demonstrate the superiority of our method, achieving state-of-the-art
    performance in image-to-point cloud registration.
  related_code: ''
- author: Chong Cheng, Yu Hu, Sicheng Yu, Beizhen Zhao, Zijian Wang, Hao Wang
  title: 'RegGS: Unposed Sparse Views Gaussian Splatting with 3DGS Registration.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ChengHYZWW25
  doi: 10.1109/ICCV51701.2025.00759
  ee: https://doi.org/10.1109/ICCV51701.2025.00759
  url: https://dblp.org/rec/conf/iccv/ChengHYZWW25
  abstract: '3D Gaussian Splatting (3DGS) has demonstrated its potential in reconstructing
    scenes from unposed images. However, optimization-based 3DGS methods struggle
    with sparse views due to limited prior knowledge. Meanwhile, feed-forward Gaussian
    approaches are constrained by input formats, making it challenging to incorporate
    more input views. To address these challenges, we propose RegGS, a 3D Gaussian
    registration-based framework for reconstructing unposed sparse views. RegGS aligns
    local 3D Gaussians generated by a feed-forward network into a globally consistent
    3D Gaussian representation. Technically, we implement an entropy-regularized Sinkhorn
    algorithm to efficiently solve the optimal transport Mixture 2-Wasserstein $\left(M
    W_{2}\right)$ distance, which serves as an alignment metric for Gaussian mixture
    models (GMMs) in $\operatorname{Sim}(3)$ space. Furthermore, we design a joint
    3DGS registration module that integrates the $M W_{2}$ distance, photometric consistency,
    and depth geometry. This enables a coarse-to-fine registration process while accurately
    estimating camera poses and aligning the scene. Experiments on the RE10K and ACID
    datasets demonstrate that RegGS effectively registers local Gaussians with high
    fidelity, achieving precise pose estimation and high-quality novel-view synthesis.
    Project page: https://3dagentworld.github.io/reggs/.'
  related_code: ''
- author: Guangzhao He, Yuxi Xiao, Zhen Xu 0008, Xiaowei Zhou 0001, Sida Peng
  title: 'ERNet: Efficient Non-Rigid Registration Network for Point Sequences.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/HeXXZP25
  doi: 10.1109/ICCV51701.2025.02521
  ee: https://doi.org/10.1109/ICCV51701.2025.02521
  url: https://dblp.org/rec/conf/iccv/HeXXZP25
  abstract: 'Registering an object shape to a sequence of point clouds undergoing
    non-rigid deformation is a long-standing challenge. The key difficulties stem
    from two factors: (i) the presence of local minima due to the non-convexity of
    registration objectives, especially under noisy or partial inputs, which hinders
    accurate and robust deformation estimation, and (ii) error accumulation over long
    sequences, leading to tracking failures. To address these challenges, we introduce
    to adopt a scalable data-driven approach and propose ERNet, an efficient feed-forward
    model trained on large deformation datasets. It is designed to handle noisy and
    partial inputs while effectively leveraging temporal information for accurate
    and consistent sequential registration. The key to our design is predicting a
    sequence of deformation graphs through a two-stage pipeline, which first estimates
    framewise coarse graph nodes for robust initialization, before refining their
    trajectories over time in a sliding-window fashion. Extensive experiments show
    that our proposed approach (i) outperforms previous state of the art on both the
    DeformingThings4D and D-FAUST datasets, and (ii) achieves more than $4 x$ speedup
    compared to the previous best, offering significant efficiency improvement.'
  related_code: ''
- author: Xiaofan Li, Zhihao Xu, Chenming Wu, Zhao Yang, Yumeng Zhang, Jiang-Jiang
    Liu 0001, Haibao Yu, Xiaoqing Ye, Yuan Wang, Shirui Li, Xun Sun, Ji Wan, Jun Wang
  title: 'U-ViLAR: Uncertainty-Aware Visual Localization for Autonomous Driving via
    Differentiable Association and Registration.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LiXWYZLYYWLSWW25
  doi: 10.1109/ICCV51701.2025.02308
  ee: https://doi.org/10.1109/ICCV51701.2025.02308
  url: https://dblp.org/rec/conf/iccv/LiXWYZLYYWLSWW25
  abstract: 'Accurate localization using visual information is a critical yet challenging
    task, especially in urban environments where nearby buildings and construction
    sites significantly degrade GNSS (Global Navigation Satellite System) signal quality.
    This issue underscores the importance of visual localization techniques in scenarios
    where GNSS signals are unreliable. This paper proposes U-ViLAR, a novel uncertainty-aware
    visual localization framework designed to address these challenges while enabling
    adaptive localization using high-definition (HD) maps or navigation maps. Specifically,
    our method first extracts features from the input visual data and maps them into
    Bird''s-Eye-View (BEV) space to enhance spatial consistency with the map input.
    Subsequently, we introduce: a) Perceptual Uncertainty-guided Association, which
    mitigates errors caused by perception uncertainty, and b) Localization Uncertainty-guided
    Registration, which reduces errors introduced by localization uncertainty. By
    effectively balancing the coarse-grained large-scale localization capability of
    association with the fine-grained precise localization capability of registration,
    our approach achieves robust and accurate localization. Experimental results demonstrate
    that our method achieves state-of-the-art performance across multiple localization
    tasks. Furthermore, our model has undergone rigorous testing on large-scale autonomous
    driving fleets and has demonstrated stable performance in various challenging
    urban scenarios.'
  related_code: ''
- author: Juncheng Mu, Chengwei Ren, Weixiang Zhang, Liang Pan, Xiao-Ping Zhang, Yue
    Gao 0002
  title: 'Diff2I2P: Differentiable Image-to-Point Cloud Registration with Diffusion
    Prior.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/MuRZPZG25
  doi: 10.1109/ICCV51701.2025.02391
  ee: https://doi.org/10.1109/ICCV51701.2025.02391
  url: https://dblp.org/rec/conf/iccv/MuRZPZG25
  abstract: Learning cross-modal correspondences is essential for image-to-point cloud
    (I2P) registration. Existing methods achieve this mostly by utilizing metric learning
    to enforce feature alignment across modalities, disregarding the inherent modality
    gap between image and point data. Consequently, this paradigm struggles to ensure
    accurate crossmodal correspondences. To this end, inspired by the crossmodal generation
    success of recent large diffusion models, we propose Diff2 I2P, a fully Diff erentiable
    I2P registration framework, leveraging a novel and effective Diff usion prior
    for bridging the modality gap. Specifically, we propose a Control-Side Score Distillation
    (CSD) technique to distill knowledge from a depth-conditioned diffusion model
    to directly optimize the predicted transformation. However, the gradients on the
    transformation fail to backpropagate onto the cross-modal features due to the
    non-differentiability of correspondence retrieval and PnP solver. To this end,
    we further propose a Deformable Correspondence Tuning (DCT) module to estimate
    the correspondences in a differentiable way, followed by the transformation estimation
    using a differentiable PnP solver. With these two designs, the Diffusion model
    serves as a strong prior to guide the crossmodal feature learning of image and
    point cloud for forming robust correspondences, which significantly improves the
    registration. Extensive experimental results demonstrate that Diff2 I2P consistently
    outperforms SoTA I2P registration methods, achieving over 7% improvement in registration
    recall on the 7-Scenes benchmark. Code will be available at https://github.com/mujc2021/Diff2I2P.
  related_code: https://github.com/mujc2021/Diff2I2P
- author: Anik Sarker, Alan T. Asbeck
  title: Correspondence-Free Fast and Robust Spherical Point Pattern Registration.
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/SarkerA25
  doi: 10.1109/ICCV51701.2025.02614
  ee: https://doi.org/10.1109/ICCV51701.2025.02614
  url: https://dblp.org/rec/conf/iccv/SarkerA25
  abstract: 'Current methods to estimate the rotation between two spherical ($\mathbb{S}^{2}$)
    patterns typically rely on maximizing their spherical cross-correlation. However,
    these approaches exhibit computational complexities greater than cubic $O\left(n^{3}\right)$
    with respect to rotation space discretization. We propose a rotation estimation
    algorithm between two spherical patterns with linear time complexity $O(n)$. Unlike
    existing methods, we explicitly represent spherical patterns as discrete 3D point
    sets on the unit sphere, reformulating rotation estimation as a spherical point-set
    alignment (i.e., the Wahba problem for 3D unit vectors). We introduce three novel
    algorithms: (1) SPMC (Spherical Pattern Matching by Correlation), (2) FRS (Fast
    Rotation Search), and (3) a hybrid approach (SPMC+FRS) that combines the advantages
    of the previous two methods. Our experiments demonstrate that in the $\mathbb{S}^{2}$
    domain and in correspondence-free settings, our algorithms are over $10 x$ faster
    and over $10 x$ more accurate than current state-of-the-art methods for the Wahba
    problem with outliers. We validate our approach through extensive simulations
    on a new dataset of spherical patterns, the “Robust Vector Alignment Dataset.”
    Furthermore, we adapt our methods to two real-world tasks: (i) Point Cloud Registration
    (PCR) and (ii) rotation estimation for spherical images. In the PCR task, our
    approach successfully registers point clouds exhibiting overlap ratios as low
    as 65%. In spherical image alignment, we show that our method robustly estimates
    rotations even under challenging conditions involving substantial clutter (over
    19%) and large rotational offsets. Our results highlight the effectiveness and
    robustness of our algorithms in realistic, complex scenarios. Our dataset and
    code are available at: https://github.com/ARLab-VT/Robust-Vector-Set-Alignment'
  related_code: https://github.com/ARLab-VT/Robust-Vector-Set-Alignment
- author: Minkyun Seo, Hyungtae Lim, Kanghee Lee, Luca Carlone, Jaesik Park
  title: 'Buffer-X: Towards Zero-Shot Point Cloud Registration in Diverse Scenes.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/SeoLLCP25
  doi: 10.1109/ICCV51701.2025.00367
  ee: https://doi.org/10.1109/ICCV51701.2025.00367
  url: https://dblp.org/rec/conf/iccv/SeoLLCP25
  abstract: 'Recent advances in deep learning-based point cloud registration have
    improved generalization, yet most methods still require retraining or manual parameter
    tuning for each new environment. In this paper, we identify three key factors
    limiting generalization: (a) reliance on environment-specific voxel size and search
    radius, (b) poor out-of-domain robustness of learning-based keypoint detectors,
    and (c) raw coordinate usage, which exacerbates scale discrepancies. To address
    these issues, we present a zero-shot registration pipeline called BUFFER $X$ by
    (a) adaptively determining voxel size/search radii, (b) using farthest point sampling
    to bypass learned detectors, and (c) leveraging patch-wise scale normalization
    for consistent coordinate bounds. In particular, we present a multi-scale patch-based
    descriptor generation and a hierarchical inlier search across scales to improve
    robustness in diverse scenes. We also propose a novel generalizability benchmark
    using 11 datasets that cover various indoor/outdoor scenarios and sensor modalities,
    demonstrating that BUFFER-X achieves substantial generalization without prior
    information or manual parameter tuning for the test datasets. Our code is available
    at https://github.com/MIT-SPARK/BUFFER-X.'
  related_code: https://github.com/MIT-SPARK/BUFFER-X
- author: Jaeho Shin, Hyeonjae Gil, Junwoo Jang, Maani Ghaffari, Ayoung Kim
  title: 'Registration beyond Points: General Affine Subspace Alignment via Geodesic
    Distance on Grassmann Manifold.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ShinGJGK25
  doi: 10.1109/ICCV51701.2025.00359
  ee: https://doi.org/10.1109/ICCV51701.2025.00359
  url: https://dblp.org/rec/conf/iccv/ShinGJGK25
  abstract: Affine Grassmannian has been favored for expressing proximity between
    lines and planes due to its theoretical exactness in measuring distances among
    features. Despite this advantage, the existing method can only measure the proximity
    without yielding the distance as an explicit function of rigid body transformation.
    Thus, an optimizable distance function on the manifold has remained underdeveloped,
    stifling its application in registration problems. This paper is the first to
    explicitly derive an optimizable cost function between two Grassmannian features
    with respect to rigid body transformation $(\mathbf{R}$ and $\mathbf{t})$. Specifically,
    we present a rigorous mathematical proof demonstrating that the bases of high-dimensional
    linear subspaces can serve as an explicit representation of the cost. Finally,
    we propose an optimizable cost function based on the transformed bases that can
    be applied to the registration problem of any affine subspace. Compared to vector
    parameter-based approaches, our method is able to find a globally optimal solution
    by directly minimizing the geodesic distance which is agnostic to representation
    ambiguity. The resulting cost function and its extension to the inlier-set maximizing
    Branch-and-Bound (BnB) solver have been demonstrated to improve the convergence
    of existing solutions or outperform them in various computer vision tasks. The
    code is available on https://github.com/joomeok/GrassmannRegistration.
  related_code: https://github.com/joomeok/GrassmannRegistration
