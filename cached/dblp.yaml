- author: Pei An, Jiaqi Yang 0002, Muyao Peng, You Yang 0002, Qiong Liu 0001, Jie
    Ma 0003, Liangliang Nan
  title: 'Top-I2P: Explore Open-Domain Image-to-Point Cloud Registration Using Topology
    Relationship.'
  venue: IJCAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/AnYPY00N25
  doi: 10.24963/IJCAI.2025/76
  ee: https://doi.org/10.24963/ijcai.2025/76
  url: https://dblp.org/rec/conf/ijcai/AnYPY00N25
  abstract: Image-to-point cloud (I2P) registration is a fundamental task in computer
    vision, which aims to align pixels in 2D images with corresponding points in 3D
    point clouds. While deep learning based methods dominate this field, they often
    fail to generalize to the open domain. In this paper, we address open-domain I2P
    registration from the topology relationships perspective. Firstly, we find that
    topology relationships reflect sparse connections between pixels and points, which
    shows the significant potential in enhancing cross-modality feature interaction
    in the open domain. Building on this insight, we develop an I2P registration framework
    using topology relationships. After that, to construct and leverage the topology
    relationships between the heterogeneous 2D and 3D spaces, we design a registration
    network, Top-I2P, with correction-based topology reasoning and fast topology feature
    interaction modules. Extensive experiments on 7-Scenes, RGBD-V2, ScanNet, and
    self-collected I2P datasets demonstrate that Top-I2P achieves superior registration
    performance in open-domain scenarios.
  related_code: ''
- author: Weikang Gu, Mingyue Han, Li Xue, Heng Dong, Changcai Yang, Riqing Chen,
    Lifang Wei
  title: 'GPI-Net: Gestalt-Guided Parallel Interaction Network via Orthogonal Geometric
    Consistency for Robust Point Cloud Registration.'
  venue: IJCAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/GuHXDYCW25
  doi: 10.24963/IJCAI.2025/118
  ee: https://doi.org/10.24963/ijcai.2025/118
  url: https://dblp.org/rec/conf/ijcai/GuHXDYCW25
  abstract: The accurate identification of high-quality correspondences is a prerequisite
    task in feature-based point cloud registration. However, it is extremely challenging
    to handle the fusion of local and global features due to feature redundancy and
    complex spatial relationships. Given that Gestalt principles provide key advantages
    in analyzing local and global relationships, we propose a novel Gestalt-guided
    Parallel Interaction Network via orthogonal geometric consistency (GPI-Net) in
    this paper. It utilizes Gestalt principles to facilitate complementary communication
    between local and global information. Specifically, we introduce an orthogonal
    integration strategy to optimally reduce redundant information and generate a
    more compact global structure for high-quality correspondences. To capture geometric
    features in correspondences, we leverage a Gestalt Feature Attention (GFA) block
    through a hybrid utilization of self-attention and cross-attention mechanisms.
    Furthermore, to facilitate the integration of local detail information into the
    global structure, we design an innovative Dual-path Multi-Granularity parallel
    interaction aggregation (DMG) block to promote information exchange across different
    granularities. Extensive experiments on various challenging tasks demonstrate
    the superior performance of our proposed GPI-Net in comparison to existing methods.
    The code will be released at https://github.com/XXX/GPI-Net.
  related_code: https://github.com/XXX/GPI-Net
- author: Gang Ma 0003, Hui Wei 0001, Runfeng Lin, Jialiang Wu
  title: A New Guaranteed Outlier Removal Method Based on Plane Constraints for Large-Scale
    LiDAR Point Cloud Registration.
  venue: IJCAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/00030LW24
  doi: 10.1109/tgrs.2024.3496198
  ee: https://www.ijcai.org/proceedings/2024/759
  url: https://dblp.org/rec/conf/ijcai/00030LW24
  abstract: 'Point cloud registration is a crucial challenge in photogrammetry and
    computer vision, aimed at aligning adjacent point clouds optimally. In this article,
    we present a novel registration approach based on plane constraints for large-scale
    LiDAR point clouds, called PCGOR, effectively decoupling rotation estimation and
    translation estimation. The point cloud registration challenge is then bifurcated
    into two distinct parts: rotation estimation and translation estimation. For rotation
    estimation, we develop an outlier removal method combining coarse filtering with
    rotation-invariant constraints (RICs) and refined filtering based on computational
    geometric consistency checks, effectively pruning outliers and robustly estimating
    accurate relative rotations from plane normals. In translation estimation, we
    design a componentwise approach based on translation component constraints (TCCs)
    to efficiently estimate relative translations. Experimental findings validate
    the robustness and efficacy of our proposed approach on three popular LiDAR point
    cloud datasets, yielding state-of-the-art performance.'
  related_code: ''
- author: Yu-Xin Zhang 0004, Jie Gui, Xiaofeng Cong, Xin Gong 0001, Wenbing Tao
  title: A Comprehensive Survey and Taxonomy on Point Cloud Registration Based on
    Deep Learning.
  venue: IJCAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/ZhangGCGT24
  doi: 10.48550/arXiv.2404.13830
  ee: https://www.ijcai.org/proceedings/2024/922
  url: https://dblp.org/rec/conf/ijcai/ZhangGCGT24
  abstract: 'Point cloud registration (PCR) involves determining a rigid transformation
    that aligns one point cloud to another. Despite the plethora of outstanding deep
    learning (DL)-based registration methods proposed, comprehensive and systematic
    studies on DL-based PCR techniques are still lacking. In this paper, we present
    a comprehensive survey and taxonomy of recently proposed PCR methods. Firstly,
    we conduct a taxonomy of commonly utilized datasets and evaluation metrics. Secondly,
    we classify the existing research into two main categories: supervised and unsupervised
    registration, providing insights into the core concepts of various influential
    PCR models. Finally, we highlight open challenges and potential directions for
    future research. A curated collection of valuable resources is made available
    at https://github.com/yxzhang15/PCR.'
  related_code: https://github.com/yxzhang15/PCR
- author: Zan Li, Wencheng Wang, Fei Hou
  title: Image Composition with Depth Registration.
  venue: IJCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/LiWH23
  doi: 10.24963/IJCAI.2023/126
  ee: https://doi.org/10.24963/ijcai.2023/126
  url: https://dblp.org/rec/conf/ijcai/LiWH23
  abstract: Handling occlusions is still a challenging problem for image composition.
    It always requires the source contents to be completely in front of the target
    contents or needs manual interventions to adjust occlusions, which is very tedious.
    Though several methods have suggested exploiting priors or learning techniques
    for promoting occlusion determination, their potentials are much limited. This
    paper addresses the challenge by presenting a depth registration method for merging
    the source contents seamlessly into the 3D space that the target image represents.
    Thus, the occlusions between the source contents and target contents can be conveniently
    handled through pixel-wise depth comparisons, allowing the user to more efficiently
    focus on the designs for image composition. Experimental results show that we
    can conveniently handle occlusions in image composition and improve efficiency
    by about 4 times compared to Photoshop.
  related_code: ''
- author: Quan Liu 0006, Yunsong Zhou, Hongzi Zhu, Shan Chang, Minyi Guo
  title: 'APR: Online Distant Point Cloud Registration through Aggregated Point Cloud
    Reconstruction.'
  venue: IJCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/LiuZZCG23
  doi: 10.24963/IJCAI.2023/134
  ee: https://doi.org/10.24963/ijcai.2023/134
  url: https://dblp.org/rec/conf/ijcai/LiuZZCG23
  abstract: For many driving safety applications, it is of great importance to accurately
    register LiDAR point clouds generated on distant moving vehicles. However, such
    point clouds have extremely different point density and sensor perspective on
    the same object, making registration on such point clouds very hard. In this paper,
    we propose a novel feature extraction framework, called APR, for online distant
    point cloud registration. Specifically, APR leverages an autoencoder design, where
    the autoencoder reconstructs a denser aggregated point cloud with several frames
    instead of the original single input point cloud. Our design forces the encoder
    to extract features with rich local geometry information based on one single input
    point cloud. Such features are then used for online distant point cloud registration.
    We conduct extensive experiments against state-of-the-art (SOTA) feature extractors
    on KITTI and nuScenes datasets. Results show that APR outperforms all other extractors
    by a large margin, increasing average registration recall of SOTA extractors by
    7.1% on LoKITTI and 4.6% on LoNuScenes. Code is available at https://github.com/liuQuan98/APR.
  related_code: https://github.com/liuQuan98/APR
- author: Zekang Chen, Jia Wei, Rui Li 0002
  title: Unsupervised Multi-Modal Medical Image Registration via Discriminator-Free
    Image-to-Image Translation.
  venue: IJCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/ChenWL22
  doi: 10.24963/IJCAI.2022/117
  ee: https://doi.org/10.24963/ijcai.2022/117
  url: https://dblp.org/rec/conf/ijcai/ChenWL22
  abstract: In clinical practice, well-aligned multi-modal images, such as Magnetic
    Resonance (MR) and Computed Tomography (CT), together can provide complementary
    information for image-guided therapies. Multi-modal image registration is essential
    for the accurate alignment of these multi-modal images. However, it remains a
    very challenging task due to complicated and unknown spatial correspondence between
    different modalities. In this paper, we propose a novel translation-based unsupervised
    deformable image registration approach to convert the multi-modal registration
    problem to a mono-modal one. Specifically, our approach incorporates a discriminator-free
    translation network to facilitate the training of the registration network and
    a patchwise contrastive loss to encourage the translation network to preserve
    object shapes. Furthermore, we propose to replace an adversarial loss, that is
    widely used in previous multi-modal image registration methods, with a pixel loss
    in order to integrate the output of translation into the target modality. This
    leads to an unsupervised method requiring no ground-truth deformation or pairs
    of aligned images for training. We evaluate four variants of our approach on the
    public Learn2Reg 2021 datasets. The experimental results demonstrate that the
    proposed architecture achieves state-of-the-art performance. Our code is available
    at https://github.com/heyblackC/DFMIR.
  related_code: https://github.com/heyblackC/DFMIR
- author: Di Wang 0018, Jinyuan Liu 0001, Xin Fan 0001, Risheng Liu
  title: Unsupervised Misaligned Infrared and Visible Image Fusion via Cross-Modality
    Image Generation and Registration.
  venue: IJCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/WangLFL22
  doi: 10.24963/IJCAI.2022/487
  ee: https://doi.org/10.24963/ijcai.2022/487
  url: https://dblp.org/rec/conf/ijcai/WangLFL22
  abstract: Recent learning-based image fusion methods have marked numerous progress
    in pre-registered multi-modality data, but suffered serious ghosts dealing with
    misaligned multi-modality data, due to the spatial deformation and the difficulty
    narrowing cross-modality discrepancy. To overcome the obstacles, in this paper,
    we present a robust cross-modality generation-registration paradigm for unsupervised
    misaligned infrared and visible image fusion (IVIF). Specifically, we propose
    a Cross-modality Perceptual Style Transfer Network (CPSTN) to generate a pseudo
    infrared image taking a visible image as input. Benefiting from the favorable
    geometry preservation ability of the CPSTN, the generated pseudo infrared image
    embraces a sharp structure, which is more conducive to transforming cross-modality
    image alignment into mono-modality registration coupled with the structure-sensitive
    of the infrared image. In this case, we introduce a Multi-level Refinement Registration
    Network (MRRN) to predict the displacement vector field between distorted and
    pseudo infrared images and reconstruct registered infrared image under the mono-modality
    setting. Moreover, to better fuse the registered infrared images and visible images,
    we present a feature Interaction Fusion Module (IFM) to adaptively select more
    meaningful features for fusion in the Dual-path Interaction Fusion Network (DIFN).
    Extensive experimental results suggest that the proposed method performs superior
    capability on misaligned cross-modality image fusion.
  related_code: ''
- author: Haobo Jiang, Jianjun Qian, Jin Xie 0001, Jian Yang 0003
  title: Planning with Learned Dynamic Model for Unsupervised Point Cloud Registration.
  venue: IJCAI
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/JiangQXY21
  doi: 10.24963/IJCAI.2021/107
  ee: https://doi.org/10.24963/ijcai.2021/107
  url: https://dblp.org/rec/conf/ijcai/JiangQXY21
  abstract: Point cloud registration is a fundamental problem in 3D computer vision.
    In this paper, we cast point cloud registration into a planning problem in reinforcement
    learning, which can seek the transformation between the source and target point
    clouds through trial and error. By modeling the point cloud registration process
    as a Markov decision process (MDP), we develop a latent dynamic model of point
    clouds, consisting of a transformation network and evaluation network. The transformation
    network aims to predict the new transformed feature of the point cloud after performing
    a rigid transformation (i.e., action) on it while the evaluation network aims
    to predict the alignment precision between the transformed source point cloud
    and target point cloud as the reward signal. Once the dynamic model of the point
    cloud is trained, we employ the cross-entropy method (CEM) to iteratively update
    the planning policy by maximizing the rewards in the point cloud registration
    process. Thus, the optimal policy, i.e., the transformation between the source
    and target point clouds, can be obtained via gradually narrowing the search space
    of the transformation. Experimental results on ModelNet40 and 7Scene benchmark
    datasets demonstrate that our method can yield good registration performance in
    an unsupervised manner.
  related_code: ''
- author: Risheng Liu, Zi Li, Yuxi Zhang 0001, Xin Fan 0001, Zhongxuan Luo
  title: Bi-level Probabilistic Feature Learning for Deformable Image Registration.
  venue: IJCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/LiuLZFL20
  doi: 10.24963/IJCAI.2020/101
  ee: https://doi.org/10.24963/ijcai.2020/101
  url: https://dblp.org/rec/conf/ijcai/LiuLZFL20
  abstract: We address the challenging issue of deformable registration that robustly
    and efficiently builds dense correspondences between images. Traditional approaches
    upon iterative energy optimization typically invoke expensive computational load.
    Recent learning-based methods are able to efficiently predict deformation maps
    by incorporating learnable deep networks. Unfortunately, these deep networks are
    designated to learn deterministic features for classification tasks, which are
    not necessarily optimal for registration. In this paper, we propose a novel bi-level
    optimization model that enables jointly learning deformation maps and features
    for image registration. The bi-level model takes the energy for deformation computation
    as the upper-level optimization while formulates the maximum \emph{a posterior}
    (MAP) for features as the lower-level optimization. Further, we design learnable
    deep networks to simultaneously optimize the cooperative bi-level model, yielding
    robust and efficient registration. These deep networks derived from our bi-level
    optimization constitute an unsupervised end-to-end framework for learning both
    features and deformations. Extensive experiments of image-to-atlas and image-to-image
    deformable registration on 3D brain MR datasets demonstrate that we achieve state-of-the-art
    performance in terms of accuracy, efficiency, and robustness.
  related_code: ''
- author: Hailong Cao, Tiejun Zhao
  title: Point Set Registration for Unsupervised Bilingual Lexicon Induction.
  venue: IJCAI
  year: '2018'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/CaoZ18
  doi: 10.24963/IJCAI.2018/555
  ee: https://doi.org/10.24963/ijcai.2018/555
  url: https://dblp.org/rec/conf/ijcai/CaoZ18
  abstract: Inspired by the observation that word embeddings exhibit isomorphic structure
    across languages, we propose a novel method to induce a bilingual lexicon from
    only two sets of word embeddings, which are trained on monolingual source and
    target data respectively. This is achieved by formulating the task as point set
    registration which is a more general problem. We show that a transformation from
    the source to the target embedding space can be learned automatically without
    any form of cross-lingual supervision. By properly adapting a traditional point
    set registration model to make it be suitable for processing word embeddings,
    we achieved state-of-the-art performance on the unsupervised bilingual lexicon
    induction task. The point set registration problem has been well-studied and can
    be solved by many elegant models, we thus opened up a new opportunity to capture
    the universal lexical semantic structure across languages.
  related_code: ''
