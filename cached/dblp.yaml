- author: Yafei Zhang, Yongle Shang, Huafeng Li 0001
  title: Dual-Granularity Cross-Modal Identity Association for Weakly-Supervised Text-to-Person
    Image Matching.
  venue: ACM Multimedia
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/ZhangS025
  doi: 10.1145/3746027.3755834
  ee: https://doi.org/10.1145/3746027.3755834
  url: https://dblp.org/rec/conf/mm/ZhangS025
  abstract: Weakly supervised text-to-person image matching, as a crucial approach
    to reducing models' reliance on large-scale manually labeled samples, holds significant
    research value. However, existing methods struggle to predict complex one-to-many
    identity relationships, severely limiting performance improvements. To address
    this challenge, we propose a local-and-global dual-granularity identity association
    mechanism. Specifically, at the local level, we explicitly establish cross-modal
    identity relationships within a batch, reinforcing identity constraints across
    different modalities and enabling the model to better capture subtle differences
    and correlations. At the global level, we construct a dynamic cross-modal identity
    association network with the visual modality as the anchor and introduce a confidence-based
    dynamic adjustment mechanism, effectively enhancing the model's ability to identify
    weakly associated samples while improving overall sensitivity. Additionally, we
    propose an information-asymmetric sample pair construction method combined with
    consistency learning to tackle hard sample mining and enhance model robustness.
    Experimental results demonstrate that the proposed method substantially boosts
    cross-modal matching accuracy, providing an efficient and practical solution for
    text-to-person image matching. Code is available at https://github.com/syl6312/DGCMIA.
  related_code: https://github.com/syl6312/DGCMIA
- author: Zhichao Yang 0013, Leida Li, Pengfei Chen 0003, Jinjian Wu, Weisheng Dong
  title: Semantics-Aware Image Aesthetics Assessment using Tag Matching and Contrastive
    Ranking.
  venue: ACM Multimedia
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/0013L0WD24
  doi: 10.1145/3664647.3680972
  ee: https://doi.org/10.1145/3664647.3680972
  url: https://dblp.org/rec/conf/mm/0013L0WD24
  abstract: The perception of image aesthetics is built upon the understanding of
    semantic content. However, how to evaluate the aesthetic quality of images with
    diversified semantic backgrounds remains challenging in image aesthetics assessment
    (IAA). To address the dilemma, this paper presents a semantics-aware image aesthetics
    assessment approach, which first analyzes the semantic content of images and then
    models the aesthetic distinctions among images from two perspectives, i.e., aesthetic
    attribute and aesthetic level. Concretely, we propose two strategies, dubbed tag
    matching and contrastive ranking, to extract knowledge pertaining to image aesthetics.
    The tag matching identifies the semantic category and the dominant aesthetic attributes
    based on predefined tag libraries. The contrastive ranking is designed to uncover
    the comparative relationships among images with different aesthetic levels but
    similar semantic backgrounds. In the process of contrastive ranking, the impact
    of long-tailed distribution of aesthetic data is also considered by balanced sampling
    and traversal contrastive learning. Extensive experiments and comparisons on three
    benchmark IAA databases demonstrate the superior performance of the proposed model
    in terms of both prediction accuracy and alleviating long-tailed effect. The code
    will be public at https://github.com/yzc-ippl/TMCR **REMOVE 2nd URL**://github.com/yzc-ippl/TMCR.
  related_code: https://github.com/yzc-ippl/TMCR
- author: Xudong Cai, Yongcai Wang, Lun Luo, Minhang Wang, Deying Li 0001, Jintao
    Xu 0001, Weihao Gu, Rui Ai 0001
  title: 'PRISM: PRogressive dependency maxImization for Scale-invariant image Matching.'
  venue: ACM Multimedia
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/CaiWLW0XG024
  doi: 10.1145/3664647.3681209
  ee: https://doi.org/10.1145/3664647.3681209
  url: https://dblp.org/rec/conf/mm/CaiWLW0XG024
  abstract: Image matching aims at identifying corresponding points between a pair
    of images. Currently, detector-free methods have shown impressive performance
    in challenging scenarios, thanks to their capability of generating dense matches
    and global receptive field. However, performing feature interaction and proposing
    matches across the entire image is unnecessary, because not all image regions
    contribute to the matching process. Interacting and matching in unmatchable areas
    can introduce errors, reducing matching accuracy and efficiency. Meanwhile, the
    scale discrepancy issue still troubles existing methods. To address above issues,
    we propose PRogressive dependency maxImization for Scale-invariant image Matching
    (PRISM), which jointly prunes irrelevant patch features and tackles the scale
    discrepancy. To do this, we firstly present a Multi-scale Pruning Module (MPM)
    to adaptively prune irrelevant features by maximizing the dependency between the
    two feature sets. Moreover, we design the Scale-Aware Dynamic Pruning Attention
    (SADPA) to aggregate information from different scales via a hierarchical design.
    Our method's superior matching performance and generalization capability are confirmed
    by leading accuracy across various evaluation benchmarks and downstream tasks.
    The code is publicly available at https://github.com/Master-cai/PRISM.
  related_code: https://github.com/Master-cai/PRISM
- author: Shuiping Gou, Xin Wang, Xinlin Wang, Yunzhi Chen
  title: Interpretable Matching of Optical-SAR Image via Dynamically Conditioned Diffusion
    Models.
  venue: ACM Multimedia
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/GouWWC24
  doi: 10.1145/3664647.3681700
  ee: https://doi.org/10.1145/3664647.3681700
  url: https://dblp.org/rec/conf/mm/GouWWC24
  abstract: Driven by the complementary information fusion of optical and synthetic
    aperture radar (SAR) images, the optical-SAR image matching has drawn much attention.
    However, the significant radiometric differences between them imposes great challenges
    on accurate matching. Most existing approaches convert SAR and optical images
    into a shared feature space to perform the matching, but these methods often fail
    to achieve the robust matching since the feature spaces are unknown and uninterpretable.
    Motivated by the interpretable latent space of diffusion models, this paper formulates
    an optical-SAR image translation and matching framework via a dynamically conditioned
    diffusion model (DCDM) to achieve the interpretable and robust optical-SAR cross-modal
    image matching. Specifically, in the denoising process, to filter out outlier
    matching regions, a gated dynamic sparse cross-attention module is proposed to
    facilitate efficient and effective long-range interactions of multi-grained features
    between the cross-modal data. In addition, a spatial position consistency constraint
    is designed to promote the cross-attention features to perceive the spatial corresponding
    relation in different modalities, improving the matching precision. Experimental
    results demonstrate that the proposed method outperforms state-of-the-art methods
    in terms of both the matching accuracy and the interpretability.
  related_code: ''
- author: Xiang Ma 0006, Xuemei Li 0001, Lexin Fang, Caiming Zhang 0001
  title: 'Bridging the Modality Gap: Dimension Information Alignment and Sparse Spatial
    Constraint for Image-Text Matching.'
  venue: ACM Multimedia
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/Ma0F024
  doi: 10.1145/3664647.3681424
  ee: https://doi.org/10.1145/3664647.3681424
  url: https://dblp.org/rec/conf/mm/Ma0F024
  abstract: 'Many contrastive learning based models have achieved advanced performance
    in image-text matching tasks. The key of these models lies in analyzing the correlation
    between image-text pairs, which involves cross-modal interaction of embeddings
    in corresponding dimensions. However, the embeddings of different modalities are
    from different models or modules, and there is a significant modality gap. Directly
    interacting such embeddings lacks rationality and may capture inaccurate correlation.
    Therefore, we propose a novel method called DIAS to bridge the modality gap from
    two aspects: (1) We align the information representation of embeddings from different
    modalities in corresponding dimension to ensure the correlation calculation is
    based on interactions of similar information. (2) The spatial constraints of inter-
    and intra-modalities unmatched pairs are introduced to ensure the effectiveness
    of semantic alignment of the model. Besides, a sparse correlation algorithm is
    proposed to select strong correlated spatial relationships, enabling the model
    to learn more significant features and avoid being misled by weak correlation.
    Extensive experiments demonstrate the superiority of DIAS, achieving 4.3%-10.2%
    rSum improvements on Flickr30k and MSCOCO benchmarks.'
  related_code: ''
- author: Leilei Ma 0002, Hongxing Xie, Lei Wang 0095, Yanping Fu, Dengdi Sun, Haifeng
    Zhao 0001
  title: Text-Region Matching for Multi-Label Image Recognition with Missing Labels.
  venue: ACM Multimedia
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/MaXWFS024
  doi: 10.1145/3664647.3680815
  ee: https://doi.org/10.1145/3664647.3680815
  url: https://dblp.org/rec/conf/mm/MaXWFS024
  abstract: Recently, large-scale visual language pre-trained (VLP) models have demonstrated
    impressive performance across various downstream tasks. Motivated by these advancements,
    pioneering efforts have emerged in multi-label image recognition with missing
    labels, leveraging VLP prompt-tuning technology. However, they usually cannot
    match text and vision features well, due to complicated semantics gaps and missing
    labels in a multi-label image. To tackle this challenge, we propose Text-Region
    Matching for optimizing Multi-Label prompt tuning, namely TRM-ML, a novel method
    for enhancing meaningful cross-modal matching. Compared to existing methods, we
    advocate exploring the information of category-aware regions rather than the entire
    image or pixels, which contributes to bridging the semantic gap between textual
    and visual representations in a one-to-one matching manner. Concurrently, we further
    introduce multimodal contrastive learning to narrow the semantic gap between textual
    and visual modalities and establish intra-class and inter-class relationships.
    Additionally, to deal with missing labels, we propose a multimodal category prototype
    that leverages intra- and inter-category semantic relationships to estimate unknown
    labels, facilitating pseudo-label generation. Extensive experiments on the MS-COCO,
    PASCAL VOC, Visual Genome, NUS-WIDE, and CUB-200-211 benchmark datasets demonstrate
    that our proposed framework outperforms the state-of-the-art methods by a significant
    margin. Our code is available here.
  related_code: ''
- author: Wenhui Li 0001, Xinqi Su, Dan Song 0006, Lanjun Wang, Kun Zhang 0040, An-An
    Liu
  title: Towards Deconfounded Image-Text Matching with Causal Inference.
  venue: ACM Multimedia
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/0001SSWZL23
  doi: 10.1145/3581783.3612472
  ee: https://doi.org/10.1145/3581783.3612472
  url: https://dblp.org/rec/conf/mm/0001SSWZL23
  abstract: Prior image-text matching methods have shown remarkable performance on
    many benchmark datasets, but most of them overlook the bias in the dataset, which
    exists in intra-modal and inter-modal, and tend to learn the spurious correlations
    that extremely degrade the generalization ability of the model. Furthermore, these
    methods often incorporate biased external knowledge from large-scale datasets
    as prior knowledge into image-text matching model, which is inevitable to force
    model further learn biased associations. To address above limitations, this paper
    firstly utilizes Structural Causal Models (SCMs) to illustrate how intra- and
    inter-modal confounders damage the image-text matching. Then, we employ backdoor
    adjustment to propose an innovative Deconfounded Causal Inference Network (DCIN)
    for image-text matching task. DCIN (1) decomposes the intra- and inter-modal confounders
    and incorporates them into the encoding stage of visual and textual features,
    effectively eliminating the spurious correlations during image-text matching,
    and (2) uses causal inference to mitigate biases of external knowledge. Consequently,
    the model can learn causality instead of spurious correlations caused by dataset
    bias. Extensive experiments on two well-known benchmark datasets, i.e., Flickr30K
    and MSCOCO, demonstrate the superiority of our proposed method.
  related_code: ''
- author: Songhe Deng, Wei Zhuo, Jinheng Xie, Linlin Shen
  title: 'QA-CLIMS: Question-Answer Cross Language Image Matching for Weakly Supervised
    Semantic Segmentation.'
  venue: ACM Multimedia
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/DengZXS23
  doi: 10.1145/3581783.3612148
  ee: https://doi.org/10.1145/3581783.3612148
  url: https://dblp.org/rec/conf/mm/DengZXS23
  abstract: Class Activation Map (CAM) has emerged as a popular tool for weakly supervised
    semantic segmentation (WSSS), allowing the localization of object regions in an
    image using only image-level labels. However, existing CAM methods suffer from
    under-activation of target object regions and false-activation of background regions
    due to the fact that a lack of detailed supervision can hinder the model's ability
    to understand the image as a whole. In this paper, we propose a novel Question-Answer
    Cross-Language-Image Matching framework for WSSS (QA-CLIMS), leveraging the vision-language
    foundation model to maximize the text-based understanding of images and guide
    the generation of activation maps. First, a series of carefully designed questions
    are posed to the VQA (Visual Question Answering) model with Question-Answer Prompt
    Engineering (QAPE) to generate a corpus of both foreground target objects and
    backgrounds that are adaptive to query images. We then employ contrastive learning
    in a Region Image Text Contrastive (RITC) network to compare the obtained foreground
    and background regions with the generated corpus. Our approach exploits the rich
    textual information from the open vocabulary as additional supervision, enabling
    the model to generate high-quality CAMs with a more complete object region and
    reduce false-activation of background regions. We conduct extensive analysis to
    validate the proposed method and show that our approach performs state-of-the-art
    on both PASCAL VOC 2012 and MS COCO datasets.
  related_code: ''
- author: Xinfeng Dong, Longfei Han, Dingwen Zhang, Li Liu 0031, Junwei Han 0001,
    Huaxiang Zhang 0001
  title: Giving Text More Imagination Space for Image-text Matching.
  venue: ACM Multimedia
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/DongHZ0H023
  doi: 10.1145/3581783.3612103
  ee: https://doi.org/10.1145/3581783.3612103
  url: https://dblp.org/rec/conf/mm/DongHZ0H023
  abstract: Image-text matching is a hot topic in multi-modal analysis. The existing
    image-text matching algorithms focus on bridging the heterogeneity gap and mapping
    the feature into a common space under strong alignment assumption. However, these
    methods have unsatisfactory performance under the weak alignment scenario, which
    assumes that the text contains more abstract information, and the number of entities
    in the text is always fewer than objects in image. This is the first time, from
    our knowledge, to solve the image-text matching problem from the perspective of
    information difference with weak alignment. In order to both narrow the cross-modal
    heterogeneity gap and balance the information discrepancy, we proposed an imagination
    network to enrich the text modality based on pre-trained framework, which is helpful
    for image-text matching. The imagination network utilizes reinforcement learning
    to enhance the semantic information for text modality, and an action refinement
    strategy is designed to constrain the freedom and divergence of imagination. The
    experiment results show the superiority and generality of the proposed framework
    based on two pre-trained models, CLIP and BLIP on two most frequently-used datasets
    MSCOCO and Flickr30K.
  related_code: ''
- author: Haoxuan Li 0002, Yi Bin, Junrong Liao, Yang Yang 0002, Heng Tao Shen
  title: 'Your Negative May not Be True Negative: Boosting Image-Text Matching with
    False Negative Elimination.'
  venue: ACM Multimedia
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/LiBL0S23
  doi: 10.1145/3581783.3612101
  ee: https://doi.org/10.1145/3581783.3612101
  url: https://dblp.org/rec/conf/mm/LiBL0S23
  abstract: Most existing image-text matching methods adopt triplet loss as the optimization
    objective, and choosing a proper negative sample for the triplet of is important
    for effectively training the model, e.g., hard negatives make the model learn
    efficiently and effectively. However, we observe that existing methods mainly
    employ the most similar samples as hard negatives, which may not be true negatives.
    In other words, the samples with high similarity but not paired with the anchor
    may reserve positive semantic associations, and we call them false negatives.
    Repelling these false negatives in triplet loss would mislead the semantic representation
    learning and result in inferior retrieval performance. In this paper, we propose
    a novel False Negative Elimination (FNE) strategy to select negatives via sampling,
    which could alleviate the problem introduced by false negatives. Specifically,
    we first construct the distributions of positive and negative samples separately
    via their similarities with the anchor, based on the features extracted from image
    and text encoders. Then we calculate the false negative probability of a given
    sample based on its similarity with the anchor and the above distributions via
    the Bayes' rule, which is employed as the sampling weight during negative sampling
    process. Since there may not exist any false negative in a small batch size, we
    design a memory module with momentum to retain a large negative buffer and implement
    our negative sampling strategy spanning over the buffer. In addition, to make
    the model focus on hard negatives, we reassign the sampling weights for the simple
    negatives with a cut-down strategy. The extensive experiments are conducted on
    Flickr30K and MS-COCO, and the results demonstrate the superiority of our proposed
    false negative elimination strategy. The code is available at https://github.com/LuminosityX/FNE.
  related_code: https://github.com/LuminosityX/FNE
- author: Kun Zhang 0040, Lei Zhang 0119, Bo Hu 0036, Mengxiao Zhu 0001, Zhendong
    Mao 0001
  title: Unlocking the Power of Cross-Dimensional Semantic Dependency for Image-Text
    Matching.
  venue: ACM Multimedia
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/ZhangZH0M23
  doi: 10.1145/3581783.3611703
  ee: https://doi.org/10.1145/3581783.3611703
  url: https://dblp.org/rec/conf/mm/ZhangZH0M23
  abstract: Image-text matching, as a fundamental cross-modal task, bridges vision
    and language. The key challenge lies in accurately learning the semantic similarity
    of these two heterogeneous modalities. To determine the semantic similarity between
    visual and textual features, existing paradigm typically first maps them into
    a d-dimensional shared representation space, then independently aggregates all
    dimensional correspondences of cross-modal features to reflect it, e.g., the inner
    product. However, in this paper, we are motivated by an insightful finding that
    dimensions are not mutually independent, but there are intrinsic dependencies
    among dimensions to jointly represent latent semantics. Ignoring this intrinsic
    information probably leads to suboptimal aggregation for semantic similarity,
    impairing cross-modal matching learning. To solve this issue, we propose a novel
    cross-dimensional semantic dependency-aware model (called X-Dim), which explicitly
    and adaptively mines the semantic dependencies between dimensions in the shared
    space, enabling dimensions with joint dependencies to be enhanced and utilized.
    X-Dim (1) designs a generalized framework to learn dimensions' semantic dependency
    degrees, and (2) devises the adaptive sparse probabilistic learning to autonomously
    make the model capture precise dependencies. Theoretical analysis and extensive
    experiments demonstrate the superiority of X-Dim over state-of-the-art methods,
    achieving 5.9%-7.3% rSum improvements on Flickr30K and MS-COCO benchmarks.
  related_code: ''
- author: Zhixin Ling, Zhen Xing, Jiangtong Li, Li Niu 0002
  title: Multi-Level Region Matching for Fine-Grained Sketch-Based Image Retrieval.
  venue: ACM Multimedia
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/LingXL022
  doi: 10.1145/3503161.3548147
  ee: https://doi.org/10.1145/3503161.3548147
  url: https://dblp.org/rec/conf/mm/LingXL022
  abstract: 'Fine-Grained Sketch-Based Image Retrieval (FG-SBIR) is to use free-hand
    sketches as queries to perform instance-level retrieval in an image gallery. Existing
    works usually leverage only high-level information and perform matching in a single
    region. However, both low-level and high-level information are helpful to establish
    fine-grained correspondence. Besides, we argue that matching different regions
    between each sketch-image pair can further boost model robustness. Therefore,
    we propose Multi-Level Region Matching (MLRM) for FG-SBIR, which consists of two
    modules: a Discriminative Region Extraction module (DRE) and a Region and Level
    Attention module (RLA). In DRE, we propose Light-weighted Attention Map Augmentation
    (LAMA) to extract local feature from different regions. In RLA, we propose a transformer-based
    attentive matching module to learn attention weights to explore different importance
    from different image/sketch regions and feature levels. Furthermore, to ensure
    that the geometrical and semantic distinctiveness is well modeled, we also explore
    a novel LAMA overlapping penalty and a local region-negative triplet loss in our
    proposed MLRM method. Comprehensive experiments conducted on five datasets (i.e.,
    Sketchy, QMUL-ChairV2, QMUL-ShoeV2, QMUL-Chair, QMUL-Shoe) demonstrate effectiveness
    of our method.'
  related_code: ''
- author: Zheng Wang 0044, Zhenwei Gao, Xing Xu 0001, Yadan Luo, Yang Yang 0002, Heng
    Tao Shen
  title: Point to Rectangle Matching for Image Text Retrieval.
  venue: ACM Multimedia
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/WangGXLYS22
  doi: 10.1145/3503161.3548237
  ee: https://doi.org/10.1145/3503161.3548237
  url: https://dblp.org/rec/conf/mm/WangGXLYS22
  abstract: The difficulty of image-text retrieval is further exacerbated by the phenomenon
    of one-to-many correspondence, where multiple semantic manifestations of the other
    modality could be obtained by a given query. However, the prevailing methods adopt
    the deterministic embedding strategy to retrieve the most similar candidate, which
    encodes the representations of different modalities as single points in vector
    space. We argue that such a deterministic point mapping is obviously insufficient
    to represent a potential set of retrieval results for one-to-many correspondence,
    despite its noticeable progress. As a remedy to this issue, we propose a Point
    to Rectangle Matching (abbreviated as P2RM) mechanism, which actually is a geometric
    representation learning method for image-text retrieval. Specifically, our intuitive
    insight is that the representations of different modalities could be extended
    to rectangles, then a set of points inside such a rectangle embedding could be
    semantically related to many candidate correspondences. Thus our P2RM method could
    essentially address the one-to-many correspondence. Besides, we design a novel
    semantic similarity measurement method from the perspective of distance for our
    rectangle embedding. Under the evaluation metric for multiple matches, extensive
    experiments and ablation studies on two commonly used benchmarks demonstrate our
    effectiveness and superiority in tackling the multiplicity of image-text retrieval.
  related_code: ''
- author: Hao Wei, Shuhui Wang, Xinzhe Han, Zhe Xue, Bin Ma 0028, Xiaoming Wei, Xiaolin
    Wei
  title: Synthesizing Counterfactual Samples for Effective Image-Text Matching.
  venue: ACM Multimedia
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/WeiWHXMWW22
  doi: 10.1145/3503161.3547814
  ee: https://doi.org/10.1145/3503161.3547814
  url: https://dblp.org/rec/conf/mm/WeiWHXMWW22
  abstract: 'Image-text matching is a fundamental research topic bridging vision and
    language. Recent works use hard negative mining to capture the multiple correspondences
    between visual and textual domains. Unfortunately, the truly informative negative
    samples are quite sparse in the training data, which are hard to obtain only in
    a randomly sampled mini-batch. Motivated by causal inference, we aim to overcome
    this shortcoming by carefully analyzing the analogy between hard negative mining
    and causal effects optimizing. Further, we propose Counterfactual Matching (CFM)
    framework for more effective image-text correspondence mining. CFM contains three
    major components, \ie, Gradient-Guided Feature Selection for automatic casual
    factor identification, Self-Exploration for causal factor completeness, and Self-Adjustment
    for counterfactual sample synthesis. Compared with traditional hard negative mining,
    our method largely alleviates the over-fitting phenomenon and effectively captures
    the fine-grained correlations between image and text modality. We evaluate our
    CFM in combination with three state-of-the-art image-text matching architectures.
    Quantitative and qualitative experiments conducted on two publicly available datasets
    demonstrate its strong generality and effectiveness. Code is available at: https://github.com/weihao20/cfm.'
  related_code: https://github.com/weihao20/cfm
- author: Jianwei Zhu, Zhixin Li 0001, Yufei Zeng, Jiahui Wei, Huifang Ma
  title: Image-Text Matching with Fine-Grained Relational Dependency and Bidirectional
    Attention-Based Generative Networks.
  venue: ACM Multimedia
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/ZhuLZWM22
  doi: 10.1145/3503161.3548058
  ee: https://doi.org/10.1145/3503161.3548058
  url: https://dblp.org/rec/conf/mm/ZhuLZWM22
  abstract: Generally, most existing cross-modal retrieval methods only consider global
    or local semantic embeddings, lacking fine-grained dependencies between objects.
    At the same time, it is usually ignored that the mutual transformation between
    modalities also facilitates the embedding of modalities. Given these problems,
    we propose a method called BiKA (Bidirectional Knowledge-assisted embedding and
    Attention-based generation). The model uses a bidirectional graph convolutional
    neural network to establish dependencies between objects. In addition, it employs
    a bidirectional attention-based generative network to achieve the mutual transformation
    between modalities. Specifically, the knowledge graph is used for local matching
    to constrain the local expression of the modalities, in which the generative network
    is used for mutual transformation to constrain the global expression of the modalities.
    In addition, we also propose a new position relation embedding network to embed
    position relation information between objects. The experiments on two public datasets
    show that the performance of our method has been dramatically improved compared
    to many state-of-the-art models.
  related_code: ''
- author: Jinming Mu, Shuiping Gou, Shasha Mao, Shankui Zheng
  title: A Stepwise Matching Method for Multi-modal Image based on Cascaded Network.
  venue: ACM Multimedia
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/MuGMZ21
  doi: 10.1145/3474085.3475644
  ee: https://doi.org/10.1145/3474085.3475644
  url: https://dblp.org/rec/conf/mm/MuGMZ21
  abstract: Template matching of multi-modal image has been a challenge to image matching,
    and it is difficult to balance the speed and the accuracy, especially for images
    with large sizes. Based on this, we propose a stepwise image matching method to
    achieve a precise location from the coarse-to-fine image matching by utilizing
    cascaded networks. In the proposed method, a coarse-grained matching network is
    firstly constructed to locate a rough matching position based on cross-correlating
    features of optical and SAR images. Specially, to enhance the credible matching
    position, a suppression network is designed to evaluate for the obtained cross-correlation
    feature and added into the coarse-grained network as a feedback. Secondly, a fine-grained
    matching network is constructed based on the obtained rough matching result to
    gain a more precise matching. In this part, ternary groups are utilized to construct
    the training samples. Interestingly, we apply the region with a few pixels offset
    as the negative class, which effectively distinguishes similar neighbourhoods
    of the rough matching position. Moreover, a modified Siamese network is used to
    extract features of SAR and optical images, respectively. Finally, experimental
    results illustrate that the proposed method obtains more precise matching compared
    with the state-of-the-art methods.
  related_code: ''
- author: Pengpeng Zeng, Lianli Gao, Xinyu Lyu, Shuaiqi Jing, Jingkuan Song
  title: Conceptual and Syntactical Cross-modal Alignment with Cross-level Consistency
    for Image-Text Matching.
  venue: ACM Multimedia
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/ZengGLJS21
  doi: 10.1145/3474085.3475380
  ee: https://doi.org/10.1145/3474085.3475380
  url: https://dblp.org/rec/conf/mm/ZengGLJS21
  abstract: Image-Text Matching (ITM) is a fundamental and emerging task, which plays
    a key role in cross-modal understanding. It remains a challenge because prior
    works mainly focus on learning fine-grained (i.e. coarse and/or phrase) correspondence,
    without considering the syntactical correspondence. In theory, a sentence is not
    only a set of words or phrases but also a syntactic structure, consisting of a
    set of basic syntactic tuples (i.e.(attribute) object - predicate - (attribute)
    subject). Inspired by this, we propose a Conceptual and Syntactical Cross-modal
    Alignment with Cross-level Consistency (CSCC) for Image-text Matching by simultaneously
    exploring the multiple-level cross-modal alignments across the concept and syntactic
    with a consistency constraint. Specifically, a conceptual-level cross-modal alignment
    is introduced for exploring the fine-grained correspondence, while a syntactical-level
    cross-modal alignment is proposed to explicitly learn a high-level syntactic similarity
    function. Moreover, an empirical cross-level consistent attention loss is introduced
    to maintain the consistency between cross-modal attentions obtained from the above
    two cross-modal alignments. To justify our method, comprehensive experiments are
    conducted on two public benchmark datasets, i.e. MS-COCO (1K and 5K) and Flickr30K,
    which show that our CSCC outperforms state-of-the-art methods with fairly competitive
    improvements.
  related_code: ''
- author: Leigang Qu, Meng Liu 0006, Da Cao, Liqiang Nie, Qi Tian 0001
  title: Context-Aware Multi-View Summarization Network for Image-Text Matching.
  venue: ACM Multimedia
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/Qu0CN020
  doi: 10.1145/3394171.3413961
  ee: https://doi.org/10.1145/3394171.3413961
  url: https://dblp.org/rec/conf/mm/Qu0CN020
  abstract: Image-text matching is a vital yet challenging task in the field of multimedia
    analysis. Over the past decades, great efforts have been made to bridge the semantic
    gap between the visual and textual modalities. Despite the significance and value,
    most prior work is still confronted with a multi-view description challenge, i.e.,
    how to align an image to multiple textual descriptions with semantic diversity.
    Toward this end, we present a novel context-aware multi-view summarization network
    to summarize context-enhanced visual region information from multiple views. To
    be more specific, we design an adaptive gating self-attention module to extract
    representations of visual regions and words. By controlling the internal information
    flow, we are able to adaptively capture context information. Afterwards, we introduce
    a summarization module with a diversity regularization to aggregate region-level
    features into image-level ones from different perspectives. Ultimately, we devise
    a multi-view matching scheme to match multi-view image features with corresponding
    text ones. To justify our work, we have conducted extensive experiments on two
    benchmark datasets, i.e., Flickr30K and MS-COCO, which demonstrates the superiority
    of our model as compared to several state-of-the-art baselines.
  related_code: ''
- author: Sicheng Zhao, Yaxian Li, Xingxu Yao, Weizhi Nie, Pengfei Xu 0013, Jufeng
    Yang, Kurt Keutzer
  title: Emotion-Based End-to-End Matching Between Image and Music in Valence-Arousal
    Space.
  venue: ACM Multimedia
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/ZhaoLYN0YK20
  doi: 10.1145/3394171.3413776
  ee: https://doi.org/10.1145/3394171.3413776
  url: https://dblp.org/rec/conf/mm/ZhaoLYN0YK20
  abstract: Both images and music can convey rich semantics and are widely used to
    induce specific emotions. Matching images and music with similar emotions might
    help to make emotion perceptions more vivid and stronger. Existing emotion-based
    image and music matching methods either employ limited categorical emotion states
    which cannot well reflect the complexity and subtlety of emotions, or train the
    matching model using an impractical multi-stage pipeline. In this paper, we study
    end-to-end matching between image and music based on emotions in the continuous
    valence-arousal (VA) space. First, we construct a large-scale dataset, termed
    Image-Music-Emotion-Matching-Net (IMEMNet), with over 140K image-music pairs.
    Second, we propose cross-modal deep continuous metric learning (CDCML) to learn
    a shared latent embedding space which preserves the cross-modal similarity relationship
    in the continuous matching space. Finally, we refine the embedding space by further
    preserving the single-modal emotion relationship in the VA spaces of both images
    and music. The metric learning in the embedding space and task regression in the
    label space are jointly optimized for both cross-modal matching and single-modal
    VA prediction. The extensive experiments conducted on IMEMNet demonstrate the
    superiority of CDCML for emotion-based image and music matching as compared to
    the state-of-the-art approaches.
  related_code: ''
- author: Chunxiao Liu, Zhendong Mao 0001, An-An Liu, Tianzhu Zhang 0001, Bin Wang
    0004, Yongdong Zhang 0001
  title: 'Focus Your Attention: A Bidirectional Focal Attention Network for Image-Text
    Matching.'
  venue: ACM Multimedia
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/LiuMLZWZ19
  doi: 10.1145/3343031.3350869
  ee: https://doi.org/10.1145/3343031.3350869
  url: https://dblp.org/rec/conf/mm/LiuMLZWZ19
  abstract: Learning semantic correspondence between image and text is significant
    as it bridges the semantic gap between vision and language. The key challenge
    is to accurately find and correlate shared semantics in image and text. Most existing
    methods achieve this goal by representing the shared semantic as a weighted combination
    of all the fragments (image regions or text words), where fragments relevant to
    the shared semantic obtain more attention, otherwise less. However, despite relevant
    ones contribute more to the shared semantic, irrelevant ones will more or less
    disturb it, and thus will lead to semantic misalignment in the correlation phase.
    To address this issue, we present a novel Bidirectional Focal Attention Network
    (BFAN), which not only allows to attend to relevant fragments but also diverts
    all the attention into these relevant fragments to concentrate on them. The main
    difference with existing works is they mostly focus on learning attention weight
    while our BFAN focus on eliminating irrelevant fragments from the shared semantic.
    The focal attention is achieved by preassigning attention based on inter-modality
    relation, identifying relevant fragments based on intra-modality relation and
    reassigning attention. Furthermore, the focal attention is jointly applied in
    both image-to-text and text-to-image directions, which enables to avoid preference
    to long text or complex image. Experiments show our simple but effective framework
    significantly outperforms state-of-the-art, with relative Recall@1 gains of 2.2%
    on both Flicr30K and MSCOCO benchmarks.
  related_code: ''
- author: Tan Wang, Xing Xu 0001, Yang Yang 0002, Alan Hanjalic, Heng Tao Shen, Jingkuan
    Song
  title: Matching Images and Text with Multi-modal Tensor Fusion and Re-ranking.
  venue: ACM Multimedia
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/WangX0HSS19
  doi: 10.1145/3343031.3350875
  ee: https://doi.org/10.1145/3343031.3350875
  url: https://dblp.org/rec/conf/mm/WangX0HSS19
  abstract: A major challenge in matching images and text is that they have intrinsically
    different data distributions and feature representations. Most existing approaches
    are based either on embedding or classification, the first one mapping image and
    text instances into a common embedding space for distance measuring, and the second
    one regarding image-text matching as a binary classification problem. Neither
    of these approaches can, however, balance the matching accuracy and model complexity
    well. We propose a novel framework that achieves remarkable matching performance
    with acceptable model complexity. Specifically, in the training stage, we propose
    a novel Multi-modal Tensor Fusion Network (MTFN) to explicitly learn an accurate
    image-text similarity function with rank-based tensor fusion rather than seeking
    a common embedding space for each image-text instance. Then, during testing, we
    deploy a generic Cross-modal Re-ranking (RR) scheme for refinement without requiring
    additional training procedure. Extensive experiments on two datasets demonstrate
    that our MTFN-RR consistently achieves the state-of-the-art matching performance
    with much less time complexity.
  related_code: ''
- author: Yiling Wu, Shuhui Wang, Guoli Song, Qingming Huang
  title: Learning Fragment Self-Attention Embeddings for Image-Text Matching.
  venue: ACM Multimedia
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/WuWSH19
  doi: 10.1145/3343031.3350940
  ee: https://doi.org/10.1145/3343031.3350940
  url: https://dblp.org/rec/conf/mm/WuWSH19
  abstract: In image-text matching task, the key to good matching quality is to capture
    the rich contextual dependencies between fragments of image and text. However,
    previous works either simply aggregate the similarity of all possible pairs of
    image regions and words, or take multi-step cross attention to attend to image
    regions and words with each other as context, which requires exhaustive similarity
    computation between all image region and word pairs. In this paper, we propose
    Self-Attention Embeddings (SAEM) to exploit fragment relations in images or texts
    by self-attention mechanism, and aggregate fragment information into visual and
    textual embeddings. Specifically, SAEM extracts salient image regions based on
    bottom-up attention, and takes WordPiece tokens as sentence fragments. The self-attention
    layers are built to model subtle and fine-grained fragment relation in image and
    text respectively, which consists of multi-head self-attention sub-layer and position-wise
    feed-forward network sub-layer. Consequently, the fragment self-attention mechanism
    can discover the fragment relations and identify the semantically salient regions
    in images or words in sentences, and capture their interaction more accurately.
    By simultaneously exploiting the fine-grained fragment relation in both visual
    and textual modalities, our method produces more semantically consistent embeddings
    for representing images and texts, and demonstrates promising image-text matching
    accuracy and high efficiency on Flickr30K and MSCOCO datasets.
  related_code: ''
- author: Yue Wu 0001, Wael Abd-Almageed, Prem Natarajan
  title: 'Deep Matching and Validation Network: An End-to-End Solution to Constrained
    Image Splicing Localization and Detection.'
  venue: ACM Multimedia
  year: '2017'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/WuAN17
  doi: 10.1145/3123266.3123411
  ee: https://doi.org/10.1145/3123266.3123411
  url: https://dblp.org/rec/conf/mm/WuAN17
  abstract: 'Image splicing is a very common image manipulation technique that is
    sometimes used for malicious purposes. A splicing detection and localization algorithm
    usually takes an input image and produces a binary decision indicating whether
    the input image has been manipulated, and also a segmentation mask that corresponds
    to the spliced region. Most existing splicing detection and localization pipelines
    suffer from two main shortcomings: 1) they use handcrafted features that are not
    robust against subsequent processing (e.g., compression), and 2) each stage of
    the pipeline is usually optimized independently. In this paper we extend the formulation
    of the underlying splicing problem to consider two input images, a query image
    and a potential donor image. Here the task is to estimate the probability that
    the donor image has been used to splice the query image, and obtain the splicing
    masks for both the query and donor images. We introduce a novel deep convolutional
    neural network architecture, called Deep Matching and Validation Network (DMVN),
    which simultaneously localizes and detects image splicing. The proposed approach
    does not depend on handcrafted features and uses raw input images to create deep
    learned representations. Furthermore, the DMVN is end-to-end optimized to produce
    the probability estimates and the segmentation masks. Our extensive experiments
    demonstrate that this approach outperforms state-of-the-art splicing detection
    methods by a large margin in terms of both AUC score and speed.'
