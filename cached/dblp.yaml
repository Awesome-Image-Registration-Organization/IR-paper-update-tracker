  key: conf/iccv/ZhengHCW25
  doi: 10.1109/ICCV51701.2025.02464
  ee: https://doi.org/10.1109/ICCV51701.2025.02464
  url: https://dblp.org/rec/conf/iccv/ZhengHCW25
  abstract: Recent research leveraging large-scale pretrained diffusion models has
    demonstrated the potential of using diffusion features to establish semantic correspondences
    in images. Inspired by advancements in diffusion-based techniques, we propose
    a novel zero-shot method for refining point cloud registration algorithms. Our
    approach leverages correspondences derived from depth images to enhance point
    feature representations, eliminating the need for a dedicated training dataset.
    Specifically, we first project the point cloud into depth maps from multiple perspectives
    and extract implicit knowledge from a pretrained diffusion network as depth diffusion
    features. These features are then integrated with geometric features obtained
    from existing methods to establish more accurate corre-spondences between point
    clouds. By leveraging these refined correspondences, our approach achieves significantly
    improved registration accuracy. Extensive experiments demonstrate that our method
    not only enhances the performance of existing point cloud registration techniques
    but also exhibits robust generalization capabilities across diverse datasets.
    Codes are available at https://github.com/zhengcy-lambo/RARE.git.
  related_code: https://github.com/zhengcy-lambo/RARE.git
- author: Haokai Zhu, Bo Qu, Si-Yuan Cao, Runmin Zhang, Shujie Chen 0001, Bailin Yang,
    Hui-Liang Shen
  title: 'EDFFDNet: Towards Accurate and Efficient Unsupervised Multi-Grid Image Registration.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ZhuQCZCYS25
  doi: 10.1109/ICCV51701.2025.00485
  ee: https://doi.org/10.1109/ICCV51701.2025.00485
  url: https://dblp.org/rec/conf/iccv/ZhuQCZCYS25
  abstract: Previous deep image registration methods that employ single homography,
    multi-grid homography, or thin-plate spline often struggle with real scenes containing
    depth disparities due to their inherent limitations. To address this, we propose
    an Exponential-Decay Free-Form Deformation Network (EDFFDNet), which employs free-form
    deformation with an exponential-decay basis function. This design achieves higher
    efficiency and performs well in scenes with depth disparities, benefiting from
    its inherent locality. We also introduce an Adaptive Sparse Motion Aggregator
    (ASMA), which replaces the MLP motion aggregator used in previous methods. By
    transforming dense interactions into sparse ones, ASMA reduces parameters and
    improves accuracy. Additionally, we propose a progressive correlation refinement
    strategy that leverages global-local correlation patterns for coarse-to-fine motion
    estimation, further enhancing efficiency and accuracy. Experiments demonstrate
    that EDFFDNet reduces parameters, memory, and total runtime by $70.5 \%, 32.6
    \%$, and 33.7 %, respectively, while achieving a 0.5 dB PSNR gain over the state-of-the-art
    method. With an additional local refinement stage, EDFFDNet-2 further improves
    PSNR by $1.06 d B$ while maintaining lower computational costs. Our method also
    demonstrates strong generalization ability across datasets, outperforming previous
    deep learning methods.
