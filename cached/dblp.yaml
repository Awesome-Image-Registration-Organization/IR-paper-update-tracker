- author: Mingyu Ding, Zhe Wang 0006, Bolei Zhou, Jianping Shi, Zhiwu Lu 0001, Ping
    Luo 0002
  title: 'Every Frame Counts: Joint Learning of Video Segmentation and Optical Flow.'
  venue: AAAI
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/DingWZSL020
  doi: 10.1609/AAAI.V34I07.6699
