- author: Zhixin Cheng, Jiacheng Deng 0002, Xinjun Li, Xiaotian Yin, Bohao Liao, Baoqun
    Yin, Wenfei Yang, Tianzhu Zhang 0001
  title: 'CA-I2P: Channel-Adaptive Registration Network with Global Optimal Selection.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ChengDLYLYYZ25
  doi: 10.1109/ICCV51701.2025.02575
  ee: https://doi.org/10.1109/ICCV51701.2025.02575
  url: https://dblp.org/rec/conf/iccv/ChengDLYLYYZ25
  abstract: Detection-free methods typically follow a coarse-to-fine pipeline, extracting
    image and point cloud features for patch-level matching and refining dense pixel-to-point
    correspondences. However, differences in feature channel attention between images
    and point clouds may lead to degraded matching results, ultimately impairing registration
    accuracy. Furthermore, similar structures in the scene could lead to redundant
    correspondences in cross-modal matching. To address these issues, we propose Channel
    Adaptive Adjustment Module (CAA) and Global Optimal Selection Module (GOS). CAA
    enhances intra-modal features and suppresses cross-modal sensitivity, while GOS
    replaces local selection with global optimization. Experiments on RGB-D Scenes
    V2 and 7-Scenes demonstrate the superiority of our method, achieving state-of-the-art
    performance in image-to-point cloud registration.
- author: Chong Cheng, Yu Hu, Sicheng Yu, Beizhen Zhao, Zijian Wang, Hao Wang
  title: 'RegGS: Unposed Sparse Views Gaussian Splatting with 3DGS Registration.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ChengHYZWW25
  doi: 10.1109/ICCV51701.2025.00759
  ee: https://doi.org/10.1109/ICCV51701.2025.00759
  url: https://dblp.org/rec/conf/iccv/ChengHYZWW25
  abstract: '3D Gaussian Splatting (3DGS) has demonstrated its potential in reconstructing
    scenes from unposed images. However, optimization-based 3DGS methods struggle
    with sparse views due to limited prior knowledge. Meanwhile, feed-forward Gaussian
    approaches are constrained by input formats, making it challenging to incorporate
    more input views. To address these challenges, we propose RegGS, a 3D Gaussian
    registration-based framework for reconstructing unposed sparse views. RegGS aligns
    local 3D Gaussians generated by a feed-forward network into a globally consistent
    3D Gaussian representation. Technically, we implement an entropy-regularized Sinkhorn
    algorithm to efficiently solve the optimal transport Mixture 2-Wasserstein $\left(M
    W_{2}\right)$ distance, which serves as an alignment metric for Gaussian mixture
    models (GMMs) in $\operatorname{Sim}(3)$ space. Furthermore, we design a joint
    3DGS registration module that integrates the $M W_{2}$ distance, photometric consistency,
    and depth geometry. This enables a coarse-to-fine registration process while accurately
    estimating camera poses and aligning the scene. Experiments on the RE10K and ACID
    datasets demonstrate that RegGS effectively registers local Gaussians with high
    fidelity, achieving precise pose estimation and high-quality novel-view synthesis.
    Project page: https://3dagentworld.github.io/reggs/.'
- author: Guangzhao He, Yuxi Xiao, Zhen Xu 0008, Xiaowei Zhou 0001, Sida Peng
  title: 'ERNet: Efficient Non-Rigid Registration Network for Point Sequences.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/HeXXZP25
  doi: 10.1109/ICCV51701.2025.02521
  ee: https://doi.org/10.1109/ICCV51701.2025.02521
  url: https://dblp.org/rec/conf/iccv/HeXXZP25
  abstract: 'Registering an object shape to a sequence of point clouds undergoing
    non-rigid deformation is a long-standing challenge. The key difficulties stem
    from two factors: (i) the presence of local minima due to the non-convexity of
    registration objectives, especially under noisy or partial inputs, which hinders
    accurate and robust deformation estimation, and (ii) error accumulation over long
    sequences, leading to tracking failures. To address these challenges, we introduce
    to adopt a scalable data-driven approach and propose ERNet, an efficient feed-forward
    model trained on large deformation datasets. It is designed to handle noisy and
    partial inputs while effectively leveraging temporal information for accurate
    and consistent sequential registration. The key to our design is predicting a
    sequence of deformation graphs through a two-stage pipeline, which first estimates
    framewise coarse graph nodes for robust initialization, before refining their
    trajectories over time in a sliding-window fashion. Extensive experiments show
    that our proposed approach (i) outperforms previous state of the art on both the
    DeformingThings4D and D-FAUST datasets, and (ii) achieves more than $4 x$ speedup
    compared to the previous best, offering significant efficiency improvement.'
