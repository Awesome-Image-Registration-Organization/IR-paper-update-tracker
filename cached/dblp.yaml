  title: Landmark matching based retinal image alignment by enforcing sparsity in
    correspondence matrix.
  venue: Medical Image Anal.
  year: '2014'
  type: Journal Articles
  access: closed
  key: journals/mia/ZhengDHXGLMBG14
  doi: 10.1016/J.MEDIA.2013.09.009
  ee: https://doi.org/10.1016/j.media.2013.09.009
  url: https://dblp.org/rec/journals/mia/ZhengDHXGLMBG14
  abstract: Retinal image alignment is fundamental to many applications in diagnosis
    of eye diseases. In this paper, we address the problem of landmark matching based
    retinal image alignment. We propose a novel landmark matching formulation by enforcing
    sparsity in the correspondence matrix and offer its solutions based on linear
    programming. The proposed formulation not only enables a joint estimation of the
    landmark correspondences and a predefined transformation model but also combines
    the benefits of the soft assign strategy (Chui and Rangarajan, 2003) and the combinatorial
    optimization of linear programming. We also introduced a set of reinforced self-similarities
    descriptors which can better characterize local photometric and geometric properties
    of the retinal image. Theoretical analysis and experimental results with both
    fundus color images and angiogram images show the superior performances of our
    algorithms to several state-of-the-art techniques.
