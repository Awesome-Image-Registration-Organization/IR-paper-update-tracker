- author: Wan-Lei Zhao, Hervé Jégou, Guillaume Gravier
  title: 'Sim-min-hash: an efficient matching technique for linking large image collections.'
  venue: ACM Multimedia
  year: '2013'
  type: Conference and Workshop Papers
