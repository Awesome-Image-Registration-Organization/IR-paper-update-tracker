- author: Ségolène Tiffany Martin, Anne Gagneux, Paul Hagemann, Gabriele Steidl
  title: 'PnP-Flow: Plug-and-Play Image Restoration with Flow Matching.'
  venue: ICLR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/iclr/MartinGHS25
  doi: 10.1109/wacv61042.2026.00480
  ee: https://openreview.net/forum?id=5AtHrq3B5R
  url: https://dblp.org/rec/conf/iclr/MartinGHS25
  abstract: Flow matching has emerged as a promising generative approach that addresses
    the lengthy sampling times associated with state-of-the-art diffusion models and
    enables a more flexible trajectory design, while maintaining high-quality image
    generation. This capability makes it suitable as a generative prior for image
    restoration tasks. Although current methods leveraging flow models have shown
    promising results in restoration, some still suffer from long processing times
    or produce over-smoothed results. To address these challenges, we introduce Restora-Flow,
    a training-free method that guides flow matching sampling by a degradation mask
    and incorporates a trajectory correction mechanism to enforce consistency with
    degraded inputs. We evaluate our approach on both natural and medical datasets
    across several image restoration tasks involving a mask-based degradation, i.e.,
    inpainting, super-resolution and denoising. We show superior perceptual quality
    and processing time compared to diffusion and flow matching-based reference methods.
    Code is available at https://github.com/imigraz/Restora-Flow.
  related_code: https://github.com/imigraz/Restora-Flow
- author: Yixuan Zhu, Haolin Wang 0006, Ao Li, Wenliang Zhao, Yansong Tang, Jingxuan
    Niu, Lei Chen 0069, Jie Zhou 0001, Jiwen Lu
  title: 'InstaRevive: One-Step Image Enhancement via Dynamic Score Matching.'
  venue: ICLR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/iclr/ZhuWLZTN00L25
  doi: ''
  ee: https://openreview.net/forum?id=G1CN7R5qwE
  url: https://dblp.org/rec/conf/iclr/ZhuWLZTN00L25
  abstract: Image enhancement finds wide-ranging applications in real-world scenarios
    due to complex environments and the inherent limitations of imaging devices. Recent
    diffusion-based methods yield promising outcomes but necessitate prolonged and
    computationally intensive iterative sampling. In response, we propose InstaRevive,
    a straightforward yet powerful image enhancement framework that employs score-based
    diffusion distillation to harness potent generative capability and minimize the
    sampling steps. To fully exploit the potential of the pre-trained diffusion model,
    we devise a practical and effective diffusion distillation pipeline using dynamic
    control to address inaccuracies in updating direction during score matching. Our
    control strategy enables a dynamic diffusing scope, facilitating precise learning
    of denoising trajectories within the diffusion model and ensuring accurate distribution
    matching gradients during training. Additionally, to enrich guidance for the generative
    power, we incorporate textual prompts via image captioning as auxiliary conditions,
    fostering further exploration of the diffusion model. Extensive experiments substantiate
    the efficacy of our framework across a diverse array of challenging tasks and
    datasets, unveiling the compelling efficacy and efficiency of InstaRevive in delivering
    high-quality and visually appealing results. Code is available at https://github.com/EternalEvan/InstaRevive.
  related_code: https://github.com/EternalEvan/InstaRevive
- author: Xuelun Shen, Zhipeng Cai 0003, Wei Yin 0006, Matthias Müller 0011, Zijun
    Li 0006, Kaixuan Wang, Xiaozhi Chen, Cheng Wang 0003
  title: 'GIM: Learning Generalizable Image Matcher From Internet Videos.'
  venue: ICLR
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/iclr/ShenC000WC024
  doi: ''
  ee: https://openreview.net/forum?id=NYN1b8GRGS
  url: https://dblp.org/rec/conf/iclr/ShenC000WC024
  abstract: Image matching is a fundamental computer vision problem. While learning-based
    methods achieve state-of-the-art performance on existing benchmarks, they generalize
    poorly to in-the-wild images. Such methods typically need to train separate models
    for different scene types and are impractical when the scene type is unknown in
    advance. One of the underlying problems is the limited scalability of existing
    data construction pipelines, which limits the diversity of standard image matching
    datasets. To address this problem, we propose GIM, a self-training framework for
    learning a single generalizable model based on any image matching architecture
    using internet videos, an abundant and diverse data source. Given an architecture,
    GIM first trains it on standard domain-specific datasets and then combines it
    with complementary matching methods to create dense labels on nearby frames of
    novel videos. These labels are filtered by robust fitting, and then enhanced by
    propagating them to distant frames. The final model is trained on propagated data
    with strong augmentations. We also propose ZEB, the first zero-shot evaluation
    benchmark for image matching. By mixing data from diverse domains, ZEB can thoroughly
    assess the cross-domain generalization performance of different methods. Applying
    GIM consistently improves the zero-shot performance of 3 state-of-the-art image
    matching architectures; with 50 hours of YouTube videos, the relative zero-shot
    performance improves by 8.4%-18.1%. GIM also enables generalization to extreme
    cross-domain data such as Bird Eye View (BEV) images of projected 3D point clouds
    (Fig. 1(c)). More importantly, our single zero-shot model consistently outperforms
    domain-specific baselines when evaluated on downstream tasks inherent to their
    respective domains. The video presentation is available at https://www.youtube.com/watch?v=FU_MJLD8LeY.
  related_code: ''
- author: Alexia Jolicoeur-Martineau, Rémi Piché-Taillefer, Ioannis Mitliagkas, Remi
    Tachet des Combes
  title: Adversarial score matching and improved sampling for image generation.
  venue: ICLR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/iclr/Jolicoeur-Martineau21
  doi: ''
  ee: https://openreview.net/forum?id=eLfqMl3z3lq
  url: https://dblp.org/rec/conf/iclr/Jolicoeur-Martineau21
  abstract: 'Denoising Score Matching with Annealed Langevin Sampling (DSM-ALS) has
    recently found success in generative modeling. The approach works by first training
    a neural network to estimate the score of a distribution, and then using Langevin
    dynamics to sample from the data distribution assumed by the score network. Despite
    the convincing visual quality of samples, this method appears to perform worse
    than Generative Adversarial Networks (GANs) under the Fréchet Inception Distance,
    a standard metric for generative models. We show that this apparent gap vanishes
    when denoising the final Langevin samples using the score network. In addition,
    we propose two improvements to DSM-ALS: 1) Consistent Annealed Sampling as a more
    stable alternative to Annealed Langevin Sampling, and 2) a hybrid training formulation,
    composed of both Denoising Score Matching and adversarial objectives. By combining
    these two techniques and exploring different network architectures, we elevate
    score matching methods and obtain results competitive with state-of-the-art image
    generation on CIFAR-10.'
  related_code: ''
