- author: Christophe Grova, Arnaud Biraben, Jean-Marie Scarabin, Pierre Jannin, Irène
    Buvat, Habib Benali, Bernard Gibaud
  title: A Methodology to Validate MRI/SPECT Registration Methods Using Realistic
    Simulated SPECT Data.
  venue: MICCAI
  year: '2001'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/GrovaBSJBBG01
  doi: 10.1007/3-540-45468-3_33
  ee: https://doi.org/10.1007/3-540-45468-3_33
  url: https://dblp.org/rec/conf/miccai/GrovaBSJBBG01
  abstract: 'We present a method to validate MRI/SPECT registration methods based
    on a set of computer-generated SPECT data. The data set was produced through Monte
    Carlo simulations from an attenuation map and an activity map derived from a manually
    labeled T1-weighted MRI data set.Our approach intrinsically provides a gold standard
    to assess MRI/SPECT registration methods. It was successfully applied to the comparison
    of four registration methods based on similarity measurements: Mutual Information,
    Normalised Mutual Information, Correlation Ratio and Woods Criterion.'
