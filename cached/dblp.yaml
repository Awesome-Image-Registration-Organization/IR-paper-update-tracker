- author: Kyu-Yul Lee, Jae-Young Sim
  title: Warping Residual Based Image Stitching for Large Parallax.
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/LeeS20
  doi: 10.1109/CVPR42600.2020.00822
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Lee_Warping_Residual_Based_Image_Stitching_for_Large_Parallax_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/LeeS20
  abstract: Image stitching techniques align two images captured at different viewing
    positions onto a single wider image. When the captured 3D scene is not planar
    and the camera baseline is large, two images exhibit parallax where the relative
    positions of scene structures are quite different from each view. The existing
    image stitching methods often fail to work on the images with large parallax.
    In this paper, we propose an image stitching algorithm robust to large parallax
    based on the novel concept of warping residuals. We first estimate multiple homographies
    and find their inlier feature matches between two images. Then we evaluate warping
    residual for each feature match with respect to the multiple homographies. To
    alleviate the parallax artifacts, we partition input images into superpixels and
    warp each superpixel adaptively according to an optimal homography which is computed
    by minimizing the error of feature matches weighted by the warping residuals.
    Experimental results demonstrate that the proposed algorithm provides accurate
    stitching results for images with large parallax, and outperforms the existing
    methods qualitatively and quantitatively.
  related_code: ''
- author: Ries Uittenbogaard, Clint Sebastian, Julien A. Vijverberg, Bas Boom, Dariu
    M. Gavrila, Peter H. N. de With
  title: Privacy Protection in Street-View Panoramas Using Depth and Multi-View Imagery.
  venue: CVPR
  year: '2019'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/UittenbogaardSV19
  doi: 10.1109/CVPR.2019.01083
  ee: http://openaccess.thecvf.com/content_CVPR_2019/html/Uittenbogaard_Privacy_Protection_in_Street-View_Panoramas_Using_Depth_and_Multi-View_Imagery_CVPR_2019_paper.html
  url: https://dblp.org/rec/conf/cvpr/UittenbogaardSV19
  abstract: The current paradigm in privacy protection in street-view images is to
    detect and blur sensitive information. In this paper, we propose a framework that
    is an alternative to blurring, which automatically removes and inpaints moving
    objects (e.g. pedestrians, vehicles) in street-view imagery. We propose a novel
    moving object segmentation algorithm exploiting consistencies in depth across
    multiple street-view images that are later combined with the results of a segmentation
    network. The detected moving objects are removed and inpainted with information
    from other views, to obtain a realistic output image such that the moving object
    is not visible anymore. We evaluate our results on a dataset of 1000 images to
    obtain a peak noise-to-signal ratio (PSNR) and L 1 loss of 27.2 dB and 2.5%, respectively.
    To assess overall quality, we also report the results of a survey conducted on
    35 professionals, asked to visually inspect the images whether object removal
    and inpainting had taken place. The inpainting dataset will be made publicly available
    for scientific benchmarking purposes at https://research.cyclomedia.com/.
  related_code: ''
- author: Yang Yang, Shi Jin, Ruiyang Liu, Sing Bing Kang, Jingyi Yu 0001
  title: Automatic 3D Indoor Scene Modeling From Single Panorama.
  venue: CVPR
  year: '2018'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/YangJLKY18
  doi: 10.1109/CVPR.2018.00413
  ee: http://openaccess.thecvf.com/content_cvpr_2018/html/Yang_Automatic_3D_Indoor_CVPR_2018_paper.html
  url: https://dblp.org/rec/conf/cvpr/YangJLKY18
  abstract: We describe a system that automatically extracts 3D geometry of an indoor
    scene from a single 2D panorama. Our system recovers the spatial layout by finding
    the floor, walls, and ceiling; it also recovers shapes of typical indoor objects
    such as furniture. Using sampled perspective sub-views, we extract geometric cues
    (lines, vanishing points, orientation map, and surface normals) and semantic cues
    (saliency and object detection information). These cues are used for ground plane
    estimation and occlusion reasoning. The global spatial layout is inferred through
    a constraint graph on line segments and planar superpixels. The recovered layout
    is then used to guide shape estimation of the remaining objects using their normal
    information. Experiments on synthetic and real datasets show that our approach
    is state-of-the-art in both accuracy and efficiency. Our system can handle cluttered
    scenes with complex geometry that are challenging to existing techniques.
