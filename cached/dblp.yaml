- author: Xiaoding Yuan, Shitao Tang, Kejie Li, Peng Wang
  title: 'CamFreeDiff: Camera-free Image to Panorama Generation with Diffusion Model.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/YuanTLW25
  doi: 10.1109/CVPR52734.2025.01530
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Yuan_CamFreeDiff_Camera-free_Image_to_Panorama_Generation_with_Diffusion_Model_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/YuanTLW25
  abstract: This paper introduces Camera-free Diffusion (CamFreeDiff) model for 360°
    image outpainting from a single camera-free image and text description. This method
    distinguishes itself from existing strategies, such as MVDiffusion, by eliminating
    the requirement for predefined camera poses. CamFreeDiff seamlessly incorporates
    a mechanism for predicting homography within the multi-view diffusion framework.
    The key component of our approach is to formulate camera estimation by directly
    predicting the homography transformation from the input view to the predefined
    canonical view. In contrast to the direct two-stage approach of image transformation
    and outpainting, CamFreeDiff utilizes predicted homography to establish point-level
    correspondences between the input view and the target panoramic view. This enables
    consistency through correspondence-aware attention, which is learned in a fully
    differentiable manner. Qualitative and quantitative experimental results demonstrate
    the strong robustness and performance of CamFreeDiff for 360° image outpainting
    in the challenging context of camera-free inputs.
