- author: Diana Mateus, Radu Horaud, David Knossow, Fabio Cuzzolin, Edmond Boyer
  title: Articulated shape matching using Laplacian eigenfunctions and unsupervised
    point registration.
  venue: CVPR
  year: '2008'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/MateusHKCB08
  doi: 10.1109/CVPR.2008.4587538
  ee: https://doi.org/10.1109/CVPR.2008.4587538
  url: https://dblp.org/rec/conf/cvpr/MateusHKCB08
  abstract: Matching articulated shapes represented by voxel-sets reduces to maximal
    sub-graph isomorphism when each set is described by a weighted graph. Spectral
    graph theory can be used to map these graphs onto lower dimensional spaces and
    match shapes by aligning their embeddings in virtue of their invariance to change
    of pose. Classical graph isomorphism schemes relying on the ordering of the eigenvalues
    to align the eigenspaces fail when handling large data-sets or noisy data. We
    derive a new formulation that finds the best alignment between two congruent K-dimensional
    sets of points by selecting the best subset of eigenfunctions of the Laplacian
    matrix. The selection is done by matching eigenfunction signatures built with
    histograms, and the retained set provides a smart initialization for the alignment
    problem with a considerable impact on the overall performance. Dense shape matching
    casted into graph matching reduces then, to point registration of embeddings under
    orthogonal transformations; the registration is solved using the framework of
    unsupervised clustering and the EM algorithm. Maximal subset matching of non identical
    shapes is handled by defining an appropriate outlier class. Experimental results
    on challenging examples show how the algorithm naturally treats changes of topology,
    shape variations and different sampling densities.
  related_code: ''
- author: Carl Olsson, Olof Enqvist, Fredrik Kahl
  title: A polynomial-time bound for matching and registration with outliers.
  venue: CVPR
  year: '2008'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/OlssonEK08
  doi: 10.1109/CVPR.2008.4587757
  ee: https://doi.org/10.1109/CVPR.2008.4587757
  url: https://dblp.org/rec/conf/cvpr/OlssonEK08
  abstract: We propose a robust approach for the registration of two sets of 3D points
    in the presence of a large amount of outliers. Our first contribution is to reformulate
    the registration problem using a Truncated Least Squares (TLS) cost that makes
    the estimation insensitive to a large fraction of spurious point-to-point correspondences.
    The second contribution is a general framework to decouple rotation, translation,
    and scale estimation, which allows solving in cascade for the three transformations.
    Since each subproblem (scale, rotation, and translation estimation) is still non-convex
    and combinatorial in nature, out third contribution is to show that (i) TLS scale
    and (component-wise) translation estimation can be solved exactly and in polynomial
    time via an adaptive voting scheme, (ii) TLS rotation estimation can be relaxed
    to a semidefinite program and the relaxation is tight in practice, even in the
    presence of an extreme amount of outliers. We validate the proposed algorithm,
    named TEASER (Truncated least squares Estimation And SEmidefinite Relaxation),
    in standard registration benchmarks showing that the algorithm outperforms RANSAC
    and robust local optimization techniques, and favorably compares with Branch-and-Bound
    methods, while being a polynomial-time algorithm. TEASER can tolerate up to 99%
    outliers and returns highly-accurate solutions.
