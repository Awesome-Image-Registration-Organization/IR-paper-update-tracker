- author: Yaxiong Wang, Lianwei Wu, Lechao Cheng, Zhun Zhong, Yujiao Wu, Meng Wang
    0001
  title: 'Beyond General Alignment: Fine-Grained Entity-Centric Image-Text Matching
    with Multimodal Attentive Experts.'
  venue: SIGIR
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/sigir/WangWCZW025
  doi: 10.1145/3726302.3729902
  ee: https://doi.org/10.1145/3726302.3729902
  url: https://dblp.org/rec/conf/sigir/WangWCZW025
  abstract: 'Recent progress in aligning images with texts has achieved remarkable
    results, however, existing models tend to serve general queries and often fall
    short when dealing with detailed query requirements. In this paper, we work towards
    Entity-centric Image-Text Matching (EITM), a finer-grained image-text matching
    task that aligns texts and images centered around specific entities. The main
    challenge in EITM lies in bridging the substantial semantic gap between entity-related
    information in texts and images, which is more pronounced than in general image-text
    matching problems. To address this challenge, we adopt CLIP as our foundational
    model and devise a Multimodal Attentive Experts (MMAE)-based contrastive learning
    to adapt CLIP into an expert for EITM problem. Particularly, the core of our multimodal
    attentive experts learning is to generate explanation texts by Large Language
    Models (LLMs) as bridging clues. In specific, we first employ off-the-shelf LLMs
    to generate explanatory text. This text, along with the original image and text,
    is then fed into our Multimodal Attentive Experts module to narrow the semantic
    gap within a unified semantic space. Upon the enriched feature representations
    generated by MMAE, we have further developed an effective Gated Integrative Image-text
    Matching (GI-ITM) strategy. GI-ITM utilizes an adaptive gating mechanism to combine
    features from MMAE, followed by applying image-text matching constraints to enhance
    the alignment precision. Our method has been extensively evaluated on three social
    media news benchmarks: N24News, VisualNews, and GoodNews. The experimental results
    demonstrate that our approach significantly outperforms competing methods. Our
    code is available at: https://github.com/wangyxxjtu/ETE.'
  related_code: https://github.com/wangyxxjtu/ETE
- author: Dehong Gao, Linbo Jin, Ben Chen, Minghui Qiu, Peng Li 0056, Yi Wei, Yi Hu,
    Hao Wang 0005
  title: 'FashionBERT: Text and Image Matching with Adaptive Loss for Cross-modal
    Retrieval.'
  venue: SIGIR
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/sigir/GaoJCQLWHW20
  doi: 10.1145/3397271.3401430
  ee: https://doi.org/10.1145/3397271.3401430
  url: https://dblp.org/rec/conf/sigir/GaoJCQLWHW20
  abstract: In this paper, we address the text and image matching in cross-modal retrieval
    of the fashion industry. Different from the matching in the general domain, the
    fashion matching is required to pay much more attention to the fine-grained information
    in the fashion images and texts. Pioneer approaches detect the region of interests
    (i.e., RoIs) from images and use the RoI embeddings as image representations.
    In general, RoIs tend to represent the "object-level" information in the fashion
    images, while fashion texts are prone to describe more detailed information, e.g.
    styles, attributes. RoIs are thus not fine-grained enough for fashion text and
    image matching. To this end, we propose FashionBERT, which leverages patches as
    image features. With the pre-trained BERT model as the backbone network, FashionBERT
    learns high level representations of texts and images. Meanwhile, we propose an
    adaptive loss to trade off multitask learning in the FashionBERT modeling. Two
    tasks (i.e., text and image matching and cross-modal retrieval) are incorporated
    to evaluate FashionBERT. On the public dataset, experiments demonstrate FashionBERT
    achieves significant improvements in performances than the baseline and state-of-the-art
    approaches. In practice, FashionBERT is applied in a concrete cross-modal retrieval
    application. We provide the detailed matching performance and inference efficiency
    analysis.
  related_code: ''
