- author: Eleonora D&apos;Arnese, Davide Conficconi, Emanuele Del Sozzo, Luigi Fusco,
    Donatella Sciuto, Marco Domenico Santambrogio
  title: 'Faber: A Hardware/SoftWare Toolchain for Image Registration.'
  venue: IEEE Trans. Parallel Distributed Syst.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/tpds/DArneseCSFSS23
  doi: 10.1109/TPDS.2022.3218898
  ee: https://doi.org/10.1109/TPDS.2022.3218898
  url: https://dblp.org/rec/journals/tpds/DArneseCSFSS23
  abstract: Image registration is a well-defined computation paradigm widely applied
    to align one or more images to a target image. This paradigm, which builds upon
    three main components, is particularly compute-intensive and represents many image
    processing pipelines’ bottlenecks. State-of-the-art solutions leverage hardware
    acceleration to speed up image registration, but they are usually limited to implementing
    a single component. We present Faber, an open-source HW/SW CAD toolchain tailored
    to image registration. The Faber toolchain comprises HW/SW highly-tunable registration
    components, supports users with different expertise in building custom pipelines,
    and automates the design process. In this direction, Faber provides both default
    settings for entry-level users and latency and resource models to guide HW experts
    in customizing the different components. Finally, Faber achieves from 1.5× to
    54× in speedup and from 2× to 177× in energy efficiency against state-of-the-art
    tools on a Xeon Gold.
- author: Marcin Copik, Tobias Grosser, Torsten Hoefler, Paolo Bientinesi, Benjamin
    Berkels
  title: 'Work-Stealing Prefix Scan: Addressing Load Imbalance in Large-Scale Image
    Registration.'
  venue: IEEE Trans. Parallel Distributed Syst.
  year: '2022'
  type: Journal Articles
  access: closed
  key: journals/tpds/CopikGHBB22
  doi: 10.1109/TPDS.2021.3095230
  ee: https://doi.org/10.1109/TPDS.2021.3095230
  url: https://dblp.org/rec/journals/tpds/CopikGHBB22
  abstract: Parallelism patterns (e.g., map or reduce) have proven to be effective
    tools for parallelizing high-performance applications. In this article, we study
    the recursive registration of a series of electron microscopy images – a time
    consuming and imbalanced computation necessary for nano-scale microscopy analysis.
    We show that by translating the image registration into a specific instance of
    the prefix scan, we can convert this seemingly sequential problem into a parallel
    computation that scales to over thousand of cores. We analyze a variety of scan
    algorithms that behave similarly for common low-compute operators and propose
    a novel work-stealing procedure for a hierarchical prefix scan. Our evaluation
    shows that by identifying a suitable and well-optimized prefix scan algorithm,
    we reduce time-to-solution on a series of 4,096 images spanning ten seconds of
    microscopy acquisition from over 10 hours to less than 3 minutes (using 1024 Intel
    Haswell cores), enabling derivation of material properties at nanoscale for long
    microscopy image series.
- author: Junhao Wu 0002, Xuan Yang, Zhengrui Zhang, Guoliang Chen 0005, Rui Mao 0001
  title: 'A Performance Model for GPU Architectures that Considers On-Chip Resources:
    Application to Medical Image Registration.'
  venue: IEEE Trans. Parallel Distributed Syst.
  year: '2019'
  type: Journal Articles
  access: open
  key: journals/tpds/WuYZCM19
  doi: 10.1109/TPDS.2019.2905213
  ee: https://doi.org/10.1109/TPDS.2019.2905213
  url: https://dblp.org/rec/journals/tpds/WuYZCM19
  abstract: Graphics processing units (GPUs) have become extremely important devices
    for accelerating computing performance in many applications. However, there have
    been few accurate models to estimate the performance of such applications running
    on modern GPUs. In this paper, we propose a performance model to estimate the
    execution times for massively parallel programs running on NVIDIA GPUs, one that
    takes on-chip resources and cost of data transfer between CPU and GPU into consideration.
    Four different GPUs with different architectures were used to evaluate our model.
    We demonstrated the effectiveness of the proposed model by applying it to various
    tasks in medical image registration. Experiments have demonstrated that by capturing
    on-chip GPU resources and data transfer time with our model, we were able to obtain
    a more accurate prediction of the actual running time, compared to the traditional
    model. Moreover, by using the optimal value of the block size parameter, estimated
    by our model, to accelerate the landmark tracking task on GPU devices, speedups
    of approximately 80×, 100×, 200× and 800×, on the C2050, K20c, M5000 and P100
    can be achieved, making it possible to track massive numbers of landmarks and
    thereby improving the registration accuracy.
