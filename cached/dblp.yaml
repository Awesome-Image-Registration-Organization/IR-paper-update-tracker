- author: Jie Zhou, Xinke Ma, Li Liang 0006, Liu Yuhe, Shijin Xu, Sim Heng Ong, Yang
    Yang 0032
  title: Robust Variational Bayesian Point Set Registration.
  venue: ICCV
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ZhouMLYXO019
  doi: 10.1109/ICCV.2019.01000
