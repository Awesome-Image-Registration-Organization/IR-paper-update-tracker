- author: Jana Hutter, Daan Christiaens, Torben Schneider, Lucilio Cordero-Grande,
    Paddy Slator, Maria Deprez, Anthony N. Price, Jacques-Donald Tournier, Mary A.
    Rutherford, Joseph V. Hajnal
  title: Slice-level diffusion encoding for motion and distortion correction.
  venue: Medical Image Anal.
  year: '2018'
  type: Journal Articles
  access: open
  key: journals/mia/HutterCSCSDPTRH18
  doi: 10.1016/J.MEDIA.2018.06.008
  ee: https://doi.org/10.1016/j.media.2018.06.008
  url: https://dblp.org/rec/journals/mia/HutterCSCSDPTRH18
  abstract: HighlightsBreaks the conventional one‐volume one‐encoding paradigm in
    diffusion MRI.Higher temporal sampling of anatomically reliable b0 slices.Allows
    more robust distortion and motion correction.Additional benefits include quicker
    scans by reduced thermal heating. Graphical abstract Figure. No caption available.
    ABSTRACT Advances in microstructural modelling are leading to growing requirements
    on diffusion MRI acquisitions, namely sensitivity to smaller structures and better
    resolution of the geometric orientations. The resulting acquisitions contain highly
    attenuated images that present particular challenges when there is motion and
    geometric distortion. This study proposes to address these challenges by breaking
    with the conventional one‐volume‐one‐encoding paradigm employed in conventional
    diffusion imaging using single‐shot Echo Planar Imaging. By enabling free choice
    of the diffusion encoding on the slice level, a higher temporal sampling of slices
    with low b‐value can be achieved. These allow more robust motion correction, and
    in combination with a second reversed phase‐encoded echo, also dynamic distortion
    correction. These proposed advances are validated on phantom and adult experiments
    and employed in a study of eight foetal subjects. Equivalence in obtained diffusion
    quantities with the conventional method is demonstrated as well as benefits in
    distortion and motion correction. The resulting capability can be combined with
    any acquisition parameters including multiband imaging and allows application
    to diffusion MRI studies in general.
