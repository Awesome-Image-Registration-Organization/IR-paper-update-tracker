  doi: 10.1609/AAAI.V36I2.20083
  ee: https://doi.org/10.1609/aaai.v36i2.20083
  url: https://dblp.org/rec/conf/aaai/LuoYLLFL22
  abstract: Estimating per-pixel motion between video frames, known as optical flow,
    is a long-standing problem in video understanding and analysis. Most contemporary
    optical flow techniques largely focus on addressing the cross-image matching with
    feature similarity, with few methods considering how to explicitly reason over
    the given scene for achieving a holistic motion understanding. In this work, taking
    a fresh perspective, we introduce a novel graph-based approach, called adaptive
    graph reasoning for optical flow (AGFlow), to emphasize the value of scene/context
    information in optical flow. Our key idea is to decouple the context reasoning
    from the matching procedure, and exploit scene information to effectively assist
    motion estimation by learning to reason over the adaptive graph. The proposed
    AGFlow can effectively exploit the context information and incorporate it within
    the matching procedure, producing more robust and accurate results. On both Sintel
    clean and final passes, our AGFlow achieves the best accuracy with EPE of 1.43
    and 2.47 pixels, outperforming state-of-the-art approaches by 11.2% and 13.6%,
    respectively. Code is publicly available at https://github.com/megvii-research/AGFlow.
  related_code: https://github.com/megvii-research/AGFlow
- author: Kaihong Wang, Kumar Akash, Teruhisa Misu
  title: Learning Temporally and Semantically Consistent Unpaired Video-to-Video Translation
    through Pseudo-Supervision from Synthetic Optical Flow.
  venue: AAAI
  year: '2022'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/WangAM22
  doi: 10.1609/AAAI.V36I3.20148
  ee: https://doi.org/10.1609/aaai.v36i3.20148
  url: https://dblp.org/rec/conf/aaai/WangAM22
  abstract: 'Unpaired video-to-video translation aims to translate videos between
    a source and a target domain without the need of paired training data, making
    it more feasible for real applications. Unfortunately, the translated videos generally
    suffer from temporal and semantic inconsistency. To address this, many existing
    works adopt spatiotemporal consistency constraints incorporating temporal information
    based on motion estimation. However, the inaccuracies in the estimation of motion
    deteriorate the quality of the guidance towards spatiotemporal consistency, which
    leads to unstable translation. In this work, we propose a novel paradigm that
    regularizes the spatiotemporal consistency by synthesizing motions in input videos
    with the generated optical flow instead of estimating them. Therefore, the synthetic
    motion can be applied in the regularization paradigm to keep motions consistent
    across domains without the risk of errors in motion estimation. Thereafter, we
    utilize our unsupervised recycle and unsupervised spatial loss, guided by the
    pseudo-supervision provided by the synthetic optical flow, to accurately enforce
    spatiotemporal consistency in both domains. Experiments show that our method is
    versatile in various scenarios and achieves state-of-the-art performance in generating
    temporally and semantically consistent videos. Code is available at: https://github.com/wangkaihong/Unsup_Recycle_GAN/.'
  related_code: https://github.com/wangkaihong/Unsup_Recycle_GAN/
- author: Dawit Mureja Argaw, Junsik Kim 0001, François Rameau, Jae-Won Cho, In So
    Kweon
  title: Optical Flow Estimation from a Single Motion-blurred Image.
  venue: AAAI
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ArgawKRCK21
  doi: 10.1609/AAAI.V35I2.16172
  ee: https://doi.org/10.1609/aaai.v35i2.16172
  url: https://dblp.org/rec/conf/aaai/ArgawKRCK21
  abstract: In most of computer vision applications, motion blur is regarded as an
    undesirable artifact. However, it has been shown that motion blur in an image
    may have practical interests in fundamental computer vision problems. In this
    work, we propose a novel framework to estimate optical flow from a single motion-blurred
    image in an end-to-end manner. We design our network with transformer networks
    to learn globally and locally varying motions from encoded features of a motion-blurred
    input, and decode left and right frame features without explicit frame supervision.
    A flow estimator network is then used to estimate optical flow from the decoded
    features in a coarse-to-fine manner. We qualitatively and quantitatively evaluate
    our model through a large set of experiments on synthetic and real motion-blur
    datasets. We also provide in-depth analysis of our model in connection with related
    approaches to highlight the effectiveness and favorability of our approach. Furthermore,
    we showcase the applicability of the flow estimated by our method on deblurring
    and moving object segmentation tasks.
