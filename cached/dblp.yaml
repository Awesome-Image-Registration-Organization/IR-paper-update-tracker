- author: Xiuwei Zhang 0001, Yi Sun, Yamin Han, Yanping Li, Hanlin Yin, Yinghui Xing,
    Yanning Zhang 0001
  title: 'SSML-QNet: Scale-Separative Metric Learning Quadruplet Network for Multi-modal
    Image Patch Matching.'
  venue: IJCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: open
