- author: Maxime Taquet, Benoit Scherrer, Olivier Commowick, Jurriaan M. Peters, Mustafa
    Sahin, Benoît Macq, Simon K. Warfield
  title: Registration and Analysis of White Matter Group Differences with a Multi-fiber
    Model.
  venue: MICCAI
  year: '2012'
  type: Conference and Workshop Papers
  access: open
  key: conf/miccai/TaquetSCPSMW12
  doi: 10.1007/978-3-642-33454-2_39
  ee: https://doi.org/10.1007/978-3-642-33454-2_39
  url: https://dblp.org/rec/conf/miccai/TaquetSCPSMW12
  abstract: Diffusion magnetic resonance imaging has been used extensively to probe
    the white matter in vivo. Typically, the raw diffusion images are used to reconstruct
    a diffusion tensor image (DTI). The in-capacity of DTI to represent crossing fibers
    leaded to the development of more sophisticated diffusion models. Among them,
    multi-fiber models represent each fiber bundle independently, allowing the direct
    extraction of diffusion features for population analysis. However, no method exists
    to properly register multi-fiber models, seriously limiting their use in group
    comparisons. This paper presents a registration and atlas construction method
    for multi-fiber models. The validity of the registration is demonstrated on a
    dataset of 45 subjects, including both healthy and unhealthy subjects. Morphometry
    analysis and tract-based statistics are then carried out, proving that multi-fiber
    models registration is better at detecting white matter local differences than
    single tensor registration.
