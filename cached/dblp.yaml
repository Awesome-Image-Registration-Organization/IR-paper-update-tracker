- author: Yan Huang 0008, Yuming Wang, Liang Wang 0001
  title: Efficient Image and Sentence Matching.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/HuangWW23
  doi: 10.1109/TPAMI.2022.3178485
  ee: https://doi.org/10.1109/TPAMI.2022.3178485
  url: https://dblp.org/rec/journals/pami/HuangWW23
  abstract: 'Recently, the accuracy of image and sentence matching has been continuously
    improved by larger and larger models. However, such large models not only need
    huge storage space but also slow down inference speed, which are not very suitable
    for low-cost devices in real-world applications. To our knowledge, this work makes
    the first attempt to improve the model efficiency in the context of image and
    sentence matching, and accordingly proposes a simple yet effective Whitened Similarity
    Distillation (WSD) method, which can distill cross-modal knowledge from a large
    teacher model to a small student model of both high efficiency and accuracy. The
    high efficiency is achieved by performing: 1) feature representation based on
    efficient backbone networks; and 2) similarity measurement in a fast N-to-N manner.
    However, the accuracy of such a student model is much worse than that of teacher
    model, because there exists very large variation inconsistency between two cross-modal
    similarity matrices of teacher and student models, which is hard to reduce during
    the similarity distillation. By performing two whitening-like transformations
    in the orthogonal space, the proposed WSD can reduce the large variation inconsistency
    more isotropically and is able to improve the accuracy of student model. We perform
    extensive experiments on two benchmark datasets and demonstrate the effectiveness
    of the proposed WSD. Compared with the teacher model, our distilled student model
    is 7× smaller (in model size) and 9× faster (in testing speed), only at the cost
    of $2% accuracy decrease.'
  related_code: ''
- author: Yuming Jiang 0003, Kelvin C. K. Chan, Xintao Wang 0002, Chen Change Loy,
    Ziwei Liu 0002
  title: Reference-Based Image and Video Super-Resolution via $C{2}$-Matching.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/pami/JiangCWLL23
  doi: 10.1109/TPAMI.2022.3231089
  ee: https://doi.org/10.1109/TPAMI.2022.3231089
  url: https://dblp.org/rec/journals/pami/JiangCWLL23
  abstract: 'Reference-based Super-Resolution (Ref-SR) has recently emerged as a promising
    paradigm to enhance a low-resolution (LR) input image or video by introducing
    an additional high-resolution (HR) reference image. Existing Ref-SR methods mostly
    rely on implicit correspondence matching to borrow HR textures from reference
    images to compensate for the information loss in input images. However, performing
    local transfer is difficult because of two gaps between input and reference images:
    the transformation gap (e.g., scale and rotation) and the resolution gap (e.g.,
    HR and LR). To tackle these challenges, we propose $C^{2}$C2-Matching in this
    work, which performs explicit robust matching crossing transformation and resolution.
    1) To bridge the transformation gap, we propose a contrastive correspondence network,
    which learns transformation-robust correspondences using augmented views of the
    input image. 2) To address the resolution gap, we adopt teacher-student correlation
    distillation, which distills knowledge from the easier HR-HR matching to guide
    the more ambiguous LR-HR matching. 3) Finally, we design a dynamic aggregation
    module to address the potential misalignment issue between input images and reference
    images. In addition, to faithfully evaluate the performance of Reference-based
    Image Super-Resolution (Ref Image SR) under a realistic setting, we contribute
    the Webly-Referenced SR (WR-SR) dataset, mimicking the practical usage scenario.
    We also extend $C^{2}$C2-Matching to Reference-based Video Super-Resolution (Ref
    VSR) task, where an image taken in a similar scene serves as the HR reference
    image. Extensive experiments demonstrate that our proposed $C^{2}$C2-Matching
    significantly outperforms state of the arts by up to 0.7 dB on the standard CUFED5
    benchmark and also boosts the performance of video super-resolution by incorporating
    the $C^{2}$C2-Matching component into Video SR pipelines. Notably, $C^{2}$C2-Matching
    also shows great generalizability on WR-SR dataset as well as robustness across
    large scale and rotation transformations. Codes and datasets are available at
    https://github.com/yumingj/C2-Matching.'
