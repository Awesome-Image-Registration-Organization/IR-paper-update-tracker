- author: Samuel St-Jean, Pierrick Coupé, Maxime Descoteaux
  title: 'Non Local Spatial and Angular Matching: Enabling higher spatial resolution
    diffusion MRI datasets through adaptive denoising.'
  venue: Medical Image Anal.
  year: '2016'
  type: Journal Articles
  access: closed
  key: journals/mia/St-JeanCD16
  doi: 10.1016/J.MEDIA.2016.02.010
  ee: https://doi.org/10.1016/j.media.2016.02.010
  url: https://dblp.org/rec/journals/mia/St-JeanCD16
  abstract: Diffusion magnetic resonance imaging (MRI) datasets suffer from low Signal-to-Noise
    Ratio (SNR), especially at high b-values. Acquiring data at high b-values contains
    relevant information and is now of great interest for microstructural and connectomics
    studies. High noise levels bias the measurements due to the non-Gaussian nature
    of the noise, which in turn can lead to a false and biased estimation of the diffusion
    parameters. Additionally, the usage of in-plane acceleration techniques during
    the acquisition leads to a spatially varying noise distribution, which depends
    on the parallel acceleration method implemented on the scanner. This paper proposes
    a novel diffusion MRI denoising technique that can be used on all existing data,
    without adding to the scanning time. We first apply a statistical framework to
    convert both stationary and non stationary Rician and non central Chi distributed
    noise to Gaussian distributed noise, effectively removing the bias. We then introduce
    a spatially and angular adaptive denoising technique, the Non Local Spatial and
    Angular Matching (NLSAM) algorithm. Each volume is first decomposed in small 4D
    overlapping patches, thus capturing the spatial and angular structure of the diffusion
    data, and a dictionary of atoms is learned on those patches. A local sparse decomposition
    is then found by bounding the reconstruction error with the local noise variance.
    We compare against three other state-of-the-art denoising methods and show quantitative
    local and connectivity results on a synthetic phantom and on an in-vivo high resolution
    dataset. Overall, our method restores perceptual information, removes the noise
    bias in common diffusion metrics, restores the extracted peaks coherence and improves
    reproducibility of tractography on the synthetic dataset. On the 1.2 mm high resolution
    in-vivo dataset, our denoising improves the visual quality of the data and reduces
    the number of spurious tracts when compared to the noisy acquisition. Our work
    paves the way for higher spatial resolution acquisition of diffusion MRI datasets,
    which could in turn reveal new anatomical details that are not discernible at
    the spatial resolution currently used by the diffusion MRI community.
