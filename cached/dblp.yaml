  ee: https://doi.org/10.1007/978-3-032-05114-1_61
  url: https://dblp.org/rec/conf/miccai/NeriHPM25
  abstract: Unsafe surgical care is a critical health concern, often linked to limitations
    in surgeon experience, skills, and situational awareness. Integrating patient-specific
    3D models into the surgical field can enhance visualization, provide real-time
    anatomical guidance, and reduce intraoperative complications. However, reliably
    registering these models in general surgery remains challenging due to mismatches
    between preoperative and intraoperative organ surfaces, such as deformations and
    noise. To overcome these challenges, we introduce the first patient-specific non-rigid
    point cloud registration method, which leverages a novel data generation strategy
    to optimize outcomes for individual patients. Our approach combines a Transformer
    encoder-decoder architecture with overlap estimation and a dedicated matching
    module to predict dense correspondences, followed by a physics-based algorithm
    for registration. Experimental results on both synthetic and real data demonstrate
    that our patient-specific method significantly outperforms traditional agnostic
    approaches, achieving 45% Matching Score with 92% Inlier Ratio on synthetic data,
    highlighting its potential to improve surgical care.
  related_code: ''
- author: Ao Shen, Xueming Fu, Junfeng Jiang, Qiang Zeng, Ye Tang, Zhengming Chen,
    Luming Nong, Feng Wang, Shaohua Kevin Zhou
  title: 'RadGS-Reg: Registering Spine CT with Biplanar X-Rays via Joint 3D Radiative
    Gaussians Reconstruction and 3D/3D Registration.'
  venue: MICCAI
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ShenFJZTCNWZ25
  doi: 10.1007/978-3-032-05114-1_44
  ee: https://doi.org/10.1007/978-3-032-05114-1_44
  url: https://dblp.org/rec/conf/miccai/ShenFJZTCNWZ25
  abstract: 'Computed Tomography (CT)/X-ray registration in image-guided navigation
    remains challenging because of its stringent requirements for high accuracy and
    real-time performance. Traditional "render and compare" methods, relying on iterative
    projection and comparison, suffer from spatial information loss and domain gap.
    3D reconstruction from biplanar X-rays supplements spatial and shape information
    for 2D/3D registration, but current methods are limited by dense-view requirements
    and struggles with noisy X-rays. To address these limitations, we introduce RadGS-Reg,
    a novel framework for vertebral-level CT/X-ray registration through joint 3D Radiative
    Gaussians (RadGS) reconstruction and 3D/3D registration. Specifically, our biplanar
    X-rays vertebral RadGS reconstruction module explores learning-based RadGS reconstruction
    method with a Counterfactual Attention Learning (CAL) mechanism, focusing on vertebral
    regions in noisy X-rays. Additionally, a patient-specific pre-training strategy
    progressively adapts the RadGS-Reg from simulated to real data while simultaneously
    learning vertebral shape prior knowledge. Experiments on in-house datasets demonstrate
    the state-of-the-art performance for both tasks, surpassing existing methods.
    The code is available at: https://github.com/shenao1995/RadGS_Reg.'
  related_code: https://github.com/shenao1995/RadGS_Reg
