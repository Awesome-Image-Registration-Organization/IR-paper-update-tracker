- author: Tak-Wai Hui, Chen Change Loy
  title: 'LiteFlowNet3: Resolving Correspondence Ambiguity for More Accurate Optical
    Flow Estimation.'
  venue: ECCV
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/HuiL20
  doi: 10.1007/978-3-030-58565-5_11
  ee: https://doi.org/10.1007/978-3-030-58565-5_11
  url: https://dblp.org/rec/conf/eccv/HuiL20
  abstract: Deep learning approaches have achieved great success in addressing the
    problem of optical flow estimation. The keys to success lie in the use of cost
    volume and coarse-to-fine flow inference. However, the matching problem becomes
    ill-posed when partially occluded or homogeneous regions exist in images. This
    causes a cost volume to contain outliers and affects the flow decoding from it.
    Besides, the coarse-to-fine flow inference demands an accurate flow initialization.
    Ambiguous correspondence yields erroneous flow fields and affects the flow inferences
    in subsequent levels. In this paper, we introduce LiteFlowNet3, a deep network
    consisting of two specialized modules, to address the above challenges. (1) We
    ameliorate the issue of outliers in the cost volume by amending each cost vector
    through an adaptive modulation prior to the flow decoding. (2) We further improve
    the flow accuracy by exploring local flow consistency. To this end, each inaccurate
    optical flow is replaced with an accurate one from a nearby position through a
    novel warping of the flow field. LiteFlowNet3 not only achieves promising results
    on public benchmarks but also has a small model size and a fast runtime.
  related_code: ''
