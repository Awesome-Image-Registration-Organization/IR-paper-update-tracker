- author: Junli Zhao, Xin Qi 0011, Chengfeng Wen, Na Lei, Xianfeng Gu
  title: Automatic and Robust Skull Registration Based on Discrete Uniformization.
  venue: ICCV
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ZhaoQWLG19
  doi: 10.1109/ICCV.2019.00052
  ee: https://doi.org/10.1109/ICCV.2019.00052
  url: https://dblp.org/rec/conf/iccv/ZhaoQWLG19
  abstract: Skull registration plays a fundamental role in forensic science and is
    crucial for craniofacial reconstruction. The complicated topology, lack of anatomical
    features, and low quality reconstructed mesh make skull registration challenging.
    In this work, we propose an automatic skull registration method based on the discrete
    uniformization theory, which can handle complicated topologies and is robust to
    low quality meshes. We apply dynamic Yamabe flow to realize discrete uniformization,
    which modifies the mesh combinatorial structure during the flow and conformally
    maps the multiply connected skull surface onto a planar disk with circular holes.
    The 3D surfaces can be registered by matching their planar images using harmonic
    maps. This method is rigorous with theoretic guarantee, automatic without user
    intervention, and robust to low mesh quality. Our experimental results demonstrate
    the efficiency and efficacy of the method.
