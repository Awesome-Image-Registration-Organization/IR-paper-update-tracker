- author: Théo Estienne, Maria Vakalopoulou, Enzo Battistella, Alexandre Carré, Théophraste
    Henry, Marvin Lerousseau, Charlotte Robert, Nikos Paragios, Eric Deutsch
  title: Deep Learning Based Registration Using Spatial Gradients and Noisy Segmentation
    Labels.
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/EstienneVBCHLRP20
  doi: 10.1007/978-3-030-71827-5_11
  ee: https://doi.org/10.1007/978-3-030-71827-5_11
  url: https://dblp.org/rec/conf/miccai/EstienneVBCHLRP20
  abstract: Image registration is one of the most challenging problems in medical
    image analysis. In the recent years, deep learning based approaches became quite
    popular, providing fast and performing registration strategies. In this short
    paper, we summarise our work presented on Learn2Reg challenge 2020. The main contributions
    of our work rely on (i) a symmetric formulation, predicting the transformations
    from source to target and from target to source simultaneously, enforcing the
    trained representations to be similar and (ii) integration of variety of publicly
    available datasets used both for pretraining and for augmenting segmentation labels.
    Our method reports a mean dice of 0.64 for task 3 and 0.85 for task 4 on the test
    sets, taking third place on the challenge. Our code and models are publicly available
    at https://github.com/TheoEst/abdominal_registration and https://github.com/TheoEst/hippocampus_registration.
- author: Cong Gao 0003, Xingtong Liu, Wenhao Gu, Benjamin Killeen, Mehran Armand,
    Russell H. Taylor, Mathias Unberath
  title: Generalizing Spatial Transformers to Projective Geometry with Applications
    to 2D/3D Registration.
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/GaoLGKATU20
  doi: 10.1007/978-3-030-59716-0_32
  ee: https://doi.org/10.1007/978-3-030-59716-0_32
  url: https://dblp.org/rec/conf/miccai/GaoLGKATU20
  abstract: Differentiable rendering is a technique to connect 3D scenes with corresponding
    2D images. Since it is differentiable, processes during image formation can be
    learned. Previous approaches to differentiable rendering focus on mesh-based representations
    of 3D scenes, which is inappropriate for medical applications where volumetric,
    voxelized models are used to represent anatomy. We propose a novel Projective
    Spatial Transformer module that generalizes spatial transformers to projective
    geometry, thus enabling differentiable volume rendering. We demonstrate the usefulness
    of this architecture on the example of 2D/3D registration between radiographs
    and CT scans. Specifically, we show that our transformer enables end-to-end learning
    of an image processing and projection model that approximates an image similarity
    function that is convex with respect to the pose parameters, and can thus be optimized
    effectively using conventional gradient descent. To the best of our knowledge,
    we are the first to describe the spatial transformers in the context of projective
    transmission imaging, including rendering and pose estimation. We hope that our
    developments will benefit related 3D research applications. The source code is
    available at https://github.com/gaocong13/Projective-Spatial-Transformers.
- author: Dongdong Gu, Xiaohuan Cao, Shanshan Ma, Lei Chen 0012, Guocai Liu, Dinggang
