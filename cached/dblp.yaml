- author: Mufeng Yao, Jiaqi Wang 0009, Jinlong Peng, Mingmin Chi, Chao Liu
  title: 'FOLT: Fast Multiple Object Tracking from UAV-captured Videos Based on Optical
    Flow.'
  venue: ACM Multimedia
