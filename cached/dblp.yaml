- author: Xueyao Ji, Gang Wang 0031, Yizheng Wang
  title: 'Optical Flow Estimation for Tiny Objects: New Problem, Specialized Benchmark,
    and Bioinspired Scheme.'
  venue: IJCAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/JiWW25
  doi: 10.24963/IJCAI.2025/136
  ee: https://doi.org/10.24963/ijcai.2025/136
  url: https://dblp.org/rec/conf/ijcai/JiWW25
  abstract: Optical flow is pivotal in video-based tasks, yet existing methods mostly
    focus on medium-/large-size objects, while underperforming when characterizing
    the motion of tiny objects. To bridge this gap, we introduce the On-off Time-delay
    with Hassenstein-Reichardt correlator (OTHR), a computationally efficient scheme
    inspired by the primate visual cortex's direction selectivity mechanism. OTHR
    kernels, applied across multiple frames, discern bright/dark luminance changes
    along a specific direction over a time delay, effectively estimating motion of
    tiny objects amidst noise and static backgrounds. Notably, OTHR integrates seamlessly
    with leading deep learning flow estimation models such as RAFT and FlowFormer.
    We also propose refined evaluation metrics for tiny objects and contribute a new
    dataset featuring such objects to aid algorithm development. Our experiments confirm
    OTHR's superiority over competing methods, particularly in enhancing state-of-the-art
    models' performance on tiny object motion estimation at minimal cost. Specifically,
    for objects less than 100 pixels, OTHR reduces RAFT and FlowFormer's errors by
    22.03% and 83.50%, respectively. The codes will be accessible at https://github.com/JaneEliot/OTHR.
  related_code: https://github.com/JaneEliot/OTHR
- author: Hannah Kim 0002, Celia Cintas, Girmaw Abebe Tadesse, Skyler Speakman
  title: Spatially Constrained Adversarial Attack Detection and Localization in the
    Representation Space of Optical Flow Networks.
  venue: IJCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/0001CTS23
  doi: 10.24963/IJCAI.2023/107
  ee: https://doi.org/10.24963/ijcai.2023/107
  url: https://dblp.org/rec/conf/ijcai/0001CTS23
  abstract: Optical flow estimation have shown significant improvements with advances
    in deep neural networks. However, these flow networks have recently been shown
    to be vulnerable to patch-based adversarial attacks, which poses security risks
    in real-world applications, such as self-driving cars and robotics. We propose
    SADL, a Spatially constrained adversarial Attack Detection and Localization framework,
    to detect and localize these patch-based attack without requiring a dedicated
    training. The detection of an attacked input sequence is performed via iterative
    optimization on the features from the inner layers of flow networks, without any
    prior knowledge of the attacks. The novel spatially constrained optimization ensures
    that the detected anomalous subset of features comes from a local region. To this
    end, SADL provides a subset of nodes within a spatial neighborhood that contribute
    more to the detection, which will be utilized to localize the attack in the input
    sequence. The proposed SADL is validated across multiple datasets and flow networks.
    With patch attacks 4.8% of the size of the input image resolution on RAFT, our
    method successfully detects and localizes them with an average precision of 0.946
    and 0.951 for KITTI-2015 and MPI-Sintel datasets, respectively. The results show
    that SADL consistently achieves higher detection rates than existing methods and
    provides new localization capabilities.
  related_code: ''
- author: Zachary Teed, Jia Deng 0001
  title: 'RAFT: Recurrent All-Pairs Field Transforms for Optical Flow (Extended Abstract).'
  venue: IJCAI
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/ijcai/Teed021
