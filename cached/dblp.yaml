  key: conf/miccai/ZengZRLFLO22
  doi: 10.1007/978-3-031-16440-8_19
  ee: https://doi.org/10.1007/978-3-031-16440-8_19
  url: https://dblp.org/rec/conf/miccai/ZengZRLFLO22
  abstract: 'Head movement is a major limitation in brain positron emission tomography
    (PET) imaging, which results in image artifacts and quantification errors. Head
    motion correction plays a critical role in quantitative image analysis and diagnosis
    of nervous system diseases. However, to date, there is no approach that can track
    head motion continuously without using an external device. Here, we develop a
    deep learning-based algorithm to predict rigid motion for brain PET by lever-aging
    existing dynamic PET scans with gold-standard motion measurements from external
    Polaris Vicra tracking. We propose a novel Deep Learning for Head Motion Correction
    (DL-HMC) methodology that consists of three components: (i) PET input data encoder
    layers; (ii) regression layers to estimate the six rigid motion transformation
    parameters; and (iii) feature-wise transformation (FWT) layers to condition the
    network to tracer time-activity. The input of DL-HMC is sampled pairs of one-second
    3D cloud representations of the PET data and the output is the prediction of six
    rigid transformation motion parameters. We trained this network in a supervised
    manner using the Vicra motion tracking information as gold-standard. We quantitatively
    evaluate DL-HMC by comparing to gold-standard Vicra measurements and qualitatively
    evaluate the reconstructed images as well as perform region of interest standard
    uptake value (SUV) measurements. An algorithm ablation study was performed to
    determine the contributions of each of our DL-HMC design choices to network performance.
    Our results demonstrate accurate motion prediction performance for brain PET using
    a data-driven registration approach without external motion tracking hardware.
    All code is publicly available on GitHub: https://github.com/OnofreyLab/dl-hmc_miccai2022.'
  related_code: https://github.com/OnofreyLab/dl-hmc_miccai2022
