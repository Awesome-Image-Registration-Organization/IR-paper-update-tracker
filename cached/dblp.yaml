- author: Mengxiao Tian, Xinxiao Wu, Shuo Yang 0002
  title: LLM-Enhanced Action-Aware Multi-Modal Prompt Tuning for Image-Text Matching.
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/TianWY25
  doi: 10.1109/ICCV51701.2025.01929
