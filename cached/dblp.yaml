- author: Xinzhe Luo, Xin Wang 0113, Linda G. Shapiro, Chun Yuan 0001, Jianfeng Feng,
    Xiahai Zhuang
  title: Bayesian Unsupervised Disentanglement of Anatomy and Geometry for Deep Groupwise
    Image Registration.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2026'
  type: Journal Articles
  access: closed
  key: journals/pami/LuoWSYFZ26
  doi: 10.1109/TPAMI.2025.3609521
  ee: https://doi.org/10.1109/TPAMI.2025.3609521
  url: https://dblp.org/rec/journals/pami/LuoWSYFZ26
  abstract: This article presents a general Bayesian learning framework for multi-modal
    groupwise image registration. The method builds on probabilistic modelling of
    the image generative process, where the underlying common anatomy and geometric
    variations of the observed images are explicitly disentangled as latent variables.
    Therefore, groupwise image registration is achieved via hierarchical Bayesian
    inference. We propose a novel hierarchical variational auto-encoding architecture
    to realise the inference procedure of the latent variables, where the registration
    parameters can be explicitly estimated in a mathematically interpretable fashion.
    Remarkably, this new paradigm learns groupwise image registration in an unsupervised
    closed-loop self-reconstruction process, sparing the burden of designing complex
    image-based similarity measures. The computationally efficient disentangled network
    architecture is also inherently scalable and flexible, allowing for groupwise
    registration on large-scale image groups with variable sizes. Furthermore, the
    inferred structural representations from multi-modal images via disentanglement
    learning are capable of capturing the latent anatomy of the observations with
    visual semantics. Extensive experiments were conducted to validate the proposed
    framework, including four different datasets from cardiac, brain, and abdominal
    medical images. The results have demonstrated the superiority of our method over
    conventional similarity-based approaches in terms of accuracy, efficiency, scalability,
    and interpretability.
