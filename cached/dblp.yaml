- author: Rémi Pautrat, Iago Suárez, Yifan Yu 0003, Marc Pollefeys, Viktor Larsson
  title: 'GlueStick: Robust Image Matching by Sticking Points and Lines Together.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/PautratSYPL23
  doi: 10.1109/ICCV51070.2023.00890
  ee: https://doi.org/10.1109/ICCV51070.2023.00890
  url: https://dblp.org/rec/conf/iccv/PautratSYPL23
  abstract: Line segments are powerful features complementary to points. They offer
    structural cues, robust to drastic viewpoint and illumination changes, and can
    be present even in texture-less areas. However, describing and matching them is
    more challenging compared to points due to partial occlusions, lack of texture,
    or repetitiveness. This paper introduces a new matching paradigm, where points,
    lines, and their descriptors are unified into a single wireframe structure. We
    propose GlueStick, a deep matching Graph Neural Network (GNN) that takes two wireframes
    from different images and leverages the connectivity information between nodes
    to better glue them together. In addition to the increased efficiency brought
    by the joint matching, we also demonstrate a large boost of performance when leveraging
    the complementary nature of these two features in a single architecture. We show
    that our matching strategy outperforms the state-of-the-art approaches independently
    matching line segments and points for a wide variety of datasets and tasks. The
    code is available at https://github.com/cvg/GlueStick.
