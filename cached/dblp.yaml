- author: Yang Liu, Wentao Feng, Zhuoyao Liu, Shudong Huang, Jiancheng Lv 0001
  title: Aligning Information Capacity Between Vision and Language via Dense-to-Sparse
    Feature Distillation for Image-Text Matching.
  venue: ICCV
