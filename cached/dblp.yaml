  abstract: 'This study introduces a novel On-the-Fly Guidance (OFG) training framework
    for enhancing existing learning-based image registration models, addressing the
    limitations of weakly-supervised and unsupervised methods. Weakly-supervised methods
    struggle due to the scarcity of labeled data, and unsupervised methods directly
    depend on image similarity metrics for accuracy. Our method proposes a supervised
    fashion for training registration models, without the need for any labeled data.
    OFG generates pseudo-ground truth during training by refining deformation predictions
    with a differentiable optimizer, enabling direct supervised learning. OFG optimizes
    deformation predictions efficiently, improving the performance of registration
    models without sacrificing inference speed. Our method is tested across several
    benchmark datasets and leading models, it significantly enhanced performance,
    providing a plug-and-play solution for training learning-based registration models.
    Code available at: https://github.com/cilix-ai/on-the-fly-guidance'
  related_code: https://github.com/cilix-ai/on-the-fly-guidance
- author: Hang Zhang 0010, Xiang Chen 0008, Renjiu Hu, Dongdong Liu, Gaolei Li, Rongguang
    Wang
  title: 'MemWarp: Discontinuity-Preserving Cardiac Registration with Memorized Anatomical
    Filters.'
  venue: MICCAI
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ZhangCHLLW24
  doi: 10.1007/978-3-031-72384-1_63
  ee: https://doi.org/10.1007/978-3-031-72384-1_63
  url: https://dblp.org/rec/conf/miccai/ZhangCHLLW24
  abstract: 'Many existing learning-based deformable image registration methods impose
    constraints on deformation fields to ensure they are globally smooth and continuous.
    However, this assumption does not hold in cardiac image registration, where different
    anatomical regions exhibit asymmetric motions during respiration and movements
    due to sliding organs within the chest. Consequently, such global constraints
    fail to accommodate local discontinuities across organ boundaries, potentially
    resulting in erroneous and unrealistic displacement fields. In this paper, we
    address this issue with MemWarp, a learning framework that leverages a memory
    network to store prototypical information tailored to different anatomical regions.
    MemWarp is different from earlier approaches in two main aspects: firstly, by
    decoupling feature extraction from similarity matching in moving and fixed images,
    it facilitates more effective utilization of feature maps; secondly, despite its
    capability to preserve discontinuities, it eliminates the need for segmentation
    masks during model inference. In experiments on a publicly available cardiac dataset,
    our method achieves considerable improvements in registration accuracy and producing
    realistic deformations, outperforming state-of-the-art methods with a remarkable
    7.1\% Dice score improvement over the runner-up semi-supervised method. Source
    code will be available at https://github.com/tinymilky/Mem-Warp.'
  related_code: https://github.com/tinymilky/Mem-Warp
- author: Xiaoran Zhang, Daniel H. Pak, Shawn S. Ahn, Xiaoxiao Li, Chenyu You, Lawrence
    H. Staib, Albert J. Sinusas, Alexandra L. N. Wong, James S. Duncan
  title: Heteroscedastic Uncertainty Estimation Framework for Unsupervised Registration.
  venue: MICCAI
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ZhangPALYSSWD24
  doi: 10.1007/978-3-031-72069-7_61
  ee: https://doi.org/10.1007/978-3-031-72069-7_61
  url: https://dblp.org/rec/conf/miccai/ZhangPALYSSWD24
  abstract: Deep learning methods for unsupervised registration often rely on objectives
    that assume a uniform noise level across the spatial domain (e.g. mean-squared
    error loss), but noise distributions are often heteroscedastic and input-dependent
    in real-world medical images. Thus, this assumption often leads to degradation
    in registration performance, mainly due to the undesired influence of noise-induced
    outliers. To mitigate this, we propose a framework for heteroscedastic image uncertainty
    estimation that can adaptively reduce the influence of regions with high uncertainty
    during unsupervised registration. The framework consists of a collaborative training
    strategy for the displacement and variance estimators, and a novel image fidelity
    weighting scheme utilizing signal-to-noise ratios. Our approach prevents the model
    from being driven away by spurious gradients caused by the simplified homoscedastic
    assumption, leading to more accurate displacement estimation. To illustrate its
    versatility and effectiveness, we tested our framework on two representative registration
    architectures across three medical image datasets. Our method consistently outperforms
    baselines and produces sensible uncertainty estimates. The code is publicly available
    at \url{https://voldemort108x.github.io/hetero_uncertainty/}.
  related_code: ''
- author: Yi Zhang 0120, Yidong Zhao, Lu Huang 0004, Liming Xia, Qian Tao
  title: Deep-Learning-Based Groupwise Registration for Motion Correction of Cardiac
    T1 Mapping.
  venue: MICCAI
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ZhangZHXT24
  doi: 10.1007/978-3-031-72069-7_55
  ee: https://doi.org/10.1007/978-3-031-72069-7_55
  url: https://dblp.org/rec/conf/miccai/ZhangZHXT24
  abstract: 'Quantitative $T_1$ mapping by MRI is an increasingly important tool for
    clinical assessment of cardiovascular diseases. The cardiac $T_1$ map is derived
    by fitting a known signal model to a series of baseline images, while the quality
    of this map can be deteriorated by involuntary respiratory and cardiac motion.
    To correct motion, a template image is often needed to register all baseline images,
    but the choice of template is nontrivial, leading to inconsistent performance
    sensitive to image contrast. In this work, we propose a novel deep-learning-based
    groupwise registration framework, which omits the need for a template, and registers
    all baseline images simultaneously. We design two groupwise losses for this registration
    framework: the first is a linear principal component analysis (PCA) loss that
    enforces alignment of baseline images irrespective of the intensity variation,
    and the second is an auxiliary relaxometry loss that enforces adherence of intensity
    profile to the signal model. We extensively evaluated our method, termed ``PCA-Relax'''',
    and other baseline methods on an in-house cardiac MRI dataset including both pre-
    and post-contrast $T_1$ sequences. All methods were evaluated under three distinct
    training-and-evaluation strategies, namely, standard, one-shot, and test-time-adaptation.
    The proposed PCA-Relax showed further improved performance of registration and
    mapping over well-established baselines. The proposed groupwise framework is generic
    and can be adapted to applications involving multiple images.'
  related_code: ''
- author: Yongtai Zhuo, Yiqing Shen 0003
  title: 'DiffuseReg: Denoising Diffusion Model for Obtaining Deformation Fields in
    Unsupervised Deformable Image Registration.'
  venue: MICCAI
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ZhuoS24
  doi: 10.1007/978-3-031-72069-7_56
  ee: https://doi.org/10.1007/978-3-031-72069-7_56
  url: https://dblp.org/rec/conf/miccai/ZhuoS24
  abstract: Deformable image registration aims to precisely align medical images from
    different modalities or times. Traditional deep learning methods, while effective,
    often lack interpretability, real-time observability and adjustment capacity during
    registration inference. Denoising diffusion models present an alternative by reformulating
    registration as iterative image denoising. However, existing diffusion registration
    approaches do not fully harness capabilities, neglecting the critical sampling
    phase that enables continuous observability during the inference. Hence, we introduce
    DiffuseReg, an innovative diffusion-based method that denoises deformation fields
    instead of images for improved transparency. We also propose a novel denoising
    network upon Swin Transformer, which better integrates moving and fixed images
    with diffusion time step throughout the denoising process. Furthermore, we enhance
    control over the denoising registration process with a novel similarity consistency
    regularization. Experiments on ACDC datasets demonstrate DiffuseReg outperforms
    existing diffusion registration methods by 1.32 in Dice score. The sampling process
    in DiffuseReg enables real-time output observability and adjustment unmatched
    by previous deep models.
  related_code: ''
- author: Alexander Bigalke, Mattias P. Heinrich
  title: A Denoised Mean Teacher for Domain Adaptive Point Cloud Registration.
  venue: MICCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/BigalkeH23
  doi: 10.1007/978-3-031-43999-5_63
  ee: https://doi.org/10.1007/978-3-031-43999-5_63
  url: https://dblp.org/rec/conf/miccai/BigalkeH23
  abstract: Point cloud-based medical registration promises increased computational
    efficiency, robustness to intensity shifts, and anonymity preservation but is
    limited by the inefficacy of unsupervised learning with similarity metrics. Supervised
    training on synthetic deformations is an alternative but, in turn, suffers from
    the domain gap to the real domain. In this work, we aim to tackle this gap through
    domain adaptation. Self-training with the Mean Teacher is an established approach
    to this problem but is impaired by the inherent noise of the pseudo labels from
    the teacher. As a remedy, we present a denoised teacher-student paradigm for point
    cloud registration, comprising two complementary denoising strategies. First,
    we propose to filter pseudo labels based on the Chamfer distances of teacher and
    student registrations, thus preventing detrimental supervision by the teacher.
    Second, we make the teacher dynamically synthesize novel training pairs with noise-free
    labels by warping its moving inputs with the predicted deformations. Evaluation
    is performed for inhale-to-exhale registration of lung vessel trees on the public
    PVT dataset under two domain shifts. Our method surpasses the baseline Mean Teacher
    by 13.5/62.8%, consistently outperforms diverse competitors, and sets a new state-of-the-art
    accuracy (TRE=2.31mm). Code is available at https://github.com/multimodallearning/denoised_mt_pcd_reg.
  related_code: https://github.com/multimodallearning/denoised_mt_pcd_reg
- author: Alexander Bigalke, Lasse Hansen, Tony C. W. Mok, Mattias P. Heinrich
  title: Unsupervised 3D Registration Through Optimization-Guided Cyclical Self-training.
  venue: MICCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/BigalkeHMH23
  doi: 10.1007/978-3-031-43999-5_64
  ee: https://doi.org/10.1007/978-3-031-43999-5_64
  url: https://dblp.org/rec/conf/miccai/BigalkeHMH23
  abstract: 'State-of-the-art deep learning-based registration methods employ three
    different learning strategies: supervised learning, which requires costly manual
    annotations, unsupervised learning, which heavily relies on hand-crafted similarity
    metrics designed by domain experts, or learning from synthetic data, which introduces
    a domain shift. To overcome the limitations of these strategies, we propose a
    novel self-supervised learning paradigm for unsupervised registration, relying
    on self-training. Our idea is based on two key insights. Feature-based differentiable
    optimizers 1) perform reasonable registration even from random features and 2)
    stabilize the training of the preceding feature extraction network on noisy labels.
    Consequently, we propose cyclical self-training, where pseudo labels are initialized
    as the displacement fields inferred from random features and cyclically updated
    based on more and more expressive features from the learning feature extractor,
    yielding a self-reinforcement effect. We evaluate the method for abdomen and lung
    registration, consistently surpassing metric-based supervision and outperforming
    diverse state-of-the-art competitors. Source code is available at https://github.com/multimodallearning/reg-cyclical-self-train.'
  related_code: https://github.com/multimodallearning/reg-cyclical-self-train
- author: Michal Byra, Charissa Poon, Tomomi Shimogori, Henrik Skibbe
  title: Implicit Neural Representations for Joint Decomposition and Registration
    of Gene Expression Images in the Marmoset Brain.
  venue: MICCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ByraPSS23
  doi: 10.1007/978-3-031-43999-5_61
  ee: https://doi.org/10.1007/978-3-031-43999-5_61
  url: https://dblp.org/rec/conf/miccai/ByraPSS23
  abstract: We propose a novel image registration method based on implicit neural
    representations that addresses the challenging problem of registering a pair of
    brain images with similar anatomical structures, but where one image contains
    additional features or artifacts that are not present in the other image. To demonstrate
    its effectiveness, we use 2D microscopy $\textit{in situ}$ hybridization gene
    expression images of the marmoset brain. Accurately quantifying gene expression
    requires image registration to a brain template, which is difficult due to the
    diversity of patterns causing variations in visible anatomical brain structures.
    Our approach uses implicit networks in combination with an image exclusion loss
    to jointly perform the registration and decompose the image into a support and
    residual image. The support image aligns well with the template, while the residual
    image captures individual image characteristics that diverge from the template.
    In experiments, our method provided excellent results and outperformed other registration
    techniques.
