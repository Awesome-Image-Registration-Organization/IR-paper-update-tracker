- author: Juyong Zhang, Yuxin Yao 0001, Bailin Deng
  title: Fast and Robust Iterative Closest Point.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2022'
  type: Journal Articles
  access: closed
  key: journals/pami/ZhangYD22
  doi: 10.1109/TPAMI.2021.3054619
  ee: https://doi.org/10.1109/TPAMI.2021.3054619
  url: https://dblp.org/rec/journals/pami/ZhangYD22
  abstract: The iterative closest point (ICP) algorithm and its variants are a fundamental
    technique for rigid registration between two point sets, with wide applications
    in different areas from robotics to 3D reconstruction. The main drawbacks for
    ICP are its slow convergence, as well as its sensitivity to outliers, missing
    data, and partial overlaps. Recent work such as Sparse ICP achieves robustness
    via sparsity optimization at the cost of computational speed. In this paper, we
    propose a new method for robust registration with fast convergence. First, we
    show that the classical point-to-point ICP can be treated as a majorization-minimization
    (MM) algorithm, and propose an Anderson acceleration approach to speed up its
    convergence. In addition, we introduce a robust error metric based on the Welsch’s
    function, which is minimized efficiently using the MM algorithm with Anderson
    acceleration. On challenging datasets with noises and partial overlaps, we achieve
    similar or better accuracy than Sparse ICP while being at least an order of magnitude
    faster. Finally, we extend the robust formulation to point-to-plane ICP, and solve
    the resulting problem using a similar Anderson-accelerated MM strategy. Our robust
    ICP methods improve the registration accuracy on benchmark datasets while being
    competitive in computational time.
