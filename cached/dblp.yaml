- author: Noemi Glaeser, Dimitris Kolonelos, Giulio Malavolta, Ahmadreza Rahimi
  title: Efficient Registration-Based Encryption.
  venue: CCS
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/ccs/GlaeserKMR23
  doi: 10.1145/3576915.3616596
  ee: https://doi.org/10.1145/3576915.3616596
  url: https://dblp.org/rec/conf/ccs/GlaeserKMR23
  abstract: 'Registration-based encryption (RBE) was recently introduced as an alternative
    to identity-based encryption (IBE), to resolve the key-escrow problem: In RBE,
    the trusted authority is substituted with a weaker entity, called the key curator,
    who has no knowledge of any secret key. Users generate keys on their own and then
    publicly register their identities and their corresponding public keys to the
    key curator. RBE is a promising alternative to IBE, retaining many of its advantages
    while removing the key-escrow problem, the major drawback of IBE. Unfortunately,
    all existing constructions of RBE use cryptographic schemes in a non black-box
    way, which makes them prohibitively expensive. It has been estimated that the
    size of an RBE ciphertext would be in the order of terabytes (though no RBE has
    even been implemented). In this work, we propose a new approach to construct RBE,
    from standard assumptions in bilinear groups. Our scheme is black-box and it is
    concretely highly efficient-a ciphertext is 914 bytes. To substantiate this claim,
    we implemented a prototype of our scheme and we show that it scales to millions
    of users. The public parameters of the scheme are on the order of kilobytes. The
    most expensive operation (registration) takes at most a handful of seconds, whereas
    the encryption and decryption runtimes are on the order of milliseconds. This
    is the first-ever implementation of an RBE scheme and demonstrates that the practical
    deployment of RBE is already possible with today''s hardware.'
  related_code: ''
- author: Dong Yuan 0006, Yuanli Miao, Neil Zhenqiang Gong, Zheng Yang, Qi Li 0002,
    Dawn Song, Qian Wang 0002, Xiao Liang
  title: Detecting Fake Accounts in Online Social Networks at the Time of Registrations.
  venue: CCS
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/ccs/YuanMGYLSWL19
  doi: 10.1145/3319535.3363198
  ee: https://doi.org/10.1145/3319535.3363198
  url: https://dblp.org/rec/conf/ccs/YuanMGYLSWL19
  abstract: Online social networks are plagued by fake information. In particu- lar,
    using massive fake accounts (also called Sybils), an attacker can disrupt the
    security and privacy of benign users by spreading spam, malware, and disinformation.
    Existing Sybil detection methods rely on rich content, behavior, and/or social
    graphs generated by Sybils. The key limitation of these methods is that they incur
    significant delays in catching Sybils, i.e., Sybils may have already performed
    many malicious activities when being detected. In this work, we propose Ianus,
    a Sybil detection method that leverages account registration information. Ianus
    aims to catch Sybils immediately after they are registered. First, using a real-
    world registration dataset with labeled Sybils from WeChat (the largest online
    social network in China), we perform a measurement study to characterize the registration
    patterns of Sybils and benign users. We find that Sybils tend to have synchronized
    and abnormal registration patterns. Second, based on our measurement results,
    we model Sybil detection as a graph inference problem, which allows us to integrate
    heterogeneous features. In particular, we extract synchronization and anomaly
    based features for each pair of accounts, use the features to build a graph in
    which Sybils are densely connected with each other while a benign user is isolated
    or sparsely connected with other benign users and Sybils, and finally detect Sybils
    via analyzing the structure of the graph. We evaluate Ianus using real-world registration
    datasets of WeChat. Moreover, WeChat has deployed Ianus on a daily basis, i.e.,
    WeChat uses Ianus to analyze newly registered accounts on each day and detect
    Sybils. Via manual verification by the WeChat security team, we find that Ianus
    can detect around 400K per million new registered accounts each day and achieve
    a precision of over 96% on average.
