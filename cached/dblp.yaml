- author: Riccardo Taiello, Melek Önen, Olivier Humbert, Marco Lorenzi
  title: Privacy Preserving Image Registration.
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/TaielloOHL22
  doi: 10.1007/978-3-031-16446-0_13
  ee: https://doi.org/10.1007/978-3-031-16446-0_13
  url: https://dblp.org/rec/conf/miccai/TaielloOHL22
  abstract: Image registration is a key task in medical imaging applications, allowing
    to represent medical images in a common spatial reference frame. Current approaches
    to image registration are generally based on the assumption that the content of
    the images is usually accessible in clear form, from which the spatial transformation
    is subsequently estimated. This common assumption may not be met in practical
    applications, since the sensitive nature of medical images may ultimately require
    their analysis under privacy constraints, preventing to openly share the image
    content. In this work, we formulate the problem of image registration under a
    privacy preserving regime, where images are assumed to be confidential and cannot
    be disclosed in clear. We derive our privacy preserving image registration framework
    by extending classical registration paradigms to account for advanced cryptographic
    tools, such as secure multi-party computation and homomorphic encryption, that
    enable the execution of operations without leaking the underlying data. To overcome
    the problem of performance and scalability of cryptographic tools in high dimensions,
    we propose several techniques to optimize the image registration operations by
    using gradient approximations, and by revisiting the use of homomorphic encryption
    trough packing, to allow the efficient encryption and multiplication of large
    matrices. We focus on registration methods of increasing complexity, including
    rigid, affine, and non-linear registration based on cubic splines or diffeomorphisms
    parameterized by time-varying velocity fields. In all these settings, we demonstrate
    how the registration problem can be naturally adapted for accounting to privacy-preserving
    operations, and illustrate the effectiveness of PPIR on a variety of registration
    tasks.
- author: Lin Tian 0001, Yueh Z. Lee, Raúl San José Estépar, Marc Niethammer
  title: 'LiftReg: Limited Angle 2D/3D Deformable Registration.'
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/TianLEN22
  doi: 10.1007/978-3-031-16446-0_20
  ee: https://doi.org/10.1007/978-3-031-16446-0_20
  url: https://dblp.org/rec/conf/miccai/TianLEN22
  abstract: We propose LiftReg, a 2D/3D deformable registration approach. LiftReg
    is a deep registration framework which is trained using sets of digitally reconstructed
    radiographs (DRR) and computed tomography (CT) image pairs. By using simulated
    training data, LiftReg can use a high-quality CT-CT image similarity measure,
    which helps the network to learn a high-quality deformation space. To further
    improve registration quality and to address the inherent depth ambiguities of
    very limited angle acquisitions, we propose to use features extracted from the
    backprojected 2D images and a statistical deformation model. We test our approach
    on the DirLab lung registration dataset and show that it outperforms an existing
    learning-based pairwise registration approach.
- author: Kunzi Xie, Yixing Yang, Maurice Pagnucco, Yang Song 0001
  title: Electron Microscope Image Registration Using Laplacian Sharpening Transformer
    U-Net.
  venue: MICCAI
