  ee: http://papers.nips.cc/paper_files/paper/2024/hash/cc52950239c3129464b0a6e379e2a9b0-Abstract-Conference.html
  url: https://dblp.org/rec/conf/nips/ZhangH0LD24
  abstract: Multi-instance point cloud registration aims to estimate the pose of all
    instances of a model point cloud in the whole scene. Existing methods all adopt
    the strategy of first obtaining the global correspondence and then clustering
    to obtain the pose of each instance. However, due to the cluttered and occluded
    objects in the scene, it is difficult to obtain an accurate correspondence between
    the model point cloud and all instances in the scene. To this end, we propose
    a simple yet powerful 3D focusing-and-matching network for multi-instance point
    cloud registration by learning the multiple pair-wise point cloud registration.
    Specifically, we first present a 3D multi-object focusing module to locate the
    center of each object and generate object proposals. By using self-attention and
    cross-attention to associate the model point cloud with structurally similar objects,
    we can locate potential matching instances by regressing object centers. Then,
    we propose a 3D dual masking instance matching module to estimate the pose between
    the model point cloud and each object proposal. It performs instance mask and
    overlap mask masks to accurately predict the pair-wise correspondence. Extensive
    experiments on two public benchmarks, Scan2CAD and ROBI, show that our method
    achieves a new state-of-the-art performance on the multi-instance point cloud
    registration task. Code is available at https://github.com/zlynpu/3DFMNet.
  related_code: https://github.com/zlynpu/3DFMNet
- author: Fenja Falta, Christoph Großbröhmer, Alessa Hering, Alexander Bigalke, Mattias
    P. Heinrich
  title: 'Lung250M-4B: A Combined 3D Dataset for CT- and Point Cloud-Based Intra-Patient
    Lung Registration.'
  venue: NeurIPS
  year: '2023'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/FaltaGHBH23
  doi: 10.52202/075280-2392
  ee: http://papers.nips.cc/paper_files/paper/2023/hash/abf37695a4562ac4c05194d717d47eec-Abstract-Datasets_and_Benchmarks.html
  url: https://dblp.org/rec/conf/nips/FaltaGHBH23
  abstract: A popular benchmark for intra-patient lung registration is provided by
    the DIR-LAB COPDgene dataset consisting of large-motion in-and expiratory breath-hold
    CT pairs. This dataset alone, however, does not provide enough samples to properly
    train state-of-the-art deep learning methods. Other public datasets often also
    provide only small sample sizes or include primarily small motions between scans
    that do not translate well to larger deformations. For point-based geometric registration,
    the PVT1010 dataset provides a large number of vessel point clouds without any
    correspondences and a labeled test set corresponding to the COPDgene cases. However,
    the absence of correspondences for supervision complicates training, and a fair
    comparison with image-based algorithms is infeasible, since CT scans for the training
    data are not publicly available. We here provide a combined benchmark for image-and
    point-based registration approaches. We curated a total of 248 public multi-centric
    in-and expiratory lung CT scans from 124 patients, which show large motion between
    scans, processed them to ensure sufficient homogeneity between the data and generated
    vessel point clouds that are well distributed even deeper inside the lungs. For
    supervised training, we provide vein and artery segmentations of the vessels and
    thousands of image-derived keypoint correspondences for each pair. For validation,
    we provide multiple scan pairs with manual landmark annotations. Finally, as baselines
    on our new benchmark, we evaluate several image and point cloud registration methods
    on the dataset.
