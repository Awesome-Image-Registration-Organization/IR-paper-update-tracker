- author: Runzhao Yao, Shaoyi Du, Wenting Cui, Canhui Tang, Chengwu Yang
  title: 'PARE-Net: Position-Aware Rotation-Equivariant Networks for Robust Point
    Cloud Registration.'
  venue: ECCV
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/YaoDCTY24
  doi: 10.1007/978-3-031-72904-1_17
  ee: https://doi.org/10.1007/978-3-031-72904-1_17
  url: https://dblp.org/rec/conf/eccv/YaoDCTY24
  abstract: Learning rotation-invariant distinctive features is a fundamental requirement
    for point cloud registration. Existing methods often use rotation-sensitive networks
    to extract features, while employing rotation augmentation to learn an approximate
    invariant mapping rudely. This makes networks fragile to rotations, overweight,
    and hinders the distinctiveness of features. To tackle these problems, we propose
    a novel position-aware rotation-equivariant network, for efficient, light-weighted,
    and robust registration. The network can provide a strong model inductive bias
    to learn rotation-equivariant/invariant features, thus addressing the aforementioned
    limitations. To further improve the distinctiveness of descriptors, we propose
    a position-aware convolution, which can better learn spatial information of local
    structures. Moreover, we also propose a feature-based hypothesis proposer. It
    leverages rotation-equivariant features that encode fine-grained structure orientations
    to generate reliable model hypotheses. Each correspondence can generate a hypothesis,
    thus it is more efficient than classic estimators that require multiple reliable
    correspondences. Accordingly, a contrastive rotation loss is presented to enhance
    the robustness of rotation-equivariant features against data degradation. Extensive
    experiments on indoor and outdoor datasets demonstrate that our method significantly
    outperforms the SOTA methods in terms of registration recall while being lightweight
    and keeping a fast speed. Moreover, experiments on rotated datasets demonstrate
    its robustness against rotation variations. Code is available at https://github.com/yaorz97/PARENet.
  related_code: https://github.com/yaorz97/PARENet
- author: Xiaoran Zhang, John C. Stendahl, Lawrence H. Staib, Albert J. Sinusas, Alex
    Wong 0001, James S. Duncan
  title: Adaptive Correspondence Scoring for Unsupervised Medical Image Registration.
  venue: ECCV
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/ZhangSSSWD24
  doi: 10.1007/978-3-031-72920-1_5
  ee: https://doi.org/10.1007/978-3-031-72920-1_5
  url: https://dblp.org/rec/conf/eccv/ZhangSSSWD24
  abstract: 'We propose an adaptive training scheme for unsupervised medical image
    registration. Existing methods rely on image reconstruction as the primary supervision
    signal. However, nuisance variables (e.g. noise and covisibility), violation of
    the Lambertian assumption in physical waves (e.g. ultrasound), and inconsistent
    image acquisition can all cause a loss of correspondence between medical images.
    As the unsupervised learning scheme relies on intensity constancy between images
    to establish correspondence for reconstruction, this introduces spurious error
    residuals that are not modeled by the typical training objective. To mitigate
    this, we propose an adaptive framework that re-weights the error residuals with
    a correspondence scoring map during training, preventing the parametric displacement
    estimator from drifting away due to noisy gradients, which leads to performance
    degradation. To illustrate the versatility and effectiveness of our method, we
    tested our framework on three representative registration architectures across
    three medical image datasets along with other baselines. Our adaptive framework
    consistently outperforms other methods both quantitatively and qualitatively.
    Paired t-tests show that our improvements are statistically significant. Code
    available at: \url{https://voldemort108x.github.io/AdaCS/}.'
  related_code: ''
- author: Ray Zhang 0001, Zheming Zhou, Min Sun 0001, Omid Ghasemalizadeh, Cheng-Hao
    Kuo, Ryan M. Eustice, Maani Ghaffari, Arnie Sen
  title: Correspondence-Free SE(3) Point Cloud Registration in RKHS via Unsupervised
    Equivariant Learning.
  venue: ECCV
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/ZhangZSGKEGS24
  doi: 10.1007/978-3-031-73223-2_5
  ee: https://doi.org/10.1007/978-3-031-73223-2_5
  url: https://dblp.org/rec/conf/eccv/ZhangZSGKEGS24
  abstract: This paper introduces a robust unsupervised SE(3) point cloud registration
    method that operates without requiring point correspondences. The method frames
    point clouds as functions in a reproducing kernel Hilbert space (RKHS), leveraging
    SE(3)-equivariant features for direct feature space registration. A novel RKHS
    distance metric is proposed, offering reliable performance amidst noise, outliers,
    and asymmetrical data. An unsupervised training approach is introduced to effectively
    handle limited ground truth data, facilitating adaptation to real datasets. The
    proposed method outperforms classical and supervised methods in terms of registration
    accuracy on both synthetic (ModelNet40) and real-world (ETH3D) noisy, outlier-rich
    datasets. To our best knowledge, this marks the first instance of successful real
    RGB-D odometry data registration using an equivariant method. The code is available
    at {https://sites.google.com/view/eccv24-equivalign}
