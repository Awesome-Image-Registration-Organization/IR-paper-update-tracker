  title: Ultrasound-fluoroscopy registration for prostate brachytherapy dosimetry.
  venue: Medical Image Anal.
  year: '2012'
  type: Journal Articles
  access: closed
  key: journals/mia/DehghanLFKDLBSPF12
  doi: 10.1016/J.MEDIA.2012.06.001
