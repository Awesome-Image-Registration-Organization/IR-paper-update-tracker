- author: Yihao Liu 0003, Junyu Chen 0002, Shuwen Wei, Aaron Carass, Jerry L. Prince
  title: On Finite Difference Jacobian Computation in Deformable Image Registration.
  venue: Int. J. Comput. Vis.
  year: '2024'
  type: Journal Articles
  access: open
  key: journals/ijcv/LiuCWCP24
  doi: 10.1007/S11263-024-02047-1
  ee: https://doi.org/10.1007/s11263-024-02047-1
  url: https://dblp.org/rec/journals/ijcv/LiuCWCP24
  abstract: AbstractProducing spatial transformations that are diffeomorphic is a
    key goal in deformable image registration. As a diffeomorphic transformation should
    have positive Jacobian determinant $$\vert J\vert $$ | J | everywhere, the number
    of pixels (2D) or voxels (3D) with $$\vert J\vert &lt;0$$ | J | &lt; 0 has been
    used to test for diffeomorphism and also to measure the irregularity of the transformation.
    For digital transformations, $$\vert J\vert $$ | J | is commonly approximated
    using a central difference, but this strategy can yield positive $$\vert J\vert
    $$ | J | ’s for transformations that are clearly not diffeomorphic—even at the
    pixel or voxel resolution level. To show this, we first investigate the geometric
    meaning of different finite difference approximations of $$\vert J\vert $$ | J
    | . We show that to determine if a deformation is diffeomorphic for digital images,
    the use of any individual finite difference approximation of $$\vert J\vert $$
    | J | is insufficient. We further demonstrate that for a 2D transformation, four
    unique finite difference approximations of $$\vert J\vert $$ | J | ’s must be
    positive to ensure that the entire domain is invertible and free of folding at
    the pixel level. For a 3D transformation, ten unique finite differences approximations
    of $$\vert J\vert $$ | J | ’s are required to be positive. Our proposed digital
    diffeomorphism criteria solves several errors inherent in the central difference
    approximation of $$\vert J\vert $$ | J | and accurately detects non-diffeomorphic
    digital transformations. The source code of this work is available at https://github.com/yihao6/digital_diffeomorphism.
  related_code: https://github.com/yihao6/digital_diffeomorphism
- author: Zhenfeng Fan, Silong Peng, Shihong Xia
  title: 'Towards Fine-Grained Optimal 3D Face Dense Registration: An Iterative Dividing
    and Diffusing Method.'
  venue: Int. J. Comput. Vis.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/ijcv/FanPX23
  doi: 10.1007/S11263-023-01825-7
  ee: https://doi.org/10.1007/s11263-023-01825-7
  url: https://dblp.org/rec/journals/ijcv/FanPX23
  abstract: Dense vertex-to-vertex correspondence between 3D faces is a fundamental
    and challenging issue for 3D&2D face analysis. While the sparse landmarks have
    anatomically ground-truth correspondence, the dense vertex correspondences on
    most facial regions are unknown. In this view, the current literatures commonly
    result in reasonable but diverse solutions, which deviate from the optimum to
    the 3D face dense registration problem. In this paper, we revisit dense registration
    by a dimension-degraded problem, i.e. proportional segmentation of a line, and
    employ an iterative dividing and diffusing method to reach the final solution
    uniquely. This method is then extended to 3D surface by formulating a local registration
    problem for dividing and a linear least-square problem for diffusing, with constraints
    on fixed features. On this basis, we further propose a multi-resolution algorithm
    to accelerate the computational process. The proposed method is linked to a novel
    local scaling metric, where we illustrate the physical meaning as smooth rearrangement
    for local cells of 3D facial shapes. Extensive experiments on public datasets
    demonstrate the effectiveness of the proposed method in various aspects. Generally,
    the proposed method leads to coherent local registrations and elegant mesh grid
    routines for fine-grained 3D face dense registrations, which benefits many downstream
    applications significantly. It can also be applied to dense correspondence for
    other format of data which are not limited to face. The core code will be publicly
    available at https://github.com/NaughtyZZ/3D_face_dense_registration.
  related_code: https://github.com/NaughtyZZ/3D_face_dense_registration
