- author: Zhiyuan Zhang 0002, Jiadai Sun, Yuchao Dai, Dingfu Zhou, Xibin Song, Mingyi
    He
  title: End-to-End Learning the Partial Permutation Matrix for Robust 3D Point Cloud
    Registration.
  venue: AAAI
  year: '2022'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ZhangSDZSH22
  doi: 10.1609/AAAI.V36I3.20250
  ee: https://doi.org/10.1609/aaai.v36i3.20250
  url: https://dblp.org/rec/conf/aaai/ZhangSDZSH22
  abstract: 'Even though considerable progress has been made in deep learning-based
    3D point cloud processing, how to obtain accurate correspondences for robust registration
    remains a major challenge because existing hard assignment methods cannot deal
    with outliers naturally. Alternatively, the soft matching-based methods have been
    proposed to learn the matching probability rather than hard assignment. However,
    in this paper, we prove that these methods have an inherent ambiguity causing
    many deceptive correspondences. To address the above challenges, we propose to
    learn a partial permutation matching matrix, which does not assign corresponding
    points to outliers, and implements hard assignment to prevent ambiguity. However,
    this proposal poses two new problems, i.e. existing hard assignment algorithms
    can only solve a full rank permutation matrix rather than a partial permutation
    matrix, and this desired matrix is defined in the discrete space, which is non-differentiable.
    In response, we design a dedicated soft-to-hard (S2H) matching procedure within
    the registration pipeline consisting of two steps: solving the soft matching matrix
    (S-step) and projecting this soft matrix to the partial permutation matrix (H-step).
    Specifically, we augment the profit matrix before the hard assignment to solve
    an augmented permutation matrix, which is cropped to achieve the final partial
    permutation matrix. Moreover, to guarantee end-to-end learning, we supervise the
    learned partial permutation matrix but propagate the gradient to the soft matrix
    instead. Our S2H matching procedure can be easily integrated with existing registration
    frameworks, which has been verified in representative frameworks including DCP,
    RPMNet, and DGR. Extensive experiments have validated our method, which creates
    a new state-of-the-art performance.'
  related_code: ''
- author: Rambod Mojgani, Maciej Balajewicz
  title: Low-Rank Registration Based Manifolds for Convection-Dominated PDEs.
  venue: AAAI
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/MojganiB21
  doi: 10.1609/AAAI.V35I1.16116
  ee: https://doi.org/10.1609/aaai.v35i1.16116
  url: https://dblp.org/rec/conf/aaai/MojganiB21
  abstract: 'We develop an auto-encoder-type nonlinear dimensionality reduction algorithm
    to enable the construction of reduced order models of systems governed by convection-dominated
    nonlinear partial differential equations (PDEs), i.e. snapshots of solutions with
    large Kolmogorov n-width. Although several existing nonlinear manifold learning
    methods, such as LLE, ISOMAP, MDS, etc., appear as compelling candidates to reduce
    the dimensionality of such data, most are not applicable to reduced order modeling
    of PDEs, because: (i) they typically lack a straightforward mapping from the latent
    space to the high-dimensional physical space, and (ii) the identified latent variables
    are often difficult to interpret. In our proposed method, these limitations are
    overcome by training a low-rank diffeomorphic spatio-temporal grid that registers
    the output sequence of the PDEs on a non-uniform parameter/time-varying grid,
    such that the Kolmogorov n-width of the mapped data on the learned grid is minimized.
    We demonstrate the efficacy and interpretability of our proposed approach on several
    challenging manufactured computer vision-inspired tasks and physical systems.'
