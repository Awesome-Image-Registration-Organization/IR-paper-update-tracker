  title: A Large Deformation Diffeomorphic Approach to Registration of CLARITY Images
    via Mutual Information.
  venue: MICCAI
  year: '2017'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/KuttenCMRMBLDYV17
  doi: 10.1007/978-3-319-66182-7_32
