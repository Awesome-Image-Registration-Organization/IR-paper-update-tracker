- author: Thibaut Loiseau, Guillaume Bourmaud
  title: 'RUBIK: A Structured Benchmark for Image Matching across Geometric Challenges.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/LoiseauB25
  doi: 10.1109/CVPR52734.2025.02521
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Loiseau_RUBIK_A_Structured_Benchmark_for_Image_Matching_across_Geometric_Challenges_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/LoiseauB25
  abstract: Camera pose estimation is crucial for many computer vision applications,
    yet existing benchmarks offer limited insight into method limitations across different
    geometric challenges. We introduce RUBIK, a novel benchmark that systematically
    evaluates image matching methods across well-defined geometric difficulty levels.
    Using three complementary criteria - overlap, scale ratio, and viewpoint angle
    - we organize 16.5K image pairs from nuScenes into 33 difficulty levels. Our comprehensive
    evaluation of 14 methods reveals that while recent detector-free approaches achieve
    the best performance (>47% success rate), they come with significant computational
    overhead compared to detector-based methods (150-600ms vs. 40-70ms). Even the
    best performing method succeeds on only 54.8% of the pairs, highlighting substantial
    room for improvement, particularly in challenging scenarios combining low overlap,
    large scale differences, and extreme viewpoint changes. Benchmark will be made
    publicly available.
  related_code: ''
- author: Jiangwei Ren, Xingyu Jiang, Zizhuo Li, Dingkang Liang, Xin Zhou 0013, Xiang
    Bai
  title: 'MINIMA: Modality Invariant Image Matching.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/RenJLL0B25
  doi: 10.1109/CVPR52734.2025.02147
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Ren_MINIMA_Modality_Invariant_Image_Matching_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/RenJLL0B25
  abstract: Image matching for both cross-view and cross-modality plays a critical
    role in multimodal perception. In practice, the modality gap caused by different
    imaging systems/styles poses great challenges to the matching task. Existing works
    try to extract invariant features for specific modalities and train on limited
    datasets, showing poor generalization. In this paper, we present MINIMA, a unified
    image matching framework for multiple cross-modal cases. Without pursuing fancy
    modules, our MINIMA aims to enhance universal performance from the perspective
    of data scaling up. For such purpose, we propose a simple yet effective data engine
    that can freely produce a large dataset containing multiple modalities, rich scenarios,
    and accurate matching labels. Specifically, we scale up the modalities from cheap
    but rich RGB-only matching data, by means of generative models. Under this setting,
    the matching labels and rich diversity of the RGB dataset are well inherited by
    the generated multimodal data. Benefiting from this, we construct MD-syn, a new
    comprehensive dataset that fills the data gap for general multimodal image matching.
    With MD-syn, we can directly train any advanced matching pipeline on randomly
    selected modality pairs to obtain cross-modal ability. Extensive experiments on
    in-domain and zero-shot matching tasks, including 19 cross-modal cases, demonstrate
    that our MINIMA can significantly outperform the baselines and even surpass modality-specific
    methods. The dataset and code are available at https://github.com/LSXI7/MINIMA.
  related_code: https://github.com/LSXI7/MINIMA
- author: Bin Wang, Fan Wu, Linke Ouyang, Zhuangcheng Gu, Rui Zhang, Renqiu Xia, Botian
    Shi, Bo Zhang, Conghui He
  title: 'Image Over Text: Transforming Formula Recognition Evaluation with Character
    Detection Matching.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/WangWOGZXSZH25
  doi: 10.1109/CVPR52734.2025.01833
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Wang_Image_Over_Text_Transforming_Formula_Recognition_Evaluation_with_Character_Detection_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/WangWOGZXSZH25
  abstract: Formula recognition presents significant challenges due to the complicated
    structure and varied notation of mathematical expressions. Despite continuous
    advancements in formula recognition models, the evaluation metrics employed by
    these models, such as BLEU and Edit Distance, still exhibit notable limitations.
    They overlook the fact that the same formula has diverse representations and is
    highly sensitive to the distribution of training data, thereby causing unfairness
    in formula recognition evaluation. To this end, we propose a Character Detection
    Matching (CDM) metric, ensuring the evaluation objectivity by designing an image-level
    rather than a LaTeX-level metric score. Specifically, CDM renders both the model-predicted
    LaTeX and the ground-truth LaTeX formulas into image-formatted formulas, then
    employs visual feature extraction and localization techniques for precise character-level
    matching, incorporating spatial position information. Such a spatially-aware and
    character-matching method offers a more accurate and equitable evaluation compared
    with previous BLEU and Edit Distance metrics that rely solely on text-based character
    matching. Experimentally, we evaluated various formula recognition models using
    CDM, BLEU, and ExpRate metrics. Their results demonstrate that the CDM aligns
    more closely with human evaluation standards and provides a fairer comparison
    across different models by eliminating discrepancies caused by diverse formula
    representations. Code is available at https://github.com/opendatalab/UniMERNet/tree/main/cdm
  related_code: https://github.com/opendatalab/UniMERNet/tree/main/cdm
- author: Axel Barroso-Laguna, Sowmya Munukutla, Victor Adrian Prisacariu, Eric Brachmann
  title: 'Matching 2D Images in 3D: Metric Relative Pose from Metric Correspondences.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/Barroso-LagunaM24
  doi: 10.1109/CVPR52733.2024.00464
  ee: https://doi.org/10.1109/CVPR52733.2024.00464
  url: https://dblp.org/rec/conf/cvpr/Barroso-LagunaM24
  abstract: Given two images, we can estimate the relative camera pose between them
    by establishing image-to-image correspondences. Usually, correspondences are 2D-to-2D
    and the pose we estimate is defined only up to scale. Some applications, aiming
    at instant augmented reality anywhere, require scale-metric pose estimates, and
    hence, they rely on external depth estimators to recover the scale. We present
    MicKey, a keypoint matching pipeline that is able to predict metric correspondences
    in 3D camera space. By learning to match 3D coordinates across images, we are
    able to infer the metric relative pose without depth measurements. Depth measurements
    are also not required for training, nor are scene reconstructions or image overlap
    information. MicKey is supervised only by pairs of images and their relative poses.
    MicKey achieves state-of-the-art performance on the Map-Free Relocalisation benchmark
    while requiring less supervision than competing approaches.
  related_code: ''
