- author: Shun Miao, Sebastien Piat, Peter Walter Fischer, Ahmet Tuysuzoglu, Philip
    Walter Mewes, Tommaso Mansi, Rui Liao
  title: Dilated FCN for Multi-Agent 2D/3D Medical Image Registration.
  venue: AAAI
  year: '2018'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/MiaoPFTMML18
  doi: 10.1609/AAAI.V32I1.11576
