- author: Wenzheng Song, Masanori Suganuma, Xing Liu 0010, Noriyuki Shimobayashi,
    Daisuke Maruta, Takayuki Okatani
  title: 'Matching in the Dark: A Dataset for Matching Image Pairs of Low-light Scenes.'
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/SongS0SMO21
  doi: 10.1109/ICCV48922.2021.00597
  ee: https://doi.org/10.1109/ICCV48922.2021.00597
  url: https://dblp.org/rec/conf/iccv/SongS0SMO21
  abstract: This paper considers matching images of low-light scenes, aiming to widen
    the frontier of SfM and visual SLAM applications. Recent image sensors can record
    the brightness of scenes with more than eight-bit precision, available in their
    RAW-format image. We are interested in making full use of such high-precision
    information to match extremely low-light scene images that conventional methods
    cannot handle. For extreme low-light scenes, even if some of their brightness
    information exists in the RAW format images’ low bits, the standard raw image
    processing on cameras fails to utilize them properly. As was recently shown by
    Chen et al. [14], CNNs can learn to produce images with a natural appearance from
    such RAW-format images. To consider if and how well we can utilize such information
    stored in RAW-format images for image matching, we have created a new dataset
    named MID (matching in the dark). Using it, we experimentally evaluated combinations
    of eight image-enhancing methods and eleven image matching methods consisting
    of classical/neural local descriptors and classical/neural initial point-matching
    methods. The results show the advantage of using the RAW-format images and the
    strengths and weaknesses of the above component methods. They also imply there
    is room for further research.
  related_code: ''
- author: Clément Chadebec, Onur Tasar, Sanjeev Sreetharan, Benjamin Aubin
  title: 'LBM: Latent Bridge Matching for Fast Image-to-Image Translation.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ChadebecTSA25
  doi: 10.1109/ICCV51701.2025.02701
  ee: https://doi.org/10.1109/ICCV51701.2025.02701
  url: https://dblp.org/rec/conf/iccv/ChadebecTSA25
  abstract: In this paper, we introduce Latent Bridge Matching (LBM), a new, versatile
    and scalable method that relies on Bridge Matching in a latent space to achieve
    fast image-to-image translation. We show that the method can reach state-of-the-art
    results for various image-to-image tasks using only a single inference step. In
    addition to its efficiency, we also demonstrate the versatility of the method
    across different image translation tasks such as object removal, normal and depth
    estimation, and object relighting. We also derive a conditional framework of LBM
