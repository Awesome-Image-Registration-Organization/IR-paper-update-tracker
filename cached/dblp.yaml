  title: Dual-Branch Squeeze-Fusion-Excitation Module for Cross-Modality Registration
    of Cardiac SPECT and CT.
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ChenZXGZSOL22
  doi: 10.1007/978-3-031-16446-0_5
  ee: https://doi.org/10.1007/978-3-031-16446-0_5
  url: https://dblp.org/rec/conf/miccai/ChenZXGZSOL22
  abstract: Single-photon emission computed tomography (SPECT) is a widely applied
    imaging approach for diagnosis of coronary artery diseases. Attenuation maps (u-maps)
    derived from computed tomography (CT) are utilized for attenuation correction
    (AC) to improve diagnostic accuracy of cardiac SPECT. However, SPECT and CT are
    obtained sequentially in clinical practice, which potentially induces misregistration
    between the two scans. Convolutional neural networks (CNN) are powerful tools
    for medical image registration. Previous CNN-based methods for cross-modality
    registration either directly concatenated two input modalities as an early feature
    fusion or extracted image features using two separate CNN modules for a late fusion.
    These methods do not fully extract or fuse the cross-modality information. Besides,
    deep-learning-based rigid registration of cardiac SPECT and CT-derived u-maps
    has not been investigated before. In this paper, we propose a Dual-Branch Squeeze-Fusion-Excitation
    (DuSFE) module for the registration of cardiac SPECT and CT-derived u-maps. DuSFE
    fuses the knowledge from multiple modalities to recalibrate both channel-wise
    and spatial features for each modality. DuSFE can be embedded at multiple convolutional
    layers to enable feature fusion at different spatial dimensions. Our studies using
    clinical data demonstrated that a network embedded with DuSFE generated substantial
    lower registration errors and therefore more accurate AC SPECT images than previous
    methods.
