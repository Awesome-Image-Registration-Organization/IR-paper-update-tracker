- author: Fangyu Liu 0001, Rongtian Ye
  title: A Strong and Robust Baseline for Text-Image Matching.
  venue: ACL
  year: '2019'
  type: Conference and Workshop Papers
  access: open
  key: conf/acl/LiuY19
  doi: 10.18653/V1/P19-2023
  ee: https://doi.org/10.18653/v1/p19-2023
  url: https://dblp.org/rec/conf/acl/LiuY19
  abstract: 'We review the current schemes of text-image matching models and propose
    improvements for both training and inference. First, we empirically show limitations
    of two popular loss (sum and max-margin loss) widely used in training text-image
    embeddings and propose a trade-off: a kNN-margin loss which 1) utilizes information
    from hard negatives and 2) is robust to noise as all K-most hardest samples are
    taken into account, tolerating pseudo negatives and outliers. Second, we advocate
    the use of Inverted Softmax (IS) and Cross-modal Local Scaling (CSLS) during inference
    to mitigate the so-called hubness problem in high-dimensional embedding space,
    enhancing scores of all metrics by a large margin.'
  related_code: ''
image%20match%7Cfeature%20match%7Ckeypoint%20match%7Cgraph%20match%7Cstereo%20match%20venue%3ANAACL-HLT%3A:
- author: Kenan Jiang, Xuehai He, Ruize Xu, Xin Wang 0061
  title: 'ComCLIP: Training-Free Compositional Image and Text Matching.'
  venue: NAACL-HLT
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/naacl/JiangHXW24
  doi: 10.18653/V1/2024.NAACL-LONG.370
  ee: https://doi.org/10.18653/v1/2024.naacl-long.370
  url: https://dblp.org/rec/conf/naacl/JiangHXW24
  abstract: 'Contrastive Language-Image Pretraining (CLIP) has demonstrated great
    zero-shot performance for matching images and text. However, it is still challenging
    to adapt vision-lanaguage pretrained models like CLIP to compositional image and
    text matching -- a more challenging image and text matching task requiring the
    model understanding of compositional word concepts and visual components. Towards
    better compositional generalization in zero-shot image and text matching, in this
    paper, we study the problem from a causal perspective: the erroneous semantics
    of individual entities are essentially confounders that cause the matching failure.
    Therefore, we propose a novel \textbf{\textit{training-free}} compositional CLIP
    model (ComCLIP). ComCLIP disentangles input images into subjects, objects, and
    action sub-images and composes CLIP''s vision encoder and text encoder to perform
    evolving matching over compositional text embedding and sub-image embeddings.
    In this way, ComCLIP can mitigate spurious correlations introduced by the pretrained
    CLIP models and dynamically evaluate the importance of each component. Experiments
    on four compositional image-text matching datasets: SVO, ComVG, Winoground, and
    VL-checklist, and two general image-text retrieval datasets: Flick30K, and MSCOCO
    demonstrate the effectiveness of our plug-and-play method, which boosts the \textbf{\textit{zero-shot}}
    inference ability of CLIP, SLIP, and BLIP2 even without further training or fine-tuning.
    Our codes can be found at https://github.com/eric-ai-lab/ComCLIP.'
  related_code: https://github.com/eric-ai-lab/ComCLIP
