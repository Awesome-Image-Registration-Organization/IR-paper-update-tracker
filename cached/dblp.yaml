- author: Richard McKinley, Christian Rummel
  title: 'CortexMorph: Fast Cortical Thickness Estimation via Diffeomorphic Registration
    Using VoxelMorph.'
  venue: MICCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/McKinleyR23
  doi: 10.1007/978-3-031-43999-5_69
  ee: https://doi.org/10.1007/978-3-031-43999-5_69
  url: https://dblp.org/rec/conf/miccai/McKinleyR23
  abstract: The thickness of the cortical band is linked to various neurological and
    psychiatric conditions, and is often estimated through surface-based methods such
    as Freesurfer in MRI studies. The DiReCT method, which calculates cortical thickness
    using a diffeomorphic deformation of the gray-white matter interface towards the
    pial surface, offers an alternative to surface-based methods. Recent studies using
    a synthetic cortical thickness phantom have demonstrated that the combination
    of DiReCT and deep-learning-based segmentation is more sensitive to subvoxel cortical
    thinning than Freesurfer. While anatomical segmentation of a T1-weighted image
    now takes seconds, existing implementations of DiReCT rely on iterative image
    registration methods which can take up to an hour per volume. On the other hand,
    learning-based deformable image registration methods like VoxelMorph have been
    shown to be faster than classical methods while improving registration accuracy.
    This paper proposes CortexMorph, a new method that employs unsupervised deep learning
    to directly regress the deformation field needed for DiReCT. By combining CortexMorph
    with a deep-learning-based segmentation model, it is possible to estimate region-wise
    thickness in seconds from a T1-weighted image, while maintaining the ability to
    detect cortical atrophy. We validate this claim on the OASIS-3 dataset and the
    synthetic cortical thickness phantom of Rusak et al.
  related_code: ''
- author: Mingyuan Meng, Lei Bi 0001, Michael J. Fulham, David Dagan Feng, Jinman
    Kim
  title: Non-iterative Coarse-to-Fine Transformer Networks for Joint Affine and Deformable
    Image Registration.
  venue: MICCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/MengBFFK23a
  doi: 10.1007/978-3-031-43999-5_71
  ee: https://doi.org/10.1007/978-3-031-43999-5_71
  url: https://dblp.org/rec/conf/miccai/MengBFFK23a
  abstract: Image registration is a fundamental requirement for medical image analysis.
    Deep registration methods based on deep learning have been widely recognized for
    their capabilities to perform fast end-to-end registration. Many deep registration
    methods achieved state-of-the-art performance by performing coarse-to-fine registration,
    where multiple registration steps were iterated with cascaded networks. Recently,
    Non-Iterative Coarse-to-finE (NICE) registration methods have been proposed to
    perform coarse-to-fine registration in a single network and showed advantages
    in both registration accuracy and runtime. However, existing NICE registration
    methods mainly focus on deformable registration, while affine registration, a
    common prerequisite, is still reliant on time-consuming traditional optimization-based
    methods or extra affine registration networks. In addition, existing NICE registration
    methods are limited by the intrinsic locality of convolution operations. Transformers
    may address this limitation for their capabilities to capture long-range dependency,
    but the benefits of using transformers for NICE registration have not been explored.
    In this study, we propose a Non-Iterative Coarse-to-finE Transformer network (NICE-Trans)
    for image registration. Our NICE-Trans is the first deep registration method that
    (i) performs joint affine and deformable coarse-to-fine registration within a
    single network, and (ii) embeds transformers into a NICE registration framework
    to model long-range relevance between images. Extensive experiments with seven
    public datasets show that our NICE-Trans outperforms state-of-the-art registration
    methods on both registration accuracy and runtime.
  related_code: ''
- author: Yi Qin 0006, Xiaomeng Li 0001
  title: 'FSDiffReg: Feature-Wise and Score-Wise Diffusion-Guided Unsupervised Deformable
    Image Registration for Cardiac Images.'
  venue: MICCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/QinL23
  doi: 10.1007/978-3-031-43999-5_62
  ee: https://doi.org/10.1007/978-3-031-43999-5_62
  url: https://dblp.org/rec/conf/miccai/QinL23
  abstract: 'Unsupervised deformable image registration is one of the challenging
    tasks in medical imaging. Obtaining a high-quality deformation field while preserving
    deformation topology remains demanding amid a series of deep-learning-based solutions.
    Meanwhile, the diffusion model''s latent feature space shows potential in modeling
    the deformation semantics. To fully exploit the diffusion model''s ability to
    guide the registration task, we present two modules: Feature-wise Diffusion-Guided
    Module (FDG) and Score-wise Diffusion-Guided Module (SDG). Specifically, FDG uses
    the diffusion model''s multi-scale semantic features to guide the generation of
    the deformation field. SDG uses the diffusion score to guide the optimization
    process for preserving deformation topology with barely any additional computation.
    Experiment results on the 3D medical cardiac image registration task validate
    our model''s ability to provide refined deformation fields with preserved topology
    effectively. Code is available at: https://github.com/xmed-lab/FSDiffReg.git.'
  related_code: https://github.com/xmed-lab/FSDiffReg.git
