  title: A Deep Discontinuity-Preserving Image Registration Network.
  venue: MICCAI
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ChenXRF21
  doi: 10.1007/978-3-030-87202-1_5
  ee: https://doi.org/10.1007/978-3-030-87202-1_5
  url: https://dblp.org/rec/conf/miccai/ChenXRF21
  abstract: Image registration aims to establish spatial correspondence across pairs,
    or groups of images, and is a cornerstone of medical image computing and computer-assisted-interventions.
    Currently, most deep learning-based registration methods assume that the desired
    deformation fields are globally smooth and continuous, which is not always valid
    for real-world scenarios, especially in medical image registration (e.g. cardiac
    imaging and abdominal imaging). Such a global constraint can lead to artefacts
    and increased errors at discontinuous tissue interfaces. To tackle this issue,
    we propose a weakly-supervised Deep Discontinuity-preserving Image Registration
    network (DDIR), to obtain better registration performance and realistic deformation
    fields. We demonstrate that our method achieves significant improvements in registration
    accuracy and predicts more realistic deformations, in registration experiments
    on cardiac magnetic resonance (MR) images from UK Biobank Imaging Study (UKBB),
    than state-of-the-art approaches.
- author: Balder Croquet, Daan Christiaens, Seth M. Weinberg, Michael M. Bronstein,
    Dirk Vandermeulen, Peter Claes
  title: Unsupervised Diffeomorphic Surface Registration and Non-linear Modelling.
  venue: MICCAI
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/CroquetCWBVC21
  doi: 10.1007/978-3-030-87202-1_12
  ee: https://doi.org/10.1007/978-3-030-87202-1_12
  url: https://dblp.org/rec/conf/miccai/CroquetCWBVC21
  abstract: Registration is an essential tool in image analysis. Deep learning based
    alternatives have recently become popular, achieving competitive performance at
    a faster speed. However, many contemporary techniques are limited to volumetric
    representations, despite increased popularity of 3D surface and shape data in
    medical image analysis. We propose a one-step registration model for 3D surfaces
    that internalises a lower dimensional probabilistic deformation model (PDM) using
    conditional variational autoencoders (CVAE). The deformations are constrained
    to be diffeomorphic using an exponentiation layer. The one-step registration model
    is benchmarked against iterative techniques, trading in a slightly lower performance
    in terms of shape fit for a higher compactness. We experiment with two distance
    metrics, Chamfer distance (CD) and Sinkhorn divergence (SD), as specific distance
    functions for surface data in real-world registration scenarios. The internalised
    deformation model is benchmarked against linear principal component analysis (PCA)
    achieving competitive results and improved generalisability from lower dimensions.
