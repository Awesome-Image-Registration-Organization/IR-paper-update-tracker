- author: Shuang Guo, Friedhelm Hamann, Guillermo Gallego 0002
  title: Unsupervised Joint Learning of Optical Flow and Intensity with Event Cameras.
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/GuoHG25
  doi: 10.1109/ICCV51701.2025.00748
  ee: https://doi.org/10.1109/ICCV51701.2025.00748
  url: https://dblp.org/rec/conf/iccv/GuoHG25
  abstract: 'Event cameras rely on motion to obtain information about scene appearance.
    This means that appearance and motion are inherently linked: either both are present
    and recorded in the event data, or neither is captured. Previous works treat the
    recovery of these two visual quantities as separate tasks, which does not fit
    with the above-mentioned nature of event cameras and overlooks the inherent relations
    between them. We propose an unsupervised learning framework that jointly estimates
    optical flow (motion) and image intensity (appearance) using a single network.
    From the data generation model, we newly derive the event-based photometric error
    as a function of optical flow and image intensity. This error is further combined
    with the contrast maximization framework to form a comprehensive loss function
    that provides proper constraints for both flow and intensity estimation. Exhaustive
    experiments show our method''s state-of-the-art performance: in optical flow estimation,
    it reduces EPE by 20% and $A E$ by 25% compared to unsupervised approaches, while
    delivering competitive intensity estimation results, particularly in high dynamic
    range scenarios. Our method also achieves shorter inference time than all other
    optical flow methods and many of the image reconstruction methods, while they
    output only one quantity. Project page: https://github.com/tub-rip/E2FAI'
  related_code: https://github.com/tub-rip/E2FAI
- author: Simon Kiefhaber 0002, Stefan Roth 0001, Simone Schaub-Meyer
  title: Removing Cost Volumes from Optical Flow Estimators.
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/KiefhaberRS25
  doi: 10.1109/ICCV51701.2025.00015
  ee: https://doi.org/10.1109/ICCV51701.2025.00015
  url: https://dblp.org/rec/conf/iccv/KiefhaberRS25
  abstract: Cost volumes are used in every modern optical flow estimator, but due
    to their computational and space complexity, they are often a limiting factor
    regarding both processing speed and the resolution of input frames. Motivated
    by our empirical observation that cost volumes lose their importance once all
    other network parts of, e.g., a RAFT-based pipeline have been sufficiently trained,
    we introduce a training strategy that allows removing the cost volume from optical
    flow estimators throughout training. This leads to significantly improved inference
    speed and reduced memory requirements. Using our training strategy, we create
    three different models covering different compute budgets. Our most accurate model
    reaches state-of-the-art accuracy while being $1.2 \times$ faster and having a
    $6 \times$ lower memory footprint than comparable models; our fastest model is
    capable of processing Full HD frames at 20 FPS using only 500 MB of GPU memory.
  related_code: ''
- author: Yujian Lee, Peng Gao, Yongqi Xu, Wentao Fan 0001
  title: How Do Optical Flow and Textual Prompts Collaborate to Assist in Audio-Visual
    Semantic Segmentation?
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LeeGXF25
  doi: 10.1109/ICCV51701.2025.02167
  ee: https://doi.org/10.1109/ICCV51701.2025.02167
  url: https://dblp.org/rec/conf/iccv/LeeGXF25
  abstract: 'Audio-visual semantic segmentation (AVSS) represents an extension of
    the audio-visual segmentation (AVS) task, necessitating a semantic understanding
    of audio-visual scenes beyond merely identifying sound-emitting objects at the
    visual pixel level. Contrary to a previous methodology, by decomposing the AVSS
    task into two discrete subtasks by initially providing a prompted segmentation
    mask to facilitate subsequent semantic analysis, our approach innovates on this
    foundational strategy. We introduce a novel collaborative framework, Stepping
    Stone Plus (SSP), which integrates optical flow and textual prompts to assist
    the segmentation process. In scenarios where sound sources frequently coexist
    with moving objects, our pre-mask technique leverages optical flow to capture
    motion dynamics, providing essential temporal context for precise segmentation.
    To address the challenge posed by stationary sound-emitting objects, such as alarm
    clocks, SSP incorporates two specific textual prompts: one identifies the category
    of the sound-emitting object, and the other provides a broader description of
    the scene. Additionally, we implement a visual-textual alignment module (VTA)
    to facilitate cross-modal integration, delivering more coherent and contextually
    relevant semantic interpretations. Our training regimen involves a postmask technique
    aimed at compelling the model to learn the diagram of the optical flow. Experimental
    results demonstrate that SSP outperforms existing AVS methods, delivering efficient
    and precise segmentation results.'
  related_code: ''
- author: Pengjie Zhang, Lin Zhu 0012, Xiao Wang 0014, Lizhi Wang 0001, Hua Huang
    0001
  title: 'EMatch: A Unified Framework for Event-Based Optical Flow and Stereo Matching.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ZhangZWWH25
  doi: 10.1109/ICCV51701.2025.00553
  ee: https://doi.org/10.1109/ICCV51701.2025.00553
  url: https://dblp.org/rec/conf/iccv/ZhangZWWH25
  abstract: Event cameras have shown promise in vision applications like optical flow
    estimation and stereo matching with many specialized architectures. However, existing
    works only focus event data within the confines of task-specific domains, overlooking
    the correlations between tasks across the temporal and spatial domains. In this
    paper, we propose a novel matching-based framework for event cameras to estimate
    flow and disparity simultaneously in a shared representation space, reformulating
    them as a unified pixelwise correspondence matching problem. Specifically, our
    method utilizes a Temporal Recurrent Network to aggregate asynchronous event features
    across temporal or spatial domains, and a Spatial Contextual Attention to enhance
    knowledge transfer across event flows via temporal or spatial interactions. By
    utilizing a shared pixel-wise feature similarities module, our network performs
    optical flow estimation from temporal event segments and stereo matching from
    spatial event segments simultaneously. Our unified model inherently supports multi-task
    unification and cross-task transfer, which facilitate training and streamline
    deployment. Without the need for retraining on specific tasks, our model can effectively
    handle both event-based flow and stereo estimation, achieving state-of-the-art
    performance on both tasks. Our code is publicly available at https://github.com/BIT-Vision/EMatch.
  related_code: https://github.com/BIT-Vision/EMatch
- author: Changxing Deng, Ao Luo, Haibin Huang, Shaodan Ma, Jiangyu Liu, Shuaicheng
    Liu
  title: Explicit Motion Disentangling for Efficient Optical Flow Estimation.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/DengLHMLL23
  doi: 10.1109/ICCV51070.2023.00873
  ee: https://doi.org/10.1109/ICCV51070.2023.00873
  url: https://dblp.org/rec/conf/iccv/DengLHMLL23
  abstract: 'In this paper, we propose a novel framework for optical flow estimation
    that achieves a good balance between performance and efficiency. Our approach
    involves disentangling global motion learning from local flow estimation, treating
    global matching and local refinement as separate stages. We offer two key insights:
    First, the multi-scale 4D cost-volume based recurrent flow decoder is computationally
    expensive and unnecessary for handling small displacement. With the separation,
    we can utilize lightweight methods for both parts and maintain similar performance.
    Second, a dense and robust global matching is essential for both flow initialization
    as well as stable and fast convergence for the refinement stage. Towards this
    end, we introduce EMD-Flow, a framework that explicitly separates global motion
    estimation from the recurrent refinement stage. We propose two novel modules:
    Multi-scale Motion Aggregation (MMA) and Confidence-induced Flow Propagation (CFP).
    These modules leverage cross-scale matching prior and self-contained confidence
    maps to handle the ambiguities of dense matching in a global manner, generating
    a dense initial flow. Additionally, a lightweight decoding module is followed
    to handle small displacements, resulting in an efficient yet robust flow estimation
    framework. We further conduct comprehensive experiments on standard optical flow
    benchmarks with the proposed framework, and the experimental results demonstrate
    its superior balance between performance and runtime. Code is available at https://github.com/gddcx/EMD-Flow.'
  related_code: https://github.com/gddcx/EMD-Flow
- author: Haotian Liu, Guang Chen 0001, Sanqing Qu, Yanping Zhang, Zhijun Li 0001,
    Alois Knoll, Changjun Jiang 0002
  title: 'TMA: Temporal Motion Aggregation for Event-based Optical Flow.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/Liu0QZ0KJ23
  doi: 10.1109/ICCV51070.2023.00888
  ee: https://doi.org/10.1109/ICCV51070.2023.00888
  url: https://dblp.org/rec/conf/iccv/Liu0QZ0KJ23
  abstract: 'Event cameras have the ability to record continuous and detailed trajectories
    of objects with high temporal resolution, thereby providing intuitive motion cues
    for optical flow estimation. Nevertheless, most existing learning-based approaches
    for event optical flow estimation directly remould the paradigm of conventional
    images by representing the consecutive event stream as static frames, ignoring
    the inherent temporal continuity of event data. In this paper, we argue that temporal
    continuity is a vital element of event-based optical flow and propose a novel
    Temporal Motion Aggregation (TMA) approach to unlock its potential. Technically,
    TMA comprises three components: an event splitting strategy to incorporate intermediate
    motion information underlying the temporal context, a linear lookup strategy to
    align temporally fine-grained motion features and a novel motion pattern aggregation
    module to emphasize consistent patterns for motion feature enhancement. By incorporating
    temporally fine-grained motion information, TMA can derive better flow estimates
    than existing methods at early stages, which not only enables TMA to obtain more
    accurate final predictions, but also greatly reduces the demand for a number of
    refinements. Extensive experiments on DSEC-Flow and MVSEC datasets verify the
    effectiveness and superiority of our TMA. Remarkably, compared to E-RAFT, TMA
    achieves a 6% improvement in accuracy and a 40% reduction in inference time on
    DSEC-Flow. Code will be available at https://github.com/ispc-lab/TMA.'
  related_code: https://github.com/ispc-lab/TMA
- author: Xinglong Luo, Kunming Luo, Ao Luo, Zhengning Wang, Ping Tan 0002, Shuaicheng
    Liu
  title: Learning Optical Flow from Event Camera with Rendered Dataset.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LuoLLWTL23
  doi: 10.1109/ICCV51070.2023.00903
  ee: https://doi.org/10.1109/ICCV51070.2023.00903
  url: https://dblp.org/rec/conf/iccv/LuoLLWTL23
  abstract: We study the problem of estimating optical flow from event cameras. One
    important issue is how to build a high-quality event-flow dataset with accurate
    event values and flow labels. Previous datasets are created by either capturing
    real scenes by event cameras or synthesizing from images with pasted foreground
    objects. The former case can produce real event values but with calculated flow
    labels, which are sparse and inaccurate. The latter case can generate dense flow
    labels but the interpolated events are prone to errors. In this work, we propose
    to render a physically correct event-flow dataset using computer graphics models.
    In particular, we first create indoor and outdoor 3D scenes by Blender with rich
    scene content variations. Second, diverse camera motions are included for the
    virtual capturing, producing images and accurate flow labels. Third, we render
    high-framerate videos between images for accurate events. The rendered dataset
    can adjust the density of events, based on which we further introduce an adaptive
    density module (ADM). Experiments show that our proposed dataset can facilitate
    event-flow learning, whereas previous approaches when trained on our dataset can
    improve their performances constantly by a relatively large margin. In addition,
    event-flow pipelines when equipped with our ADM can further improve performances.
    Our code is available at https://github.com/boomluo02/ADMFlow.
  related_code: https://github.com/boomluo02/ADMFlow
- author: Ao Luo, Fan Yang 0054, Xin Li 0005, Lang Nie, Chunyu Lin, Haoqiang Fan,
    Shuaicheng Liu
  title: 'GAFlow: Incorporating Gaussian Attention into Optical Flow.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LuoYLNLFL23
  doi: 10.1109/ICCV51070.2023.00884
  ee: https://doi.org/10.1109/ICCV51070.2023.00884
  url: https://dblp.org/rec/conf/iccv/LuoYLNLFL23
  abstract: Optical flow, or the estimation of motion fields from image sequences,
    is one of the fundamental problems in computer vision. Unlike most pixel-wise
    tasks that aim at achieving consistent representations of the same category, optical
    flow raises extra demands for obtaining local discrimination and smoothness, which
    yet is not fully explored by existing approaches. In this paper, we push Gaussian
    Attention (GA) into the optical flow models to accentuate local properties during
    representation learning and enforce the motion affinity during matching. Specifically,
    we introduce a novel Gaussian-Constrained Layer (GCL) which can be easily plugged
    into existing Transformer blocks to highlight the local neighborhood that contains
    fine-grained structural information. Moreover, for reliable motion analysis, we
    provide a new Gaussian-Guided Attention Module (GGAM) which not only inherits
    properties from Gaussian distribution to instinctively revolve around the neighbor
    fields of each point but also is empowered to put the emphasis on contextually
    related regions during matching. Our fully-equipped model, namely Gaussian Attention
    Flow network (GAFlow), naturally incorporates a series of novel Gaussian-based
    modules into the conventional optical flow framework for reliable motion analysis.
    Extensive experiments on standard optical flow datasets consistently demonstrate
    the exceptional performance of the proposed approach in terms of both generalization
    ability evaluation and online benchmark testing. Code is available at https://github.com/LA30/GAFlow.
  related_code: https://github.com/LA30/GAFlow
- author: Federico Paredes-Vallés, Kirk Y. W. Scheper, Christophe De Wagter, Guido
    C. H. E. de Croon
  title: Taming Contrast Maximization for Learning Sequential, Low-latency, Event-based
    Optical Flow.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/Paredes-VallesS23
  doi: 10.1109/ICCV51070.2023.00889
  ee: https://doi.org/10.1109/ICCV51070.2023.00889
  url: https://dblp.org/rec/conf/iccv/Paredes-VallesS23
  abstract: Event cameras have recently gained significant traction since they open
    up new avenues for low-latency and low-power solutions to complex computer vision
    problems. To unlock these solutions, it is necessary to develop algorithms that
    can leverage the unique nature of event data. However, the current state-of-the-art
    is still highly influenced by the frame-based literature, and usually fails to
    deliver on these promises. In this work, we take this into consideration and propose
    a novel self-supervised learning pipeline for the sequential estimation of event-based
    optical flow that allows for the scaling of the models to high inference frequencies.
    At its core, we have a continuously-running stateful neural model that is trained
    using a novel formulation of contrast maximization that makes it robust to nonlinearities
    and varying statistics in the input events. Results across multiple datasets confirm
    the effectiveness of our method, which establishes a new state of the art in terms
    of accuracy for approaches trained or optimized without ground truth.
  related_code: ''
- author: Wachirawit Ponghiran, Chamika Mihiranga Liyanagedera, Kaushik Roy 0001
  title: Event-based Temporally Dense Optical Flow Estimation with Sequential Learning.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/PonghiranL023
  doi: 10.1109/ICCV51070.2023.00901
  ee: https://doi.org/10.1109/ICCV51070.2023.00901
  url: https://dblp.org/rec/conf/iccv/PonghiranL023
  abstract: Event cameras provide an advantage over traditional frame-based cameras
    when capturing fast-moving objects without a motion blur. They achieve this by
    recording changes in light intensity (known as events), thus allowing them to
    operate at a much higher frequency and making them suitable for capturing motions
    in a highly dynamic scene. Many recent studies have proposed methods to train
    neural networks (NNs) for predicting optical flow from events. However, they often
    rely on a spatio-temporal representation constructed from events over a fixed
    interval, such as 10 Hz used in training on the DSEC dataset. This limitation
    restricts the flow prediction to the same interval (10 Hz) whereas the fast speed
    of event cameras, which can operate up to 3 kHz, has not been effectively utilized.
    In this work, we show that a temporally dense flow estimation at 100 Hz can be
    achieved by treating the flow estimation as a sequential problem using two different
    variants of recurrent networks – Long-short term memory (LSTM) and spiking neural
    network (SNN). First, We utilize the NN model constructed similar to the popular
    EV-FlowNet but with LSTM layers to demonstrate the efficiency of our training
    method. The model not only produces 10× more frequent optical flow than the existing
    ones, but the estimated flows also have 13% lower errors than predictions from
    the baseline EV-FlowNet. Second, we construct an EV-FlowNet SNN but with leaky
    integrate and fire neurons to efficiently capture the temporal dynamics. We found
    that simple inherent recurrent dynamics of SNN lead to significant parameter reduction
    compared to the LSTM model. In addition, because of its event-driven computation,
    the spiking model is estimated to consume only 1.5% energy of the LSTM model,
    highlighting the efficiency of SNN in processing events and the potential for
    achieving temporally dense flow.
  related_code: ''
- author: Xiaoyu Shi 0002, Zhaoyang Huang, Weikang Bian, Dasong Li, Manyuan Zhang,
    Ka Chun Cheung, Simon See, Hongwei Qin, Jifeng Dai, Hongsheng Li 0001
  title: 'VideoFlow: Exploiting Temporal Cues for Multi-frame Optical Flow Estimation.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ShiHBLZCSQDL23
  doi: 10.1109/ICCV51070.2023.01146
  ee: https://doi.org/10.1109/ICCV51070.2023.01146
  url: https://dblp.org/rec/conf/iccv/ShiHBLZCSQDL23
  abstract: We introduce VideoFlow, a novel optical flow estimation framework for
    videos. In contrast to previous methods that learn to estimate optical flow from
    two frames, VideoFlow concurrently estimates bi-directional optical flows for
    multiple frames that are available in videos by sufficiently exploiting temporal
    cues.We first propose a TRi-frame Optical Flow (TROF) module that estimates bi-directional
    optical flows for the center frame in a three-frame manner. The information of
    the frame triplet is iteratively fused onto the center frame. To extend TROF for
    handling more frames, we further propose a MOtion Propagation (MOP) module that
    bridges multiple TROFs and propagates motion features between adjacent TROFs.
    With the iterative flow estimation refinement, the information fused in individual
    TROFs can be propagated into the whole sequence via MOP. By effectively exploiting
    video information, VideoFlow presents extraordinary performance, ranking 1st on
    all public benchmarks. On the Sintel benchmark, VideoFlow achieves 1.649 and 0.991
    average end-point-error (AEPE) on the final and clean passes, a 15.1% and 7.6%
    error reduction from the best published results (1.943 and 1.073 from FlowFormer++).
    On the KITTI-2015 benchmark, VideoFlow achieves an F1-all error of 3.65%, a 19.2%
    error reduction from the best published result (4.52% from FlowFormer++). Code
    is released at https://github.com/XiaoyuShi97/VideoFlow.
  related_code: https://github.com/XiaoyuShi97/VideoFlow
- author: Philippe Weinzaepfel, Thomas Lucas 0002, Vincent Leroy 0003, Yohann Cabon,
    Vaibhav Arora, Romain Brégier, Gabriela Csurka, Leonid Antsfeld, Boris Chidlovskii,
    Jérôme Revaud
  title: 'CroCo v2: Improved Cross-view Completion Pre-training for Stereo Matching
    and Optical Flow.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/Weinzaepfel00CA23
  doi: 10.1109/ICCV51070.2023.01647
  ee: https://doi.org/10.1109/ICCV51070.2023.01647
  url: https://dblp.org/rec/conf/iccv/Weinzaepfel00CA23
  abstract: 'Despite impressive performance for high-level downstream tasks, self-supervised
    pre-training methods have not yet fully delivered on dense geometric vision tasks
    such as stereo matching or optical flow. The application of self-supervised concepts,
    such as instance discrimination or masked image modeling, to geometric tasks is
    an active area of research. In this work, we build on the recent cross-view completion
    framework, a variation of masked image modeling that leverages a second view from
    the same scene which makes it well suited for binocular downstream tasks. The
    applicability of this concept has so far been limited in at least two ways: (a)
    by the difficulty of collecting real-world image pairs – in practice only synthetic
    data have been used – and (b) by the lack of generalization of vanilla transformers
    to dense downstream tasks for which relative position is more meaningful than
    absolute position. We explore three avenues of improvement. First, we introduce
    a method to collect suitable real-world image pairs at large scale. Second, we
    experiment with relative positional embeddings and show that they enable vision
    transformers to perform substantially better. Third, we scale up vision transformer
    based cross-completion architectures, which is made possible by the use of large
    amounts of data. With these improvements, we show for the first time that state-of-the-art
    results on stereo matching and optical flow can be reached without using any classical
    task-specific techniques like correlation volume, iterative estimation, image
    warping or multi-scale reasoning, thus paving the way towards universal vision
    models.'
  related_code: ''
- author: Guangyang Wu, Xiaohong Liu 0001, Kunming Luo, Xi Liu, Qingqing Zheng, Shuaicheng
    Liu, Xinyang Jiang, Guangtao Zhai, Wenyi Wang 0005
  title: 'AccFlow: Backward Accumulation for Long-Range Optical Flow.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/WuLLLZLJZ023
  doi: 10.1109/ICCV51070.2023.01113
  ee: https://doi.org/10.1109/ICCV51070.2023.01113
  url: https://dblp.org/rec/conf/iccv/WuLLLZLJZ023
  abstract: Recent deep learning-based optical flow estimators have exhibited impressive
    performance in generating local flows between consecutive frames. However, the
    estimation of long-range flows between distant frames, particularly under complex
    object deformation and large motion occlusion, remains a challenging task. One
    promising solution is to accumulate local flows explicitly or implicitly to obtain
    the desired long-range flow. Nevertheless, the accumulation errors and flow misalignment
    can hinder the effectiveness of this approach. This paper proposes a novel recurrent
    framework called AccFlow, which recursively backward accumulates local flows using
    a deformable module called as AccPlus. In addition, an adaptive blending module
    is designed along with AccPlus to alleviate the occlusion effect by backward accumulation
    and rectify the accumulation error. Notably, we demonstrate the superiority of
    backward accumulation over conventional forward accumulation, which to the best
    of our knowledge has not been explicitly established before. To train and evaluate
    the proposed AccFlow, we have constructed a large-scale high-quality dataset named
    CVO, which provides ground-truth optical flow labels between adjacent and distant
    frames. Extensive experiments validate the effectiveness of AccFlow in handling
    long-range optical flow estimation. Codes are available at https://github.com/mulns/AccFlow.
  related_code: https://github.com/mulns/AccFlow
- author: Shuai Yuan 0015, Shuzhi Yu, Hannah Kim 0002, Carlo Tomasi
  title: 'SemARFlow: Injecting Semantics into Unsupervised Optical Flow Estimation
    for Autonomous Driving.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/YuanYKT23
  doi: 10.1109/ICCV51070.2023.00877
  ee: https://doi.org/10.1109/ICCV51070.2023.00877
  url: https://dblp.org/rec/conf/iccv/YuanYKT23
  abstract: Unsupervised optical flow estimation is especially hard near occlusions
    and motion boundaries and in low-texture regions. We show that additional information
    such as semantics and domain knowledge can help better constrain this problem.
    We introduce SemARFlow, an unsupervised optical flow network designed for autonomous
    driving data that takes estimated semantic segmentation masks as additional inputs.
    This additional information is injected into the encoder and into a learned upsampler
    that refines the flow output. In addition, a simple yet effective semantic augmentation
    module provides self-supervision when learning flow and its boundaries for vehicles,
    poles, and sky. Together, these injections of semantic information improve the
    KITTI-2015 optical flow test error rate from 11.80% to 8.38%. We also show visible
    improvements around object boundaries as well as a greater ability to generalize
    across datasets. Code is available at https://github.com/duke-vision/semantic-unsup-flow-release.
  related_code: https://github.com/duke-vision/semantic-unsup-flow-release
- author: Haipeng Li 0001, Kunming Luo, Shuaicheng Liu
  title: 'GyroFlow: Gyroscope-Guided Unsupervised Optical Flow Learning.'
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LiLL21
  doi: 10.1109/ICCV48922.2021.01263
  ee: https://doi.org/10.1109/ICCV48922.2021.01263
  url: https://dblp.org/rec/conf/iccv/LiLL21
  abstract: Existing optical flow methods are erroneous in challenging scenes, such
    as fog, rain, and night because the basic optical flow assumptions such as brightness
    and gradient constancy are broken. To address this problem, we present an unsupervised
    learning approach that fuses gyroscope into optical flow learning. Specifically,
    we first convert gyroscope readings into motion fields named gyro field. Second,
    we design a self-guided fusion module to fuse the background motion extracted
    from the gyro field with the optical flow and guide the network to focus on motion
    details. To the best of our knowledge, this is the first deep learning-based framework
    that fuses gyroscope data and image content for optical flow learning. To validate
    our method, we propose a new dataset that covers regular and challenging scenes.
    Experiments show that our method outperforms the state-of-art methods in both
    regular and challenging scenes. Code and dataset are available at https://github.com/megvii-research/GyroFlow.
  related_code: https://github.com/megvii-research/GyroFlow
- author: Matteo Poggi, Filippo Aleotti, Stefano Mattoccia
  title: Sensor-Guided Optical Flow.
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/PoggiAM21
  doi: 10.1109/ICCV48922.2021.00781
  ee: https://doi.org/10.1109/ICCV48922.2021.00781
  url: https://dblp.org/rec/conf/iccv/PoggiAM21
  abstract: This paper proposes a framework to guide an optical flow network with
    external cues to achieve superior accuracy either on known or unseen domains.
    Given the availability of sparse yet accurate optical flow hints from an external
    source, these are injected to modulate the correlation scores computed by a state-of-the-art
    optical flow network and guide it towards more accurate predictions. Although
    no real sensor can provide sparse flow hints, we show how these can be obtained
    by combining depth measurements from active sensors with geometry and hand-crafted
    optical flow algorithms, leading to accurate enough hints for our purpose. Experimental
    results with a state-of-the-art flow network on standard benchmarks support the
    effectiveness of our framework, both in simulated and real conditions.
  related_code: ''
- author: Haofei Xu, Jiaolong Yang, Jianfei Cai 0001, Juyong Zhang, Xin Tong 0001
  title: High-Resolution Optical Flow from 1D Attention and Correlation.
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/XuY0ZT21
  doi: 10.1109/ICCV48922.2021.01033
  ee: https://doi.org/10.1109/ICCV48922.2021.01033
  url: https://dblp.org/rec/conf/iccv/XuY0ZT21
  abstract: Optical flow is inherently a 2D search problem, and thus the computational
    complexity grows quadratically with respect to the search window, making large
    displacements matching infeasible for high-resolution images. In this paper, we
    take inspiration from Transformers and propose a new method for high-resolution
    optical flow estimation with significantly less computation. Specifically, a 1D
    attention operation is first applied in the vertical direction of the target image,
    and then a simple 1D correlation in the horizontal direction of the attended image
    is able to achieve 2D correspondence modeling effect. The directions of attention
    and correlation can also be exchanged, resulting in two 3D cost volumes that are
    concatenated for optical flow estimation. The novel 1D formulation empowers our
    method to scale to very high-resolution input images while maintaining competitive
    performance. Extensive experiments on Sintel, KITTI and real-world 4K (2160 ×
    3840) resolution images demonstrated the effectiveness and superiority of our
    proposed method. Code and models are available at https://github.com/haofeixu/flow1d.
  related_code: https://github.com/haofeixu/flow1d
- author: Lei Wang 0108, Piotr Koniusz, Du Huynh
  title: Hallucinating IDT Descriptors and I3D Optical Flow Features for Action Recognition
    With CNNs.
  venue: ICCV
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/0108KH19
  doi: 10.1109/ICCV.2019.00879
  ee: https://doi.org/10.1109/ICCV.2019.00879
  url: https://dblp.org/rec/conf/iccv/0108KH19
  abstract: In this paper, we revive the use of old-fashioned handcrafted video representations
    for action recognition and put new life into these techniques via a CNN-based
    hallucination step. Despite of the use of RGB and optical flow frames, the I3D
    model (amongst others) thrives on combining its output with the Improved Dense
    Trajectory (IDT) and extracted with its low-level video descriptors encoded via
    Bag-of-Words (BoW) and Fisher Vectors (FV). Such a fusion of CNNs and handcrafted
    representations is time-consuming due to pre-processing, descriptor extraction,
    encoding and tuning parameters. Thus, we propose an end-to-end trainable network
    with streams which learn the IDT-based BoW/FV representations at the training
    stage and are simple to integrate with the I3D model. Specifically, each stream
    takes I3D feature maps ahead of the last 1D conv. layer and learns to `translate'
    these maps to BoW/FV representations. Thus, our model can hallucinate and use
    such synthesized BoW/FV representations at the testing stage. We show that even
    features of the entire I3D optical flow stream can be hallucinated thus simplifying
    the pipeline. Our model saves 20-55h of computations and yields state-of-the-art
    results on four publicly available datasets.
  related_code: ''
