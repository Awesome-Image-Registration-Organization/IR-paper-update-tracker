- author: Zachary Teed, Jia Deng 0001
  title: 'RAFT: Recurrent All-Pairs Field Transforms for Optical Flow.'
  venue: ECCV
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/TeedD20
  doi: 10.1007/978-3-030-58536-5_24
