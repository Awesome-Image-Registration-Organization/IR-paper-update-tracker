- author: Ali Kafaei Zad Tehrani, Morteza Mirzaei, Hassan Rivaz
  title: Semi-supervised Training of Optical Flow Convolutional Neural Networks in
    Ultrasound Elastography.
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/TehraniMR20
  doi: 10.1007/978-3-030-59716-0_48
  ee: https://doi.org/10.1007/978-3-030-59716-0_48
  url: https://dblp.org/rec/conf/miccai/TehraniMR20
  abstract: Convolutional Neural Networks (CNN) have been found to have great potential
    in optical flow problems thanks to an abundance of data available for training
    a deep network. The displacement estimation step in UltraSound Elastography (USE)
    can be viewed as an optical flow problem. Despite the high performance of CNNs
    in optical flow, they have been rarely used for USE due to unique challenges that
    both input and output of USE networks impose. Ultrasound data has much higher
    high-frequency content compared to natural images. The outputs are also drastically
    different, where displacement values in USE are often smooth without sharp motions
    or discontinuities. The general trend is currently to use pre-trained networks
    and fine-tune them on a small simulation ultrasound database. However, realistic
    ultrasound simulation is computationally expensive. Also, the simulation techniques
    do not model complex motions, nonlinear and frequency-dependent acoustics, and
    many sources of artifact in ultrasound imaging. Herein, we propose an unsupervised
    fine-tuning technique which enables us to employ a large unlabeled dataset for
    fine-tuning of a CNN optical flow network. We show that the proposed unsupervised
    fine-tuning method substantially improves the performance of the network and reduces
    the artifacts generated by networks trained on computer vision databases.
  related_code: ''
- author: Wenjun Yan, Yuanyuan Wang 0001, Zeju Li, Rob J. van der Geest, Qian Tao
  title: 'Left Ventricle Segmentation via Optical-Flow-Net from Short-Axis Cine MRI:
    Preserving the Temporal Coherence of Cardiac Motion.'
  venue: MICCAI
  year: '2018'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/YanWLGT18
  doi: 10.1007/978-3-030-00937-3_70
  ee: https://doi.org/10.1007/978-3-030-00937-3_70
  url: https://dblp.org/rec/conf/miccai/YanWLGT18
  abstract: Quantitative assessment of left ventricle (LV) function from cine MRI
    has significant diagnostic and prognostic value for cardiovascular disease patients.
    The temporal movement of LV provides essential information on the contracting/relaxing
    pattern of heart, which is keenly evaluated by clinical experts in clinical practice.
    Inspired by the expert way of viewing Cine MRI, we propose a new CNN module that
    is able to incorporate the temporal information into LV segmentation from cine
    MRI. In the proposed CNN, the optical flow (OF) between neighboring frames is
    integrated and aggregated at feature level, such that temporal coherence in cardiac
    motion can be taken into account during segmentation. The proposed module is integrated
    into the U-net architecture without need of additional training. Furthermore,
    dilated convolution is introduced to improve the spatial accuracy of segmentation.
    Trained and tested on the Cardiac Atlas database, the proposed network resulted
    in a Dice index of 95% and an average perpendicular distance of 0.9 pixels for
    the middle LV contour, significantly outperforming the original U-net that processes
    each frame individually. Notably, the proposed method improved the temporal coherence
    of LV segmentation results, especially at the LV apex and base where the cardiac
    motion is difficult to follow.
