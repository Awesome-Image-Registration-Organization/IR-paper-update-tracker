  title: Patient-specific biomechanical model as whole-body CT image registration
    tool.
  venue: Medical Image Anal.
  year: '2015'
  type: Journal Articles
  access: closed
  key: journals/mia/LiMJDGKW15
  doi: 10.1016/J.MEDIA.2014.12.008
