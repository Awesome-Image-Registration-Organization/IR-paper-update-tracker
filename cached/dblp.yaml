- author: Boah Kim, Inhwa Han, Jong Chul Ye
  title: 'DiffuseMorph: Unsupervised Deformable Image Registration Using Diffusion
    Model.'
  venue: ECCV
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/KimHY22
  doi: 10.1007/978-3-031-19821-2_20
  ee: https://doi.org/10.1007/978-3-031-19821-2_20
  url: https://dblp.org/rec/conf/eccv/KimHY22
  abstract: Deformable image registration is one of the fundamental tasks in medical
    imaging. Classical registration algorithms usually require a high computational
    cost for iterative optimizations. Although deep-learning-based methods have been
    developed for fast image registration, it is still challenging to obtain realistic
    continuous deformations from a moving image to a fixed image with less topological
    folding problem. To address this, here we present a novel diffusion-model-based
    image registration method, called DiffuseMorph. DiffuseMorph not only generates
    synthetic deformed images through reverse diffusion but also allows image registration
    by deformation fields. Specifically, the deformation fields are generated by the
    conditional score function of the deformation between the moving and fixed images,
    so that the registration can be performed from continuous deformation by simply
    scaling the latent feature of the score. Experimental results on 2D facial and
    3D medical image registration tasks demonstrate that our method provides flexible
    deformations with topology preservation capability.
  related_code: ''
- author: Ziming Wang, Xiaoliang Huo, Zhenghao Chen, Jing Zhang 0017, Lu Sheng, Dong
    Xu 0001
  title: Improving RGB-D Point Cloud Registration by Learning Multi-scale Local Linear
    Transformation.
  venue: ECCV
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/WangHCZSX22
  doi: 10.1007/978-3-031-19824-3_11
  ee: https://doi.org/10.1007/978-3-031-19824-3_11
  url: https://dblp.org/rec/conf/eccv/WangHCZSX22
  abstract: 'Point cloud registration aims at estimating the geometric transformation
    between two point cloud scans, in which point-wise correspondence estimation is
    the key to its success. In addition to previous methods that seek correspondences
    by hand-crafted or learnt geometric features, recent point cloud registration
    methods have tried to apply RGB-D data to achieve more accurate correspondence.
    However, it is not trivial to effectively fuse the geometric and visual information
    from these two distinctive modalities, especially for the registration problem.
    In this work, we propose a new Geometry-Aware Visual Feature Extractor (GAVE)
    that employs multi-scale local linear transformation to progressively fuse these
    two modalities, where the geometric features from the depth data act as the geometry-dependent
    convolution kernels to transform the visual features from the RGB data. The resultant
    visual-geometric features are in canonical feature spaces with alleviated visual
    dissimilarity caused by geometric changes, by which more reliable correspondence
    can be achieved. The proposed GAVE module can be readily plugged into recent RGB-D
    point cloud registration framework. Extensive experiments on 3D Match and ScanNet
    demonstrate that our method outperforms the state-of-the-art point cloud registration
    methods even without correspondence or pose supervision. The code is available
    at: https://github.com/514DNA/LLT.'
  related_code: https://github.com/514DNA/LLT
