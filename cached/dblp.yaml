- author: Jianke Zhu, Steven C. H. Hoi, Michael R. Lyu, Shuicheng Yan
  title: Near-duplicate keyframe retrieval by nonrigid image matching.
  venue: ACM Multimedia
  year: '2008'
  type: Conference and Workshop Papers
