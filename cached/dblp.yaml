- author: Yuxuan Pan, Xikang Jiang, Wei Quan, Lin Zhang
  title: 'VMP360: Adaptive 360° Video Streaming Based on Optical Flow Estimated QoE.'
  venue: QoEVMA @ ACM Multimedia
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/PanJQZ20
