- author: Matteo Ronchetti, Wolfgang Wein, Nassir Navab, Oliver Zettinig, Raphael
    Prevost
  title: 'DISA: DIfferentiable Similarity Approximation for Universal Multimodal Registration.'
  venue: MICCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/RonchettiWNZP23
  doi: 10.1007/978-3-031-43999-5_72
  ee: https://doi.org/10.1007/978-3-031-43999-5_72
  url: https://dblp.org/rec/conf/miccai/RonchettiWNZP23
  abstract: Multimodal image registration is a challenging but essential step for
    numerous image-guided procedures. Most registration algorithms rely on the computation
    of complex, frequently non-differentiable similarity metrics to deal with the
    appearance discrepancy of anatomical structures between imaging modalities. Recent
    Machine Learning based approaches are limited to specific anatomy-modality combinations
    and do not generalize to new settings. We propose a generic framework for creating
    expressive cross-modal descriptors that enable fast deformable global registration.
    We achieve this by approximating existing metrics with a dot-product in the feature
    space of a small convolutional neural network (CNN) which is inherently differentiable
    can be trained without registered data. Our method is several orders of magnitude
    faster than local patch-based metrics and can be directly applied in clinical
    settings by replacing the similarity measure with the proposed one. Experiments
    on three different datasets demonstrate that our approach generalizes well beyond
    the training data, yielding a broad capture range even on unseen anatomies and
    modality pairs, without the need for specialized retraining. We make our training
    code and data publicly available.
- author: Soorena Salari, Amirhossein Rasoulian, Hassan Rivaz, Yiming Xiao
  title: 'FocalErrorNet: Uncertainty-Aware Focal Modulation Network for Inter-modal
    Registration Error Estimation in Ultrasound-Guided Neurosurgery.'
  venue: MICCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/SalariRRX23a
  doi: 10.1007/978-3-031-43996-4_66
  ee: https://doi.org/10.1007/978-3-031-43996-4_66
  url: https://dblp.org/rec/conf/miccai/SalariRRX23a
  abstract: In brain tumor resection, accurate removal of cancerous tissues while
    preserving eloquent regions is crucial to the safety and outcomes of the treatment.
    However, intra-operative tissue deformation (called brain shift) can move the
    surgical target and render the pre-surgical plan invalid. Intra-operative ultrasound
    (iUS) has been adopted to provide real-time images to track brain shift, and inter-modal
    (i.e., MRI-iUS) registration is often required to update the pre-surgical plan.
    Quality control for the registration results during surgery is important to avoid
    adverse outcomes, but manual verification faces great challenges due to difficult
    3D visualization and the low contrast of iUS. Automatic algorithms are urgently
    needed to address this issue, but the problem was rarely attempted. Therefore,
    we propose a novel deep learning technique based on 3D focal modulation in conjunction
    with uncertainty estimation to accurately assess MRI-iUS registration errors for
    brain tumor surgery. Developed and validated with the public RESECT clinical database,
    the resulting algorithm can achieve an estimation error of 0.59+-0.57 mm.
- author: Pragyan Shrestha, Chun Xie, Hidehiko Shishido, Yuichi Yoshii, Itaru Kitahara
  title: X-Ray to CT Rigid Registration Using Scene Coordinate Regression.
  venue: MICCAI
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ShresthaXSYK23
  doi: 10.1007/978-3-031-43999-5_74
  ee: https://doi.org/10.1007/978-3-031-43999-5_74
  url: https://dblp.org/rec/conf/miccai/ShresthaXSYK23
  abstract: Intraoperative fluoroscopy is a frequently used modality in minimally
    invasive orthopedic surgeries. Aligning the intraoperatively acquired X-ray image
    with the preoperatively acquired 3D model of a computed tomography (CT) scan reduces
    the mental burden on surgeons induced by the overlapping anatomical structures
    in the acquired images. This paper proposes a fully automatic registration method
    that is robust to extreme viewpoints and does not require manual annotation of
    landmark points during training. It is based on a fully convolutional neural network
    (CNN) that regresses the scene coordinates for a given X-ray image. The scene
    coordinates are defined as the intersection of the back-projected rays from a
    pixel toward the 3D model. Training data for a patient-specific model were generated
    through a realistic simulation of a C-arm device using preoperative CT scans.
    In contrast, intraoperative registration was achieved by solving the perspective-n-point
    (PnP) problem with a random sample and consensus (RANSAC) algorithm. Experiments
    were conducted using a pelvic CT dataset that included several real fluoroscopic
    (X-ray) images with ground truth annotations. The proposed method achieved an
    average mean target registration error (mTRE) of 3.79 mm in the 50th percentile
    of the simulated test dataset and projected mTRE of 9.65 mm in the 50th percentile
    of real fluoroscopic images for pelvis registration.
