- author: Yu Wu 0014, Yana Wei, Haozhe Wang 0002, Yongfei Liu, Sibei Yang, Xuming
    He 0001
  title: Grounded Image Text Matching with Mismatched Relation Reasoning.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/WuWWLY023
  doi: 10.1109/ICCV51070.2023.00278
  ee: https://doi.org/10.1109/ICCV51070.2023.00278
  url: https://dblp.org/rec/conf/iccv/WuWWLY023
  abstract: This paper introduces Grounded Image Text Matching with Mismatched Relation
    (GITM-MR), a novel visual-linguistic joint task that evaluates the relation understanding
    capabilities of transformer-based pre-trained models. GITM-MR requires a model
    to first determine if an expression describes an image, then localize referred
    objects or ground the mismatched parts of the text. We provide a benchmark for
    evaluating pre-trained models on this task, with a focus on the challenging settings
    of limited data and out-of-distribution sentence lengths. Our evaluation demonstrates
    that pre-trained models lack data efficiency and length generalization ability.
    To address this, we propose the Relation-sensitive Correspondence Reasoning Network
    (RCRN), which incorporates relation-aware reasoning via bi-directional message
    propagation guided by language structure. RCRN can be interpreted as a modular
    program and delivers strong performance in both length generalization and data
    efficiency.
  related_code: ''
- author: Wei Jiang 0034, Eduard Trulls, Jan Hosang, Andrea Tagliasacchi, Kwang Moo
    Yi
  title: 'COTR: Correspondence Transformer for Matching Across Images.'
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/JiangTHTY21
  doi: 10.1109/ICCV48922.2021.00615
  ee: https://doi.org/10.1109/ICCV48922.2021.00615
  url: https://dblp.org/rec/conf/iccv/JiangTHTY21
  abstract: We propose a novel framework for finding correspondences in images based
    on a deep neural network that, given two images and a query point in one of them,
    finds its correspondence in the other. By doing so, one has the option to query
    only the points of interest and retrieve sparse correspondences, or to query all
    points in an image and obtain dense mappings. Importantly, in order to capture
    both local and global priors, and to let our model relate between image regions
    using the most relevant among said priors, we realize our network using a transformer.
    At inference time, we apply our correspondence network by recursively zooming
    in around the estimates, yielding a multiscale pipeline able to provide highly-accurate
    correspondences. Our method significantly outperforms the state of the art on
    both sparse and dense correspondence problems on multiple datasets and tasks,
    ranging from wide-baseline stereo to optical flow, without any retraining for
    a specific dataset. We commit to releasing data, code, and all the tools necessary
    to train from scratch and ensure reproducibility.
  related_code: ''
- author: Yan Huang 0008, Liang Wang 0001
  title: 'ACMM: Aligned Cross-Modal Memory for Few-Shot Image and Sentence Matching.'
  venue: ICCV
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/HuangW19
  doi: 10.1109/ICCV.2019.00587
  ee: https://doi.org/10.1109/ICCV.2019.00587
  url: https://dblp.org/rec/conf/iccv/HuangW19
  abstract: Image and sentence matching has drawn much attention recently, but due
    to the lack of sufficient pairwise data for training, most previous methods still
    cannot well associate those challenging pairs of images and sentences containing
    rarely appeared regions and words, i.e., few-shot content. In this work, we study
    this challenging scenario as few-shot image and sentence matching, and accordingly
    propose an Aligned Cross-Modal Memory (ACMM) model to memorize the rarely appeared
    content. Given a pair of image and sentence, the model first includes an aligned
    memory controller network to produce two sets of semantically-comparable interface
    vectors through cross-modal alignment. Then the interface vectors are used by
    modality-specific read and update operations to alternatively interact with shared
    memory items. The memory items persistently memorize cross-modal shared semantic
    representations, which can be addressed out to better enhance the representation
    of few-shot content. We apply the proposed model to both conventional and few-shot
    image and sentence matching tasks, and demonstrate its effectiveness by achieving
    the state-of-the-art performance on two benchmark datasets.
  related_code: ''
- author: Zhong Ji, Haoran Wang 0004, Jungong Han, Yanwei Pang
  title: Saliency-Guided Attention Network for Image-Sentence Matching.
  venue: ICCV
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/JiWHP19
  doi: 10.1109/ICCV.2019.00585
  ee: https://doi.org/10.1109/ICCV.2019.00585
  url: https://dblp.org/rec/conf/iccv/JiWHP19
  abstract: 'This paper studies the task of matching image and sentence, where learning
    appropriate representations to bridge the semantic gap between image contents
    and language appears to be the main challenge. Unlike previous approaches that
    predominantly deploy symmetrical architecture to represent both modalities, we
    introduce a Saliency-guided Attention Network (SAN) that is characterized by building
    an asymmetrical link between vision and language to efficiently learn a fine-grained
    cross-modal correlation. The proposed SAN mainly includes three components: saliency
    detector, Saliency-weighted Visual Attention (SVA) module, and Saliency-guided
    Textual Attention (STA) module. Concretely, the saliency detector provides the
    visual saliency information to drive both two attention modules. Taking advantage
    of the saliency information, SVA is able to learn more discriminative visual features.
    By fusing the visual information from SVA and intra-modal information as a multi-modal
    guidance, STA affords us powerful textual representations that are synchronized
    with visual clues. Extensive experiments demonstrate SAN can improve the state-of-the-art
    results on the benchmark Flickr30K and MSCOCO datasets by a large margin.'
  related_code: ''
- author: Kunpeng Li, Yulun Zhang 0001, Kai Li 0012, Yuanyuan Li, Yun Fu 0001
  title: Visual Semantic Reasoning for Image-Text Matching.
  venue: ICCV
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LiZLLF19
  doi: 10.1109/ICCV.2019.00475
  ee: https://doi.org/10.1109/ICCV.2019.00475
  url: https://dblp.org/rec/conf/iccv/LiZLLF19
  abstract: Image-text matching has been a hot research topic bridging the vision
    and language areas. It remains challenging because the current representation
    of image usually lacks global semantic concepts as in its corresponding text caption.
    To address this issue, we propose a simple and interpretable reasoning model to
    generate visual representation that captures key objects and semantic concepts
    of a scene. Specifically, we first build up connections between image regions
    and perform reasoning with Graph Convolutional Networks to generate features with
    semantic relationships. Then, we propose to use the gate and memory mechanism
    to perform global semantic reasoning on these relationship-enhanced features,
    select the discriminative information and gradually generate the representation
    for the whole scene. Experiments validate that our method achieves a new state-of-the-art
    for the image-text matching on MS-COCO and Flickr30K datasets. It outperforms
    the current best method by 6.8% relatively for image retrieval and 4.8% relatively
    for caption retrieval on MS-COCO (Recall@1 using 1K test set). On Flickr30K, our
    model improves image retrieval by 12.6% relatively and caption retrieval by 5.8%
    relatively (Recall@1).
  related_code: ''
- author: Krishna Regmi, Mubarak Shah
  title: Bridging the Domain Gap for Ground-to-Aerial Image Matching.
  venue: ICCV
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/RegmiS19
  doi: 10.1109/ICCV.2019.00056
  ee: https://doi.org/10.1109/ICCV.2019.00056
  url: https://dblp.org/rec/conf/iccv/RegmiS19
  abstract: The visual entities in cross-view (e.g. ground and aerial) images exhibit
    drastic domain changes due to the differences in viewpoints each set of images
    is captured from. Existing state-of-the-art methods address the problem by learning
    view-invariant images descriptors. We propose a novel method for solving this
    task by exploiting the gener- ative powers of conditional GANs to synthesize an
    aerial representation of a ground-level panorama query and use it to minimize
    the domain gap between the two views. The synthesized image being from the same
    view as the ref- erence (target) image, helps the network to preserve im- portant
    cues in aerial images following our Joint Feature Learning approach. We fuse the
    complementary features from a synthesized aerial image with the original ground-
    level panorama features to obtain a robust query represen- tation. In addition,
    we employ multi-scale feature aggre- gation in order to preserve image representations
    at dif- ferent scales useful for solving this complex task. Experi- mental results
    show that our proposed approach performs significantly better than the state-of-the-art
    methods on the challenging CVUSA dataset in terms of top-1 and top-1% retrieval
    accuracies. Furthermore, we evaluate the gen- eralization of the proposed method
    for urban landscapes on our newly collected cross-view localization dataset with
    geo-reference information.
  related_code: ''
- author: Nikolaos Sarafianos, Xiang Xu 0005, Ioannis A. Kakadiaris
  title: Adversarial Representation Learning for Text-to-Image Matching.
  venue: ICCV
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/Sarafianos0K19
  doi: 10.1109/ICCV.2019.00591
  ee: https://doi.org/10.1109/ICCV.2019.00591
  url: https://dblp.org/rec/conf/iccv/Sarafianos0K19
  abstract: 'For many computer vision applications such as image captioning, visual
    question answering, and person search, learning discriminative feature representations
    at both image and text level is an essential yet challenging problem. Its challenges
    originate from the large word variance in the text domain as well as the difficulty
    of accurately measuring the distance between the features of the two modalities.
    Most prior work focuses on the latter challenge, by introducing loss functions
    that help the network learn better feature representations but fail to account
    for the complexity of the textual input. With that in mind, we introduce TIMAM:
    a Text-Image Modality Adversarial Matching approach that learns modality-invariant
    feature representations using adversarial and cross-modal matching objectives.
    In addition, we demonstrate that BERT, a publicly-available language model that
    extracts word embeddings, can successfully be applied in the text-to-image matching
    domain. The proposed approach achieves state-of-the-art cross-modal matching performance
    on four widely-used publicly-available datasets resulting in absolute improvements
    ranging from 2% to 5% in terms of rank-1 accuracy.'
  related_code: ''
- author: Shuang Wang 0001, Yanfeng Li, Xuefeng Liang, Dou Quan, Bowu Yang, Shaowei
    Wei, Licheng Jiao
  title: 'Better and Faster: Exponential Loss for Image Patch Matching.'
  venue: ICCV
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/WangLLQYWJ19
  doi: 10.1109/ICCV.2019.00491
  ee: https://doi.org/10.1109/ICCV.2019.00491
  url: https://dblp.org/rec/conf/iccv/WangLLQYWJ19
  abstract: Recent studies on image patch matching are paying more attention on hard
    sample learning, because easy samples do not contribute much to the network optimization.
    They have proposed various hard negative sample mining strategies, but very few
    addressed this problem from the perspective of loss functions. Our research shows
    that the conventional Siamese and triplet losses treat all samples linearly, thus
    make the training time consuming. Instead, we propose the exponential Siamese
    and triplet losses, which can naturally focus more on hard samples and put less
    emphasis on easy ones, meanwhile, speed up the optimization. To assist the exponential
    losses, we introduce the hard positive sample mining to further enhance the effectiveness.
    The extensive experiments demonstrate our proposal improves both metric and descriptor
    learning on several well accepted benchmarks, and outperforms the state-of-the-arts
    on the UBC dataset. Moreover, it also shows a better generalizability on cross-spectral
    image matching and image retrieval tasks.
