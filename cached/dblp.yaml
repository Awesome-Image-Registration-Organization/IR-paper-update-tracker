  url: https://dblp.org/rec/conf/iccv/TianWY25
  abstract: Driven by large-scale contrastive vision-language pretrained models such
    as CLIP, recent advancements in the image-text matching task have achieved remarkable
    success in representation learning. Due to image-level visuallanguage alignment,
    CLIP falls short in understanding finegrained details such as object attributes
    and spatial relationships between objects. Recent efforts have attempted to compel
    CLIP to acquire structured visual representations by introducing prompt learning
    to achieve object-level alignment. While achieving promising results, they still
    lack the capability to perceive actions, which are crucial for describing the
    states or relationships between objects. Therefore, we propose to endow CLIP with
    fine-grained action-level understanding by introducing an LLM-enhanced actionaware
    multi-modal prompt-tuning method, incorporating the action-related external knowledge
    generated by large language models (LLMs). Specifically, we design an action triplet
    prompt and an action state prompt to exploit compositional semantic knowledge
    and state-related causal knowledge implicitly stored in LLMs. Subsequently, we
    propose an adaptive interaction module to aggregate attentive visual features
    conditioned on action-aware prompted knowledge for establishing discriminative
    and action-aware visual representations, which further improves the performance.
    Comprehensive experimental results on two benchmark datasets demonstrate the effectiveness
    of our method. Codes are at https://github.com/MengxiaoTian/LAMP.
  related_code: https://github.com/MengxiaoTian/LAMP
- author: Miao Fan, Mingrui Chen, Chen Hu, Shuchang Zhou 0001
  title: 'Occ2Net: Robust Image Matching Based on 3D Occupancy Estimation for Occluded
    Regions.'
  venue: ICCV
