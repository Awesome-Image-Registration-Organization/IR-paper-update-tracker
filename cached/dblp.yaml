- author: Jing Zhu 0005, Yuhang Zhou, Shengyi Qian 0001, Zhongmou He, Tong Zhao 0003,
    Neil Shah, Danai Koutra
  title: 'Mosaic of Modalities: A Comprehensive Benchmark for Multimodal Graph Learning.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/0005Z0H0SK25
  doi: 10.1109/CVPR52734.2025.01326
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Zhu_Mosaic_of_Modalities_A_Comprehensive_Benchmark_for_Multimodal_Graph_Learning_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/0005Z0H0SK25
  abstract: Graph machine learning has made significant strides in recent years, yet
    the integration of visual information with graph structure and its potential for
    improving performance in downstream tasks remains an underexplored area. To address
    this critical gap, we introduce the Multimodal Graph Benchmark (MM-Graph), a pioneering
    benchmark that incorporates both visual and textual information into graph learning
    tasks. MM-Graph extends beyond existing text-attributed graph benchmarks, offering
    a more comprehensive evaluation framework for multimodal graph learning. Our benchmark
    comprises seven diverse datasets of varying scales (ranging from thousands to
    millions of edges), designed to assess algorithms across different tasks in real-world
    scenarios. These datasets feature rich multimodal node attributes, including visual
    data, which enables a more holistic evaluation of various graph learning frameworks
    in complex, multimodal environments. To support advancements in this emerging
    field, we provide an extensive empirical study on various graph learning frameworks
    when presented with features from multiple modalities, particularly emphasizing
    the impact of visual information. This study offers valuable insights into the
    challenges and opportunities of integrating visual data into graph learning.
