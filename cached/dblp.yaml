- author: Xudong Guo, Peiyu Chen, Haifeng Wang, Zhichao Yan, Qinfen Jiang, Rongjiang
    Wang, Ji Bin
  title: 'UTMorph: A hybrid CNN-transformer network for weakly-supervised multimodal
    image registration in biopsy puncture.'
  venue: Medical Image Anal.
  year: '2026'
  type: Journal Articles
  access: closed
  key: journals/mia/GuoCWYJWB26
  doi: 10.1016/J.MEDIA.2026.103938
  ee: https://doi.org/10.1016/j.media.2026.103938
  url: https://dblp.org/rec/journals/mia/GuoCWYJWB26
  abstract: 'Accurate registration of preoperative magnetic resonance imaging (MRI)
    and intraoperative ultrasound (US) images is essential to enhance the precision
    of biopsy punctures and targeted ablation procedures using robotic systems. To
    improve the speed and accuracy of registration algorithms while accounting for
    soft tissue deformation during puncture, we propose UTMorph, a hybrid framework
    consisting of convolutional neural network (CNN) and Transformer network, based
    on the U-Net architecture. This model is designed to enable efficient and deformable
    multimodal image registration. We introduced a novel attention mechanism that
    focuses on the structured features of images, thereby ensuring precise deformation
    estimation and reducing computational complexity. In addition, we proposed a hybrid
    edge loss function to complement the shape and boundary information, thereby improving
    registration accuracy. Experiments were conducted on data from 704 patients, including
    private datasets from Shanghai East Hospital, public datasets from The Cancer
    Imaging Archive, and the µ-ProReg Challenge. The performance of UTMorph was compared
    with that of six commonly used registration methods and loss functions. UTMorph
    achieved superior performance across multiple evaluation metrics (dice similarity
    coefficient: 0.890, 95th percentile Hausdorff distance: 2.679 mm, mean surface
    distance: 0.284 mm, and Jacobi determinant: 0.040) and ensures accurate registration
    with minimal memory usage, even under significant modal differences. These findings
    validate the effectiveness of the UTMorph model with the hybrid edge loss function
    for MR-US deformable medical image registration. This code is available at https://github.com/Prps7/UTMorph.'
- author: Yibo Hu, Qi Zhang, Ziqi Zhao, Xiaoyi Ding, Wentao Li, Jijin Yang, Jianqi
    Sun, Lisa X. Xu
  title: 'ARDMR: Adaptive recursive inference and representation disentanglement for
    multimodal large deformation registration.'
  venue: Medical Image Anal.
  year: '2026'
  type: Journal Articles
  access: closed
  key: journals/mia/HuZZDLYSX26
  doi: 10.1016/J.MEDIA.2025.103844
  ee: https://doi.org/10.1016/j.media.2025.103844
  url: https://dblp.org/rec/journals/mia/HuZZDLYSX26
  abstract: Deformable registration of multimodal medical images constitutes a fundamental
    task in many medical image analysis applications, particularly in the diagnosis
    and treatment of liver cancer where different modality images are frequently employed.
    Despite the emergence of various learning-based registration models, multimodal
    registration remains a challenging task due to pronounced intensity differences
    and significant tissue deformations. To address these challenges, we approach
    the problem from two perspectives-mitigating modality discrepancies and enhancing
    the model's capacity to handle large deformations. We propose a multimodal deformable
    registration model based on adaptive recursive inference and representation disentanglement
    (ARDMR). Specifically, to enhance the model's ability to learn features from different
    modalities, we introduce a modality representation disentanglement method, incorporating
    Multi-layer Contrastive Loss (MCL) to enforce the learning of modality-invariant
    features. To address the challenge of large complex deformations, we propose a
    Multi-Scale Feature Registration module (MSFR), which integrates features and
    deformation fields from different scales during the registration process. Finally,
    to further exploit the registration potential of the trained model, we propose
    an adaptive recursive inference strategy. This strategy automatically determines
    the optimal recursive registration scale and the number of iterations based on
    the image's real-time registration performance. We conducted experiments on multimodal
    datasets collected from multiple medical centers and compared our method with
    several state-of-the-art registration models. The results indicate that our proposed
    ARDMR model outperforms others in both qualitative and quantitative evaluations.
    Specifically, compared with the baseline VoxelMorph model, ARDMR improves the
    DSC metric by 2.5%-5% across different datasets. Furthermore, tests on distribution-shifted
    data demonstrate that our model exhibits the best robustness and generalization.
    Code is available at https://github.com/ybby2020/ARDMR_MIA.
- author: Dongyuan Li, Yixin Shan, Yuxuan Mao, Puxun Tu, Haochen Shi, Shenghao Huang,
    Weiyan Sun, Chang Chen, Xiaojun Chen 0003
  title: Robust non-rigid image-to-patient registration for contactless dynamic thoracic
    tumor localization using recursive deformable diffusion models.
  venue: Medical Image Anal.
  year: '2026'
  type: Journal Articles
  access: closed
  key: journals/mia/LiSMTSHSCC26
  doi: 10.1016/J.MEDIA.2026.103948
  ee: https://doi.org/10.1016/j.media.2026.103948
  url: https://dblp.org/rec/journals/mia/LiSMTSHSCC26
  abstract: Deformable image-to-patient registration is essential for surgical navigation
    and medical imaging, yet real-time computation of spatial transformations across
    modalities remains a major clinical challenge-often being time-consuming, error-prone,
    and potentially increasing trauma or radiation exposure. While state-of-the-art
    methods achieve impressive speed and accuracy on paired medical images, they face
    notable limitations in cross-modal thoracic applications, where physiological
    motions such as respiration complicate tumor localization. To address this, we
    propose a robust, contactless, non-rigid registration framework for dynamic thoracic
    tumor localization. A highly efficient Recursive Deformable Diffusion Model (RDDM)
    is trained to reconstruct comprehensive 4DCT sequences from only end-inhalation
    and end-exhalation scans, capturing respiratory dynamics reflective of the intraoperative
    state. For real-time patient alignment, we introduce a contactless non-rigid registration
    algorithm based on GICP, leveraging patient skin surface point clouds captured
    by stereo RGB-D imaging. By incorporating normal vector and expansion-contraction
    constraints, the method enhances robustness and avoids local minima. The proposed
    framework was validated on publicly available datasets and volunteer trials. Quantitative
    evaluations demonstrated the RDDM's anatomical fidelity across respiratory phases,
    achieving an PSNR of 34.01 ± 2.78 dB. Moreover, we have preliminarily developed
    a 4DCT-based registration and surgical navigation module to support tumor localization
    and high-precision tracking. Experimental results indicate that the proposed framework
    preliminarily meets clinical requirements and demonstrates potential for integration
    into downstream surgical systems.
- author: Anna Reithmeir, Veronika Spieker, Vasiliki Sideri-Lampretsa, Daniel Rueckert,
    Julia A. Schnabel, Veronika A. Zimmer
  title: 'From model based to learned regularization in medical image registration:
    A comprehensive review.'
  venue: Medical Image Anal.
  year: '2026'
  type: Journal Articles
  access: closed
  key: journals/mia/ReithmeirSSRSZ26
  doi: 10.1016/J.MEDIA.2025.103854
  ee: https://doi.org/10.1016/j.media.2025.103854
  url: https://dblp.org/rec/journals/mia/ReithmeirSSRSZ26
  abstract: Image registration is fundamental in medical imaging applications, such
    as disease progression analysis or radiation therapy planning. The primary objective
    of image registration is to precisely capture the deformation between two or more
    images, typically achieved by minimizing an optimization problem. Due to its inherent
    ill-posedness, regularization is a key component in driving the solution toward
    anatomically meaningful deformations. A wide range of regularization methods has
    been proposed for both conventional and deep learning-based registration. However,
    the appropriate application of regularization techniques often depends on the
    specific registration problem, and no "one-fits-all" method exists. Despite its
    importance, regularization is often overlooked or addressed with default approaches,
    assuming existing methods are sufficient. A comprehensive and structured review
    remains missing. This review addresses this gap by introducing a novel taxonomy
    that systematically categorizes the diverse range of proposed regularization methods.
    It highlights the emerging field of learned regularization, which leverages data-driven
    techniques to automatically derive deformation properties from the data. Moreover,
    this review examines the transfer of regularization methods from conventional
    to learning-based registration, identifies open challenges, and outlines future
    research directions. By emphasizing the critical role of regularization in image
    registration, we hope to inspire the research community to reconsider regularization
    strategies in modern registration algorithms and to explore this rapidly evolving
    field further.
- author: M. Sjoerdsma, S. Bouwmeester, F. van Heesch, P. Houthuizen, Richard G. P.
    Lopata
  title: Spatio-temporal registration of multi-perspective 3D echocardiography for
    improved strain estimation.
  venue: Medical Image Anal.
  year: '2026'
  type: Journal Articles
  access: open
  key: journals/mia/SjoerdsmaBHHL26
  doi: 10.1016/J.MEDIA.2025.103791
  ee: https://doi.org/10.1016/j.media.2025.103791
  url: https://dblp.org/rec/journals/mia/SjoerdsmaBHHL26
  abstract: For heart diagnostics, ultrasound is generally the modality of choice
    due to its high temporal and spatial resolution, availability, and patient safety.
    Although 3D echocardiography captures the complex shape and motion of the heart
    with more precision than 2D, it suffers to a greater extent from poor resolution,
    noise, and limited field-of-view. Multi-perspective echocardiography has proven
    to significantly enhance both image quality and field-of-view. The greatest improvements
    occur when combining acquisitions from widely differing insonification angles,
    but this process is challenging because of substantial local structural and brightness
    variations and ultrasound's anisotropic nature. To handle these inconsistencies,
    a novel temporal and spatial registration algorithm designed is proposed. Temporal
    registration is achieved using low-frequency cardiac wall features and motion
    extracted via singular value decomposition of a spatio-temporal Casorati matrix,
    while spatial registration is performed using phase-only correlation of low-frequency
    data. The acquisitions are seamlessly fused using a 3D, oriented, wavelet transform
    including a near-field clutter algorithm. In vitro and in vivo testing highlights
    the benefits of this approach. Temporal alignment, validated against electrocardiograms,
    is precise, with an average error of just 2 ± 10 ms. Furthermore, our method outperforms
    a six-degree-of-freedom encoder-based probe tracker, reducing spatial registration
    error to 5 ± 3 mm from 19 ± 10 mm. The resulting longitudinal and radial strain
    measurements closely align with those obtained by tagged magnetic resonance imaging,
    demonstrating the accuracy and feasibility of this technique.
- author: Mohamed A. Suliman, Logan Z. J. Williams, Abdulah Fawaz, Emma C. Robinson
  title: Unsupervised multimodal surface registration with geometric deep learning.
  venue: Medical Image Anal.
  year: '2026'
  type: Journal Articles
  access: closed
  key: journals/mia/SulimanWFR26
  doi: 10.1016/J.MEDIA.2025.103821
  ee: https://doi.org/10.1016/j.media.2025.103821
  url: https://dblp.org/rec/journals/mia/SulimanWFR26
  abstract: This paper introduces GeoMorph, a novel geometric deep-learning framework
    designed for image registration of cortical surfaces. The registration process
    consists of two main steps. First, independent feature extraction is performed
    on each input surface using graph convolutions, generating low-dimensional feature
    representations that capture important cortical surface characteristics. Subsequently,
    features are registered in a deep-discrete manner to optimize the overlap of common
    structures across surfaces by learning displacements of a set of control points.
    To ensure smooth and biologically plausible deformations, we implement regularization
    through a deep conditional random field implemented with a recurrent neural network.
    Experimental results demonstrate that GeoMorph surpasses existing deep-learning
    methods by achieving improved alignment with smoother deformations. Furthermore,
    GeoMorph exhibits competitive performance compared to classical frameworks. Such
    versatility and robustness suggest strong potential for various neuroscience applications.
    Code is made available at https://github.com/mohamedasuliman/GeoMorph.
- author: Shansong Wang, Mojtaba Safari, Qiang Li, Chih-Wei Chang, Richard L. J. Qiu,
    Justin Roper, David S. Yu, Xiaofeng Yang 0005
  title: Vision foundation model for 3D magnetic resonance imaging segmentation, classification,
    and registration.
  venue: Medical Image Anal.
  year: '2026'
  type: Journal Articles
  access: closed
  key: journals/mia/WangSLCQRYY26
  doi: 10.1016/J.MEDIA.2026.103992
  ee: https://doi.org/10.1016/j.media.2026.103992
  url: https://dblp.org/rec/journals/mia/WangSLCQRYY26
  abstract: Vision foundation models (VFMs) are pre-trained on extensive image datasets
    to learn general representations. These models can subsequently be fine-tuned
    for specific downstream tasks, markedly boosting performance across a broad range
    of applications. However, existing vision foundation models that claim to be applicable
    to various downstream tasks are mostly pre-trained on imaging modalities with
    different characteristics than magnetic resonance imaging (MRI), those differences
    in imaging principles, signal characteristics, and data distribution may hinder
    their practical performance and versatility in MRI-specific applications. Here,
    we propose Triad, a vision foundation model for 3D MRI segmentation, classification,
    and registration. Triad learns robust representations from 129K 3D MRI volumes
    based on SimMIM framework and uses textual descriptions related to modality, device
    parameters, and imaging parameters to constrain the semantic distribution of the
    visual modality. The above pre-training dataset is called Triad-129K, which is
    currently the largest 3D MRI pre-training dataset. We evaluate Triad across three
    tasks, namely, organ/tumor segmentation, organ/cancer classification, and medical
    image registration, in two data modalities (within-domain and out-of-domain) settings
    using 25 downstream datasets. By initializing models with Triad's pre-trained
    weights, nnUNet-Triad-SimMIM improves segmentation performance by 2.13% compared
    to nnUNet-Scratch across 17 datasets. Swin-B-Triad-SimMIM achieves a 4.38% improvement
    over Swin-B-Scratch in classification tasks across five datasets. SwinUNETR-Triad-SimMIM
    improves by 3.84% compared to SwinUNETR-Scratch in registration tasks across two
    datasets. Our study demonstrates that pre-training can improve performance when
    the data modalities and organs of upstream and downstream tasks are consistent.
    This work highlights the value of large-scale pre-training techniques for downstream
    tasks in 3D MRI.
- author: Haiqiao Wang, Zhuoyuan Wang, Dong Ni 0001, Yi Wang 0031
  title: 'ModeTv2: GPU-accelerated motion decomposition transformer for pairwise optimization
    in medical image registration.'
  venue: Medical Image Anal.
  year: '2026'
  type: Journal Articles
  access: closed
  key: journals/mia/WangWNW26
  doi: 10.1016/J.MEDIA.2025.103862
  ee: https://doi.org/10.1016/j.media.2025.103862
  url: https://dblp.org/rec/journals/mia/WangWNW26
  abstract: Deformable image registration plays a crucial role in medical imaging,
    aiding in disease diagnosis and image-guided interventions. Traditional iterative
    methods are slow, while deep learning (DL) accelerates solutions but faces usability
    and precision challenges. This study introduces a pyramid network with the enhanced
    motion decomposition Transformer (ModeTv2) operator, showcasing superior pairwise
    optimization (PO) akin to traditional methods. We re-implement ModeT operator
    with CUDA extensions to enhance its computational efficiency. We further propose
    RegHead module which refines deformation fields, improves the realism of deformation
    and reduces parameters. By adopting the PO, the proposed network balances accuracy,
    efficiency, and generalizability. Extensive experiments on three public brain
    MRI datasets and one abdominal CT dataset demonstrate the network's suitability
    for PO, providing a DL model with enhanced usability. The code is publicly available
    athttps://github.com/ZAX130/ModeTv2.
- author: Zhengyang Wu 0002, Wenjie Zheng 0004, Yingjie Hao, Jing Ling, Maodan Nie,
    Rui Zuo, Minghan Liu, Zegang Shi, Wen Xia, Fayuan Zhou, Zhuojun Cao, Jingjing
    Xiao, Weisheng Li 0001, Guifeng Xia, Changqing Li, Yucheng Shu, Chao Zhang 0106
  title: 'DVAP-Reg: Dual-view anatomical prior-driven cross-dimensional registration
    for spinal surgery navigation.'
  venue: Medical Image Anal.
  year: '2026'
  type: Journal Articles
  access: closed
  key: journals/mia/WuZHLNZLSXZCXLXLSZ26
  doi: 10.1016/J.MEDIA.2025.103930
  ee: https://doi.org/10.1016/j.media.2025.103930
  url: https://dblp.org/rec/journals/mia/WuZHLNZLSXZCXLXLSZ26
  abstract: '2D-3D cross-dimensional registration serves as a critical technology
    in spinal surgery navigation, with profound implications for enhancing surgical
    precision, reducing radiation exposure and mitigating surgical risks. Its core
    objective is to achieve visual navigation by accurately aligning preoperative
    high-resolution 3D vertebrae with intraoperative 2D X-rays. However, this technology
    remains constrained by prominent challenges, primarily arising from the inherent
    semantic and dimensional discrepancies. Traditional registration methods, typically
    relying on classical iterative optimization strategies, suffer from low computational
    efficiency. Meanwhile, deep learning-based approaches struggle to accommodate
    the spatial randomness inherent in intraoperative 2D X-rays and 3D vertebrae.
    In this paper, we propose a dual-view anatomical prior-driven cross-dimensional
    registration method for spinal surgery navigation. First, a direct regression
    network based on dual-view X-rays, integrated with a proposed spatial correlation
    mechanism, is employed to enhance geometric consistency constraints and mitigate
    inter-patient anatomical variability. Then, corresponding vertebrae''s anatomical
    priors, extracted via the proposed Face-GCN module as conditional information
    enhancement for high-level, generalized spatial perception, are fused into the
    regression network for spatial pose alignment guidance. Finally, a clinical cross-dimensional
    image dataset is released using the developed interactive registration platform.
    The proposed network has been validated in real-world spinal surgical navigation
    scenarios across diverse lumbar spine pathologies, utilizing authentic intraoperative
    2D X-rays and preoperative 3D CT images. In these clinical settings, our method
    achieves real-time 2D-3D image-assisted navigation with rotational and translational
    accuracy of 2.81° and 1.82 mm, demonstrating its ability to keep pace with the
    time-sensitive, ever-changing nature of intraoperative workflows. Our project''s
    dataset and source code are available at: https://github.com/TMMU-KLPOP/DVAP-Reg.'
- author: Housheng Xie, Xiaoru Gao, Guoyan Zheng
  title: 'BIASNet: A bidirectional feature alignment and semantics-guided network
    for weakly-supervised medical image registration.'
  venue: Medical Image Anal.
  year: '2026'
  type: Journal Articles
  access: closed
  key: journals/mia/XieGZ26
  doi: 10.1016/J.MEDIA.2025.103913
  ee: https://doi.org/10.1016/j.media.2025.103913
  url: https://dblp.org/rec/journals/mia/XieGZ26
  abstract: Medical image registration, which establishes spatial correspondences
    between different medical images, serves as a fundamental process in numerous
    clinical applications and diagnostic workflows. Despite significant advancement
    in unsupervised deep learning-based registration methods, these approaches consistently
    yield suboptimal results compared to their weakly-supervised counterparts. Recent
    advancements in universal segmentation models have made it easier to obtain anatomical
    labels from medical images. However, existing registration methods have not fully
    leveraged the rich anatomical and structural prior information provided by segmentation
    labels. To address this limitation, we propose a BIdirectional feature Alignment
    and Semantics-guided Network, referred to as BIASNet, for weakly-supervised image
    registration. Specifically, starting from multi-scale features extracted from
    the pre-trained VoCo, fine-tuned using Low-Rank Adaptation (LoRA), we propose
    a dual-attribute learning scheme, incorporating a novel BIdirectional Alignment
    and Fusion (BIAF) module for extracting both semantics-wise and intensity-wise
    features. These two types of features are subsequently fed into a semantics-guided
    progressive registration framework for accurate deformation field estimation.
    We further propose an anatomical region deformation consistency learning to regularize
    the target anatomical regions deformation. Comprehensive experiments conducted
    on three typical yet challenging datasets demonstrate that our method achieves
    consistently better results than other state-of-the-art deformable registration
    approaches. The source code is publicly available at https://github.com/xiehousheng/BIASNet.
- author: Adrià Casamitjana, Roser Sala-Llonch, Karim Lekadir, Juan Eugenio Iglesias
  title: 'USLR: An open-source tool for unbiased and smooth longitudinal registration
    of brain MRI.'
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/CasamitjanaSLI25
  doi: 10.1016/J.MEDIA.2025.103662
  ee: https://doi.org/10.1016/j.media.2025.103662
  url: https://dblp.org/rec/journals/mia/CasamitjanaSLI25
  abstract: 'We present the "Unbiased and Smooth Longitudinal Registration" (USLR)
    method, a computational framework for longitudinal registration of brain MRI scans
    to estimate non-linear image trajectories that are smooth across time, unbiased
    to any timepoint, and robust to imaging artefacts. It operates on the Lie algebra
    parameterisation of spatial transforms (which is compatible with rigid transforms
    and stationary velocity fields for non-linear deformation) and takes advantage
    of log-domain properties to solve the problem using Bayesian inference. USRL estimates
    spatial transformations that: (i) bring all timepoints to an unbiased subject-specific
    space; and (ii) compute a smooth trajectory across the imaging time-series. We
    capitalise on learning-based registration algorithms and closed-form expressions
    for fast inference. An Alzheimer''s disease study is used to showcase the benefits
    of the pipeline in multiple fronts, such as time-consistent image segmentation
    to reduce intra-subject variability, subject-specific prediction or population
    analysis using tensor-based morphometry. We demonstrate that such an approach
    improves upon cross-sectional methods in identifying group differences, which
    can be helpful in detecting more subtle atrophy levels or in reducing sample sizes
    in clinical trials. The code is publicly available in https://github.com/acasamitjana/uslr.'
- author: Yuan Chang, Zheng Li
  title: Attention-enhanced Dual-stream Registration Network via Mixed Attention Transformer
    and Gated Adaptive Fusion.
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/ChangL25
  doi: 10.1016/J.MEDIA.2025.103713
  ee: https://doi.org/10.1016/j.media.2025.103713
  url: https://dblp.org/rec/journals/mia/ChangL25
  abstract: Deformable registration requires extracting salient features within each
    image and finding feature pairs with potential matching possibilities between
    the moving and fixed images, thereby estimating the deformation field used to
    align the images to be registered. With the development of deep learning, various
    deformable registration networks utilizing advanced architectures such as CNNs
    or Transformers have been proposed, showing excellent registration performance.
    However, existing works fail to effectively achieve both feature extraction within
    images and feature matching between images simultaneously. In this paper, we propose
    a novel Attention-enhanced Dual-stream Registration Network (ADRNet) for deformable
    brain MRI registration. First, we use parallel CNN modules to extract shallow
    features from the moving and fixed images separately. Then, we propose a Mixed
    Attention Transformer (MAT) module with self-attention, cross-attention, and local
    attention to model self-correlation and cross-correlation to find features for
    matching. Finally, we improve skip connections, a key component of U-shape networks
    ignored by existing methods. We propose a Gated Adaptive Fusion (GAF) module with
    a gate mechanism, using decoding features to control the encoding features transmitted
    through skip connections, to better integrate encoder-decoder features, thereby
    obtaining matching features with more accurate one-to-one correspondence. The
    extensive and comprehensive experiments on three public brain MRI datasets demonstrate
    that our method achieves state-of-the-art registration performance.
- author: Tongtong Che, Lin Zhang 0043, Debin Zeng, Yan Zhao, Haoying Bai, Jichang
    Zhang, Xiuying Wang 0001, Shuyu Li
  title: Nested hierarchical group-wise registration with a graph-based subgrouping
    strategy for efficient template construction.
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/CheZZZBZWL25
  doi: 10.1016/J.MEDIA.2025.103624
  ee: https://doi.org/10.1016/j.media.2025.103624
  url: https://dblp.org/rec/journals/mia/CheZZZBZWL25
  abstract: 'Accurate and efficient group-wise registration for medical images is
    fundamentally important to construct a common template image for population-level
    analysis. However, current group-wise registration faces the challenges posed
    by the algorithm''s efficiency and capacity, and adaptability to large variations
    in the subject populations. This paper addresses these challenges with a novel
    Nested Hierarchical Group-wise Registration (NHGR) framework. Firstly, to alleviate
    the registration burden due to significant population variations, a new subgrouping
    strategy is proposed to serve as a "divide and conquer" mechanism that divides
    a large population into smaller subgroups. The subgroups with a hierarchical sequence
    are formed by gradually expanding the scale factors that relate to feature similarity
    and then conducting registration at the subgroup scale as the multi-scale conquer
    strategy. Secondly, the nested hierarchical group-wise registration is proposed
    to conquer the challenges due to the efficiency and capacity of the model from
    three perspectives. (1) Population level: the global group-wise registration is
    performed to generate age-related sub-templates from local subgroups progressively
    to the global population. (2) Subgroup level: the local group-wise registration
    is performed based on local image distributions to reduce registration error and
    achieve rapid optimization of sub-templates. (3) Image pair level: a deep multi-resolution
    registration network is employed for better registration efficiency. The proposed
    framework was evaluated on the brain datasets of adults and adolescents, respectively
    from 18 to 96 years and 5 to 21 years. Experimental results consistently demonstrated
    that our proposed group-wise registration method achieved better performance in
    terms of registration efficiency, template sharpness, and template centrality.'
- author: Junyu Chen 0002, Yihao Liu 0003, Shuwen Wei, Zhangxing Bian, Shalini Subramanian,
    Aaron Carass, Jerry L. Prince, Yong Du 0002
  title: 'A survey on deep learning in medical image registration: New technologies,
    uncertainty, evaluation metrics, and beyond.'
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/ChenLWBSCPD25
  doi: 10.1016/J.MEDIA.2024.103385
  ee: https://doi.org/10.1016/j.media.2024.103385
  url: https://dblp.org/rec/journals/mia/ChenLWBSCPD25
  abstract: Deep learning technologies have dramatically reshaped the field of medical
    image registration over the past decade. The initial developments, such as regression-based
    and U-Net-based networks, established the foundation for deep learning in image
    registration. Subsequent progress has been made in various aspects of deep learning-based
    registration, including similarity measures, deformation regularizations, network
    architectures, and uncertainty estimation. These advancements have not only enriched
    the field of image registration but have also facilitated its application in a
    wide range of tasks, including atlas construction, multi-atlas segmentation, motion
    estimation, and 2D-3D registration. In this paper, we present a comprehensive
    overview of the most recent advancements in deep learning-based image registration.
    We begin with a concise introduction to the core concepts of deep learning-based
    image registration. Then, we delve into innovative network architectures, loss
    functions specific to registration, and methods for estimating registration uncertainty.
    Additionally, this paper explores appropriate evaluation metrics for assessing
    the performance of deep learning models in registration tasks. Finally, we highlight
    the practical applications of these novel techniques in medical imaging and discuss
    the future prospects of deep learning-based image registration.
- author: Negar Golestani, Aihui Wang, Golnaz Moallem, Gregory R. Bean, Mirabela Rusu
  title: 'PViT-AIR: Puzzling vision transformer-based affine image registration for
    multi histopathology and faxitron images of breast tissue.'
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/GolestaniWMBR25
  doi: 10.1016/J.MEDIA.2024.103356
  ee: https://doi.org/10.1016/j.media.2024.103356
  url: https://dblp.org/rec/journals/mia/GolestaniWMBR25
  abstract: Breast cancer is a significant global public health concern, with various
    treatment options available based on tumor characteristics. Pathological examination
    of excision specimens after surgery provides essential information for treatment
    decisions. However, the manual selection of representative sections for histological
    examination is laborious and subjective, leading to potential sampling errors
    and variability, especially in carcinomas that have been previously treated with
    chemotherapy. Furthermore, the accurate identification of residual tumors presents
    significant challenges, emphasizing the need for systematic or assisted methods
    to address this issue. In order to enable the development of deep-learning algorithms
    for automated cancer detection on radiology images, it is crucial to perform radiology-pathology
    registration, which ensures the generation of accurately labeled ground truth
    data. The alignment of radiology and histopathology images plays a critical role
    in establishing reliable cancer labels for training deep-learning algorithms on
    radiology images. However, aligning these images is challenging due to their content
    and resolution differences, tissue deformation, artifacts, and imprecise correspondence.
    We present a novel deep learning-based pipeline for the affine registration of
    faxitron images, the x-ray representations of macrosections of ex-vivo breast
    tissue, and their corresponding histopathology images of tissue segments. The
    proposed model combines convolutional neural networks and vision transformers,
    allowing it to effectively capture both local and global information from the
    entire tissue macrosection as well as its segments. This integrated approach enables
    simultaneous registration and stitching of image segments, facilitating segment-to-macrosection
    registration through a puzzling-based mechanism. To address the limitations of
    multi-modal ground truth data, we tackle the problem by training the model using
    synthetic mono-modal data in a weakly supervised manner. The trained model demonstrated
    successful performance in multi-modal registration, yielding registration results
    with an average landmark error of 1.51 mm (±2.40), and stitching distance of 1.15
    mm (±0.94). The results indicate that the model performs significantly better
    than existing baselines, including both deep learning-based and iterative models,
    and it is also approximately 200 times faster than the iterative approach. This
    work bridges the gap in the current research and clinical workflow and has the
    potential to improve efficiency and accuracy in breast cancer evaluation and streamline
    pathology workflow.
- author: Rohit Jena, Pratik Chaudhari, James C. Gee
  title: Deep implicit optimization enables robust learnable features for deformable
    image registration.
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: open
  key: journals/mia/JenaCG25
  doi: 10.1016/J.MEDIA.2025.103577
  ee: https://doi.org/10.1016/j.media.2025.103577
  url: https://dblp.org/rec/journals/mia/JenaCG25
  abstract: Deep Learning in Image Registration (DLIR) methods have been tremendously
    successful in image registration due to their speed and ability to incorporate
    weak label supervision at training time. However, existing DLIR methods forego
    many of the benefits and invariances of optimization methods. The lack of a task-specific
    inductive bias in DLIR methods leads to suboptimal performance, especially in
    the presence of domain shift. Our method aims to bridge this gap between statistical
    learning and optimization by explicitly incorporating optimization as a layer
    in a deep network. A deep network is trained to predict multi-scale dense feature
    images that are registered using a black box iterative optimization solver. This
    optimal warp is then used to minimize image and label alignment errors. By implicitly
    differentiating end-to-end through an iterative optimization solver, we explicitly
    exploit invariances of the correspondence matching problem induced by the optimization,
    while learning registration and label-aware features, and guaranteeing the warp
    functions to be a local minima of the registration objective in the feature space.
    Our framework shows excellent performance on in-domain datasets, and is agnostic
    to domain shift such as anisotropy and varying intensity profiles. For the first
    time, our method allows switching between arbitrary transformation representations
    (free-form to diffeomorphic) at test time with zero retraining. End-to-end feature
    learning also facilitates interpretability of features and arbitrary test-time
    regularization, which is not possible with existing DLIR methods.
- author: François Lecomte, Juan Verde, Jean-Louis Dillenseger, Stéphane Cotin
  title: Domain agnostic 2D-3D deformable registration Application to fluoroscopic
    guidance without contrast agent.
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/LecomteVDC25
  doi: 10.1016/J.MEDIA.2025.103688
  ee: https://doi.org/10.1016/j.media.2025.103688
  url: https://dblp.org/rec/journals/mia/LecomteVDC25
  abstract: We present a method for estimating, in real time, a 3D displacement field
    from a single fluoroscopic image. Our approach uses a fully convolutional network
    architecture to solve the associated inverse problem. Supervised learning is performed
    on synthetic data, using Digitally Reconstructed Radiographs as input and displacement
    fields as output. We use randomized Gaussian kernels to produce a synthetic training
    dataset with displacement fields that are smooth and diffeomorphic. In contrast
    to other 2D-3D registration methods, our novel data generation approach does not
    rely on a statistical motion model. This enables our model to accurately predict
    deformations unrelated to breathing or other predetermined motion patterns. As
    an example of clinical application, we show that our model is able to predict
    deformations related to percutaneous needle insertions accurately, potentially
    removing the need for contrast agent injection.
- author: Hengjie Liu, Elizabeth McKenzie, Di Xu 0003, Qifan Xu, Robert K. Chin, Dan
    Ruan, Ke Sheng
  title: MUsculo-Skeleton-Aware (MUSA) deep learning for anatomically guided head-and-neck
    CT deformable registration.
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/LiuMXXCRS25
  doi: 10.1016/J.MEDIA.2024.103351
  ee: https://doi.org/10.1016/j.media.2024.103351
  url: https://dblp.org/rec/journals/mia/LiuMXXCRS25
  abstract: Deep-learning-based deformable image registration (DL-DIR) has demonstrated
    improved accuracy compared to time-consuming non-DL methods across various anatomical
    sites. However, DL-DIR is still challenging in heterogeneous tissue regions with
    large deformation. In fact, several state-of-the-art DL-DIR methods fail to capture
    the large, anatomically plausible deformation when tested on head-and-neck computed
    tomography (CT) images. These results allude to the possibility that such complex
    head-and-neck deformation may be beyond the capacity of a single network structure
    or a homogeneous smoothness regularization. To address the challenge of combined
    multi-scale musculoskeletal motion and soft tissue deformation in the head-and-neck
    region, we propose a MUsculo-Skeleton-Aware (MUSA) framework to anatomically guide
    DL-DIR by leveraging the explicit multiresolution strategy and the inhomogeneous
    deformation constraints between the bony structures and soft tissue. The proposed
    method decomposes the complex deformation into a bulk posture change and residual
    fine deformation. It can accommodate both inter- and intra- subject registration.
    Our results show that the MUSA framework can consistently improve registration
    accuracy and, more importantly, the plausibility of deformation for various network
    architectures. The code will be publicly available at https://github.com/HengjieLiu/DIR-MUSA.
- author: Yuxuan Liu 0013, Jiasheng Zhou, Yating Luo, Sung-Liang Chen, Yao Guo 0002,
    Guang-Zhong Yang
  title: 'FPM-R2Net: Fused Photoacoustic and operating Microscopic imaging with cross-modality
    Representation and Registration Network.'
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/LiuZLCGY25
  doi: 10.1016/J.MEDIA.2025.103698
  ee: https://doi.org/10.1016/j.media.2025.103698
  url: https://dblp.org/rec/journals/mia/LiuZLCGY25
  abstract: Robot-assisted microsurgery is a promising technique for a number of clinical
    specialties including neurosurgery. One of the prerequisites of such procedures
    is accurate vision guidance, delineating not only the exposed surface details
    but also embedded microvasculature. Conventional microscopic cameras used for
    vascular imaging are susceptible to specular reflections and changes in ambient
    light with low tissue resolution and contrast. Photoacoustic microscopy (PAM)
    is emerging as a promising tool and increasingly used for vascular imaging due
    to its high image resolution and tissue contrast. This paper presents a fused
    microscopic imaging scheme that integrates standard surgical microscopy with PAM
    for improved intraoperative visualization and guidance. We propose the FPM-R2Net
    to Fuse Photoacoustic and surgical Microscopic imaging via cross-modality Representation
    and Registration Network. A MOdality Representation Network (MORNet) is used to
    extract unified feature representation across white-light and PAM modalities,
    and a Hierarchical Iterative Registration Network (HIRNet) is used to establish
    the correspondence between the two modalities in a coarse-to-fine manner based
    on multi-resolution feature maps. A synthetic dataset with ground truth correspondence
    and an in vivo dataset of mouse brain vasculature are used to evaluate our proposed
    network. Extensive validation on the two datasets has shown significant improvements
    compared to the current state-of-the-art methods assessed with intersection over
    union and Dice scores (10.3% and 6.6% on the synthetic dataset and 15.9% and 11.8%
    on the in vivo dataset, respectively).
- author: Yi Zhang 0120, Yidong Zhao, Hui Xue 0006, Peter Kellman, Stefan Klein 0001,
    Qian Tao
  title: Recurrent inference machine for medical image registration.
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/ZhangZXKKT25
  doi: 10.1016/J.MEDIA.2025.103748
  ee: https://doi.org/10.1016/j.media.2025.103748
  url: https://dblp.org/rec/journals/mia/ZhangZXKKT25
  abstract: Image registration is essential for medical image applications where alignment
    of voxels across multiple images is needed for qualitative or quantitative analysis.
    With recent advances in deep neural networks and parallel computing, deep learning-based
    medical image registration methods become competitive with their flexible modeling
    and fast inference capabilities. However, compared to traditional optimization-based
    registration methods, the speed advantage may come at the cost of registration
    performance at inference time. Besides, deep neural networks ideally demand large
    training datasets while optimization-based methods are training-free. To improve
    registration accuracy and data efficiency, we propose a novel image registration
    method, termed Recurrent Inference Image Registration (RIIR) network. RIIR is
    formulated as a meta-learning solver for the registration problem in an iterative
    manner. RIIR addresses the accuracy and data efficiency issues, by learning the
    update rule of optimization, with implicit regularization combined with explicit
    gradient input. We extensively evaluated RIIR on brain MRI, lung CT, and quantitative
    cardiac MRI datasets, in terms of both registration accuracy and training data
    efficiency. Our experiments showed that RIIR outperformed a range of deep learning-based
    methods, even with only 5% of the training data, demonstrating high data efficiency.
    Key findings from our ablation studies highlighted the important added value of
    the hidden states introduced in the recurrent inference framework for meta-learning.
    Our proposed RIIR offers a highly data-efficient framework for deep learning-based
    medical image registration.
- author: Jingke Zhu, Boyun Zheng, Bing Xiong 0004, Yuxin Zhang, Ming Cui, Deyu Sun,
    Jing Cai 0001, Yaoqin Xie, Wenjian Qin
  title: 'SynMSE: A multimodal similarity evaluator for complex distribution discrepancy
    in unsupervised deformable multimodal medical image registration.'
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/ZhuZXZCSCXQ25
  doi: 10.1016/J.MEDIA.2025.103620
  ee: https://doi.org/10.1016/j.media.2025.103620
  url: https://dblp.org/rec/journals/mia/ZhuZXZCSCXQ25
  abstract: Unsupervised deformable multimodal medical image registration often confronts
    complex scenarios, which include intermodality domain gaps, multi-organ anatomical
    heterogeneity, and physiological motion variability. These factors introduce substantial
    grayscale distribution discrepancies, hindering precise alignment between different
    imaging modalities. However, existing methods have not been sufficiently adapted
    to meet the specific demands of registration in such complex scenarios. To overcome
    the above challenges, we propose SynMSE, a novel multimodal similarity evaluator
    that can be seamlessly integrated as a plug-and-play module in any registration
    framework to serve as the similarity metric. SynMSE is trained using random transformations
    to simulate spatial misalignments and a structure-constrained generator to model
    grayscale distribution discrepancies. By emphasizing spatial alignment and mitigating
    the influence of complex distributional variations, SynMSE effectively addresses
    the aforementioned issues. Extensive experiments on the Learn2Reg 2022 CT-MR abdomen
    dataset, the clinical cervical CT-MR dataset, and the CuRIOUS MR-US brain dataset
    demonstrate that SynMSE achieves state-of-the-art performance. Our code is available
    on the project page https://github.com/MIXAILAB/SynMSE.
- author: Jing Zou, Noémie Debroux, Lihao Liu, Jing Qin 0001, Carola-Bibiane Schönlieb,
    Angelica I. Avilés-Rivero
  title: Learning homeomorphic image registration via conformal-invariant hyperelastic
    regularisation.
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/ZouDLQSA25
  doi: 10.1016/J.MEDIA.2025.103712
  ee: https://doi.org/10.1016/j.media.2025.103712
  url: https://dblp.org/rec/journals/mia/ZouDLQSA25
  abstract: Deformable image registration is a fundamental task in medical image analysis
    and plays a crucial role in a wide range of clinical applications. Recently, deep
    learning-based approaches have been widely studied for deformable medical image
    registration and achieved promising results. However, existing deep learning image
    registration techniques do not theoretically guarantee topology-preserving transformations.
    This is a key property to preserve anatomical structures and achieve plausible
    transformations that can be used in real clinical settings. We propose a novel
    framework for deformable image registration. Firstly, we introduce a novel regulariser
    based on conformal-invariant properties in a nonlinear elasticity setting. Our
    regulariser enforces the deformation field to be mooth, invertible and orientation-preserving.
    More importantly, we strictly guarantee topology preservation yielding to a clinical
    meaningful registration. Secondly, we boost the performance of our regulariser
    through coordinate MLPs, where one can view the to-be-registered images as continuously
    differentiable entities. We demonstrate, through numerical and visual experiments,
    that our framework is able to outperform current techniques for image registration.
- author: Sophia Bano, Alessandro Casella, Francisco Vasconcelos 0001, Abdul Qayyum
    0002, Abdesslam Benzinou, Moona Mazher, Fabrice Mériaudeau, Chiara Lena, Ilaria
    Anita Cintorrino, Gaia Romana De Paolis, Jessica Biagioli, Daria Grechishnikova,
    Jing Jiao, Bizhe Bai, Yanyan Qiao, Binod Bhattarai, Rebati Raman Gaire, Ronast
    Subedi, Eduard Vazquez, Szymon Plotka, Aneta Lisowska, Arkadiusz Sitek, George
    Attilakos, Ruwan Wimalasundera, Anna L. David, Dario Paladini, Jan Deprest, Elena
    De Momi, Leonardo S. Mattos, Sara Moccia, Danail Stoyanov
  title: 'Placental vessel segmentation and registration in fetoscopy: Literature
    review and MICCAI FetReg2021 challenge findings.'
  venue: Medical Image Anal.
  year: '2024'
  type: Journal Articles
  access: open
  key: journals/mia/BanoCVQBMMLCPBGJBQBGSVPLSAWDPDMMMS24
  doi: 10.1016/J.MEDIA.2023.103066
  ee: https://doi.org/10.1016/j.media.2023.103066
  url: https://dblp.org/rec/journals/mia/BanoCVQBMMLCPBGJBQBGSVPLSAWDPDMMMS24
  abstract: Fetoscopy laser photocoagulation is a widely adopted procedure for treating
    Twin-to-Twin Transfusion Syndrome (TTTS). The procedure involves photocoagulation
    pathological anastomoses to restore a physiological blood exchange among twins.
    The procedure is particularly challenging, from the surgeon’s side, due to the
    limited field of view, poor manoeuvrability of the fetoscope, poor visibility
    due to amniotic fluid turbidity, and variability in illumination. These challenges
    may lead to increased surgery time and incomplete ablation of pathological anastomoses,
    resulting in persistent TTTS. Computer-assisted intervention (CAI) can provide
    TTTS surgeons with decision support and context awareness by identifying key structures
    in the scene and expanding the fetoscopic field of view through video mosaicking.
    Research in this domain has been hampered by the lack of high-quality data to
    design, develop and test CAI algorithms. Through the Fetoscopic Placental Vessel
    Segmentation and Registration (FetReg2021) challenge, which was organized as part
    of the MICCAI2021 Endoscopic Vision (EndoVis) challenge, we released the first
    large-scale multi-center TTTS dataset for the development of generalized and robust
    semantic segmentation and video mosaicking algorithms with a focus on creating
    drift-free mosaics from long duration fetoscopy videos. For this challenge, we
    released a dataset of 2060 images, pixel-annotated for vessels, tool, fetus and
    background classes, from 18 in-vivo TTTS fetoscopy procedures and 18 short video
    clips of an average length of 411 frames for developing placental scene segmentation
    and frame registration for mosaicking techniques. Seven teams participated in
    this challenge and their model performance was assessed on an unseen test dataset
    of 658 pixel-annotated images from 6 fetoscopic procedures and 6 short clips.
    For the segmentation task, overall baseline performed was the top performing (aggregated
    mIoU of 0.6763) and was the best on the vessel class (mIoU of 0.5817) while team
    RREB was the best on the tool (mIoU of 0.6335) and fetus (mIoU of 0.5178) classes.
    For the registration task, overall the baseline performed better than team SANO
    with an overall mean 5-frame SSIM of 0.9348. Qualitatively, it was observed that
    team SANO performed better in planar scenarios, while baseline was better in non-planner
    scenarios. The detailed analysis showed that no single team outperformed on all
    6 test fetoscopic videos. The challenge provided an opportunity to create generalized
    solutions for fetoscopic scene understanding and mosaicking. In this paper, we
    present the findings of the FetReg2021 challenge, alongside reporting a detailed
    literature review for CAI in TTTS fetoscopy. Through this challenge, its analysis
    and the release of multi-center fetoscopic data, we provide a benchmark for future
    research in this field.
- author: Stylianos Dritsas, Kenneth Wei De Chua, Zhi Hwee Goh, Robert E. Simpson
  title: Classification, registration and segmentation of ear canal impressions using
    convolutional neural networks.
  venue: Medical Image Anal.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/mia/DritsasCGS24
  doi: 10.1016/J.MEDIA.2024.103152
  ee: https://doi.org/10.1016/j.media.2024.103152
  url: https://dblp.org/rec/journals/mia/DritsasCGS24
  abstract: Today, fitting bespoke hearing aids involves injecting silicone into patients'
    ears to produce ear canal molds. These are subsequently 3D scanned to create digital
    ear canal impressions. However, before digital impressions can be used they require
    a substantial amount of effort in manual 3D editing. In this article, we present
    computational methods to pre-process ear canal impressions. The aim is to create
    automation tools to assist the hearing aid design, manufacturing and fitting processes
    as well as normalizing anatomical data to assist the study of the outer ear canal's
    morphology. The methods include classifying the handedness of the impression into
    left and right ear types, orienting the geometries onto the same coordinate system
    sense, and removing extraneous artifacts introduced by the silicone mold. We investigate
    the use of convolutional neural networks for performing these semantic tasks and
    evaluate their accuracy using a dataset of 3000 ear canal impressions. The neural
    networks proved highly effective at performing these tasks with 95.8% adjusted
    accuracy in classification, 92.3% within 20° angular error in registration and
    93.4% intersection over union in segmentation.
- author: Jian Li 0033, Greta Tuckute, Evelina Fedorenko, Brian L. Edlow, Adrian V.
    Dalca, Bruce Fischl
  title: 'JOSA: Joint surface-based registration and atlas construction of brain geometry
    and function.'
  venue: Medical Image Anal.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/mia/LiTFEDF24
  doi: 10.1016/J.MEDIA.2024.103292
  ee: https://doi.org/10.1016/j.media.2024.103292
  url: https://dblp.org/rec/journals/mia/LiTFEDF24
  abstract: Surface-based cortical registration is an important topic in medical image
    analysis and facilitates many downstream applications. Current approaches for
    cortical registration are mainly driven by geometric features, such as sulcal
    depth and curvature, and often assume that registration of folding patterns leads
    to alignment of brain function. However, functional variability of anatomically
    corresponding areas across subjects has been widely reported, particularly in
    higher-order cognitive areas. In this work, we present JOSA, a novel cortical
    registration framework that jointly models the mismatch between geometry and function
    while simultaneously learning an unbiased population-specific atlas. Using a semi-supervised
    training strategy, JOSA achieves superior registration performance in both geometry
    and function to the state-of-the-art methods but without requiring functional
    data at inference. This learning framework can be extended to any auxiliary data
    to guide spherical registration that is available during training but is difficult
    or impossible to obtain during inference, such as parcellations, architectonic
    identity, transcriptomic information, and molecular profiles. By recognizing the
    mismatch between geometry and function, JOSA provides new insights into the future
    development of registration methods using joint analysis of the brain structure
    and function.
- author: Florentin Liebmann, Marco von Atzigen, Dominik Stütz, Julian Wolf 0001,
    Lukas Zingg, Daniel Suter, Nicola Cavalcanti, Laura Leoty, Hooman Esfandiari,
    Jess Gerrit Snedeker, Martin R. Oswald, Marc Pollefeys, Mazda Farshad, Philipp
    Fürnstahl
  title: Automatic registration with continuous pose updates for marker-less surgical
    navigation in spine surgery.
  venue: Medical Image Anal.
  year: '2024'
  type: Journal Articles
  access: open
  key: journals/mia/LiebmannASWZSCLESOPFF24
  doi: 10.1016/J.MEDIA.2023.103027
  ee: https://doi.org/10.1016/j.media.2023.103027
  url: https://dblp.org/rec/journals/mia/LiebmannASWZSCLESOPFF24
  abstract: Established surgical navigation systems for pedicle screw placement have
    been proven to be accurate, but still reveal limitations in registration or surgical
    guidance. Registration of preoperative data to the intraoperative anatomy remains
    a time-consuming, error-prone task that includes exposure to harmful radiation.
    Surgical guidance through conventional displays has well-known drawbacks, as information
    cannot be presented in-situ and from the surgeon's perspective. Consequently,
    radiation-free and more automatic registration methods with subsequent surgeon-centric
    navigation feedback are desirable. In this work, we present a marker-less approach
    that automatically solves the registration problem for lumbar spinal fusion surgery
    in a radiation-free manner. A deep neural network was trained to segment the lumbar
    spine and simultaneously predict its orientation, yielding an initial pose for
    preoperative models, which then is refined for each vertebra individually and
    updated in real-time with GPU acceleration while handling surgeon occlusions.
    An intuitive surgical guidance is provided thanks to the integration into an augmented
    reality based navigation system. The registration method was verified on a public
    dataset with a median of 100% successful registrations, a median target registration
    error of 2.7 mm, a median screw trajectory error of 1.6°and a median screw entry
    point error of 2.3 mm. Additionally, the whole pipeline was validated in an ex-vivo
    surgery, yielding a 100% screw accuracy and a median target registration error
    of 1.0 mm. Our results meet clinical demands and emphasize the potential of RGB-D
    data for fully automatic registration approaches in combination with augmented
    reality guidance.
- author: Xuan Loc Pham, Ha Manh Luu, Theo van Walsum, Hong Son Mai, Stefan Klein
    0001, Ngoc Ha Le, Trinh Chu Duc
  title: 'CMAN: Cascaded Multi-scale Spatial Channel Attention-guided Network for
    large 3D deformable registration of liver CT images.'
  venue: Medical Image Anal.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/mia/PhamLWMKLD24
  doi: 10.1016/J.MEDIA.2024.103212
  ee: https://doi.org/10.1016/j.media.2024.103212
  url: https://dblp.org/rec/journals/mia/PhamLWMKLD24
  abstract: 'Deformable image registration is an essential component of medical image
    analysis and plays an irreplaceable role in clinical practice. In recent years,
    deep learning-based registration methods have demonstrated significant improvements
    in convenience, robustness and execution time compared to traditional algorithms.
    However, registering images with large displacements, such as those of the liver
    organ, remains underexplored and challenging. In this study, we present a novel
    convolutional neural network (CNN)-based unsupervised learning registration method,
    Cascaded Multi-scale Spatial-Channel Attention-guided Network (CMAN), which addresses
    the challenge of large deformation fields using a double coarse-to-fine registration
    approach. The main contributions of CMAN include: (i) local coarse-to-fine registration
    in the base network, which generates the displacement field for each resolution
    and progressively propagates these local deformations as auxiliary information
    for the final deformation field; (ii) global coarse-to-fine registration, which
    stacks multiple base networks for sequential warping, thereby incorporating richer
    multi-layer contextual details into the final deformation field; (iii) integration
    of the spatial-channel attention module in the decoder stage, which better highlights
    important features and improves the quality of feature maps. The proposed network
    was trained using two public datasets and evaluated on another public dataset
    as well as a private dataset across several experimental scenarios. We compared
    CMAN with four state-of-the-art CNN-based registration methods and two well-known
    traditional algorithms. The results show that the proposed double coarse-to-fine
    registration strategy outperforms other methods in most registration evaluation
    metrics. In conclusion, CMAN can effectively handle the large-deformation registration
    problem and show potential for application in clinical practice. The source code
    is made publicly available at https://github.com/LocPham263/CMAN.git.'
- author: Jianxun Ren, Ning An 0003, Youjia Zhang, Danyang Wang, Zhenyu Sun 0005,
    Cong Lin, Weigang Cui, Weiwei Wang, Ying Zhou, Wei Zhang, Qingyu Hu, Ping Zhang,
    Dan Hu 0004, Danhong Wang, Hesheng Liu
  title: 'SUGAR: Spherical ultrafast graph attention framework for cortical surface
    registration.'
  venue: Medical Image Anal.
  year: '2024'
  type: Journal Articles
  access: open
  key: journals/mia/RenAZWSLCWZZHZHWL24
  doi: 10.1016/J.MEDIA.2024.103122
  ee: https://doi.org/10.1016/j.media.2024.103122
  url: https://dblp.org/rec/journals/mia/RenAZWSLCWZZHZHWL24
  abstract: ''
- author: Morgan J. Ringel, Jon S. Heiselman, Winona L. Richey, Ingrid M. Meszoely,
    William R. Jarnagin, Michael I. Miga
  title: Comparing regularized Kelvinlet functions and the finite element method for
    registration of medical images to sparse organ data.
  venue: Medical Image Anal.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/mia/RingelHRMJM24
  doi: 10.1016/J.MEDIA.2024.103221
  ee: https://doi.org/10.1016/j.media.2024.103221
  url: https://dblp.org/rec/journals/mia/RingelHRMJM24
  abstract: 'Image-guided surgery collocates patient-specific data with the physical
    environment to facilitate surgical decision making. Unfortunately, these guidance
    systems commonly become compromised by intraoperative soft-tissue deformations.
    Nonrigid image-to-physical registration methods have been proposed to compensate
    for deformations, but clinical utility requires compatibility of these techniques
    with data sparsity and temporal constraints in the operating room. While finite
    element models can be effective in sparse data scenarios, computation time remains
    a limitation to widespread deployment. This paper proposes a registration algorithm
    that uses regularized Kelvinlets, which are analytical solutions to linear elasticity
    in an infinite domain, to overcome these barriers. This algorithm is demonstrated
    and compared to finite element-based registration on two datasets: a phantom liver
    deformation dataset and an in vivo breast deformation dataset. The regularized
    Kelvinlets algorithm resulted in a significant reduction in computation time compared
    to the finite element method. Accuracy as evaluated by target registration error
    was comparable between methods. Average target registration errors were 4.6 ±
    1.0 and 3.2 ± 0.8 mm on the liver dataset and 5.4 ± 1.4 and 6.4 ± 1.5 mm on the
    breast dataset for the regularized Kelvinlets and finite element method, respectively.
    Limitations of regularized Kelvinlets include the lack of organ-specific geometry
    and the assumptions of linear elasticity and infinitesimal strain. Despite limitations,
    this work demonstrates the generalizability of regularized Kelvinlets registration
    on two soft-tissue elastic organs. This method may improve and accelerate registration
    for image-guided surgery, and it shows the potential of using regularized Kelvinlets
    on medical imaging data.'
- author: Shanlin Sun, Kun Han, Chenyu You, Hao Tang 0010, Deying Kong, Junayed Naushad,
    Xiangyi Yan, Haoyu Ma, Pooya Khosravi, James S. Duncan, Xiaohui Xie
  title: Medical image registration via neural fields.
  venue: Medical Image Anal.
  year: '2024'
  type: Journal Articles
  access: open
  key: journals/mia/SunHYTKNYMKDX24
  doi: 10.1016/J.MEDIA.2024.103249
  ee: https://doi.org/10.1016/j.media.2024.103249
  url: https://dblp.org/rec/journals/mia/SunHYTKNYMKDX24
  abstract: 'Image registration is an essential step in many medical image analysis
    tasks. Traditional methods for image registration are primarily optimization-driven,
    finding the optimal deformations that maximize the similarity between two images.
    Recent learning-based methods, trained to directly predict transformations between
    two images, run much faster, but suffer from performance deficiencies due to domain
    shift. Here we present a new neural network based image registration framework,
    called NIR (Neural Image Registration), which is based on optimization but utilizes
    deep neural networks to model deformations between image pairs. NIR represents
    the transformation between two images with a continuous function implemented via
    neural fields, receiving a 3D coordinate as input and outputting the corresponding
    deformation vector. NIR provides two ways of generating deformation field: directly
    output a displacement vector field for general deformable registration, or output
    a velocity vector field and integrate the velocity field to derive the deformation
    field for diffeomorphic image registration. The optimal registration is discovered
    by updating the parameters of the neural field via stochastic mini-batch gradient
    descent. We describe several design choices that facilitate model optimization,
    including coordinate encoding, sinusoidal activation, coordinate sampling, and
    intensity sampling. NIR is evaluated on two 3D MR brain scan datasets, demonstrating
    highly competitive performance in terms of both registration accuracy and regularity.
    Compared to traditional optimization-based methods, our approach achieves better
    results in shorter computation times. In addition, our methods exhibit performance
    on a cross-dataset registration task, compared to the pre-trained learning-based
    methods.'
- author: Riccardo Taiello, Melek Önen, Francesco Capano, Olivier Humbert, Marco Lorenzi
  title: Privacy preserving image registration.
  venue: Medical Image Anal.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/mia/TaielloOCHL24
  doi: 10.1016/J.MEDIA.2024.103129
  ee: https://doi.org/10.1016/j.media.2024.103129
  url: https://dblp.org/rec/journals/mia/TaielloOCHL24
  abstract: Image registration is a key task in medical imaging applications, allowing
    to represent medical images in a common spatial reference frame. Current approaches
    to image registration are generally based on the assumption that the content of
    the images is usually accessible in clear form, from which the spatial transformation
    is subsequently estimated. This common assumption may not be met in practical
    applications, since the sensitive nature of medical images may ultimately require
    their analysis under privacy constraints, preventing to openly share the image
    content.In this work, we formulate the problem of image registration under a privacy
    preserving regime, where images are assumed to be confidential and cannot be disclosed
    in clear. We derive our privacy preserving image registration framework by extending
    classical registration paradigms to account for advanced cryptographic tools,
    such as secure multi-party computation and homomorphic encryption, that enable
    the execution of operations without leaking the underlying data. To overcome the
    problem of performance and scalability of cryptographic tools in high dimensions,
    we propose several techniques to optimize the image registration operations by
    using gradient approximations, and by revisiting the use of homomorphic encryption
    trough packing, to allow the efficient encryption and multiplication of large
    matrices. We demonstrate our privacy preserving framework in linear and non-linear
    registration problems, evaluating its accuracy and scalability with respect to
    standard, non-private counterparts. Our results show that privacy preserving image
    registration is feasible and can be adopted in sensitive medical imaging applications.
- author: Zengshuo Wang, Haohan Zou, Yin Guo, Shan Guo, Xin Zhao 0010, Yan Wang, Mingzhu
    Sun
  title: Retinal image registration method for myopia development.
  venue: Medical Image Anal.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/mia/WangZGGZWS24
  doi: 10.1016/J.MEDIA.2024.103242
  ee: https://doi.org/10.1016/j.media.2024.103242
  url: https://dblp.org/rec/journals/mia/WangZGGZWS24
  abstract: OBJECTIVE The development of myopia is usually accompanied by changes
    in retinal vessels, optic disc, optic cup, fovea, and other retinal structures
    as well as the length of the ocular axis. And the accurate registration of retinal
    images is very important for the extraction and analysis of retinal structural
    changes. However, the registration of retinal images with myopia development faces
    a series of challenges, due to the unique curved surface of the retina, as well
    as the changes in fundus curvature caused by ocular axis elongation. Therefore,
    our goal is to improve the registration accuracy of the retinal images with myopia
    development. METHOD In this study, we propose a 3D spatial model for the pair
    of retinal images with myopia development. In this model, we introduce a novel
    myopia development model that simulates the changes in the length of ocular axis
    and fundus curvature due to the development of myopia. We also consider the distortion
    model of the fundus camera during the imaging process. Based on the 3D spatial
    model, we further implement a registration framework, which utilizes corresponding
    points in the pair of retinal images to achieve registration in the way of 3D
    pose estimation. RESULTS The proposed method is quantitatively evaluated on the
    publicly available dataset without myopia development and our Fundus Image Myopia
    Development (FIMD) dataset. The proposed method is shown to perform more accurate
    and stable registration than state-of-the-art methods, especially for retinal
    images with myopia development. SIGNIFICANCE To the best of our knowledge, this
    is the first retinal image registration method for the study of myopia development.
    This method significantly improves the registration accuracy of retinal images
    which have myopia development. The FIMD dataset we constructed has been made publicly
    available to promote the study in related fields.
- author: Philippe Weitz, Masi Valkonen, Leslie Solorzano, Circe Carr, Kimmo Kartasalo,
    Constance Boissin, Sonja Koivukoski, Aino Kuusela, Dusan Rasic, Yanbo Feng, Sandra
    Kristiane Sinius Pouplier, Abhinav Sharma, Kajsa Ledesma Eriksson, Stephanie Robertson,
    Christian Marzahl, Chandler D. Gatenbee, Alexander R. A. Anderson, Marek Wodzinski,
    Artur Jurgas, Niccolò Marini, Manfredo Atzori, Henning Müller, Daniel Budelmann,
    Nick Weiss, Stefan Heldmann, Johannes Lotz 0002, Jelmer M. Wolterink, Bruno De
    Santi, Abhijeet Patil, Amit Sethi, Satoshi Kondo, Satoshi Kasai, Kousuke Hirasawa,
    Mahtab Farrokh, Neeraj Kumar 0002, Russell Greiner, Leena Latonen, Anne-Vibeke
    Laenkholm, Johan Hartman, Pekka Ruusuvuori, Mattias Rantalainen
  title: 'The ACROBAT 2022 challenge: Automatic registration of breast cancer tissue.'
  venue: Medical Image Anal.
  year: '2024'
  type: Journal Articles
  access: open
  key: journals/mia/WeitzVSCKBKKRFPSERMGAWJ24
  doi: 10.1016/J.MEDIA.2024.103257
  ee: https://doi.org/10.1016/j.media.2024.103257
  url: https://dblp.org/rec/journals/mia/WeitzVSCKBKKRFPSERMGAWJ24
  abstract: The alignment of tissue between histopathological whole-slide-images (WSI)
    is crucial for research and clinical applications. Advances in computing, deep
    learning, and availability of large WSI datasets have revolutionised WSI analysis.
    Therefore, the current state-of-the-art in WSI registration is unclear. To address
    this, we conducted the ACROBAT challenge, based on the largest WSI registration
    dataset to date, including 4,212 WSIs from 1,152 breast cancer patients. The challenge
    objective was to align WSIs of tissue that was stained with routine diagnostic
    immunohistochemistry to its H&E-stained counterpart. We compare the performance
    of eight WSI registration algorithms, including an investigation of the impact
    of different WSI properties and clinical covariates. We find that conceptually
    distinct WSI registration methods can lead to highly accurate registration performances
    and identify covariates that impact performances across methods. These results
    establish the current state-of-the-art in WSI registration and guide researchers
    in selecting and developing methods.
- author: Wencong Zhang, Lei Zhao 0015, Hang Gou, Yanggang Gong, Yujia Zhou 0001,
    Qianjin Feng 0003
  title: 'PRSCS-Net: Progressive 3D/2D rigid Registration network with the guidance
    of Single-view Cycle Synthesis.'
  venue: Medical Image Anal.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/mia/ZhangZGGZF24
  doi: 10.1016/J.MEDIA.2024.103283
  ee: https://doi.org/10.1016/j.media.2024.103283
  url: https://dblp.org/rec/journals/mia/ZhangZGGZF24
  abstract: The 3D/2D registration for 3D pre-operative images (computed tomography,
    CT) and 2D intra-operative images (X-ray) plays an important role in image-guided
    spine surgeries. Conventional iterative-based approaches suffer from time-consuming
    processes. Existing learning-based approaches require high computational costs
    and face poor performance on large misalignment because of projection-induced
    losses or ill-posed reconstruction. In this paper, we propose a Progressive 3D/2D
    rigid Registration network with the guidance of Single-view Cycle Synthesis, named
    PRSCS-Net. Specifically, we first introduce the differentiable backward/forward
    projection operator into the single-view cycle synthesis network, which reconstructs
    corresponding 3D geometry features from two 2D intra-operative view images (one
    from the input, and the other from the synthesis). In this way, the problem of
    limited views during reconstruction can be solved. Subsequently, we employ a self-reconstruction
    path to extract latent representation from pre-operative 3D CT images. The following
    pose estimation process will be performed in the 3D geometry feature space, which
    can solve the dimensional gap, greatly reduce the computational complexity, and
    ensure that the features extracted from pre-operative and intra-operative images
    are as relevant as possible to pose estimation. Furthermore, to enhance the ability
    of our model for handling large misalignment, we develop a progressive registration
    path, including two sub-registration networks, aiming to estimate the pose parameters
    via two-step warping volume features. Finally, our proposed method has been evaluated
    on a public dataset CTSpine1k and an in-house dataset C-ArmLSpine for 3D/2D registration.
    Results demonstrate that PRSCS-Net achieves state-of-the-art registration performance
    in terms of registration accuracy, robustness, and generalizability compared with
    existing methods. Thus, PRSCS-Net has potential for clinical spinal disease surgical
    planning and surgical navigation systems.
- author: Fenqiang Zhao, Zhengwang Wu, Li Wang 0026, Weili Lin, Gang Li 0001
  title: Longitudinally consistent registration and parcellation of cortical surfaces
    using semi-supervised learning.
  venue: Medical Image Anal.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/mia/ZhaoWWLL24
  doi: 10.1016/J.MEDIA.2024.103193
  ee: https://doi.org/10.1016/j.media.2024.103193
  url: https://dblp.org/rec/journals/mia/ZhaoWWLL24
  abstract: Temporally consistent and accurate registration and parcellation of longitudinal
    cortical surfaces is of great importance in studying longitudinal morphological
    and functional changes of human brains. However, most existing methods are developed
    for registration or parcellation of a single cortical surface. When applying to
    longitudinal studies, these methods independently register/parcellate each surface
    from longitudinal scans, thus often generating longitudinally inconsistent and
    inaccurate results, especially in small or ambiguous cortical regions. Essentially,
    longitudinal cortical surface registration and parcellation are highly correlated
    tasks with inherently shared constraints on both spatial and temporal feature
    representations, which are unfortunately ignored in existing methods. To this
    end, we unprecedentedly propose a novel semi-supervised learning framework to
    exploit these inherent relationships from limited labeled data and extensive unlabeled
    data for more robust and consistent registration and parcellation of longitudinal
    cortical surfaces. Our method utilizes the spherical topology characteristic of
    cortical surfaces. It employs a spherical network to function as an encoder, which
    extracts high-level cortical features. Subsequently, we build two specialized
    decoders dedicated to the tasks of registration and parcellation, respectively.
    To extract more meaningful spatial features, we design a novel parcellation map
    similarity loss to utilize the relationship between registration and parcellation
    tasks, i.e., the parcellation map warped by the deformation field in registration
    should match the atlas parcellation map, thereby providing extra supervision for
    the registration task and augmented data for parcellation task by warping the
    atlas parcellation map to unlabeled surfaces. To enable temporally more consistent
    feature representation, we additionally enforce longitudinal consistency among
    longitudinal surfaces after registering them together using their concatenated
    features. Experiments on two longitudinal datasets of infants and adults have
    shown that our method achieves significant improvements on both registration/parcellation
    accuracy and longitudinal consistency compared to existing methods, especially
    in small and challenging cortical regions.
- author: Jian-Qing Zheng, Ziyang Wang, Baoru Huang, Ngee Han Lim, Bartlomiej W. Papiez
  title: 'Residual Aligner-based Network (RAN): Motion-separable structure for coarse-to-fine
    discontinuous deformable registration.'
  venue: Medical Image Anal.
  year: '2024'
  type: Journal Articles
  access: open
  key: journals/mia/ZhengWHLP24
  doi: 10.1016/J.MEDIA.2023.103038
  ee: https://doi.org/10.1016/j.media.2023.103038
  url: https://dblp.org/rec/journals/mia/ZhengWHLP24
  abstract: 'Deformable image registration, the estimation of the spatial transformation
    between different images, is an important task in medical imaging. Deep learning
    techniques have been shown to perform 3D image registration efficiently. However,
    current registration strategies often only focus on the deformation smoothness,
    which leads to the ignorance of complicated motion patterns (e.g., separate or
    sliding motions), especially for the intersection of organs. Thus, the performance
    when dealing with the discontinuous motions of multiple nearby objects is limited,
    causing undesired predictive outcomes in clinical usage, such as misidentification
    and mislocalization of lesions or other abnormalities. Consequently, we proposed
    a novel registration method to address this issue: a new Motion Separable backbone
    is exploited to capture the separate motion, with a theoretical analysis of the
    upper bound of the motions'' discontinuity provided. In addition, a novel Residual
    Aligner module was used to disentangle and refine the predicted motions across
    the multiple neighboring objects/organs. We evaluate our method, Residual Aligner-based
    Network (RAN), on abdominal Computed Tomography (CT) scans and it has shown to
    achieve one of the most accurate unsupervised inter-subject registration for the
    9 organs, with the highest-ranked registration of the veins (Dice Similarity Coefficient
    (%)/Average surface distance (mm): 62%/4.9mm for the vena cava and 34%/7.9mm for
    the portal and splenic vein), with a smaller model structure and less computation
    compared to state-of-the-art methods. Furthermore, when applied to lung CT, the
    RAN achieves comparable results to the best-ranked networks (94%/3.0mm), also
    with fewer parameters and less computation.'
- author: Ankush Aggarwal, Peter Mortensen, Jilei Hao, Lukasz Kaczmarczyk, Albert
    T. Cheung, Lourdes Al Ghofaily, Robert C. Gorman, Nimesh D. Desai, Joseph E. Bavaria,
    Alison M. Pouch
  title: Strain estimation in aortic roots from 4D echocardiographic images using
    medial modeling and deformable registration.
  venue: Medical Image Anal.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/mia/AggarwalMHKCGGD23
  doi: 10.1016/J.MEDIA.2023.102804
  ee: https://doi.org/10.1016/j.media.2023.102804
  url: https://dblp.org/rec/journals/mia/AggarwalMHKCGGD23
