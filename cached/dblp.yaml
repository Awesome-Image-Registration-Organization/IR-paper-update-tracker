- author: Jinxiang Lai, Wenlong Wu, Bin-Bin Gao, Jun Liu 0116, Jiawei Zhan, Congchong
    Nie, Yi Zeng 0006, Chengjie Wang 0001
  title: 'MatchDet: A Collaborative Framework for Image Matching and Object Detection.'
  venue: AAAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/LaiWGLZNZW24
  doi: 10.1609/AAAI.V38I3.28066
  ee: https://doi.org/10.1609/aaai.v38i3.28066
  url: https://dblp.org/rec/conf/aaai/LaiWGLZNZW24
  abstract: Image matching and object detection are two fundamental and challenging
    tasks, while many related applications consider them two individual tasks (i.e.
    task-individual). In this paper, a collaborative framework called MatchDet (i.e.
    task-collaborative) is proposed for image matching and object detection to obtain
    mutual improvements. To achieve the collaborative learning of the two tasks, we
    propose three novel modules, including a Weighted Spatial Attention Module (WSAM)
    for Detector, and Weighted Attention Module (WAM) and Box Filter for Matcher.
    Specifically, the WSAM highlights the foreground regions of target image to benefit
    the subsequent detector, the WAM enhances the connection between the foreground
    regions of pair images to ensure high-quality matches, and Box Filter mitigates
    the impact of false matches. We evaluate the approaches on a new benchmark with
    two datasets called Warp-COCO and miniScanNet. Experimental results show our approaches
    are effective and achieve competitive improvements.
  related_code: ''
- author: Zhao Zhou, Yiqun Wang, Weizhong Zhang, Yingbin Zheng, Xiangcheng Du, Cheng
    Jin 0001
  title: 'Achieving Ensemble-Like Performance in a Single Model: A Feature Diversification
    Framework for Image-Text Matching.'
  venue: AAAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ZhouWZZD025
  doi: 10.1609/AAAI.V39I10.33182
  ee: https://doi.org/10.1609/aaai.v39i10.33182
  url: https://dblp.org/rec/conf/aaai/ZhouWZZD025
  abstract: Model ensembling is a widely used technique that enhances performance
    in image-text matching tasks by combining multiple models, each trained with different
    initializations. However, the inefficiencies associated with training several
    models and generating outputs from them constrain their practical applicability.
    In this paper, we argue that while the parameters of two randomly initialized
    models can differ significantly, their feature distributions can be similar at
    certain stages. By employing a proposed technique called cross-modal realignment,
    we demonstrate that features derived from differently initialized models maintain
    similarity at the feature extraction stage and can be effectively transformed
    by fine-tuning a small number of parameters. These findings provide an efficient
    way to achieve ensemble-like performance within a single model. Specifically,
    we propose a Feature Diversification Framework (FDF) that emulates the outputs
    of multiple model initializations to generate diverse features from a common shared
    feature. Firstly, we introduce feature conversion methods to transform shared
    features into a set of distinct features. Next, a realignment training strategy
    is presented to optimize negative pairs for realigning these transformed features,
    thereby enhancing their diversification to resemble the outputs of different models.
    Additionally, we propose a reweighting module that assigns weights to these features,
    enabling a weighted fusion approach for robust feature representation. Extensive
    experiments on the Flickr30K and MS-COCO datasets demonstrate the effectiveness
    and generalizability of our framework.
  related_code: ''
- author: Yujun Huang, Bin Chen 0011, Shiyu Qin, Jiawei Li 0006, Yaowei Wang 0001,
    Tao Dai 0001, Shu-Tao Xia
  title: Learned Distributed Image Compression with Multi-Scale Patch Matching in
    Feature Domain.
  venue: AAAI
  year: '2023'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/HuangCQLWDX23
  doi: 10.1609/AAAI.V37I4.25551
  ee: https://doi.org/10.1609/aaai.v37i4.25551
  url: https://dblp.org/rec/conf/aaai/HuangCQLWDX23
  abstract: Beyond achieving higher compression efficiency over classical image compression
    codecs, deep image compression is expected to be improved with additional side
    information, e.g., another image from a different perspective of the same scene.
    To better utilize the side information under the distributed compression scenario,
    the existing method only implements patch matching at the image domain to solve
    the parallax problem caused by the difference in viewing points. However, the
    patch matching at the image domain is not robust to the variance of scale, shape,
    and illumination caused by the different viewing angles, and can not make full
    use of the rich texture information of the side information image. To resolve
    this issue, we propose Multi-Scale Feature Domain Patch Matching (MSFDPM) to fully
    utilizes side information at the decoder of the distributed image compression
    model. Specifically, MSFDPM consists of a side information feature extractor,
    a multi-scale feature domain patch matching module, and a multi-scale feature
    fusion network. Furthermore, we reuse inter-patch correlation from the shallow
    layer to accelerate the patch matching of the deep layer. Finally, we find that
    our patch matching in a multi-scale feature domain further improves compression
    rate by about 20% compared with the patch matching method at image domain.
  related_code: ''
- author: Md Shahriar Rahim Siddiqui, Moshe Eliasof, Eldad Haber
  title: 'Graph Flow Matching: Enhancing Image Generation with Neighbor-Aware Flow
    Fields.'
  venue: AAAI
  year: '2026'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/SiddiquiEH26
  doi: 10.1609/AAAI.V40I30.39741
  ee: https://doi.org/10.1609/aaai.v40i30.39741
  url: https://dblp.org/rec/conf/aaai/SiddiquiEH26
  abstract: Flow matching casts sample generation as learning a continuous-time velocity
    field that transports noise to data. Existing flow matching networks typically
    predict each point's velocity independently, considering only its location and
    time along its flow trajectory, and ignoring neighboring points. However, this
    pointwise approach may overlook correlations between points along the generation
    trajectory that could enhance velocity predictions, thereby improving downstream
    generation quality. To address this, we propose Graph Flow Matching (GFM), a lightweight
    enhancement that decomposes the learned velocity into a reaction term -- any standard
    flow matching network -- and a diffusion term that aggregates neighbor information
    via a graph neural module. This reaction-diffusion formulation retains the scalability
    of deep flow models while enriching velocity predictions with local context, all
    at minimal additional computational cost. Operating in the latent space of a pretrained
    variational autoencoder, GFM consistently improves Fréchet Inception Distance
    (FID) and recall across five image generation benchmarks (LSUN Church, LSUN Bedroom,
    FFHQ, AFHQ-Cat, and CelebA-HQ at 256 × 256), demonstrating its effectiveness as
    a modular enhancement to existing flow matching architectures.
  related_code: ''
- author: Zhenzhang Ye, Tarun Yenamandra, Florian Bernard 0001, Daniel Cremers
  title: Joint Deep Multi-Graph Matching and 3D Geometry Learning from Inhomogeneous
    2D Image Collections.
  venue: AAAI
  year: '2022'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/YeYBC22
  doi: 10.1609/AAAI.V36I3.20220
  ee: https://doi.org/10.1609/aaai.v36i3.20220
  url: https://dblp.org/rec/conf/aaai/YeYBC22
  abstract: Graph matching aims to establish correspondences between vertices of graphs
    such that both the node and edge attributes agree. Various learning-based methods
    were recently proposed for finding correspondences between image key points based
    on deep graph matching formulations. While these approaches mainly focus on learning
    node and edge attributes, they completely ignore the 3D geometry of the underlying
    3D objects depicted in the 2D images. We fill this gap by proposing a trainable
    framework that takes advantage of graph neural networks for learning a deformable
    3D geometry model from inhomogeneous image collections, i.e. a set of images that
    depict different instances of objects from the same category. Experimentally we
    demonstrate that our method outperforms recent learning-based approaches for graph
    matching considering both accuracy and cycle-consistency error, while we in addition
    obtain the underlying 3D geometry of the objects depicted in the 2D images.
  related_code: ''
- author: Francisco Caetano, Christiaan G. A. Viviers, Peter H. N. de With, Fons van
    der Sommen
  title: 'Symmetrical Flow Matching: Unified Image Generation, Segmentation, and Classification
    with Score-Based Generative Models.'
  venue: AAAI
  year: '2026'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/CaetanoVWS26
  doi: 10.1609/AAAI.V40I4.37236
  ee: https://doi.org/10.1609/aaai.v40i4.37236
  url: https://dblp.org/rec/conf/aaai/CaetanoVWS26
  abstract: Flow Matching has emerged as a powerful framework for learning continuous
    transformations between distributions, enabling high-fidelity generative modeling.
    This work introduces Symmetrical Flow Matching (SymmFlow), a new formulation that
    unifies semantic segmentation, classification, and image generation within a single
    model. Using a symmetric learning objective, SymmFlow models forward and reverse
    transformations jointly, ensuring bi-directional consistency, while preserving
    sufficient entropy for generative diversity. A new training objective is introduced
    to explicitly retain semantic information across flows, featuring efficient sampling
    while preserving semantic structure, allowing for one-step segmentation and classification
    without iterative refinement. Unlike previous approaches that impose strict one-to-one
    mapping between masks and images, SymmFlow generalizes to flexible conditioning,
    supporting both pixel-level and image-level class labels. Experimental results
    on various benchmarks demonstrate that SymmFlow achieves state-of-the-art performance
    on semantic image synthesis, obtaining FID scores of 11.9 on CelebAMask-HQ and
    7.0 on COCO-Stuff with only 25 inference steps. Additionally, it delivers competitive
    results on semantic segmentation and shows promising capabilities in classification
    tasks.
  related_code: ''
