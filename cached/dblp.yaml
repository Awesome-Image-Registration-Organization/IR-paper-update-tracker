- author: Xunpei Sun, Gang Chen 0023, Zuoxun Hou
  title: 'M2Flow: A Motion Information Fusion Framework for Enhanced Unsupervised
    Optical Flow Estimation in Autonomous Driving.'
  venue: AAAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/Sun0H25
  doi: 10.1609/AAAI.V39I7.32767
  ee: https://doi.org/10.1609/aaai.v39i7.32767
  url: https://dblp.org/rec/conf/aaai/Sun0H25
  abstract: Estimating optical flow in occluded regions is a crucial challenge in
    unsupervised settings. In this work, we introduce M2Flow, a novel framework for
    unsupervised optical flow estimation that integrates motion information from multiple
    frames to address occlusions. By modeling inter-frame motion information and employing
    Motion Information Propagation (MIP) module, M2Flow effectively propagates and
    integrates motion information across frames, while concurrently estimating bidirectional
    optical flows for multiple frames. In addition, to handle occlusions across multiple
    frames, we provide two augmentation modules specifically designed for our multi-frame
    model to further refine optical flow. The experiments on KITTI and Sintel datasets
    demonstrate that M2Flow outperforms other state-of-the-art unsupervised approaches,
    especially in solving occlusions.
  related_code: ''
- author: Rui Zhao 0010, Ruiqin Xiong, Jian Zhang 0018, Xinfeng Zhang 0001, Zhaofei
    Yu, Tiejun Huang 0001
  title: Optical Flow for Spike Camera with Hierarchical Spatial-Temporal Spike Fusion.
  venue: AAAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/0010XZZY024
  doi: 10.1609/AAAI.V38I7.28581
  ee: https://doi.org/10.1609/aaai.v38i7.28581
  url: https://dblp.org/rec/conf/aaai/0010XZZY024
  abstract: As an emerging neuromorphic camera with an asynchronous working mechanism,
    spike camera shows good potential for high-speed vision tasks. Each pixel in spike
    camera accumulates photons persistently and fires a spike whenever the accumulation
    exceeds a threshold. Such high-frequency fine-granularity photon recording facilitates
    the analysis and recovery of dynamic scenes with high-speed motion. This paper
    considers the optical flow estimation problem for spike cameras. Due to the Poisson
    nature of incoming photons, the occurrence of spikes is random and fluctuating,
    making conventional image matching inefficient. We propose a Hierarchical Spatial-Temporal
    (HiST) fusion module for spike representation to pursue reliable feature matching
    and develop a robust optical flow network, dubbed as HiST-SFlow. The HiST extracts
    features at multiple moments and hierarchically fuses the spatial-temporal information.
    We also propose an intra-moment filtering module to further extract the feature
    and suppress the influence of randomness in spikes. A scene loss is proposed to
    ensure that this hierarchical representation recovers the essential visual information
    in the scene. Experimental results demonstrate that the proposed method achieves
    state-of-the-art performance compared with the existing methods. The source codes
    are available at https://github.com/ruizhao26/HiST-SFlow.
  related_code: https://github.com/ruizhao26/HiST-SFlow
- author: Ri Cheng, Ruian He, Xuhao Jiang, Shili Zhou, Weimin Tan, Bo Yan 0001
  title: Context-Aware Iteration Policy Network for Efficient Optical Flow Estimation.
  venue: AAAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ChengHJZT024
  doi: 10.1609/AAAI.V38I2.27893
  ee: https://doi.org/10.1609/aaai.v38i2.27893
  url: https://dblp.org/rec/conf/aaai/ChengHJZT024
  abstract: Existing recurrent optical flow estimation networks are computationally
    expensive since they use a fixed large number of iterations to update the flow
    field for each sample. An efficient network should skip iterations when the flow
    improvement is limited. In this paper, we develop a Context-Aware Iteration Policy
    Network for efficient optical flow estimation, which determines the optimal number
    of iterations per sample. The policy network achieves this by learning contextual
    information to realize whether flow improvement is bottlenecked or minimal. On
    the one hand, we use iteration embedding and historical hidden cell, which include
    previous iterations information, to convey how flow has changed from previous
    iterations. On the other hand, we use the incremental loss to make the policy
    network implicitly perceive the magnitude of optical flow improvement in the subsequent
    iteration. Furthermore, the computational complexity in our dynamic network is
    controllable, allowing us to satisfy various resource preferences with a single
    trained model. Our policy network can be easily integrated into state-of-the-art
    optical flow networks. Extensive experiments show that our method maintains performance
    while reducing FLOPs by about 40%/20% for the Sintel/KITTI datasets.
  related_code: ''
- author: Henrique Morimitsu, Xiaobin Zhu 0001, Xiangyang Ji, Xu-Cheng Yin
  title: Recurrent Partial Kernel Network for Efficient Optical Flow Estimation.
  venue: AAAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/Morimitsu0JY24
  doi: 10.1609/AAAI.V38I5.28224
  ee: https://doi.org/10.1609/aaai.v38i5.28224
  url: https://dblp.org/rec/conf/aaai/Morimitsu0JY24
  abstract: Optical flow estimation is a challenging task consisting of predicting
    per-pixel motion vectors between images. Recent methods have employed larger and
    more complex models to improve the estimation accuracy. However, this impacts
    the widespread adoption of optical flow methods and makes it harder to train more
    general models since the optical flow data is hard to obtain. This paper proposes
    a small and efficient model for optical flow estimation. We design a new spatial
    recurrent encoder that extracts discriminative features at a significantly reduced
    size. Unlike standard recurrent units, we utilize Partial Kernel Convolution (PKConv)
    layers to produce variable multi-scale features with a single shared block. We
    also design efficient Separable Large Kernels (SLK) to capture large context information
    with low computational cost. Experiments on public benchmarks show that we achieve
    state-of-the-art generalization performance while requiring significantly fewer
    parameters and memory than competing methods. Our model ranks first in the Spring
    benchmark without finetuning, improving the results by over 10% while requiring
    an order of magnitude fewer FLOPs and over four times less memory than the following
    published method without finetuning. The code is available at github.com/hmorimitsu/ptlflow/tree/main/ptlflow/models/rpknet.
  related_code: ''
- author: Chuanbo Tang, Xihua Sheng, Zhuoyuan Li 0001, Haotian Zhang, Li Li 0040,
    Dong Liu 0002
  title: Offline and Online Optical Flow Enhancement for Deep Video Compression.
  venue: AAAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/TangSLZLL24
  doi: 10.1609/AAAI.V38I6.28317
  ee: https://doi.org/10.1609/aaai.v38i6.28317
  url: https://dblp.org/rec/conf/aaai/TangSLZLL24
  abstract: 'Video compression relies heavily on exploiting the temporal redundancy
    between video frames, which is usually achieved by estimating and using the motion
    information. The motion information is represented as optical flows in most of
    the existing deep video compression networks. Indeed, these networks often adopt
    pre-trained optical flow estimation networks for motion estimation. The optical
    flows, however, may be less suitable for video compression due to the following
    two factors. First, the optical flow estimation networks were trained to perform
    inter-frame prediction as accurately as possible, but the optical flows themselves
    may cost too many bits to encode. Second, the optical flow estimation networks
    were trained on synthetic data, and may not generalize well enough to real-world
    videos. We address the twofold limitations by enhancing the optical flows in two
    stages: offline and online. In the offline stage, we fine-tune a trained optical
    flow estimation network with the motion information provided by a traditional
    (non-deep) video compression scheme, e.g. H.266/VVC, as we believe the motion
    information of H.266/VVC achieves a better rate-distortion trade-off. In the online
    stage, we further optimize the latent features of the optical flows with a gradient
    descent-based algorithm for the video to be compressed, so as to enhance the adaptivity
    of the optical flows. We conduct experiments on two state-of-the-art deep video
    compression schemes, DCVC and DCVC-DC. Experimental results demonstrate that the
    proposed offline and online enhancement together achieves on average 13.4% bitrate
    saving for DCVC and 4.1% bitrate saving for DCVC-DC on the tested videos, without
    increasing the model or computational complexity of the decoder side.'
  related_code: ''
- author: Shili Zhou, Ruian He, Weimin Tan, Bo Yan 0001
  title: 'SAMFlow: Eliminating Any Fragmentation in Optical Flow with Segment Anything
    Model.'
  venue: AAAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ZhouHTY24
  doi: 10.1609/AAAI.V38I7.28603
  ee: https://doi.org/10.1609/aaai.v38i7.28603
  url: https://dblp.org/rec/conf/aaai/ZhouHTY24
  abstract: 'Optical Flow Estimation aims to find the 2D dense motion field between
    two frames. Due to the limitation of model structures and training datasets, existing
    methods often rely too much on local clues and ignore the integrity of objects,
    resulting in fragmented motion estimation. Through theoretical analysis, we find
    the pre-trained large vision models are helpful in optical flow estimation, and
    we notice that the recently famous Segment Anything Model (SAM) demonstrates a
    strong ability to segment complete objects, which is suitable for solving the
    fragmentation problem. We thus propose a solution to embed the frozen SAM image
    encoder into FlowFormer to enhance object perception. To address the challenge
    of in-depth utilizing SAM in non-segmentation tasks like optical flow estimation,
    we propose an Optical Flow Task-Specific Adaption scheme, including a Context
    Fusion Module to fuse the SAM encoder with the optical flow context encoder, and
    a Context Adaption Module to adapt the SAM features for optical flow task with
    Learned Task-Specific Embedding. Our proposed SAMFlow model reaches 0.86/2.10
    clean/final EPE and 3.55/12.32 EPE/F1-all on Sintel and KITTI-15 training set,
    surpassing Flowformer by 8.5%/9.9% and 13.2%/16.3%. Furthermore, our model achieves
    state-of-the-art performance on the Sintel and KITTI-15 benchmarks, ranking #1
    among all two-frame methods on Sintel clean pass.'
  related_code: ''
- author: Fengyuan Zuo, Zhaolin Xiao, Haiyan Jin, Haonan Su
  title: 'CEDFlow: Latent Contour Enhancement for Dark Optical Flow Estimation.'
  venue: AAAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ZuoXJS24
  doi: 10.1609/AAAI.V38I7.28627
  ee: https://doi.org/10.1609/aaai.v38i7.28627
  url: https://dblp.org/rec/conf/aaai/ZuoXJS24
  abstract: 'Accurately computing optical flow in low-contrast and noisy dark images
    is challenging, especially when contour information is degraded or difficult to
    extract. This paper proposes CEDFlow, a latent space contour enhancement for estimating
    optical flow in dark environments. By leveraging spatial frequency feature decomposition,
    CEDFlow effectively encodes local and global motion features. Importantly, we
    introduce the 2nd-order Gaussian difference operation to select salient contour
    features in the latent space precisely. It is specifically designed for large-scale
    contour components essential in dark optical flow estimation. Experimental results
    on the FCDN and VBOF datasets demonstrate that CEDFlow outperforms state-of-the-art
    methods in terms of the EPE index and produces more accurate and robust flow estimation.
    Our code is available at: https://github.com/xautstuzfy.'
  related_code: ''
- author: Shuo Chen, Binbin Yan, Xinzhu Sang, Duo Chen, Peng Wang 0068, Xiao Guo,
    Chongli Zhong, Huaming Wan
  title: 'Bidirectional Optical Flow NeRF: High Accuracy and High Quality under Fewer
    Views.'
  venue: AAAI
  year: '2023'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ChenYSCWGZW23
  doi: 10.1609/AAAI.V37I1.25109
  ee: https://doi.org/10.1609/aaai.v37i1.25109
  url: https://dblp.org/rec/conf/aaai/ChenYSCWGZW23
  abstract: Neural Radiance Fields (NeRF) can implicitly represent 3D-consistent RGB
    images and geometric by optimizing an underlying continuous volumetric scene function
    using a sparse set of input views, which has greatly benefited view synthesis
    tasks. However, NeRF fails to estimate correct geometry when given fewer views,
    resulting in failure to synthesize novel views. Existing works rely on introducing
    depth images or adding depth estimation networks to resolve the problem of poor
    synthetic view in NeRF with fewer views. However, due to the lack of spatial consistency
    of the single-depth image and the poor performance of depth estimation with fewer
    views, the existing methods still have challenges in addressing this problem.
    So this paper proposes Bidirectional Optical Flow NeRF(BOF-NeRF), which addresses
    this problem by mining optical flow information between 2D images. Our key insight
    is that utilizing 2D optical flow images to design a loss can effectively guide
    NeRF to learn the correct geometry and synthesize the right novel view. We also
    propose a view-enhanced fusion method based on geometry and color consistency
    to solve the problem of novel view details loss in NeRF. We conduct extensive
    experiments on the NeRF-LLFF and DTU MVS benchmarks for novel view synthesis tasks
    with fewer images in different complex real scenes. We further demonstrate the
    robustness of BOF-NeRF under different baseline distances on the Middlebury dataset.
    In all cases, BOF-NeRF outperforms current state-of-the-art baselines for novel
    view synthesis and scene geometry estimation.
  related_code: ''
- author: Yuan Gao, Zilei Wang, Jiafan Zhuang, Yixin Zhang, Junjie Li 0002
  title: Exploit Domain-Robust Optical Flow in Domain Adaptive Video Semantic Segmentation.
  venue: AAAI
  year: '2023'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/GaoWZZL23
  doi: 10.1609/AAAI.V37I1.25140
  ee: https://doi.org/10.1609/aaai.v37i1.25140
  url: https://dblp.org/rec/conf/aaai/GaoWZZL23
  abstract: Domain adaptive semantic segmentation aims to exploit the pixel-level
    annotated samples on source domain to assist the segmentation of unlabeled samples
    on target domain. For such a task, the key is to construct reliable supervision
    signals on target domain. However, existing methods can only provide unreliable
    supervision signals constructed by segmentation model (SegNet) that are generally
    domain-sensitive. In this work, we try to find a domain-robust clue to construct
    more reliable supervision signals. Particularly, we experimentally observe the
    domain-robustness of optical flow in video tasks as it mainly represents the motion
    characteristics of scenes. However, optical flow cannot be directly used as supervision
    signals of semantic segmentation since both of them essentially represent different
    information. To tackle this issue, we first propose a novel Segmentation-to-Flow
    Module (SFM) that converts semantic segmentation maps to optical flows, named
    the segmentation-based flow (SF), and then propose a Segmentation-based Flow Consistency
    (SFC) method to impose consistency between SF and optical flow, which can implicitly
    supervise the training of segmentation model. The extensive experiments on two
    challenging benchmarks demonstrate the effectiveness of our method, and it outperforms
    previous state-of-the-art methods with considerable performance improvement. Our
    code is available at https://github.com/EdenHazardan/SFC.
  related_code: https://github.com/EdenHazardan/SFC
- author: Hanyu Zhou, Yi Chang 0002, Gang Chen 0023, Luxin Yan
  title: Unsupervised Hierarchical Domain Adaptation for Adverse Weather Optical Flow.
  venue: AAAI
  year: '2023'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/Zhou0CY23
  doi: 10.1609/AAAI.V37I3.25490
  ee: https://doi.org/10.1609/aaai.v37i3.25490
  url: https://dblp.org/rec/conf/aaai/Zhou0CY23
  abstract: Optical flow estimation has made great progress, but usually suffers from
    degradation under adverse weather. Although semi/full-supervised methods have
    made good attempts, the domain shift between the synthetic and real adverse weather
    images would deteriorate their performance. To alleviate this issue, our start
    point is to unsupervisedly transfer the knowledge from source clean domain to
    target degraded domain. Our key insight is that adverse weather does not change
    the intrinsic optical flow of the scene, but causes a significant difference for
    the warp error between clean and degraded images. In this work, we propose the
    first unsupervised framework for adverse weather optical flow via hierarchical
    motion-boundary adaptation. Specifically, we first employ image translation to
    construct the transformation relationship between clean and degraded domains.
    In motion adaptation, we utilize the flow consistency knowledge to align the cross-domain
    optical flows into a motion-invariance common space, where the optical flow from
    clean weather is used as the guidance-knowledge to obtain a preliminary optical
    flow for adverse weather. Furthermore, we leverage the warp error inconsistency
    which measures the motion misalignment of the boundary between the clean and degraded
    domains, and propose a joint intra- and inter-scene boundary contrastive adaptation
    to refine the motion boundary. The hierarchical motion and boundary adaptation
    jointly promotes optical flow in a unified framework. Extensive quantitative and
    qualitative experiments have been performed to verify the superiority of the proposed
    method.
  related_code: ''
- author: Ziluo Ding, Rui Zhao 0010, Jiyuan Zhang 0005, Tianxiao Gao, Ruiqin Xiong,
    Zhaofei Yu, Tiejun Huang 0001
  title: Spatio-Temporal Recurrent Networks for Event-Based Optical Flow Estimation.
  venue: AAAI
  year: '2022'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/DingZZGXY022
  doi: 10.1609/AAAI.V36I1.19931
  ee: https://doi.org/10.1609/aaai.v36i1.19931
  url: https://dblp.org/rec/conf/aaai/DingZZGXY022
  abstract: Event camera has offered promising alternative for visual perception,
    especially in high speed and high dynamic range scenes. Recently, many deep learning
    methods have shown great success in providing model-free solutions to many event-based
    problems, such as optical flow estimation. However, existing deep learning methods
    did not address the importance of temporal information well from the perspective
    of architecture design and cannot effectively extract spatio-temporal features.
    Another line of research that utilizes Spiking Neural Network suffers from training
    issues for deeper architecture. To address these points, a novel input representation
    is proposed that captures the events temporal distribution for signal enhancement.
    Moreover, we introduce a spatio-temporal recurrent encoding-decoding neural network
    architecture for event-based optical flow estimation, which utilizes Convolutional
    Gated Recurrent Units to extract feature maps from a series of event images. Besides,
    our architecture allows some traditional frame-based core modules, such as correlation
    layer and iterative residual refine scheme, to be incorporated. The network is
    end-to-end trained with self-supervised learning on the Multi-Vehicle Stereo Event
    Camera dataset. We have shown that it outperforms all the existing state-of-the-art
    methods by a large margin.
