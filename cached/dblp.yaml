optical%20flow%7Cscene%20flow%20venue%3AMedical_Image_Anal.%3A:
- author: Chengqian Zhao, Dengwang Li, Cheng Feng, Shuo Li 0001
  title: 'OF-UMRN: Uncertainty-guided multitask regression network aided by optical
    flow for fully automated comprehensive analysis of carotid artery.'
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/mia/ZhaoLF021
  doi: 10.1016/J.MEDIA.2021.101982
  ee: https://doi.org/10.1016/j.media.2021.101982
  url: https://dblp.org/rec/journals/mia/ZhaoLF021
  abstract: 'Fully automated comprehensive analysis of carotid artery (localization
    of range of interest (ROI), direct quantitative measurement and segmentation of
    lumen diameter (CALD) and intima-media thickness (CIMT), and motion estimation
    of the carotid wall) is a reliable auxiliary diagnosis of cardiovascular diseases,
    which relieves physicians from laborious workloads. No work has achieved fully
    automated comprehensive analysis of carotid artery due to five intractable challenges:
    (1) The heavy reliance on experienced carotid physicians for the selection of
    ROI limits fully automated studies. (2) The weak structural information of intima-media
    thickness increases the difficulty of feature encoding. (3) The radial motion
    of the carotid wall results in the lack of discriminant features of boundaries.
    (4) Diseased carotid arteries lose many expression features. (5) Optimal weights
    of multitask regression are hard to tune manually. In this paper, we propose a
    novel uncertainty-guided multitask regression network aided by optical flow named
    OF-UMRN to solve the intractable challenges. The four modules and three innovations
    of the OF-UMRN take their responsibility. OF-UMRN takes localization and mapping
    of ROI as a pre-processing. It achieves direct quantitative measurement and segmentation
    by a multitask regression network. And we creatively model homoscedastic uncertainty
    to automated tune the weights of the two tasks optimally. The OF-UMRN adopts a
    bidirectional mechanism to encode the optical flow used to predict the carotid
    wall''s motion fields. More importantly, we creatively propose a dual optimization
    module based on the co-promotion between segmentation and motion estimation to
    improve the performance of radially moving and diseased carotid arteries. Therefore,
    the OF-UMRN makes the most of the pathological relationship between multiple objects
    and co-promotion between various tasks. Extensive experiments on US sequences
    of 101 patients have demonstrated the superior performance of OF-UMRN on the fully
    automated comprehensive analysis of the carotid artery. Therefore the OF-UMRN
    has excellent potential in clinical disease diagnoses and assessments of the carotid
    artery.'
  related_code: ''
- author: Liang Wang 0015, Patrick Clarysse, Zhengjun Liu, Bin Gao, Wanyu Liu, Pierre
    Croisille, Philippe Delachartre
  title: A gradient-based optical-flow cardiac motion estimation method for cine and
    tagged MR images.
  venue: Medical Image Anal.
  year: '2019'
  type: Journal Articles
  access: closed
  key: journals/mia/WangCLGLCD19
  doi: 10.1016/J.MEDIA.2019.06.016
  ee: https://doi.org/10.1016/j.media.2019.06.016
  url: https://dblp.org/rec/journals/mia/WangCLGLCD19
  abstract: A new method is proposed to quantify the myocardial motion from both 2D
    C(ine)-MRI and T(agged)-MRI sequences. The tag pattern offers natural landmarks
    within the image that makes it possible to accurately quantify the motion within
    the myocardial wall. Therefore, several methods have been proposed for T-MRI.
    However, the lack of salient features within the cardiac wall in C-MRI hampers
    local motion estimation. Our method aims to ensure the local intensity and shape
    features invariance during motion through the iterative minimization of a cost
    function via a random walk scheme. The proposed approach is evaluated on realistic
    simulated C-MRI and T-MRI sequences. The results show more than 53% improvements
    on displacement estimation, and more than 24% on strain estimation for both C-MRI
    and T-MRI sequences, as compared to state-of-the-art cardiac motion estimators.
    Preliminary experiments on clinical data have shown a good ability of the proposed
    method to detect abnormal motion patterns related to pathology. If those results
    are confirmed on large databases, this would open up the possibility for more
    accurate diagnosis of cardiac function from standard C-MRI examinations and also
    the retrospective study of prior studies.
  related_code: ''
