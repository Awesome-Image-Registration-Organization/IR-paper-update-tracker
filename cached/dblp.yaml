- author: Yutong Yan, Pierre-Henri Conze, Mathieu Lamard, Gwenolé Quellec, Béatrice
    Cochener, Gouenou Coatrieux
  title: Towards improved breast mass detection using dual-view mammogram matching.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/mia/YanCLQCC21
  doi: 10.1016/J.MEDIA.2021.102083
