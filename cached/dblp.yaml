- author: Praveen Krishnan, C. V. Jawahar
  title: Matching Handwritten Document Images.
  venue: ECCV
  year: '2016'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/KrishnanJ16
  doi: 10.1007/978-3-319-46448-0_46
  ee: https://doi.org/10.1007/978-3-319-46448-0_46
  url: https://dblp.org/rec/conf/eccv/KrishnanJ16
  abstract: We address the problem of predicting similarity between a pair of handwritten
    document images written by potentially different individuals. This has applications
    related to matching and mining in image collections containing handwritten content.
    A similarity score is computed by detecting patterns of text re-usages between
    document images irrespective of the minor variations in word morphology, word
    ordering, layout and paraphrasing of the content. Our method does not depend on
    an accurate segmentation of words and lines. We formulate the document matching
    problem as a structured comparison of the word distributions across two document
    images. To match two word images, we propose a convolutional neural network (cnn)
    based feature descriptor. Performance of this representation surpasses the state-of-the-art
    on handwritten word spotting. Finally, we demonstrate the applicability of our
    method on a practical problem of matching handwritten assignments.
