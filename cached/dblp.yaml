  title: Deep Iterative 2D/3D Registration.
  venue: MICCAI
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/JaganathanWBSM21
  doi: 10.1007/978-3-030-87202-1_37
  ee: https://doi.org/10.1007/978-3-030-87202-1_37
  url: https://dblp.org/rec/conf/miccai/JaganathanWBSM21
  abstract: Deep Learning-based 2D/3D registration methods are highly robust but often
    lack the necessary registration accuracy for clinical application. A refinement
    step using the classical optimization-based 2D/3D registration method applied
    in combination with Deep Learning-based techniques can provide the required accuracy.
    However, it also increases the runtime. In this work, we propose a novel Deep
    Learning driven 2D/3D registration framework that can be used end-to-end for iterative
    registration tasks without relying on any further refinement step. We accomplish
    this by learning the update step of the 2D/3D registration framework using Point-to-Plane
    Correspondences. The update step is learned using iterative residual refinement-based
    optical flow estimation, in combination with the Point-to-Plane correspondence
    solver embedded as a known operator. Our proposed method achieves an average runtime
    of around 8s, a mean re-projection distance error of 0.60 $\pm$ 0.40 mm with a
    success ratio of 97 percent and a capture range of 60 mm. The combination of high
    registration accuracy, high robustness, and fast runtime makes our solution ideal
    for clinical applications.
- author: Fengze Liu, Ke Yan 0006, Adam P. Harrison, Dazhou Guo, Le Lu 0001, Alan
    L. Yuille, Lingyun Huang, Guotong Xie, Jing Xiao 0006, Xianghua Ye, Dakai Jin
  title: 'SAME: Deformable Image Registration Based on Self-supervised Anatomical
    Embeddings.'
  venue: MICCAI
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/LiuYHGLYHXXYJ21
  doi: 10.1007/978-3-030-87202-1_9
  ee: https://doi.org/10.1007/978-3-030-87202-1_9
  url: https://dblp.org/rec/conf/miccai/LiuYHGLYHXXYJ21
  abstract: 'In this work, we introduce a fast and accurate method for unsupervised
    3D medical image registration. This work is built on top of a recent algorithm
    SAM, which is capable of computing dense anatomical/semantic correspondences between
    two images at the pixel level. Our method is named SAME, which breaks down image
    registration into three steps: affine transformation, coarse deformation, and
    deep deformable registration. Using SAM embeddings, we enhance these steps by
    finding more coherent correspondences, and providing features and a loss function
    with better semantic guidance. We collect a multi-phase chest computed tomography
    dataset with 35 annotated organs for each patient and conduct inter-subject registration
    for quantitative evaluation. Results show that SAME outperforms widely-used traditional
    registration techniques (Elastix FFD, ANTs SyN) and learning based VoxelMorph
    method by at least 4.7% and 2.7% in Dice scores for two separate tasks of within-contrast-phase
    and across-contrast-phase registration, respectively. SAME achieves the comparable
    performance to the best traditional registration method, DEEDS (from our evaluation),
    while being orders of magnitude faster (from 45 seconds to 1.2 seconds).'
- author: Tony C. W. Mok, Albert C. S. Chung
  title: Conditional Deformable Image Registration with Convolutional Neural Network.
  venue: MICCAI
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/MokC21
  doi: 10.1007/978-3-030-87202-1_4
  ee: https://doi.org/10.1007/978-3-030-87202-1_4
  url: https://dblp.org/rec/conf/miccai/MokC21
  abstract: Recent deep learning-based methods have shown promising results and runtime
    advantages in deformable image registration. However, analyzing the effects of
    hyperparameters and searching for optimal regularization parameters prove to be
    too prohibitive in deep learning-based methods. This is because it involves training
    a substantial number of separate models with distinct hyperparameter values. In
    this paper, we propose a conditional image registration method and a new self-supervised
    learning paradigm for deep deformable image registration. By learning the conditional
    features that are correlated with the regularization hyperparameter, we demonstrate
    that optimal solutions with arbitrary hyperparameters can be captured by a single
    deep convolutional neural network. In addition, the smoothness of the resulting
    deformation field can be manipulated with arbitrary strength of smoothness regularization
    during inference. Extensive experiments on a large-scale brain MRI dataset show
    that our proposed method enables the precise control of the smoothness of the
    deformation field without sacrificing the runtime advantage or registration accuracy.
