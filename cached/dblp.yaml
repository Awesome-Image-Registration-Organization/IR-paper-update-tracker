- author: Seongsu Ha, Chaeyun Kim, Donghwa Kim, Junho Lee, Sangho Lee, Joonseok Lee
  title: 'Finding NeMo: Negative-Mined Mosaic Augmentation for Referring Image Segmentation.'
  venue: ECCV
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/HaKKLLL24
  doi: 10.1007/978-3-031-72890-7_8
  ee: https://doi.org/10.1007/978-3-031-72890-7_8
  url: https://dblp.org/rec/conf/eccv/HaKKLLL24
  abstract: Referring Image Segmentation is a comprehensive task to segment an object
    referred by a textual query from an image. In nature, the level of difficulty
    in this task is affected by the existence of similar objects and the complexity
    of the referring expression. Recent RIS models still show a significant performance
    gap between easy and hard scenarios. We pose that the bottleneck exists in the
    data, and propose a simple but powerful data augmentation method, Negative-mined
    Mosaic Augmentation (NeMo). This method augments a training image into a mosaic
    with three other negative images carefully curated by a pretrained multimodal
    alignment model, e.g., CLIP, to make the sample more challenging. We discover
    that it is critical to properly adjust the difficulty level, neither too ambiguous
    nor too trivial. The augmented training data encourages the RIS model to recognize
    subtle differences and relationships between similar visual entities and to concretely
    understand the whole expression to locate the right target better. Our approach
    shows consistent improvements on various datasets and models, verified by extensive
    experiments.
  related_code: ''
- author: Lang Nie, Chunyu Lin, Kang Liao, Yun Zhang 0024, Shuaicheng Liu, Rui Ai
    0001, Yao Zhao 0001
  title: Eliminating Warping Shakes for Unsupervised Online Video Stitching.
  venue: ECCV
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/NieLLZLAZ24
  doi: 10.1007/978-3-031-73235-5_22
  ee: https://doi.org/10.1007/978-3-031-73235-5_22
  url: https://dblp.org/rec/conf/eccv/NieLLZLAZ24
  abstract: In this paper, we retarget video stitching to an emerging issue, named
    warping shake, when extending image stitching to video stitching. It unveils the
    temporal instability of warped content in non-overlapping regions, despite image
    stitching having endeavored to preserve the natural structures. Therefore, in
    most cases, even if the input videos to be stitched are stable, the stitched video
    will inevitably cause undesired warping shakes and affect the visual experience.
    To eliminate the shakes, we propose StabStitch to simultaneously realize video
    stitching and video stabilization in a unified unsupervised learning framework.
    Starting from the camera paths in video stabilization, we first derive the expression
    of stitching trajectories in video stitching by elaborately integrating spatial
    and temporal warps. Then a warp smoothing model is presented to optimize them
    with a comprehensive consideration regarding content alignment, trajectory smoothness,
    spatial consistency, and online collaboration. To establish an evaluation benchmark
    and train the learning framework, we build a video stitching dataset with a rich
    diversity in camera motions and scenes. Compared with existing stitching solutions,
    StabStitch exhibits significant superiority in scene robustness and inference
    speed in addition to stitching and stabilization performance, contributing to
    a robust and real-time online video stitching system. The code and dataset are
    available at https://github.com/nie-lang/StabStitch.
  related_code: https://github.com/nie-lang/StabStitch
