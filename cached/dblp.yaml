- author: Yu Chen, Gim Hee Lee
  title: 'DReg-NeRF: Deep Registration for Neural Radiance Fields.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ChenL23
  doi: 10.1109/ICCV51070.2023.02075
  ee: https://doi.org/10.1109/ICCV51070.2023.02075
  url: https://dblp.org/rec/conf/iccv/ChenL23
  abstract: Although Neural Radiance Fields (NeRF) is popular in the computer vision
    community recently, registering multiple NeRFs has yet to gain much attention.
    Unlike the existing work, NeRF2NeRF [14], which is based on traditional optimization
    methods and needs human annotated keypoints, we propose DReg-NeRF to solve the
    NeRF registration problem on object-centric scenes without human intervention.
    After training NeRF models, our DReg-NeRF first extracts features from the occupancy
    grid in NeRF. Subsequently, our DReg-NeRF utilizes a transformer architecture
    with self-attention and cross-attention layers to learn the relations between
    pairwise NeRF blocks. In contrast to state-of-the-art (SOTA) point cloud registration
    methods, the decoupled correspondences are supervised by surface fields without
    any ground truth overlapping labels. We construct a novel view synthesis dataset
    with 1,700+ 3D objects obtained from Objaverse to train our network. When evaluated
    on the test set, our proposed method beats the SOTA point cloud registration methods
    by a large margin with a mean RPE = 9.67° and a mean RTE = 0.038. Our code is
    available at https://github.com/AIBluefisher/DReg-NeRF.
  related_code: https://github.com/AIBluefisher/DReg-NeRF
- author: Guangyan Chen, Meiling Wang 0002, Li Yuan 0007, Yi Yang 0009, Yufeng Yue
  title: Rethinking Point Cloud Registration as Masking and Reconstruction.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ChenWYYY23
  doi: 10.1109/ICCV51070.2023.01624
  ee: https://doi.org/10.1109/ICCV51070.2023.01624
  url: https://dblp.org/rec/conf/iccv/ChenWYYY23
  abstract: Point cloud registration is essential in computer vision and robotics.
    In this paper, a critical observation is made that the invisible parts of each
    point cloud can be directly utilized as inherent masks, and the aligned point
    cloud pair can be regarded as the reconstruction target. Motivated by this observation,
    we rethink the point cloud registration problem as a masking and reconstruction
    task. To this end, a generic and concise auxiliary training network, the Masked
    Reconstruction Auxiliary Network (MRA), is proposed. The MRA reconstructs the
    complete point cloud by separately using the encoded features of each point cloud
    obtained from the backbone, guiding the contextual features in the backbone to
    capture fine-grained geometric details and the overall structures of point cloud
    pairs. Unlike recently developed high-performing methods that incorporate specific
    encoding methods into transformer models, which sacrifice versatility and introduce
    significant computational complexity during the inference process, our MRA can
    be easily inserted into other methods to further improve registration accuracy.
    Additionally, the MRA is detached after training, thereby avoiding extra computational
    complexity during the inference process. Building upon the MRA, we present a novel
    transformer-based method, the Masked Reconstruction Transformer (MRT), which achieves
    both precise and efficient alignment using standard transformers. Extensive experiments
    conducted on the 3DMatch, ModelNet40, and KITTI datasets demonstrate the superior
    performance of our MRT over state-of-the-art methods. Codes are available at https://github.com/CGuangyan-BIT/MRA.
  related_code: https://github.com/CGuangyan-BIT/MRA
- author: Suyi Chen, Hao Xu 0018, Ru Li 0002, Guanghui Liu 0001, Chi-Wing Fu, Shuaicheng
    Liu
  title: 'SIRA-PCR: Sim-to-Real Adaptation for 3D Point Cloud Registration.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ChenXL0FL23
  doi: 10.1109/ICCV51070.2023.01324
  ee: https://doi.org/10.1109/ICCV51070.2023.01324
  url: https://dblp.org/rec/conf/iccv/ChenXL0FL23
  abstract: Point cloud registration is essential for many applications. However,
    existing real datasets require extremely tedious and costly annotations, yet may
    not provide accurate camera poses. For the synthetic datasets, they are mainly
    object-level, so the trained models may not generalize well to real scenes. We
    design SIRA-PCR, a new approach to 3D point cloud registration. First, we build
    a synthetic scene-level 3D registration dataset, specifically designed with physically-based
    and random strategies to arrange diverse objects. Second, we account for variations
    in different sensing mechanisms and layout placements, then formulate a sim-to-real
    adaptation framework with an adaptive re-sample module to simulate patterns in
    real point clouds. To our best knowledge, this is the first work that explores
    sim-to-real adaptation for point cloud registration. Extensive experiments show
    the SOTA performance of SIRA-PCR on widely-used indoor and out-door datasets.
    The code and dataset will be released on https://github.com/Chen-Suyi/SIRA_Pytorc.h
  related_code: https://github.com/Chen-Suyi/SIRA_Pytorc.h
- author: Zheng Dang, Mathieu Salzmann
  title: 'AutoSynth: Learning to Generate 3D Training Data for Object Point Cloud
    Registration.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/DangS23
  doi: 10.1109/ICCV51070.2023.00827
  ee: https://doi.org/10.1109/ICCV51070.2023.00827
  url: https://dblp.org/rec/conf/iccv/DangS23
  abstract: In the current deep learning paradigm, the amount and quality of training
    data are as critical as the network architecture and its training details. However,
    collecting, processing, and annotating real data at scale is difficult, expensive,
    and time-consuming, particularly for tasks such as 3D object registration. While
    synthetic datasets can be created, they require expertise to design and include
    a limited number of categories. In this paper, we introduce a new approach called
    AutoSynth, which automatically generates 3D training data for point cloud registration.
    Specifically, AutoSynth automatically curates an optimal dataset by exploring
    a search space encompassing millions of potential datasets with diverse 3D shapes
    at a low cost. To achieve this, we generate synthetic 3D datasets by assembling
    shape primitives, and develop a meta-learning strategy to search for the best
    training data for 3D registration on real point clouds. For this search to remain
    tractable, we replace the point cloud registration network with a much smaller
    surrogate network, leading to a 4056.43 times speedup. We demonstrate the generality
    of our approach by implementing it with two different point cloud registration
    networks, BPNet [13] and IDAM [34]. Our results on TUD-L [26], LINEMOD [23] and
    Occluded-LINEMOD [7] evidence that a neural network trained on our searched dataset
    yields consistently better performance than the same one trained on the widely
    used ModelNet40 dataset [65].
  related_code: ''
- author: Qihua Dong, Hao Du 0006, Ying Song, Yan Xu 0001, Jing Liao 0001
  title: Preserving Tumor Volumes for Unsupervised Medical Image Registration.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/DongDS0023
  doi: 10.1109/ICCV51070.2023.01939
  ee: https://doi.org/10.1109/ICCV51070.2023.01939
  url: https://dblp.org/rec/conf/iccv/DongDS0023
  abstract: 'Medical image registration is a critical task that estimates the spatial
    correspondence between pairs of images. However, current traditional and deep-learning-based
    methods rely on similarity measures to generate a deforming field, which often
    results in disproportionate volume changes in dissimilar regions, especially in
    tumor regions. These changes can significantly alter the tumor size and underlying
    anatomy, which limits the practical use of image registration in clinical diagnosis.
    To address this issue, we have formulated image registration with tumors as a
    constraint problem that preserves tumor volumes while maximizing image similarity
    in other normal regions. Our proposed strategy involves a two-stage process. In
    the first stage, we use similarity-based registration to identify potential tumor
    regions by their volume change, generating a soft tumor mask accordingly. In the
    second stage, we propose a volume-preserving registration with a novel adaptive
    volume-preserving loss that penalizes the change in size adaptively based on the
    masks calculated from the previous stage. Our approach balances image similarity
    and volume preservation in different regions, i.e., normal and tumor regions,
    by using soft tumor masks to adjust the imposition of volume-preserving loss on
    each one. This ensures that the tumor volume is preserved during the registration
    process. We have evaluated our strategy on various datasets and network architectures,
    demonstrating that our method successfully preserves the tumor volume while achieving
    comparable registration results with state-of-the-art methods. Our codes is available
    at: https://dddraxxx.github.io/Volume-Preserving-Registration/.'
  related_code: ''
- author: Bin Duan, Ming Zhong 0008, Yan Yan 0002
  title: Towards Saner Deep Image Registration.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/DuanZ023
  doi: 10.1109/ICCV51070.2023.01145
  ee: https://doi.org/10.1109/ICCV51070.2023.01145
  url: https://dblp.org/rec/conf/iccv/DuanZ023
  abstract: With recent advances in computing hardware and surges of deep-learning
    architectures, learning-based deep image registration methods have surpassed their
    traditional counterparts, in terms of metric performance and inference time. However,
    these methods focus on improving performance measurements such as Dice, resulting
    in less attention given to model behaviors that are equally desirable for registrations,
    especially for medical imaging. This paper investigates these behaviors for popular
    learning-based deep registrations under a sanity-checking microscope. We find
    that most existing registrations suffer from low inverse consistency and nondiscrimination
    of identical pairs due to overly optimized image similarities. To rectify these
    behaviors, we propose a novel regularization-based sanity-enforcer method that
    imposes two sanity checks on the deep model to reduce its inverse consistency
    errors and increase its discriminative power simultaneously. Moreover, we derive
    a set of theoretical guarantees for our sanity-checked image registration method,
    with experimental results supporting our theoretical findings and their effectiveness
    in increasing the sanity of models without sacrificing any performance.
  related_code: ''
- author: Ahmed Hatem, Yiming Qian, Yang Wang 0003
  title: 'Point-TTA: Test-Time Adaptation for Point Cloud Registration Using Multitask
    Meta-Auxiliary Learning.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/HatemQW23
  doi: 10.1109/ICCV51070.2023.01512
  ee: https://doi.org/10.1109/ICCV51070.2023.01512
  url: https://dblp.org/rec/conf/iccv/HatemQW23
  abstract: We present Point-TTA, a novel test-time adaptation framework for point
    cloud registration (PCR) that improves the generalization and the performance
    of registration models. While learning-based approaches have achieved impressive
    progress, generalization to unknown testing environments remains a major challenge
    due to the variations in 3D scans. Existing methods typically train a generic
    model and the same trained model is applied on each instance during testing. This
    could be sub-optimal since it is difficult for the same model to handle all the
    variations during testing. In this paper, we propose a test-time adaptation approach
    for PCR. Our model can adapt to unseen distributions at test-time without requiring
    any prior knowledge of the test data. Concretely, we design three self-supervised
    auxiliary tasks that are optimized jointly with the primary PCR task. Given a
    test instance, we adapt our model using these auxiliary tasks and the updated
    model is used to perform the inference. During training, our model is trained
    using a meta-auxiliary learning approach, such that the adapted model via auxiliary
    tasks improves the accuracy of the primary task. Experimental results demonstrate
    the effectiveness of our approach in improving generalization of point cloud registration
    and outperforming other state-of-the-art approaches.
  related_code: ''
- author: Mattias P. Heinrich, Alexander Bigalke, Christoph Großbröhmer, Lasse Hansen
  title: 'Chasing clouds: Differentiable volumetric rasterisation of point clouds
    as a highly efficient and accurate loss for large-scale deformable 3D registration.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/HeinrichBGH23
  doi: 10.1109/ICCV51070.2023.00737
  ee: https://doi.org/10.1109/ICCV51070.2023.00737
  url: https://dblp.org/rec/conf/iccv/HeinrichBGH23
  abstract: 'Learning-based registration for large-scale 3D point clouds has been
    shown to improve robustness and accuracy compared to classical methods and can
    be trained without supervision for locally rigid problems. However, for tasks
    with highly deformable structures, such as alignment of pulmonary vascular trees
    for medical diagnostics, previous approaches of self-supervision with regularisation
    and point distance losses have failed to succeed, leading to the need for complex
    synthetic augmentation strategies to obtain reliably strong supervision. In this
    work, we introduce a novel Differentiable Volumetric Rasterisation of point Clouds
    (DiVRoC) that overcomes those limitations and offers a highly efficient and accurate
    loss for large-scale deformable 3D registration. DiVRoC drastically reduces the
    computational complexity for measuring point cloud distances for high-resolution
    data with over 100k 3D points and can also be employed to extrapolate and regularise
    sparse motion fields, as loss in a self-training setting and as objective function
    in instance optimisation. DiVRoC can be successfully embedded into geometric registration
    networks, including PointPWC-Net and other graph CNNs. Our approach yields new
    state-of-the-art accuracy on the challenging PVT dataset in three different settings
    without training with manual ground truth: 1) unsupervised metric-based learning
    2) self-supervised learning with pseudo labels generated by self-training and
    3) optimisation based alignment without learning. https://github.com/mattiaspaul/ChasingClouds'
  related_code: https://github.com/mattiaspaul/ChasingClouds
- author: Haobo Jiang, Zheng Dang, Shuo Gu, Jin Xie 0001, Mathieu Salzmann, Jian Yang
    0003
  title: Center-Based Decoupled Point Cloud Registration for 6D Object Pose Estimation.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/JiangDGXSY23
  doi: 10.1109/ICCV51070.2023.00317
  ee: https://doi.org/10.1109/ICCV51070.2023.00317
  url: https://dblp.org/rec/conf/iccv/JiangDGXSY23
  abstract: In this paper, we propose a novel center-based decoupled point cloud registration
    framework for robust 6D object pose estimation in real-world scenarios. Our method
    decouples the translation from the entire transformation by predicting the object
    center and estimating the rotation in a center-aware manner. This center offset-based
    translation estimation is correspondence-free, freeing us from the difficulty
    of constructing correspondences in challenging scenarios, thus improving robustness.
    To obtain reliable center predictions, we use a multi-view (bird’s eye view and
    front view) object shape description of the source-point features, with both views
    jointly voting for the object center. Additionally, we propose an effective shape
    embedding module to augment the source features, largely completing the missing
    shape information due to partial scanning, thus facilitating the center prediction.
    With the center-aligned source and model point clouds, the rotation predictor
    utilizes feature similarity to establish putative correspondences for SVD-based
    rotation estimation. In particular, we introduce a center-aware hybrid feature
    descriptor with a normal correction technique to extract discriminative, part-aware
    features for high-quality correspondence construction. Our experiments show that
    our method outperforms the state-of-the-art methods by a large margin on real-world
    datasets such as TUD-L, LINEMOD, and Occluded-LINEMOD. Code is available at https://github.com/JiangHB/CenterReg.
  related_code: https://github.com/JiangHB/CenterReg
- author: Minhao Li, Zheng Qin 0002, Zhirui Gao, Renjiao Yi, Chenyang Zhu 0002, Yulan
    Guo, Kai Xu 0004
  title: '2D3D-MATR: 2D-3D Matching Transformer for Detection-free Registration between
    Images and Point Clouds.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LiQGY0GX23
  doi: 10.1109/ICCV51070.2023.01299
  ee: https://doi.org/10.1109/ICCV51070.2023.01299
  url: https://dblp.org/rec/conf/iccv/LiQGY0GX23
  abstract: The commonly adopted detect-then-match approach to registration finds
    difficulties in the cross-modality cases due to the incompatible keypoint detection
    and inconsistent feature description. We propose, 2D3D-MATR, a detection-free
    method for accurate and robust registration between images and point clouds. Our
    method adopts a coarse-to-fine pipeline where it first computes coarse correspondences
    between downsampled patches of the input image and the point cloud and then extends
    them to form dense correspondences between pixels and points within the patch
    region. The coarse-level patch matching is based on transformer which jointly
    learns global contextual constraints with self-attention and cross-modality correlations
    with cross-attention. To resolve the scale ambiguity in patch matching, we construct
    a multi-scale pyramid for each image patch and learn to find for each point patch
    the best matching image patch at a proper resolution level. Extensive experiments
    on two public benchmarks demonstrate that 2D3D-MATR outperforms the previous state-of-the-art
    P2-Net by around 20 percentage points on inlier ratio and over 10 points on registration
    recall. Our code and models are available at https://github.com/minhaolee/2D3DMATR.
  related_code: https://github.com/minhaolee/2D3DMATR
- author: Jiuming Liu, Guangming Wang 0001, Zhe Liu 0022, Chaokang Jiang, Marc Pollefeys,
    Hesheng Wang 0001
  title: 'RegFormer: An Efficient Projection-Aware Transformer Network for Large-Scale
    Point Cloud Registration.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LiuW0JP023
  doi: 10.1109/ICCV51070.2023.00776
  ee: https://doi.org/10.1109/ICCV51070.2023.00776
  url: https://dblp.org/rec/conf/iccv/LiuW0JP023
  abstract: 'Although point cloud registration has achieved remarkable advances in
    object-level and indoor scenes, large-scale registration methods are rarely explored.
    Challenges mainly arise from the huge point number, complex distribution, and
    outliers of outdoor LiDAR scans. In addition, most existing registration works
    generally adopt a two-stage paradigm: They first find correspondences by extracting
    discriminative local features and then leverage estimators (eg. RANSAC) to filter
    outliers, which are highly dependent on well-designed descriptors and post-processing
    choices. To address these problems, we propose an end-to-end transformer network
    (RegFormer) for large-scale point cloud alignment without any further post-processing.
    Specifically, a projection-aware hierarchical transformer is proposed to capture
    long-range dependencies and filter outliers by extracting point features globally.
    Our transformer has linear complexity, which guarantees high efficiency even for
    large-scale scenes. Furthermore, to effectively reduce mismatches, a bijective
    association transformer is designed for regressing the initial transformation.
    Extensive experiments on KITTI and NuScenes datasets demonstrate that our RegFormer
    achieves competitive performance in terms of both accuracy and efficiency. Codes
    are available at https://github.com/IRMVLab/RegFormer.'
  related_code: https://github.com/IRMVLab/RegFormer
- author: Quan Liu 0006, Hongzi Zhu, Yunsong Zhou, Hongyang Li 0001, Shan Chang, Minyi
    Guo
  title: Density-invariant Features for Distant Point Cloud Registration.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LiuZZLCG23
  doi: 10.1109/ICCV51070.2023.01670
  ee: https://doi.org/10.1109/ICCV51070.2023.01670
  url: https://dblp.org/rec/conf/iccv/LiuZZLCG23
  abstract: Registration of distant outdoor LiDAR point clouds is crucial to extending
    the 3D vision of collaborative autonomous vehicles, and yet is challenging due
    to small overlapping area and a huge disparity between observed point densities.
    In this paper, we propose Group-wise Contrastive Learning (GCL) scheme to extract
    density-invariant geometric features to register distant outdoor LiDAR point clouds.
    We mark through theoretical analysis and experiments that, contrastive positives
    should be independent and identically distributed (i.i.d.), in order to train
    density-invariant feature extractors. We propose upon the conclusion a simple
    yet effective training scheme to force the feature of multiple point clouds in
    the same spatial location (referred to as positive groups) to be similar, which
    naturally avoids the sampling bias introduced by a pair of point clouds to conform
    with the i.i.d. principle. The resulting fully-convolutional feature extractor
    is more powerful and density-invariant than state-of-the-art methods, improving
    the registration recall of distant scenarios on KITTI and nuScenes benchmarks
    by 40.9% and 26.9%, respectively. Code is available at https://github.com/liuQuan98/GCL.
  related_code: https://github.com/liuQuan98/GCL
- author: Jiepeng Wang 0001, Congyi Zhang 0001, Peng Wang 0099, Xin Li 0003, Peter
    J. Cobb, Christian Theobalt, Wenping Wang 0001
  title: Batch-based Model Registration for Fast 3D Sherd Reconstruction.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/WangZWLCTW23
  doi: 10.1109/ICCV51070.2023.01335
  ee: https://doi.org/10.1109/ICCV51070.2023.01335
  url: https://dblp.org/rec/conf/iccv/WangZWLCTW23
  abstract: '3D reconstruction techniques have widely been used for digital documentation
    of archaeological fragments. However, efficient digital capture of fragments remains
    as a challenge. In this work, we aim to develop a portable, high-throughput, and
    accurate reconstruction system for efficient digitization of fragments excavated
    in archaeological sites. To realize high-throughput digitization of large numbers
    of objects, an effective strategy is to perform scanning and reconstruction in
    batches. However, effective batch-based scanning and reconstruction face two key
    challenges: 1) how to correlate partial scans of the same object from multiple
    batch scans, and 2) how to register and reconstruct complete models from partial
    scans that exhibit only small overlaps. To tackle these two challenges, we develop
    a new batch-based matching algorithm that pairs the front and back sides of the
    fragments, and a new Bilateral Boundary ICP algorithm that can register partial
    scans sharing very narrow overlapping regions. Extensive validation in labs and
    testing in excavation sites demonstrate that these designs enable efficient batch-based
    scanning for fragments. We show that such a batch-based scanning and reconstruction
    pipeline can have immediate applications on digitizing sherds in archaeological
    excavations. Our project page: https://jiepengwang.github.io/FIRES/.'
  related_code: ''
- author: Mingzhi Yuan, Kexue Fu 0001, Zhihao Li, Yucong Meng, Manning Wang
  title: 'PointMBF: A Multi-scale Bidirectional Fusion Network for Unsupervised RGB-D
    Point Cloud Registration.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/YuanFLMW23
  doi: 10.1109/ICCV51070.2023.01622
  ee: https://doi.org/10.1109/ICCV51070.2023.01622
  url: https://dblp.org/rec/conf/iccv/YuanFLMW23
  abstract: Point cloud registration is a task to estimate the rigid transformation
    between two unaligned scans, which plays an important role in many computer vision
    applications. Previous learning-based works commonly focus on supervised registration,
    which have limitations in practice. Recently, with the advance of inexpensive
    RGB-D sensors, several learning-based works utilize RGB-D data to achieve unsupervised
    registration. However, most of existing unsupervised methods follow a cascaded
    design or fuse RGB-D data in a unidirectional manner, which do not fully exploit
    the complementary information in the RGB-D data. To leverage the complementary
    information more effectively, we propose a network implementing multi-scale bidirectional
    fusion between RGB images and point clouds generated from depth images. By bidirectionally
    fusing visual and geometric features in multi-scales, more distinctive deep features
    for correspondence estimation can be obtained, making our registration more accurate.
    Extensive experiments on ScanNet and 3DMatch demonstrate that our method achieves
    new state-of-the-art performance. Code will be released at https://github.com/phdymz/PointMBF.
  related_code: https://github.com/phdymz/PointMBF
- author: Chi Xu 0003, Shogo Tsuji, Yasushi Makihara, Xiang Li 0028, Yasushi Yagi
  title: Occluded Gait Recognition via Silhouette Registration Guided by Automated
    Occlusion Degree Estimation.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccvw/0003TMLY23
  doi: 10.1109/ICCVW60793.2023.00344
  ee: https://doi.org/10.1109/ICCVW60793.2023.00344
  url: https://dblp.org/rec/conf/iccvw/0003TMLY23
  abstract: Gait recognition tasks often face significant difficulties caused by partial
    occlusions of the human body. To address this challenge, we propose a silhouette
    registration method based on flexible estimation of the spatial scale associated
    with the occluding elements. Existing appearance-based methods require prior knowledge
    about the spatial scale of the human body in relation to the input image, or a
    bounding box that includes the actual full body. In our method, the region corresponding
    to the silhouette of the body is estimated directly from visible body parts within
    the image. This estimate is then used to normalize and register the human body
    by adapting it to the scale of the occlusions. To reduce the occlusion difference
    between elements of a matching pair, which may lead to substantial intra-subject
    variation when the difference is large, we use a pairwise mask to extract common
    visible regions for subsequent feature learning and matching. Experiments on the
    synthetic occluded OU-MVLP dataset demonstrate the effectiveness of the proposed
    method, which successfully improves recognition performance when matching pairs
    present occlusion differences. We discuss specific characteristics of the proposed
    silhouette registration and pairwise masking methods with the aid of detailed
    quantitative and qualitative evaluations, in the hope of providing useful insights
    for future research on this topic.
  related_code: ''
- author: Fan Lu 0001, Guang Chen 0001, Yinlong Liu, Lijun Zhang, Sanqing Qu, Shu
    Liu, Rongqi Gu
  title: 'HRegNet: A Hierarchical Network for Large-scale Outdoor LiDAR Point Cloud
    Registration.'
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/00010LZQLG21
  doi: 10.1109/ICCV48922.2021.01571
  ee: https://doi.org/10.1109/ICCV48922.2021.01571
  url: https://dblp.org/rec/conf/iccv/00010LZQLG21
  abstract: Point cloud registration is a fundamental problem in 3D computer vision.
    Outdoor LiDAR point clouds are typically large-scale and complexly distributed,
    which makes the registration challenging. In this paper, we propose an efficient
    hierarchical network named HRegNet for large-scale out-door LiDAR point cloud
    registration. Instead of using all points in the point clouds, HRegNet performs
    registration on hierarchically extracted keypoints and descriptors. The overall
    framework combines the reliable features in deeper layer and the precise position
    information in shallower layers to achieve robust and precise registration. We
    present a correspondence network to generate correct and accurate keypoints correspondences.
    Moreover, bilateral consensus and neighborhood consensus are introduced for keypoints
    matching and novel similarity features are designed to in-corporate them into
    the correspondence network, which significantly improves the registration performance.
    Besides, the whole network is also highly efficient since only a small number
    of keypoints are used for registration. Extensive experiments are conducted on
    two large-scale outdoor LiDAR point cloud datasets to demonstrate the high accuracy
    and efficiency of the proposed HRegNet. The project website is https://ispc-group.github.io/hregnet.
  related_code: ''
- author: Sérgio Agostinho, Aljosa Osep, Alessio Del Bue, Laura Leal-Taixé
  title: (Just) A Spoonful of Refinements Helps the Registration Error Go Down.
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/AgostinhoOBL21
  doi: 10.1109/ICCV48922.2021.00605
  ee: https://doi.org/10.1109/ICCV48922.2021.00605
  url: https://dblp.org/rec/conf/iccv/AgostinhoOBL21
  abstract: We tackle data-driven 3D point cloud registration. Given point correspondences,
    the standard Kabsch algorithm provides an optimal rotation estimate. This allows
    to train registration models in an end-to-end manner by differentiating the SVD
    operation. However, given the initial rotation estimate supplied by Kabsch, we
    show we can improve point correspondence learning during model training by extending
    the original optimization problem. In particular, we linearize the governing constraints
    of the rotation matrix and solve the resulting linear system of equations. We
    then iteratively produce new solutions by updating the initial estimate. Our experiments
    show that, by plugging our differentiable layer to existing learning-based registration
    methods, we improve the correspondence matching quality. This yields up to a 7%
    decrease in rotation error for correspondence-based data-driven registration methods.
  related_code: ''
- author: Anh-Quan Cao, Gilles Puy, Alexandre Boulch, Renaud Marlet
  title: 'PCAM: Product of Cross-Attention Matrices for Rigid Registration of Point
    Clouds.'
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/CaoPBM21
  doi: 10.1109/ICCV48922.2021.01298
  ee: https://doi.org/10.1109/ICCV48922.2021.01298
  url: https://dblp.org/rec/conf/iccv/CaoPBM21
  abstract: 'Rigid registration of point clouds with partial overlaps is a longstanding
    problem usually solved in two steps: (a) finding correspondences between the point
    clouds; (b) filtering these correspondences to keep only the most reliable ones
    to estimate the transformation. Recently, several deep nets have been proposed
    to solve these steps jointly. We built upon these works and propose PCAM: a neural
    network whose key element is a pointwise product of crossattention matrices that
    permits to mix both low-level geometric and high-level contextual information
    to find point correspondences. These cross-attention matrices also permits the
    exchange of context information between the point clouds, at each layer, allowing
    the network construct better matching features within the overlapping regions.
    The experiments show that PCAM achieves state-of-the-art results among methods
    which, like us, solve steps (a) and (b) jointly via deepnets.'
  related_code: ''
- author: Zhi Deng, Yuxin Yao 0001, Bailin Deng, Juyong Zhang
  title: A Robust Loss for Point Cloud Registration.
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/DengYDZ21
  doi: 10.1109/ICCV48922.2021.00608
  ee: https://doi.org/10.1109/ICCV48922.2021.00608
  url: https://dblp.org/rec/conf/iccv/DengYDZ21
  abstract: The performance of surface registration relies heavily on the metric used
    for the alignment error between the source and target shapes. Traditionally, such
    a metric is based on the point-to-point or point-to-plane distance from the points
    on the source surface to their closest points on the target surface, which is
    susceptible to failure due to instability of the closest-point correspondence.
    In this paper, we propose a novel metric based on the intersection points between
    the two shapes and a random straight line, which does not assume a specific correspondence.
    We verify the effectiveness of this metric by extensive experiments, including
    its direct optimization for a single registration problem as well as un-supervised
    learning for a set of registration problems. The results demonstrate that the
    algorithms utilizing our proposed metric outperforms the state-of-the-art optimization-based
    and unsupervised learning-based methods.
  related_code: ''
- author: Neel Dey, Mengwei Ren, Adrian V. Dalca, Guido Gerig
  title: Generative Adversarial Registration for Improved Conditional Deformable Templates.
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/DeyRDG21
  doi: 10.1109/ICCV48922.2021.00390
  ee: https://doi.org/10.1109/ICCV48922.2021.00390
  url: https://dblp.org/rec/conf/iccv/DeyRDG21
  abstract: Deformable templates are essential to large-scale medical image registration,
    segmentation, and population analysis. Current conventional and deep network-based
    methods for template construction use only regularized registration objectives
    and often yield templates with blurry and/or anatomically implausible appearance,
    confounding downstream biomedical interpretation. We reformulate deformable registration
    and conditional template estimation as an adversarial game wherein we encourage
    realism in the moved templates with a generative adversarial registration framework
    conditioned on flexible image covariates. The resulting templates exhibit significant
    gain in specificity to attributes such as age and disease, better fit underlying
    group-wise spatiotemporal trends, and achieve improved sharpness and centrality.
    These improvements enable more accurate population modeling with diverse covariates
    for standardized downstream analyses and easier anatomical delineation for structures
    of interest.
  related_code: ''
- author: Haobo Jiang, Yaqi Shen, Jin Xie 0001, Jun Li 0027, Jianjun Qian, Jian Yang
    0003
  title: Sampling Network Guided Cross-Entropy Method for Unsupervised Point Cloud
    Registration.
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/JiangSXLQ021
  doi: 10.1109/ICCV48922.2021.00607
  ee: https://doi.org/10.1109/ICCV48922.2021.00607
  url: https://dblp.org/rec/conf/iccv/JiangSXLQ021
  abstract: In this paper, by modeling the point cloud registration task as a Markov
    decision process, we propose an end-to-end deep model embedded with the cross-entropy
    method (CEM) for unsupervised 3D registration. Our model consists of a sampling
    network module and a differentiable CEM module. In our sampling network module,
    given a pair of point clouds, the sampling network learns a prior sampling distribution
    over the transformation space. The learned sampling distribution can be used as
    a "good" initialization of the differentiable CEM module. In our differentiable
    CEM module, we first propose a maximum consensus criterion based alignment metric
    as the reward function for the point cloud registration task. Based on the reward
    function, for each state, we then construct a fused score function to evaluate
    the sampled transformations, where we weight the current and future rewards of
    the transformations. Particularly, the future rewards of the sampled transforms
    are obtained by performing the iterative closest point (ICP) algorithm on the
    transformed state. By selecting the top-k transformations with the highest scores,
    we iteratively update the sampling distribution. Furthermore, in order to make
    the CEM differentiable, we use the sparse-max function to replace the hard top-k
    selection. Finally, we formulate a Geman-McClure estimator based loss to train
    our end-to-end registration model. Extensive experimental results demonstrate
    the good registration performance of our method on benchmark datasets. Code is
    available at https://github.com/Jiang-HB/CEMNet.
  related_code: https://github.com/Jiang-HB/CEMNet
- author: Ibrahim Jubran, Alaa Maalouf, Ron Kimmel, Dan Feldman
  title: Provably Approximated Point Cloud Registration.
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/JubranMKF21
  doi: 10.1109/ICCV48922.2021.01302
  ee: https://doi.org/10.1109/ICCV48922.2021.01302
  url: https://dblp.org/rec/conf/iccv/JubranMKF21
  abstract: 'The goal of the alignment problem is to align a (given) point cloud P
    = {p1, ⋯,pn} to another (observed) point cloud Q = {q1, ⋯,qn}. That is, to compute
    a rotation matrix R ∈ ℝ3×3 and a translation vector t ∈ ℝ3 that minimize the sum
    of paired distances between every transformed point Rpi − t, to its corresponding
    point qi, over every i ∈ {1, ⋯,n}. A harder version is the registration problem,
    where the correspondence is unknown, and the minimum is also over all possible
    correspondence functions from P to Q. Algorithms such as the Iterative Closest
    Point (ICP) and its variants were suggested for these problems, but none yield
    a provable non-trivial approximation for the global optimum.We prove that there
    always exists a "witness" set of 3 pairs in P × Q that, via novel alignment algorithm,
    defines a constant factor approximation (in the worst case) to this global optimum.
    We then provide algorithms that recover this witness set and yield the first provable
    constant factor approximation for the: (i) alignment problem in O(n) expected
    time, and (ii) registration problem in polynomial time. Such small witness sets
    exist for many variants including points in d-dimensional space, outlier-resistant
    cost functions, and different correspondence types.Extensive experimental results
    on real and synthetic datasets show that, in practice, our approximation constants
    are close to 1 and our error is up to x10 times smaller than state-of-the-art
    algorithms.'
  related_code: ''
- author: Donghoon Lee, Onur C. Hamsici, Steven Feng, Prachee Sharma, Thorsten Gernoth
  title: 'DeepPRO: Deep Partial Point Cloud Registration of Objects.'
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LeeHFSG21
  doi: 10.1109/ICCV48922.2021.00563
  ee: https://doi.org/10.1109/ICCV48922.2021.00563
  url: https://dblp.org/rec/conf/iccv/LeeHFSG21
  abstract: 'We consider the problem of online and real-time registration of partial
    point clouds obtained from an unseen real-world rigid object without knowing its
    3D model. The point cloud is partial as it is obtained by a depth sensor capturing
    only the visible part of the object from a certain viewpoint. It introduces two
    main challenges: 1) two partial point clouds do not fully overlap and 2) keypoints
    tend to be less reliable when the visible part of the object does not have salient
    local structures. To address these issues, we propose DeepPRO, a keypoint-free
    and an end-to-end trainable deep neural network. Its core idea is inspired by
    how humans align two point clouds: we can imagine how two point clouds will look
    like after the registration based on their shape. To realize the idea, DeepPRO
    has inputs of two partial point clouds and directly predicts the point-wise location
    of the aligned point cloud. By preserving the ordering of points during the prediction,
    we enjoy dense correspondences between input and predicted point clouds when inferring
    rigid transform parameters. We conduct extensive experiments on the real-world
    Linemod and synthetic ModelNet40 datasets. In addition, we collect and evaluate
    on the PRO1k dataset, a large-scale version of Linemod meant to test generalization
    to real-world scans. Results show that DeepPRO achieves the best accuracy against
    thirteen strong baseline methods, e.g., 2.2mm ADD on the Linemod dataset, while
    running 50 fps on mobile devices.'
  related_code: ''
- author: Junha Lee, Seungwook Kim 0005, Minsu Cho, Jaesik Park
  title: Deep Hough Voting for Robust Global Registration.
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LeeKCP21
  doi: 10.1109/ICCV48922.2021.01569
  ee: https://doi.org/10.1109/ICCV48922.2021.01569
  url: https://dblp.org/rec/conf/iccv/LeeKCP21
  abstract: Point cloud registration is the task of estimating the rigid transformation
    that aligns a pair of point cloud fragments. We present an efficient and robust
    framework for pairwise registration of real-world 3D scans, leveraging Hough voting
    in the 6D transformation parameter space. First, deep geometric features are extracted
    from a point cloud pair to compute putative correspondences. We then construct
    a set of triplets of correspondences to cast votes on the 6D Hough space, representing
    the transformation parameters in sparse tensors. Next, a fully convolutional refinement
    module is applied to refine the noisy votes. Finally, we identify the consensus
    among the correspondences from the Hough space, which we use to predict our final
    transformation parameters. Our method outperforms state-of-the-art methods on
    3DMatch and 3DLoMatch benchmarks while achieving comparable performance on KITTI
    odometry dataset. We further demonstrate the generalizability of our approach
    by setting a new state-of-the-art on ICL-NUIM dataset, where we integrate our
    module into a multi-way registration pipeline.
