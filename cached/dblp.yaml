- author: Navami Kairanda, Marc Habermann, Shanthika Naik, Christian Theobalt, Vladislav
    Golyanik
  title: 'Thin-Shell-SfT: Fine-Grained Monocular Non-rigid 3D Surface Tracking with
    Neural Deformation Fields.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/KairandaHNTG25
  doi: 10.1109/CVPR52734.2025.01062
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Kairanda_Thin-Shell-SfT_Fine-Grained_Monocular_Non-rigid_3D_Surface_Tracking_with_Neural_Deformation_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/KairandaHNTG25
  abstract: 3D reconstruction of highly deformable surfaces (e.g. cloths) from monocular
    RGB videos is a challenging problem, and no solution provides a consistent and
    accurate recovery of fine-grained surface details. To account for the ill-posed
    nature of the setting, existing methods use deformation models with statistical,
    neural, or physical priors. They also predominantly rely on nonadaptive discrete
    surface representations (e.g. polygonal meshes), perform frame-by-frame optimisation
    leading to error propagation, and suffer from poor gradients of the mesh-based
    differentiable renderers. Consequently, fine surface details such as cloth wrinkles
    are often not recovered with the desired accuracy. In response to these limitations,
    we propose Thin-Shell-SfT, a new method for non-rigid 3D tracking that represents
    a surface as an implicit and continuous spatiotemporal neural field. We incorporate
    continuous thin shell physics prior based on the Kirchhoff-Love model for spatial
    regularisation, which starkly contrasts the discretised alternatives of earlier
    works. Lastly, we leverage 3D Gaussian splatting to differentiably render the
    surface into image space and optimise the deformations based on analysis-by-synthesis
    principles. Our Thin-Shell-SfT outperforms prior works qualitatively and quantitatively
    thanks to our continuous surface formulation in conjunction with a specially tailored
    simulation prior and surface-induced 3D Gaussians. See our project page at https://4dqv.mpi-inf.mpg.de/ThinShellSfT.
  related_code: ''
- author: Hao Ouyang, Qiuyu Wang, Yuxi Xiao, Qingyan Bai, Juntao Zhang, Kecheng Zheng,
    Xiaowei Zhou 0001, Qifeng Chen 0001, Yujun Shen
  title: 'CoDeF: Content Deformation Fields for Temporally Consistent Video Processing.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/OuyangWXBZZZCC24
  doi: 10.1109/CVPR52733.2024.00773
  ee: https://doi.org/10.1109/CVPR52733.2024.00773
  url: https://dblp.org/rec/conf/cvpr/OuyangWXBZZZCC24
  abstract: 'We present the content deformation field (CoDeF) as a new type of video
    representation, which consists of a canonical content field aggregating the static
    contents in the entire video and a temporal deformation field recording the transformations
    from the canonical image (i.e., rendered from the canonical content field) to
    each individual frame along the time axis. Given a target video, these two fields
    are jointly optimized to reconstruct it through a carefully tailored rendering
    pipeline. We advisedly introduce some regularizations into the optimization process,
    urging the canonical content field to inherit semantics (e.g., the object shape)
    from the video. With such a design, CoDeF naturally supports lifting image algorithms
    for video processing, in the sense that one can apply an image algorithm to the
    canonical image and effortlessly propagate the outcomes to the entire video with
    the aid of the temporal deformation field. We experimentally show that CoDeF is
    able to lift image-to-image translation to video-to-video translation and lift
    keypoint detection to keypoint tracking without any training. More importantly,
    thanks to our lifting strategy that deploys the algorithms on only one image,
    we achieve superior cross-frame consistency in processed videos compared to existing
    video-to-video translation approaches, and even manage to track non-rigid objects
    like water and smog. Code is made available at https: / /qiuyu96. github.io/CoDeF/'
  related_code: ''
- author: Chuhan Chen, Matthew O&apos;Toole, Gaurav Bharaj, Pablo Garrido 0001
  title: Implicit Neural Head Synthesis via Controllable Local Deformation Fields.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/ChenOB023
  doi: 10.1109/CVPR52729.2023.00048
  ee: https://doi.org/10.1109/CVPR52729.2023.00048
  url: https://dblp.org/rec/conf/cvpr/ChenOB023
  abstract: 'High-quality reconstruction of controllable 3D head avatars from 2D videos
    is highly desirable for virtual human applications in movies, games, and telepresence.
    Neural implicit fields provide a powerful representation to model 3D head avatars
    with personalized shape, expressions, and facial parts, e.g., hair and mouth interior,
    that go beyond the linear 3D morphable model (3DMM). However, existing methods
    do not model faces with fine-scale facial features, or local control of facial
    parts that extrapolate asymmetric expressions from monocular videos. Further,
    most condition only on 3DMM parameters with poor(er) locality, and resolve local
    features with a global neural field. We build on part-based implicit shape models
    that decompose a global deformation field into local ones. Our novel formulation
    models multiple implicit deformation fields with local semantic rig-like control
    via 3DMM-based parameters, and representative facial landmarks. Further, we propose
    a local controlloss and attention mask mechanism that promote sparsity of each
    learned deformation field. Our formulation renders sharper locally controllable
    nonlinear deformations than previous implicit monocular approaches, especially
    mouth interior, asymmetric expressions, and facial details. Project page: https://imaging.cs.cmu.edullocal_deformation_fieldsl'
  related_code: ''
- author: Shivam Duggal, Deepak Pathak
  title: Topologically-Aware Deformation Fields for Single-View 3D Reconstruction.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/DuggalP22
  doi: 10.1109/CVPR52688.2022.00159
  ee: https://doi.org/10.1109/CVPR52688.2022.00159
  url: https://dblp.org/rec/conf/cvpr/DuggalP22
  abstract: 'We present a new framework to learn dense 3D re-construction and correspondence
    from a single 2D image. The shape is represented implicitly as deformation over
    a category-level occupancy field and learned in an unsupervised manner from an
    unaligned image collection without using any 3D supervision. However, image collections
    usually contain large intra-category topological variation, e.g. images of different
    chair instances, posing a major challenge. Hence, prior methods are either restricted
    only to categories with no topological variation for estimating shape and correspondence
    or focus only on learning shape independently for each instance without any correspondence.
    To address this issue, we propose a topologically-aware deformation field that
    maps 3D points in object space to a higher-dimensional canonical space. Given
    a single image, we first implicitly deform a 3D point in the object space to a
    learned category-specific canonical space using the topologically-aware field
    and then learn the 3D shape in the canonical space. Both the canonical shape and
    deformation field are trained end-to-end using differentiable rendering via learned
    recurrent ray marcher. Our approach, dubbed TARS, achieves state-of-the-art reconstruction
    fidelity on several datasets: ShapeNet, Pascal3D+, CUB, and Pix3D chairs.'
  related_code: ''
