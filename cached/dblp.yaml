  abstract: This paper presents a contribution to the Learn2Reg challenge organized
    jointly with the MICCAI 2020, more specifically, to the task related to inter-patient
    hippocampus registration in magnetic resonance images. The proposed algorithm
    is a multi-step, learning-based, and semi-supervised procedure. The method consists
