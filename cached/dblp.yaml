- author: Davis M. Vigneault, Amir Pourmorteza, Marvin L. Thomas, David A. Bluemke,
    J. Alison Noble
  title: 'SiSSR: Simultaneous subdivision surface registration for the quantification
    of cardiac function from computed tomography in canines.'
  venue: Medical Image Anal.
  year: '2018'
  type: Journal Articles
  access: closed
  key: journals/mia/VigneaultPTBN18
  doi: 10.1016/J.MEDIA.2018.03.009
