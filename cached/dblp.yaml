- author: Yiheng Li, Connelly Barnes, Kun Huang, Fang-Lue Zhang
  title: Deep 360$\circ $ Optical Flow Estimation Based on Multi-projection Fusion.
  venue: ECCV
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/LiBHZ22
  doi: 10.1007/978-3-031-19833-5_20
  ee: https://doi.org/10.1007/978-3-031-19833-5_20
  url: https://dblp.org/rec/conf/eccv/LiBHZ22
  abstract: Optical flow computation is essential in the early stages of the video
    processing pipeline. This paper focuses on a less explored problem in this area,
    the 360$^\circ$ optical flow estimation using deep neural networks to support
    increasingly popular VR applications. To address the distortions of panoramic
    representations when applying convolutional neural networks, we propose a novel
    multi-projection fusion framework that fuses the optical flow predicted by the
    models trained using different projection methods. It learns to combine the complementary
    information in the optical flow results under different projections. We also build
    the first large-scale panoramic optical flow dataset to support the training of
    neural networks and the evaluation of panoramic optical flow estimation methods.
    The experimental results on our dataset demonstrate that our method outperforms
    the existing methods and other alternative deep networks that were developed for
    processing 360° content.
  related_code: ''
- author: Jenny Schmalfuss, Philipp Scholze, Andrés Bruhn
  title: A Perturbation-Constrained Adversarial Attack for Evaluating the Robustness
    of Optical Flow.
  venue: ECCV
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/SchmalfussSB22
  doi: 10.1007/978-3-031-20047-2_11
  ee: https://doi.org/10.1007/978-3-031-20047-2_11
  url: https://dblp.org/rec/conf/eccv/SchmalfussSB22
  abstract: Recent optical flow methods are almost exclusively judged in terms of
    accuracy, while their robustness is often neglected. Although adversarial attacks
    offer a useful tool to perform such an analysis, current attacks on optical flow
    methods focus on real-world attacking scenarios rather than a worst case robustness
    assessment. Hence, in this work, we propose a novel adversarial attack - the Perturbation-Constrained
    Flow Attack (PCFA) - that emphasizes destructivity over applicability as a real-world
    attack. PCFA is a global attack that optimizes adversarial perturbations to shift
    the predicted flow towards a specified target flow, while keeping the L2 norm
    of the perturbation below a chosen bound. Our experiments demonstrate PCFA's applicability
    in white- and black-box settings, and show it finds stronger adversarial samples
    than previous attacks. Based on these strong samples, we provide the first joint
    ranking of optical flow methods considering both prediction quality and adversarial
    robustness, which reveals state-of-the-art methods to be particularly vulnerable.
    Code is available at https://github.com/cv-stuttgart/PCFA.
  related_code: https://github.com/cv-stuttgart/PCFA
- author: Shintaro Shiba, Yoshimitsu Aoki, Guillermo Gallego 0002
  title: Secrets of Event-Based Optical Flow.
  venue: ECCV
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/ShibaAG22
  doi: 10.1007/978-3-031-19797-0_36
  ee: https://doi.org/10.1007/978-3-031-19797-0_36
  url: https://dblp.org/rec/conf/eccv/ShibaAG22
  abstract: 'Event cameras respond to scene dynamics and offer advantages to estimate
    motion. Following recent image-based deep-learning achievements, optical flow
    estimation methods for event cameras have rushed to combine those image-based
    methods with event data. However, it requires several adaptations (data conversion,
    loss function, etc.) as they have very different properties. We develop a principled
    method to extend the Contrast Maximization framework to estimate optical flow
    from events alone. We investigate key elements: how to design the objective function
    to prevent overfitting, how to warp events to deal better with occlusions, and
    how to improve convergence with multi-scale raw events. With these key elements,
    our method ranks first among unsupervised methods on the MVSEC benchmark, and
    is competitive on the DSEC benchmark. Moreover, our method allows us to expose
    the issues of the ground truth flow in those benchmarks, and produces remarkable
    results when it is transferred to unsupervised learning settings. Our code is
    available at https://github.com/tub-rip/event_based_optical_flow'
  related_code: https://github.com/tub-rip/event_based_optical_flow
- author: Deqing Sun, Charles Herrmann, Fitsum A. Reda, Michael Rubinstein, David
    J. Fleet, William T. Freeman
  title: Disentangling Architecture and Training for Optical Flow.
  venue: ECCV
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/SunHRRFF22
  doi: 10.1007/978-3-031-20047-2_10
  ee: https://doi.org/10.1007/978-3-031-20047-2_10
  url: https://dblp.org/rec/conf/eccv/SunHRRFF22
  abstract: . How important are training details and datasets to recent optical flow
    architectures like RAFT? And do they generalize? To explore these questions, rather
    than develop a new architecture, we revisit three prominent architectures, PWC-Net,
    IRR-PWC and RAFT, with a common set of modern training techniques and datasets,
    and observe significant performance gains, demonstrating the importance and generality
    of these training details. Our newly trained PWC-Net and IRR-PWC show surprisingly
    large improvements, up to 30% versus original published results on Sintel and
    KITTI 2015 benchmarks. Our newly trained RAFT obtains an Fl-all score of 4.31%
    on KITTI 2015 and an avg. rank of 1.7 for end-point error on Middlebury. Our results
    demonstrate the benefits of separating the contributions of architectures, training
    techniques and datasets when analyzing performance gains of optical flow methods.
    Our source code is available at https://autoflow-google.github.io . and RAFT are
    substantially more accurate than their predecessors. With improved training protocols,
    PWC-Net-it and IRR-PWC-it are more accurate than some recent methods [55,56] on
    KITTI 2015 while being about 3 × faster in inference.
  related_code: ''
- author: Song Wu, Kaichao You, Weihua He, Chen Yang, Yang Tian, Yaoyuan Wang, Ziyang
    Zhang, Jianxing Liao
  title: Video Interpolation by Event-Driven Anisotropic Adjustment of Optical Flow.
  venue: ECCV
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/WuYHYTWZL22
  doi: 10.1007/978-3-031-20071-7_16
  ee: https://doi.org/10.1007/978-3-031-20071-7_16
  url: https://dblp.org/rec/conf/eccv/WuYHYTWZL22
  abstract: Video frame interpolation is a challenging task due to the ever-changing
    real-world scene. Previous methods often calculate the bi-directional optical
    flows and then predict the intermediate optical flows under the linear motion
    assumptions, leading to isotropic intermediate flow generation. Follow-up research
    obtained anisotropic adjustment through estimated higher-order motion information
    with extra frames. Based on the motion assumptions, their methods are hard to
    model the complicated motion in real scenes. In this paper, we propose an end-to-end
    training method A^2OF for video frame interpolation with event-driven Anisotropic
    Adjustment of Optical Flows. Specifically, we use events to generate optical flow
    distribution masks for the intermediate optical flow, which can model the complicated
    motion between two frames. Our proposed method outperforms the previous methods
    in video frame interpolation, taking supervised event-based video interpolation
    to a higher stage.
