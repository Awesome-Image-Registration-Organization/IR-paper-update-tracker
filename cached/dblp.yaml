- author: Dong Hye Ye, Jihun Hamm, Dongjin Kwon, Christos Davatzikos, Kilian M. Pohl
  title: Regional Manifold Learning for Deformable Registration of Brain MR Images.
  venue: MICCAI
  year: '2012'
  type: Conference and Workshop Papers
  access: open
  key: conf/miccai/YeHKDP12
  doi: 10.1007/978-3-642-33454-2_17
  ee: https://doi.org/10.1007/978-3-642-33454-2_17
  url: https://dblp.org/rec/conf/miccai/YeHKDP12
  abstract: We propose a method for deformable registration based on learning the
    manifolds of individual brain regions. Recent publications on registration of
    medical images advocate the use of manifold learning in order to confine the search
    space to anatomically plausible deformations. Existing methods construct manifolds
    based on a single metric over the entire image domain thus frequently miss regional
    brain variations. We address this issue by first learning manifolds for specific
    regions and then computing region-specific deformations from these manifolds.
    We then determine deformations for the entire image domain by learning the global
    manifold in such a way that it preserves the region-specific deformations. We
    evaluate the accuracy of our method by applying it to the LPBA40 dataset and measuring
    the overlap of the deformed segmentations. The result shows significant improvement
    in registration accuracy on cortex regions compared to other state of the art
    methods.
