- author: Zehui Lin, Shuo Li 0001, Shanshan Wang, Zhifan Gao, Yue Sun 0001, Chan-Tong
    Lam, Xindi Hu, Xin Yang 0009, Dong Ni 0001, Tao Tan 0002
  title: 'An orchestration learning framework for ultrasound imaging: Prompt-Guided
    Hyper-Perception and Attention-Matching Downstream Synchronization.'
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/LinLWGSLHYNT25
  doi: 10.1016/J.MEDIA.2025.103639
  ee: https://doi.org/10.1016/j.media.2025.103639
  url: https://dblp.org/rec/journals/mia/LinLWGSLHYNT25
  abstract: Ultrasound imaging is pivotal in clinical diagnostics due to its affordability,
    portability, safety, real-time capability, and non-invasive nature. It is widely
    utilized for examining various organs, such as the breast, thyroid, ovary, cardiac,
    and more. However, the manual interpretation and annotation of ultrasound images
    are time-consuming and prone to variability among physicians. While single-task
    artificial intelligence (AI) solutions have been explored, they are not ideal
    for scaling AI applications in medical imaging. Foundation models, although a
    trending solution, often struggle with real-world medical datasets due to factors
    such as noise, variability, and the incapability of flexibly aligning prior knowledge
    with task adaptation. To address these limitations, we propose an orchestration
    learning framework named PerceptGuide for general-purpose ultrasound classification
    and segmentation. Our framework incorporates a novel orchestration mechanism based
    on prompted hyper-perception, which adapts to the diverse inductive biases required
    by different ultrasound datasets. Unlike self-supervised pre-trained models, which
    require extensive fine-tuning, our approach leverages supervised pre-training
    to directly capture task-relevant features, providing a stronger foundation for
    multi-task and multi-organ ultrasound imaging. To support this research, we compiled
    a large-scale Multi-task, Multi-organ public ultrasound dataset (M2-US), featuring
    images from 9 organs and 16 datasets, encompassing both classification and segmentation
    tasks. Our approach employs four specific prompts-Object, Task, Input, and Position-to
    guide the model, ensuring task-specific adaptability. Additionally, a downstream
    synchronization training stage is introduced to fine-tune the model for new data,
    significantly improving generalization capabilities and enabling real-world applications.
    Experimental results demonstrate the robustness and versatility of our framework
    in handling multi-task and multi-organ ultrasound image processing, outperforming
    both specialist models and existing general AI solutions. Compared to specialist
    models, our method improves segmentation from 82.26% to 86.45%, classification
    from 71.30% to 79.08%, while also significantly reducing model parameters.
  related_code: ''
- author: Yangqin Feng, Zizhou Wang, Xinxing Xu, Yan Wang 0015, Huazhu Fu, Shaohua
