- author: Renlang Huang, Li Chai 0001, Yufan Tang, Zhoujian Li, Jiming Chen 0001,
    Liang Li 0010
  title: Consistency-Aware Spot-Guided Transformer for Accurate and Versatile Point
    Cloud Registration.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2026'
  type: Journal Articles
  access: closed
  key: journals/pami/HuangCTLCL26
  doi: 10.1109/TPAMI.2026.3653989
  ee: https://doi.org/10.1109/TPAMI.2026.3653989
  url: https://dblp.org/rec/journals/pami/HuangCTLCL26
  abstract: Deep learning-based feature matching has showcased great superiority for
    point cloud registration. While coarse-to-fine matching architectures are prevalent,
    they typically perform sparse and geometrically inconsistent coarse matching.
    This forces the subsequent fine matching to rely on computationally expensive
    optimal transport and hypothesis-and-selection procedures to resolve inconsistencies,
    leading to inefficiency and poor scalability for large-scale real-time applications.
    In this paper, we design a consistency-aware spot-guided Transformer (CAST) to
    enhance the coarse matching by explicitly utilizing geometric consistency via
    two key sparse attention mechanisms. First, our consistency-aware self-attention
    selectively computes intra-point-cloud attention to a sparse subset of points
    with globally consistent correspondences, enabling other points to derive discriminative
    features through their relationships with these anchors while propagating global
    consistency for robust correspondence reasoning. Second, our spot-guided cross-attention
    restricts cross-point-cloud attention to dynamically defined “spots”—the union
    of correspondence neighborhoods of a query’s neighbors in the other point cloud,
    which are most likely to cover the true correspondence of the query ensured by
    local consistency, eliminating interference from similar but irrelevant regions.
    Furthermore, we design a lightweight local attention-based fine matching module
    to precisely predict dense correspondences and estimate the transformation. Extensive
    experiments on both outdoor LiDAR datasets and indoor RGB-D camera datasets demonstrate
    that our method achieves state-of-the-art accuracy, efficiency, and robustness.
    Besides, our method showcases superior generalization ability on our newly constructed
    challenging relocalization and loop closing benchmarks in unseen domains.
