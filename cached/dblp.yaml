  url: https://dblp.org/rec/journals/mia/BetkeHTPK03
  abstract: We developed an automated system for registering computed tomography (CT)
    images of the chest temporally. Our system detects anatomical landmarks, in particular,
    the trachea, sternum and spine, using an attenuation-based template matching approach.
    It computes the optimal rigid-body transformation that aligns the corresponding
    landmarks in two CT scans of the same patient. This transformation then provides
    an initial registration of the lung surfaces segmented from the two scans. The
    initial surface alignment is refined step by step in an iterative closest-point
    (ICP) process. To establish the correspondence of lung surface points, Elias'
    nearest neighbor algorithm was adopted. Our method improves the processing time
    of the original ICP algorithm from O(kn log n) to O(kn), where k is the number
    of iterations and n the number of surface points. The surface transformation is
    applied to align nodules in the initial CT scan with nodules in the follow-up
    scan. For 56 out of 58 nodules in the initial CT scans of 10 patients, nodule
    correspondences in the follow-up scans are established correctly. Our methods
    can therefore potentially facilitate the radiologist's evaluation of pulmonary
    nodules on chest CT for interval growth.
