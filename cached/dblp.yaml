- author: Hanyu Zhou, Haonan Wang, Haoyue Liu 0001, Yuxing Duan, Yi Chang 0002, Luxin
    Yan
  title: 'Bridge Frame and Event: Common Spatiotemporal Fusion for High-Dynamic Scene
    Optical Flow.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/ZhouWLD0Y25
  doi: 10.1109/CVPR52734.2025.02598
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Zhou_Bridge_Frame_and_Event_Common_Spatiotemporal_Fusion_for_High-Dynamic_Scene_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/ZhouWLD0Y25
  abstract: High-dynamic scene optical flow is a challenging task, which suffers spatial
    blur and temporal discontinuous motion due to large displacement in frame imaging,
    thus deteriorating the spatiotemporal feature of optical flow. Typically, existing
    methods mainly introduce event camera to directly fuse the spatiotemporal features
    between the two modalities. However, this direct fusion is ineffective, since
    there exists a large gap due to the heterogeneous data representation between
    frame and event modalities. To address this issue, we explore a common-latent
    space as an intermediate bridge to mitigate the modality gap. In this work, we
    propose a novel common spatiotemporal fusion between frame and event modalities
    for high-dynamic scene optical flow, including visual boundary localization and
    motion correlation fusion. Specifically, in visual boundary localization, we figure
    out that frame and event share the similar spatiotemporal gradients, whose similarity
    distribution is consistent with the extracted boundary distribution. This motivates
    us to design the common spatiotemporal gradient to constrain the reference boundary
    localization. In motion correlation fusion, we discover that the frame-based motion
    possesses spatially dense but temporally discontinuous correlation, while the
    event-based motion has spatially sparse but temporally continuous correlation.
    This inspires us to use the reference boundary to guide the complementary motion
    knowledge fusion between the two modalities. Moreover, common spatiotemporal fusion
    can not only relieve the cross-modal feature discrepancy, but also make the fusion
    process interpretable for dense and continuous optical flow. Extensive experiments
    have been performed to verify the superiority of the proposed method.
  related_code: ''
- author: Hanyu Zhou, Yi Chang 0002, Wending Yan, Luxin Yan
  title: Unsupervised Cumulative Domain Adaptation for Foggy Scene Optical Flow.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/Zhou0YY23
  doi: 10.1109/CVPR52729.2023.00923
  ee: https://doi.org/10.1109/CVPR52729.2023.00923
  url: https://dblp.org/rec/conf/cvpr/Zhou0YY23
  abstract: 'Optical flow has achieved great success under clean scenes, but suffers
    from restricted performance under foggy scenes. To bridge the clean-to-foggy domain
    gap, the existing methods typically adopt the domain adaptation to transfer the
    motion knowledge from clean to synthetic foggy domain. However, these methods
    unexpectedly neglect the synthetic-to-real domain gap, and thus are erroneous
    when applied to real-world scenes. To handle the practical optical flow under
    real foggy scenes, in this work, we propose a novel unsupervised cumulative domain
    adaptation optical flow (UCDA-Flow) framework: depth-association motion adaptation
    and correlation-alignment motion adaptation. Specifically, we discover that depth
    is a key ingredient to in-fluence the optical flow: the deeper depth, the inferior
    optical flow, which motivates us to design a depth-association motion adaptation
    module to bridge the clean-to-foggy domain gap. Moreover, we figure out that the
    cost volume correlation shares similar distribution of the synthetic and real
    foggy images, which enlightens us to devise a correlation-alignment motion adaptation
    module to distill motion knowledge of the synthetic foggy domain to the real foggy
    domain. Note that synthetic fog is designed as the intermediate domain. Under
    this unified framework, the proposed cumulative adaptation progressively transfers
    knowledge from clean scenes to real foggy scenes. Extensive experiments have been
    performed to verify the superiority of the proposed method.'
  related_code: ''
- author: Yuan Yuan 0001, Wei Su, Dandan Ma
  title: Efficient Dynamic Scene Deblurring Using Spatially Variant Deconvolution
    Network With Optical Flow Guided Training.
