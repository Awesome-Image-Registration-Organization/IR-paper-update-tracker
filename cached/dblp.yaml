- author: Tae Jun Jang, Hye Sun Yun, Chang Min Hyun, Jong-Eun Kim, Sang-Hwy Lee, Jin
    Keun Seo
  title: Fully automatic integration of dental CBCT images and full-arch intraoral
    impressions with stitching error correction via individual tooth segmentation
    and identification.
  venue: Medical Image Anal.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/mia/JangYHKLS24
  doi: 10.1016/J.MEDIA.2024.103096
  ee: https://doi.org/10.1016/j.media.2024.103096
  url: https://dblp.org/rec/journals/mia/JangYHKLS24
  abstract: We present a fully automated method of integrating intraoral scan (IOS)
    and dental cone-beam computerized tomography (CBCT) images into one image by complementing
    each image's weaknesses. Dental CBCT alone may not be able to delineate precise
    details of the tooth surface due to limited image resolution and various CBCT
    artifacts, including metal-induced artifacts. IOS is very accurate for the scanning
    of narrow areas, but it produces cumulative stitching errors during full-arch
    scanning. The proposed method is intended not only to compensate the low-quality
    of CBCT-derived tooth surfaces with IOS, but also to correct the cumulative stitching
    errors of IOS across the entire dental arch. Moreover, the integration provides
    both gingival structure of IOS and tooth roots of CBCT in one image. The proposed
    fully automated method consists of four parts; (i) individual tooth segmentation
    and identification module for IOS data (TSIM-IOS); (ii) individual tooth segmentation
    and identification module for CBCT data (TSIM-CBCT); (iii) global-to-local tooth
    registration between IOS and CBCT; and (iv) stitching error correction for full-arch
    IOS. The experimental results show that the proposed method achieved landmark
    and surface distance errors of 112.4μm and 301.7μm, respectively.
  related_code: ''
- author: Liang Li 0010, Evangelos B. Mazomenos, James Henry Chandler, Keith L. Obstein,
    Pietro Valdastri, Danail Stoyanov, Francisco Vasconcelos 0001
  title: Robust endoscopic image mosaicking via fusion of multimodal estimation.
  venue: Medical Image Anal.
  year: '2023'
  type: Journal Articles
  access: open
  key: journals/mia/LiMCOVSV23
  doi: 10.1016/J.MEDIA.2022.102709
  ee: https://doi.org/10.1016/j.media.2022.102709
  url: https://dblp.org/rec/journals/mia/LiMCOVSV23
  abstract: We propose an endoscopic image mosaicking algorithm that is robust to
    light conditioning changes, specular reflections, and feature-less scenes. These
    conditions are especially common in minimally invasive surgery where the light
    source moves with the camera to dynamically illuminate close range scenes. This
    makes it difficult for a single image registration method to robustly track camera
    motion and then generate consistent mosaics of the expanded surgical scene across
    different and heterogeneous environments. Instead of relying on one specialised
    feature extractor or image registration method, we propose to fuse different image
    registration algorithms according to their uncertainties, formulating the problem
    as affine pose graph optimisation. This allows to combine landmarks, dense intensity
    registration, and learning-based approaches in a single framework. To demonstrate
    our application we consider deep learning-based optical flow, hand-crafted features,
    and intensity-based registration, however, the framework is general and could
    take as input other sources of motion estimation, including other sensor modalities.
    We validate the performance of our approach on three datasets with very different
    characteristics to highlighting its generalisability, demonstrating the advantages
    of our proposed fusion framework. While each individual registration algorithm
    eventually fails drastically on certain surgical scenes, the fusion approach flexibly
    determines which algorithms to use and in which proportion to more robustly obtain
    consistent mosaics.
  related_code: ''
- author: Srijay Deshpande, Fayyaz A. Minhas, Simon Graham, Nasir M. Rajpoot
  title: 'SAFRON: Stitching Across the Frontier Network for Generating Colorectal
    Cancer Histology Images.'
  venue: Medical Image Anal.
  year: '2022'
  type: Journal Articles
  access: closed
  key: journals/mia/DeshpandeMGR22
  doi: 10.1016/J.MEDIA.2021.102337
  ee: https://doi.org/10.1016/j.media.2021.102337
  url: https://dblp.org/rec/journals/mia/DeshpandeMGR22
  abstract: Automated synthesis of histology images has several potential applications
    including the development of data-efficient deep learning algorithms. In the field
    of computational pathology, where histology images are large in size and visual
    context is crucial, synthesis of large high-resolution images via generative modeling
    is an important but challenging task due to memory and computational constraints.
    To address this challenge, we propose a novel framework called SAFRON (Stitching
    Across the FROntier Network) to construct realistic, large high-resolution tissue
    images conditioned on input tissue component masks. The main novelty in the framework
    is integration of stitching in its loss function which enables generation of images
    of arbitrarily large sizes after training on relatively small image patches while
    preserving morphological features with minimal boundary artifacts. We have used
    the proposed framework for generating, to the best of our knowledge, the largest-sized
    synthetic histology images to date (up to 11K×8K pixels). Compared to existing
    approaches, our framework is efficient in terms of the memory required for training
    and computations needed for synthesizing large high-resolution images. The quality
    of generated images was assessed quantitatively using Frechet Inception Distance
    as well as by 7 trained pathologists, who assigned a realism score to a set of
    images generated by SAFRON. The average realism score across all pathologists
    for synthetic images was as high as that of real images. We also show that training
    with additional synthetic data generated by SAFRON can significantly boost prediction
    performance of gland segmentation and cancer detection algorithms in colorectal
    cancer histology images.
  related_code: ''
- author: Lejing Wang, Jörg Traub, Simon Weidert, Sandro Michael Heining, Ekkehard
    Euler, Nassir Navab
  title: Parallax-free intra-operative X-ray image stitching.
  venue: Medical Image Anal.
  year: '2010'
  type: Journal Articles
  access: closed
  key: journals/mia/WangTWHEN10
  doi: 10.1016/J.MEDIA.2010.05.007
  ee: https://doi.org/10.1016/j.media.2010.05.007
  url: https://dblp.org/rec/journals/mia/WangTWHEN10
  abstract: We present a novel method to generate parallax-free panoramic X-ray images
    during surgery by enabling the mobile C-arm to rotate around its X-ray source
    center, relative to the patient's table. Rotating the mobile C-arm around its
    X-ray source center is impractical and sometimes impossible due to the mechanical
    design of mobile C-arm systems. In order to ensure that the C-arm motion is a
    relative pure rotation around its X-ray source center, we propose to move the
    table to compensate for the translational part of the motion based on C-arm pose
    estimation. For this we employ a visual marker pattern and a Camera Augmented
    Mobile C-arm system that is a standard mobile C-arm augmented by a video camera
    and mirror construction. We are able to produce a parallax-free panoramic X-ray
    image independent of the geometric configuration of imaged anatomical structures.
    Our method does not require a fronto-parallel setup or any overlap between the
    acquired X-ray images. This generated parallax-free panoramic X-ray image preserves
    the linear perspective projection property. It also presents a negligible difference
    (below 2 pixels) in the overlapping area between two consecutive individual X-ray
    images and has a high visual quality. This promises suitability for intra-operative
    clinical applications in orthopedic and trauma surgery. The experiments on phantoms
    and ex-vivo bone structure demonstrate both the functionality and accuracy of
    the method.
  related_code: ''
