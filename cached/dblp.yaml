  title: Bayesian characterization of uncertainty in intra-subject non-rigid registration.
  venue: Medical Image Anal.
  year: '2013'
  type: Journal Articles
  access: closed
  key: journals/mia/RisholmJNGW13
  doi: 10.1016/J.MEDIA.2013.03.002
  ee: https://doi.org/10.1016/j.media.2013.03.002
  url: https://dblp.org/rec/journals/mia/RisholmJNGW13
  abstract: In settings where high-level inferences are made based on registered image
    data, the registration uncertainty can contain important information. In this
    article, we propose a Bayesian non-rigid registration framework where conventional
    dissimilarity and regularization energies can be included in the likelihood and
    the prior distribution on deformations respectively through the use of Boltzmann's
    distribution. The posterior distribution is characterized using Markov Chain Monte
    Carlo (MCMC) methods with the effect of the Boltzmann temperature hyper-parameters
    marginalized under broad uninformative hyper-prior distributions. The MCMC chain
    permits estimation of the most likely deformation as well as the associated uncertainty.
    On synthetic examples, we demonstrate the ability of the method to identify the
    maximum a posteriori estimate and the associated posterior uncertainty, and demonstrate
    that the posterior distribution can be non-Gaussian. Additionally, results from
    registering clinical data acquired during neurosurgery for resection of brain
    tumor are provided; we compare the method to single transformation results from
    a deterministic optimizer and introduce methods that summarize the high-dimensional
    uncertainty. At the site of resection, the registration uncertainty increases
    and the marginal distribution on deformations is shown to be multi-modal.
