- author: Shintaro Shiba, Yannick Klose, Yoshimitsu Aoki, Guillermo Gallego 0002
  title: Secrets of Event-Based Optical Flow, Depth and Ego-Motion Estimation by Contrast
    Maximization.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2024'
  type: Journal Articles
  access: open
