- author: Jiawei Zhang, Jiahe Li 0007, Lei Huang 0015, Haonan Luo 0002, Xiaohan Yu
    0001, Lin Gu 0003, Jin Zheng, Xiao Bai 0001
  title: Investigating Synthetic-to-Real Transfer Robustness for Stereo Matching and
    Optical Flow Estimation.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/pami/ZhangLHLYGZB25
  doi: 10.1109/TPAMI.2025.3584847
  ee: https://doi.org/10.1109/TPAMI.2025.3584847
  url: https://dblp.org/rec/journals/pami/ZhangLHLYGZB25
  abstract: With advancements in robust stereo matching and optical flow estimation
    networks, models pre-trained on synthetic data demonstrate strong robustness to
    unseen domains. However, their robustness can be seriously degraded when fine-tuning
    them in real-world scenarios. This paper investigates fine-tuning stereo matching
    and optical flow estimation networks without compromising their robustness to
    unseen domains. Specifically, we divide the pixels into consistent and inconsistent
    regions by comparing Ground Truth (GT) with Pseudo Label (PL) and demonstrate
    that the imbalance learning of consistent and inconsistent regions in GT causes
    robustness degradation. Based on our analysis, we propose the DKT framework, which
    utilizes PL to balance the learning of different regions in GT. The core idea
    is to utilize an exponential moving average (EMA) teacher to measure what the
    student network has learned and dynamically adjust the learning regions. We further
    propose the DKT++ framework, which improves target-domain performances and network
    robustness by applying slow-fast update teachers to generate more accurate PL,
    introducing the unlabeled data and synthetic data. We integrate our frameworks
    with state-of-the-art networks and evaluate their effectiveness on several real-world
    datasets. Extensive experiments show that our method effectively preserves the
    robustness of stereo matching and optical flow networks during fine-tuning.
