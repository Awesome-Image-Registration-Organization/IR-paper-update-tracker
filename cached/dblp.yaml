- author: Evangelos Sariyanidi, Hatice Gunes, Andrea Cavallaro
  title: 'Automatic Analysis of Facial Affect: A Survey of Registration, Representation,
    and Recognition.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2015'
  type: Journal Articles
  access: closed
  key: journals/pami/SariyanidiGC15
  doi: 10.1109/TPAMI.2014.2366127
  ee: https://doi.org/10.1109/TPAMI.2014.2366127
  url: https://dblp.org/rec/journals/pami/SariyanidiGC15
  abstract: Automatic affect analysis has attracted great interest in various contexts
    including the recognition of action units and basic or non-basic emotions. In
    spite of major efforts, there are several open questions on what the important
    cues to interpret facial expressions are and how to encode them. In this paper,
    we review the progress across a range of affect recognition applications to shed
    light on these fundamental questions. We analyse the state-of-the-art solutions
    by decomposing their pipelines into fundamental components, namely face registration,
    representation, dimensionality reduction and recognition. We discuss the role
    of these components and highlight the models and new trends that are followed
    in their design. Moreover, we provide a comprehensive analysis of facial representations
    by uncovering their advantages and limitations; we elaborate on the type of information
    they encode and discuss how they deal with the key challenges of illumination
    variations, registration errors, head-pose variations, occlusions, and identity
    bias. This survey allows us to identify open issues and to define future directions
    for designing real-world affect recognition systems.
