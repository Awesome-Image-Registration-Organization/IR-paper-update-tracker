    Latifoltojar, Jesica Makanyanga, Manil Chouhan, Emma Helbren, Alex Menys, Stuart
    Taylor, David Atkinson
  title: Respiratory motion correction in dynamic MRI using robust data decomposition
    registration - Application to DCE-MRI.
  venue: Medical Image Anal.
  year: '2014'
  type: Journal Articles
  access: open
  key: journals/mia/HamyDPMLMCHMTA14
  doi: 10.1016/J.MEDIA.2013.10.016
  ee: https://doi.org/10.1016/j.media.2013.10.016
  url: https://dblp.org/rec/journals/mia/HamyDPMLMCHMTA14
  abstract: Motion correction in Dynamic Contrast Enhanced (DCE-) MRI is challenging
    because rapid intensity changes can compromise common (intensity based) registration
    algorithms. In this study we introduce a novel registration technique based on
    robust principal component analysis (RPCA) to decompose a given time-series into
    a low rank and a sparse component. This allows robust separation of motion components
    that can be registered, from intensity variations that are left unchanged. This
    Robust Data Decomposition Registration (RDDR) is demonstrated on both simulated
    and a wide range of clinical data. Robustness to different types of motion and
    breathing choices during acquisition is demonstrated for a variety of imaged organs
    including liver, small bowel and prostate. The analysis of clinically relevant
    regions of interest showed both a decrease of error (15-62% reduction following
    registration) in tissue time-intensity curves and improved areas under the curve
    (AUC60) at early enhancement.
