  url: https://dblp.org/rec/conf/miccai/HonkamaaM25
  abstract: The deformable registration of images of different modalities, essential
    in many medical imaging applications, remains challenging. The main challenge
    is developing a robust measure for image overlap despite the compared images capturing
    different aspects of the underlying tissue. Here, we explore similarity metrics
    based on functional dependence between intensity values of registered images.
    Although functional dependence is too restrictive on the global scale, earlier
    work has shown competitive performance in deformable registration when such measures
    are applied over small enough contexts. We confirm this finding and further develop
    the idea by modeling local functional dependence via the linear basis function
    model with the basis functions learned jointly with the deformation. The measure
    can be implemented via convolutions, making it efficient to compute on GPUs. We
    release the method as an easy-to-use tool and show good performance on three datasets
    compared to well-established baseline and earlier functional dependence-based
    methods.
