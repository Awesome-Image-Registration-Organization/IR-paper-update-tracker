  abstract: Similarity measure is an essential component in image registration. In
    this article, we propose a novel similarity measure for registration of two or
    more images. The proposed method is motivated by the fact that optimally registered
    images can be sparsified hierarchically in the gradient domain and frequency domain
    with the separation of sparse errors. One of the key advantages of the proposed
    similarity measure is its robustness in dealing with severe intensity distortions,
    which widely exist on medical images, remotely sensed images and natural photos
    due to differences of acquisition modalities or illumination conditions. Two efficient
    algorithms are proposed to solve the batch image registration and pair registration
    problems in a unified framework. We have validated our method on extensive and
    challenging data sets. The experimental results demonstrate the robustness, accuracy
    and efficiency of our method over nine traditional and state-of-the-art algorithms
    on synthetic images and a wide range of real-world applications.
