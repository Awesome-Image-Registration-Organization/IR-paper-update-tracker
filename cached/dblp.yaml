  url: https://dblp.org/rec/conf/iccv/QiaoXXJ25
  abstract: Stereo images are fundamental to numerous applications, including extended
    reality ($X R$) devices, autonomous driving, and robotics. Unfortunately, acquiring
    highquality stereo images remains challenging due to the precise calibration requirements
    of dual-camera setups and the complexity of obtaining accurate, dense disparity
    maps. Existing stereo image generation methods typically focus on either visual
    quality for viewing or geometric accuracy for matching, but not both. We introduce
    GenStereo, a diffusion-based approach, to bridge this gap. The method includes
    two primary innovations (1) conditioning the diffusion process on a disparity-aware
    coordinate embedding and a warped input image, allowing for more precise stereo
    alignment than previous methods, and (2) an adaptive fusion mechanism that intelligently
    combines the diffusiongenerated image with a warped image, improving both realism
    and disparity consistency. Through extensive training on 11 diverse stereo datasets,
    GenStereo demonstrates strong generalization ability. GenStereo achieves state-of-the-art
    performance in both stereo image generation and unsupervised stereo matching tasks.
    Project page is available at https://qjizhi.github.io/genstereo.
  related_code: ''
- author: Xianqi Wang 0001, Hao Yang, Gangwei Xu, Junda Cheng, Min Lin 0006, Yong
    Deng, Jinliang Zang, Yurui Chen, Xin Yang 0008
  title: 'ZeroStereo: Zero-Shot Stereo Matching from Single Images.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/WangYXCLDZCY25
  doi: 10.1109/ICCV51701.2025.02616
  ee: https://doi.org/10.1109/ICCV51701.2025.02616
  url: https://dblp.org/rec/conf/iccv/WangYXCLDZCY25
  abstract: 'State-of-the-art supervised stereo matching methods have achieved remarkable
    performance on various benchmarks. However, their generalization to real-world
    scenarios remains challenging due to the scarcity of annotated real-world stereo
    data. In this paper, we propose ZeroStereo, a novel stereo image generation pipeline
    for zero-shot stereo matching. Our approach synthesizes high-quality right images
    from arbitrary single images by leveraging pseudo disparities generated by a monocular
    depth estimation model. Unlike previous methods that address occluded regions
    by filling missing areas with neighboring pixels or random backgrounds, we fine-tune
    a diffusion inpainting model to recover missing details while preserving semantic
    structure. Additionally, we propose Training-Free Confidence Generation, which
    mitigates the impact of unreliable pseudo labels without additional training,
    and Adaptive Disparity Selection, which ensures a diverse and realistic disparity
    distribution while preventing excessive occlusion and foreground distortion. Experiments
    demonstrate that models trained with our pipeline achieve state-of-theart zero-shot
    generalization across multiple datasets, with only a dataset volume comparable
    to Scene Flow. Code: https://github.com/Windsrain/ZeroStereo.'
