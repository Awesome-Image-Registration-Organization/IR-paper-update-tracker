stitch%7Cpanorama%7Cmosaic%20venue%3AIJCAI%3A:
- author: Martin Herman, Takeo Kanade, Shigeru Kuroe
  title: The 3D MOSAIC Scene Understanding System.
  venue: IJCAI
  year: '1983'
  type: Conference and Workshop Papers
  access: unavailable
  key: conf/ijcai/HermanKK83
  doi: 10.1016/b978-0-08-051581-6.50048-9
  ee: ''
  url: https://dblp.org/rec/conf/ijcai/HermanKK83
  abstract: Abstract The 3D Mosaic system is a vision system that incrementally reconstructs
    complex 3D scenes from multiple images. The system encompasses several levels
    of the vision process, starting with images and ending with symbolic scene descriptions.
    This paper describes the various components of the system, including stereo analysis,
    monocular analysis, and constructing and modifying the scene model In addition,
    the representation of the scene model is described. This model is intended for
    tasks such as matching, display generation, planning paths through the scene,
    and making other decisions about the scene environment. Examples showing how the
    system is used to interpret complex aerial photographs of urban scenes are presented.
    Each view of the scene, which may be either a single image or a stereo pair, undergoes
    analysis which results in a 3D wire-frame description that represents portions
    of edges and vertices of objects. The model is a surface-based description constructed
    from the wire frames. With each successive view, the model is incrementally updated
    and gradually becomes more accurate and complete. Task-specific knowledge, involving
    block-shaped objects in an urban scene, is used to extract the wire frames and
    construct and update the model.
  related_code: ''
stitch%7Cpanorama%7Cmosaic%20venue%3AAAAI%3A:
- author: Wenxiao Cai, Wankou Yang
  title: Object-level Geometric Structure Preserving for Natural Image Stitching.
  venue: AAAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/CaiY25
  doi: 10.1609/AAAI.V39I2.32188
  ee: https://doi.org/10.1609/aaai.v39i2.32188
  url: https://dblp.org/rec/conf/aaai/CaiY25
  abstract: 'The topic of stitching images with globally natural structures holds
    paramount significance, with two main goals: pixel-level alignment and distortion
    prevention. The existing approaches exhibit the ability to align well, yet fall
    short in maintaining object structures. In this paper, we endeavour to safeguard
    the overall OBJect-level structures within images based on Global Similarity Prior
    (OBJ-GSP), on the basis of good alignment performance. Our approach leverages
    semantic segmentation models like the family of Segment Anything Model to extract
    the contours of any objects in a scene. Triangular meshes are employed in image
    transformation to protect the overall shapes of objects within images. The balance
    between alignment and distortion prevention is achieved by allowing the object
    meshes to strike a balance between similarity and projective transformation. We
    also demonstrate that object-level semantic information is necessary in low-altitude
    aerial image stitching. Additionally, we propose StitchBench, the largest image
    stitching benchmark with most diverse scenarios. Extensive experimental results
    demonstrate that OBJ-GSP outperforms existing methods in both pixel alignment
    and shape preservation.'
  related_code: ''
- author: Haitao Tian, Pierre Payeur
  title: 'Stitch, Contrast, and Segment: Learning a Human Action Segmentation Model
    Using Trimmed Skeleton Videos.'
  venue: AAAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/TianP25
  doi: 10.1609/AAAI.V39I7.32792
  ee: https://doi.org/10.1609/aaai.v39i7.32792
  url: https://dblp.org/rec/conf/aaai/TianP25
  abstract: 'Existing skeleton-based human action classification models rely on well-trimmed
    action-specific skeleton videos for both training and testing, precluding their
    scalability to real-world applications where untrimmed videos exhibiting concatenated
    actions are predominant. To overcome this limitation, recently introduced skeleton
    action segmentation models involve un-trimmed skeleton videos into end-to-end
    training. The model is optimized to provide frame-wise predictions for any length
    of testing videos, simultaneously realizing action localization and classification.
    Yet, achieving such an improvement im-poses frame-wise annotated skeleton videos,
    which remains time-consuming in practice. This paper features a novel framework
    for skeleton-based action segmentation trained on short trimmed skeleton videos,
    but that can run on longer un-trimmed videos. The approach is implemented in three
    steps: Stitch, Contrast, and Segment. First, Stitch proposes a tem-poral skeleton
    stitching scheme that treats trimmed skeleton videos as elementary human motions
    that compose a semantic space and can be sampled to generate multi-action stitched
    se-quences. Contrast learns contrastive representations from stitched sequences
    with a novel discrimination pretext task that enables a skeleton encoder to learn
    meaningful action-temporal contexts to improve action segmentation. Finally, Segment
    relates the proposed method to action segmentation by learning a segmentation
    layer while handling particular da-ta availability. Experiments involve a trimmed
    source dataset and an untrimmed target dataset in an adaptation formulation for
    real-world skeleton-based human action segmentation to evaluate the effectiveness
    of the proposed method.'
  related_code: ''
- author: Zhiying Jiang, Xingyuan Li 0005, Jinyuan Liu 0001, Xin Fan 0001, Risheng
    Liu
  title: 'Towards Robust Image Stitching: An Adaptive Resistance Learning against
    Compatible Attacks.'
  venue: AAAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/Jiang000L24
  doi: 10.1609/AAAI.V38I3.28036
  ee: https://doi.org/10.1609/aaai.v38i3.28036
  url: https://dblp.org/rec/conf/aaai/Jiang000L24
  abstract: 'Image stitching seamlessly integrates images captured from varying perspectives
    into a single wide field-of-view image. Such integration not only broadens the
    captured scene but also augments holistic perception in computer vision applications.
    Given a pair of captured images, subtle perturbations and distortions which go
    unnoticed by the human visual system tend to attack the correspondence matching,
    impairing the performance of image stitching algorithms. In light of this challenge,
    this paper presents the first attempt to improve the robustness of image stitching
    against adversarial attacks. Specifically, we introduce a stitching-oriented attack
    (SoA), tailored to amplify the alignment loss within overlapping regions, thereby
    targeting the feature matching procedure. To establish an attack resistant model,
    we delve into the robustness of stitching architecture and develop an adaptive
    adversarial training (AAT) to balance attack resistance with stitching precision.
    In this way, we relieve the gap between the routine adversarial training and benign
    models, ensuring resilience without quality compromise. Comprehensive evaluation
    across real-world and synthetic datasets validate the deterioration of SoA on
    stitching performance. Furthermore, AAT emerges as a more robust solution against
    adversarial perturbations, delivering superior stitching results. Code is available
    at: https://github.com/Jzy2017/TRIS.'
  related_code: https://github.com/Jzy2017/TRIS
- author: Fan Ma, Xiaojie Jin, Heng Wang, Jingjia Huang, Linchao Zhu, Yi Yang 0001
  title: Stitching Segments and Sentences towards Generalization in Video-Text Pre-training.
  venue: AAAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/MaJWHZ024
  doi: 10.1609/AAAI.V38I5.28202
  ee: https://doi.org/10.1609/aaai.v38i5.28202
  url: https://dblp.org/rec/conf/aaai/MaJWHZ024
  abstract: Video-language pre-training models have recently achieved remarkable results
    on various multi-modal downstream tasks. However, most of these models rely on
    contrastive learning or masking modeling to align global features across modalities,
    neglecting the local associations between video frames and text tokens. This limits
    the model’s ability to perform fine-grained matching and generalization, especially
    for tasks that selecting segments in long videos based on query texts. To address
    this issue, we propose a novel stitching and matching pre-text task for video-language
    pre-training that encourages fine-grained interactions between modalities. Our
    task involves stitching video frames or sentences into longer sequences and predicting
    the positions of cross-model queries in the stitched sequences. The individual
    frame and sentence representations are thus aligned via the stitching and matching
    strategy, encouraging the fine-grained interactions between videos and texts.
    in the stitched sequences for the cross-modal query. We conduct extensive experiments
    on various benchmarks covering text-to-video retrieval, video question answering,
    video captioning, and moment retrieval. Our results demonstrate that the proposed
    method significantly improves the generalization capacity of the video-text pre-training
    models.
  related_code: ''
- author: Size Wu, Wenwei Zhang, Lumin Xu, Sheng Jin 0007, Wentao Liu 0002, Chen Change
    Loy
  title: 'CLIM: Contrastive Language-Image Mosaic for Region Representation.'
  venue: AAAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/WuZX00L24
  doi: 10.1609/AAAI.V38I6.28428
  ee: https://doi.org/10.1609/aaai.v38i6.28428
  url: https://dblp.org/rec/conf/aaai/WuZX00L24
  abstract: Detecting objects accurately from a large or open vocabulary necessitates
    the vision-language alignment on region representations. However, learning such
    a region-text alignment by obtaining high-quality box annotations with text labels
    or descriptions is expensive and infeasible. In contrast, collecting image-text
    pairs is simpler but lacks precise object location information to associate regions
    with texts. In this paper, we propose a novel approach called Contrastive Language-Image
    Mosaic (CLIM), which leverages large-scale image-text pairs effectively for aligning
    region and text representations. CLIM combines multiple images into a mosaicked
    image and treats each image as a ‘pseudo region’. The feature of each pseudo region
    is extracted and trained to be similar to the corresponding text embedding while
    dissimilar from others by a contrastive loss, enabling the model to learn the
    region-text alignment without costly box annotations. As a generally applicable
    approach, CLIM consistently improves different open-vocabulary object detection
    methods that use caption supervision. Furthermore, CLIM can effectively enhance
    the region representation of vision-language models, thus providing stronger backbones
    for open-vocabulary object detectors. Our experimental results demonstrate that
    CLIM improves different baseline open-vocabulary object detectors by a large margin
    on both OV-COCO and OV-LVIS benchmarks. The code is available at https://github.com/wusize/CLIM.
  related_code: https://github.com/wusize/CLIM
- author: Hyeokjun Kweon, Hyeonseong Kim, Yoonsu Kang, Youngho Yoon, Wooseong Jeong,
    Kuk-Jin Yoon
  title: Pixel-Wise Warping for Deep Image Stitching.
  venue: AAAI
  year: '2023'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/KweonKKYJY23
  doi: 10.1609/AAAI.V37I1.25202
  ee: https://doi.org/10.1609/aaai.v37i1.25202
  url: https://dblp.org/rec/conf/aaai/KweonKKYJY23
  abstract: 'Existing image stitching approaches based on global or local homography
    estimation are not free from the parallax problem and suffer from undesired artifacts.
    In this paper, instead of relying on the homography-based warp, we propose a novel
    deep image stitching framework exploiting the pixel-wise warp field to handle
    the large-parallax problem. The proposed deep image stitching framework consists
    of a Pixel-wise Warping Module (PWM) and a Stitched Image Generating Module (SIGMo).
    For PWM, we obtain pixel-wise warp in a similar manner as estimating an optical
    flow (OF). In the stitching scenario, the input images usually include non-overlap
    (NOV) regions of which warp cannot be directly estimated, unlike the overlap (OV)
    regions. To help the PWM predict a reasonable warp on the NOV region, we impose
    two geometrical constraints: an epipolar loss and a line-preservation loss. With
    the obtained warp field, we relocate the pixels of the target image using forward
    warping. Finally, the SIGMo is trained by the proposed multi-branch training framework
    to generate a stitched image from a reference image and a warped target image.
    For training and evaluating the proposed framework, we build and publish a novel
    dataset including image pairs with corresponding pixel-wise ground truth warp
    and stitched result images. We show that the results of the proposed framework
    are quantitatively and qualitatively superior to those of the conventional methods.'
  related_code: ''
