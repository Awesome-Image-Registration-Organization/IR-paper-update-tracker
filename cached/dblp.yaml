- author: Junha Lee, Chunghyun Park, Jaesung Choe, Yu-Chiang Frank Wang, Jan Kautz,
    Minsu Cho, Christopher B. Choy
  title: 'Mosaic3D: Foundation Dataset and Model for Open-Vocabulary 3D Segmentation.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/LeePCWKCC25
  doi: 10.1109/CVPR52734.2025.01315
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Lee_Mosaic3D_Foundation_Dataset_and_Model_for_Open-Vocabulary_3D_Segmentation_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/LeePCWKCC25
  abstract: 'We tackle open-vocabulary 3D scene segmentation tasks by introducing
    a novel data generation pipeline and training framework. Our work targets three
    essential aspects required for an effective dataset: precise 3D region segmentation,
    comprehensive textual descriptions, and sufficient dataset scale. By leveraging
    state-of-the-art open-vocabulary image segmentation models and region-aware vision-language
    models (VLM), we develop an automatic pipeline capable of producing high-quality
    3D mask-text pairs. Applying this pipeline to multiple 3D scene datasets, we create
    Mosaic3D-5.6M, a dataset of more than 30K annotated scenes with 5.6M mask-text
    pairs - significantly larger than existing datasets. Building on these data, we
    propose Mosaic3D, a 3D visiual foundation model (3D-VFM) combining a 3D encoder
    trained with contrastive learning and a lightweight mask decoder for open-vocabulary
    3D semantic and instance segmentation. Our approach achieves state-of-the-art
    results on open-vocabulary 3D semantic and instance segmentation benchmarks including
    ScanNet200, Matterport3D, and ScanNet++, with ablation studies validating the
    effectiveness of our large-scale training data. https://nvlabs.github.io/Mosaic3D/'
