  abstract: 'HighlightsGroup‐wise similarity point set registration using Students
    t‐mixture model.Automatic robustness to outliers.Automatic construction of statistical
    shape models.Improved registration accuracy and SSM quality compared to Gaussian
    mixture models. Graphical abstract Figure. No Caption available. Abstract A probabilistic
    group‐wise similarity registration technique based on Student’s t‐mixture model
    (TMM) and a multi‐resolution extension of the same (mr‐TMM) are proposed in this
    study, to robustly align shapes and establish valid correspondences, for the purpose
    of training statistical shape models (SSMs). Shape analysis across large cohorts
    requires automatic generation of the requisite training sets. Automated segmentation
    and landmarking of medical images often result in shapes with varying proportions
    of outliers and consequently require a robust method of alignment and correspondence
    estimation. Both TMM and mrTMM are validated by comparison with state‐of‐the‐art
    registration algorithms based on Gaussian mixture models (GMMs), using both synthetic
    and clinical data. Four clinical data sets are used for validation: (a) 2D femoral
    heads (Symbol 1000 samples generated from DXA images of healthy subjects); (b)
    control‐hippocampi (Symbol 50 samples generated from T1‐weighted magnetic resonance
    (MR) images of healthy subjects); (c) MCI‐hippocampi (Symbol 28 samples generated
    from MR images of patients diagnosed with mild cognitive impairment); and (d)
    heart shapes comprising left and right ventricular endocardium and epicardium
    (Symbol 30 samples generated from short‐axis MR images of: 10 healthy subjects,
    10 patients diagnosed with pulmonary hypertension and 10 diagnosed with hypertrophic
    cardiomyopathy). The proposed methods significantly outperformed the state‐of‐the‐art
    in terms of registration accuracy in the experiments involving synthetic data,
    with mrTMM offering significant improvement over TMM. With the clinical data,
    both methods performed comparably to the state‐of‐the‐art for the hippocampi and
    heart data sets, which contained few outliers. They outperformed the state‐of‐the‐art
    for the femur data set, containing large proportions of outliers, in terms of
    alignment accuracy, and the quality of SSMs trained, quantified in terms of generalization,
    compactness and specificity. Symbol. No caption available.'
