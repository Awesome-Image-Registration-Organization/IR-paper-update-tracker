  ee: https://doi.org/10.1109/CVPR52729.2023.00549
  url: https://dblp.org/rec/conf/cvpr/0002MDWL23
  abstract: Rolling shutter correction (RSC) is becoming increasingly popular for
    RS cameras that are widely used in commercial and industrial applications. Despite
    the promising performance, existing RSC methods typically employ a two-stage network
    structure that ignores intrinsic infor-mation interactions and hinders fast inference.
    In this pa-per, we propose a single-stage encoder-decoder-based network, named
    JAMNet, for efficient RSC. It first extracts pyramid features from consecutive
    RS inputs, and then simultaneously refines the two complementary information (i.e.,
    global shutter appearance and undistortion motion field) to achieve mutual promotion
    in a joint learning de-coder. To inject sufficient motion cues for guiding joint
    learning, we introduce a transformer-based motion embed-ding module and propose
    to pass hidden states across pyra-mid levels. Moreover, we present a new data
    augmentation strategy “vertical flip + inverse order” to release the potential
    of the RSC datasets. Experiments on various benchmarks show that our approach
    surpasses the state-of-the-art methods by a large margin, especially with a 4.7
    dB PSNR leap on real-world RSC. Code is available at https://github.com/GitCVfb/JAMNet.
  related_code: https://github.com/GitCVfb/JAMNet
- author: Bingbing Zhuang, Quoc-Huy Tran, Pan Ji, Loong-Fah Cheong, Manmohan Chandraker
  title: Learning Structure-And-Motion-Aware Rolling Shutter Correction.
  venue: CVPR
  year: '2019'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/ZhuangTJCC19
  doi: 10.1109/CVPR.2019.00468
  ee: http://openaccess.thecvf.com/content_CVPR_2019/html/Zhuang_Learning_Structure-And-Motion-Aware_Rolling_Shutter_Correction_CVPR_2019_paper.html
  url: https://dblp.org/rec/conf/cvpr/ZhuangTJCC19
  abstract: An exact method of correcting the rolling shutter (RS) effect requires
    recovering the underlying geometry, i.e. the scene structures and the camera motions
    between scanlines or between views. However, the multiple-view geometry for RS
    cameras is much more complicated than its global shutter (GS) counterpart, with
    various degeneracies. In this paper, we first make a theoretical contribution
    by showing that RS two-view geometry is degenerate in the case of pure translational
    camera motion. In view of the complex RS geometry, we then propose a Convolutional
    Neural Network (CNN)-based method which learns the underlying geometry (camera
    motion and scene structure) from just a single RS image and perform RS image correction.
    We call our method structure-and-motion-aware RS correction because it reasons
    about the concealed motions between the scanlines as well as the scene structure.
    Our method learns from a large-scale dataset synthesized in a geometrically meaningful
    way where the RS effect is generated in a manner consistent with the camera motion
    and scene structure. In extensive experiments, our method achieves superior performance
    compared to other state-of-the-art methods for single image RS correction and
    subsequent Structure from Motion (SfM) applications.
