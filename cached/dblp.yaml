- author: Tobias Plötz, Stefan Roth 0001
  title: Automatic Registration of Images to Untextured Geometry Using Average Shading
    Gradients.
  venue: Int. J. Comput. Vis.
  year: '2017'
  type: Journal Articles
  access: open
  key: journals/ijcv/PlotzR17
  doi: 10.1007/S11263-017-1022-X
  ee: https://doi.org/10.1007/s11263-017-1022-x
  url: https://dblp.org/rec/journals/ijcv/PlotzR17
  abstract: Many existing approaches for image-to-geometry registration assume that
    either a textured 3D model or a good initial guess of the 3D pose is available
    to bootstrap the registration process. In this paper we consider the registration
    of photographs to 3D models even when no texture information is available. This
    is very challenging as we cannot rely on texture gradients, and even shading gradients
    are hard to estimate since the lighting conditions are unknown. To that end, we
    propose average shading gradients, a rendering technique that estimates the average
    gradient magnitude over all lighting directions under Lambertian shading. We use
    this gradient representation as the building block of a registration pipeline
    based on matching sparse features. To cope with inevitable false matches due to
    the missing texture information and to increase robustness, the pose of the 3D
    model is estimated in two stages. Coarse pose hypotheses are first obtained from
    a single correct match each, subsequently refined using SIFT flow, and finally
    verified. We apply our algorithm to registering images of real-world objects to
    untextured 3D meshes of limited accuracy. Moreover, we show that registration
    can be performed even for paintings despite lacking photo-realism.
