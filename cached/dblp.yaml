- author: Marc Niethammer, Roland Kwitt, François-Xavier Vialard
  title: Metric Learning for Image Registration.
  venue: CVPR
  year: '2019'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/NiethammerKV19
  doi: 10.1109/CVPR.2019.00866
  ee: http://openaccess.thecvf.com/content_CVPR_2019/html/Niethammer_Metric_Learning_for_Image_Registration_CVPR_2019_paper.html
  url: https://dblp.org/rec/conf/cvpr/NiethammerKV19
  abstract: Image registration is a key technique in medical image analysis to estimate
    deformations between image pairs. A good deformation model is important for high-quality
    estimates. However, most existing approaches use ad-hoc deformation models chosen
    for mathematical convenience rather than to capture observed data variation. Recent
    deep learning approaches learn deformation models directly from data. However,
    they provide limited control over the spatial regularity of transformations. Instead
    of learning the entire registration approach, we learn a spatially-adaptive regularizer
    within a registration model. This allows controlling the desired level of regularity
    and preserving structural properties of a registration model. For example, diffeomorphic
    transformations can be attained. Our approach is a radical departure from existing
    deep learning approaches to image registration by embedding a deep learning model
    in an optimization-based registration algorithm to parameterize and data-adapt
    the registration model itself.
  related_code: ''
- author: Zhengyang Shen, Xu Han 0009, Zhenlin Xu, Marc Niethammer
  title: Networks for Joint Affine and Non-Parametric Image Registration.
  venue: CVPR
  year: '2019'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/ShenHXN19
  doi: 10.1109/CVPR.2019.00435
  ee: http://openaccess.thecvf.com/content_CVPR_2019/html/Shen_Networks_for_Joint_Affine_and_Non-Parametric_Image_Registration_CVPR_2019_paper.html
  url: https://dblp.org/rec/conf/cvpr/ShenHXN19
  abstract: 'We introduce an end-to-end deep-learning framework for 3D medical image
    registration. In contrast to existing approaches, our framework combines two registration
    methods: an affine registration and a vector momentum-parameterized stationary
    velocity field (vSVF) model. Specifically, it consists of three stages. In the
    first stage, a multi-step affine network predicts affine transform parameters.
    In the second stage, we use a U-Net-like network to generate a momentum, from
    which a velocity field can be computed via smoothing. Finally, in the third stage,
    we employ a self-iterable map-based vSVF component to provide a non-parametric
    refinement based on the current estimate of the transformation map. Once the model
    is trained, a registration is completed in one forward pass. To evaluate the performance,
    we conducted longitudinal and cross-subject experiments on 3D magnetic resonance
    images (MRI) of the knee of the Osteoarthritis Initiative (OAI) dataset. Results
    show that our framework achieves comparable performance to state-of-the-art medical
    image registration approaches, but it is much faster, with a better control of
    transformation regularity including the ability to produce approximately symmetric
    transformations, and combining affine as well as non-parametric registration.'
