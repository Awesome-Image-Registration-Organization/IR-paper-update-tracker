- author: Ziwei Luo 0002, Jing Hu 0009, Xin Wang 0045, Shu Hu 0001, Bin Kong 0001,
    Youbing Yin, Qi Song 0001, Xi Wu 0004, Siwei Lyu
  title: Stochastic Planner-Actor-Critic for Unsupervised Deformable Image Registration.
  venue: AAAI
  year: '2022'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/LuoH0HKYS0L22
  doi: 10.1609/AAAI.V36I2.20086
  ee: https://doi.org/10.1609/aaai.v36i2.20086
  url: https://dblp.org/rec/conf/aaai/LuoH0HKYS0L22
  abstract: Large deformations of organs, caused by diverse shapes and nonlinear shape
    changes, pose a significant challenge for medical image registration. Traditional
    registration methods need to iteratively optimize an objective function via a
    specific deformation model along with meticulous parameter tuning, but which have
    limited capabilities in registering images with large deformations. While deep
    learning-based methods can learn the complex mapping from input images to their
    respective deformation field, it is regression-based and is prone to be stuck
    at local minima, particularly when large deformations are involved. To this end,
    we present Stochastic Planner-Actor-Critic (spac), a novel reinforcement learning-based
    framework that performs step-wise registration. The key notion is warping a moving
    image successively by each time step to finally align to a fixed image. Considering
    that it is challenging to handle high dimensional continuous action and state
    spaces in the conventional reinforcement learning (RL) framework, we introduce
    a new concept `Plan' to the standard Actor-Critic model, which is of low dimension
    and can facilitate the actor to generate a tractable high dimensional action.
    The entire framework is based on unsupervised training and operates in an end-to-end
    manner. We evaluate our method on several 2D and 3D medical image datasets, some
    of which contain large deformations. Our empirical results highlight that our
    work achieves consistent, significant gains and outperforms state-of-the-art methods.
  related_code: ''
- author: Yaqi Shen, Le Hui, Haobo Jiang, Jin Xie 0001, Jian Yang 0003
  title: Reliable Inlier Evaluation for Unsupervised Point Cloud Registration.
  venue: AAAI
  year: '2022'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ShenHJX022
  doi: 10.1609/AAAI.V36I2.20117
  ee: https://doi.org/10.1609/aaai.v36i2.20117
  url: https://dblp.org/rec/conf/aaai/ShenHJX022
  abstract: Unsupervised point cloud registration algorithm usually suffers from the
    unsatisfied registration precision in the partially overlapping problem due to
    the lack of effective inlier evaluation. In this paper, we propose a neighborhood
    consensus based reliable inlier evaluation method for robust unsupervised point
    cloud registration. It is expected to capture the discriminative geometric difference
    between the source neighborhood and the corresponding pseudo target neighborhood
    for effective inlier distinction. Specifically, our model consists of a matching
    map refinement module and an inlier evaluation module. In our matching map refinement
    module, we improve the point-wise matching map estimation by integrating the matching
    scores of neighbors into it. The aggregated neighborhood information potentially
    facilitates the discriminative map construction so that high-quality correspondences
    can be provided for generating the pseudo target point cloud. Based on the observation
    that the outlier has the significant structure-wise difference between its source
    neighborhood and corresponding pseudo target neighborhood while this difference
    for inlier is small, the inlier evaluation module exploits this difference to
    score the inlier confidence for each estimated correspondence. In particular,
    we construct an effective graph representation for capturing this geometric difference
    between the neighborhoods. Finally, with the learned correspondences and the corresponding
    inlier confidence, we use the weighted SVD algorithm for transformation estimation.Under
    the unsupervised setting, we exploit the Huber function based global alignment
    loss, the local neighborhood consensus loss and spatial consistency loss for model
    optimization. The experimental results on extensive datasets demonstrate that
    our unsupervised point cloud registration method can yield comparable performance.
  related_code: ''
- author: Hao Xu 0018, Nianjin Ye, Guanghui Liu 0001, Bing Zeng 0001, Shuaicheng Liu
  title: 'FINet: Dual Branches Feature Interaction for Partial-to-Partial Point Cloud
    Registration.'
  venue: AAAI
  year: '2022'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/XuYLZL22
  doi: 10.1609/AAAI.V36I3.20189
  ee: https://doi.org/10.1609/aaai.v36i3.20189
  url: https://dblp.org/rec/conf/aaai/XuYLZL22
  abstract: Data association is important in the point cloud registration. In this
    work, we propose to solve the partial-to-partial registration from a new perspective,
    by introducing multi-level feature interactions between the source and the reference
    clouds at the feature extraction stage, such that the registration can be realized
    without the attentions or explicit mask estimation for the overlapping detection
    as adopted previously. Specifically, we present FINet, a feature interactionbased
    structure with the capability to enable and strengthen the information associating
    between the inputs at multiple stages. To achieve this, we first split the features
    into two components, one for rotation and one for translation, based on the fact
    that they belong to different solution spaces, yielding a dual branches structure.
    Second, we insert several interaction modules at the feature extractor for the
    data association. Third, we propose a transformation sensitivity loss to obtain
    rotation-attentive and translation-attentive features. Experiments demonstrate
    that our method performs higher precision and robustness compared to the state-of-the-art
    traditional and learning-based methods. Code is available at https://github.com/megvii-research/FINet.
