  key: journals/pami/HuangWZHCW25
  doi: 10.1109/TPAMI.2024.3432552
  ee: https://doi.org/10.1109/TPAMI.2024.3432552
  url: https://dblp.org/rec/journals/pami/HuangWZHCW25
  abstract: Recently, the accuracy of image-text matching has been greatly improved
    by multimodal pretrained models, all of which use millions or billions of paired
    images and texts for supervised model learning. Different from them, human brains
    can well match images with texts using their stored multimodal knowledge. Inspired
    by that, this paper studies a new scenario as unpaired image-text matching, in
    which paired images and texts are assumed to be unavailable during model learning.
    To deal with it, we accordingly propose a simple yet effective method namely Multimodal
    Aligned Conceptual Knowledge (MACK). First, we collect a set of words and their
    related image regions from publicly available datasets, and compute prototypical
    region representations to obtain pretrained general knowledge. To make the obtained
    knowledge better suit for certain datasets, we refine it using unpaired images
    and texts in a self-supervised learning manner to obtain fine-tuned domain knowledge.
    Then, to match given images with texts based on the knowledge, we represent parsed
    words in the texts by prototypical region representations, and compute region-word
    similarity scores. At last, the scores are aggregated based on bidirectional similarity
    pooling into an image-text similarity score, which can be directly used for unpaired
    image-text matching. The proposed MACK is complementary with existing models,
    which can be easily extended as a re-ranking method to substantially improve their
    performance of zero-shot and cross-dataset image-text matching.
  related_code: ''
- author: Haokun Wen, Xuemeng Song, Jianhua Yin 0001, Jianlong Wu, Weili Guan, Liqiang
    Nie
  title: Self-Training Boosted Multi-Factor Matching Network for Composed Image Retrieval.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/pami/WenSYWGN24
  doi: 10.1109/TPAMI.2023.3346434
  ee: https://doi.org/10.1109/TPAMI.2023.3346434
  url: https://dblp.org/rec/journals/pami/WenSYWGN24
  abstract: 'The composed image retrieval (CIR) task aims to retrieve the desired
    target image for a given multimodal query, i.e., a reference image with its corresponding
    modification text. The key limitations encountered by existing efforts are two
    aspects: 1) ignoring the multiple query-target matching factors; 2) ignoring the
    potential unlabeled reference-target image pairs in existing benchmark datasets.
    To address these two limitations is non-trivial due to the following challenges:
    1) how to effectively model the multiple matching factors in a latent way without
    direct supervision signals; 2) how to fully utilize the potential unlabeled reference-target
    image pairs to improve the generalization ability of the CIR model. To address
    these challenges, in this work, we first propose a CLIP-Transformer based muLtI-factor
    Matching Network (LIMN), which consists of three key modules: disentanglement-based
    latent factor tokens mining, dual aggregation-based matching token learning, and
    dual query-target matching modeling. Thereafter, we design an iterative dual self-training
    paradigm to further enhance the performance of LIMN by fully utilizing the potential
    unlabeled reference-target image pairs in a weakly-supervised manner. Specifically,
    we denote the iterative dual self-training paradigm enhanced LIMN as LIMN+. Extensive
    experiments on four datasets, including FashionIQ, Shoes, CIRR, and Fashion200
    K, show that our proposed LIMN and LIMN+ significantly surpass the state-of-the-art
    baselines.'
