  abstract: Establishing effective correspondences between a pair of images is difficult
    due to real-world challenges such as illumination, viewpoint and scale variations.
    Modern detector-based methods typically learn fixed detectors from a given dataset,
    which is hard to extract repeatable and reliable keypoints for various images
    with extreme appearance changes and weakly textured scenes. To deal with this
    problem, we propose a novel Dynamic Keypoint Detection Network (DKDNet) for robust
    image matching via a dynamic keypoint feature learning module and a guided heatmap
    activator. The proposed DKDNet enjoys several merits. First, the proposed dynamic
    keypoint feature learning module can generate adaptive keypoint features via the
    attention mechanism, which is flexibly updated with the current input image and
    can capture keypoints with different patterns. Second, the guided heatmap activator
    can effectively fuse multi-group keypoint heatmaps by fully considering the importance
    of different feature channels, which can realize more robust keypoint detection.
