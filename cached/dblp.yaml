  title: On the Applicability of Registration Uncertainty.
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/LuoSPCZPTGSWF19
  doi: 10.1007/978-3-030-32245-8_46
