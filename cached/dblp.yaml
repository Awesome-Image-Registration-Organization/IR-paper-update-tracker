  abstract: ''
- author: Zhe Xu 0012, Jie Luo 0003, Donghuan Lu, Jiangpeng Yan, Sarah F. Frisken,
    Jayender Jagadeesan, William M. Wells III, Xiu Li 0001, Yefeng Zheng 0001, Raymond
    Kai-Yu Tong
  title: Double-Uncertainty Guided Spatial and Temporal Consistency Regularization
    Weighting for Learning-Based Abdominal Registration.
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/XuLLYFJWLZT22
  doi: 10.1007/978-3-031-16446-0_2
  ee: https://doi.org/10.1007/978-3-031-16446-0_2
  url: https://dblp.org/rec/conf/miccai/XuLLYFJWLZT22
  abstract: 'In order to tackle the difficulty associated with the ill-posed nature
    of the image registration problem, regularization is often used to constrain the
    solution space. For most learning-based registration approaches, the regularization
    usually has a fixed weight and only constrains the spatial transformation. Such
    convention has two limitations: (i) Besides the laborious grid search for the
    optimal fixed weight, the regularization strength of a specific image pair should
    be associated with the content of the images, thus the "one value fits all" training
    scheme is not ideal; (ii) Only spatially regularizing the transformation may neglect
    some informative clues related to the ill-posedness. In this study, we propose
    a mean-teacher based registration framework, which incorporates an additional
    temporal consistency regularization term by encouraging the teacher model''s prediction
    to be consistent with that of the student model. More importantly, instead of
    searching for a fixed weight, the teacher enables automatically adjusting the
    weights of the spatial regularization and the temporal consistency regularization
    by taking advantage of the transformation uncertainty and appearance uncertainty.
    Extensive experiments on the challenging abdominal CT-MRI registration show that
    our training strategy can promisingly advance the original learning-based method
    in terms of efficient hyperparameter tuning and a better tradeoff between accuracy
    and smoothness.'
- author: Junshen Xu, Daniel Moyer, Patricia Ellen Grant, Polina Golland, Juan Eugenio
    Iglesias, Elfar Adalsteinsson
  title: 'SVoRT: Iterative Transformer for Slice-to-Volume Registration in Fetal Brain
    MRI.'
  venue: MICCAI
  year: '2022'
