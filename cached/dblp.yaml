- author: Zi Jian Yew, Gim Hee Lee
  title: '3DFeat-Net: Weakly Supervised Local 3D Features for Point Cloud Registration.'
  venue: ECCV
  year: '2018'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/YewL18
  doi: 10.1007/978-3-030-01267-0_37
  ee: https://doi.org/10.1007/978-3-030-01267-0_37
  url: https://dblp.org/rec/conf/eccv/YewL18
  abstract: In this paper, we propose the 3DFeat-Net which learns both 3D feature
    detector and descriptor for point cloud matching using weak supervision. Unlike
    many existing works, we do not require manual annotation of matching point clusters.
    Instead, we leverage on alignment and attention mechanisms to learn feature correspondences
    from GPS/INS tagged 3D point clouds without explicitly specifying them. We create
    training and benchmark outdoor Lidar datasets, and experiments show that 3DFeat-Net
    obtains state-of-the-art performance on these gravity-aligned datasets.
- author: Lei Zhou 0011, Siyu Zhu 0001, Zixin Luo, Tianwei Shen, Runze Zhang, Mingmin
    Zhen, Tian Fang, Long Quan
  title: Learning and Matching Multi-View Descriptors for Registration of Point Clouds.
  venue: ECCV
  year: '2018'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/ZhouZLSZZFQ18
  doi: 10.1007/978-3-030-01267-0_31
  ee: https://doi.org/10.1007/978-3-030-01267-0_31
  url: https://dblp.org/rec/conf/eccv/ZhouZLSZZFQ18
  abstract: Critical to the registration of point clouds is the establishment of a
    set of accurate correspondences between points in 3D space. The correspondence
    problem is generally addressed by the design of discriminative 3D local descriptors
    on the one hand, and the development of robust matching strategies on the other
    hand. In this work, we first propose a multi-view local descriptor, which is learned
    from the images of multiple views, for the description of 3D keypoints. Then,
    we develop a robust matching approach, aiming at rejecting outlier matches based
    on the efficient inference via belief propagation on the defined graphical model.
    We have demonstrated the boost of our approaches to registration on the public
    scanning and multi-view stereo datasets. The superior performance has been verified
    by the intensive comparisons against a variety of descriptors and matching methods.
