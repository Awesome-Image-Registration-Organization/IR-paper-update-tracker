- author: Ajit Rajwade 0002, Arunava Banerjee, Anand Rangarajan 0001
  title: New Method of Probability Density Estimation with Application to Mutual Information
    Based Image Registration.
  venue: CVPR
  year: '2006'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/RajwadeBR06
  doi: 10.1109/CVPR.2006.206
  ee: https://doi.org/10.1109/CVPR.2006.206
  url: https://dblp.org/rec/conf/cvpr/RajwadeBR06
  abstract: We present a new, robust and computationally efficient method for estimating
    the probability density of the intensity values in an image. Our approach makes
    use of a continuous representation of the image and develops a relation between
    probability density at a particular intensity value and image gradients along
    the level sets at that value. Unlike traditional sample-based methods such as
    histograms, minimum spanning trees (MSTs), Parzen windows or mixture models, our
    technique expressly accounts for the relative ordering of the intensity values
    at different image locations and exploits the geometry of the image surface. Moreover,
    our method avoids the histogram binning problem and requires no critical parameter
    tuning. We extend the method to compute the joint density between two or more
    images. We apply our density estimation technique to the task of affine registration
    of 2D images using mutual information and show good results under high noise.
