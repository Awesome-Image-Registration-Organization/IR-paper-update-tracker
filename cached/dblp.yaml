- author: Ekaterina Kuzmina, Artem Razumov, Oleg Y. Rogov, Elfar Adalsteinsson, Jacob
    White 0001, Dmitry V. Dylov
  title: 'Autofocusing+: Noise-Resilient Motion Correction in Magnetic Resonance Imaging.'
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/KuzminaRRAWD22
  doi: 10.1007/978-3-031-16446-0_35
  ee: https://doi.org/10.1007/978-3-031-16446-0_35
  url: https://dblp.org/rec/conf/miccai/KuzminaRRAWD22
  abstract: 'Image corruption by motion artifacts is an ingrained problem in Magnetic
    Resonance Imaging (MRI). In this work, we propose a neural network-based regularization
    term to enhance Autofocusing, a classic optimization-based method to remove motion
    artifacts. The method takes the best of both worlds: the optimization-based routine
    iteratively executes the blind demotion and deep learning-based prior penalizes
    for unrealistic restorations and speeds up the convergence. We validate the method
    on three models of motion trajectories, using synthetic and real noisy data. The
    method proves resilient to noise and anatomic structure variation, outperforming
    the state-of-the-art demotion methods.'
  related_code: ''
- author: Brett Levac, Sidharth Kumar, Sofia Kardonik, Jonathan I. Tamir
  title: FSE Compensated Motion Correction for MRI Using Data Driven Methods.
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/LevacKKT22
  doi: 10.1007/978-3-031-16446-0_67
  ee: https://doi.org/10.1007/978-3-031-16446-0_67
  url: https://dblp.org/rec/conf/miccai/LevacKKT22
  abstract: Magnetic Resonance Imaging (MRI) is a widely used medical imaging modality
    boasting great soft tissue contrast without ionizing radiation, but unfortunately
    suffers from long acquisition times. Long scan times can lead to motion artifacts,
    for example due to bulk patient motion such as head movement and periodic motion
    produced by the heart or lungs. Motion artifacts can degrade image quality and
    in some cases render the scans nondiagnostic. To combat this problem, prospective
    and retrospective motion correction techniques have been introduced. More recently,
    data driven methods using deep neural networks have been proposed. As a large
    number of publicly available MRI datasets are based on Fast Spin Echo (FSE) sequences,
    methods that use them for training should incorporate the correct FSE acquisition
    dynamics. Unfortunately, when simulating training data, many approaches fail to
    generate accurate motion-corrupt images by neglecting the effects of the temporal
    ordering of the k-space lines as well as neglecting the signal decay throughout
    the FSE echo train. In this work, we highlight this consequence and demonstrate
    a training method which correctly simulates the data acquisition process of FSE
    sequences with higher fidelity by including sample ordering and signal decay dynamics.
    Through numerical experiments, we show that accounting for the FSE acquisition
    leads to better motion correction performance during inference.
  related_code: ''
- author: Stefan B. Ploner, Siyu Chen, Jungeun Won, Lennart Husvogt, Katharina Breininger,
    Julia Schottenhamml, James G. Fujimoto, Andreas Maier 0001
  title: A Spatiotemporal Model for Precise and Efficient Fully-Automatic 3D Motion
    Correction in OCT.
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/PlonerCWHBSFM22
  doi: 10.1007/978-3-031-16434-7_50
  ee: https://doi.org/10.1007/978-3-031-16434-7_50
  url: https://dblp.org/rec/conf/miccai/PlonerCWHBSFM22
  abstract: 'Optical coherence tomography (OCT) is a micrometer-scale, volumetric
    imaging modality that has become a clinical standard in ophthalmology. OCT instruments
    image by raster-scanning a focused light spot across the retina, acquiring sequential
    cross-sectional images to generate volumetric data. Patient eye motion during
    the acquisition poses unique challenges: Non-rigid, discontinuous distortions
    can occur, leading to gaps in data and distorted topographic measurements. We
    present a new distortion model and a corresponding fully-automatic, reference-free
    optimization strategy for computational motion correction in orthogonally raster-scanned,
    retinal OCT volumes. Using a novel, domain-specific spatiotemporal parametrization
    of forward-warping displacements, eye motion can be corrected continuously for
    the first time. Parameter estimation with temporal regularization improves robustness
    and accuracy over previous spatial approaches. We correct each A-scan individually
    in 3D in a single mapping, including repeated acquisitions used in OCT angiography
    protocols. Specialized 3D forward image warping reduces median runtime to<9 s,
    fast enough for clinical use. We present a quantitative evaluation on 18 subjects
    with ocular pathology and demonstrate accurate correction during microsaccades.
    Transverse correction is limited only by ocular tremor, whereas submicron repeatability
    is achieved axially (0.51 um median of medians), representing a dramatic improvement
    over previous work. This allows assessing longitudinal changes in focal retinal
    pathologies as a marker of disease progression or treatment response, and promises
    to enable multiple new capabilities such as supersampled/super-resolution volume
    reconstruction and analysis of pathological eye motion occuring in neurological
    diseases.'
  related_code: ''
- author: Athena Taymourtash, Hamza Kebiri, Ernst Schwartz, Karl-Heinz Nenning, Sébastien
    Tourbier, Gregor Kasprian, Daniela Prayer, Meritxell Bach Cuadra, Georg Langs
  title: Spatio-Temporal Motion Correction and Iterative Reconstruction of In-Utero
    Fetal fMRI.
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/TaymourtashKSNT22
  doi: 10.1007/978-3-031-16446-0_57
  ee: https://doi.org/10.1007/978-3-031-16446-0_57
  url: https://dblp.org/rec/conf/miccai/TaymourtashKSNT22
  abstract: Resting-state functional Magnetic Resonance Imaging (fMRI) is a powerful
    imaging technique for studying functional development of the brain in utero. However,
    unpredictable and excessive movement of fetuses have limited its clinical applicability.
    Previous studies have focused primarily on the accurate estimation of the motion
    parameters employing a single step 3D interpolation at each individual time frame
    to recover a motion-free 4D fMRI image. Using only information from a 3D spatial
    neighborhood neglects the temporal structure of fMRI and useful information from
    neighboring timepoints. Here, we propose a novel technique based on four dimensional
    iterative reconstruction of the motion scattered fMRI slices. Quantitative evaluation
    of the proposed method on a cohort of real clinical fetal fMRI data indicates
    improvement of reconstruction quality compared to the conventional 3D interpolation
    approaches.
  related_code: ''
