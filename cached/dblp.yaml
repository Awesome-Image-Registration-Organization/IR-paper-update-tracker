- author: Elad Ben Baruch, Yosi Keller
  title: Joint Detection and Matching of Feature Points in Multimodal Images.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2022'
  type: Journal Articles
  access: closed
