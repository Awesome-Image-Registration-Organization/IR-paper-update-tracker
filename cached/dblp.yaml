- author: Subhadeep Koley, Ayan Kumar Bhunia, Aneeshan Sain, Pinaki Nath Chowdhury,
    Tao Xiang 0002, Yi-Zhe Song
  title: Text-to-Image Diffusion Models are Great Sketch-Photo Matchmakers.
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/KoleyBSC0S24a
  doi: 10.1109/CVPR52733.2024.01592
  ee: https://doi.org/10.1109/CVPR52733.2024.01592
  url: https://dblp.org/rec/conf/cvpr/KoleyBSC0S24a
  abstract: 'This paper, for the first time, explores text-to-image diffusion models
    for Zero-Shot Sketch-based Image Retrieval (ZS-SBIR). We highlight a pivotal discovery:
    the capacity of text-to-image diffusion models to seamlessly bridge the gap between
    sketches and photos. This proficiency is underpinned by their robust cross-modal
    capabilities and shape bias, findings that are substantiated through our pilot
    studies. In order to harness pre-trained diffusion models effectively, we introduce
    a straightforward yet powerful strategy focused on two key aspects: selecting
    optimal feature layers and utilising visual and textual prompts. For the former,
    we identify which layers are most enriched with information and are best suited
    for the specific retrieval requirements (category-level or fine-grained). Then
    we employ visual and textual prompts to guide the model''s feature extraction
    process, enabling it to generate more discriminative and contextually relevant
    cross-modal representations. Extensive experiments on several benchmark datasets
    validate significant performance improvements.'
  related_code: ''
- author: Jisu Nam, Heesu Kim, DongJae Lee, Siyoon Jin, Seungryong Kim, Seunggyu Chang
  title: 'DreamMatcher: Appearance Matching Self-Attention for Semantically-Consistent
    Text-to-Image Personalization.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/NamKLJKC24
  doi: 10.1109/CVPR52733.2024.00774
  ee: https://doi.org/10.1109/CVPR52733.2024.00774
  url: https://dblp.org/rec/conf/cvpr/NamKLJKC24
  abstract: The objective of text-to-image (T2I) personalization is to customize a
    diffusion model to a user-provided reference concept, generating diverse images
    of the concept aligned with the target prompts. Conventional methods representing
    the reference concepts using unique text embeddings often fail to accurately mimic
    the appearance of the reference. To address this, one solution may be explicitly
    conditioning the reference images into the target denoising process, known as
    key-value replacement. However, prior works are constrained to local editing since
    they disrupt the structure path of the pretrained T2I model. To overcome this,
    we propose a novel plug-in method, called DreamMatcher, which reformulates T2I
    personalization as semantic matching. Specifically, DreamMatcher replaces the
    target values with reference values aligned by semantic matching, while leaving
    the structure path unchanged to preserve the versatile capability of pretrained
    T2I models for generating diverse structures. We also introduce a semantic-consistent
    masking strategy to isolate the personalized concept from irrelevant regions introduced
    by the target prompts. Compatible with existing T2I models, DreamMatcher shows
    significant improvements in complex scenarios. Intensive analyses demonstrate
    the effectiveness of our approach.
  related_code: ''
- author: Khoi Pham, Chuong Huynh, Ser-Nam Lim, Abhinav Shrivastava
  title: Composing Object Relations and Attributes for Image-Text Matching.
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/PhamHLS24
  doi: 10.1109/CVPR52733.2024.01361
  ee: https://doi.org/10.1109/CVPR52733.2024.01361
  url: https://dblp.org/rec/conf/cvpr/PhamHLS24
  abstract: We study the visual semantic embedding problem for image-text matching.
    Most existing work utilizes a tailored cross-attention mechanism to perform local
    alignment across the two image and text modalities. This is computationally expensive,
    even though it is more powerful than the unimodal dual-encoder approach. This
    work introduces a dual-encoder image-text matching model, leveraging a scene graph
    to represent captions with nodes for objects and attributes interconnected by
    relational edges. Utilizing a graph attention network, our model efficiently en-codes
    object-attribute and object-object semantic relations, resulting in a robust and
    fast-performing system. Representing caption as a scene graph offers the ability
    to utilize the strong relational inductive bias of graph neural networks to learn
    object-attribute and object-object relations effectively. To train the model,
    we propose losses that align the image and caption both at the holistic level
    (image-caption) and the local level (image-object entity), which we show is key
    to the success of the model. Our model is termed Composition model for Object
    Relations and Attributes, CORA. Experimental results on two prominent image-text
    retrieval benchmarks, Flickr30K and MS-COCO, demonstrate that CORA outperforms
    existing state-of-the-art computationally expensive cross-attention methods regarding
    recall score while achieving fast computation speed of the dual encoder. Our code
    is available at https://github.com/vkhoi/cora_cvpr24
  related_code: https://github.com/vkhoi/cora_cvpr24
- author: Mubariz Zaffar, Liangliang Nan, Julian F. P. Kooij
  title: On the Estimation of Image-Matching Uncertainty in Visual Place Recognition.
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/ZaffarNK24
  doi: 10.1109/CVPR52733.2024.01680
  ee: https://doi.org/10.1109/CVPR52733.2024.01680
  url: https://dblp.org/rec/conf/cvpr/ZaffarNK24
  abstract: In Visual Place Recognition (VPR) the pose of a query image is estimated
    by comparing the image to a map of reference images with known reference poses.
    As is typical for image retrieval problems, a feature extractor maps the query
    and reference images to a feature space, where a nearest neighbor search is then
    performed. However, till recently little attention has been given to quantifying
    the confidence that a retrieved reference image is a correct match. Highly certain
    but incorrect retrieval can lead to catastrophic failure of VPR-based localization
    pipelines. This work compares for the first time the main approaches for estimating
    the image-matching uncertainty, including the traditional retrieval-based uncertainty
    estimation, more recent data-driven aleatoric uncertainty estimation, and the
    compute-intensive geometric verification. We further formulate a simple baseline
    method, “SUE”, which unlike the other methods considers the freely-available poses
    of the reference images in the map. Our experiments reveal that a simple L2-distance
    between the query and reference descriptors is already a better estimate of image-matching
    uncertainty than current data-driven approaches. SUE outperforms the other efficient
    uncertainty estimation methods, and its uncertainty estimates complement the computationally
    expensive geometric verification approach. Future works for uncertainty estimation
    in VPR should consider the baselines discussed in this work.
  related_code: ''
- author: Zheren Fu, Zhendong Mao 0001, Yan Song 0004, Yongdong Zhang 0001
  title: Learning Semantic Relationship among Instances for Image-Text Matching.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/FuMSZ23
  doi: 10.1109/CVPR52729.2023.01455
  ee: https://doi.org/10.1109/CVPR52729.2023.01455
  url: https://dblp.org/rec/conf/cvpr/FuMSZ23
  abstract: Image-text matching, a bridge connecting image and language, is an important
    task, which generally learns a holistic cross-modal embedding to achieve a high-quality
    semantic alignment between the two modalities. However, previous studies only
    focus on capturing fragment-level relation within a sample from a particular modality,
    e.g., salient regions in an image or text words in a sentence, where they usually
    pay less attention to capturing instance-level interactions among samples and
    modalities, e.g., multiple images and texts. In this paper, we argue that sample
    relations could help learn subtle differences for hard negative instances, and
    thus transfer shared knowledge for infrequent samples should be promising in obtaining
    better holistic embeddings. Therefore, we propose a novel hierarchical relation
    modeling framework (HREM), which explicitly capture both fragment-and instance-level
    relations to learn discriminative and robust cross-modal embeddings. Extensive
    experiments on Flickr30K and MS-COCO show our proposed method out-performs the
    state-of-the-art ones by 4%-10% in terms of rSum. Our code is available at https://github.com/CrossmodalGroup/HREM.
  related_code: https://github.com/CrossmodalGroup/HREM
- author: Zhengxin Pan, Fangyu Wu 0001, Bailing Zhang
  title: Fine-grained Image-text Matching by Cross-modal Hard Aligning Network.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/PanWZ23
  doi: 10.1109/CVPR52729.2023.01847
  ee: https://doi.org/10.1109/CVPR52729.2023.01847
  url: https://dblp.org/rec/conf/cvpr/PanWZ23
  abstract: Current state-of-the-art image-text matching methods implicitly align
    the visual-semantic fragments, like regions in images and words in sentences,
    and adopt cross-attention mechanism to discover fine-grained cross-modal semantic
    correspondence. However, the cross-attention mechanism may bring redundant or
    irrelevant region-word alignments, degenerating retrieval accuracy and limiting
    efficiency. Although many researchers have made progress in mining meaningful
    alignments and thus improving accuracy, the problem of poor efficiency remains
    unresolved. In this work, we propose to learn fine-grained image-text matching
    from the perspective of information coding. Specifically, we suggest a coding
    framework to explain the fragments aligning process, which provides a novel view
    to reexamine the cross-attention mechanism and analyze the problem of redundant
    alignments. Based on this framework, a Cross-modal Hard Aligning Network (CHAN)
    is designed, which comprehensively exploits the most relevant region-word pairs
    and eliminates all other alignments. Extensive experiments conducted on two public
    datasets, MS-COCO and Flickr30K, verify that the relevance of the most associated
    word-region pairs is discriminative enough as an indicator of the image-text similarity,
    with superior accuracy and efficiency over the state-of-the-art approaches on
    the bidirectional image and text retrieval tasks. Our code will be available at
    https://github.com/ppanzx/CHAN.
  related_code: https://github.com/ppanzx/CHAN
- author: Shengjie Zhu, Xiaoming Liu 0002
  title: 'PMatch: Paired Masked Image Modeling for Dense Geometric Matching.'
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/Zhu023a
  doi: 10.1109/CVPR52729.2023.02098
  ee: https://doi.org/10.1109/CVPR52729.2023.02098
  url: https://dblp.org/rec/conf/cvpr/Zhu023a
  abstract: Dense geometric matching determines the dense pixel-wise correspondence
    between a source and support image corresponding to the same 3D structure. Prior
    works employ an encoder of transformer blocks to correlate the two-frame features.
    However, existing monocular pretraining tasks, e.g., image classification, and
    masked image modeling (MIM), can not pretrain the cross-frame module, yielding
    less optimal performance. To resolve this, we reformulate the MIM from reconstructing
    a single masked image to reconstructing a pair of masked images, enabling the
    pretraining of transformer module. Additionally, we incorporate a decoder into
    pretraining for improved upsampling results. Further, to be robust to the textureless
    area, we propose a novel cross-frame global matching module (CFGM). Since the
    most textureless area is planar surfaces, we propose a homography loss to further
    regularize its learning. Combined together, we achieve the State-of-The-Art (SoTA)
    performance on geometric matching. Codes and models are available at https://github.com/ShngJZ/PMatch.
  related_code: https://github.com/ShngJZ/PMatch
- author: Kwanyoung Kim, Taesung Kwon, Jong Chul Ye
  title: Noise Distribution Adaptive Self-Supervised Image Denoising using Tweedie
    Distribution and Score Matching.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/KimKY22
  doi: 10.1109/CVPR52688.2022.00205
  ee: https://doi.org/10.1109/CVPR52688.2022.00205
  url: https://dblp.org/rec/conf/cvpr/KimKY22
  abstract: 'Tweedie distributions are a special case of exponential dispersion models,
    which are often used in classical statistics as distributions for generalized
    linear models. Here, we show that Tweedie distributions also play key roles in
    modern deep learning era, leading to a distribution adaptive self-supervised image
    denoising formula without clean reference images. Specifically, by combining with
    the recent Noise2Score self-supervised image denoising approach and the saddle
    point approximation of Tweedie distribution, we provide a general closed-form
    denoising formula that can be used for large classes of noise distributions without
    ever knowing the underlying noise distribution. Similar to the original Noise2Score,
    the new approach is composed of two successive steps: score matching using perturbed
    noisy images, followed by a closed form image denoising formula via distribution-independent
    Tweedie''s formula. In addition, we reveal a systematic algorithm to estimate
    the noise model and noise parameters for a given noisy image data set. Through
    extensive experiments, we demonstrate that the proposed method can accurately
    estimate noise models and parameters, and provide the state-of-the-art self-supervised
    image denoising performance in the benchmark dataset and real-world dataset.'
  related_code: ''
- author: Jinheng Xie, Xianxu Hou, Kai Ye 0004, Linlin Shen
  title: 'CLIMS: Cross Language Image Matching for Weakly Supervised Semantic Segmentation.'
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/XieH0S22
  doi: 10.1109/CVPR52688.2022.00444
  ee: https://doi.org/10.1109/CVPR52688.2022.00444
  url: https://dblp.org/rec/conf/cvpr/XieH0S22
  abstract: It has been widely known that CAM (Class Activation Map) usually only
    activates discriminative object regions and falsely includes lots of object-related
    backgrounds. As only a fixed set of image-level object labels are available to
    the WSSS (weakly supervised semantic segmentation) model, it could be very difficult
    to suppress those diverse background regions consisting of open set objects. In
    this paper, we propose a novel Cross Language Image Matching (CLIMS) framework,
    based on the recently introduced Contrastive Language-Image Pre-training (CLIP)
    model, for WSSS. The core idea of our framework is to introduce natural language
    supervision to activate more complete object regions and suppress closely-related
    open background regions. In particular, we design object, background region and
    text label matching losses to guide the model to excite more reasonable object
    regions for CAM of each category. In addition, we design a co-occurring background
    suppression loss to prevent the model from activating closely-related background
    regions, with a predefined set of class-related background text descriptions.
    These designs enable the proposed CLIMS to generate a more complete and compact
    activation map for the target objects. Extensive experiments on PASCAL VOC2012
    dataset show that our CLIMS significantly outperforms the previous state-of-the-art
    methods. Code will be available at https://github.com/CVI-SZU/CLIMS.
  related_code: https://github.com/CVI-SZU/CLIMS
- author: Kun Zhang 0040, Zhendong Mao 0001, Quan Wang 0002, Yongdong Zhang 0001
  title: Negative-Aware Attention Framework for Image-Text Matching.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/ZhangMWZ22
  doi: 10.1109/CVPR52688.2022.01521
  ee: https://doi.org/10.1109/CVPR52688.2022.01521
  url: https://dblp.org/rec/conf/cvpr/ZhangMWZ22
  abstract: 'Image-text matching, as a fundamental task, bridges the gap between vision
    and language. The key of this task is to accurately measure similarity between
    these two modalities. Prior work measuring this similarity mainly based on matched
    fragments (i.e., word/region with high relevance), while underestimating or even
    ignoring the effect of mismatched fragments (i.e., word/region with low relevance),
    e.g., via a typical LeaklyReLU or ReLU operation that forces negative scores close
    or exact to zero in attention. This work argues that mismatched textual fragments,
    which contain rich mismatching clues, are also crucial for image-text matching.
    We thereby propose a novel Negative-Aware Attention Framework (NAAF), which explicitly
    exploits both the positive effect of matched fragments and the negative effect
    of mismatched fragments to jointly infer image-text similarity. NAAF (1) delicately
    designs an iterative optimization method to maximally mine the mismatched fragments,
    facilitating more discriminative and robust negative effects, and (2) devises
    the two-branch matching mechanism to precisely calculate similarity/dissimilarity
    degrees for matched/mismatched fragments with different masks. Extensive experiments
    on two benchmark datasets, i.e., Flickr30K and MSCOCO, demonstrate the superior
    effectiveness of our NAAF, achieving state-of-the-art performance. Code will be
    released at: https://github.com/CrossmodalGroup/NAAF.'
  related_code: https://github.com/CrossmodalGroup/NAAF
- author: Liying Lu, Wenbo Li 0002, Xin Tao 0001, Jiangbo Lu, Jiaya Jia
  title: 'MASA-SR: Matching Acceleration and Spatial Adaptation for Reference-Based
    Image Super-Resolution.'
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/LuLTLJ21
  doi: 10.1109/CVPR46437.2021.00630
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Lu_MASA-SR_Matching_Acceleration_and_Spatial_Adaptation_for_Reference-Based_Image_Super-Resolution_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/LuLTLJ21
  abstract: Reference-based image super-resolution (RefSR) has shown promising success
    in recovering high-frequency details by utilizing an external reference image
    (Ref). In this task, texture details are transferred from the Ref image to the
    low-resolution (LR) image according to their point- or patch-wise correspondence.
    Therefore, high-quality correspondence matching is critical. It is also desired
    to be computationally efficient. Besides, existing RefSR methods tend to ignore
    the potential large disparity in distributions between the LR and Ref images,
    which hurts the effectiveness of the information utilization. In this paper, we
    propose the MASA network for RefSR, where two novel modules are designed to address
    these problems. The proposed Match & Extraction Module significantly reduces the
    computational cost by a coarse-to-fine correspondence matching scheme. The Spatial
    Adaptation Module learns the difference of distribution between the LR and Ref
    images, and remaps the distribution of Ref features to that of LR features in
    a spatially adaptive way. This scheme makes the network robust to handle different
    reference images. Extensive quantitative and qualitative experiments validate
    the effectiveness of our proposed model.
  related_code: ''
- author: Olivia Wiles, Sébastien Ehrhardt, Andrew Zisserman
  title: Co-Attention for Conditioned Image Matching.
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/WilesEZ21
  doi: 10.1109/CVPR46437.2021.01566
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Wiles_Co-Attention_for_Conditioned_Image_Matching_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/WilesEZ21
  abstract: 'We propose a new approach to determine correspondences between image
    pairs in the wild under large changes in illumination, viewpoint, context, and
    material. While other approaches find correspondences between pairs of images
    by treating the images independently, we instead condition on both images to implicitly
    take account of the differences between them. To achieve this, we introduce (i)
    a spatial attention mechanism (a co-attention module, CoAM) for conditioning the
    learned features on both images, and (ii) a distinctiveness score used to choose
    the best matches at test time. CoAM can be added to standard architectures and
    trained using self-supervision or supervised data, and achieves a significant
    performance improvement under hard conditions, e.g. large viewpoint changes. We
    demonstrate that models using CoAM achieve state of the art or competitive results
    on a wide range of tasks: local matching, camera localization, 3D reconstruction,
    and image stylization.'
  related_code: ''
- author: Shiyang Yan, Li Yu, Yuan Xie 0006
  title: Discrete-Continuous Action Space Policy Gradient-Based Attention for Image-Text
    Matching.
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/YanY021
  doi: 10.1109/CVPR46437.2021.00800
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Yan_Discrete-Continuous_Action_Space_Policy_Gradient-Based_Attention_for_Image-Text_Matching_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/YanY021
  abstract: 'Image-text matching is an important multi-modal task with massive applications.
    It tries to match the image and the text with similar semantic information. Existing
    approaches do not explicitly transform the different modalities into a common
    space. Meanwhile, the attention mechanism which is widely used in image-text matching
    models does not have supervision. We propose a novel attention scheme which projects
    the image and text embedding into a common space and optimises the attention weights
    directly towards the evaluation metrics. The proposed attention scheme can be
    considered as a kind of supervised attention and requiring no additional annotations.
    It is trained via a novel Discrete-continuous action space policy gradient algorithm,
    which is more effective in modelling complex action space than previous continuous
    action space policy gradient. We evaluate the proposed methods on two widely-used
    benchmark datasets: Flickr30k and MS-COCO, outperforming the previous approaches
    by a large margin.'
  related_code: ''
- author: Hui Chen 0013, Guiguang Ding, Xudong Liu, Zijia Lin, Ji Liu 0002, Jungong
    Han
  title: 'IMRAM: Iterative Matching With Recurrent Attention Memory for Cross-Modal
    Image-Text Retrieval.'
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/ChenDLLLH20
  doi: 10.1109/CVPR42600.2020.01267
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Chen_IMRAM_Iterative_Matching_With_Recurrent_Attention_Memory_for_Cross-Modal_Image-Text_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/ChenDLLLH20
  abstract: Enabling bi-directional retrieval of images and texts is important for
    understanding the correspondence between vision and language. Existing methods
    leverage the attention mechanism to explore such correspondence in a fine-grained
    manner. However, most of them consider all semantics equally and thus align them
    uniformly, regardless of their diverse complexities. In fact, semantics are diverse
    (i.e. involving different kinds of semantic concepts), and humans usually follow
    a latent structure to combine them into understandable languages. It may be difficult
    to optimally capture such sophisticated correspondences in existing methods. In
    this paper, to address such a deficiency, we propose an Iterative Matching with
    Recurrent Attention Memory (IMRAM) method, in which correspondences between images
    and texts are captured with multiple steps of alignments. Specifically, we introduce
    an iterative matching scheme to explore such fine-grained correspondence progressively.
    A memory distillation unit is used to refine alignment knowledge from early steps
    to later ones. Experiment results on three benchmark datasets, i.e. Flickr8K,
    Flickr30K, and MS COCO, show that our IMRAM achieves state-of-the-art performance,
    well demonstrating its effectiveness. Experiments on a practical business advertisement
    dataset, named KWAI-AD, further validates the applicability of our method in practical
    scenarios.
  related_code: ''
- author: Xi Wei, Tianzhu Zhang 0001, Yan Li 0068, Yongdong Zhang 0001, Feng Wu 0001
  title: Multi-Modality Cross Attention Network for Image and Sentence Matching.
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/WeiZLZW20
  doi: 10.1109/CVPR42600.2020.01095
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Wei_Multi-Modality_Cross_Attention_Network_for_Image_and_Sentence_Matching_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/WeiZLZW20
  abstract: The key of image and sentence matching is to accurately measure the visual-semantic
    similarity between an image and a sentence. However, most existing methods make
    use of only the intra-modality relationship within each modality or the inter-modality
    relationship between image regions and sentence words for the cross-modal matching
    task. Different from them, in this work, we propose a novel MultiModality Cross
    Attention (MMCA) Network for image and sentence matching by jointly modeling the
    intra-modality and inter-modality relationships of image regions and sentence
    words in a unified deep model. In the proposed MMCA, we design a novel cross-attention
    mechanism, which is able to exploit not only the intra-modality relationship within
    each modality, but also the inter-modality relationship between image regions
    and sentence words to complement and enhance each other for image and sentence
    matching. Extensive experimental results on two standard benchmarks including
    Flickr30K and MS-COCO demonstrate that the proposed model performs favorably against
    state-of-the-art image and sentence matching methods.
  related_code: ''
- author: Xiangrui Zeng, Min Xu 0009
  title: 'Gum-Net: Unsupervised Geometric Matching for Fast and Accurate 3D Subtomogram
    Image Alignment and Averaging.'
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/Zeng020
  doi: 10.1109/CVPR42600.2020.00413
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Zeng_Gum-Net_Unsupervised_Geometric_Matching_for_Fast_and_Accurate_3D_Subtomogram_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/Zeng020
  abstract: We propose a Geometric unsupervised matching Net-work (Gum-Net) for finding
    the geometric correspondence between two images with application to 3D subtomogram
    alignment and averaging. Subtomogram alignment is the most important task in cryo-electron
    tomography (cryo-ET), a revolutionary 3D imaging technique for visualizing the
    molecular organization of unperturbed cellular landscapes in single cells. However,
    subtomogram alignment and averaging are very challenging due to severe imaging
    limits such as noise and missing wedge effects. We introduce an end-to-end trainable
    architecture with three novel modules specifically designed for preserving feature
    spatial information and propagating feature matching information. The training
    is performed in a fully unsupervised fashion to optimize a matching metric. No
    ground truth transformation information nor category-level or instance-level matching
    supervision information is needed. After systematic assessments on six real and
    nine simulated datasets, we demonstrate that Gum-Net reduced the alignment error
    by 40 to 50% and improved the averaging resolution by 10%. Gum-Net also achieved
    70 to 110 times speedup in practice with GPU acceleration compared to state-of-the-art
    subtomogram alignment methods. Our work is the first 3D unsupervised geometric
    matching method for images of strong transformation variation and high noise level.
    The training code, trained model, and datasets are available in our open-source
    software AITom.
  related_code: ''
- author: Xuelun Shen, Cheng Wang 0003, Xin Li 0003, Zenglei Yu, Jonathan Li 0001,
    Chenglu Wen, Ming Cheng 0002, Zijian He
  title: 'RF-Net: An End-To-End Image Matching Network Based on Receptive Field.'
  venue: CVPR
  year: '2019'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/Shen0LYLW0H19
  doi: 10.1109/CVPR.2019.00832
  ee: http://openaccess.thecvf.com/content_CVPR_2019/html/Shen_RF-Net_An_End-To-End_Image_Matching_Network_Based_on_Receptive_Field_CVPR_2019_paper.html
  url: https://dblp.org/rec/conf/cvpr/Shen0LYLW0H19
  abstract: This paper proposes a new end-to-end trainable matching network based
    on receptive field, RF-Net, to compute sparse correspondence between images. Building
    end-to-end trainable matching framework is desirable and challenging. The very
    recent approach, LF-Net, successfully embeds the entire feature extraction pipeline
    into a jointly trainable pipeline, and produces the state-of-the-art matching
    results. This paper introduces two modifications to the structure of LF-Net. First,
    we propose to construct receptive feature maps, which lead to more effective keypoint
    detection. Second, we introduce a general loss function term, neighbor mask, to
    facilitate training patch selection. This results in improved stability in descriptor
    training. We trained RF-Net on the open dataset HPatches, and compared it with
    other methods on multiple benchmark datasets. Experiments show that RF-Net outperforms
    existing state-of-the-art methods.
  related_code: ''
- author: Huy V. Vo, Francis R. Bach, Minsu Cho, Kai Han 0001, Yann LeCun, Patrick
    Pérez, Jean Ponce
  title: Unsupervised Image Matching and Object Discovery as Optimization.
  venue: CVPR
  year: '2019'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/VoBCHLPP19
  doi: 10.1109/CVPR.2019.00848
  ee: http://openaccess.thecvf.com/content_CVPR_2019/html/Vo_Unsupervised_Image_Matching_and_Object_Discovery_as_Optimization_CVPR_2019_paper.html
  url: https://dblp.org/rec/conf/cvpr/VoBCHLPP19
  abstract: Learning with complete or partial supervision is power- ful but relies
    on ever-growing human annotation efforts. As a way to mitigate this serious problem,
    as well as to serve specific applications, unsupervised learning has emerged as
    an important field of research. In computer vision, unsu- pervised learning comes
    in various guises. We focus here on the unsupervised discovery and matching of
    object cate- gories among images in a collection, following the work of Cho et
    al. [12]. We show that the original approach can be reformulated and solved as
    a proper optimization problem. Experiments on several benchmarks establish the
    merit of our approach.
  related_code: ''
- author: Yan Huang 0008, Qi Wu 0001, Chunfeng Song, Liang Wang 0001
  title: Learning Semantic Concepts and Order for Image and Sentence Matching.
  venue: CVPR
  year: '2018'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/0008WS018
  doi: 10.1109/CVPR.2018.00645
  ee: http://openaccess.thecvf.com/content_cvpr_2018/html/Huang_Learning_Semantic_Concepts_CVPR_2018_paper.html
  url: https://dblp.org/rec/conf/cvpr/0008WS018
  abstract: Image and sentence matching has made great progress recently, but it remains
    challenging due to the large visual-semantic discrepancy. This mainly arises from
    that the representation of pixel-level image usually lacks of high-level semantic
    information as in its matched sentence. In this work, we propose a semantic-enhanced
    image and sentence matching model, which can improve the image representation
    by learning semantic concepts and then organizing them in a correct semantic order.
    Given an image, we first use a multi-regional multi-label CNN to predict its semantic
    concepts, including objects, properties, actions, etc. Then, considering that
    different orders of semantic concepts lead to diverse semantic meanings, we use
    a context-gated sentence generation scheme for semantic order learning. It simultaneously
    uses the image global context containing concept relations as reference and the
    groundtruth semantic order in the matched sentence as supervision. After obtaining
    the improved image representation, we learn the sentence representation with a
    conventional LSTM, and then jointly perform image and sentence matching and sentence
    generation for model learning. Extensive experiments demonstrate the effectiveness
    of our learned semantic concepts and order, by achieving the state-of-the-art
    results on two public benchmark datasets.
  related_code: ''
- author: Qi Cai, Yingwei Pan, Ting Yao 0003, Chenggang Yan 0001, Tao Mei 0001
  title: Memory Matching Networks for One-Shot Image Recognition.
  venue: CVPR
  year: '2018'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/CaiPYYM18
  doi: 10.1109/CVPR.2018.00429
  ee: http://openaccess.thecvf.com/content_cvpr_2018/html/Cai_Memory_Matching_Networks_CVPR_2018_paper.html
  url: https://dblp.org/rec/conf/cvpr/CaiPYYM18
  abstract: In this paper, we introduce the new ideas of augmenting Convolutional
    Neural Networks (CNNs) with Memory and learning to learn the network parameters
    for the unlabelled images on the fly in one-shot learning. Specifically, we present
    Memory Matching Networks (MM-Net) - a novel deep architecture that explores the
    training procedure, following the philosophy that training and test conditions
    must match. Technically, MM-Net writes the features of a set of labelled images
    (support set) into memory and reads from memory when performing inference to holistically
    leverage the knowledge in the set. Meanwhile, a Contextual Learner employs the
    memory slots in a sequential manner to predict the parameters of CNNs for unlabelled
    images. The whole architecture is trained by once showing only a few examples
    per class and switching the learning from minibatch to minibatch, which is tailored
    for one-shot learning when presented with a few examples of new categories at
    test time. Unlike the conventional one-shot learning approaches, our MM-Net could
    output one unified model irrespective of the number of shots and categories. Extensive
    experiments are conducted on two public datasets, i.e., Omniglot and miniImageNet,
    and superior results are reported when compared to state-of-the-art approaches.
    More remarkably, our MM-Net improves one-shot accuracy on Omniglot from 98.95%
    to 99.28% and from 49.21% to 53.37% on miniImageNet.
  related_code: ''
- author: Sixing Hu, Mengdan Feng, Rang M. H. Nguyen, Gim Hee Lee
  title: 'CVM-Net: Cross-View Matching Network for Image-Based Ground-to-Aerial Geo-Localization.'
  venue: CVPR
  year: '2018'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/HuFNL18
  doi: 10.1109/CVPR.2018.00758
  ee: http://openaccess.thecvf.com/content_cvpr_2018/html/Hu_CVM-Net_Cross-View_Matching_CVPR_2018_paper.html
  url: https://dblp.org/rec/conf/cvpr/HuFNL18
  abstract: The problem of localization on a geo-referenced aerial/satellite map given
    a query ground view image remains challenging due to the drastic change in viewpoint
    that causes traditional image descriptors based matching to fail. We leverage
    on the recent success of deep learning to propose the CVM-Net for the cross-view
    image-based ground-to-aerial geo-localization task. Specifically, our network
    is based on the Siamese architecture to do metric learning for the matching task.
    We first use the fully convolutional layers to extract local image features, which
    are then encoded into global image descriptors using the powerful NetVLAD. As
    part of the training procedure, we also introduce a simple yet effective weighted
    soft margin ranking loss function that not only speeds up the training convergence
    but also improves the final matching accuracy. Experimental results show that
    our proposed network significantly outperforms the state-of-the-art approaches
    on two existing benchmarking datasets. Our code and models are publicly available
    on the project website1.
  related_code: ''
- author: Yaxing Wang, Joost van de Weijer 0001, Luis Herranz
  title: 'Mix and Match Networks: Encoder-Decoder Alignment for Zero-Pair Image Translation.'
  venue: CVPR
  year: '2018'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/WangWH18
  doi: 10.1109/CVPR.2018.00573
  ee: http://openaccess.thecvf.com/content_cvpr_2018/html/Wang_Mix_and_Match_CVPR_2018_paper.html
  url: https://dblp.org/rec/conf/cvpr/WangWH18
  abstract: We address the problem of image translation between domains or modalities
    for which no direct paired data is available (i.e. zero-pair translation). We
    propose mix and match networks, based on multiple encoders and decoders aligned
    in such a way that other encoder-decoder pairs can be composed at test time to
    perform unseen image translation tasks between domains or modalities for which
    explicit paired samples were not seen during training. We study the impact of
    autoencoders, side information and losses in improving the alignment and transferability
    of trained pairwise translation models to unseen translations. We show our approach
    is scalable and can perform colorization and style transfer between unseen combinations
    of domains. We evaluate our system in a challenging cross-modal setting where
    semantic segmentation is estimated from depth images, without explicit access
    to any depth-semantic segmentation training pairs. Our model outperforms baselines
    based on pix2pix and CycleGAN models.
  related_code: ''
- author: Florian Bernard 0001, Frank R. Schmidt, Johan Thunberg, Daniel Cremers
  title: A Combinatorial Solution to Non-Rigid 3D Shape-to-Image Matching.
  venue: CVPR
  year: '2017'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/BernardSTC17
  doi: 10.1109/CVPR.2017.157
  ee: https://doi.org/10.1109/CVPR.2017.157
  url: https://dblp.org/rec/conf/cvpr/BernardSTC17
  abstract: 'We propose a combinatorial solution for the problem of non-rigidly matching
    a 3D shape to 3D image data. To this end, we model the shape as a triangular mesh
    and allow each triangle of this mesh to be rigidly transformed to achieve a suitable
    matching to the image. By penalising the distance and the relative rotation between
    neighbouring triangles our matching compromises between the image and the shape
    information. In this paper, we resolve two major challenges: Firstly, we address
    the resulting large and NP-hard combinatorial problem with a suitable graph-theoretic
    approach. Secondly, we propose an efficient discretisation of the unbounded 6-dimensional
    Lie group SE(3). To our knowledge this is the first combinatorial formulation
    for non-rigid 3D shape-to-image matching. In contrast to existing local (gradient
    descent) optimisation methods, we obtain solutions that do not require a good
    initialisation and that are within a bound of the optimal solution. We evaluate
    the proposed combinatorial method on the two problems of non-rigid 3D shape-to-shape
    and non-rigid 3D shape-to-image registration and demonstrate that it provides
    promising results.'
  related_code: ''
- author: Zhi-Qi Cheng, Xiao Wu 0001, Yang Liu 0155, Xian-Sheng Hua 0001
  title: 'Video2Shop: Exact Matching Clothes in Videos to Online Shopping Images.'
  venue: CVPR
  year: '2017'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/ChengWLH17
  doi: 10.1109/CVPR.2017.444
  ee: https://doi.ieeecomputersociety.org/10.1109/CVPR.2017.444
  url: https://dblp.org/rec/conf/cvpr/ChengWLH17
  abstract: In recent years, both online retail and video hosting service have been
    exponentially grown. In this paper, a novel deep neural network, called AsymNet,
    is proposed to explore a new cross-domain task, Video2Shop, targeting for matching
    clothes appeared in videos to the exactly same items in online shops. For the
    image side, well-established methods are used to detect and extract features for
    clothing patches with arbitrary sizes. For the video side, deep visual features
    are extracted from detected object regions in each frame, and further fed into
    a Long Short-Term Memory (LSTM) framework for sequence modeling, which captures
    the temporal dynamics in videos. To conduct exact matching between videos and
    online shopping images, LSTM hidden states for videos and image features extracted
    from static images are jointly modeled, under the similarity network with reconfigurable
    deep tree structure. Moreover, an approximate training method is proposed to achieve
    the efficiency when training. Extensive experiments conducted on a large cross-domain
    dataset have demonstrated the effectiveness and efficiency of the proposed AsymNet,
    which outperforms the state-of-the-art methods.
  related_code: ''
- author: Yan Huang 0008, Wei Wang 0115, Liang Wang 0001
  title: Instance-Aware Image and Sentence Matching with Selective Multimodal LSTM.
  venue: CVPR
  year: '2017'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/HuangWW17
  doi: 10.1109/CVPR.2017.767
  ee: https://doi.org/10.1109/CVPR.2017.767
  url: https://dblp.org/rec/conf/cvpr/HuangWW17
  abstract: Effective image and sentence matching depends on how to well measure their
    global visual-semantic similarity. Based on the observation that such a global
    similarity arises from a complex aggregation of multiple local similarities between
    pairwise instances of image (objects) and sentence (words), we propose a selective
    multimodal Long Short-Term Memory network (sm-LSTM) for instance-aware image and
    sentence matching. The sm-LSTM includes a multimodal context-modulated attention
    scheme at each timestep that can selectively attend to a pair of instances of
    image and sentence, by predicting pairwise instance-aware saliency maps for image
    and sentence. For selected pairwise instances, their representations are obtained
    based on the predicted saliency maps, and then compared to measure their local
    similarity. By similarly measuring multiple local similarities within a few timesteps,
    the sm-LSTM sequentially aggregates them with hidden states to obtain a final
    matching score as the desired global similarity. Extensive experiments show that
    our model can well match image and sentence with complex content, and achieve
    the state-of-the-art results on two public benchmark datasets.
  related_code: ''
