- author: Renlang Huang, Yufan Tang, Jiming Chen, Liang Li
  title: A Consistency-Aware Spot-Guided Transformer for Versatile and Hierarchical
    Point Cloud Registration.
  venue: NeurIPS
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/HuangTCL24
  doi: 10.52202/079017-2245
  ee: http://papers.nips.cc/paper_files/paper/2024/hash/821a6e5681b072351fd3c21fac44739a-Abstract-Conference.html
  url: https://dblp.org/rec/conf/nips/HuangTCL24
  abstract: Deep learning-based feature matching has shown great superiority for point
    cloud registration in the absence of pose priors. Although coarse-to-fine matching
    approaches are prevalent, the coarse matching of existing methods is typically
    sparse and loose without consideration of geometric consistency, which makes the
    subsequent fine matching rely on ineffective optimal transport and hypothesis-and-selection
    methods for consistency. Therefore, these methods are neither efficient nor scalable
    for real-time applications such as odometry in robotics. To address these issues,
    we design a consistency-aware spot-guided Transformer (CAST), which incorporates
    a spot-guided cross-attention module to avoid interfering with irrelevant areas,
    and a consistency-aware self-attention module to enhance matching capabilities
    with geometrically consistent correspondences. Furthermore, a lightweight fine
    matching module for both sparse keypoints and dense features can estimate the
    transformation accurately. Extensive experiments on both outdoor LiDAR point cloud
    datasets and indoor RGBD point cloud datasets demonstrate that our method achieves
    state-of-the-art accuracy, efficiency, and robustness.
