- author: Hanyu Zhou, Yi Chang 0002, Zhiwei Shi 0001, Wending Yan, Gang Chen 0023,
    Yonghong Tian 0001, Luxin Yan
  title: 'Adverse Weather Optical Flow: Cumulative Homogeneous-Heterogeneous Adaptation.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/pami/ZhouCSYCTY25
  doi: 10.1109/TPAMI.2024.3466241
  ee: https://doi.org/10.1109/TPAMI.2024.3466241
  url: https://dblp.org/rec/journals/pami/ZhouCSYCTY25
  abstract: Optical flow has made great progress in clean scenes, while suffers degradation
    under adverse weather due to the violation of the brightness constancy and gradient
    continuity assumptions of optical flow. Typically, existing methods mainly adopt
    domain adaptation to transfer motion knowledge from clean to degraded domain through
    one-stage adaptation. However, this direct adaptation is ineffective, since there
    exists a large gap due to adverse weather and scene style between clean and real
    degraded domains. Moreover, even within the degraded domain itself, static weather
    (e.g., fog) and dynamic weather (e.g., rain) have different impacts on optical
    flow. To address above issues, we explore synthetic degraded domain as an intermediate
    bridge between clean and real degraded domains, and propose a cumulative homogeneous-heterogeneous
    adaptation framework for real adverse weather optical flow. Specifically, for
    clean-degraded transfer, our key insight is that static weather possesses the
    depth-association homogeneous feature which does not change the intrinsic motion
    of the scene, while dynamic weather additionally introduces the heterogeneous
    feature which results in a significant boundary discrepancy in warp errors between
    clean and degraded domains. For synthetic-real transfer, we figure out that cost
    volume correlation shares a similar statistical histogram between synthetic and
    real degraded domains, benefiting to holistically aligning the homogeneous correlation
    distribution for synthetic-real knowledge distillation. Under this unified framework,
    the proposed method can progressively and explicitly transfer knowledge from clean
    scenes to real adverse weather. In addition, we further collect a real adverse
    weather dataset with manually annotated optical flow labels and perform extensive
    experiments to verify the superiority of the proposed method.
  related_code: ''
- author: Mathias Gehrig, Manasi Muglikar, Davide Scaramuzza 0001
  title: Dense Continuous-Time Optical Flow From Event Cameras.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2024'
  type: Journal Articles
  access: open
  key: journals/pami/GehrigM024
  doi: 10.1109/TPAMI.2024.3361671
  ee: https://doi.org/10.1109/TPAMI.2024.3361671
  url: https://dblp.org/rec/journals/pami/GehrigM024
  abstract: 'We present a method for estimating dense continuous-time optical flow
    from event data. Traditional dense optical flow methods compute the pixel displacement
    between two images. Due to missing information, these approaches cannot recover
    the pixel trajectories in the blind time between two images. In this work, we
    show that it is possible to compute per-pixel, continuous-time optical flow using
    events from an event camera. Events provide temporally fine-grained information
    about movement in pixel space due to their asynchronous nature and microsecond
    response time. We leverage these benefits to predict pixel trajectories densely
    in continuous time via parameterized Bézier curves. To achieve this, we build
    a neural network with strong inductive biases for this task: First, we build multiple
    sequential correlation volumes in time using event data. Second, we use Bézier
    curves to index these correlation volumes at multiple timestamps along the trajectory.
    Third, we use the retrieved correlation to update the Bézier curve representations
    iteratively. Our method can optionally include image pairs to boost performance
    further. To the best of our knowledge, our model is the first method that can
    regress dense pixel trajectories from event data. To train and evaluate our model,
    we introduce a synthetic dataset (MultiFlow) that features moving objects and
    ground truth trajectories for every pixel. Our quantitative experiments not only
    suggest that our method successfully predicts pixel trajectories in continuous
    time but also that it is competitive in the traditional two-view pixel displacement
    metric on MultiFlow and DSEC-Flow. Open source code and datasets are released
    to the public.'
  related_code: ''
- author: Gal Lifshitz, Dan Raviv
  title: Cost Function Unrolling in Unsupervised Optical Flow.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/pami/LifshitzR24
  doi: 10.1109/TPAMI.2023.3327156
  ee: https://doi.org/10.1109/TPAMI.2023.3327156
  url: https://dblp.org/rec/journals/pami/LifshitzR24
  abstract: Steepest descent algorithms, which are commonly used in deep learning,
    use the gradient as the descent direction, either as-is or after a direction shift
    using preconditioning. In many scenarios calculating the gradient is numerically
    hard due to complex or non-differentiable cost functions, specifically next to
    singular points. This has been commonly overcome by increased DNN model sizes
    and complexity. In this work we propose a novel mechanism we refer to as Cost
    Unrolling, for improving the ability of a given DNN model to solve a complex cost
    function, without modifying its architecture or increasing computational complexity.
    We focus on the derivation of the Total Variation (TV) smoothness constraint commonly
    used in unsupervised cost functions. We introduce an iterative differentiable
    alternative to the TV smoothness constraint, which is demonstrated to produce
    more stable gradients during training, enable faster convergence and improve the
    predictions of a given DNN model. We test our method in several tasks, including
    image denoising and unsupervised optical flow. Replacing the TV smoothness constraint
    with our loss during DNN training, we report improved results in all tested scenarios.
    Specifically, our method improves flows predicted at occluded regions, a crucial
    task by itself, resulting in sharper motion boundaries.
