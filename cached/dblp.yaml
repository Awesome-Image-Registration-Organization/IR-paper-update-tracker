  title: 3D Acetabular Surface Reconstruction from 2D Pre-operative X-Ray Images Using
    SRVF Elastic Registration and Deformation Graph.
  venue: MICCAI
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ZhangWWKSM25
  doi: 10.1007/978-3-032-05325-1_1
  ee: https://doi.org/10.1007/978-3-032-05325-1_1
  url: https://dblp.org/rec/conf/miccai/ZhangWWKSM25
  abstract: Accurate and reliable selection of the appropriate acetabular cup size
    is crucial for restoring joint biomechanics in total hip arthroplasty (THA). This
    paper proposes a novel framework that integrates square-root velocity function
    (SRVF)-based elastic shape registration technique with an embedded deformation
    (ED) graph approach to reconstruct the 3D articular surface of the acetabulum
    by fusing multiple views of 2D pre-operative pelvic X-ray images and a hemispherical
    surface model. The SRVF-based elastic registration establishes 2D-3D correspondences
    between the parametric hemispherical model and X-ray images, and the ED framework
    incorporates the SRVF-derived correspondences as constraints to optimize the 3D
    acetabular surface reconstruction using nonlinear least-squares optimization.
    Validations using both simulation and real patient datasets are performed to demonstrate
    the robustness and the potential clinical value of the proposed algorithm. The
    reconstruction result can assist surgeons in selecting the correct acetabular
    cup on the first attempt in primary THA, minimising the need for revision surgery.
- author: Yi Zhang 0120, Yidong Zhao, Qian Tao
  title: Bridging Classical and Learning-Based Iterative Registration Through Deep
    Equilibrium Models.
  venue: MICCAI
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ZhangZT25
  doi: 10.1007/978-3-032-04947-6_9
  ee: https://doi.org/10.1007/978-3-032-04947-6_9
  url: https://dblp.org/rec/conf/miccai/ZhangZT25
  abstract: 'Deformable medical image registration is traditionally formulated as
    an optimization problem. While classical methods solve this problem iteratively,
    recent learning-based approaches use recurrent neural networks (RNNs) to mimic
    this process by unrolling the prediction of deformation fields in a fixed number
    of steps. However, classical methods typically converge after sufficient iterations,
    but learning-based unrolling methods lack a theoretical convergence guarantee
    and show instability empirically. In addition, unrolling methods have a practical
    bottleneck at training time: GPU memory usage grows linearly with the unrolling
    steps due to backpropagation through time (BPTT). To address both theoretical
    and practical challenges, we propose DEQReg, a novel registration framework based
    on Deep Equilibrium Models (DEQ), which formulates registration as an equilibrium-seeking
    problem, establishing a natural connection between classical optimization and
    learning-based unrolling methods. DEQReg maintains constant memory usage, enabling
    theoretically unlimited iteration steps. Through extensive evaluation on the public
    brain MRI and lung CT datasets, we show that DEQReg can achieve competitive registration
    performance, while substantially reducing memory consumption compared to state-of-the-art
    unrolling methods. We also reveal an intriguing phenomenon: the performance of
    existing unrolling methods first increases slightly then degrades irreversibly
    when the inference steps go beyond the training configuration. In contrast, DEQReg
    achieves stable convergence with its inbuilt equilibrium-seeking mechanism, bridging
    the gap between classical optimization-based and modern learning-based registration
    methods.'
- author: Hang Zhang 0010, Yuxi Zhang, Jiazheng Wang, Xiang Chen 0008, Renjiu Hu,
    Xin Tian, Gaolei Li, Min Liu 0008
  title: 'VoxelOpt: Voxel-Adaptive Message Passing for Discrete Optimization in Deformable
    Abdominal CT Registration.'
  venue: MICCAI
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ZhangZWCHTLL25
  doi: 10.1007/978-3-032-04965-0_63
  ee: https://doi.org/10.1007/978-3-032-04965-0_63
  url: https://dblp.org/rec/conf/miccai/ZhangZWCHTLL25
  abstract: Recent developments in neural networks have improved deformable image
    registration (DIR) by amortizing iterative optimization, enabling fast and accurate
    DIR results. However, learning-based methods often face challenges with limited
    training data, large deformations, and tend to underperform compared to iterative
    approaches when label supervision is unavailable. While iterative methods can
    achieve higher accuracy in such scenarios, they are considerably slower than learning-based
    methods. To address these limitations, we propose VoxelOpt, a discrete optimization-based
    DIR framework that combines the strengths of learning-based and iterative methods
    to achieve a better balance between registration accuracy and runtime. VoxelOpt
    uses displacement entropy from local cost volumes to measure displacement signal
    strength at each voxel, which differs from earlier approaches in three key aspects.
    First, it introduces voxel-wise adaptive message passing, where voxels with lower
    entropy receives less influence from their neighbors. Second, it employs a multi-level
    image pyramid with 27-neighbor cost volumes at each level, avoiding exponential
    complexity growth. Third, it replaces hand-crafted features or contrastive learning
    with a pretrained foundational segmentation model for feature extraction. In abdominal
    CT registration, these changes allow VoxelOpt to outperform leading iterative
    in both efficiency and accuracy, while matching state-of-the-art learning-based
    methods trained with label supervision. The source code will be available at https://github.com/tinymilky/VoxelOpt
