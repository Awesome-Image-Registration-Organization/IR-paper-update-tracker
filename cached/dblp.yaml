- author: Dian Zheng, Cheng Zhang, Xiao-Ming Wu 0002, Cao Li, Chengfei Lv, Jian-Fang
    Hu, Wei-Shi Zheng 0001
  title: Panorama Generation From NFoV Image Done Right.
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/ZhengZ0LLH025
  doi: 10.1109/CVPR52734.2025.02013
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Zheng_Panorama_Generation_From_NFoV_Image_Done_Right_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/ZhengZ0LLH025
  abstract: Generating 360-degree panoramas from narrow field of view (NFoV) image
    is a promising computer vision task for Virtual Reality (VR) applications. Existing
    methods mostly assess the generated panoramas with InceptionNet or CLIP based
    metrics, which tend to perceive the image quality and is not suitable for evaluating
    the distortion. In this work, we first propose a distortion-specific CLIP, named
    Distort-CLIP to accurately evaluate the panorama distortion and discover the "visual
    cheating" phenomenon in previous works (i.e., tending to improve the visual results
    by sacrificing distortion accuracy). This phenomenon arises because prior methods
    employ a single network to learn the distinct panorama distortion and content
    completion at once, which leads the model to prioritize optimizing the latter.
    To address the phenomenon, we propose PanoDecouple, a decoupled diffusion model
    framework, which decouples the panorama generation into distortion guidance and
    content completion, aiming to generate panoramas with both accurate distortion
    and visual appeal. Specifically, we design a DistortNet for distortion guidance
    by imposing panorama-specific distortion prior and a modified condition registration
    mechanism; and a ContentNet for content completion by imposing perspective image
    information. Additionally, a distortion correction loss function with Distort-CLIP
    is introduced to constrain the distortion explicitly. The extensive experiments
    validate that PanoDecouple surpasses existing methods both in distortion and visual
    metrics.
