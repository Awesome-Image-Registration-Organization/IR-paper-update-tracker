- author: Shengze Jin, Iro Armeni, Marc Pollefeys, Dániel Baráth
  title: Multiway Point Cloud Mosaicking with Diffusion and Global Optimization.
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/JinAPB24
  doi: 10.1109/CVPR52733.2024.01969
  ee: https://doi.org/10.1109/CVPR52733.2024.01969
  url: https://dblp.org/rec/conf/cvpr/JinAPB24
  abstract: We introduce a novel framework for multiway point cloud mosaicking (named
    Wednesday), designed to co-align sets of partially overlapping point clouds -
    typically obtained from 3D scanners or moving RGB-D cameras - into a unified coordinate
    system. At the core of our approach is ODIN, a learned pairwise registration algorithm
    that iteratively identifies overlaps and refines attention scores, employing a
    diffusion-based process for denoising pairwise correlation matrices to enhance
    matching accuracy. Further steps include constructing a pose graph from all point
    clouds, performing rotation averaging, a novel robust algorithm for re-estimating
    translations optimally in terms of consensus maximization and translation optimization.
    Finally, the point cloud rotations and positions are optimized jointly by a diffusion-based
    approach. Tested on four diverse, large-scale datasets, our method achieves state-of-the-art
    pairwise and multiway registration results by a large margin on all benchmarks.
    Our code and models are available at https://github.com/jinsz/Multiway-Point-Cloud-Mosaicking-with-Diffusion-and-Global-Optimization.
  related_code: https://github.com/jinsz/Multiway-Point-Cloud-Mosaicking-with-Diffusion-and-Global-Optimization
- author: Qian Wang, Weiqi Li, Chong Mou, Xinhua Cheng, Jian Zhang 0018
  title: '360DVD: Controllable Panorama Video Generation with 360-Degree Video Diffusion
    Model.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/WangLMCZ24
  doi: 10.1109/CVPR52733.2024.00660
  ee: https://doi.org/10.1109/CVPR52733.2024.00660
  url: https://dblp.org/rec/conf/cvpr/WangLMCZ24
  abstract: 'Panorama video recently attracts more interest in both study and application,
    courtesy of its immersive experience. Due to the expensive cost of capturing $360^{\circ}$
    panoramic videos, generating desirable panorama videos by prompts is urgently
    required. Lately, the emerging text-to-video (T2V) diffusion methods demonstrate
    notable effectiveness in standard video generation. However, due to the significant
    gap in content and motion patterns between panoramic and standard videos, these
    methods encounter challenges in yielding satisfactory $360^{\circ}$ panoramic
    videos. In this paper, we propose a pipeline named 360-Degree Video Diffusion
    model (360DVD) for generating $360^{\circ}$ panoramic videos based on the given
    prompts and motion conditions. Specifically, we introduce a lightweight 360-Adapter
    accompanied by 360 Enhancement Techniques to transform pre-trained T2V models
    for panorama video generation. We further propose a new panorama dataset named
    WEB360 consisting of panoramic video-text pairs for training 360DVD, addressing
    the absence of captioned panoramic video datasets. Extensive experiments demonstrate
    the superior-ity and effectiveness of 360DVD for panorama video gen-eration. Our
    project page is at https: / /akaneqwq. github. io/360DVD/.'
  related_code: ''
- author: Lior Yariv, Omri Puny, Oran Gafni, Yaron Lipman
  title: Mosaic-SDF for 3D Generative Models.
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/YarivPGL24
  doi: 10.1109/CVPR52733.2024.00443
  ee: https://doi.org/10.1109/CVPR52733.2024.00443
  url: https://dblp.org/rec/conf/cvpr/YarivPGL24
  abstract: 'Current diffusion or flow-based generative models for 3D shapes divide
    to two: distilling pre-trained 2D image diffusion models, and training directly
    on 3D shapes. When training a diffusion or flow models on 3D shapes a crucial
    design choice is the shape representation. An effective shape representation needs
    to adhere three design principles: it should allow an efficient conversion of
    large 3D datasets to the representation form; it should provide a good tradeoff
    of approximation power versus number of parameters; and it should have a simple
    tensorial form that is compatible with existing powerful neural architectures.
    While standard 3D shape representations such as volumetric grids and point clouds
    do not adhere to all these principles simultaneously, we advocate in this paper
    a new representation that does. We introduce Mosaic-SDF (M-SDF): a simple 3D shape
    representation that approximates the Signed Distance Function (SDF) of a given
    shape by using a set of local grids spread near the shape''s boundary. The M-SDF
    representation is fast to compute for each shape individually making it readily
    parallelizable; it is parameter efficient as it only covers the space around the
    shape''s boundary; and it has a simple matrix form, compatible with Transformer-based
    architectures. We demonstrate the efficacy of the M-SDF representation by using
    it to train a 3D generative flow model including class-conditioned generation
    with the ShapeNetCore-V2 (3D Warehouse) dataset, and text-to-3D generation using
    a dataset of about 600k caption-shape pairs.'
  related_code: ''
- author: Cheng Zhang, Qianyi Wu, Camilo Cruz Gambardella, Xiaoshui Huang, Dinh Phung
    0001, Wanli Ouyang, Jianfei Cai 0001
  title: Taming Stable Diffusion for Text to 360° Panorama Image Generation.
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/ZhangWGH0O024
  doi: 10.1109/CVPR52733.2024.00607
  ee: https://doi.org/10.1109/CVPR52733.2024.00607
  url: https://dblp.org/rec/conf/cvpr/ZhangWGH0O024
  abstract: Generative models, e.g., Stable Diffusion, have enabled the creation of
    photorealistic images from text prompts. Yet, the generation of 360-degree panorama
    images from text remains a challenge, particularly due to the dearth of paired
    text-panorama data and the domain gap between panorama and perspective images.
    In this paper, we introduce a novel dual-branch diffusion model named PanFusion
    to generate a 360-degree image from a text prompt. We leverage the stable diffusion
    model as one branch to provide prior knowledge in natural image generation and
    register it to another panorama branch for holistic image generation. We propose
    a unique cross-attention mechanism with projection awareness to minimize distortion
    during the collaborative denoising process. Our experiments validate that PanFusion
    surpasses existing methods and, thanks to its dual-branch structure, can integrate
    additional constraints like room layout for customized panorama outputs. Code
    is available at https://chengzhag.github.io/publication/panfusion.
  related_code: ''
- author: Tianhao Zhou, Haipeng Li 0001, Ziyi Wang, Ao Luo, Chen-Lin Zhang, Jiajun
    Li, Bing Zeng 0001, Shuaicheng Liu
  title: 'RecDiffusion: Rectangling for Image Stitching with Diffusion Models.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/ZhouLWLZLZL24
  doi: 10.1109/CVPR52733.2024.00260
  ee: https://doi.org/10.1109/CVPR52733.2024.00260
  url: https://dblp.org/rec/conf/cvpr/ZhouLWLZLZL24
  abstract: Image stitching from different captures often results in non-rectangular
    boundaries, which is often considered un-appealing. To solve non-rectangular boundaries,
    current solutions involve cropping, which discards image content, inpainting,
    which can introduce unrelated content, or warping, which can distort non-linear
    features and introduce artifacts. To overcome these issues, we introduce a novel
    diffusion-based learning framework, RecDiffusion, for image stitching rectangling.
    This framework combines Motion Diffusion Models (MDM) to generate motion fields,
    ef-fectively transitioning from the stitched image's irregular borders to a geometrically
    corrected intermediary. Fol-lowed by Content Diffusion Models (CDM) for image
    de-tail refinement. Notably, our sampling process utilizes a weighted map to identify
    regions needing correction during each iteration of CDM. Our RecDiffusion ensures
    geomet-ric accuracy and overall visual appeal, surpassing all pre-vious methods
    in both quantitative and qualitative measures when evaluated on public benchmarks.
    Code is released at https://github.com/haippp/RecDiffusion.
  related_code: https://github.com/haippp/RecDiffusion
- author: Peng Du, Jifeng Ning, Jiguang Cui, Shaoli Huang, Xinchao Wang, Jiaxin Wang
  title: Geometric Structure Preserving Warp for Natural Image Stitching.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/DuNCHWW22
  doi: 10.1109/CVPR52688.2022.00367
  ee: https://doi.org/10.1109/CVPR52688.2022.00367
  url: https://dblp.org/rec/conf/cvpr/DuNCHWW22
  abstract: Preserving geometric structures in the scene plays a vital role in image
    stitching. However, most of the existing methods ignore the large-scale layouts
    reflected by straight lines or curves, decreasing overall stitching quality. To
    address this issue, this work presents a structure-preserving stitching approach
    that produces images with natural visual effects and less distortion. Our method
    first employs deep learning-based edge detection to extract various types of large-scale
    edges. Then, the extracted edges are sampled to construct multiple groups of triangles
    to represent geometric structures. Meanwhile, a GEometric Structure preserving
    (GES) energy term is introduced to make these triangles undergo similarity transformation.
    Further, an optimized GES energy term is presented to reasonably determine the
    weights of the sampling points on the geometric structure, and the term is added
    into the Global Similarity Prior (GSP) stitching model called GES-GSP to achieve
    a smooth transition between local alignment and geometric structure preservation.
    The effectiveness of GES-GSP is validated through comprehensive experiments on
    a stitching dataset. The experimental results show that the proposed method outperforms
    several state-of-the-art methods in geometric structure preservation and obtains
    more natural stitching results. The code and dataset are available at https://github.com/flowerDuo/GES-GSP-Stitching.
  related_code: https://github.com/flowerDuo/GES-GSP-Stitching
- author: Jiaxue Li, Yicong Zhou
  title: Automatic Color Image Stitching Using Quaternion Rank-1 Alignment.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/LiZ22
  doi: 10.1109/CVPR52688.2022.01910
  ee: https://doi.org/10.1109/CVPR52688.2022.01910
  url: https://dblp.org/rec/conf/cvpr/LiZ22
  abstract: Color image stitching is a challenging task in real-world applications.
    This paper first proposes a quaternion rank-1 alignment (QR1A) model for high-precision
    color image alignment. To solve the optimization problem of QR1A, we develop a
    nested iterative algorithm under the framework of complex-valued alternating direction
    method of multipliers. To quantitatively evaluate image stitching performance,
    we propose a perceptual seam quality (PSQ) measure to calculate misalignments
    of local regions along the seamline. Using QR1A and PSQ, we further propose an
    automatic color image stitching (ACIS-QR1A) framework. In this frame-work, the
    automatic strategy and iterative learning strategy are developed to simultaneously
    learn the optimal seamline and local alignment. Extensive experiments on challenging
    datasets demonstrate that the proposed ACIS-QR1A is able to obtain high-quality
