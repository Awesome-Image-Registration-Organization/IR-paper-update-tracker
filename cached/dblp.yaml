  title: An automatic registration method for frameless stereotaxy, image guided surgery,
    and enhanced reality visualization.
  venue: CVPR
  year: '1994'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/GrimsonLWWKE94
  doi: 10.1109/CVPR.1994.323862
