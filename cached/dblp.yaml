- author: Lin Tian 0001, Connor Puett, Peirong Liu, Zhengyang Shen, Stephen R. Aylward,
    Yueh Z. Lee, Marc Niethammer
  title: Fluid Registration Between Lung CT and Stationary Chest Tomosynthesis Images.
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/TianPLSALN20
  doi: 10.1007/978-3-030-59716-0_30
  ee: https://doi.org/10.1007/978-3-030-59716-0_30
  url: https://dblp.org/rec/conf/miccai/TianPLSALN20
  abstract: Registration is widely used in image-guided therapy and image-guided surgery
    to estimate spatial correspondences between organs of interest between planning
    and treatment images. However, while high-quality computed tomography (CT) images
    are often available at planning time, limited angle acquisitions are frequently
    used during treatment because of radiation concerns or imaging time constraints.
    This requires algorithms to register CT images based on limited angle acquisitions.
    We, therefore, formulate a 3D/2D registration approach which infers a 3D deformation
    based on measured projections and digitally reconstructed radiographs of the CT.
    Most 3D/2D registration approaches use simple transformation models or require
    complex mathematical derivations to formulate the underlying optimization problem.
    Instead, our approach entirely relies on differentiable operations which can be
    combined with modern computational toolboxes supporting automatic differentiation.
    This then allows for rapid prototyping, integration with deep neural networks,
    and to support a variety of transformation models including fluid flow models.
    We demonstrate our approach for the registration between CT and stationary chest
    tomosynthesis (sDCT) images and show how it naturally leads to an iterative image
    reconstruction approach.
- author: Marek Wodzinski
  title: Multi-step, Learning-Based, Semi-supervised Image Registration Algorithm.
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/Wodzinski20
  doi: 10.1007/978-3-030-71827-5_12
  ee: https://doi.org/10.1007/978-3-030-71827-5_12
  url: https://dblp.org/rec/conf/miccai/Wodzinski20
  abstract: This paper presents a contribution to the Learn2Reg challenge organized
    jointly with the MICCAI 2020, more specifically, to the task related to inter-patient
    hippocampus registration in magnetic resonance images. The proposed algorithm
    is a multi-step, learning-based, and semi-supervised procedure. The method consists
    of a sequentially stacked U-Net-like architecture, trained in alternation. The
    method was ranked as the second-best (for the hippocampus registration task) in
    terms of the combined challenge evaluation criteria.
- author: Zhe Xu 0012, Jie Luo 0003, Jiangpeng Yan, Ritvik Pulya, Xiu Li 0001, William
    M. Wells III, Jayender Jagadeesan
  title: Adversarial Uni- and Multi-modal Stream Networks for Multimodal Image Registration.
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/XuLYPLWJ20
  doi: 10.1007/978-3-030-59716-0_22
  ee: https://doi.org/10.1007/978-3-030-59716-0_22
  url: https://dblp.org/rec/conf/miccai/XuLYPLWJ20
  abstract: 'Deformable image registration between Computed Tomography (CT) images
    and Magnetic Resonance (MR) imaging is essential for many image-guided therapies.
    In this paper, we propose a novel translation-based unsupervised deformable image
    registration method. Distinct from other translation-based methods that attempt
    to convert the multimodal problem (e.g., CT-to-MR) into a unimodal problem (e.g.,
    MR-to-MR) via image-to-image translation, our method leverages the deformation
    fields estimated from both: (i) the translated MR image and (ii) the original
    CT image in a dual-stream fashion, and automatically learns how to fuse them to
    achieve better registration performance. The multimodal registration network can
    be effectively trained by computationally efficient similarity metrics without
    any ground-truth deformation. Our method has been evaluated on two clinical datasets
    and demonstrates promising results compared to state-of-the-art traditional and
    learning-based methods.'
- author: Qianye Yang, Yunguan Fu, Francesco Giganti, Nooshin Ghavami, Qingchao Chen,
    J. Alison Noble, Tom Vercauteren, Dean C. Barratt, Yipeng Hu
  title: Longitudinal Image Registration with Temporal-Order and Subject-Specificity
    Discrimination.
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/YangFGGCNVBH20
  doi: 10.1007/978-3-030-59716-0_24
  ee: https://doi.org/10.1007/978-3-030-59716-0_24
  url: https://dblp.org/rec/conf/miccai/YangFGGCNVBH20
  abstract: Morphological analysis of longitudinal MR images plays a key role in monitoring
    disease progression for prostate cancer patients, who are placed under an active
    surveillance program. In this paper, we describe a learning-based image registration
    algorithm to quantify changes on regions of interest between a pair of images
    from the same patient, acquired at two different time points. Combining intensity-based
    similarity and gland segmentation as weak supervision, the population-data-trained
    registration networks significantly lowered the target registration errors (TREs)
    on holdout patient data, compared with those before registration and those from
    an iterative registration algorithm. Furthermore, this work provides a quantitative
    analysis on several longitudinal-data-sampling strategies and, in turn, we propose
    a novel regularisation method based on maximum mean discrepancy, between differently-sampled
    training image pairs. Based on 216 3D MR images from 86 patients, we report a
    mean TRE of 5.6 mm and show statistically significant differences between the
    different training data sampling strategies.
- author: Riddhish Bhalodia, Shireen Y. Elhabian, Ladislav Kavan, Ross T. Whitaker
  title: A Cooperative Autoencoder for Population-Based Regularization of CNN Image
    Registration.
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/BhalodiaEKW19
  doi: 10.1007/978-3-030-32245-8_44
  ee: https://doi.org/10.1007/978-3-030-32245-8_44
  url: https://dblp.org/rec/conf/miccai/BhalodiaEKW19
  abstract: Spatial transformations are enablers in a variety of medical image analysis
    applications that entail aligning images to a common coordinate systems. Population
    analysis of such transformations is expected to capture the underlying image and
    shape variations, and hence these transformations are required to produce anatomically
    feasible correspondences. This is usually enforced through some smoothness-based
    generic metric or regularization of the deformation field. Alternatively, population-based
    regularization has been shown to produce anatomically accurate correspondences
    in cases where anatomically unaware (i.e., data independent) regularization fail.
    Recently, deep networks have been used to generate spatial transformations in
    an unsupervised manner, and, once trained, these networks are computationally
    faster and as accurate as conventional, optimization-based registration methods.
    However, the deformation fields produced by these networks require smoothness
    penalties, just as the conventional registration methods, and ignores population-level
    statistics of the transformations. Here, we propose a novel neural network architecture
    that simultaneously learns and uses the population-level statistics of the spatial
    transformations to regularize the neural networks for unsupervised image registration.
    This regularization is in the form of a bottleneck autoencoder, which learns and
    adapts to the population of transformations required to align input images by
    encoding the transformations to a low dimensional manifold. The proposed architecture
    produces deformation fields that describe the population-level features and associated
    correspondences in an anatomically relevant manner and are statistically compact
    relative to the state-of-the-art approaches while maintaining computational efficiency.
    We demonstrate the efficacy of the proposed architecture on synthetic data sets,
    as well as 2D and 3D medical data.
- author: Mohamed S. Elmahdy, Jelmer M. Wolterink, Hessam Sokooti, Ivana Isgum, Marius
    Staring
  title: Adversarial Optimization for Joint Registration and Segmentation in Prostate
    CT Radiotherapy.
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ElmahdyWSIS19
  doi: 10.1007/978-3-030-32226-7_41
  ee: https://doi.org/10.1007/978-3-030-32226-7_41
  url: https://dblp.org/rec/conf/miccai/ElmahdyWSIS19
  abstract: Joint image registration and segmentation has long been an active area
    of research in medical imaging. Here, we reformulate this problem in a deep learning
    setting using adversarial learning. We consider the case in which fixed and moving
    images as well as their segmentations are available for training, while segmentations
    are not available during testing; a common scenario in radiotherapy. The proposed
    framework consists of a 3D end-to-end generator network that estimates the deformation
    vector field (DVF) between fixed and moving images in an unsupervised fashion
    and applies this DVF to the moving image and its segmentation. A discriminator
    network is trained to evaluate how well the moving image and segmentation align
    with the fixed image and segmentation. The proposed network was trained and evaluated
    on follow-up prostate CT scans for image-guided radiotherapy, where the planning
    CT contours are propagated to the daily CT images using the estimated DVF. A quantitative
    comparison with conventional registration using \texttt{elastix} showed that the
    proposed method improved performance and substantially reduced computation time,
    thus enabling real-time contour propagation necessary for online-adaptive radiotherapy.
