- author: Gucan Long, Laurent Kneip, José M. Álvarez 0004, Hongdong Li, Xiaohu Zhang,
    Qifeng Yu
  title: Learning Image Matching by Simply Watching Video.
  venue: ECCV
  year: '2016'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/LongKALZY16
  doi: 10.1007/978-3-319-46466-4_26
  ee: https://doi.org/10.1007/978-3-319-46466-4_26
  url: https://dblp.org/rec/conf/eccv/LongKALZY16
  abstract: 'This work presents an unsupervised learning based approach to the ubiquitous
    computer vision problem of image matching. We start from the insight that the
    problem of frame interpolation implicitly solves for inter-frame correspondences.
    This permits the application of analysis-by-synthesis: we first train and apply
    a Convolutional Neural Network for frame interpolation, then obtain correspondences
    by inverting the learned CNN. The key benefit behind this strategy is that the
    CNN for frame interpolation can be trained in an unsupervised manner by exploiting
    the temporal coherence that is naturally contained in real-world video sequences.
    The present model therefore learns image matching by simply “watching videos”.
    Besides a promise to be more generally applicable, the presented approach achieves
    surprising performance comparable to traditional empirically designed methods.'
  related_code: ''
