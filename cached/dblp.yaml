  title: 'FlowSDF: Flow Matching for Medical Image Segmentation Using Distance Transforms.'
  venue: Int. J. Comput. Vis.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/ijcv/BogenspergerNFSP25
  doi: 10.1007/S11263-025-02373-Y
  ee: https://doi.org/10.1007/s11263-025-02373-y
  url: https://dblp.org/rec/journals/ijcv/BogenspergerNFSP25
  abstract: Abstract Medical image segmentation plays an important role in accurately
    identifying and isolating regions of interest within medical images. Generative
    approaches are particularly effective in modeling the statistical properties of
    segmentation masks that are closely related to the respective structures. In this
    work we introduce FlowSDF, an image-guided conditional flow matching framework,
    designed to represent the signed distance function (SDF), and, in turn, to represent
    an implicit distribution of segmentation masks. The advantage of leveraging the
    SDF is a more natural distortion when compared to that of binary masks. Through
    the learning of a vector field associated with the probability path of conditional
    SDF distributions, our framework enables accurate sampling of segmentation masks
    and the computation of relevant statistical measures. This probabilistic approach
    also facilitates the generation of uncertainty maps represented by the variance,
    thereby supporting enhanced robustness in prediction and further analysis. We
    qualitatively and quantitatively illustrate competitive performance of the proposed
    method on a public nuclei and gland segmentation data set, highlighting its utility
    in medical image segmentation applications.
