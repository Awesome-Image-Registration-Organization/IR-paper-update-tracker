- author: Zhixin Cheng, Xiaotian Yin, Jiacheng Deng 0002, Bohao Liao, Yujia Chen,
    Xu Zhou, Baoqun Yin, Tianzhu Zhang 0001
  title: Adaptive Agent Selection and Interaction Network for Image-to-Point Cloud
    Registration.
  venue: AAAI
  year: '2026'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ChengYDLCZYZ26
  doi: 10.1609/AAAI.V40I5.37329
  ee: https://doi.org/10.1609/aaai.v40i5.37329
  url: https://dblp.org/rec/conf/aaai/ChengYDLCZYZ26
  abstract: 'Typical detection-free methods for image-to-point cloud registration
    leverage transformer-based architectures to aggregate cross-modal features and
    establish correspondences. However, they often struggle under challenging conditions,
    where noise disrupts similarity computation and leads to incorrect correspondences.
    Moreover, without dedicated designs, it remains difficult to effectively select
    informative and correlated representations across modalities, thereby limiting
    the robustness and accuracy of registration. To address these challenges, we propose
    a novel cross-modal registration framework composed of two key modules: the Iterative
    Agents Selection (IAS) module and the Reliable Agents Interaction (RAI) module.
    IAS enhances structural feature awareness with phase maps and employs reinforcement
    learning principles to efficiently select reliable agents. RAI then leverages
    these selected agents to guide cross-modal interactions, effectively reducing
    mismatches and improving overall robustness. Extensive experiments on the RGB-D
    Scenes v2 and 7-Scenes benchmarks demonstrate that our method consistently achieves
    state-of-the-art performance.'
- author: Liwen Li, Xinrui Guo, Wentao Guo, Shunqi Yang, Fumin Guo
  title: 'DFMN: A Dual-feet Matching Network with Hybrid Transformer-based Feature
    Extractor for Unsupervised Deformable Medical Image Registration.'
  venue: AAAI
  year: '2026'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/LiGGYG26
  doi: 10.1609/AAAI.V40I8.37559
  ee: https://doi.org/10.1609/aaai.v40i8.37559
  url: https://dblp.org/rec/conf/aaai/LiGGYG26
  abstract: Deformable medical image registration is essential in medical image analyses.
    Recent transformer-based registration methods have achieved high registration
    accuracy. However, these methods often rely on patch embedding at the beginning
    of encoding, resulting in limited ability to capture detailed anatomical structural
    information in the images and explore local semantic relationships within individual
    patches. Here, we proposed a novel Dual-feet Encoder (DFEnc) to asynchronously
    model semantic information from moving and fixed images at various scales through
    two separate branches in three steps. For each step, features from adjacent resolution
    levels were processed by a Single Step Hybrid Extractor (SSHExt), which performed
    patch convolution to preserve local information, followed by several transformer
    blocks to capture global context. Dense connections were employed to enhance semantic
    awareness across adjacent feature resolution levels. Additionally, we introduced
    a Feature Fusion-based Decoder (FFDec) to progressively fuse features related
    to the fixed and moving images and to generate intermediate deformation fields
    at each stage, enabling accurate image alignment through stepwise warping and
    alignment refinement. Extensive ablation studies demonstrated the effectiveness
    of the proposed DFEnc, SSHExt, and FFDec. Compared to a state-of-the-art AutoFuse-Trans
    method, our approach yielded improvements in Dice of 1.14%, 1.77%, and 4.47% on
    the ACDC, OASIS, and Abdomen CT datasets, respectively, while maintaining relatively
    low computational cost. These results suggest the utility of the proposed approach
    for broad research and clinical applications.
- author: Shuyuan Lin, Wenwu Peng, Junjie Huang, Qiang Qi, Miaohui Wang, Jian Weng
    0001
  title: 'MCI-Net: A Robust Multi-Domain Context Integration Network for Point Cloud
    Registration.'
  venue: AAAI
  year: '2026'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/LinPHQWW26
  doi: 10.1609/AAAI.V40I28.39531
  ee: https://doi.org/10.1609/aaai.v40i28.39531
  url: https://dblp.org/rec/conf/aaai/LinPHQWW26
  abstract: Robust and discriminative feature learning is critical for high-quality
    point cloud registration. However, existing deep learning–based methods typically
    rely on Euclidean neighborhood-based strategies for feature extraction, which
    struggle to effectively capture the implicit semantics and structural consistency
    in point clouds. To address these issues, we propose a multi-domain context integration
    network (MCI-Net) that improves feature representation and registration performance
    by aggregating contextual cues from diverse domains. Specifically, we propose
    a graph neighborhood aggregation module, which constructs a global graph to capture
    the overall structural relationships within point clouds. We then propose a progressive
    context interaction module to enhance feature discriminability by performing intra-domain
    feature decoupling and inter-domain context interaction. Finally, we design a
    dynamic inlier selection method that optimizes inlier weights using residual information
    from multiple iterations of pose estimation, thereby improving the accuracy and
    robustness of registration. Extensive experiments on indoor RGB-D and outdoor
    LiDAR datasets show that the proposed MCI-Net significantly outperforms existing
    state-of-the-art methods, achieving the highest registration recall of 96.4% on
    3DMatch.
- author: Junhui Qiu, Xiang Xiang 0001, Hongyun Wang, Jiaqi Gui
  title: 'AerialFusion: Co-Motion-Driven Unified Registration and Fusion on Multi-modal
    Data Streams from Aerial View.'
  venue: AAAI
  year: '2026'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/QiuXWG26
  doi: 10.1609/AAAI.V40I10.37810
  ee: https://doi.org/10.1609/aaai.v40i10.37810
  url: https://dblp.org/rec/conf/aaai/QiuXWG26
  abstract: Aerial multi-modal visual streams registration and fusion can generate
    more comprehensive scene information representations for UAVs' cross-modal perception.
    However, current challenges lie primarily in the essential difficulty of joint
    spatiotemporal representation learning from dynamic background and moving targets,
    and a critical shortage exists in large-scale, well-annotated multi-modal visual
    streams benchmark for UAV platforms. In this paper, we propose AerialFusion, a
    co-motion-driven unified UAVs visual streams registration and fusion that fully
    mines modality-invariant common features based on motion-aware, enabling spatiotemporally
    coherent registration and fusion. Specifically, 1) a Skewed Motion Distribution
    Field Co-Motion-Driven Image Registration, 2) a Co-Motion Generative Fusion, 3)
    a Streams-based Unified Learning. Furthermore, we introduce EUM3D, a registration
    and fusion benchmark for UAVs cross-modal perception. This benchmark contains
    60 synchronized visible-infrared visual streams, or 122k spatially and temporally
    aligned pairs, most of which were taken at low-light scenes. And EUM3D provides
    pixel-level alignment guarantees via perspective-transform ground-truth. Extensive
    experiments reveal that AerialFusion surpasses current focus on image and static
    background fusion methods in aerial sequence scenarios, addressing spatiotemporal
    mismatches while suppressing cross-modal interference.
- author: Haodong Wang, Tao Zhuo, Xiuwei Zhang 0001, Hanlin Yin, Wencong Wu, Yanning
    Zhang 0001
  title: 'SOMA: Feature Gradient Enhanced Affine-Flow Matching for SAR-Optical Registration.'
  venue: AAAI
  year: '2026'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/WangZZYWZ26
  doi: 10.1609/AAAI.V40I12.37939
  ee: https://doi.org/10.1609/aaai.v40i12.37939
  url: https://dblp.org/rec/conf/aaai/WangZZYWZ26
  abstract: Achieving pixel-level registration between SAR and optical images remains
    a challenging task due to their fundamentally different imaging mechanisms and
    visual characteristics. Although deep learning has achieved great success in many
    cross-modal tasks, its performance on SAR-Optical registration tasks is still
    unsatisfactory. Gradient-based information has traditionally played a crucial
    role in handcrafted descriptors by highlighting structural differences. However,
    such gradient cues have not been effectively leveraged in deep learning frameworks
    for SAR-Optical image matching. To address this gap, we propose SOMA, a dense
    registration framework that integrates structural gradient priors into deep features
    and refines alignment through a hybrid matching strategy. Specifically, we introduce
    the Feature Gradient Enhancer (FGE), which embeds multi-scale, multi-directional
    gradient filters into the feature space using attention and reconstruction mechanisms
    to boost feature distinctiveness. Furthermore, we propose the Global-Local Affine-Flow
    Matcher (GLAM), which combines affine transformation and flow-based refinement
    within a coarse-to-fine architecture to ensure both structural consistency and
    local accuracy. Experimental results demonstrate that SOMA significantly improves
    registration precision, increasing the CMR@1px by 12.29% on the SEN1-2 dataset
    and 18.50% on the GFGE_SO dataset. In addition, SOMA exhibits strong robustness
    and generalizes well across diverse scenes and resolutions.
- author: Zhixin Cheng, Jiacheng Deng 0002, Xinjun Li, Baoqun Yin, Tianzhu Zhang 0001
  title: 'Bridge 2D-3D: Uncertainty-aware Hierarchical Registration Network with Domain
    Alignment.'
  venue: AAAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/Cheng0LYZ25
  doi: 10.1609/AAAI.V39I3.32251
  ee: https://doi.org/10.1609/aaai.v39i3.32251
  url: https://dblp.org/rec/conf/aaai/Cheng0LYZ25
  abstract: The method for image-to-point cloud registration typically determines
    the rigid transformation using a coarse-to-fine pipeline. However, directly and
    uniformly matching image patches with point cloud patches may lead to focusing
    on incorrect noise patches during matching while ignoring key ones. Moreover,
    due to the significant differences between image and point cloud modalities, it
    may be challenging to bridge the domain gap without specific improvements in design.
    To address the above issues, we innovatively propose the Uncertainty-aware Hierarchical
    Matching Module (UHMM) and the Adversarial Modal Alignment Module (AMAM). Within
    the UHMM, we model the uncertainty of critical information in image patches and
    facilitate multi-level fusion interactions between image and point cloud features.
    In the AMAM, we design an adversarial approach to reduce the domain gap between
    image and point cloud. Extensive experiments and ablation studies on RGB-D Scene
    V2 and 7-Scenes benchmarks demonstrate the superiority of our method, making it
    a state-of-the-art approach for image-to-point cloud registration tasks.
- author: Keyu Du, Hao Xu 0018, Haipeng Li 0001, Hong Qu, Chi-Wing Fu, Shuaicheng
    Liu
  title: 'HybridReg: Robust 3D Point Cloud Registration with Hybrid Motions.'
  venue: AAAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/DuX0QFL25
  doi: 10.1609/AAAI.V39I3.32284
  ee: https://doi.org/10.1609/aaai.v39i3.32284
  url: https://dblp.org/rec/conf/aaai/DuX0QFL25
  abstract: 'Scene-level point cloud registration is very challenging when considering
    dynamic foregrounds. Existing indoor datasets mostly assume rigid motions, so
    the trained models cannot robustly handle scenes with non-rigid motions. On the
    other hand, non-rigid datasets are mainly object-level, so the trained models
    cannot generalize well to complex scenes. This paper presents HybridReg, a new
    approach to 3D point cloud registration, learning uncertainty mask to account
    for hybrid motions: rigid for backgrounds and non-rigid/rigid for instance-level
    foregrounds. First, we build a scene-level 3D registration dataset, namely HybridMatch,
    designed specifically with strategies to arrange diverse deforming foregrounds
    in a controllable manner. Second, we account for different motion types and formulate
    a mask-learning module to alleviate the interference of deforming outliers. Third,
    we exploit a simple yet effective negative log-likelihood loss to adopt uncertainty
    to guide the feature extraction and correlation computation. To our best knowledge,
    HybridReg is the first work that exploits hybrid motions for robust point cloud
    registration. Extensive experiments show HybridReg''s strengths, leading it to
    achieve state-of-the-art performance on both widely-used indoor and outdoor datasets.'
- author: Xiaoshui Huang, Zhou Huang 0006, Yifan Zuo 0001, Yongshun Gong, Chengdong
    Zhang, Deyang Liu, Yuming Fang 0001
  title: 'PSReg: Prior-guided Sparse Mixture of Experts for Point Cloud Registration.'
  venue: AAAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/HuangHZGZLF25
  doi: 10.1609/AAAI.V39I4.32395
  ee: https://doi.org/10.1609/aaai.v39i4.32395
  url: https://dblp.org/rec/conf/aaai/HuangHZGZLF25
  abstract: The discriminative feature is crucial for point cloud registration. Recent
    methods improve the feature discriminative by distinguishing between non-overlapping
    and overlapping region points. However, they still face challenges in distinguishing
    the ambiguous structures in the overlapping regions. Therefore, the ambiguous
    features they extracted resulted in a significant number of outlier matches from
    overlapping regions. To solve this problem, we propose a prior-guided SMoE-based
    registration method to improve the feature distinctiveness by dispatching the
    potential correspondences to the same experts. Specifically, we propose a prior-guided
    SMoE module by fusing prior overlap and potential correspondence embeddings for
    routing, assigning tokens to the most suitable experts for processing. In addition,
    we propose a registration framework by a specific combination of Transformer layer
    and prior-guided SMoE module. The proposed method not only pays attention to the
    importance of locating the overlapping areas of point clouds, but also commits
    to finding more accurate correspondences in overlapping areas. Our extensive experiments
    demonstrate the effectiveness of our method, achieving state-of-the-art registration
    recall (95.7%/79.3%) on the 3DMatch/3DLoMatch benchmark. Moreover, we also test
    the performance on ModelNet40 and demonstrate excellent performance.
- author: Yihao, Limei Hu, Feng Chen 0023, Sen Zhao 0001, Shukai Duan 0001
  title: 'GRICP: Granular-Ball Iterative Closest Point with Multikernel Correntropy
    for Point Cloud Fine Registration.'
  venue: AAAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/YihaoH0Z025
  doi: 10.1609/AAAI.V39I2.32164
  ee: https://doi.org/10.1609/aaai.v39i2.32164
  url: https://dblp.org/rec/conf/aaai/YihaoH0Z025
  abstract: The Iterative Closest Point (ICP) algorithm suffers from sensitivity to
    outliers and tendency to local optima in point cloud fine registration. In this
    paper, we introduce a global and robust ICP framework called Granular-Ball Iterative
    Closest Point with MultiKernel Correntropy (GRICP). This approach transforms the
    point cloud into a granular ball cloud and employs MultiKernel Correntropy (MKC)
    as the loss function, which is designed to smooth out the effects of noise points
    and provide global information for registration. Specifically, we propose a coarse-grained
    representation of the point cloud using the granular ball model, which adaptively
    captures the coarse-grained features of the data and converts the point cloud
    into a multi-granularity ball cloud. The normal points within each granular ball
    help mitigate the influence of noise points. To ensure that ICP finds the globally
    optimal transformation, MKC is introduced to measure the distribution of registration
    errors, thereby offering global insights for ICP to achieve the optimal solution.
    The transformations based on MKC and the granular ball cloud are then derived.
    Extensive experiments on both simulated and real-world datasets demonstrate that
    GRICP delivers superior registration performance, particularly in scenarios involving
    large rotation offsets, partial overlaps, and Gaussian noise.
- author: Yongzhe Yuan, Yue Wu 0004, Xiaolong Fan, Maoguo Gong, Qiguang Miao, Wenping
    Ma 0001
  title: 'Where Precision Meets Efficiency: Transformation Diffusion Model for Point
    Cloud Registration.'
  venue: AAAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/Yuan0FGM025
  doi: 10.1609/AAAI.V39I9.33055
  ee: https://doi.org/10.1609/aaai.v39i9.33055
  url: https://dblp.org/rec/conf/aaai/Yuan0FGM025
  abstract: 'We propose a transformation diffusion model for point cloud registration
    to balance precision and efficiency. Our method formulates point cloud registration
    as a denoising diffusion process from noisy transformation to object transformation,
    which is represented by quaternion and translation. Specifically, in training
    stage, object transformation diffuses from ground-truth transformation to random
    distribution, and the model learns to reverse this noising process. In sampling
    stage, the model refines randomly generated transformation to the optimal transformation
    in a progressive way. We derive the variational bound in closed form for training
    and provide instantiation of the model. Our diffusion model maps transformation
    into latent space, and splits the transformation into two components (rotation
    and translation) based on the fact that they belong to different solution spaces.
    In addition, our work provides the following crucial findings: (i) Point cloud
    registration, one of the representative discriminative tasks, can be solved by
    a generative way and mapped into latent space to obtain new unified probabilistic
    formulation. (ii) Our model, Transformation Diffusion Model (TDM) can be a plug-and-play
    agent for point cloud registration, making our method applicable to different
    deep registration networks. Experimental results on synthetic and real-world datasets
    demonstrate that, in correspondence-free and correspondence-based scenarios, TDM
    can both achieve exceeding 60% performance improvements and higher efficiency
    simultaneously.'
- author: Yue Zhang 0040, Yue Wu 0004, Wenping Ma 0001, Maoguo Gong, Hao Li 0009,
    Biao Hou
  title: Partial Point Cloud Registration with Multi-view 2D Image Learning.
  venue: AAAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/Zhang00GLH25
  doi: 10.1609/AAAI.V39I10.33121
  ee: https://doi.org/10.1609/aaai.v39i10.33121
  url: https://dblp.org/rec/conf/aaai/Zhang00GLH25
  abstract: Learning representations from numerous 2D image data has shown promising
    performance, yet very few works apply this representations to point cloud registration.
    In this paper, we explore how to leverage the 2D information to assist the point
    cloud registration, and propose IAPReg, an Image-Assisted Partial 3D point cloud
    Registration framework with the multi-view images generated by the input point
    cloud. It is expected to enrich 3D information with 2D knowledge, and leverage
    2D knowledge to assist with point cloud registration. Specifically, we create
    multi-view depth maps by projecting the input point cloud from several specific
    views, and then extract 2D and 3D features using some well-established models.
    To fuse the information learned from 2D and 3D modalities, inter-modality multi-view
    learning module is proposed to enhance geometric information and complement semantic
    information. Weighted SVD is a common method to reduce the impact of inaccurate
    correspondences on registration. However, determining the correspondence weights
    is not trivial. Therefore, we design a 2D-weighted SVD method, where the 2D knowledge
    is employed to provide weight information of correspondences. Extensive experiments
    perform that our method outperform the state-of-the-art method without additional
    2D training data.
- author: Zhenbang Zhang, Hongjia Li 0001, Zhiqiang Xu, Wenjia Meng, Renmin Han
  title: A Gaussian Filter-Based 3D Registration Method for Series Section Electron
    Microscopy.
  venue: AAAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ZhangLXMH25
  doi: 10.1609/AAAI.V39I1.32103
  ee: https://doi.org/10.1609/aaai.v39i1.32103
  url: https://dblp.org/rec/conf/aaai/ZhangLXMH25
  abstract: Series Section Electron Microscopy (ssEM) is a crucial technique for visualizing
    three-dimensional (3D) biological structures, which involves collecting electron
    microscopy images from a series of biological sections along the z-axis and reconstructing
    the 3D structure. 3D registration is an essential step in ssEM, designed to eliminate
    axial misalignment and nonlinear distortions introduced during sample sectioning.
    A significant challenge in 3D registration is eliminating nonlinear distortions
    while preserving natural deformations. In this paper, we present a new formulation
    of the 3D registration problem from a frequency domain perspective and propose
    a Gaussian filtering-based 3D registration method, which defines 3D registration
    as a superposition problem of high-frequency and low-frequency components. We
    extend the concept of a one-dimensional Gaussian filter to three-dimensional image
    stacks and integrate it with optical flow networks to consolidate the deformation
    field within the receptive field. Extensive experiments demonstrate that our method
    can successfully decouple nonlinear distortions and natural deformations in the
    frequency domain, proving superior to existing methods in rapidly and accurately
    eliminating nonlinear distortions and restoring biological structures, and has
    the potential to be extended to large datasets.
- author: Guiyu Zhao, Zhentao Guo, Zewen Du, Hongbin Ma
  title: 'Cross-PCR: A Robust Cross-Source Point Cloud Registration Framework.'
  venue: AAAI
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ZhaoGDM25
  doi: 10.1609/AAAI.V39I10.33129
  ee: https://doi.org/10.1609/aaai.v39i10.33129
  url: https://dblp.org/rec/conf/aaai/ZhaoGDM25
  abstract: Due to the density inconsistency and distribution difference between cross-source
    point clouds, previous methods fail in cross-source point cloud registration.
    We propose a density-robust feature extraction and matching scheme to achieve
    robust and accurate cross-source registration. To address the density inconsistency
    between cross-source data, we introduce a density-robust encoder for extracting
    density-robust features. To tackle the issue of challenging feature matching and
    few correct correspondences, we adopt a loose-to-strict matching pipeline with
    a ``loose generation, strict selection'' idea. Under it, we employ a one-to-many
    strategy to loosely generate initial correspondences. Subsequently, high-quality
    correspondences are strictly selected to achieve robust registration through sparse
    matching and dense matching. On the challenging Kinect-LiDAR scene in the cross-source
    3DCSR dataset, our method improves feature matching recall by 63.5 percentage
    points (pp) and registration recall by 57.6 pp. It also achieves the best performance
    on 3DMatch, while maintaining robustness under diverse downsampling densities.
- author: Shenglong Zhou 0002, Zhiwei Xiong, Feng Wu 0001
  title: Test-Time Adaptation via Style and Structure Guidance for Histological Image
    Registration.
  venue: AAAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/0002XW24
  doi: 10.1609/AAAI.V38I7.28601
  ee: https://doi.org/10.1609/aaai.v38i7.28601
  url: https://dblp.org/rec/conf/aaai/0002XW24
  abstract: Image registration plays a crucial role in histological image analysis,
    encompassing tasks like multi-modality fusion and disease grading. Traditional
    registration methods optimize objective functions for each image pair, yielding
    reliable accuracy but demanding heavy inference burdens. Recently, learning-based
    registration methods utilize networks to learn the optimization process during
    training and apply a one-step forward process during testing. While these methods
    offer promising registration performance with reduced inference time, they remain
    sensitive to appearance variances and local structure changes commonly encountered
    in histological image registration scenarios. In this paper, for the first time,
    we propose a novel test-time adaptation method for histological image registration,
    aiming to improve the generalization ability of learning-based methods. Specifically,
    we design two operations, style guidance and shape guidance, for the test-time
    adaptation process. The former leverages style representations encoded by feature
    statistics to address the issue of appearance variances, while the latter incorporates
    shape representations encoded by HOG features to improve registration accuracy
    in regions with structural changes. Furthermore, we consider the continuity of
    the model during the test-time adaptation process. Different from the previous
    methods initialized by a given trained model, we introduce a smoothing strategy
    to leverage historical models for better generalization. We conduct experiments
    with several representative learning-based backbones on the public histological
    dataset, demonstrating the superior registration performance of our test-time
    adaptation method.
- author: Rui She 0001, Sijie Wang, Qiyu Kang, Kai Zhao 0010, Yang Song 0012, Wee
    Peng Tay, Tianyu Geng, Xingchao Jian
  title: 'PosDiffNet: Positional Neural Diffusion for Point Cloud Registration in
    a Large Field of View with Perturbations.'
  venue: AAAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/SheWKZSTGJ24
  doi: 10.1609/AAAI.V38I1.27775
  ee: https://doi.org/10.1609/aaai.v38i1.27775
  url: https://dblp.org/rec/conf/aaai/SheWKZSTGJ24
  abstract: Point cloud registration is a crucial technique in 3D computer vision
    with a wide range of applications. However, this task can be challenging, particularly
    in large fields of view with dynamic objects, environmental noise, or other perturbations.
    To address this challenge, we propose a model called PosDiffNet. Our approach
    performs hierarchical registration based on window-level, patch-level, and point-level
    correspondence. We leverage a graph neural partial differential equation (PDE)
    based on Beltrami flow to obtain high-dimensional features and position embeddings
    for point clouds. We incorporate position embeddings into a Transformer module
    based on a neural ordinary differential equation (ODE) to efficiently represent
    patches within points. We employ the multi-level correspondence derived from the
    high feature similarity scores to facilitate alignment between point clouds. Subsequently,
    we use registration methods such as SVD-based algorithms to predict the transformation
    using corresponding point pairs. We evaluate PosDiffNet on several 3D point cloud
    datasets, verifying that it achieves state-of-the-art (SOTA) performance for point
    cloud registration in large fields of view with perturbations. The implementation
    code of experiments is available at https://github.com/AI-IT-AVs/PosDiffNet.
- author: Yu Wang, Xiaoye Wang, Zaiwang Gu, Weide Liu, Wee Siong Ng, Weimin Huang
    0002, Jun Cheng 0003
  title: 'SuperJunction: Learning-Based Junction Detection for Retinal Image Registration.'
  venue: AAAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/WangWGLNH024
  doi: 10.1609/AAAI.V38I1.27782
  ee: https://doi.org/10.1609/aaai.v38i1.27782
  url: https://dblp.org/rec/conf/aaai/WangWGLNH024
  abstract: Keypoints-based approaches have shown to be promising for retinal image
    registration, which superimpose two or more images from different views based
    on keypoint detection and description. However, existing approaches suffer from
    ineffective keypoint detector and descriptor training. Meanwhile, the non-linear
    mapping from 3D retinal structure to 2D images is often neglected. In this paper,
    we propose a novel learning-based junction detection approach for retinal image
    registration, which enhances both the keypoint detector and descriptor training.
    To improve the keypoint detection, it uses a multi-task vessel detection to regularize
    the model training, which helps to learn more representative features and reduce
    the risk of over-fitting. To achieve effective training for keypoints description,
    a new constrained negative sampling approach is proposed to compute the descriptor
    loss. Moreover, we also consider the non-linearity between retinal images from
    different views during matching. Experimental results on FIRE dataset show that
    our method achieves mean area under curve of 0.850, which is 12.6% higher than
    0.755 by the state-of-the-art method. All the codes are available at https://github.com/samjcheng/SuperJunction.
- author: Kezheng Xiong, Maoji Zheng, Qingshan Xu, Chenglu Wen, Siqi Shen, Cheng Wang
    0003
  title: 'SPEAL: Skeletal Prior Embedded Attention Learning for Cross-Source Point
    Cloud Registration.'
  venue: AAAI
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/XiongZXWSW24
  doi: 10.1609/AAAI.V38I6.28446
  ee: https://doi.org/10.1609/aaai.v38i6.28446
  url: https://dblp.org/rec/conf/aaai/XiongZXWSW24
  abstract: Point cloud registration, a fundamental task in 3D computer vision, has
    remained largely unexplored in cross-source point clouds and unstructured scenes.
    The primary challenges arise from noise, outliers, and variations in scale and
    density. However, neglected geometric natures of point clouds restricts the performance
    of current methods. In this paper, we propose a novel method termed SPEAL to leverage
    skeletal representations for effective learning of intrinsic topologies of point
    clouds, facilitating robust capture of geometric intricacy. Specifically, we design
    the Skeleton Extraction Module to extract skeleton points and skeletal features
    in an unsupervised manner, which is inherently robust to noise and density variances.
    Then, we propose the Skeleton-Aware GeoTransformer to encode high-level skeleton-aware
    features. It explicitly captures the topological natures and inter-point-cloud
    skeletal correlations with the noise-robust and density-invariant skeletal representations.
    Next, we introduce the Correspondence Dual-Sampler to facilitate correspondences
    by augmenting the correspondence set with skeletal correspondences. Furthermore,
    we construct a challenging novel cross-source point cloud dataset named KITTI
    CrossSource for benchmarking cross-source point cloud registration methods. Extensive
    quantitative and qualitative experiments are conducted to demonstrate our approach’s
    superiority and robustness on both cross-source and same-source datasets. To the
    best of our knowledge, our approach is the first to facilitate point cloud registration
    with skeletal geometric priors.
- author: Xi Jia, Joseph Bartlett, Wei Chen 0092, Siyang Song, Tianyang Zhang 0003,
    Xinxing Cheng, Wenqi Lu 0001, Zhaowen Qiu, Jinming Duan 0001
  title: 'Fourier-Net: Fast Image Registration with Band-Limited Deformation.'
  venue: AAAI
  year: '2023'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/JiaB0SZC0Q023
  doi: 10.1609/AAAI.V37I1.25182
  ee: https://doi.org/10.1609/aaai.v37i1.25182
  url: https://dblp.org/rec/conf/aaai/JiaB0SZC0Q023
  abstract: Unsupervised image registration commonly adopts U-Net style networks to
    predict dense displacement fields in the full-resolution spatial domain. For high-resolution
    volumetric image data, this process is however resource-intensive and time-consuming.
    To tackle this problem, we propose the Fourier-Net, replacing the expansive path
    in a U-Net style network with a parameter-free model-driven decoder. Specifically,
    instead of our Fourier-Net learning to output a full-resolution displacement field
    in the spatial domain, we learn its low-dimensional representation in a band-limited
    Fourier domain. This representation is then decoded by our devised model-driven
    decoder (consisting of a zero padding layer and an inverse discrete Fourier transform
    layer) to the dense, full-resolution displacement field in the spatial domain.
    These changes allow our unsupervised Fourier-Net to contain fewer parameters and
    computational operations, resulting in faster inference speeds. Fourier-Net is
    then evaluated on two public 3D brain datasets against various state-of-the-art
    approaches. For example, when compared to a recent transformer-based method, named
    TransMorph, our Fourier-Net, which only uses 2.2% of its parameters and 6.66%
    of the multiply-add operations, achieves a 0.5% higher Dice score and an 11.48
    times faster inference speed. Code is available at https://github.com/xi-jia/Fourier-Net.
- author: Meng Li, Yahan Yu, Yi Yang 0019, Guanghao Ren, Jian Wang 0029
  title: Stroke Extraction of Chinese Character Based on Deep Structure Deformable
    Image Registration.
  venue: AAAI
  year: '2023'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/LiYYRW23
  doi: 10.1609/AAAI.V37I1.25220
  ee: https://doi.org/10.1609/aaai.v37i1.25220
  url: https://dblp.org/rec/conf/aaai/LiYYRW23
  abstract: 'Stroke extraction of Chinese characters plays an important role in the
    field of character recognition and generation. The most existing character stroke
    extraction methods focus on image morphological features. These methods usually
    lead to errors of cross strokes extraction and stroke matching due to rarely using
    stroke semantics and prior information. In this paper, we propose a deep learning-based
    character stroke extraction method that takes semantic features and prior information
    of strokes into consideration. This method consists of three parts: image registration-based
    stroke registration that establishes the rough registration of the reference strokes
    and the target as prior information; image semantic segmentation-based stroke
    segmentation that preliminarily separates target strokes into seven categories;
    and high-precision extraction of single strokes. In the stroke registration, we
    propose a structure deformable image registration network to achieve structure-deformable
    transformation while maintaining the stable morphology of single strokes for character
    images with complex structures. In order to verify the effectiveness of the method,
    we construct two datasets respectively for calligraphy characters and regular
    handwriting characters. The experimental results show that our method strongly
    outperforms the baselines. Code is available at https://github.com/MengLi-l1/StrokeExtraction.'
- author: Jianhui Yu, Chaoyi Zhang, Weidong Cai 0001
  title: Rethinking Rotation Invariance with Point Cloud Registration.
  venue: AAAI
  year: '2023'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/YuZ023
  doi: 10.1609/AAAI.V37I3.25438
  ee: https://doi.org/10.1609/aaai.v37i3.25438
  url: https://dblp.org/rec/conf/aaai/YuZ023
  abstract: 'Recent investigations on rotation invariance for 3D point clouds have
    been devoted to devising rotation-invariant feature descriptors or learning canonical
    spaces where objects are semantically aligned. Examinations of learning frameworks
    for invariance have seldom been looked into. In this work, we review rotation
    invariance (RI) in terms of point cloud registration (PCR) and propose an effective
    framework for rotation invariance learning via three sequential stages, namely
    rotation-invariant shape encoding, aligned feature integration, and deep feature
    registration. We first encode shape descriptors constructed with respect to reference
    frames defined over different scales, e.g., local patches and global topology,
    to generate rotation-invariant latent shape codes. Within the integration stage,
    we propose an Aligned Integration Transformer (AIT) to produce a discriminative
    feature representation by integrating point-wise self- and cross-relations established
    within the shape codes. Meanwhile, we adopt rigid transformations between reference
    frames to align the shape codes for feature consistency across different scales.
    Finally, the deep integrated feature is registered to both rotation-invariant
    shape codes to maximize their feature similarities, such that rotation invariance
    of the integrated feature is preserved and shared semantic information is implicitly
    extracted from shape codes. Experimental results on 3D shape classification, part
    segmentation, and retrieval tasks prove the feasibility of our framework. Our
    project page is released at: https://rotation3d.github.io/.'
