- author: Ali Gooya, Kilian M. Pohl, Michel Bilello, George Biros, Christos Davatzikos
  title: Joint Segmentation and Deformable Registration of Brain Scans Guided by a
    Tumor Growth Model.
  venue: MICCAI
  year: '2011'
  type: Conference and Workshop Papers
  access: open
  key: conf/miccai/GooyaPBBD11
  doi: 10.1007/978-3-642-23629-7_65
  ee: https://doi.org/10.1007/978-3-642-23629-7_65
  url: https://dblp.org/rec/conf/miccai/GooyaPBBD11
  abstract: This paper presents an approach for joint segmentation and deformable
    registration of brain scans of glioma patients to a normal atlas. The proposed
    method is based on the Expectation Maximization (EM) algorithm that incorporates
    a glioma growth model for atlas seeding, a process which modifies the normal atlas
    into one with a tumor and edema. The modified atlas is registered into the patient
    space and utilized for the posterior probability estimation of various tissue
    labels. EM iteratively refines the estimates of the registration parameters, the
    posterior probabilities of tissue labels and the tumor growth model parameters.
    We have applied this approach to 10 glioma scans acquired with four Magnetic Resonance
    (MR) modalities (T1, T1-CE, T2 and FLAIR ) and validated the result by comparing
    them to manual segmentations by clinical experts. The resulting segmentations
    look promising and quantitatively match well with the expert provided ground truth.
