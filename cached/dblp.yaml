  url: https://dblp.org/rec/journals/ijcv/LinLXWY24
  abstract: Recent optical flow estimators usually employ deep models designed for
    image classification as the encoders for feature extraction and matching. However,
    those encoders developed for image classification may be sub-optimal for flow
    estimation. In contrast, the decoder design of optical flow estimators often requires
    meticulous design for flow estimation. The disconnect between the encoder and
    decoder could negatively affect optical flow estimation. To address this issue,
    we propose a neural architecture search method, FlowNAS, to automatically find
    the more suitable and stronger encoder architecture for existing flow decoders.
    We first design a suitable search space, including various convolutional operators,
    and construct a weight-sharing super-network for efficiently evaluating the candidate
    architectures. To better train the super-network, we present a Feature Alignment
    Distillation module that utilizes a well-trained flow estimator to guide the training
    of the super-network. Finally, a resource-constrained evolutionary algorithm is
    exploited to determine an optimal architecture (i.e., sub-network). Experimental
    results show that FlowNAS can be easily incorporated into existing flow estimators
    and achieves state-of-the-art performance with the trade-off between accuracy
    and efficiency. Furthermore, the encoder architecture discovered by FlowNAS with
    the weights inherited from the super-network achieves 4.67% F1-all error on KITTI,
    an 8.4% reduction of RAFT baseline, surpassing state-of-the-art handcrafted GMA
    and AGFlow models, while reducing the model complexity and latency. The source
    code and trained models will be released at https://github.com/VDIGPKU/FlowNAS.
  related_code: https://github.com/VDIGPKU/FlowNAS
