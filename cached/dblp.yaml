- author: Shuo Wang 0011, Chen Qin, Nicoló Savioli, Chen Chen 0042, Declan P. O&apos;Regan,
    Stuart A. Cook, Yike Guo, Daniel Rueckert, Wenjia Bai
  title: Joint Motion Correction and Super Resolution for Cardiac Segmentation via
    Latent Optimisation.
  venue: MICCAI
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/WangQSCOCGRB21
  doi: 10.1007/978-3-030-87199-4_2
  ee: https://doi.org/10.1007/978-3-030-87199-4_2
  url: https://dblp.org/rec/conf/miccai/WangQSCOCGRB21
  abstract: In cardiac magnetic resonance (CMR) imaging, a 3D high-resolution segmentation
    of the heart is essential for detailed description of its anatomical structures.
    However, due to the limit of acquisition duration and respiratory/cardiac motion,
    stacks of multi-slice 2D images are acquired in clinical routine. The segmentation
    of these images provides a low-resolution representation of cardiac anatomy, which
    may contain artefacts caused by motion. Here we propose a novel latent optimisation
    framework that jointly performs motion correction and super resolution for cardiac
    image segmentations. Given a low-resolution segmentation as input, the framework
    accounts for inter-slice motion in cardiac MR imaging and super-resolves the input
    into a high-resolution segmentation consistent with input. A multi-view loss is
    incorporated to leverage information from both short-axis view and long-axis view
    of cardiac imaging. To solve the inverse problem, iterative optimisation is performed
    in a latent space, which ensures the anatomical plausibility. This alleviates
    the need of paired low-resolution and high-resolution images for supervised learning.
    Experiments on two cardiac MR datasets show that the proposed framework achieves
    high performance, comparable to state-of-the-art super-resolution approaches and
    with better cross-domain generalisability and anatomical plausibility.
  related_code: ''
- author: Nuobei Xie, Kuang Gong, Ning Guo, ZhiXing Qin, Jianan Cui, Zhifang Wu, Huafeng
    Liu 0003, Quanzheng Li
  title: Clinically Translatable Direct Patlak Reconstruction from Dynamic PET with
    Motion Correction Using Convolutional Neural Network.
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/XieGGQCWLL20
  doi: 10.1007/978-3-030-59728-3_77
  ee: https://doi.org/10.1007/978-3-030-59728-3_77
  url: https://dblp.org/rec/conf/miccai/XieGGQCWLL20
  abstract: Patlak model is widely used in 18F-FDG dynamic positron emission tomography
    (PET) imaging, where the estimated parametric images reveal important biochemical
    and physiology information. Because of better noise modeling and more information
    extracted from raw sinogram, direct Patlak reconstruction gains its popularity
    over the indirect approach which utilizes reconstructed dynamic PET images alone.
    As the prerequisite of direct Patlak methods, raw data from dynamic PET are rarely
    stored in clinics and difficult to obtain. In addition, the direct reconstruction
    is time-consuming due to the bottleneck of multiple-frame reconstruction. All
    of these impede the clinical adoption of direct Patlak this http URL this work,
    we proposed a data-driven framework which maps the dynamic PET images to the high-quality
    motion-corrected direct Patlak images through a convolutional neural network.
    For the patient motion during the long period of dynamic PET scan, we combined
    the correction with the backward/forward projection in direct reconstruction to
    better fit the statistical model. Results based on fifteen clinical 18F-FDG dynamic
    brain PET datasets demonstrates the superiority of the proposed framework over
    Gaussian, nonlocal mean and BM4D denoising, regarding the image bias and contrast-to-noise
    ratio.
  related_code: ''
- author: Jaume Coll-Font, Onur Afacan, Jeanne Chow, Sila Kurugol
  title: Linear Time Invariant Model Based Motion Correction (LiMo-MoCo) of Dynamic
    Radial Contrast Enhanced MRI.
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/Coll-FontACK19
  doi: 10.1007/978-3-030-32245-8_48
  ee: https://doi.org/10.1007/978-3-030-32245-8_48
  url: https://dblp.org/rec/conf/miccai/Coll-FontACK19
  abstract: Early identification of kidney function deterioration is essential to
    determine which newborn patients with dilation of the renal pelvis (hydronephrosis)
    should undergo surgery. Kidney function can be measured by fitting a tracer kinetic
    (TK) model onto a series of Dynamic Contrast Enhanced (DCE) MR images and deriving
    the glomerular filtration rate (GFR) from the TK model. Unfortunately, heavy breathing
    and large bulk motion events create outliers and misalignments that introduce
    large errors in the TK estimates. Moreover, aligning the series of DCE images
    is not trivial due to the contrast differences between them and the undersampling
    artifacts due to fast imaging. We present a bulk motion detection and a linear
    time invariant (LTI) model-based motion correction approach for DCE-MRI alignment
    that leverages the temporal dynamics of the DCE data at each voxel. We evaluate
    our approach on 10 newborn patients that underwent DCE imaging without sedation.
    For each patient, we reconstructed the sequence of DCE images, detected and removed
    the volumes corrupted by motion using a self navigation approach, aligned the
    sequence using our approach and fitted the TK model to compute GFR. The results
    show that our approach correctly aligned all volumes and improved the TK model
    fit and, on average, reducing the normalized root-mean-squared error by 0.17.
  related_code: ''
- author: Neel Dey, Jeffrey Messinger, R. Theodore Smith, Christine A. Curcio, Guido
    Gerig
  title: Robust Non-negative Tensor Factorization, Diffeomorphic Motion Correction,
    and Functional Statistics to Understand Fixation in Fluorescence Microscopy.
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/DeyMSCG19
  doi: 10.1007/978-3-030-32239-7_73
  ee: https://doi.org/10.1007/978-3-030-32239-7_73
  url: https://dblp.org/rec/conf/miccai/DeyMSCG19
  abstract: Fixation is essential for preserving cellular morphology in biomedical
    research. However, it may also affect spectra captured in multispectral fluorescence
    microscopy, impacting molecular interpretations. To investigate fixation effects
    on tissue, multispectral fluorescence microscopy images of pairs of samples with
    and without fixation are captured. Each pixel might exhibit overlapping spectra,
    creating a blind source separation problem approachable with linear unmixing.
    With multiple excitation wavelengths, unmixing is intuitively extended to tensor
    factorizations. Yet these approaches are limited by nonlinear effects like attenuation.
    Further, light exposure during image acquisition introduces subtle Brownian motion
    between image channels of non-fixed tissue. Finally, hypothesis testing for spectral
    differences due to fixation is nontrivial as retrieved spectra are paired sequential
    samples. To these ends, we present three contributions, (1) a novel robust non-negative
    tensor factorization using the β-divergence and L2,1-norm, which decomposes the
    data into a low-rank multilinear and group-sparse non-multilinear tensor without
    making any explicit nonlinear modeling choices or assumptions on noise statistics;
    (2) a diffeomorphic atlas-based strategy for motion correction; (3) a non-parametric
    hypothesis testing framework for paired sequential data using functional principal
    component analysis.
  related_code: ''
- author: Ilkay Öksüz, James R. Clough, Bram Ruijsink, Esther Puyol-Antón, Aurélien
    Bustin, Gastão Cruz, Claudia Prieto, Daniel Rueckert, Andrew P. King, Julia A.
    Schnabel
  title: Detection and Correction of Cardiac MRI Motion Artefacts During Reconstruction
    from k-space.
  venue: MICCAI
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/OksuzCRPBCPRKS19
  doi: 10.1007/978-3-030-32251-9_76
  ee: https://doi.org/10.1007/978-3-030-32251-9_76
  url: https://dblp.org/rec/conf/miccai/OksuzCRPBCPRKS19
  abstract: In fully sampled cardiac MR (CMR) acquisitions, motion can lead to corruption
    of k-space lines, which can result in artefacts in the reconstructed images. In
    this paper, we propose a method to automatically detect and correct motion-related
    artefacts in CMR acquisitions during reconstruction from k-space data. Our correction
    method is inspired by work on undersampled CMR reconstruction, and uses deep learning
    to optimize a data-consistency term for under-sampled k-space reconstruction.
    Our main methodological contribution is the addition of a detection network to
    classify motion-corrupted k-space lines to convert the problem of artefact correction
    to a problem of reconstruction using the data consistency term. We train our network
    to automatically correct for motion-related artefacts using synthetically corrupted
    cine CMR k-space data as well as uncorrupted CMR images. Using a test set of 50
    2D+time cine CMR datasets from the UK Biobank, we achieve good image quality in
    the presence of synthetic motion artefacts. We quantitatively compare our method
    with a variety of techniques for recovering good image quality and showcase better
    performance compared to state of the art denoising techniques with a PSNR of 37.1.
    Moreover, we show that our method preserves the quality of uncorrupted images
    and therefore can be also utilized as a general image reconstruction algorithm.
  related_code: ''
- author: Giacomo Tarroni, Ozan Oktay, Matthew Sinclair, Wenjia Bai, Andreas Schuh,
    Hideaki Suzuki, Antonio de Marvao, Declan P. O&apos;Regan, Stuart A. Cook, Daniel
    Rueckert
  title: A Comprehensive Approach for Learning-Based Fully-Automated Inter-slice Motion
    Correction for Short-Axis Cine Cardiac MR Image Stacks.
  venue: MICCAI
  year: '2018'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/TarroniOSBSSMOC18
  doi: 10.1007/978-3-030-00928-1_31
  ee: https://doi.org/10.1007/978-3-030-00928-1_31
  url: https://dblp.org/rec/conf/miccai/TarroniOSBSSMOC18
  abstract: In the clinical routine, short axis (SA) cine cardiac MR (CMR) image stacks
    are acquired during multiple subsequent breath-holds. If the patient cannot consistently
    hold the breath at the same position, the acquired image stack will be affected
    by inter-slice respiratory motion and will not correctly represent the cardiac
    volume, introducing potential errors in the following analyses and visualisations.
    We propose an approach to automatically correct inter-slice respiratory motion
    in SA CMR image stacks. Our approach makes use of probabilistic segmentation maps
    (PSMs) of the left ventricular (LV) cavity generated with decision forests. PSMs
    are generated for each slice of the SA stack and rigidly registered in-plane to
    a target PSM. If long axis (LA) images are available, PSMs are generated for them
    and combined to create the target PSM; if not, the target PSM is produced from
    the same stack using a 3D model trained from motion-free stacks. The proposed
    approach was tested on a dataset of SA stacks acquired from 24 healthy subjects
    (for which anatomical 3D cardiac images were also available as reference) and
    compared to two techniques which use LA intensity images and LA segmentations
    as targets, respectively. The results show the accuracy and robustness of the
    proposed approach in motion compensation.
