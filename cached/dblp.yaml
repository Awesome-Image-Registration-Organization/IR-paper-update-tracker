- author: Kristen Grauman, Trevor Darrell
  title: 'The Pyramid Match Kernel: Discriminative Classification with Sets of Image
    Features.'
  venue: ICCV
  year: '2005'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/GraumanD05
  doi: 10.1109/ICCV.2005.239
