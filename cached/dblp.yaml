- author: Chengqian Zhao, Cheng Feng, Dengwang Li, Shuo Li 0001
  title: 'OF-MSRN: Optical Flow-Auxiliary Multi-Task Regression Network for Direct
    Quantitative Measurement, Segmentation and Motion Estimation.'
  venue: AAAI
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/ZhaoFL020
  doi: 10.1609/AAAI.V34I01.5475
  ee: https://doi.org/10.1609/aaai.v34i01.5475
  url: https://dblp.org/rec/conf/aaai/ZhaoFL020
  abstract: 'Comprehensively analyzing the carotid artery is critically significant
    to diagnosing and treating cardiovascular diseases. The object of this work is
    to simultaneously achieve direct quantitative measurement and automated segmentation
    of the lumen diameter and intima-media thickness as well as the motion estimation
    of the carotid wall. No work has simultaneously achieved the comprehensive analysis
    of carotid artery due to three intractable challenges: 1) Tiny intima-media is
    more challenging to measure and segment; 2) Artifact generated by radial motion
    restrict the accuracy of measurement and segmentation; 3) Occlusions on diseased
    carotid walls generate dynamic complexity and indeterminacy. In this paper, we
    propose a novel optical flow-auxiliary multi-task regression network named OF-MSRN
    to overcome these challenges. We concatenate multi-scale features to a regression
    network to simultaneously achieve measurement and segmentation, which makes full
    use of the potential correlation between the two tasks. More importantly, we creatively
    explore an optical flow auxiliary module to take advantage of the co-promotion
    of segmentation and motion estimation to overcome the restrictions of the radial
    motion. Besides, we evaluate consistency between forward and backward optical
    flow to improve the accuracy of motion estimation of the diseased carotid wall.
    Extensive experiments on US sequences of 101 patients demonstrate the superior
    performance of OF-MSRN on the comprehensive analysis of the carotid artery by
    utilizing the dual optimization of the optical flow auxiliary module.'
  related_code: ''
- author: Pengpeng Liu, Irwin King, Michael R. Lyu, Jia Xu 0011
  title: 'DDFlow: Learning Optical Flow with Unlabeled Data Distillation.'
  venue: AAAI
