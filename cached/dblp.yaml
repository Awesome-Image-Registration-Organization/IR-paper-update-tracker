- author: Dandan Guo, Ruiying Lu, Bo Chen 0001, Zequn Zeng, Mingyuan Zhou
  title: Matching Visual Features to Hierarchical Semantic Topics for Image Paragraph
    Captioning.
  venue: Int. J. Comput. Vis.
  year: '2022'
  type: Journal Articles
  access: closed
  key: journals/ijcv/GuoLCZZ22
  doi: 10.1007/S11263-022-01624-6
  ee: https://doi.org/10.1007/s11263-022-01624-6
  url: https://dblp.org/rec/journals/ijcv/GuoLCZZ22
  abstract: Observing a set of images and their corresponding paragraph-captions,
    a challenging task is to learn how to produce a semantically coherent paragraph
    to describe the visual content of an image. Inspired by recent successes in integrating
    semantic topics into this task, this paper develops a plug-and-play hierarchical-topic-guided
    image paragraph generation framework, which couples a visual extractor with a
    deep topic model to guide the learning of a language model. To capture the correlations
    between the image and text at multiple levels of abstraction and learn the semantic
    topics from images, we design a variational inference network to build the mapping
    from image features to textual captions. To guide the paragraph generation, the
    learned hierarchical topics and visual features are integrated into the language
    model, including Long Short-Term Memory and Transformer, and jointly optimized.
    Experiments on public datasets demonstrate that the proposed models, which are
    competitive with many state-of-the-art approaches in terms of standard evaluation
    metrics, can be used to both distill interpretable multi-layer semantic topics
    and generate diverse and coherent captions.
