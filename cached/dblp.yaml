- author: Taylor L. Bobrow, Mayank Golhar, Rohan Vijayan, Venkata S. Akshintala, Juan
    R. Garcia, Nicholas J. Durr
  title: Colonoscopy 3D video dataset with paired depth from 2D-3D registration.
  venue: Medical Image Anal.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/mia/BobrowGVAGD23
  doi: 10.1016/J.MEDIA.2023.102956
  ee: https://doi.org/10.1016/j.media.2023.102956
  url: https://dblp.org/rec/journals/mia/BobrowGVAGD23
  abstract: Screening colonoscopy is an important clinical application for several
    3D computer vision techniques, including depth estimation, surface reconstruction,
    and missing region detection. However, the development, evaluation, and comparison
    of these techniques in real colonoscopy videos remain largely qualitative due
    to the difficulty of acquiring ground truth data. In this work, we present a Colonoscopy
    3D Video Dataset (C3VD) acquired with a high definition clinical colonoscope and
    high-fidelity colon models for benchmarking computer vision methods in colonoscopy.
    We introduce a novel multimodal 2D-3D registration technique to register optical
    video sequences with ground truth rendered views of a known 3D model. The different
    modalities are registered by transforming optical images to depth maps with a
    Generative Adversarial Network and aligning edge features with an evolutionary
    optimizer. This registration method achieves an average translation error of 0.321
    millimeters and an average rotation error of 0.159 degrees in simulation experiments
    where error-free ground truth is available. The method also leverages video information,
    improving registration accuracy by 55.6% for translation and 60.4% for rotation
    compared to single frame registration. 22 short video sequences were registered
    to generate 10,015 total frames with paired ground truth depth, surface normals,
    optical flow, occlusion, six degree-of-freedom pose, coverage maps, and 3D models.
    The dataset also includes screening videos acquired by a gastroenterologist with
    paired ground truth pose and 3D surface models. The dataset and registration source
    code are available at https://durr.jhu.edu/C3VD.
- author: Tongtong Che, Xiuying Wang 0001, Kun Zhao 0014, Yan Zhao, Debin Zeng, Qiongling
    Li, Yuanjie Zheng, Ning Yang, Jian Wang 0120, Shuyu Li
  title: 'AMNet: Adaptive multi-level network for deformable registration of 3D brain
    MR images.'
  venue: Medical Image Anal.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/mia/CheWZZZLZYWL23
  doi: 10.1016/J.MEDIA.2023.102740
  ee: https://doi.org/10.1016/j.media.2023.102740
  url: https://dblp.org/rec/journals/mia/CheWZZZLZYWL23
  abstract: Three-dimensional (3D) deformable image registration is a fundamental
    technique in medical image analysis tasks. Although it has been extensively investigated,
    current deep-learning-based registration models may face the challenges posed
    by deformations with various degrees of complexity. This paper proposes an adaptive
    multi-level registration network (AMNet) to retain the continuity of the deformation
    field and to achieve high-performance registration for 3D brain MR images. First,
    we design a lightweight registration network with an adaptive growth strategy
    to learn deformation field from multi-level wavelet sub-bands, which facilitates
    both global and local optimization and achieves registration with high performance.
    Second, our AMNet is designed for image-wise registration, which adapts the local
    importance of a region in accordance with the complexity degrees of its deformation,
    and thereafter improves the registration efficiency and maintains the continuity
    of the deformation field. Experimental results from five publicly-available brain
    MR datasets and a synthetic brain MR dataset show that our method achieves superior
    performance against state-of-the-art medical image registration approaches.
- author: Xiongchao Chen, Bo Zhou 0009, Huidong Xie, Xueqi Guo, Jiazhen Zhang, James
    S. Duncan, Edward J. Miller, Albert J. Sinusas, John A. Onofrey, Chi Liu 0001
  title: 'DuSFE: Dual-Channel Squeeze-Fusion-Excitation co-attention for cross-modality
    registration of cardiac SPECT and CT.'
  venue: Medical Image Anal.
  year: '2023'
  type: Journal Articles
  access: open
  key: journals/mia/ChenZXGZDMSOL23
  doi: 10.1016/J.MEDIA.2023.102840
  ee: https://doi.org/10.1016/j.media.2023.102840
  url: https://dblp.org/rec/journals/mia/ChenZXGZDMSOL23
  abstract: Myocardial perfusion imaging (MPI) using single-photon emission computed
    tomography (SPECT) is widely applied for the diagnosis of cardiovascular diseases.
    Attenuation maps (μ-maps) derived from computed tomography (CT) are utilized for
    attenuation correction (AC) to improve the diagnostic accuracy of cardiac SPECT.
    However, in clinical practice, SPECT and CT scans are acquired sequentially, potentially
    inducing misregistration between the two images and further producing AC artifacts.
    Conventional intensity-based registration methods show poor performance in the
    cross-modality registration of SPECT and CT-derived μ-maps since the two imaging
    modalities might present totally different intensity patterns. Deep learning has
    shown great potential in medical imaging registration. However, existing deep
    learning strategies for medical image registration encoded the input images by
    simply concatenating the feature maps of different convolutional layers, which
    might not fully extract or fuse the input information. In addition, deep-learning-based
    cross-modality registration of cardiac SPECT and CT-derived μ-maps has not been
    investigated before. In this paper, we propose a novel Dual-Channel Squeeze-Fusion-Excitation
    (DuSFE) co-attention module for the cross-modality rigid registration of cardiac
    SPECT and CT-derived μ-maps. DuSFE is designed based on the co-attention mechanism
    of two cross-connected input data streams. The channel-wise or spatial features
    of SPECT and μ-maps are jointly encoded, fused, and recalibrated in the DuSFE
    module. DuSFE can be flexibly embedded at multiple convolutional layers to enable
    gradual feature fusion in different spatial dimensions. Our studies using clinical
    patient MPI studies demonstrated that the DuSFE-embedded neural network generated
    significantly lower registration errors and more accurate AC SPECT images than
    existing methods. We also showed that the DuSFE-embedded network did not over-correct
    or degrade the registration performance of motion-free cases. The source code
    of this work is available at https://github.com/XiongchaoChen/DuSFE_CrossRegistrationhttps://github.com/XiongchaoChen/DuSFE_CrossRegistration.
- author: Steffen Czolbe, Paraskevas Pegios, Oswin Krause, Aasa Feragen
  title: Semantic similarity metrics for image registration.
  venue: Medical Image Anal.
  year: '2023'
  type: Journal Articles
  access: open
  key: journals/mia/CzolbePKF23
  doi: 10.1016/J.MEDIA.2023.102830
  ee: https://doi.org/10.1016/j.media.2023.102830
  url: https://dblp.org/rec/journals/mia/CzolbePKF23
  abstract: Image registration aims to find geometric transformations that align images.
    Most algorithmic and deep learning-based methods solve the registration problem
    by minimizing a loss function, consisting of a similarity metric comparing the
    aligned images, and a regularization term ensuring smoothness of the transformation.
    Existing similarity metrics like Euclidean Distance or Normalized Cross-Correlation
    focus on aligning pixel intensity values or correlations, giving difficulties
    with low intensity contrast, noise, and ambiguous matching. We propose a semantic
    similarity metric for image registration, focusing on aligning image areas based
    on semantic correspondence instead. Our approach learns dataset-specific features
    that drive the optimization of a learning-based registration model. We train both
    an unsupervised approach extracting features with an auto-encoder, and a semi-supervised
    approach using supplemental segmentation data. We validate the semantic similarity
    metric using both deep-learning-based and algorithmic image registration methods.
    Compared to existing methods across four different image modalities and applications,
    the method achieves consistently high registration accuracy and smooth transformation
    fields.
- author: Ankita Joshi, Yi Hong
  title: 'R2Net: Efficient and flexible diffeomorphic image registration using Lipschitz
    continuous residual networks.'
  venue: Medical Image Anal.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/mia/JoshiH23
  doi: 10.1016/J.MEDIA.2023.102917
  ee: https://doi.org/10.1016/j.media.2023.102917
  url: https://dblp.org/rec/journals/mia/JoshiH23
  abstract: Classical diffeomorphic image registration methods, while being accurate,
    face the challenges of high computational costs. Deep learning based approaches
    provide a fast alternative to address these issues; however, most existing deep
    solutions either lose the good property of diffeomorphism or have limited flexibility
    to capture large deformations, under the assumption that deformations are driven
    by stationary velocity fields (SVFs). Also, the adopted squaring and scaling technique
    for integrating SVFs is time- and memory-consuming, hindering deep methods from
    handling large image volumes. In this paper, we present an unsupervised diffeomorphic
    image registration framework, which uses deep residual networks (ResNets) as numerical
    approximations of the underlying continuous diffeomorphic setting governed by
    ordinary differential equations, which is parameterized by either SVFs or time-varying
    (non-stationary) velocity fields. This flexible parameterization in our Residual
    Registration Network (R2Net) not only provides the model's ability to capture
    large deformation but also reduces the time and memory cost when integrating velocity
    fields for deformation generation. Also, we introduce a Lipschitz continuity constraint
    into the ResNet block to help achieve diffeomorphic deformations. To enhance the
    ability of our model for handling images with large volume sizes, we employ a
    hierarchical extension with a multi-phase learning strategy to solve the image
    registration task in a coarse-to-fine fashion. We demonstrate our models on four
    3D image registration tasks with a wide range of anatomies, including brain MRIs,
    cine cardiac MRIs, and lung CT scans. Compared to classical methods SyN and diffeomorphic
    VoxelMorph, our models achieve comparable or better registration accuracy with
    much smoother deformations. Our source code is available online at https://github.com/ankitajoshi15/R2Net.
- author: Hee Guan Khor, Guochen Ning, Yihua Sun, Xu Lu, Xinran Zhang 0002, Hongen
    Liao
  title: Anatomically constrained and attention-guided deep feature fusion for joint
    segmentation and deformable medical image registration.
  venue: Medical Image Anal.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/mia/KhorNSLZL23
  doi: 10.1016/J.MEDIA.2023.102811
  ee: https://doi.org/10.1016/j.media.2023.102811
  url: https://dblp.org/rec/journals/mia/KhorNSLZL23
  abstract: The main objective of anatomically plausible results for deformable image
    registration is to improve model's registration accuracy by minimizing the difference
    between a pair of fixed and moving images. Since many anatomical features are
    closely related to each other, leveraging supervision from auxiliary tasks (such
    as supervised anatomical segmentation) has the potential to enhance the realism
    of the warped images after registration. In this work, we employ a Multi-Task
    Learning framework to formulate registration and segmentation as a joint issue,
    in which we utilize anatomical constraint from auxiliary supervised segmentation
    to enhance the realism of the predicted images. First, we propose a Cross-Task
    Attention Block to fuse the high-level feature from both the registration and
    segmentation network. With the help of initial anatomical segmentation, the registration
    network can benefit from learning the task-shared feature correlation and rapidly
    focusing on the parts that need deformation. On the other hand, the anatomical
    segmentation discrepancy from ground-truth fixed annotations and predicted segmentation
    maps of initial warped images are integrated into the loss function to guide the
    convergence of the registration network. Ideally, a good deformation field should
    be able to minimize the loss function of registration and segmentation. The voxel-wise
    anatomical constraint inferred from segmentation helps the registration network
    to reach a global optimum for both deformable and segmentation learning. Both
    networks can be employed independently during the testing phase, enabling only
    the registration output to be predicted when the segmentation labels are unavailable.
    Qualitative and quantitative results indicate that our proposed methodology significantly
    outperforms the previous state-of-the-art approaches on inter-patient brain MRI
    registration and pre- and intra-operative uterus MRI registration tasks within
    our specific experimental setup, which leads to state-of-the-art registration
    quality scores of 0.755 and 0.731 (i.e., by 0.8% and 0.5% increases) DSC for both
    tasks, respectively.
- author: Yiwen Li, Yunguan Fu, Iani J. M. B. Gayo, Qianye Yang, Zhe Min, Shaheer
    U. Saeed, Wen Yan 0005, Yipei Wang, J. Alison Noble, Mark Emberton, Matthew J.
    Clarkson, Henkjan Huisman, Dean C. Barratt, Victor Adrian Prisacariu, Yipeng Hu
  title: Prototypical few-shot segmentation for cross-institution male pelvic structures
    with spatial registration.
  venue: Medical Image Anal.
  year: '2023'
  type: Journal Articles
  access: open
  key: journals/mia/LiFGYMSYWNECHBPH23
  doi: 10.1016/J.MEDIA.2023.102935
  ee: https://doi.org/10.1016/j.media.2023.102935
  url: https://dblp.org/rec/journals/mia/LiFGYMSYWNECHBPH23
  abstract: The prowess that makes few-shot learning desirable in medical image analysis
    is the efficient use of the support image data, which are labelled to classify
    or segment new classes, a task that otherwise requires substantially more training
    images and expert annotations. This work describes a fully 3D prototypical few-shot
    segmentation algorithm, such that the trained networks can be effectively adapted
    to clinically interesting structures that are absent in training, using only a
    few labelled images from a different institute. First, to compensate for the widely
    recognised spatial variability between institutions in episodic adaptation of
    novel classes, a novel spatial registration mechanism is integrated into prototypical
    learning, consisting of a segmentation head and an spatial alignment module. Second,
    to assist the training with observed imperfect alignment, support mask conditioning
    module is proposed to further utilise the annotation available from the support
    images. Extensive experiments are presented in an application of segmenting eight
    anatomical structures important for interventional planning, using a data set
    of 589 pelvic T2-weighted MR images, acquired at seven institutes. The results
    demonstrate the efficacy in each of the 3D formulation, the spatial registration,
    and the support mask conditioning, all of which made positive contributions independently
    or collectively. Compared with the previously proposed 2D alternatives, the few-shot
    segmentation performance was improved with statistical significance, regardless
    whether the support data come from the same or different institutes.
- author: Pablo Arratia López, Hernán Mella, Sergio Uribe, Daniel E. Hurtado, Francisco
    Sahli Costabal
  title: 'WarpPINN: Cine-MR image registration with physics-informed neural networks.'
  venue: Medical Image Anal.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/mia/LopezMUHC23
  doi: 10.1016/J.MEDIA.2023.102925
  ee: https://doi.org/10.1016/j.media.2023.102925
  url: https://dblp.org/rec/journals/mia/LopezMUHC23
  abstract: 'The diagnosis of heart failure usually includes a global functional assessment,
    such as ejection fraction measured by magnetic resonance imaging. However, these
    metrics have low discriminate power to distinguish different cardiomyopathies,
    which may not affect the global function of the heart. Quantifying local deformations
    in the form of cardiac strain can provide helpful information, but it remains
    a challenge. In this work, we introduce WarpPINN, a physics-informed neural network
    to perform image registration to obtain local metrics of heart deformation. We
    apply this method to cine magnetic resonance images to estimate the motion during
    the cardiac cycle. We inform our neural network of the near-incompressibility
    of cardiac tissue by penalizing the Jacobian of the deformation field. The loss
    function has two components: an intensity-based similarity term between the reference
    and the warped template images, and a regularizer that represents the hyperelastic
    behavior of the tissue. The architecture of the neural network allows us to easily
    compute the strain via automatic differentiation to assess cardiac activity. We
    use Fourier feature mappings to overcome the spectral bias of neural networks,
    allowing us to capture discontinuities in the strain field. The algorithm is tested
    on synthetic examples and on a cine SSFP MRI benchmark of 15 healthy volunteers,
    where it is trained to learn the deformation mapping of each case. We outperform
    current methodologies in landmark tracking and provide physiological strain estimations
    in the radial and circumferential directions. WarpPINN provides precise measurements
    of local cardiac deformations that can be used for a better diagnosis of heart
    failure and can be used for general image registration tasks. Source code is available
    at https://github.com/fsahli/WarpPINN.'
- author: Alan Q. Wang 0003, Evan M. Yu, Adrian V. Dalca, Mert R. Sabuncu
  title: A robust and interpretable deep learning framework for multi-modal registration
    via keypoints.
  venue: Medical Image Anal.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/mia/WangYDS23
  doi: 10.1016/J.MEDIA.2023.102962
  ee: https://doi.org/10.1016/j.media.2023.102962
  url: https://dblp.org/rec/journals/mia/WangYDS23
  abstract: We present KeyMorph, a deep learning-based image registration framework
    that relies on automatically detecting corresponding keypoints. State-of-the-art
    deep learning methods for registration often are not robust to large misalignments,
    are not interpretable, and do not incorporate the symmetries of the problem. In
    addition, most models produce only a single prediction at test-time. Our core
    insight which addresses these shortcomings is that corresponding keypoints between
    images can be used to obtain the optimal transformation via a differentiable closed-form
    expression. We use this observation to drive the end-to-end learning of keypoints
    tailored for the registration task, and without knowledge of ground-truth keypoints.
    This framework not only leads to substantially more robust registration but also
    yields better interpretability, since the keypoints reveal which parts of the
    image are driving the final alignment. Moreover, KeyMorph can be designed to be
    equivariant under image translations and/or symmetric with respect to the input
    image ordering. Finally, we show how multiple deformation fields can be computed
    efficiently and in closed-form at test time corresponding to different transformation
    variants. We demonstrate the proposed framework in solving 3D affine and spline-based
    registration of multi-modal brain MRI scans. In particular, we show registration
    accuracy that surpasses current state-of-the-art methods, especially in the context
    of large displacements. Our code is available at https://github.com/alanqrwang/keymorph.
- author: Wenzhe Yin, Jan-Jakob Sonke, Efstratios Gavves
  title: 'PC-Reg: A pyramidal prediction-correction approach for large deformation
    image registration.'
  venue: Medical Image Anal.
  year: '2023'
  type: Journal Articles
  access: open
  key: journals/mia/YinSG23
  doi: 10.1016/J.MEDIA.2023.102978
  ee: https://doi.org/10.1016/j.media.2023.102978
  url: https://dblp.org/rec/journals/mia/YinSG23
  abstract: Deformable image registration plays an important role in medical image
    analysis. Deep neural networks such as VoxelMorph and TransMorph are fast, but
    limited to small deformations and face challenges in the presence of large deformations.
    To tackle large deformations in medical image registration, we propose PC-Reg,
    a pyramidal Prediction and Correction method for deformable registration, which
    treats multi-scale registration akin to solving an ordinary differential equation
    (ODE) across scales. Starting with a zero-initialized deformation at the coarse
    level, PC-Reg follows the predictor-corrector regime and progressively predicts
    a residual flow and a correction flow to update the deformation vector field through
    different scales. The prediction in each scale can be regarded as a single step
    of ODE integration. PC-Reg can be easily extended to diffeomorphic registration
    and is able to alleviate the multiscale accumulated upsampling and diffeomorphic
    integration error. Further, to transfer details from full resolution to low scale,
    we introduce a distillation loss, where the output is used as the target label
    for intermediate outputs. Experiments on inter-patient deformable registration
    show that the proposed method significantly improves registration not only for
    large but also for small deformations.
- author: Arezoo Zakeri, Alireza Hokmabadi, Ning Bi, Isuru Wijesinghe, Michael G.
    Nix, Steffen E. Petersen, Alejandro F. Frangi, Zeike A. Taylor, Ali Gooya
  title: 'DragNet: Learning-based deformable registration for realistic cardiac MR
    sequence generation from a single frame.'
  venue: Medical Image Anal.
  year: '2023'
  type: Journal Articles
  access: open
  key: journals/mia/ZakeriHBWNPFTG23
  doi: 10.1016/J.MEDIA.2022.102678
  ee: https://doi.org/10.1016/j.media.2022.102678
  url: https://dblp.org/rec/journals/mia/ZakeriHBWNPFTG23
  abstract: Deformable image registration (DIR) can be used to track cardiac motion.
    Conventional DIR algorithms aim to establish a dense and non-linear correspondence
    between independent pairs of images. They are, nevertheless, computationally intensive
    and do not consider temporal dependencies to regulate the estimated motion in
    a cardiac cycle. In this paper, leveraging deep learning methods, we formulate
    a novel hierarchical probabilistic model, termed DragNet, for fast and reliable
    spatio-temporal registration in cine cardiac magnetic resonance (CMR) images and
    for generating synthetic heart motion sequences. DragNet is a variational inference
    framework, which takes an image from the sequence in combination with the hidden
    states of a recurrent neural network (RNN) as inputs to an inference network per
    time step. As part of this framework, we condition the prior probability of the
    latent variables on the hidden states of the RNN utilised to capture temporal
    dependencies. We further condition the posterior of the motion field on a latent
    variable from hierarchy and features from the moving image. Subsequently, the
    RNN updates the hidden state variables based on the feature maps of the fixed
    image and the latent variables. Different from traditional methods, DragNet performs
    registration on unseen sequences in a forward pass, which significantly expedites
    the registration process. Besides, DragNet enables generating a large number of
    realistic synthetic image sequences given only one frame, where the corresponding
    deformations are also retrieved. The probabilistic framework allows for computing
    spatio-temporal uncertainties in the estimated motion fields. Our results show
    that DragNet performance is comparable with state-of-the-art methods in terms
    of registration accuracy, with the advantage of offering analytical pixel-wise
    motion uncertainty estimation across a cardiac cycle and being a motion generator.
    We will make our code publicly available.
- author: Lei Zhao 0015, Shumao Pang, Yangfan Chen, Xiongfeng Zhu, Ziyue Jiang 0003,
    Zhihai Su, Hai Lu, Yujia Zhou 0001, Qianjin Feng 0003
  title: 'SpineRegNet: Spine Registration Network for volumetric MR and CT image by
    the joint estimation of an affine-elastic deformation field.'
  venue: Medical Image Anal.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/mia/ZhaoPCZJSLZF23
  doi: 10.1016/J.MEDIA.2023.102786
  ee: https://doi.org/10.1016/j.media.2023.102786
  url: https://dblp.org/rec/journals/mia/ZhaoPCZJSLZF23
  abstract: Spine registration for volumetric magnetic resonance (MR) and computed
    tomography (CT) images plays a significant role in surgical planning and surgical
    navigation system for the radiofrequency ablation of spine intervertebral discs.
    The affine transformation of each vertebra and elastic deformation of the intervertebral
    disc exist at the same time. This situation is a major challenge in spine registration.
    Existing spinal image registration methods failed to solve the optimal affine-elastic
    deformation field (AEDF) simultaneously, only consider the overall rigid or elastic
    alignment with the help of a manual spine mask, and encounter difficulty in meeting
    the accuracy requirements of clinical registration application. In this study,
    we propose a novel affine-elastic registration framework named SpineRegNet. The
    SpineRegNet consists of a Multiple Affine Matrices Estimation (MAME) Module for
    multiple vertebrae alignment, an Affine-Elastic Fusion (AEF) Module for joint
    estimation of the overall AEDF, and a Local Rigidity Constraint (LRC) Module for
    preserving the rigidity of each vertebra. Experiments on T2-weighted volumetric
    MR and CT images show that the proposed approach achieves impressive performance
    with mean Dice similarity coefficients of 91.36%, 81.60%, and 83.08% for the mask
    of the vertebrae on Datasets A-C, respectively. The proposed technique does not
    require a mask or manual participation during the tests and provides a useful
    tool for clinical spinal disease surgical planning and surgical navigation systems.
- author: Liming Zhong, Zeli Chen, Hai Shu, Yikai Zheng, Yiwen Zhang, Yuankui Wu,
    Qianjin Feng 0003, Yin Li, Wei Yang 0006
  title: 'QACL: Quartet attention aware closed-loop learning for abdominal MR-to-CT
    synthesis via simultaneous registration.'
  venue: Medical Image Anal.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/mia/ZhongCSZZWFLY23
  doi: 10.1016/J.MEDIA.2022.102692
  ee: https://doi.org/10.1016/j.media.2022.102692
  url: https://dblp.org/rec/journals/mia/ZhongCSZZWFLY23
  abstract: Synthesis of computed tomography (CT) images from magnetic resonance (MR)
    images is an important task to overcome the lack of electron density information
    in MR-only radiotherapy treatment planning (RTP). Some innovative methods have
    been proposed for abdominal MR-to-CT synthesis. However, it is still challenging
    due to the large misalignment between preprocessed abdominal MR and CT images
    and the insufficient feature information learned by models. Although several studies
    have used the MR-to-CT synthesis to alleviate the difficulty of multi-modal registration,
    this misalignment remains unsolved when training the MR-to-CT synthesis model.
    In this paper, we propose an end-to-end quartet attention aware closed-loop learning
    (QACL) framework for MR-to-CT synthesis via simultaneous registration. Specifically,
    the proposed quartet attention generator and mono-modal registration network form
    a closed-loop to improve the performance of MR-to-CT synthesis via simultaneous
    registration. In particular, a quartet-attention mechanism is developed to enlarge
    the receptive fields in networks to extract the long-range and cross-dimension
    spatial dependencies. Experimental results on two independent abdominal datasets
    demonstrate that our QACL achieves impressive results with MAE of 55.30±10.59
    HU, PSNR of 22.85±1.43 dB, and SSIM of 0.83±0.04 for synthesis, and with Dice
    of 0.799±0.129 for registration. The proposed QACL outperforms the state-of-the-art
    MR-to-CT synthesis and multi-modal registration methods.
- author: Amir Seginer
  title: 'Rigid-body point-based registration: The distribution of the target registration
    error when the fiducial registration errors are given.'
