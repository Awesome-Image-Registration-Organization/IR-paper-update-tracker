- author: Yu Zhang 0280, Junle Yu, Xiaolin Huang, Wenhui Zhou 0001, Ji Hou
  title: 'PCR-CG: Point Cloud Registration via Deep Explicit Color and Geometry.'
  venue: ECCV
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/ZhangYHZH22
  doi: 10.1007/978-3-031-20080-9_26
  ee: https://doi.org/10.1007/978-3-031-20080-9_26
  url: https://dblp.org/rec/conf/eccv/ZhangYHZH22
  abstract: 'In this paper, we introduce PCR-CG: a novel 3D point cloud registration
    module explicitly embedding the color signals into the geometry representation.
    Different from previous methods that only use geometry representation, our module
    is specifically designed to effectively correlate color into geometry for the
    point cloud registration task. Our key contribution is a 2D-3D cross-modality
    learning algorithm that embeds the deep features learned from color signals to
    the geometry representation. With our designed 2D-3D projection module, the pixel
    features in a square region centered at correspondences perceived from images
    are effectively correlated with point clouds. In this way, the overlapped regions
    can be inferred not only from point cloud but also from the texture appearances.
    Adding color is non-trivial. We compare against a variety of baselines designed
    for adding color to 3D, such as exhaustively adding per-pixel features or RGB
    values in an implicit manner. We leverage Predator [25] as the baseline method
    and incorporate our proposed module onto it. To validate the effectiveness of
    2D features, we ablate different 2D pre-trained networks and show a positive correlation
    between the pre-trained weights and the task performance. Our experimental results
    indicate a significant improvement of 6.5% registration recall over the baseline
    method on the 3DLoMatch benchmark. We additionally evaluate our approach on SOTA
    methods and observe consistent improvements, such as an improvement of 2.4% registration
    recall over GeoTransformer as well as 3.5% over CoFiNet. Our study reveals a significant
    advantages of correlating explicit deep color features to the point cloud in the
    registration task.'
- author: Yuting He 0001, Tiantian Li, Guanyu Yang 0001, Youyong Kong, Yang Chen 0008,
    Huazhong Shu, Jean-Louis Coatrieux, Jean-Louis Dillenseger, Shuo Li 0001
  title: Deep Complementary Joint Model for Complex Scene Registration and Few-Shot
    Segmentation on Medical Images.
  venue: ECCV
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/HeLYKCSCDL20
  doi: 10.1007/978-3-030-58523-5_45
  ee: https://doi.org/10.1007/978-3-030-58523-5_45
  url: https://dblp.org/rec/conf/eccv/HeLYKCSCDL20
  abstract: 'Deep learning-based medical image registration and segmentation joint
    models utilize the complementarity (augmentation data or weakly supervised data
    from registration, region constraints from seg-mentation) to bring mutual improvement
    in complex scene and few-shot situation. However, further adoption of the joint
    models are hindered: 1) the diversity of augmentation data is reduced limiting
    the further enhancement of segmentation, 2) misaligned regions in weakly supervised
    data disturb the training process, 3) lack of label-based region constraints in
    few-shot situation limits the registration performance. We propose a novel Deep
    Complementary Joint Model (DeepRS) for complex scene registration and few-shot
    segmentation. We embed a perturbation factor in the registration to increase the
    activity of deformation thus maintaining the augmentation data diversity. We take
    a pixel-wise discriminator to extract alignment confidence maps which highlight
    aligned regions in weakly supervised data so the misaligned regions'' disturbance
    will be suppressed via weighting. The outputs from segmentation model are utilized
    to implement deep-based region constraints thus relieving the label requirements
    and bringing fine registration. Extensive experiments on the CT dataset of MM-WHS
    2017 Challenge[42] show great advantages of our DeepRS that outperforms the existing
    state-of-the-art models.'
- author: Jiahao Li, Changhao Zhang, Ziyao Xu 0003, Hangning Zhou, Chi Zhang 0067
  title: Iterative Distance-Aware Similarity Matrix Convolution with Mutual-Supervised
    Point Elimination for Efficient Point Cloud Registration.
  venue: ECCV
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/LiZXZZ20
  doi: 10.1007/978-3-030-58586-0_23
  ee: https://doi.org/10.1007/978-3-030-58586-0_23
  url: https://dblp.org/rec/conf/eccv/LiZXZZ20
  abstract: In this paper, we propose a novel learning-based pipeline for partially
    overlapping 3D point cloud registration. The proposed model includes an iterative
    distance-aware similarity matrix convolution module to incorporate information
    from both the feature and Euclidean space into the pairwise point matching process.
    These convolution layers learn to match points based on joint information of the
    entire geometric features and Euclidean offset for each point pair, overcoming
    the disadvantage of matching by simply taking the inner product of feature vectors.
    Furthermore, a two-stage learnable point elimination technique is presented to
    improve computational efficiency and reduce false positive correspondence pairs.
    A novel mutual-supervision loss is proposed to train the model without extra annotations
    of keypoints. The pipeline can be easily integrated with both traditional (e.g.
    FPFH) and learning-based features. Experiments on partially overlapping and noisy
    point cloud registration show that our method outperforms the current state-of-the-art,
    while being more computationally efficient. Code is publicly available at https://github.com/jiahaowork/idam.
- author: Fengze Liu, Jinzheng Cai, Yuankai Huo, Chi-Tung Cheng, Ashwin Raju, Dakai
    Jin, Jing Xiao 0006, Alan L. Yuille, Le Lu 0001, Chien-Hung Liao, Adam P. Harrison
  title: 'JSSR: A Joint Synthesis, Segmentation, and Registration System for 3D Multi-modal
    Image Alignment of Large-Scale Pathological CT Scans.'
  venue: ECCV
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/LiuCHCRJXYLLH20
  doi: 10.1007/978-3-030-58601-0_16
  ee: https://doi.org/10.1007/978-3-030-58601-0_16
  url: https://dblp.org/rec/conf/eccv/LiuCHCRJXYLLH20
  abstract: Multi-modal image registration is a challenging problem that is also an
    important clinical task for many real applications and scenarios. As a first step
    in analysis, deformable registration among different image modalities is often
    required in order to provide complementary visual information. During registration,
    semantic information is key to match homologous points and pixels. Nevertheless,
    many conventional registration methods are incapable in capturing high-level semantic
    anatomical dense correspondences. In this work, we propose a novel multi-task
    learning system, JSSR, based on an end-to-end 3D convolutional neural network
    that is composed of a generator, a registration and a segmentation component.
    The system is optimized to satisfy the implicit constraints between different
    tasks in an unsupervised manner. It first synthesizes the source domain images
    into the target domain, then an intra-modal registration is applied on the synthesized
    images and target images. The segmentation module are then applied on the synthesized
    and target images, providing additional cues based on semantic correspondences.
    The supervision from another fully-annotated dataset is used to regularize the
    segmentation. We extensively evaluate JSSR on a large-scale medical image dataset
    containing 1,485 patient CT imaging studies of four different contrast phases
    (i.e., 5,940 3D CT scans with pathological livers) on the registration, segmentation
    and synthesis tasks. The performance is improved after joint training on the registration
    and segmentation tasks by 0.9% and 1.9% respectively compared to a highly competitive
    and accurate deep learning baseline. The registration also consistently outperforms
    conventional state-of-the-art multi-modal registration methods.
- author: Dennis Madsen, Andreas Morel-Forster, Patrick Kahr, Dana Rahbani, Thomas
    Vetter, Marcel Lüthi
  title: A Closest Point Proposal for MCMC-based Probabilistic Surface Registration.
  venue: ECCV
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/MadsenMKRVL20
  doi: 10.1007/978-3-030-58520-4_17
  ee: https://doi.org/10.1007/978-3-030-58520-4_17
  url: https://dblp.org/rec/conf/eccv/MadsenMKRVL20
  abstract: In this paper, we propose a non-rigid surface registration algorithm that
    estimates the correspondence uncertainty using the Markov-chain Monte Carlo (MCMC)
    framework. The estimated uncertainty of the inferred registration is important
    for many applications, such as surgical planning or missing data reconstruction.
    The used Metropolis-Hastings (MH) algorithm decouples the inference from modelling
    the posterior using a propose-and-verify scheme. The widely used random sampling
    strategy leads to slow convergence rates in high dimensional space. In order to
    overcome this limitation, we introduce an informed probabilistic proposal based
    on ICP that can be used within the MH algorithm. While the ICP algorithm is used
    in the inference algorithm, the likelihood can be chosen independently. We showcase
    different surface distance measures, such as the traditional Euclidean norm and
    the Hausdorff distance. While quantifying the uncertainty of the correspondence,
    we also experimentally verify that our method is more robust than the non-rigid
    ICP algorithm and provides more accurate surface registrations. In a reconstruction
    task, we show how our probabilistic framework can be used to estimate the posterior
    distribution of missing data without assuming a fixed point-to-point correspondence.
    We have made our registration framework publicly available for the community.
- author: Wentao Yuan, Benjamin Eckart, Kihwan Kim, Varun Jampani, Dieter Fox, Jan
    Kautz
  title: 'DeepGMR: Learning Latent Gaussian Mixture Models for Registration.'
  venue: ECCV
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/YuanEKJFK20
  doi: 10.1007/978-3-030-58558-7_43
  ee: https://doi.org/10.1007/978-3-030-58558-7_43
  url: https://dblp.org/rec/conf/eccv/YuanEKJFK20
  abstract: Point cloud registration is a fundamental problem in 3D computer vision,
    graphics and robotics. For the last few decades, existing registration algorithms
    have struggled in situations with large transformations, noise, and time constraints.
    In this paper, we introduce Deep Gaussian Mixture Registration (DeepGMR), the
    first learning-based registration method that explicitly leverages a probabilistic
    registration paradigm by formulating registration as the minimization of KL-divergence
    between two probability distributions modeled as mixtures of Gaussians. We design
    a neural network that extracts pose-invariant correspondences between raw point
    clouds and Gaussian Mixture Model (GMM) parameters and two differentiable compute
    blocks that recover the optimal transformation from matched GMM parameters. This
    construction allows the network learn an SE(3)-invariant feature space, producing
    a global registration method that is real-time, generalizable, and robust to noise.
    Across synthetic and real-world data, our proposed method shows favorable performance
    when compared with state-of-the-art geometry-based and learning-based registration
    methods.
