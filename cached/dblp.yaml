  title: 'FlowNAS: Neural Architecture Search for Optical Flow Estimation.'
  venue: Int. J. Comput. Vis.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/ijcv/LinLXWY24
  doi: 10.1007/S11263-023-01920-9
