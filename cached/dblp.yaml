  url: https://dblp.org/rec/journals/ijcv/LiLZL24a
  abstract: Existing homography and optical flow methods are erroneous in challenging
    scenes, such as fog, rain, night, and snow because the basic assumptions such
    as brightness and gradient constancy are broken. To address this issue, we present
    an unsupervised learning approach that fuses gyroscope into homography and optical
    flow learning. Specifically, we first convert gyroscope readings into motion fields
    named gyro field. Second, we design a self-guided fusion module (SGF) to fuse
    the background motion extracted from the gyro field with the optical flow and
    guide the network to focus on motion details. Meanwhile, we propose a homography
    decoder module (HD) to combine gyro field and intermediate results of SGF to produce
    the homography. To the best of our knowledge, this is the first deep learning
    framework that fuses gyroscope data and image content for both deep homography
    and optical flow learning. To validate our method, we propose a new dataset that
    covers regular and challenging scenes. Experiments show that our method outperforms
    the state-of-the-art methods in both regular and challenging scenes. The code
    and dataset are available at https://github.com/lhaippp/GyroFlowPlus.
  related_code: https://github.com/lhaippp/GyroFlowPlus
- author: Bo Wang 0144, Yifan Zhang, Jian Li 0003, Yang Yu 0014, Zhenping Sun, Li
    Liu 0002, Dewen Hu
  title: 'SplatFlow: Learning Multi-frame Optical Flow via Splatting.'
  venue: Int. J. Comput. Vis.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/ijcv/WangZLYSLH24
  doi: 10.1007/S11263-024-01993-0
  ee: https://doi.org/10.1007/s11263-024-01993-0
  url: https://dblp.org/rec/journals/ijcv/WangZLYSLH24
  abstract: The occlusion problem remains a crucial challenge in optical flow estimation
    (OFE). Despite the recent significant progress brought about by deep learning,
    most existing deep learning OFE methods still struggle to handle occlusions; in
    particular, those based on two frames cannot correctly handle occlusions because
    occluded regions have no visual correspondences. However, there is still hope
    in multi-frame settings, which can potentially mitigate the occlusion issue in
    OFE. Unfortunately, multi-frame OFE (MOFE) remains underexplored, and the limited
    studies on it are mainly specially designed for pyramid backbones or else obtain
    the aligned previous frame’s features, such as correlation volume and optical
    flow, through time-consuming backward flow calculation or non-differentiable forward
    warping transformation. This study proposes an efficient MOFE framework named
    SplatFlow to address these shortcomings. SplatFlow introduces the differentiable
    splatting transformation to align the previous frame’s motion feature and designs
    a Final-to-All embedding method to input the aligned motion feature into the current
    frame’s estimation, thus remodeling the existing two-frame backbones. The proposed
    SplatFlow is efficient yet more accurate, as it can handle occlusions properly.
    Extensive experimental evaluations show that SplatFlow substantially outperforms
    all published methods on the KITTI2015 and Sintel benchmarks. Especially on the
    Sintel benchmark, SplatFlow achieves errors of 1.12 (clean pass) and 2.07 (final
    pass), with surprisingly significant 19.4% and 16.2% error reductions, respectively,
    from the previous best results submitted. The code for SplatFlow is available
    at https://github.com/wwsource/SplatFlow.
