  type: Journal Articles
  access: closed
  key: journals/pami/AlmatrafiBAH20
  doi: 10.1109/TPAMI.2020.2986748
  ee: https://doi.org/10.1109/TPAMI.2020.2986748
  url: https://dblp.org/rec/journals/pami/AlmatrafiBAH20
  abstract: We propose DistSurf-OF, a novel optical flow method for neuromorphic cameras.
    Neuromorphic cameras (or event detection cameras) are an emerging sensor modality
    that makes use of dynamic vision sensors (DVS) to report asynchronously the log-intensity
    changes (called “events”) exceeding a predefined threshold at each pixel. In absence
    of the intensity value at each pixel location, we introduce a notion of “distance
    surface”—the distance transform computed from the detected events—as a proxy for
    object texture. The distance surface is then used as an input to the intensity-based
    optical flow methods to recover the two dimensional pixel motion. Real sensor
    experiments verify that the proposed DistSurf-OF accurately estimates the angle
    and speed of each events.
  related_code: ''
- author: Federico Paredes-Vallés, Kirk Y. W. Scheper, Guido C. H. E. de Croon
  title: 'Unsupervised Learning of a Hierarchical Spiking Neural Network for Optical
    Flow Estimation: From Events to Global Motion Perception.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2020'
  type: Journal Articles
  access: closed
  key: journals/pami/Paredes-VallesS20
  doi: 10.1109/TPAMI.2019.2903179
  ee: https://doi.org/10.1109/TPAMI.2019.2903179
  url: https://dblp.org/rec/journals/pami/Paredes-VallesS20
  abstract: The combination of spiking neural networks and event-based vision sensors
    holds the potential of highly efficient and high-bandwidth optical flow estimation.
    This paper presents the first hierarchical spiking architecture in which motion
    (direction and speed) selectivity emerges in an unsupervised fashion from the
    raw stimuli generated with an event-based camera. A novel adaptive neuron model
    and stable spike-timing-dependent plasticity formulation are at the core of this
    neural network governing its spike-based processing and learning, respectively.
    After convergence, the neural architecture exhibits the main properties of biological
    visual motion systems, namely feature extraction and local and global motion perception.
    Convolutional layers with input synapses characterized by single and multiple
    transmission delays are employed for feature and local motion perception, respectively;
    while global motion selectivity emerges in a final fully-connected layer. The
    proposed solution is validated using synthetic and real event sequences. Along
    with this paper, we provide the cuSNN library, a framework that enables GPU-accelerated
    simulations of large-scale spiking neural networks. Source code and samples are
    available at https://github.com/tudelft/cuSNN.
  related_code: https://github.com/tudelft/cuSNN
- author: Deqing Sun, Xiaodong Yang 0001, Ming-Yu Liu 0001, Jan Kautz
  title: 'Models Matter, So Does Training: An Empirical Study of CNNs for Optical
    Flow Estimation.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2020'
  type: Journal Articles
  access: closed
  key: journals/pami/SunYLK20
  doi: 10.1109/TPAMI.2019.2894353
  ee: https://doi.org/10.1109/TPAMI.2019.2894353
  url: https://dblp.org/rec/journals/pami/SunYLK20
  abstract: 'We investigate two crucial and closely-related aspects of CNNs for optical
    flow estimation: models and training. First, we design a compact but effective
    CNN model, called PWC-Net, according to simple and well-established principles:
    pyramidal processing, warping, and cost volume processing. PWC-Net is 17 times
    smaller in size, 2 times faster in inference, and 11 percent more accurate on
    Sintel final than the recent FlowNet2 model. It is the winning entry in the optical
    flow competition of the robust vision challenge. Next, we experimentally analyze
    the sources of our performance gains. In particular, we use the same training
    procedure for PWC-Net to retrain FlowNetC, a sub-network of FlowNet2. The retrained
    FlowNetC is 56 percent more accurate on Sintel final than the previously trained
    one and even 5 percent more accurate than the FlowNet2 model. We further improve
    the training procedure and increase the accuracy of PWC-Net on Sintel by 10 percent
    and on KITTI 2012 and 2015 by 20 percent. Our newly trained model parameters and
    training protocols are available on https://github.com/NVlabs/PWC-Net.'
  related_code: https://github.com/NVlabs/PWC-Net
