- author: Carolin M. Pirkl, Matteo Cencini, Jan W. Kurzawski, Diana Waldmannstetter,
    Hongwei Li 0004, Anjany Sekuboyina, Sebastian Endt, Luca Peretti, Graziella Donatelli,
    Rosa Pasquariello, Mauro Costagli, Guido Buonincontri, Michela Tosetti, Marion
    I. Menzel, Bjoern H. Menze
  title: Learning residual motion correction for fast and robust 3D multiparametric
    MRI.
  venue: Medical Image Anal.
  year: '2022'
  type: Journal Articles
  access: open
  key: journals/mia/PirklCKWLSEPDPC22
  doi: 10.1016/J.MEDIA.2022.102387
  ee: https://doi.org/10.1016/j.media.2022.102387
  url: https://dblp.org/rec/journals/mia/PirklCKWLSEPDPC22
  abstract: Voluntary and involuntary patient motion is a major problem for data quality
    in clinical routine of Magnetic Resonance Imaging (MRI). It has been thoroughly
    investigated and, yet it still remains unresolved. In quantitative MRI, motion
    artifacts impair the entire temporal evolution of the magnetization and cause
    errors in parameter estimation. Here, we present a novel strategy based on residual
    learning for retrospective motion correction in fast 3D whole-brain multiparametric
    MRI. We propose a 3D multiscale convolutional neural network (CNN) that learns
    the non-linear relationship between the motion-affected quantitative parameter
    maps and the residual error to their motion-free reference. For supervised model
    training, despite limited data availability, we propose a physics-informed simulation
    to generate self-contained paired datasets from a priori motion-free data. We
    evaluate motion-correction performance of the proposed method for the example
    of 3D Quantitative Transient-state Imaging at 1.5T and 3T. We show the robustness
    of the motion correction for various motion regimes and demonstrate the generalization
    capabilities of the residual CNN in terms of real-motion in vivo data of healthy
    volunteers and clinical patient cases, including pediatric and adult patients
    with large brain lesions. Our study demonstrates that the proposed motion correction
    outperforms current state of the art, reliably providing a high, clinically relevant
    image quality for mild to pronounced patient movements. This has important implications
    in clinical setups where large amounts of motion affected data must be discarded
    as they are rendered diagnostically unusable.
  related_code: ''
- author: Jaume Coll-Font, Onur Afacan, Jeanne Chow, Richard S. Lee, Simon K. Warfield,
    Sila Kurugol
  title: Modeling dynamic radial contrast enhanced MRI with linear time invariant
    systems for motion correction in quantitative assessment of kidney function.
  venue: Medical Image Anal.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/mia/Coll-FontACLWK21
  doi: 10.1016/J.MEDIA.2020.101880
  ee: https://doi.org/10.1016/j.media.2020.101880
  url: https://dblp.org/rec/journals/mia/Coll-FontACLWK21
  abstract: Early identification of kidney function deterioration is essential to
    determine which newborn patients with congenital kidney disease should be considered
    for surgical intervention as opposed to observation. Kidney function can be measured
    by fitting a tracer kinetic (TK) model onto a series of Dynamic Contrast Enhanced
    (DCE) MR images and estimating the filtration rate parameter from the model. Unfortunately,
    breathing and large bulk motion events due to patient movement in the scanner
    create outliers and misalignments that introduce large errors in the TK model
    parameter estimates even when using a motion-robust dynamic radial VIBE sequence
    for DCE-MR imaging. The misalignments between the series of volumes are difficult
    to correct using standard registration due to 1) the large differences in geometry
    and contrast between volumes of the dynamic sequence and 2) the requirement of
    fast dynamic imaging to achieve high temporal resolution and motion deteriorates
    image quality. These difficulties reduce the accuracy and stability of registration
    over the dynamic sequence. An alternative registration approach is to generate
    noise and motion free templates of the original data from the TK model and use
    them to register each volume to its contrast-matched template. However, the TK
    models used to characterize DCE-MRI are tissue specific, non-linear and sensitive
    to the same motion and sampling artifacts that hinder registration in the first
    place. Hence, these can only be applied to register accurately pre-segmented regions
    of interest, such as kidneys, and might converge to local minima under the presence
    of large artifacts. Here we introduce a novel linear time invariant (LTI) model
    to characterize DCE-MR data for different tissue types within a volume. We approximate
    the LTI model as a sparse sum of first order LTI functions to introduce robustness
    to motion and sampling artifacts. Hence, this model is well suited for registration
    of the entire field of view of DCE-MR data with artifacts and outliers. We incorporate
    this LTI model into a registration framework and evaluate it on both synthetic
    data and data from 20 children. For each subject, we reconstructed the sequence
    of DCE-MR images, detected corrupted volumes acquired during motion, aligned the
    sequence of volumes and recovered the corrupted volumes using the LTI model. The
    results show that our approach correctly aligned the volumes, provided the most
    stable registration in time and improved the tracer kinetic model fit.
  related_code: ''
- author: Amitay Nachmani, Roey Schurr, Leo Joskowicz, Aviv A. Mezer
  title: The effect of motion correction interpolation on quantitative T1 mapping
    with MRI.
  venue: Medical Image Anal.
  year: '2019'
  type: Journal Articles
  access: closed
  key: journals/mia/NachmaniSJM19
  doi: 10.1016/J.MEDIA.2018.11.012
  ee: https://doi.org/10.1016/j.media.2018.11.012
  url: https://dblp.org/rec/journals/mia/NachmaniSJM19
  abstract: HighlightsWe tested the effect of motion correction artifacts of images
    acquired for quantitative magnetic resonance imaging (QMRI).Using simulations,
    we calculated the transformation error resulting from the interpolation and resampling
    processes.We found that the registration error is a function of images' contrast
    as well as the amount of the translation and rotation of the images.We found that
    the registration artifacts affect the accuracy of the estimated physical properties
    of the tissue, such as T1 relaxation (˜10% of the signal).We showed that minimizing
    the registration error enables a more accurate in vivo modeling of brain structure
    with T1 maps. ABSTRACT Quantitative magnetic resonance imaging (qMRI) is a technique
    for mapping the physical properties of the underlying tissue using several MR
    images with different contrasts. To overcome subject motion between the acquired
    images, it is necessary to register the images to a common reference frame. A
    drawback of registration is the use of interpolation and resampling techniques,
    which can introduce artifacts into the interpolated data. These artifacts could
    have unfavorable effects on the accuracy of the estimated tissue's physical properties.
    Here, we quantified the error of interpolation and resampling on T1‐weighted images
    and studied its effects on the mapping of the longitudinal relaxation time (T1)
    using variable flip angles. We simulated T1‐weighted images and calculated the
    transformation error resulting from interpolation and resampling. We found that
    the error is a function of the image contrast (i.e., flip angle) and of the translation
    and rotation of the image. Furthermore, we found that the error in the T1‐weighted
    images has a substantial effect on the T1 estimation, of the order of 10% of the
    signal in the brain's gray and white matter. Hence, minimizing the registration
    error can enable more accurate in vivo modeling of brain microstructure. Graphical
    abstract Figure. No caption available.
  related_code: ''
- author: Sofie Tilborghs, Tom Dresselaers, Piet Claus, Guido Claessen, Jan Bogaert,
    Frederik Maes, Paul Suetens
  title: Robust motion correction for cardiac T1 and ECV mapping using a T1 relaxation
    model approach.
  venue: Medical Image Anal.
  year: '2019'
  type: Journal Articles
  access: closed
  key: journals/mia/TilborghsDCCBMS19
  doi: 10.1016/J.MEDIA.2018.12.004
  ee: https://doi.org/10.1016/j.media.2018.12.004
  url: https://dblp.org/rec/journals/mia/TilborghsDCCBMS19
  abstract: HighlightsWe present a novel method for motion correction in cardiac T1
    and ECV mapping.It combines data‐driven initialization with model‐based registration
    refinement.Registration is based on a robust estimation of the T1‐relaxation in
    each voxel.We demonstrate the performance of our method for different acquisition
    setups.We show that large free‐breathing motion artifacts can be successfully
    corrected. Graphical abstract Figure. No caption available. ABSTRACT T1 and ECV
    mapping are quantitative methods for myocardial tissue characterization using
    cardiac MRI, and are highly relevant for the diagnosis of diffuse myocardial diseases.
    Since the maps are calculated pixel‐by‐pixel from a set of MRI images with different
    T1‐weighting, it is critical to assure exact spatial correspondence between these
    images. However, in practice, different sources of motion e.g. cardiac motion,
    respiratory motion or patient motion, hamper accurate T1 and ECV calculation such
    that retrospective motion correction is required. We propose a new robust non‐rigid
    registration framework combining a data‐driven initialization with a model‐based
    registration approach, which uses a model for T1 relaxation to avoid direct registration
    of images with highly varying contrast. The registration between native T1 and
    enhanced T1 to obtain a motion free ECV map is also calculated using information
    from T1 model‐fitting. The method was validated on three datasets recorded with
    two substantially different acquisition protocols (MOLLI (dataset 1 (n=15) and
    dataset 2 (n=29)) and STONE (dataset 3 (n = 210))), one in breath‐hold condition
    and one free‐breathing. The average Dice coefficient increased from 72.6 ± 12.1%
    to 82.3 ± 7.4% (P < 0.05) and mean boundary error decreased from 2.91 ± 1.51mm
    to 1.62 ± 0.80mm (P < 0.05) for motion correction in a single T1‐weighted image
    sequence (3 datasets) while average Dice coefficient increased from 63.4 ± 22.5%
    to 79.2 ± 8.5% (P < 0.05) and mean boundary error decreased from 3.26 ± 2.64mm
    to 1.77 ± 0.86mm (P < 0.05) between native and enhanced sequences (dataset 1 and
    2). Overall, the native T1 SD error decreased from 67.32 ± 32.57ms to 58.11 ±
    21.59ms (P < 0.05), enhanced SD error from 30.15 ± 25ms to 22.74 ± 8.94ms (P <
    0.05) and ECV SD error from 10.08 ± 9.59% to 5.42 ± 3.21% (P < 0.05) (dataset
    1 and 2).
