- author: Xueyang Kang, Zhengkang Xiang, Zezheng Zhang, Kourosh Khoshelham
  title: 'Look Beyond: Two-Stage Scene View Generation via Panorama and Video Diffusion.'
  venue: ACM Multimedia
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/KangXZK25
  doi: 10.1145/3746027.3754779
  ee: https://doi.org/10.1145/3746027.3754779
  url: https://dblp.org/rec/conf/mm/KangXZK25
  abstract: Novel view synthesis (NVS) from a single image is highly ill-posed due
    to large unobserved regions, especially for views that deviate significantly from
    the input. While existing methods focus on consistency between the source and
    generated views, they often fail to maintain coherence and correct view alignment
    across long-range or looped trajectories. We propose a model that addresses this
    by decomposing single-view NVS into a 360-degree scene extrapolation followed
    by novel view interpolation. This design ensures long-term view and scene consistency
    by conditioning on keyframes extracted and warped from a generated panoramic representation.
    In the first stage, a panorama diffusion model learns the scene prior from the
    input perspective image. Perspective keyframes are then sampled and warped from
    the panorama and used as anchor frames in a pre-trained video diffusion model,
    which generates novel views through a proposed spatial noise diffusion process.
    Compared to the prior work, our method produces globally consistent novel views-even
    in loop-closure scenarios, while enabling flexible camera control. Experiments
    on diverse scene datasets demonstrate that our approach outperforms existing methods
    in generating coherent views along user-defined trajectories. Our implementation
    is available at https://github.com/YiGuYT/LookBeyond.
  related_code: https://github.com/YiGuYT/LookBeyond
- author: Sooho Kim, Soyeon Hong, Kyungsoo Park, Hyunsouk Cho, Kyung-Ah Sohn
  title: 'OmniStitch: Depth-Aware Stitching Framework for Omnidirectional Vision with
    Multiple Cameras.'
  venue: ACM Multimedia
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/KimHPCS24
  doi: 10.1145/3664647.3681208
  ee: https://doi.org/10.1145/3664647.3681208
  url: https://dblp.org/rec/conf/mm/KimHPCS24
  abstract: Omnidirectional vision systems provide a 360-degree panoramic view, enabling
    full environmental awareness in various fields, such as Advanced Driver Assistance
    Systems (ADAS) and Virtual Reality (VR). Existing omnidirectional stitching methods
    rely on a single specialized 360-degree camera. However, due to hardware limitations
    such as high mounting heights and blind spots, adapting these methods to vehicles
    of varying sizes and geometries is challenging. These challenges include limited
    generalizability due to the reliance on predefined stitching regions for fixed
    camera arrays, performance degradation from distance parallax leading to large
    depth differences, and the absence of suitable datasets with ground truth for
    multi-camera omnidirectional systems. To overcome these challenges, we propose
    a novel omnidirectional stitching framework and a publicly available dataset tailored
    for varying distance scenarios with multiple cameras. The framework, referred
    to as OmniStitch, consists of a Stitching Region Maximization (SRM) module for
    automatic adaptation to different vehicles with multiple cameras and a Depth-Aware
    Stitching (DAS) module to handle depth differences caused by distance parallax
    between cameras. In addition, we create and release an omnidirectional stitching
    dataset, called GV360, which provides ground truth images that maintain the perspective
    of the 360-degree FOV, designed explicitly for vehicle-agnostic systems. Extensive
    evaluations of this dataset demonstrate that our framework outperforms state-of-the-art
    stitching models, especially in handling varying distance parallax. The proposed
    dataset and code are publicly available in https://github.com/tngh5004/Omnistitch.
  related_code: https://github.com/tngh5004/Omnistitch
- author: Qi Jia 0001, Xiaomei Feng, Yu Liu 0012, Xin Fan 0001, Longin Jan Latecki
  title: Learning Pixel-wise Alignment for Unsupervised Image Stitching.
  venue: ACM Multimedia
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/JiaFL0L23
  doi: 10.1145/3581783.3612298
  ee: https://doi.org/10.1145/3581783.3612298
  url: https://dblp.org/rec/conf/mm/JiaFL0L23
  abstract: Image stitching aims to align a pair of images in the same view. Generating
    precise alignment with natural structures is challenging for image stitching,
    as there is no wider field-of-view image as a reference, especially in non-coplanar
    practical scenarios. In this paper, we propose an unsupervised image stitching
    framework, breaking through the coplanar constraints in homography estimation,
    yielding accurate pixel-wise alignment under limited overlapping regions. First,
    we generate a global transformation by an iterative dense feature matching combined
    with an error control strategy to alleviate the difference introduced by large
    parallax. Second, we propose a pixel-wise warping network embedded within a large-scale
    feature extractor and a correlative feature enhancement module to explicitly learn
    correspondences between the inputs, and generate accurate pixel-level offsets
    upon novel constraints on both overlapping and non-overlapping regions. Notably,
    we leverage the pixel-level offsets in the overlapping area to guide the adjustment
    in the non-overlapping area upon content and structure consistency constraints,
    rendering a natural transition between two regions and distortions suppression
    over the entire stitched image. The proposed method achieves state-of-the-art
    performance that surpasses both traditional and deep learning approaches by a
    large margin. It also achieves the shortest execution time and has the best generalization
    ability on the traditional dataset.
  related_code: ''
- author: Zhiying Jiang, Zengxi Zhang, Jinyuan Liu 0001, Xin Fan 0001, Risheng Liu
  title: Multi-Spectral Image Stitching via Spatial Graph Reasoning.
  venue: ACM Multimedia
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/JiangZL0L23
  doi: 10.1145/3581783.3612005
  ee: https://doi.org/10.1145/3581783.3612005
  url: https://dblp.org/rec/conf/mm/JiangZL0L23
  abstract: Multi-spectral image stitching leverages the complementarity between infrared
    and visible images to generate a robust and reliable wide field-of-view~(FOV)
    scene. The primary challenge of this task is to explore the relations between
    multi-spectral images for aligning and integrating multi-view scenes. Capitalizing
    on the strengths of Graph Convolutional Networks (GCNs) in modeling feature relationships,
    we propose a spatial graph reasoning based multi-spectral image stitching method
    that effectively distills the deformation and integration of multi-spectral images
    across different viewpoints. To accomplish this, we embed multi-scale complementary
    features from the same view position into a set of nodes. The correspondence across
    different views is learned through powerful dense feature embeddings, where both
    inter- and intra-correlations are developed to exploit cross-view matching and
    enhance inner feature disparity. By introducing long-range coherence along spatial
    and channel dimensions, the complementarity of pixel relations and channel interdependencies
    aids in the reconstruction of aligned multi-view features, generating informative
    and reliable wide FOV scenes. Moreover, we release a challenging dataset named
    ChaMS, comprising both real-world and synthetic sets with significant parallax,
    providing a new option for comprehensive evaluation. Extensive experiments demonstrate
    that our method surpasses the state-of-the-arts.
  related_code: ''
- author: Jionghao Wang, Ziyu Chen, Jun Ling, Rong Xie 0004, Li Song 0001
  title: 360-Degree Panorama Generation from Few Unregistered NFoV Images.
  venue: ACM Multimedia
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/WangCLX023
  doi: 10.1145/3581783.3612508
  ee: https://doi.org/10.1145/3581783.3612508
  url: https://dblp.org/rec/conf/mm/WangCLX023
  abstract: 360° panoramas are extensively utilized as environmental light sources
    in computer graphics. However, capturing a 360° × 180° panorama poses challenges
    due to the necessity of specialized and costly equipment, and additional human
    resources. Prior studies develop various learning-based generative methods to
    synthesize panoramas from a single Narrow Field-of-View (NFoV) image, but they
    are limited in alterable input patterns, generation quality, and controllability.
    To address these issues, we propose a novel pipeline called PanoDiff, which efficiently
    generates complete 360° panoramas using one or more unregistered NFoV images captured
    from arbitrary angles. Our approach has two primary components to overcome the
    limitations. Firstly, a two-stage angle prediction module to handle various numbers
    of NFoV inputs. Secondly, a novel latent diffusion-based panorama generation model
    uses incomplete panorama and text prompts as control signals and utilizes several
    geometric augmentation schemes to ensure geometric properties in generated panoramas.
    Experiments show that PanoDiff achieves state-of-the-art panoramic generation
    quality and high controllability, making it suitable for applications such as
    content editing.
  related_code: ''
- author: Zhihua Hu, Bo Duan, Yanfeng Zhang 0004, Mingwei Sun, Jingwei Huang 0001
  title: 'MVLayoutNet: 3D Layout Reconstruction with Multi-view Panoramas.'
  venue: ACM Multimedia
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/HuDZSH22
  doi: 10.1145/3503161.3548071
  ee: https://doi.org/10.1145/3503161.3548071
  url: https://dblp.org/rec/conf/mm/HuDZSH22
  abstract: We present MVLayoutNet, a network for holistic 3D reconstruction from
    multi-view panoramas. Our core contribution is to seamlessly combine learned monocular
    layout estimation and multi-view stereo (MVS) for accurate layout reconstruction
    in both 3D and image space. We jointly train a layout module to produce an initial
    layout and a novel MVS module to obtain accurate layout geometry. Unlike standard
    MVSNet, our MVS module takes a newly-proposed layout cost volume, which aggregates
    multi-view costs at the same depth layer into corresponding layout elements. We
    additionally provide an attention-based scheme that guides the MVS module to focus
    on structural regions. Such a design considers both local pixel-level costs and
    global holistic information for better reconstruction. Experiments show that our
    method outperforms state-of-the-arts in terms of depth rmse by 21.7% and 41.2%
    on the 2D-3D-S [1] and ZInD [4] datasets. For complex scenes with multiple rooms,
    our method can be applied to each layout element of a precomputed topology to
    accurately reconstruct a globally coherent layout geometry.
  related_code: ''
- author: Zhiying Jiang, Zengxi Zhang, Xin Fan 0001, Risheng Liu
  title: 'Towards All Weather and Unobstructed Multi-Spectral Image Stitching: Algorithm
    and Benchmark.'
  venue: ACM Multimedia
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/JiangZ0L22
  doi: 10.1145/3503161.3547966
  ee: https://doi.org/10.1145/3503161.3547966
  url: https://dblp.org/rec/conf/mm/JiangZ0L22
  abstract: Image stitching is a fundamental task that requires multiple images from
    different viewpoints to generate a wide field-of-viewing~(FOV) scene. Previous
    methods are developed on RGB images. However, the severe weather and harsh conditions,
    such as rain, fog, low light, strong light, etc., on visible images may introduce
    evident interference, leading to the distortion and misalignment of the stitched
    results. To remedy the deficient imaging of optical sensors, we investigate the
    complementarity across infrared and visible images to improve the perception of
    scenes in terms of visual information and viewing ranges. Instead of the cascaded
    fusion-stitching process, where the inaccuracy accumulation caused by image fusion
    hinders the stitch performance, especially content loss and ghosting effect, we
    develop a learnable feature adaptive network to investigate a stitch-oriented
    feature representation and perform the information complementary at the feature-level.
    By introducing a pyramidal structure along with the global fast correlation regression,
    the quadrature attention based correspondence is more responsible for feature
    alignment, and the estimation of sparse offsets can be realized in a coarse-to-fine
    manner. Furthermore, we propose the first infrared and visible image based multi-spectral
    image stitching dataset, covering a more comprehensive range of scenarios and
    diverse viewing baselines. Extensive experiments on real-world data demonstrate
    that our method reconstructs the wide FOV images with more credible structure
    and complementary information against state-of-the-arts.
  related_code: ''
- author: Sha Yu, Kevin McGuinness, Patricia Moore, David Azcona, Noel E. O&apos;Connor
  title: A Smart-Site-Survey System using Image-based 3D Metric Reconstruction and
    Interactive Panorama Visualization.
  venue: ACM Multimedia
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/YuMMAO20
  doi: 10.1145/3394171.3414425
  ee: https://doi.org/10.1145/3394171.3414425
  url: https://dblp.org/rec/conf/mm/YuMMAO20
  abstract: This work presents a so-called Smart Site Survey (SSS) system that provides
    an efficient, web-based platform for virtual inspection of remote sites with absolute
    3D metrics. Traditional manual surveying requires sending surveyors and specialised
    measuring tools to the targeted scene, which takes time and requires significant
    human resource, and often includes human error. The proposed system provides an
    automated site survey tool. Sample indoor scenes including offices, storage rooms,
    and laboratory are used for testing purposes, and highly precise virtual scenes
    are restored, with the measurement accuracy of 1%, i.e. an error ±1.5cm to a 150cm
    length. This is comparable or superior to existing works or commercial products.
  related_code: ''
- author: Jia Li 0003, Kaiwen Yu, Yifan Zhao 0002, Yu Zhang 0035, Long Xu 0001
  title: Cross-Reference Stitching Quality Assessment for 360° Omnidirectional Images.
  venue: ACM Multimedia
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/LiYZZX19
  doi: 10.1145/3343031.3350973
  ee: https://doi.org/10.1145/3343031.3350973
  url: https://dblp.org/rec/conf/mm/LiYZZX19
  abstract: Along with the development of virtual reality (VR), omnidirectional images
    play an important role in producing multimedia content with an immersive experience.
    However, despite various existing approaches for omnidirectional image stitching,
    how to quantitatively assess the quality of stitched images is still insufficiently
    explored. To address this problem, we first establish a novel omnidirectional
    image dataset containing stitched images as well as dual-fisheye images captured
    from standard quarters of 0$^\circ$, 90$^\circ$, 180$^\circ$, and 270$^\circ$.
    In this manner, when evaluating the quality of an image stitched from a pair of
    fisheye images (\eg, 0$^\circ$ and 180$^\circ$), the other pair of fisheye images
    (\eg, 90$^\circ$ and 270$^\circ$) can be used as the cross-reference to provide
    ground-truth observations of the stitching regions. Based on this dataset, we
    propose a set of Omnidirectional Stitching Image Quality Assessment (OS-IQA) metrics.
    In these metrics, the stitching regions are assessed by exploring the local relationships
    between the stitched image and its cross-reference with histogram statistics,
    perceptual hash and sparse reconstruction, while the whole stitched images are
    assessed by the global indicators of color difference and fitness of blind zones.Qualitative
    and quantitative experiments show our method outperforms the classic IQA metrics
    and is highly consistent with human subjective evaluations. To the best of our
    knowledge, it is the first attempt that assesses the stitching quality of omnidirectional
    images by using cross-references.
  related_code: ''
