- author: Xinyu Gao, Ziyi Yang 0008, Bingchen Gong, Xiaoguang Han 0001, Sipeng Yang,
    Xiaogang Jin 0001
  title: Towards Realistic Example-based Modeling via 3D Gaussian Stitching.
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/GaoYG0Y025
  doi: 10.1109/CVPR52734.2025.02477
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Gao_Towards_Realistic_Example-based_Modeling_via_3D_Gaussian_Stitching_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/GaoYG0Y025
  abstract: 'Using parts of existing models to rebuild new models, commonly termed
    as example-based modeling, is a classical methodology in the realm of computer
    graphics. Previous works mostly focus on shape composition, making them very hard
    to use for realistic composition of 3D objects captured from real-world scenes.
    This leads to combining multiple NeRFs into a single 3D scene to achieve seamless
    appearance blending. However, the current SeamlessNeRF method struggles to achieve
    interactive editing and harmonious stitching for real-world scenes due to its
    gradient-based strategy and grid-based representation. To this end, we present
    an example-based modeling method that combines multiple Gaussian fields in a point-based
    representation using sample-guided synthesis. Specifically, as for composition,
    we create a GUI to segment and transform multiple fields in real time, easily
    obtaining a semantically meaningful composition of models represented by 3D Gaussian
    Splatting (3DGS). For texture blending, due to the discrete and irregular nature
    of 3DGS, straightforwardly applying gradient propagation as SeamlssNeRF is not
    supported. Thus, a novel sampling-based cloning method is proposed to harmonize
    the blending while preserving the original rich texture and content. Our workflow
    consists of three steps: 1) real-time segmentation and transformation of 3DGS
    using a well-tailored GUI, 2) KNN analysis to identify boundary points in the
    intersecting area between the source and target models, and 3) two-phase optimization
    of the target model using sampling-based cloning and gradient constraints. Extensive
    experimental results validate that our approach significantly outperforms previous
    works in realistic synthesis, demonstrating its practicality.'
