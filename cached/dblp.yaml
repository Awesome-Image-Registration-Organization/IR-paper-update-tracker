- author: Shili Zhou, Xuhao Jiang, Weimin Tan, Ruian He, Bo Yan 0001
  title: 'MVFlow: Deep Optical Flow Estimation of Compressed Videos with Motion Vector
    Prior.'
  venue: ACM Multimedia
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/mm/ZhouJTH023
  doi: 10.1145/3581783.3611750
  ee: https://doi.org/10.1145/3581783.3611750
  url: https://dblp.org/rec/conf/mm/ZhouJTH023
  abstract: In recent years, many deep learning-based methods have been proposed to
    tackle the problem of optical flow estimation and achieved promising results.
    However, they hardly consider that most videos are compressed and thus ignore
    the pre-computed information in compressed video streams. Motion vectors, one
    of the compression information, record the motion of the video frames. They can
    be directly extracted from the compression code stream without computational cost
    and serve as a solid prior for optical flow estimation. Therefore, we propose
    an optical flow model, MVFlow, which uses motion vectors to improve the speed
    and accuracy of optical flow estimation for compressed videos. In detail, MVFlow
    includes a key Motion-Vector Converting Module, which ensures that the motion
    vectors can be transformed into the same domain of optical flow and then be utilized
    fully by the flow estimation module. Meanwhile, we construct four optical flow
    datasets for compressed videos containing frames and motion vectors in pairs.
    The experimental results demonstrate the superiority of our proposed MVFlow, which
    can reduce the AEPE by 1.09 compared to existing models or save 52% time to achieve
    similar accuracy to existing models.
