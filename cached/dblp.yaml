- author: Karel Kubicek 0001, Jakob Merane, Ahmed Bouhoula, David A. Basin
  title: Automating Website Registration for Studying GDPR Compliance.
  venue: WWW
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/www/0001MBB24
  doi: 10.1145/3589334.3645709
  ee: https://doi.org/10.1145/3589334.3645709
  url: https://dblp.org/rec/conf/www/0001MBB24
  abstract: Investigating how websites use sensitive user data is an active research
    area. However, research based on automated measurements has been limited to those
    websites that do not require user authentication. To overcome this limitation,
    we developed a crawler that automates website registrations and newsletter subscriptions
    and detects both security and privacy threats at scale. We demonstrate our crawler's
    capabilities by running it on 660k websites. We use this to identify security
    and privacy threats and to contextualize them within EU laws, namely the General
    Data Protection Regulation and ePrivacy Directive. Our methods detect private
    data collection over insecure HTTP connections and websites sending emails with
    user-provided passwords. We are also the first to apply machine learning to web
    forms, assessing violations of marketing consent collection requirements. Overall,
    we find that 37.2% of websites send marketing emails without proper user consent.
    This is mostly caused by websites failing both to verify and store consent adequately.
    Additionally, 1.8% of websites share users' email addresses with third parties
    without a transparent disclosure.
