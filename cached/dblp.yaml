- author: Liang Pang 0001, Yanyan Lan, Jiafeng Guo, Jun Xu 0001, Shengxian Wan, Xueqi
    Cheng
  title: Text Matching as Image Recognition.
  venue: AAAI
  year: '2016'
  type: Conference and Workshop Papers
  access: open
  key: conf/aaai/PangLGXWC16
  doi: 10.1609/AAAI.V30I1.10341
  ee: https://doi.org/10.1609/aaai.v30i1.10341
  url: https://dblp.org/rec/conf/aaai/PangLGXWC16
  abstract: Matching two texts is a fundamental problem in many natural language processing
    tasks. An effective way is to extract meaningful matching patterns from words,
    phrases, and sentences to produce the matching score. Inspired by the success
    of convolutional neural network in image recognition, where neurons can capture
    many complicated patterns based on the extracted elementary visual patterns such
    as oriented edges and corners, we propose to model text matching as the problem
    of image recognition. Firstly, a matching matrix whose entries represent the similarities
    between words is constructed and viewed as an image. Then a convolutional neural
    network is utilized to capture rich matching patterns in a layer-by-layer way.
    We show that by resembling the compositional hierarchies of patterns in image
    recognition, our model can successfully identify salient signals such as n-gram
    and n-term matchings. Experimental results demonstrate its superiority against
    the baselines.
