  abstract: It has been recently shown that a convolutional neural network can learn
    optical flow estimation with unsupervised learning. However, the performance of
    the unsupervised methods still has a relatively large gap compared to its supervised
    counterpart. Occlusion and large motion are some of the major factors that limit
    the current unsupervised learning of optical flow methods. In this work we introduce
    a new method which models occlusion explicitly and a new warping way that facilitates
