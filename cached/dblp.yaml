- author: Qing Wu 0001, Chenhe Du, Xuanyu Tian, Jingyi Yu 0001, Yuyao Zhang 0005,
    Hongjiang Wei
  title: 'Moner: Motion Correction in Undersampled Radial MRI with Unsupervised Neural
    Representation.'
  venue: ICLR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/iclr/WuDTYZW25
  doi: 10.48550/arXiv.2409.16921
  ee: https://openreview.net/forum?id=OdnqG1fYpo
  url: https://dblp.org/rec/conf/iclr/WuDTYZW25
  abstract: 'Motion correction (MoCo) in radial MRI is a particularly challenging
    problem due to the unpredictability of subject movement. Current state-of-the-art
    (SOTA) MoCo algorithms often rely on extensive high-quality MR images to pre-train
    neural networks, which constrains the solution space and leads to outstanding
    image reconstruction results. However, the need for large-scale datasets significantly
    increases costs and limits model generalization. In this work, we propose Moner,
    an unsupervised MoCo method that jointly reconstructs artifact-free MR images
    and estimates accurate motion from undersampled, rigid motion-corrupted k-space
    data, without requiring any training data. Our core idea is to leverage the continuous
    prior of implicit neural representation (INR) to constrain this ill-posed inverse
    problem, facilitating optimal solutions. Specifically, we integrate a quasi-static
    motion model into the INR, granting its ability to correct subject''s motion.
    To stabilize model optimization, we reformulate radial MRI reconstruction as a
    back-projection problem using the Fourier-slice theorem. Additionally, we propose
    a novel coarse-to-fine hash encoding strategy, significantly enhancing MoCo accuracy.
    Experiments on multiple MRI datasets show our Moner achieves performance comparable
    to SOTA MoCo techniques on in-domain data, while demonstrating significant improvements
    on out-of-domain data. The code is available at: https://github.com/iwuqing/Moner'
  related_code: https://github.com/iwuqing/Moner
