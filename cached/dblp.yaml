- author: Xinglong Luo, Ao Luo, Kunming Luo, Zhengning Wang, Ping Tan 0002, Bing Zeng
    0001, Shuaicheng Liu
  title: Learning Efficient Meshflow and Optical Flow From Event Cameras.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
