- author: Niklas Gunnarsson, Jens Sjölund, Thomas B. Schön
  title: Learning a Deformable Registration Pyramid.
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/GunnarssonSS20
  doi: 10.1007/978-3-030-71827-5_10
  ee: https://doi.org/10.1007/978-3-030-71827-5_10
  url: https://dblp.org/rec/conf/miccai/GunnarssonSS20
  abstract: We introduce an end-to-end unsupervised (or weakly supervised) image registration
    method that blends conventional medical image registration with contemporary deep
    learning techniques from computer vision. Our method downsamples both the fixed
    and the moving images into multiple feature map levels where a displacement field
    is estimated at each level and then further refined throughout the network. We
    train and test our model on three different datasets. In comparison with the initial
    registrations we find an improved performance using our model, yet we expect it
    would improve further if the model was fine-tuned for each task. The implementation
    is publicly available (https://github.com/ngunnar/learning-a-deformable-registration-pyramid).
- author: Lasse Hansen, Mattias P. Heinrich
  title: Discrete Unsupervised 3D Registration Methods for the Learn2Reg Challenge.
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/HansenH20
  doi: 10.1007/978-3-030-71827-5_8
  ee: https://doi.org/10.1007/978-3-030-71827-5_8
  url: https://dblp.org/rec/conf/miccai/HansenH20
  abstract: The Learn2Reg challenge poses four very different tasks with varying difficulty
    for image registration algorithms. In this short paper, we describe our choices
    for two state-of-the-art discrete 3D registration methods that enable fast and
    accurate estimation of large deformations without expert supervision during training.
    Both approaches primarily focus on the use of contrast-invariant features with
    dense displacement evaluation and were ranked among the top three of all challenge
    contestants, yielding two first places and three second places for the four sub-tasks.
