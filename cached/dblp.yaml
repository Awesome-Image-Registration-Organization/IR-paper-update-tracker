- author: Khanh Nguyen, Huy Hoang Nguyen, Aleksei Tiulpin
  title: 'AdaTriplet: Adaptive Gradient Triplet Loss with Automatic Margin Learning
    for Forensic Medical Image Matching.'
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/NguyenNT22
  doi: 10.1007/978-3-031-16452-1_69
  ee: https://doi.org/10.1007/978-3-031-16452-1_69
  url: https://dblp.org/rec/conf/miccai/NguyenNT22
  abstract: 'This paper tackles the challenge of forensic medical image matching (FMIM)
    using deep neural networks (DNNs). FMIM is a particular case of content-based
    image retrieval (CBIR). The main challenge in FMIM compared to the general case
    of CBIR, is that the subject to whom a query image belongs may be affected by
    aging and progressive degenerative disorders, making it difficult to match data
    on a subject level. CBIR with DNNs is generally solved by minimizing a ranking
    loss, such as Triplet loss (TL), computed on image representations extracted by
    a DNN from the original data. TL, in particular, operates on triplets: anchor,
    positive (similar to anchor) and negative (dissimilar to anchor). Although TL
    has been shown to perform well in many CBIR tasks, it still has limitations, which
    we identify and analyze in this work. In this paper, we introduce (i) the AdaTriplet
    loss -- an extension of TL whose gradients adapt to different difficulty levels
    of negative samples, and (ii) the AutoMargin method -- a technique to adjust hyperparameters
    of margin-based losses such as TL and our proposed loss dynamically. Our results
    are evaluated on two large-scale benchmarks for FMIM based on the Osteoarthritis
    Initiative and Chest X-ray-14 datasets. The codes allowing replication of this
    study have been made publicly available at \url{https://github.com/Oulu-IMEDS/AdaTriplet}.'
  related_code: https://github.com/Oulu-IMEDS/AdaTriplet
- author: Quande Liu, Hongzheng Yang, Qi Dou 0001, Pheng-Ann Heng
  title: Federated Semi-supervised Medical Image Classification via Inter-client Relation
    Matching.
  venue: MICCAI
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/LiuYDH21
  doi: 10.1007/978-3-030-87199-4_31
  ee: https://doi.org/10.1007/978-3-030-87199-4_31
  url: https://dblp.org/rec/conf/miccai/LiuYDH21
  abstract: Federated learning (FL) has emerged with increasing popularity to collaborate
    distributed medical institutions for training deep networks. However, despite
    existing FL algorithms only allow the supervised training setting, most hospitals
    in realistic usually cannot afford the intricate data labeling due to absence
    of budget or expertise. This paper studies a practical yet challenging FL problem,
    named \textit{Federated Semi-supervised Learning} (FSSL), which aims to learn
    a federated model by jointly utilizing the data from both labeled and unlabeled
    clients (i.e., hospitals). We present a novel approach for this problem, which
    improves over traditional consistency regularization mechanism with a new inter-client
    relation matching scheme. The proposed learning scheme explicitly connects the
    learning across labeled and unlabeled clients by aligning their extracted disease
    relationships, thereby mitigating the deficiency of task knowledge at unlabeled
    clients and promoting discriminative information from unlabeled samples. We validate
    our method on two large-scale medical image classification datasets. The effectiveness
    of our method has been demonstrated with the clear improvements over state-of-the-arts
    as well as the thorough ablation analysis on both tasks\footnote{Code will be
    made available at \url{https://github.com/liuquande/FedIRM}}.
  related_code: https://github.com/liuquande/FedIRM
- author: Manuel Jorge Cardoso, Marc Modat, Tom Vercauteren, Sébastien Ourselin
  title: 'Scale Factor Point Spread Function Matching: Beyond Aliasing in Image Resampling.'
  venue: MICCAI
  year: '2015'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/CardosoMVO15
  doi: 10.1007/978-3-319-24571-3_81
  ee: https://doi.org/10.1007/978-3-319-24571-3_81
  url: https://dblp.org/rec/conf/miccai/CardosoMVO15
  abstract: Imaging devices exploit the Nyquist-Shannon sampling theorem to avoid
    both aliasing and redundant oversampling by design. Conversely, in medical image
    resampling, images are considered as continuous functions, are warped by a spatial
    transformation, and are then sampled on a regular grid. In most cases, the spatial
    warping changes the frequency characteristics of the continuous function and no
    special care is taken to ensure that the resampling grid respects the conditions
    of the sampling theorem. This paper shows that this oversight introduces artefacts,
    including aliasing, that can lead to important bias in clinical applications.
    One notable exception to this common practice is when multi-resolution pyramids
    are constructed, with low-pass ”anti-aliasing” filters being applied prior to
    downsampling. In this work, we illustrate why similar caution is needed when resampling
    images under general spatial transformations and propose a novel method that is
    more respectful of the sampling theorem, minimising aliasing and loss of information.
    We introduce the notion of scale factor point spread function (sfPSF) and employ
    Gaussian kernels to achieve a computationally tractable resampling scheme that
    can cope with arbitrary non-linear spatial transformations and grid sizes. Experiments
    demonstrate significant (p < 10− 4) technical and clinical implications of the
    proposed method.
  related_code: ''
- author: Ali Madooei, Mark S. Drew, Maryam Sadeghi, M. Stella Atkins
  title: Automatic Detection of Blue-White Veil by Discrete Colour Matching in Dermoscopy
    Images.
  venue: MICCAI
  year: '2013'
  type: Conference and Workshop Papers
  access: open
  key: conf/miccai/MadooeiDSA13
  doi: 10.1007/978-3-642-40760-4_57
  ee: https://doi.org/10.1007/978-3-642-40760-4_57
  url: https://dblp.org/rec/conf/miccai/MadooeiDSA13
  abstract: Dermoscopy is a non-invasive skin imaging technique, which permits visualization
    of features of pigmented melanocytic neoplasms that are not discernable by examination
    with the naked eye. One of the most important features for the diagnosis of melanoma
    in dermoscopy images is the blue-white veil (irregular, structureless areas of
    confluent blue pigmentation with an overlying white "ground-glass" film). In this
    article, we present a machine learning approach to the detection of blue-white
    veil and related structures in dermoscopy images. The method involves contextual
    pixel classification using a decision tree classifier. The percentage of blue-white
    areas detected in a lesion combined with a simple shape descriptor yielded a sensitivity
    of 69.35% and a specificity of 89.97% on a set of 545 dermoscopy images. The sensitivity
    rises to 78.20% for detection of blue veil in those cases where it is a primary
    feature for melanoma recognition.
