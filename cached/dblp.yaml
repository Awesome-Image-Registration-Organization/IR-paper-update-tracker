- author: Yue Wang 0041, Justin Solomon 0001
  title: 'Deep Closest Point: Learning Representations for Point Cloud Registration.'
  venue: ICCV
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/WangS19
  doi: 10.1109/ICCV.2019.00362
  ee: https://doi.org/10.1109/ICCV.2019.00362
  url: https://dblp.org/rec/conf/iccv/WangS19
  abstract: 'Point cloud registration is a key problem for computer vision applied
    to robotics, medical imaging, and other applications. This problem involves finding
    a rigid transformation from one point cloud into another so that they align. Iterative
    Closest Point (ICP) and its variants provide simple and easily-implemented iterative
    methods for this task, but these algorithms can converge to spurious local optima.
    To address local optima and other difficulties in the ICP pipeline, we propose
    a learning-based method, titled Deep Closest Point (DCP), inspired by recent techniques
    in computer vision and natural language processing. Our model consists of three
    parts: a point cloud embedding network, an attention-based module combined with
    a pointer generation layer to approximate combinatorial matching, and a differentiable
    singular value decomposition (SVD) layer to extract the final rigid transformation.
    We train our model end-to-end on the ModelNet40 dataset and show in several settings
    that it performs better than ICP, its variants (e.g., Go-ICP, FGR), and the recently-proposed
    learning-based method PointNetLK. Beyond providing a state-of-the-art registration
    technique, we evaluate the suitability of our learned features transferred to
    unseen objects. We also provide preliminary analysis of our learned model to help
    understand whether domain-specific and/or global features facilitate rigid registration.'
  related_code: ''
- author: Shengyu Zhao, Yue Dong, Eric I-Chao Chang, Yan Xu 0001
  title: Recursive Cascaded Networks for Unsupervised Medical Image Registration.
  venue: ICCV
  year: '2019'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ZhaoDCX19
  doi: 10.1109/ICCV.2019.01070
  ee: https://doi.org/10.1109/ICCV.2019.01070
  url: https://dblp.org/rec/conf/iccv/ZhaoDCX19
  abstract: We present recursive cascaded networks, a general architecture that enables
    learning deep cascades, for deformable image registration. The proposed architecture
    is simple in design and can be built on any base network. The moving image is
    warped successively by each cascade and finally aligned to the fixed image; this
    procedure is recursive in a way that every cascade learns to perform a progressive
    deformation for the current warped image. The entire system is end-to-end and
    jointly trained in an unsupervised manner. In addition, enabled by the recursive
    architecture, one cascade can be iteratively applied for multiple times during
    testing, which approaches a better fit between each of the image pairs. We evaluate
    our method on 3D medical images, where deformable registration is most commonly
    applied. We demonstrate that recursive cascaded networks achieve consistent, significant
    gains and outperform state-of-the-art methods. The performance reveals an increasing
    trend as long as more cascades are trained, while the limit is not observed. Code
    is available at https://github.com/zsyzzsoft/Recursive-Cascaded-Networks.
