- author: Lang Nie, Chunyu Lin, Kang Liao, Shuaicheng Liu, Yao Zhao 0001
  title: 'Deep Rectangling for Image Stitching: A Learning Baseline.'
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/NieLLL022
  doi: 10.1109/CVPR52688.2022.00565
  ee: https://doi.org/10.1109/CVPR52688.2022.00565
  url: https://dblp.org/rec/conf/cvpr/NieLLL022
  abstract: Stitched images provide a wide field-of-view (FoV) but suffer from unpleasant
    irregular boundaries. To deal with this problem, existing image rectangling methods
    devote to searching an initial mesh and optimizing a target mesh to form the mesh
    deformation in two stages. Then rectangu-lar images can be generated by warping
    stitched images. However, these solutions only work for images with rich linear
    structures, leading to noticeable distortions for por-traits and landscapes with
    non-linear objects. In this paper, we address these issues by proposing the first
    deep learning solution to image rectangling. Con-cretely, we predefine a rigid
    target mesh and only estimate an initial mesh to form the mesh deformation, contributing
    to a compact one-stage solution. The initial mesh is predicted using a fully convolutional
    network with a resid-ual progressive regression strategy. To obtain results with
    high content fidelity, a comprehensive objective function is proposed to simultaneously
    encourage the boundary rect-angular, mesh shape-preserving, and content perceptually
    natural. Besides, we build the first image stitching rectan-gling dataset with
    a large diversity in irregular boundaries and scenes. Experiments demonstrate
    our superiority over traditional methods both quantitatively and qualitatively.
  related_code: ''
- author: Qi Jia 0001, Zhengjun Li, Xin Fan 0001, Haotian Zhao, Shiyu Teng, Xinchen
    Ye, Longin Jan Latecki
  title: Leveraging Line-Point Consistence To Preserve Structures for Wide Parallax
    Image Stitching.
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/0001L0ZTYL21
  doi: 10.1109/CVPR46437.2021.01201
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Jia_Leveraging_Line-Point_Consistence_To_Preserve_Structures_for_Wide_Parallax_Image_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/0001L0ZTYL21
  abstract: Generating high-quality stitched images with natural structures is a challenging
    task in computer vision. In this paper, we succeed in preserving both local and
    global geometric structures for wide parallax images, while reducing artifacts
    and distortions. A projective invariant, Characteristic Number, is used to match
    co-planar local sub-regions for input images. The homography between these well-matched
    sub-regions produces consistent line and point pairs, suppressing artifacts in
    overlapping areas. We explore and introduce global collinear structures into an
    objective function to specify and balance the desired characters for image warping,
    which can preserve both local and global structures while alleviating distortions.
    We also develop comprehensive measures for stitching quality to quantify the collinearity
    of points and the discrepancy of matched line pairs by considering the sensitivity
    to linear structures for human vision. Extensive experiments demonstrate the superior
    performance of the proposed method over the state-of-the-art by presenting sharp
    textures and preserving prominent natural structures in stitched images. Especially,
    our method not only exhibits lower errors but also the least divergence across
    all test images. Code is available at https://github.com/dut-media-lab/Image-Stitching.
  related_code: https://github.com/dut-media-lab/Image-Stitching
- author: Cheng Sun 0004, Chi-Wei Hsiao, Ning-Hsu Wang, Min Sun 0001, Hwann-Tzong
    Chen
  title: Indoor Panorama Planar 3D Reconstruction via Divide and Conquer.
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/0004HWSC21
  doi: 10.1109/CVPR46437.2021.01118
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Sun_Indoor_Panorama_Planar_3D_Reconstruction_via_Divide_and_Conquer_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/0004HWSC21
  abstract: Indoor panorama typically consists of human-made structures parallel or
    perpendicular to gravity. We leverage this phenomenon to approximate the scene
    in a 360-degree image with (H)orizontal-planes and (V)ertical-planes. To this
    end, we propose an effective divide-and-conquer strategy that divides pixels based
    on their plane orientation estimation; then, the succeeding instance segmentation
    module conquers the task of planes clustering more easily in each plane orientation
    group. Besides, parameters of V-planes depend on camera yaw rotation, but translation-invariant
    CNNs are less aware of the yaw change. We thus propose a yaw-invariant V-planar
    reparameterization for CNNs to learn. We create a benchmark for indoor panorama
    planar reconstruction by extending existing 360 depth datasets with ground truth
    H&V-planes (referred to as "PanoH&V" dataset) and adopt state-of-the-art planar
    reconstruction methods to predict H&V-planes as our baselines. Our method outperforms
    the baselines by a large margin on the proposed dataset.
