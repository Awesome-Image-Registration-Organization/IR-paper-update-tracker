- author: Haisong Liu, Tao Lu 0005, Yihui Xu, Jia Liu 0008, Limin Wang 0002
  title: Learning Optical Flow and Scene Flow With Bidirectional Camera-LiDAR Fusion.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
