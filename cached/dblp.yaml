- author: Lixuan Chen, Xuanyu Tian, Jiangjie Wu, Ruimin Feng, Guoyan Lao, Yuyao Zhang
    0005, Hongen Liao, Hongjiang Wei
  title: Joint coil sensitivity and motion correction in parallel MRI with a self-calibrating
    score-based diffusion model.
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/ChenTWFLZLW25
  doi: 10.1016/J.MEDIA.2025.103502
  ee: https://doi.org/10.1016/j.media.2025.103502
  url: https://dblp.org/rec/journals/mia/ChenTWFLZLW25
  abstract: Magnetic Resonance Imaging (MRI) stands as a powerful modality in clinical
    diagnosis. However, it faces challenges such as long acquisition time and vulnerability
    to motion-induced artifacts. While many existing motion correction algorithms
    have shown success, most fail to account for the impact of motion artifacts on
    coil sensitivity map (CSM) estimation during fast MRI reconstruction. This oversight
    can lead to significant performance degradation, as errors in the estimated CSMs
    can propagate and compromise motion correction. In this work, we propose JSMoCo,
    a novel method for jointly estimating motion parameters and time-varying coil
    sensitivity maps for under-sampled MRI reconstruction. The joint estimation presents
    a highly ill-posed inverse problem due to the increased number of unknowns. To
    address this challenge, we leverage score-based diffusion models as powerful priors
    and apply MRI physical principles to effectively constrain the solution space.
    Specifically, we parameterize rigid motion with trainable variables and model
    CSMs as polynomial functions. A Gibbs sampler is employed to ensure system consistency
    between the sensitivity maps and the reconstructed images, effectively preventing
    error propagation from pre-estimated sensitivity maps to the final reconstructed
    images. We evaluate JSMoCo through 2D and 3D motion correction experiments on
    simulated motion-corrupted fastMRI dataset and in-vivo real MRI brain scans. The
    results demonstrate that JSMoCo successfully reconstructs high-quality MRI images
    from under-sampled k-space data, achieving robust motion correction by accurately
    estimating time-varying coil sensitivities. The code is available at https://github.com/MeijiTian/JSMoCo.
  related_code: https://github.com/MeijiTian/JSMoCo
- author: Eyal Hanania, Adi Zehavi-Lenz, Ilya Volovik, Daphna Link-Sourani, Israel
    Cohen, Moti Freiman
  title: 'MBSS-T1: Model-based subject-specific self-supervised motion correction
    for robust cardiac T1 mapping.'
  venue: Medical Image Anal.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/mia/HananiaZVLCF25
  doi: 10.1016/J.MEDIA.2025.103495
  ee: https://doi.org/10.1016/j.media.2025.103495
  url: https://dblp.org/rec/journals/mia/HananiaZVLCF25
  abstract: 'Cardiac T1 mapping is a valuable quantitative MRI technique for diagnosing
    diffuse myocardial diseases. Traditional methods, relying on breath-hold sequences
    and cardiac triggering based on an ECG signal, face challenges with patient compliance,
    limiting their effectiveness. Image registration can enable motion-robust cardiac
    T1 mapping, but inherent intensity differences between time points pose a challenge.
    We present MBSS-T1, a subject-specific self-supervised model for motion correction
    in cardiac T1 mapping. Physical constraints, implemented through a loss function
    comparing synthesized and motion-corrected images, enforce signal decay behavior,
    while anatomical constraints, applied via a Dice loss, ensure realistic deformations.
    The unique combination of these constraints results in motion-robust cardiac T1
    mapping along the longitudinal relaxation axis. In a 5-fold experiment on a public
    dataset of 210 patients (STONE sequence) and an internal dataset of 19 patients
    (MOLLI sequence), MBSS-T1 outperformed baseline deep-learning registration methods.
    It achieved superior model fitting quality (R2: 0.975 vs. 0.941, 0.946 for STONE;
    0.987 vs. 0.982, 0.965 for MOLLI free-breathing; 0.994 vs. 0.993, 0.991 for MOLLI
    breath-hold), anatomical alignment (Dice: 0.89 vs. 0.84, 0.88 for STONE; 0.963
    vs. 0.919, 0.851 for MOLLI free-breathing; 0.954 vs. 0.924, 0.871 for MOLLI breath-hold),
    and visual quality (4.33 vs. 3.38, 3.66 for STONE; 4.1 vs. 3.5, 3.28 for MOLLI
    free-breathing; 3.79 vs. 3.15, 2.84 for MOLLI breath-hold). MBSS-T1 enables motion-robust
    T1 mapping for broader patient populations, overcoming challenges such as suboptimal
    compliance, and facilitates free-breathing cardiac T1 mapping without requiring
    large annotated datasets. Our code is available at https://github.com/TechnionComputationalMRILab/MBSS-T1.'
