- author: Wenting Chen, Jie Liu 0044, Tianming Liu 0001, Yixuan Yuan
  title: 'Bi-VLGM: Bi-Level Class-Severity-Aware Vision-Language Graph Matching for
    Text Guided Medical Image Segmentation.'
  venue: Int. J. Comput. Vis.
  year: '2025'
  type: Journal Articles
  access: closed
  key: journals/ijcv/ChenLLY25
  doi: 10.1007/S11263-024-02246-W
  ee: https://doi.org/10.1007/s11263-024-02246-w
  url: https://dblp.org/rec/journals/ijcv/ChenLLY25
  abstract: Abstract Medical reports containing specific diagnostic results and additional
    information not present in medical images can be effectively employed to assist
    image understanding tasks, and the modality gap between vision and language can
    be bridged by vision-language matching (VLM). However, current vision-language
    models distort the intra-model relation and only include class information in
    reports that is insufficient for segmentation task. In this paper, we introduce
    a novel Bi-level class-severity-aware Vision-Language Graph Matching (Bi-VLGM)
    for text guided medical image segmentation, composed of a word-level VLGM module
    and a sentence-level VLGM module, to exploit the class-severity-aware relation
    among visual-textual features. In word-level VLGM, to mitigate the distorted intra-modal
    relation during VLM, we reformulate VLM as graph matching problem and introduce
    a vision-language graph matching (VLGM) to exploit the high-order relation among
    visual-textual features. Then, we perform VLGM between the local features for
    each class region and class-aware prompts to bridge their gap. In sentence-level
    VLGM, to provide disease severity information for segmentation task, we introduce
    a severity-aware prompting to quantify the severity level of disease lesion, and
    perform VLGM between the global features and the severity-aware prompts. By exploiting
    the relation between the local (global) and class (severity) features, the segmentation
    model can include the class-aware and severity-aware information to promote segmentation
    performance. Extensive experiments proved the effectiveness of our method and
    its superiority to existing methods. The source code will be released.
