  url: https://dblp.org/rec/conf/miccai/SongGXCXTWWY21
  abstract: Prostate cancer biopsy benefits from accurate fusion of transrectal ultrasound
    (TRUS) and magnetic resonance (MR) images. In the past few years, convolutional
    neural networks (CNNs) have been proved powerful in extracting image features
    crucial for image registration. However, challenging applications and recent advances
    in computer vision suggest that CNNs are quite limited in its ability to understand
    spatial correspondence between features, a task in which the self-attention mechanism
    excels. This paper aims to develop a self-attention mechanism specifically for
    cross-modal image registration. Our proposed cross-modal attention block effectively
    maps each of the features in one volume to all features in the corresponding volume.
    Our experimental results demonstrate that a CNN network designed with the cross-modal
    attention block embedded outperforms an advanced CNN network 10 times of its size.
    We also incorporated visualization techniques to improve the interpretability
    of our network. The source code of our work is available at https://github.com/DIAL-RPI/Attention-Reg
    .
- author: Alexander Thorley, Xi Jia, Hyung Jin Chang, Boyang Liu, Karina Bunting,
    Victoria Stoll, Antonio de Marvao, Declan P. O&apos;Regan, Georgios V. Gkoutos,
    Dipak Kotecha, Jinming Duan 0001
  title: Nesterov Accelerated ADMM for Fast Diffeomorphic Image Registration.
  venue: MICCAI
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ThorleyJCLBSMOG21
  doi: 10.1007/978-3-030-87202-1_15
  ee: https://doi.org/10.1007/978-3-030-87202-1_15
  url: https://dblp.org/rec/conf/miccai/ThorleyJCLBSMOG21
  abstract: Deterministic approaches using iterative optimisation have been historically
    successful in diffeomorphic image registration (DiffIR). Although these approaches
    are highly accurate, they typically carry a significant computational burden.
    Recent developments in stochastic approaches based on deep learning have achieved
    sub-second runtimes for DiffIR with competitive registration accuracy, offering
    a fast alternative to conventional iterative methods. In this paper, we attempt
    to reduce this difference in speed whilst retaining the performance advantage
    of iterative approaches in DiffIR. We first propose a simple iterative scheme
    that functionally composes intermediate non-stationary velocity fields to handle
    large deformations in images whilst guaranteeing diffeomorphisms in the resultant
    deformation. We then propose a convex optimisation model that uses a regularisation
    term of arbitrary order to impose smoothness on these velocity fields and solve
    this model with a fast algorithm that combines Nesterov gradient descent and the
    alternating direction method of multipliers (ADMM). Finally, we leverage the computational
    power of GPU to implement this accelerated ADMM solver on a 3D cardiac MRI dataset,
    further reducing runtime to less than 2 seconds. In addition to producing strictly
    diffeomorphic deformations, our methods outperform both state-of-the-art deep
    learning-based and iterative DiffIR approaches in terms of dice and Hausdorff
    scores, with speed approaching the inference time of deep learning-based methods.
