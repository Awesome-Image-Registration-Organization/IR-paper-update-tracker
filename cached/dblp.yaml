- author: Mingyang Zhao 0001, Jingen Jiang 0001, Lei Ma 0008, Shiqing Xin, Gaofeng
    Meng, Dong-Ming Yan 0001
  title: Correspondence-Free Non-Rigid Point Set Registration Using Unsupervised Clustering
    Analysis.
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/ZhaoJ0XM024
  doi: 10.1109/CVPR52733.2024.02003
  ee: https://doi.org/10.1109/CVPR52733.2024.02003
  url: https://dblp.org/rec/conf/cvpr/ZhaoJ0XM024
  abstract: This paper presents a novel non-rigid point set registration method that
    is inspired by unsupervised clustering analysis. Unlike previous approaches that
    treat the source and target point sets as separate entities, we develop a holistic
    framework where they are formulated as clustering centroids and clustering members,
    separately. We then adopt Tikhonov regularization with an $\ell_{1}$-induced Laplacian
    kernel instead of the commonly used Gaussian kernel to ensure smooth and more
    robust displacement fields. Our formulation delivers closed-form solutions, theoretical
    guarantees, independence from dimensions, and the ability to handle large deformations.
    Subsequently, we introduce a clustering-improved Nyström method to effectively
    reduce the computational complexity and storage of the Gram matrix to linear,
    while providing a rigorous bound for the low-rank approximation. Our method achieves
    high accuracy results across various scenarios and surpasses competitors by a
    significant margin, particularly on shapes with sub-stantial deformations. Additionally,
    we demonstrate the versatility of our method in challenging tasks such as shape
    transfer and medical registration. [Code release]
  related_code: ''
- author: Zheng Qin 0002, Hao Yu 0010, Changjian Wang, Yuxing Peng 0001, Kai Xu 0004
  title: Deep Graph-based Spatial Consistency for Robust Non-rigid Point Cloud Registration.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/00020W0023
  doi: 10.1109/CVPR52729.2023.00522
  ee: https://doi.org/10.1109/CVPR52729.2023.00522
  url: https://dblp.org/rec/conf/cvpr/00020W0023
  abstract: We study the problem of outlier correspondence pruning for non-rigid point
    cloud registration. In rigid registration, spatial consistency has been a commonly
    used criterion to discriminate outliers from inliers. It measures the compatibility
    of two correspondences by the discrepancy between the respective distances in
    two point clouds. However, spatial consistency no longer holds in non-rigid cases
    and outlier rejection for non-rigid registration has not been well studied. In
    this work, we propose Graph-based Spatial Consistency Network (GraphSCNet) to
    filter outliers for non-rigid registration. Our method is based on the fact that
    non-rigid deformations are usually locally rigid, or local shape preserving. We
    first design a local spatial consistency measure over the deformation graph of
    the point cloud, which evaluates the spatial compatibility only between the correspondences
    in the vicinity of a graph node. An attention-based non-rigid correspondence embedding
    module is then devised to learn a robust representation of non-rigid correspondences
    from local spatial consistency. Despite its simplicity, GraphSCNet effectively
    improves the quality of the putative correspondences and attains state-of-the-art
    performance on three challenging benchmarks. Our code and models are available
    at https://github.com/qinzheng93/GraphSCNet.
  related_code: https://github.com/qinzheng93/GraphSCNet
- author: Sheng Ao, Qingyong Hu, Hanyun Wang, Kai Xu 0004, Yulan Guo
  title: 'BUFFER: Balancing Accuracy, Efficiency, and Generalizability in Point Cloud
    Registration.'
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/AoHW0G23
  doi: 10.1109/CVPR52729.2023.00127
  ee: https://doi.org/10.1109/CVPR52729.2023.00127
  url: https://dblp.org/rec/conf/cvpr/AoHW0G23
  abstract: 'An ideal point cloud registration framework should have superior accuracy,
    acceptable efficiency, and strong generalizability: However, this is highly challenging
    since existing registration techniques are either not accurate enough, far from
    efficient, or generalized poorly. It remains an open question that how to achieve
    a satisfying balance between this three key elements. In this paper, we propose
    BUFFER, a point cloud registration method for balancing accuracy, efficiency,
    and generalizability. The key to our approach is to take advantage of both point-wise
    and patch-wise techniques, while overcoming the inherent drawbacks simultaneously.
    Different from a simple combination of existing methods, each component of our
    network has been carefully crafted to tackle specific issues. Specifically, a
    Point-wise Learner is first introduced to enhance computational efficiency by
    predicting keypoints and improving the representation capacity of features by
    estimating point orientations, a Patch-wise Embedder which leverages a lightweight
    local feature learner is then deployed to extract efficient and general patch
    features. Additionally, an Inliers Generator which combines simple neural layers
    and general features is presented to search inlier correspondences. Extensive
    experiments on real-world scenarios demonstrate that our method achieves the best
    of both worlds in accuracy, efficiency, and generalization. In particular, our
    method not only reaches the highest success rate on unseen domains, but also is
    almost 30 times faster than the strong baselines specializing in generalization.
    Code is available at https://github.com/aosheng1996/BUFFER.'
  related_code: https://github.com/aosheng1996/BUFFER
- author: Timo Bolkart, Tianye Li, Michael J. Black
  title: Instant Multi-View Head Capture through Learnable Registration.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/BolkartLB23
  doi: 10.1109/CVPR52729.2023.00081
  ee: https://doi.org/10.1109/CVPR52729.2023.00081
  url: https://dblp.org/rec/conf/cvpr/BolkartLB23
  abstract: Existing methods for capturing datasets of 3D heads in dense semantic
    correspondence are slow and commonly address the problem in two separate steps;
    multi-view stereo (MVS) reconstruction followed by non-rigid registration. To
    simplify this process, we introduce TEMPEH (Towards Estimation of 3D Meshes from
    Performances of Expressive Heads) to directly infer 3D heads in dense correspondence
    from calibrated multi-view images. Registering datasets of 3D scans typically
    requires manual parameter tuning to find the right balance between accurately
    fitting the scans' surfaces and being robust to scanning noise and outliers. Instead,
    we propose to jointly register a 3D head dataset while training TEMPEH. Specifically,
    during training, we minimize a geometric loss commonly used for surface registration,
    effectively leveraging TEMPEH as a regularizer. Our multi-view head inference
    builds on a volumetric feature representation that samples and fuses features
    from each view using camera calibration information. To account for partial occlusions
    and a large capture volume that enables head movements, we use view-and surface-aware
    feature fusion, and a spatial transformer-based head localization module, respectively.
    We use raw MVS scans as supervision during training, but, once trained, TEMPEH
    directly predicts 3D heads in dense correspondence without requiring scans. Predicting
    one head takes about 0.3 seconds with a median reconstruction error of 0.26 mm,
    64% lower than the current state-of-the-art. This enables the efficient capture
    of large datasets containing multiple people and diverse facial motions. Code,
    model, and data are publicly available at https://tempeh.is.tue.mpg.de.
  related_code: ''
- author: Yue Chen, Xingyu Chen, Xuan Wang 0009, Qi Zhang 0029, Yu Guo 0006, Ying
    Shan, Fei Wang 0008
  title: Local-to-Global Registration for Bundle-Adjusting Neural Radiance Fields.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/ChenCWZ0S023
  doi: 10.1109/CVPR52729.2023.00799
  ee: https://doi.org/10.1109/CVPR52729.2023.00799
  url: https://dblp.org/rec/conf/cvpr/ChenCWZ0S023
  abstract: 'Neural Radiance Fields (NeRF) have achieved photorealistic novel views
    synthesis; however, the requirement of accurate camera poses limits its application.
    Despite analysis-by-synthesis extensions for jointly learning neural3D representations
    and registering camera frames exist, they are susceptible to suboptimal solutions
    if poorly initialized. We propose L2G-NeRF, a Local-to-Global registration method
    for bundle-adjusting Neural Radiance Fields: first, a pixel-wise flexible alignment,
    followed by a framewise constrained parametric alignment. Pixel-wise local alignment
    is learned in an unsupervised way via a deep network which optimizes photometric
    reconstruction errors. framewise global alignment is performed using differentiable
    parameter estimation solvers on the pixel-wise correspondences to find a global
    transformation. Experiments on synthetic and real-world data show that our method
    outperforms the current state-of-the-art in terms of high-fidelity reconstruction
    and resolving large camera pose misalignment. Our module is an easy-to-use plugin
    that can be applied to NeRF variants and other neural field applications. The
    Code and supplementary materials are available at https://rover-xingyu.github.io/L2G-NeRF/.'
  related_code: ''
- author: Can Gümeli, Angela Dai, Matthias Nießner
  title: 'ObjectMatch: Robust Registration using Canonical Object Correspondences.'
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/GumeliDN23
  doi: 10.1109/CVPR52729.2023.01257
  ee: https://doi.org/10.1109/CVPR52729.2023.01257
  url: https://dblp.org/rec/conf/cvpr/GumeliDN23
  abstract: We present ObjectMatch11https://cangumeli.github.io/ObjectMatch/, a semantic
    and object-centric camera pose estimator for RGB-D SLAM pipelines. Modern camera
    pose estimators rely on direct correspondences of overlapping regions between
    frames; however, they cannot align camera frames with little or no overlap. In
    this work, we propose to leverage indirect correspondences obtained via semantic
    object identification. For instance, when an object is seen from the front in
    one frame and from the back in another frame, we can provide additional pose constraints
    through canonical object correspondences. We first propose a neural network to
    predict such correspondences on a per-pixel level, which we then combine in our
    energy formulation with state-of-the-art keypoint matching solved with a joint
    Gauss-Newton optimization. In a pairwise setting, our method improves registration
    recall of state-of-the-art feature matching, including from 24% to 45% in pairs
    with 10% or less inter-frame overlap. In registering RGB-D sequences, our method
    outperforms cutting-edge SLAM baselines in challenging, low-frame-rate scenarios,
    achieving more than 35% reduction in trajectory error in multiple scenes.
  related_code: ''
- author: Haobo Jiang, Zheng Dang, Zhen Wei 0001, Jin Xie 0001, Jian Yang 0003, Mathieu
    Salzmann
  title: Robust Outlier Rejection for 3D Registration with Variational Bayes.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/JiangDWXYS23
  doi: 10.1109/CVPR52729.2023.00117
  ee: https://doi.org/10.1109/CVPR52729.2023.00117
  url: https://dblp.org/rec/conf/cvpr/JiangDWXYS23
  abstract: Learning-based outlier (mismatched correspondence) rejection for robust
    3D registration generally formulates the outlier removal as an inlier/outlier
    classification problem. The core for this to be successful is to learn the discriminative
    inlier/outlier feature representations. In this paper, we develop a novel variational
    non-local network-based outlier rejection framework for robust alignment. By reformulating
    the non-local feature learning with variational Bayesian inference, the Bayesian-driven
    long-range dependencies can be modeled to aggregate discriminative geometric context
    information for inlier/outlier distinction. Specifically, to achieve such Bayesian-driven
    contextual dependencies, each query/key/value component in our nonlocal network
    predicts a prior feature distribution and a posterior one. Embedded with the inlier/outlier
    label, the posterior feature distribution is label-dependent and discriminative.
    Thus, pushing the prior to be close to the discriminative posterior in the training
    step enables the features sampled from this prior at test time to model highquality
    long-range dependencies. Notably, to achieve effective posterior feature guidance,
    a specific probabilistic graphical model is designed over our non-local model,
    which lets us derive a variational low bound as our optimization objective for
    model training. Finally, we propose a voting-based inlier searching strategy to
    cluster the high-quality hypothetical inliers for transformation estimation. Extensive
    experiments on 3DMatch, 3DLoMatch, and KITTI datasets verify the effectiveness
    of our method. Code is available at https://github.com/Jiang-HB/VBReg.
  related_code: https://github.com/Jiang-HB/VBReg
- author: Guofeng Mei, Hao Tang 0005, Xiaoshui Huang, Weijie Wang, Juan Liu 0006,
    Jian Zhang 0002, Luc Van Gool, Qiang Wu 0001
  title: Unsupervised Deep Probabilistic Approach for Partial Point Cloud Registration.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/Mei0HWLZG023
  doi: 10.1109/CVPR52729.2023.01308
  ee: https://doi.org/10.1109/CVPR52729.2023.01308
  url: https://dblp.org/rec/conf/cvpr/Mei0HWLZG023
  abstract: 'Deep point cloud registration methods face challenges to partial overlaps
    and rely on labeled data. To address these issues, we propose UDPReg, an unsupervised
    deep probabilistic registration framework for point clouds with partial overlaps.
    Specifically, we first adopt a network to learn posterior probability distributions
    of Gaussian mixture models (GMMs) from point clouds. To handle partial point cloud
    registration, we apply the Sinkhorn algorithm to predict the distribution-level
    correspondences under the constraint of the mixing weights of GMMs. To enable
    unsupervised learning, we design three distribution consistency-based losses:
    self-consistency, cross-consistency, and local contrastive. The self-consistency
    loss is formulated by encouraging GMMs in Euclidean and feature spaces to share
    identical posterior distributions. The cross-consistency loss derives from the
    fact that the points of two partially overlapping point clouds belonging to the
    same clusters share the cluster centroids. The cross-consistency loss allows the
    network to flexibly learn a transformation-invariant posterior distribution of
    two aligned point clouds. The local contrastive loss facilitates the network to
    extract discriminative local features. Our UDPReg achieves competitive performance
    on the 3DMatch/3DLoMatch and ModelNet/ModelLoNet benchmarks.'
  related_code: ''
- author: Haiping Wang 0004, Yuan Liu 0025, Zhen Dong 0005, Yulan Guo, Yu-Shen Liu,
    Wenping Wang 0001, Bisheng Yang
  title: Robust Multiview Point Cloud Registration with Reliable Pose Graph Initialization
    and History Reweighting.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/WangLDGLWY23
  doi: 10.1109/CVPR52729.2023.00917
  ee: https://doi.org/10.1109/CVPR52729.2023.00917
  url: https://dblp.org/rec/conf/cvpr/WangLDGLWY23
  abstract: In this paper, we present a new method for the multi-view registration
    of point cloud. Previous multiview registration methods rely on exhaustive pairwise
    registration to construct a densely-connected pose graph and apply Iteratively
    Reweighted Least Square (IRLS) on the pose graph to compute the scan poses. However,
    constructing a densely-connected graph is time-consuming and contains lots of
    outlier edges, which makes the subsequent IRLS struggle to find correct poses.
    To address the above problems, we first propose to use a neural network to estimate
    the overlap between scan pairs, which enables us to construct a sparse but reliable
    pose graph. Then, we design a novel history reweighting function in the IRLS scheme,
    which has strong robustness to outlier edges on the graph. In comparison with
    existing multiview registration methods, our method achieves 11% higher registration
    recall on the 3DMatch dataset and ~ 13% lower registration errors on the ScanNet
    dataset while reducing ~ 70% required pairwise registrations. Comprehensive ablation
    studies are conducted to demonstrate the effectiveness of our designs. The source
    code is available at https://github.com/WHU-USI3DV/SGHR.
  related_code: https://github.com/WHU-USI3DV/SGHR
- author: Junle Yu, Luwei Ren, Wenhui Zhou 0001, Yu Zhang 0280, Lili Lin, Guojun Dai
  title: 'PEAL: Prior-embedded Explicit Attention Learning for Low-overlap Point Cloud
    Registration.'
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/YuRZZLD23
  doi: 10.1109/CVPR52729.2023.01698
  ee: https://doi.org/10.1109/CVPR52729.2023.01698
  url: https://dblp.org/rec/conf/cvpr/YuRZZLD23
  abstract: Learning distinctive point-wise features is critical for low-overlap point
    cloud registration. Recently, it has achieved huge success in incorporating Transformer
    into point cloud feature representation, which usually adopts a self-attention
    module to learn intra-point-cloud features first, then utilizes a cross-attention
    module to perform feature exchange between input point clouds. The advantage of
    Transformer models mainly benefits from the use of self-attention to capture the
    global correlations in feature space. However, these global correlations may involve
    ambiguity for point cloud registration task, especially in indoor low-overlap
    scenarios, because the correlations with an extensive range of non-overlapping
    points may degrade the feature distinctiveness. To address this issue, we present
    PEAL, a Prior-embedded Explicit Attention Learning model. By incorporating prior
    knowledge into the learning process, the points are divided into two parts. One
    includes points lying in the putative overlapping region and the other includes
    points located in the putative non-overlapping region. Then PEAL explicitly learns
    one-way attention with the putative overlapping points. This simplistic design
    attains surprising performance, significantly relieving the aforementioned feature
    ambiguity. Our method improves the Registration Recall by 6+% on the challenging
    3DLoMatch benchmark and achieves state-of-the-art performance on Feature Matching
    Recall, Inlier Ratio, and Registration Recall on both 3DMatch and 3DLoMatch.
  related_code: ''
- author: Xiyu Zhang 0001, Jiaqi Yang 0002, Shikun Zhang, Yanning Zhang 0001
  title: 3D Registration with Maximal Cliques.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/Zhang0ZZ23
  doi: 10.1109/CVPR52729.2023.01702
  ee: https://doi.org/10.1109/CVPR52729.2023.01702
  url: https://dblp.org/rec/conf/cvpr/Zhang0ZZ23
  abstract: 'As a fundamental problem in computer vision, 3D point cloud registration
    (PCR) aims to seek the optimal pose to align a point cloud pair. In this paper,
    we present a 3D registration method with maximal cliques (MAC). The key insight
    is to loosen the previous maximum clique constraint, and mine more local consensus
    information in a graph for accurate pose hypotheses generation: 1) A compatibility
    graph is constructed to render the affinity relationship between initial correspondences.
    2) We search for maximal cliques in the graph, each of which represents a consensus
    set. We perform node-guided clique selection then, where each node corresponds
    to the maximal clique with the greatest graph weight. 3) Transformation hypotheses
    are computed for the selected cliques by the SVD algorithm and the best hypothesis
    is used to perform registration. Extensive experiments on U3M, 3DMatch, 3DLoMatch
    and KITTI demonstrate that MAC effectively increases registration accuracy, outperforms
    various state-of-the-art methods and boosts the performance of deep-learned methods.
    MAC combined with deep-learned methods achieves state-of-the-art registration
    recall of 95.7% /78.9% on 3DMatch /3DLoMatch.'
  related_code: ''
- author: Xiaoshui Huang, Guofeng Mei, Jian Zhang 0002
  title: 'Feature-Metric Registration: A Fast Semi-Supervised Approach for Robust
    Point Cloud Registration Without Correspondences.'
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/HuangM020
  doi: 10.1109/CVPR42600.2020.01138
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Huang_Feature-Metric_Registration_A_Fast_Semi-Supervised_Approach_for_Robust_Point_Cloud_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/HuangM020
  abstract: We present a fast feature-metric point cloud registration framework, which
    enforces the optimisation of registration by minimising a feature-metric projection
    error without correspondences. The advantage of the feature-metric projection
    error is robust to noise, outliers and density difference in contrast to the geometric
    projection error. Besides, minimising the feature-metric projection error does
    not need to search the correspondences so that the optimisation speed is fast.
    The principle behind the proposed method is that the feature difference is smallest
    if point clouds are aligned very well. We train the proposed method in a semi-supervised
    or unsupervised approach, which requires limited or no registration label data.
    Experiments demonstrate our method obtains higher accuracy and robustness than
    the state-of-the-art methods. Besides, experimental results show that the proposed
    method can handle significant noise and density difference, and solve both same-source
    and cross-source point cloud registration.
  related_code: ''
- author: Zhi Chen 0011, Kun Sun 0002, Fan Yang 0088, Wenbing Tao
  title: 'SC2-PCR: A Second Order Spatial Compatibility for Efficient and Robust Point
    Cloud Registration.'
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/Chen0YT22
  doi: 10.1109/CVPR52688.2022.01287
  ee: https://doi.org/10.1109/CVPR52688.2022.01287
  url: https://dblp.org/rec/conf/cvpr/Chen0YT22
  abstract: In this paper, we present a second order spatial compat-ibility (SC2)
    measure based method for efficient and robust point cloud registration (PCR),
    called SC2-PCR 1. Firstly, we propose a second order spatial compatibility (SC2)
    mea-sure to compute the similarity between correspondences. It considers the global
    compatibility instead of local consis-tency, allowing for more distinctive clustering
    between in-liers and outliers at early stage. Based on this measure, our registration
    pipeline employs a global spectral technique to find some reliable seeds from
    the initial correspondences. Then we design a two-stage strategy to expand each
    seed to a consensus set based on the SC2 measure matrix. Finally, we feed each
    consensus set to a weighted SVD algorithm to generate a candidate rigid transformation
    and select the best model as the final result. Our method can guarantee to find
    a certain number of outlier-free consensus sets using fewer samplings, making
    the model estimation more ef-ficient and robust. In addition, the proposed SC2
    measure is general and can be easily plugged into deep learning based frameworks.
    Extensive experiments are carried out to in-vestigate the performance of our method.
  related_code: ''
- author: Wen Chen 0021, Haoang Li, Qiang Nie, Yun-Hui Liu 0001
  title: Deterministic Point Cloud Registration via Novel Transformation Decomposition.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/ChenLNL22
  doi: 10.1109/CVPR52688.2022.00624
  ee: https://doi.org/10.1109/CVPR52688.2022.00624
  url: https://dblp.org/rec/conf/cvpr/ChenLNL22
  abstract: Given a set of putative 3D-3D point correspondences, we aim to remove
    outliers and estimate rigid transformation with 6 degrees of freedom (DOF). Simultaneously
    estimating these 6 DOF is time-consuming due to high-dimensional parameter space.
    To solve this problem, it is common to decompose 6 DOF, i.e. independently compute
    3-DOF rotation and 3-DOF translation. However, high non-linearity of 3-DOF rotation
    still limits the algorithm efficiency, especially when the number of correspondences
    is large. In contrast, we propose to decompose 6 DOF into $(2+1)$ and $(1+2)\
    DOF$. Specifically, $(2+1)DOF$ represent 2-DOF rotation axis and 1-DOF displacement
    along this rotation axis. $(1+2)\ DOF$ indicate 1-DOF rotation angle and 2-DOF
    displacement orthogonal to the above rotation axis. To compute these DOF, we design
    a novel two-stage strategy based on inlier set maximization. By leveraging branch
    and bound, we first search for $(2+1)\ DOF$, and then the remaining $(1+2)\ DOF$.
    Thanks to the proposed transformation decomposition and two-stage search strategy,
    our method is deterministic and leads to low computational complexity. We extensively
    compare our method with state-of-the-art approaches. Our method is more accurate
    and robust than the approaches that provide similar efficiency to ours. Our method
    is more efficient than the approaches whose accuracy and robustness are comparable
    to ours.
  related_code: ''
- author: Zhipeng Ding, Marc Niethammer
  title: 'Aladdin: Joint Atlas Building and Diffeomorphic Registration Learning with
    Pairwise Alignment.'
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/DingN22
  doi: 10.1109/CVPR52688.2022.02012
  ee: https://doi.org/10.1109/CVPR52688.2022.02012
  url: https://dblp.org/rec/conf/cvpr/DingN22
  abstract: 'Atlas building and image registration are important tasks for medical
    image analysis. Once one or multiple atlases from an image population have been
    constructed, commonly (1) images are warped into an atlas space to study intra-subject
    or inter-subject variations or (2) a possibly probabilistic atlas is warped into
    image space to assign anatomical labels. Atlas estimation and nonparametric transformations
    are computationally expensive as they usually require numerical optimization.
    Additionally, previous approaches for atlas building often define similarity measures
    between a fuzzy atlas and each individual image, which may cause alignment difficulties
    because a fuzzy atlas does not exhibit clear anatomical structures in contrast
    to the individual images. This work explores using a convolutional neural network
    (CNN) to jointly predict the atlas and a stationary velocity field (SVF) parameterization
    for diffeomorphic image registration with respect to the atlas. Our approach does
    not require affine pre-registrations and utilizes pairwise image alignment losses
    to increase registration accuracy. We evaluate our model on 3D knee magnetic resonance
    images (MRI) from the OAI-ZIB dataset. Our results show that the proposed framework
    achieves better performance than other state-of-the-art image registration algorithms,
    allows for end-to-end training, and for fast inference at test time. 11Source
    code: https://github.com/uncbiag/Aladdin.'
  related_code: https://github.com/uncbiag/Aladdin
- author: Aoxiang Fan, Jiayi Ma 0001, Xin Tian 0006, Xiaoguang Mei, Wei Lin
  title: Coherent Point Drift Revisited for Non-rigid Shape Matching and Registration.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/Fan00ML22
  doi: 10.1109/CVPR52688.2022.00148
  ee: https://doi.org/10.1109/CVPR52688.2022.00148
  url: https://dblp.org/rec/conf/cvpr/Fan00ML22
  abstract: In this paper, we explore a new type of extrinsic method to directly align
    two geometric shapes with point-to-point correspondences in ambient space by recovering
    a deformation, which allows more continuous and smooth maps to be obtained. Specifically,
    the classic coherent point drift is revisited and generalizations have been proposed.
    First, by observing that the deformation model is essentially defined with respect
    to Euclidean space, we generalize the kernel method to non-Euclidean domains.
    This generally leads to better results for processing shapes, which are known
    as two-dimensional manifolds. Second, a generalized probabilistic model is proposed
    to address the sensibility of coherent point drift method to local optima. Instead
    of directly optimizing over the objective of coherent point drift, the new model
    allows to focus on a group of most confident ones, thus improves the robustness
    of the registration system. Experiments are conducted on multiple public datasets
    with comparison to state-of-the-art competitors, demonstrating the superiority
    of our method which is both flexible and efficient to improve the matching accuracy
    due to our extrinsic alignment objective in ambient space.
  related_code: ''
- author: Daniel Grzech, Mohammad Farid Azampour, Ben Glocker, Julia A. Schnabel,
    Nassir Navab, Bernhard Kainz, Loïc Le Folgoc
  title: A variational Bayesian method for similarity learning in non-rigid image
    registration.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/GrzechAGSNKF22
  doi: 10.1109/CVPR52688.2022.00022
  ee: https://doi.org/10.1109/CVPR52688.2022.00022
  url: https://dblp.org/rec/conf/cvpr/GrzechAGSNKF22
  abstract: 'We propose a novel variational Bayesian formulation for diffeomorphic
    non-rigid registration of medical images, which learns in an unsupervised way
    a data-specific similarity metric. The proposed framework is general and may be
    used together with many existing image registration models. We evaluate it on
    brain MRI scans from the UK Biobank and show that use of the learnt similarity
    metric, which is parametrised as a neural network, leads to more accurate results
    than use of traditional functions, e.g. SSD and LCC, to which we initialise the
    model, without a negative impact on image registration speed or transformation
    smoothness. In addition, the method estimates the uncertainty associated with
    the transformation. The code and the trained models are available in a public
    repository: https://github.com/dgrzech/learnsim.'
  related_code: https://github.com/dgrzech/learnsim
- author: Tony C. W. Mok, Albert C. S. Chung
  title: Affine Medical Image Registration with Coarse-to-Fine Vision Transformer.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/MokC22
  doi: 10.1109/CVPR52688.2022.02017
  ee: https://doi.org/10.1109/CVPR52688.2022.02017
  url: https://dblp.org/rec/conf/cvpr/MokC22
  abstract: Affine registration is indispensable in a comprehensive medical image
    registration pipeline. However, only a few studies focus on fast and robust affine
    registration algorithms. Most of these studies utilize convolutional neural networks
    (CNNs) to learn joint affine and non-parametric registration, while the standalone
    performance of the affine subnetwork is less explored. Moreover, existing CNN-based
    affine registration approaches focus either on the local mis-alignment or the
    global orientation and position of the input to predict the affine transformation
    matrix, which are sensitive to spatial initialization and exhibit limited generalizability
    apart from the training dataset. In this paper, we present a fast and robust learning-based
    algorithm, Coarse-to-Fine Vision Transformer (C2FViT), for 3D affine medical image
    registration. Our method naturally leverages the global connectivity and locality
    of the convolutional vision transformer and the multi-resolution strategy to learn
    the global affine registration. We evaluate our method on 3D brain atlas registration
    and template-matching normalization. Comprehensive results demonstrate that our
    method is superior to the existing CNNs-based affine registration methods in terms
    of registration accuracy, robustness and generalizability while preserving the
    runtime advantage of the learning-based methods. The source code is available
    at https://github.com/cwmok/C2FViT.
  related_code: https://github.com/cwmok/C2FViT
- author: Zheng Qin 0002, Hao Yu 0010, Changjian Wang, Yulan Guo, Yuxing Peng 0001,
    Kai Xu 0004
  title: Geometric Transformer for Fast and Robust Point Cloud Registration.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/QinYWGPX22
  doi: 10.1109/CVPR52688.2022.01086
  ee: https://doi.org/10.1109/CVPR52688.2022.01086
  url: https://dblp.org/rec/conf/cvpr/QinYWGPX22
  abstract: We study the problem of extracting accurate correspondences for point
    cloud registration. Recent keypoint-free methods bypass the detection of repeatable
    keypoints which is difficult in low-overlap scenarios, showing great potential
    in registration. They seek correspondences over down-sampled superpoints, which
    are then propagated to dense points. Superpoints are matched based on whether
    their neighboring patches overlap. Such sparse and loose matching requires contextual
    features capturing the geometric structure of the point clouds. We propose Geometric
    Transformer to learn geometric feature for robust superpoint matching. It encodes
    pair-wise distances and triplet-wise angles, making it robust in low-overlap cases
    and invariant to rigid transformation. The simplistic design attains surprisingly
    high matching accuracy such that no RANSAC is required in the estimation of alignment
    transformation, leading to 100 times acceleration. Our method improves the inlier
    ratio by 17∼30 percentage points and the registration recall by over 7 points
    on the challenging 3DLoMatch benchmark. Our code and models are available at https://github.com/qinzheng93/GeoTransformer.
  related_code: https://github.com/qinzheng93/GeoTransformer
- author: Shanlin Sun, Kun Han, Deying Kong, Hao Tang 0010, Xiangyi Yan, Xiaohui Xie
  title: Topology-Preserving Shape Reconstruction and Registration via Neural Diffeomorphic
    Flow.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/SunHKTYX22
  doi: 10.1109/CVPR52688.2022.02018
  ee: https://doi.org/10.1109/CVPR52688.2022.02018
  url: https://dblp.org/rec/conf/cvpr/SunHKTYX22
  abstract: Deep Implicit Functions (DIFs) represent 3D geometry with continuous signed
    distance functions learned through deep neural nets. Recently DIFs-based methods
    have been proposed to handle shape reconstruction and dense point correspondences
    simultaneously, capturing semantic relationships across shapes of the same class
    by learning a DIFs-modeled shape template. These methods provide great flexibility
    and accuracy in reconstructing 3D shapes and inferring correspondences. However,
    the point correspondences built from these methods do not intrinsically preserve
    the topology of the shapes, unlike mesh-based template matching methods. This
    limits their applications on 3D geometries where underlying topological structures
    exist and matter, such as anatomical structures in medical images. In this paper,
    we propose a new model called Neural Diffeomorphic Flow (NDF) to learn deep implicit
    shape templates, representing shapes as conditional diffeomorphic deformations
    of templates, intrinsically preserving shape topologies. The diffeomorphic deformation
    is realized by an autodecoder consisting of Neural Ordinary Differential Equation
    (NODE) blocks that progressively map shapes to implicit templates. We conduct
    extensive experiments on several medical image organ segmentation datasets to
    evaluate the effectiveness of NDF on reconstructing and aligning shapes. NDF achieves
    consistently state-of-the-art organ shape reconstruction and registration results
    in both accuracy and quality. The source code is publicly available at https://github.com/Siwensun/Neural_Diffeomorphic_Flow-NDF.
  related_code: https://github.com/Siwensun/Neural_Diffeomorphic_Flow-NDF
- author: Che Sun, Yunde Jia, Yi Guo, Yuwei Wu 0001
  title: Global-Aware Registration of Less-Overlap RGB-D Scans.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/SunJGW22
  doi: 10.1109/CVPR52688.2022.00625
  ee: https://doi.org/10.1109/CVPR52688.2022.00625
  url: https://dblp.org/rec/conf/cvpr/SunJGW22
  abstract: We propose a novel method of registering less-overlap RGB-D scans. Our
    method learns global information of a scene to construct a panorama, and aligns
    RGB-D scans to the panorama to perform registration. Different from existing methods
    that use local feature points to register less-overlap RGB-D scans and mismatch
    too much, we use global information to guide the registration, thereby allevi-ating
    the mismatching problem by preserving global consis-tency of alignments. To this
    end, we build a scene inference network to construct the panorama representing
    global in-formation. We introduce a reinforcement learning strategy to iteratively
    align RGB-D scans with the panorama and re-fine the panorama representation, which
    reduces the noise of global information and preserves global consistency of both
    geometric and photometric alignments. Experimental results on benchmark datasets
    including SUNCG, Matterport, and ScanNet show the superiority of our method.
  related_code: ''
- author: Weixuan Tang 0001, Danping Zou
  title: Multi-instance Point Cloud Registration by Efficient Correspondence Clustering.
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/TangZ22
  doi: 10.1109/CVPR52688.2022.00655
  ee: https://doi.org/10.1109/CVPR52688.2022.00655
  url: https://dblp.org/rec/conf/cvpr/TangZ22
  abstract: 'We address the problem of estimating the poses of multiple instances
    of the source point cloud within a target point cloud. Existing solutions require
    sampling a lot of hypotheses to detect possible instances and reject the outliers,
    whose robustness and efficiency degrade notably when the number of instances and
    outliers increase. We propose to directly group the set of noisy correspondences
    into different clusters based on a distance invariance matrix. The instances and
    outliers are automatically identified through clustering. Our method is robust
    and fast. We evaluated our method on both synthetic and real-world datasets. The
    results show that our approach can correctly register up to 20 instances with
    an F1 score of 90.46% in the presence of 70% outliers, which performs significantly
    better and at least 10x faster than existing methods. (Source code: https://github.com/SITU-ViSYSlmulti-instant-reg).'
  related_code: ''
- author: Yifan Wu, Tom Z. Jiahao, Jiancong Wang, Paul A. Yushkevich, M. Ani Hsieh,
    James C. Gee
  title: 'NODEO: A Neural Ordinary Differential Equation Based Optimization Framework
    for Deformable Image Registration.'
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/WuJWYHG22
  doi: 10.1109/CVPR52688.2022.02014
  ee: https://doi.org/10.1109/CVPR52688.2022.02014
  url: https://dblp.org/rec/conf/cvpr/WuJWYHG22
  abstract: Deformable image registration (DIR), aiming to find spatial correspondence
    between images, is one of the most critical problems in the domain of medical
    image analysis. In this paper, we present a novel, generic, and accurate diffeomorphic
    image registration framework that utilizes neural ordinary differential equations
    (NODEs). We model each voxel as a moving particle and consider the set of all
    voxels in a 3D image as a high-dimensional dynamical system whose trajectory determines
    the targeted deformation field. Our method leverages deep neural networks for
    their expressive power in modeling dynamical systems, and simultaneously optimizes
    for a dynamical system between the image pairs and the corresponding transformation.
    Our formulation allows various constraints to be imposed along the transformation
    to maintain desired regularities. Our experiment results show that our method
    outperforms the benchmarks under various metrics. Additionally, we demonstrate
    the feasibility to expand our framework to register multiple image sets using
    a unified form of transformation, which could possibly serve a wider range of
    applications.
  related_code: ''
- author: Han Xu 0001, Jiayi Ma 0001, Jiteng Yuan, Zhuliang Le, Wei Liu 0005
  title: 'RFNet: Unsupervised Network for Mutually Reinforcing Multi-modal Image Registration
    and Fusion.'
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/Xu0YLL22
  doi: 10.1109/CVPR52688.2022.01906
  ee: https://doi.org/10.1109/CVPR52688.2022.01906
  url: https://dblp.org/rec/conf/cvpr/Xu0YLL22
  abstract: In this paper, we propose a novel method to realize multimodal image registration
    and fusion in a mutually reinforcing framework, termed as RFNet. We handle the
    registration in a coarse-to-fine fashion. For the first time, we exploit the feedback
    of image fusion to promote the registration accuracy rather than treating them
    as two separate issues. The fine-registered results also improve the fusion performance.
    Specifically, for image registration, we solve the bottlenecks of defining registration
    metrics applicable for multi-modal images and facilitating the network convergence.
    The metrics are defined based on image translation and image fusion respectively
    in the coarse and fine stages. The convergence is facilitated by the designed
    metrics and a deformable convolution-based network. For image fusion, we focus
    on texture preservation, which not only increases the information amount and quality
    of fusion results but also improves the feedback of fusion results. The proposed
    method is evaluated on multi-modal images with large global parallaxes, images
    with local misalignments and aligned images to validate the performances of registration
    and fusion. The results in these cases demonstrate the effectiveness of our method.
  related_code: ''
- author: Sk Aziz Ali, Kerem Kahraman, Gerd Reis, Didier Stricker
  title: 'RPSRNet: End-to-End Trainable Rigid Point Set Registration Network Using
    Barnes-Hut 2D-Tree Representation.'
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/AliKRS21
  doi: 10.1109/CVPR46437.2021.01290
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Ali_RPSRNet_End-to-End_Trainable_Rigid_Point_Set_Registration_Network_Using_Barnes-Hut_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/AliKRS21
  abstract: We propose RPSRNet - a novel end-to-end trainable deep neural network
    for rigid point set registration. For this task, we use a novel 2D-tree representation
    for the input point sets and a hierarchical deep feature embedding in the neural
    network. An iterative transformation refinement module of our network boosts the
    feature matching accuracy in the intermediate stages. We achieve an inference
    speed of ∼12-15 ms to register a pair of input point clouds as large as ∼250K.
    Extensive evaluations on (i) KITTI LiDAR-odometry and (ii) ModelNet-40 datasets
    show that our method outperforms prior state-of-the-art methods – e.g., on the
    KITTI dataset, DCP-v2 by 1.3 and 1.5 times, and PointNetLK by 1.8 and 1.9 times
    better rotational and translational accuracy respectively. Evaluation on ModelNet40
    shows that RPSRNet is more robust than other benchmark methods when the samples
    contain a significant amount of noise and disturbance. RPSRNet accurately registers
    point clouds with non-uniform sampling densities, e.g., LiDAR data, which cannot
    be processed by many existing deep-learning-based registration methods.
  related_code: ''
- author: Sheng Ao, Qingyong Hu, Bo Yang 0027, Andrew Markham, Yulan Guo
  title: 'SpinNet: Learning a General Surface Descriptor for 3D Point Cloud Registration.'
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/AoH0MG21
  doi: 10.1109/CVPR46437.2021.01158
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Ao_SpinNet_Learning_a_General_Surface_Descriptor_for_3D_Point_Cloud_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/AoH0MG21
  abstract: Extracting robust and general 3D local features is key to downstream tasks
    such as point cloud registration and reconstruction. Existing learning-based local
    descriptors are either sensitive to rotation transformations, or rely on classical
    handcrafted features which are neither general nor representative. In this paper,
    we introduce a new, yet conceptually simple, neural architecture, termed SpinNet,
    to extract local features which are rotationally invariant whilst sufficiently
    informative to enable accurate registration. A Spatial Point Transformer is first
    introduced to map the input local surface into a carefully designed cylindrical
    space, enabling end-to-end optimization with SO(2) equivariant representation.
    A Neural Feature Extractor which leverages the powerful point-based and 3D cylindrical
    convolutional neural layers is then utilized to derive a compact and representative
    descriptor for matching. Extensive experiments on both indoor and outdoor datasets
    demonstrate that SpinNet outperforms existing state-of-the-art techniques by a
    large margin. More critically, it has the best generalization ability across unseen
    scenarios with different sensor modalities. The code is available at https://github.com/QingyongHu/SpinNet.
  related_code: https://github.com/QingyongHu/SpinNet
- author: Xuyang Bai, Zixin Luo, Lei Zhou 0011, Hongkai Chen, Lei Li 0038, Zeyu Hu,
    Hongbo Fu 0001, Chiew-Lan Tai
  title: 'PointDSC: Robust Point Cloud Registration Using Deep Spatial Consistency.'
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/BaiLZC0HFT21
  doi: 10.1109/CVPR46437.2021.01560
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Bai_PointDSC_Robust_Point_Cloud_Registration_Using_Deep_Spatial_Consistency_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/BaiLZC0HFT21
  abstract: Removing outlier correspondences is one of the critical steps for successful
    feature-based point cloud registration. Despite the increasing popularity of introducing
    deep learning techniques in this field, spatial consistency, which is essentially
    established by a Euclidean transformation between point clouds, has received almost
    no individual attention in existing learning frameworks. In this paper, we present
    PointDSC, a novel deep neural network that explicitly incorporates spatial consistency
    for pruning outlier correspondences. First, we propose a nonlocal feature aggregation
    module, weighted by both feature and spatial coherence, for feature embedding
    of the input correspondences. Second, we formulate a differentiable spectral matching
    module, supervised by pairwise spatial compatibility, to estimate the inlier confidence
    of each correspondence from the embedded features. With modest computation cost,
    our method outperforms the state-of-the-art hand- crafted and learning-based outlier
    rejection approaches on several real-world datasets by a significant margin. We
    also show its wide applicability by combining PointDSC with different 3D local
    descriptors. [code release]
  related_code: ''
- author: Mohamed El Banani, Luya Gao, Justin Johnson 0001
  title: 'UnsupervisedR&amp;R: Unsupervised Point Cloud Registration via Differentiable
    Rendering.'
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/BananiG021
  doi: 10.1109/CVPR46437.2021.00705
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Banani_UnsupervisedRR_Unsupervised_Point_Cloud_Registration_via_Differentiable_Rendering_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/BananiG021
  abstract: 'Aligning partial views of a scene into a single whole is essential to
    understanding one’s environment and is a key component of numerous robotics tasks
    such as SLAM and SfM. Recent approaches have proposed end-to-end systems that
    can outperform traditional methods by leveraging pose supervision. However, with
    the rising prevalence of cameras with depth sensors, we can expect a new stream
    of raw RGB-D data without the annotations needed for supervision. We propose UnsupervisedR&R:
    an end-to-end unsupervised approach to learning point cloud registration from
    raw RGB-D video. The key idea is to leverage differentiable alignment and rendering
    to enforce photometric and geometric consistency between frames. We evaluate our
    approach on indoor scene datasets and find that we out-perform existing traditional
    approaches with classical and learned descriptors while being competitive with
    supervised geometric point cloud registration approaches.'
  related_code: ''
- author: Dominik Bauer, Timothy Patten, Markus Vincze
  title: 'ReAgent: Point Cloud Registration Using Imitation and Reinforcement Learning.'
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/BauerPV21
  doi: 10.1109/CVPR46437.2021.01435
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Bauer_ReAgent_Point_Cloud_Registration_Using_Imitation_and_Reinforcement_Learning_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/BauerPV21
  abstract: Point cloud registration is a common step in many 3D computer vision tasks
    such as object pose estimation, where a 3D model is aligned to an observation.
    Classical registration methods generalize well to novel domains but fail when
    given a noisy observation or a bad initialization. Learning-based methods, in
    contrast, are more robust but lack in generalization capacity. We propose to consider
    iterative point cloud registration as a reinforcement learning task and, to this
    end, present a novel registration agent (ReAgent). We employ imitation learning
    to initialize its discrete registration policy based on a steady expert policy.
    Integration with policy optimization, based on our proposed alignment reward,
    further improves the agent’s registration performance. We compare our approach
    to classical and learning-based registration methods on both ModelNet40 (synthetic)
    and ScanObjectNN (real data) and show that our ReAgent achieves state-of-the-art
    accuracy. The lightweight architecture of the agent, moreover, enables reduced
    inference time as compared to related approaches. Code is available at github.com/dornik/reagent.
  related_code: ''
- author: Xingyu Chen, Yufeng Liu, Chongyang Ma, Jianlong Chang, Huayan Wang, Tian
    Chen, Xiaoyan Guo, Pengfei Wan 0001, Wen Zheng
  title: Camera-Space Hand Mesh Recovery via Semantic Aggregation and Adaptive 2D-1D
    Registration.
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/ChenLMCWCGWZ21
  doi: 10.1109/CVPR46437.2021.01307
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Chen_Camera-Space_Hand_Mesh_Recovery_via_Semantic_Aggregation_and_Adaptive_2D-1D_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/ChenLMCWCGWZ21
  abstract: Recent years have witnessed significant progress in 3D hand mesh recovery.
    Nevertheless, because of the intrinsic 2D-to-3D ambiguity, recovering camera-space
    3D information from a single RGB image remains challenging. To tackle this problem,
    we divide camera-space mesh recovery into two sub-tasks, i.e., root-relative mesh
    recovery and root recovery. First, joint landmarks and silhouette are extracted
    from a single input image to provide 2D cues for the 3D tasks. In the root-relative
    mesh recovery task, we exploit semantic relations among joints to generate a 3D
    mesh from the extracted 2D cues. Such generated 3D mesh coordinates are expressed
    relative to a root position, i.e., wrist of the hand. In the root recovery task,
    the root position is registered to the camera space by aligning the generated
    3D mesh back to 2D cues, thereby completing camera-space 3D mesh recovery. Our
    pipeline is novel in that (1) it explicitly makes use of known semantic relations
    among joints and (2) it exploits 1D projections of the silhouette and mesh to
    achieve robust registration. Extensive experiments on popular datasets such as
    FreiHAND, RHD, and Human3.6M demonstrate that our approach achieves state-of-the-art
    performance on both root-relative mesh recovery and root recovery. Our code is
    publicly available at https://github.com/SeanChenxy/HandMesh.
  related_code: https://github.com/SeanChenxy/HandMesh
- author: Wanquan Feng, Juyong Zhang, Hongrui Cai, Haofei Xu, Junhui Hou, Hujun Bao
  title: Recurrent Multi-View Alignment Network for Unsupervised Surface Registration.
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/FengZCXHB21
  doi: 10.1109/CVPR46437.2021.01016
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Feng_Recurrent_Multi-View_Alignment_Network_for_Unsupervised_Surface_Registration_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/FengZCXHB21
  abstract: Learning non-rigid registration in an end-to-end manner is challenging
    due to the inherent high degrees of freedom and the lack of labeled training data.
    In this paper, we resolve these two challenges simultaneously. First, we propose
    to represent the non-rigid transformation with a point-wise combination of several
    rigid transformations. This representation not only makes the solution space well-constrained
    but also enables our method to be solved iteratively with a recurrent framework,
    which greatly reduces the difficulty of learning. Second, we introduce a differentiable
    loss function that measures the 3D shape similarity on the projected multi-view
    2D depth images so that our full framework can be trained end-to-end without ground
    truth supervision. Extensive experiments on several different datasets demonstrate
    that our proposed method outperforms the previous state-of-the-art by a large
    margin.
  related_code: ''
- author: Shengyu Huang, Zan Gojcic, Mikhail Usvyatsov, Andreas Wieser, Konrad Schindler
  title: 'Predator: Registration of 3D Point Clouds With Low Overlap.'
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/HuangGUWS21
  doi: 10.1109/CVPR46437.2021.00425
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Huang_Predator_Registration_of_3D_Point_Clouds_With_Low_Overlap_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/HuangGUWS21
  abstract: 'We introduce PREDATOR, a model for pairwise point-cloud registration
    with deep attention to the overlap region. Different from previous work, our model
    is specifically designed to handle (also) point-cloud pairs with low overlap.
    Its key novelty is an overlap-attention block for early information exchange between
    the latent encodings of the two point clouds. In this way the subsequent decoding
    of the latent representations into per-point features is conditioned on the respective
    other point cloud, and thus can predict which points are not only salient, but
    also lie in the overlap region between the two point clouds. The ability to focus
    on points that are relevant for matching greatly improves performance: PREDATOR
    raises the rate of successful registrations by more than 20% in the low-overlap
    scenario, and also sets a new state of the art for the 3DMatch benchmark with
    89% registration recall. [Code release]'
  related_code: ''
- author: Jiaxin Li, Gim Hee Lee
  title: 'DeepI2P: Image-to-Point Cloud Registration via Deep Classification.'
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/LiL21b
  doi: 10.1109/CVPR46437.2021.01570
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Li_DeepI2P_Image-to-Point_Cloud_Registration_via_Deep_Classification_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/LiL21b
  abstract: 'This paper presents DeepI2P: a novel approach for cross-modality registration
    between an image and a point cloud. Given an image (e.g. from a rgb-camera) and
    a general point cloud (e.g. from a 3D Lidar scanner) captured at different locations
    in the same scene, our method estimates the relative rigid transformation between
    the co-ordinate frames of the camera and Lidar. Learning common feature descriptors
    to establish correspondences for the registration is inherently challenging due
    to the lack of appearance and geometric correlations across the two modalities.
    We circumvent the difficulty by converting the registration problem into a classification
    and inverse camera projection optimization problem. A classification neural network
    is designed to label whether the projection of each point in the point cloud is
    within or beyond the camera frustum. These labeled points are subsequently passed
    into a novel inverse camera projection solver to estimate the relative pose. Extensive
    experimental results on Oxford Robotcar and KITTI datasets demonstrate the feasibility
    of our approach. Our source code is available at https://github.com/lijx10/DeepI2P.'
  related_code: https://github.com/lijx10/DeepI2P
- author: Daqi Liu, Álvaro Parra 0001, Tat-Jun Chin
  title: Spatiotemporal Registration for Event-Based Visual Odometry.
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/Liu0C21
  doi: 10.1109/CVPR46437.2021.00490
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Liu_Spatiotemporal_Registration_for_Event-Based_Visual_Odometry_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/Liu0C21
  abstract: A useful application of event sensing is visual odometry, especially in
    settings that require high-temporal resolution. The state-of-the-art method of
    contrast maximisation recovers the motion from a batch of events by maximising
    the contrast of the image of warped events. However, the cost scales with image
    resolution and the temporal resolution can be limited by the need for large batch
    sizes to yield sufficient structure in the contrast image1. In this work, we propose
    spatiotemporal registration as a compelling technique for event-based rotational
    motion estimation. We theoretically justify the approach and establish its fundamental
    and practical advantages over contrast maximisation. In particular, spatiotemporal
    registration also produces feature tracks as a by-product, which directly supports
    an efficient visual odometry pipeline with graph-based optimisation for motion
    averaging. The simplicity of our visual odometry pipeline allows it to process
    more than 1 M events/second. We also contribute a new event dataset for visual
    odometry, where motion sequences with large velocity variations were acquired
    using a high-precision robot arm2.
  related_code: ''
- author: Ebrahim Al Safadi, Xubo Song
  title: Learning-Based Image Registration With Meta-Regularization.
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/SafadiS21
  doi: 10.1109/CVPR46437.2021.01078
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Safadi_Learning-Based_Image_Registration_With_Meta-Regularization_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/SafadiS21
  abstract: We introduce a meta-regularization framework for learning-based image
    registration. Current learning-based image registration methods use high-resolution
    architectures such as U-Nets to produce spatial transformations, and impose simple
    and explicit regularization on the output of the network to ensure that the estimated
    displacements are smooth. While this approach works well on small deformations,
    it has been known to struggle when the deformations are large. Our method uses
    a more advanced form of meta-regularization to increase the generalization ability
    of learned registration models. We motivate our approach based on Reproducing
    Kernel Hilbert Space (RKHS) theory, and approximate that framework via a meta-regularization
    convolutional layer with radially symmetric, positive semidefinite filters that
    inherent its regularization properties. We then provide a method to learn such
    regularization filters while also learning to register. Our experiments on synthetic
    and real datasets as well as ablation analysis show that our method can improve
    anatomical correspondence compared to competing methods, and reduce the percentage
    of folding and tear in the large deformation setting, reflecting better regularization
    and model generalization.
  related_code: ''
- author: Shaofei Wang 0001, Andreas Geiger 0001, Siyu Tang 0001
  title: Locally Aware Piecewise Transformation Fields for 3D Human Mesh Registration.
  venue: CVPR
  year: '2021'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/Wang0T21
  doi: 10.1109/CVPR46437.2021.00755
  ee: https://openaccess.thecvf.com/content/CVPR2021/html/Wang_Locally_Aware_Piecewise_Transformation_Fields_for_3D_Human_Mesh_Registration_CVPR_2021_paper.html
  url: https://dblp.org/rec/conf/cvpr/Wang0T21
  abstract: Registering point clouds of dressed humans to parametric human models
    is a challenging task in computer vision. Traditional approaches often rely on
    heavily engineered pipelines that require accurate manual initialization of human
    poses and tedious post-processing. More recently, learning-based methods are proposed
    in hope to automate this process. We observe that pose initialization is key to
    accurate registration but existing methods often fail to provide accurate pose
    initialization. One major obstacle is that, despite recent effort on rotation
    representation learning in neural networks, regressing joint rotations from point
    clouds or images of humans is still very challenging. To this end, we propose
    novel piecewise trans-formation fields (PTF), a set of functions that learn 3D
    translation vectors to map any query point in posed space to its correspond position
    in rest-pose space. We com-bine PTF with multi-class occupancy networks, obtaining
    a novel learning-based framework that learns to simultaneously predict shape and
    per-point correspondences between the posed space and the canonical space for
    clothed human. Our key insight is that the translation vector for each query point
    can be effectively estimated using the point-aligned local features; consequently,
    rigid per bone trans-formations and joint rotations can be obtained efficiently
    via a least-square fitting given the estimated point correspondences, circumventing
    the challenging task of directly regressing joint rotations from neural networks.
    Further-more, the proposed PTF facilitate canonicalized occupancy estimation,
    which greatly improves generalization capability and results in more accurate
    surface reconstruction with only half of the parameters compared with the state-of-the-art.
    Both qualitative and quantitative studies show that fit-ting parametric models
    with poses initialized by our net-work results in much better registration quality,
    especially for extreme poses.
  related_code: ''
- author: Moab Arar, Yiftach Ginger, Dov Danon, Amit H. Bermano, Daniel Cohen-Or
  title: Unsupervised Multi-Modal Image Registration via Geometry Preserving Image-to-Image
    Translation.
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/ArarGDBC20
  doi: 10.1109/CVPR42600.2020.01342
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Arar_Unsupervised_Multi-Modal_Image_Registration_via_Geometry_Preserving_Image-to-Image_Translation_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/ArarGDBC20
  abstract: Many applications, such as autonomous driving, heavily rely on multi-modal
    data where spatial alignment between the modalities is required. Most multi-modal
    registration methods struggle computing the spatial correspondence between the
    images using prevalent cross-modality similarity measures. In this work, we bypass
    the difficulties of developing cross-modality similarity measures, by training
    an image-to-image translation network on the two input modalities. This learned
    translation allows training the registration network using simple and reliable
    mono-modality metrics. We perform multi-modal registration using two networks
    - a spatial transformation network and a translation network. We show that by
    encouraging our translation network to be geometry preserving, we manage to train
    an accurate spatial transformation network. Compared to state-of-the-art multi-modal
    methods our presented method is unsupervised, requiring no pairs of aligned modalities
    for training, and can be adapted to any pair of modalities. We evaluate our method
    quantitatively and qualitatively on commercial datasets, showing that it performs
    well on several modalities and achieves accurate alignment.
  related_code: ''
- author: Christopher B. Choy, Wei Dong, Vladlen Koltun
  title: Deep Global Registration.
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/ChoyDK20
  doi: 10.1109/CVPR42600.2020.00259
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Choy_Deep_Global_Registration_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/ChoyDK20
  abstract: 'We present Deep Global Registration, a differentiable framework for pairwise
    registration of real-world 3D scans. Deep global registration is based on three
    modules: a 6-dimensional convolutional network for correspondence confidence prediction,
    a differentiable Weighted Procrustes algorithm for closed-form pose estimation,
    and a robust gradient-based SE(3) optimizer for pose refinement. Experiments demonstrate
    that our approach outperforms state-of-the-art methods, both learning-based and
    classical, on real-world data.'
  related_code: ''
- author: Marvin Eisenberger, Zorah Lähner, Daniel Cremers
  title: 'Smooth Shells: Multi-Scale Shape Registration With Functional Maps.'
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/EisenbergerLC20
  doi: 10.1109/CVPR42600.2020.01228
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Eisenberger_Smooth_Shells_Multi-Scale_Shape_Registration_With_Functional_Maps_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/EisenbergerLC20
  abstract: We propose a novel 3D shape correspondence method based on the iterative
    alignment of so-called smooth shells. Smooth shells define a series of coarse-to-fine
    shape approximations designed to work well with multiscale algorithms. The main
    idea is to first align rough approximations of the geometry and then add more
    and more details to refine the correspondence. We fuse classical shape registration
    with Functional Maps by embedding the input shapes into an intrinsic-extrinsic
    product space. Moreover, we disambiguate intrinsic symmetries by applying a surrogate
    based Markov chain Monte Carlo initialization. Our method naturally handles various
    types of noise that commonly occur in real scans, like non-isometry or incompatible
    meshing. Finally, we demonstrate state-of-the-art quantitative results on several
    datasets and show that our pipeline produces smoother, more realistic results
    than other automatic matching methods in real world applications.
  related_code: ''
- author: Zan Gojcic, Caifa Zhou, Jan D. Wegner, Leonidas J. Guibas, Tolga Birdal
  title: Learning Multiview 3D Point Cloud Registration.
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/GojcicZWGB20
  doi: 10.1109/CVPR42600.2020.00183
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Gojcic_Learning_Multiview_3D_Point_Cloud_Registration_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/GojcicZWGB20
  abstract: 'We present a novel, end-to-end learnable, multiview 3D point cloud registration
    algorithm. Registration of multiple scans typically follows a two-stage pipeline:
    the initial pairwise alignment and the globally consistent refinement. The former
    is often ambiguous due to the low overlap of neighboring point clouds, symmetries
    and repetitive scene parts. Therefore, the latter global refinement aims at establishing
    the cyclic consistency across multiple scans and helps in resolving the ambiguous
    cases. In this paper we propose, to the best of our knowledge, the first end-to-end
    algorithm for joint learning of both parts of this two-stage problem. Experimental
    evaluation on well accepted benchmark datasets shows that our approach outperforms
    the state-of-the-art by a significant margin, while being end-to-end trainable
    and computationally less costly. Moreover, we present detailed analysis and an
    ablation study that validate the novel components of our approach. The source
    code and pretrained models are publicly available under https://github.com/zgojcic/3D_multiview_reg.'
  related_code: https://github.com/zgojcic/3D_multiview_reg
- author: José Pedro Iglesias, Carl Olsson, Fredrik Kahl
  title: Global Optimality for Point Set Registration Using Semidefinite Programming.
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/IglesiasOK20
  doi: 10.1109/CVPR42600.2020.00831
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Iglesias_Global_Optimality_for_Point_Set_Registration_Using_Semidefinite_Programming_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/IglesiasOK20
  abstract: In this paper we present a study of global optimality conditions for Point
    Set Registration (PSR) with missing data. PSR is the problem of aligning multiple
    point clouds with an unknown target point cloud. Since non-linear rotation constraints
    are present the problem is inherently non-convex and typically relaxed by computing
    the Lagrange dual, which is a Semidefinite Program (SDP). In this work we show
    that given a local minimizer the dual variables of the SDP can be computed in
    closed form. This opens up the possibility of verifying the optimally, using the
    SDP formulation without explicitly solving it. In addition it allows us to study
    under what conditions the relaxation is tight, through spectral analysis. We show
    that if the errors in the (unknown) optimal solution are bounded the SDP formulation
    will be able to recover it.
  related_code: ''
- author: Tony C. W. Mok, Albert C. S. Chung
  title: Fast Symmetric Diffeomorphic Image Registration with Convolutional Neural
    Networks.
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/MokC20
  doi: 10.1109/CVPR42600.2020.00470
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Mok_Fast_Symmetric_Diffeomorphic_Image_Registration_with_Convolutional_Neural_Networks_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/MokC20
  abstract: Diffeomorphic deformable image registration is crucial in many medical
    image studies, as it offers unique, special features including topology preservation
    and invertibility of the transformation. Recent deep learning-based deformable
    image registration methods achieve fast image registration by leveraging a convolutional
    neural network (CNN) to learn the spatial transformation from the synthetic ground
    truth or the similarity metric. However, these approaches often ignore the topology
    preservation of the transformation and the smoothness of the transformation which
    is enforced by a global smoothing energy function alone. Moreover, deep learning-based
    approaches often estimate the displacement field directly, which cannot guarantee
    the existence of the inverse transformation. In this paper, we present a novel,
    efficient unsupervised symmetric image registration method which maximizes the
    similarity between images within the space of diffeomorphic maps and estimates
    both forward and inverse transformations simultaneously. We evaluate our method
    on 3D image registration with a large scale brain image dataset. Our method achieves
    state-of-the-art registration accuracy and running time while maintaining desirable
    diffeomorphic properties.
  related_code: ''
- author: Gonçalo Dias Pais, Srikumar Ramalingam, Venu Madhav Govindu, Jacinto C.
    Nascimento, Rama Chellappa, Pedro Miraldo
  title: '3DRegNet: A Deep Neural Network for 3D Point Registration.'
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/PaisRGNCM20
  doi: 10.1109/CVPR42600.2020.00722
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Pais_3DRegNet_A_Deep_Neural_Network_for_3D_Point_Registration_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/PaisRGNCM20
  abstract: 'We present 3DRegNet, a novel deep learning architecture for the registration
    of 3D scans. Given a set of 3D point correspondences, we build a deep neural network
    to address the following two challenges: (i) classification of the point correspondences
    into inliers/outliers, and (ii) regression of the motion parameters that align
    the scans into a common reference frame. With regard to regression, we present
    two alternative approaches: (i) a Deep Neural Network (DNN) registration and (ii)
    a Procrustes approach using SVD to estimate the transformation. Our correspondence-based
    approach achieves a higher speedup compared to competing baselines. We further
    propose the use of a refinement network, which consists of a smaller 3DRegNet
    as a refinement to improve the accuracy of the registration. Extensive experiments
    on two challenging datasets demonstrate that we outperform other methods and achieve
    state-of-the-art results. The code is available.'
  related_code: ''
- author: Jian Wang 0075, Miaomiao Zhang 0002
  title: 'DeepFLASH: An Efficient Network for Learning-Based Medical Image Registration.'
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/WangZ20
  doi: 10.1109/CVPR42600.2020.00450
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Wang_DeepFLASH_An_Efficient_Network_for_Learning-Based_Medical_Image_Registration_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/WangZ20
  abstract: 'This paper presents DeepFLASH, a novel network with efficient training
    and inference for learning-based medical image registration. In contrast to existing
    approaches that learn spatial transformations from training data in the high dimensional
    imaging space, we develop a new registration network entirely in a low dimensional
    bandlimited space. This dramatically reduces the computational cost and memory
    footprint of an expensive training and inference. To achieve this goal, we first
    introduce complex-valued operations and representations of neural architectures
    that provide key components for learning-based registration models. We then construct
    an explicit loss function of transformation fields fully characterized in a bandlimited
    space with much fewer parameterizations. Experimental results show that our method
    is significantly faster than the state-of-the-art deep learning based image registration
    methods, while producing equally accurate alignment. We demonstrate our algorithm
    in two different applications of image registration: 2D synthetic data and 3D
    real brain magnetic resonance (MR) images.'
  related_code: ''
- author: Yuxin Yao 0001, Bailin Deng, Weiwei Xu 0003, Juyong Zhang
  title: Quasi-Newton Solver for Robust Non-Rigid Registration.
  venue: CVPR
  year: '2020'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/YaoDXZ20
  doi: 10.1109/CVPR42600.2020.00762
  ee: https://openaccess.thecvf.com/content_CVPR_2020/html/Yao_Quasi-Newton_Solver_for_Robust_Non-Rigid_Registration_CVPR_2020_paper.html
  url: https://dblp.org/rec/conf/cvpr/YaoDXZ20
  abstract: Imperfect data (noise, outliers and partial overlap) and high degrees
    of freedom make non-rigid registration a classical challenging problem in computer
    vision. Existing methods typically adopt the l_p type robust estimator to regularize
    the fitting and smoothness, and the proximal operator is used to solve the resulting
    non-smooth problem. However, the slow convergence of these algorithms limits its
    wide applications. In this paper, we propose a formulation for robust non-rigid
    registration based on a globally smooth robust estimator for data fitting and
    regularization, which can handle outliers and partial overlaps. We apply the majorization-minimization
    algorithm to the problem, which reduces each iteration to solving a simple least-squares
    problem with L-BFGS. Extensive experiments demonstrate the effectiveness of our
    method for non-rigid alignment between two shapes with outliers and partial overlap.
    with quantitative evaluation showing that it outperforms state-of-the-art methods
    in terms of registration accuracy and computational speed. The source code is
    available at https://github.com/Juyong/Fast_RNRR.
  related_code: https://github.com/Juyong/Fast_RNRR
- author: Yasuhiro Aoki, Hunter Goforth, Rangaprasad Arun Srivatsan, Simon Lucey
  title: 'PointNetLK: Robust &amp; Efficient Point Cloud Registration Using PointNet.'
  venue: CVPR
  year: '2019'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/AokiGSL19
  doi: 10.1109/CVPR.2019.00733
  ee: http://openaccess.thecvf.com/content_CVPR_2019/html/Aoki_PointNetLK_Robust__Efficient_Point_Cloud_Registration_Using_PointNet_CVPR_2019_paper.html
  url: https://dblp.org/rec/conf/cvpr/AokiGSL19
  abstract: 'PointNet has revolutionized how we think about representing point clouds.
    For classification and segmentation tasks, the approach and its subsequent variants/extensions
    are considered state-of-the-art. To date, the successful application of PointNet
    to point cloud registration has remained elusive. In this paper we argue that
    PointNet itself can be thought of as a learnable "imaging" function. As a consequence,
    classical vision algorithms for image alignment can be brought to bear on the
    problem -- namely the Lucas & Kanade (LK) algorithm. Our central innovations stem
    from: (i) how to modify the LK algorithm to accommodate the PointNet imaging function,
    and (ii) unrolling PointNet and the LK algorithm into a single trainable recurrent
    deep neural network. We describe the architecture, and compare its performance
    against state-of-the-art in several common registration scenarios. The architecture
    offers some remarkable properties including: generalization across shape categories
    and computational efficiency -- opening up new paths of exploration for the application
    of deep learning to point cloud registration. Code and videos are available at
    https://github.com/hmgoforth/PointNetLK.'
  related_code: https://github.com/hmgoforth/PointNetLK
- author: Haowen Deng, Tolga Birdal, Slobodan Ilic
  title: 3D Local Features for Direct Pairwise Registration.
  venue: CVPR
  year: '2019'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/DengBI19
  doi: 10.1109/CVPR.2019.00336
  ee: http://openaccess.thecvf.com/content_CVPR_2019/html/Deng_3D_Local_Features_for_Direct_Pairwise_Registration_CVPR_2019_paper.html
  url: https://dblp.org/rec/conf/cvpr/DengBI19
  abstract: We present a novel, data driven approach for solving the problem of registration
    of two point cloud scans. Our approach is direct in the sense that a single pair
    of corresponding local patches already provides the necessary transformation cue
    for the global registration. To achieve that, we first endow the state of the
    art PPF-FoldNet auto-encoder (AE) with a pose-variant sibling, where the discrepancy
    between the two leads to pose-specific descriptors. Based upon this, we introduce
    RelativeNet, a relative pose estimation network to assign correspondence-specific
    orientations to the keypoints, eliminating any local reference frame computations.
    Finally, we devise a simple yet effective hypothesize-and-verify algorithm to
    quickly use the predictions and align two point sets. Our extensive quantitative
    and qualitative experiments suggests that our approach outperforms the state of
    the art in challenging real datasets of pairwise registration and that augmenting
    the keypoints with local pose information leads to better generalization and a
    dramatic speed-up.
  related_code: ''
- author: Wei Gao 0026, Russ Tedrake
  title: 'FilterReg: Robust and Efficient Probabilistic Point-Set Registration Using
    Gaussian Filter and Twist Parameterization.'
  venue: CVPR
  year: '2019'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/GaoT19
  doi: 10.1109/CVPR.2019.01135
  ee: http://openaccess.thecvf.com/content_CVPR_2019/html/Gao_FilterReg_Robust_and_Efficient_Probabilistic_Point-Set_Registration_Using_Gaussian_Filter_CVPR_2019_paper.html
  url: https://dblp.org/rec/conf/cvpr/GaoT19
  abstract: Probabilistic point-set registration methods have been gaining more attention
    for their robustness to noise, outliers and occlusions. However, these methods
    tend to be much slower than the popular iterative closest point (ICP) algorithms,
    which severely limits their usability. In this paper, we contribute a novel probabilistic
    registration method that achieves state-of-the-art robustness as well as substantially
    faster computational performance than modern ICP implementations. This is achieved
    using a rigorous yet computationally-efficient probabilistic formulation. Point-set
    registration is cast as a maximum likelihood estimation and solved using the EM
    algorithm. We show that with a simple augmentation, the E step can be formulated
    as a filtering problem, allowing us to leverage advances in efficient Gaussian
    filtering methods. We also propose a customized permutohedral filter to improve
    its performance while retaining sufficient accuracy for our task. Additionally,
    we present a simple and efficient twist parameterization that generalizes our
    method to the registration of articulated and deformable objects. For articulated
    objects, the complexity of our method is almost independent of the Degrees Of
    Freedom (DOFs), which makes it highly efficient even for high DOF systems. The
    results demonstrate the proposed method consistently outperforms many competitive
    baselines on a variety of registration tasks.
  related_code: ''
- author: Huu M. Le, Thanh-Toan Do, Tuan Hoang, Ngai-Man Cheung
  title: 'SDRSAC: Semidefinite-Based Randomized Approach for Robust Point Cloud Registration
    Without Correspondences.'
  venue: CVPR
  year: '2019'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/LeDHC19
  doi: 10.1109/CVPR.2019.00021
  ee: http://openaccess.thecvf.com/content_CVPR_2019/html/Le_SDRSAC_Semidefinite-Based_Randomized_Approach_for_Robust_Point_Cloud_Registration_Without_CVPR_2019_paper.html
  url: https://dblp.org/rec/conf/cvpr/LeDHC19
  abstract: This paper presents a novel randomized algorithm for robust point cloud
    registration without correspondences. Most existing registration approaches require
    a set of putative correspondences obtained by extracting invariant descriptors.
    However, such descriptors could become unreliable in noisy and contaminated settings.
    In these settings, methods that directly handle input point sets are preferable.
    Without correspondences, however, conventional randomized techniques require a
    very large number of samples in order to reach satisfactory solutions. In this
    paper, we propose a novel approach to address this problem. In particular, our
    work enables the use of randomized methods for point cloud registration without
    the need of putative correspondences. By considering point cloud alignment as
    a special instance of graph matching and employing an efficient semi-definite
    relaxation, we propose a novel sampling mechanism, in which the size of the sampled
    subsets can be larger-than-minimal. Our tight relaxation scheme enables fast rejection
    of the outliers in the sampled sets, resulting in high quality hypotheses. We
    conduct extensive experiments to demonstrate that our approach outperforms other
    state-of-the-art methods. Importantly, our proposed method serves as a generic
    framework which can be extended to problems with known correspondences.
  related_code: ''
- author: Haofu Liao, Wei-An Lin, Jiarui Zhang, Jingdan Zhang, Jiebo Luo 0001, Shaohua
    Kevin Zhou
  title: Multiview 2D/3D Rigid Registration via a Point-Of-Interest Network for Tracking
    and Triangulation.
  venue: CVPR
  year: '2019'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/LiaoLZZLZ19
  doi: 10.1109/CVPR.2019.01292
  ee: http://openaccess.thecvf.com/content_CVPR_2019/html/Liao_Multiview_2D3D_Rigid_Registration_via_a_Point-Of-Interest_Network_for_Tracking_CVPR_2019_paper.html
  url: https://dblp.org/rec/conf/cvpr/LiaoLZZLZ19
  abstract: We propose to tackle the problem of multiview 2D/3D rigid registration
    for intervention via a Point-Of-Interest Network for Tracking and Triangulation
    (POINT^2). POINT^2 learns to establish 2D point-to-point correspondences between
    the pre- and intra-intervention images by tracking a set of random POIs. The 3D
    pose of the pre-intervention volume is then estimated through a triangulation
    layer. In POINT^2, the unified framework of the POI tracker and the triangulation
    layer enables learning informative 2D features and estimating 3D pose jointly.
    In contrast to existing approaches, POINT^2 only requires a single forward-pass
    to achieve a reliable 2D/3D registration. As the POI tracker is shift-invariant,
    POINT^2 is more robust to the initial pose of the 3D pre-intervention image. Extensive
    experiments on a large-scale clinical cone-beam CT (CBCT) dataset show that the
    proposed POINT^2 method outperforms the existing learning-based method in terms
    of accuracy, robustness and running time. Furthermore, when used as an initial
    pose estimator, our method also improves the robustness and speed of the state-of-the-art
    optimization-based approaches by ten folds.
