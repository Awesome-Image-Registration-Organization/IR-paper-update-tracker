registra%20venue%3AICLR%3A:
- author: Mingyang Zhao 0001, Gaofeng Meng, Dong-Ming Yan 0001
  title: Occlusion-aware Non-Rigid Point Cloud Registration via Unsupervised Neural
    Deformation Correntropy.
  venue: ICLR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/iclr/0001M025
  doi: 10.48550/arXiv.2502.10704
  ee: https://openreview.net/forum?id=cjJqU40nYS
  url: https://dblp.org/rec/conf/iclr/0001M025
  abstract: Non-rigid alignment of point clouds is crucial for scene understanding,
    reconstruction, and various computer vision and robotics tasks. Recent advancements
    in implicit deformation networks for non-rigid registration have significantly
    reduced the reliance on large amounts of annotated training data. However, existing
    state-of-the-art methods still face challenges in handling occlusion scenarios.
    To address this issue, this paper introduces an innovative unsupervised method
    called Occlusion-Aware Registration (OAR) for non-rigidly aligning point clouds.
    The key innovation of our method lies in the utilization of the adaptive correntropy
    function as a localized similarity measure, enabling us to treat individual points
    distinctly. In contrast to previous approaches that solely minimize overall deviations
    between two shapes, we combine unsupervised implicit neural representations with
    the maximum correntropy criterion to optimize the deformation of unoccluded regions.
    This effectively avoids collapsed, tearing, and other physically implausible results.
    Moreover, we present a theoretical analysis and establish the relationship between
    the maximum correntropy criterion and the commonly used Chamfer distance, highlighting
    that the correntropy-induced metric can be served as a more universal measure
    for point cloud analysis. Additionally, we introduce locally linear reconstruction
    to ensure that regions lacking correspondences between shapes still undergo physically
    natural deformations. Our method achieves superior or competitive performance
    compared to existing approaches, particularly when dealing with occluded geometries.
    We also demonstrate the versatility of our method in challenging tasks such as
    large deformations, shape interpolation, and shape completion under occlusion
    disturbances.
  related_code: ''
- author: Xiaoling Hu 0002, Karthik Gopinath, Peirong Liu, Malte Hoffmann, Koen Van
    Leemput, Oula Puonti, Juan Eugenio Iglesias
  title: Hierarchical Uncertainty Estimation for Learning-based Registration in Neuroimaging.
  venue: ICLR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/iclr/0002GLHLPI25
  doi: ''
  ee: https://openreview.net/forum?id=w8LMtFY97b
  url: https://dblp.org/rec/conf/iclr/0002GLHLPI25
  abstract: 'Over recent years, deep learning based image registration has achieved
    impressive accuracy in many domains, including medical imaging and, specifically,
    human neuroimaging with magnetic resonance imaging (MRI). However, the uncertainty
    estimation associated with these methods has been largely limited to the application
    of generic techniques (e.g., Monte Carlo dropout) that do not exploit the peculiarities
    of the problem domain, particularly spatial modeling. Here, we propose a principled
    way to propagate uncertainties (epistemic or aleatoric) estimated at the level
    of spatial location by these methods, to the level of global transformation models,
    and further to downstream tasks. Specifically, we justify the choice of a Gaussian
    distribution for the local uncertainty modeling, and then propose a framework
    where uncertainties spread across hierarchical levels, depending on the choice
    of transformation model. Experiments on publicly available data sets show that
    Monte Carlo dropout correlates very poorly with the reference registration error,
    whereas our uncertainty estimates correlate much better. Crucially, the results
    also show that uncertainty-aware fitting of transformations improves the registration
    accuracy of brain MRI scans. Finally, we illustrate how sampling from the posterior
    distribution of the transformations can be used to propagate uncertainties to
    downstream neuroimaging tasks. Code is available at: https://github.com/HuXiaoling/Regre4Regis.'
  related_code: https://github.com/HuXiaoling/Regre4Regis
- author: Haiping Wang 0004, Yuan Liu 0025, Bing Wang 0013, Yujing Sun 0001, Zhen
    Dong 0005, Wenping Wang 0001, Bisheng Yang
  title: 'FreeReg: Image-to-Point Cloud Registration Leveraging Pretrained Diffusion
    Models and Monocular Depth Estimators.'
  venue: ICLR
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/iclr/000400S0WY24
  doi: 10.48550/arXiv.2310.03420
  ee: https://openreview.net/forum?id=BPb5AhT2Vf
  url: https://dblp.org/rec/conf/iclr/000400S0WY24
  abstract: Matching cross-modality features between images and point clouds is a
    fundamental problem for image-to-point cloud registration. However, due to the
    modality difference between images and points, it is difficult to learn robust
    and discriminative cross-modality features by existing metric learning methods
    for feature matching. Instead of applying metric learning on cross-modality data,
    we propose to unify the modality between images and point clouds by pretrained
    large-scale models first, and then establish robust correspondence within the
    same modality. We show that the intermediate features, called diffusion features,
    extracted by depth-to-image diffusion models are semantically consistent between
    images and point clouds, which enables the building of coarse but robust cross-modality
    correspondences. We further extract geometric features on depth maps produced
    by the monocular depth estimator. By matching such geometric features, we significantly
    improve the accuracy of the coarse correspondences produced by diffusion features.
    Extensive experiments demonstrate that without any task-specific training, direct
    utilization of both features produces accurate image-to-point cloud registration.
    On three public indoor and outdoor benchmarks, the proposed method averagely achieves
    a 20.6 percent improvement in Inlier Ratio, a three-fold higher Inlier Number,
    and a 48.6 percent improvement in Registration Recall than existing state-of-the-arts.
  related_code: ''
- author: Junhao Hu, Weijie Gan, Zhixin Sun, Hongyu An, Ulugbek Kamilov
  title: A Plug-and-Play Image Registration Network.
  venue: ICLR
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/iclr/HuGSAK24
  doi: ''
  ee: https://openreview.net/forum?id=DGez4B2a6Y
  url: https://dblp.org/rec/conf/iclr/HuGSAK24
  abstract: Deformable image registration (DIR) is an active research topic in biomedical
    imaging. There is a growing interest in developing DIR methods based on deep learning
    (DL). A traditional DL approach to DIR is based on training a convolutional neural
    network (CNN) to estimate the registration field between two input images. While
    conceptually simple, this approach comes with a limitation that it exclusively
    relies on a pre-trained CNN without explicitly enforcing fidelity between the
    registered image and the reference. We present plug-and-play image registration
    network (PIRATE) as a new DIR method that addresses this issue by integrating
    an explicit data-fidelity penalty and a CNN prior. PIRATE pre-trains a CNN denoiser
    on the registration field and "plugs" it into an iterative method as a regularizer.
    We additionally present PIRATE+ that fine-tunes the CNN prior in PIRATE using
    deep equilibrium models (DEQ). PIRATE+ interprets the fixed-point iteration of
    PIRATE as a network with effectively infinite layers and then trains the resulting
    network end-to-end, enabling it to learn more task-specific information and boosting
    its performance. Our numerical results on OASIS and CANDI datasets show that our
    methods achieve state-of-the-art performance on DIR.
