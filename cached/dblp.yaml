- author: Nurislam Tursynbek, Thomas Hastings Greer, Basar Demir, Marc Niethammer
  title: Guiding Registration with Emergent Similarity from Pre-trained Diffusion
    Models.
  venue: MICCAI
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/TursynbekGDN25
  doi: 10.1007/978-3-032-04965-0_23
  ee: https://doi.org/10.1007/978-3-032-04965-0_23
  url: https://dblp.org/rec/conf/miccai/TursynbekGDN25
  abstract: 'Diffusion models, while trained for image generation, have emerged as
    powerful foundational feature extractors for downstream tasks. We find that off-the-shelf
    diffusion models, trained exclusively to generate natural RGB images, can identify
    semantically meaningful correspondences in medical images. Building on this observation,
    we propose to leverage diffusion model features as a similarity measure to guide
    deformable image registration networks. We show that common intensity-based similarity
    losses often fail in challenging scenarios, such as when certain anatomies are
    visible in one image but absent in another, leading to anatomically inaccurate
    alignments. In contrast, our method identifies true semantic correspondences,
    aligning meaningful structures while disregarding those not present across images.
    We demonstrate superior performance of our approach on two tasks: multimodal 2D
    registration (DXA to X-Ray) and monomodal 3D registration (brain-extracted to
    non-brain-extracted MRI). Code: https://github.com/uncbiag/dgir'
- author: Junyi Wang, Mubai Du, Ye Wu 0001, Yijie Li, William M. Wells III, Lauren
    J. O&apos;Donnell, Fan Zhang 0013
  title: A Novel Streamline-Based Diffusion MRI Tractography Registration Method with
    Probabilistic Keypoint Detection.
  venue: MICCAI
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/WangDWLWOZ25
  doi: 10.1007/978-3-032-05162-2_3
  ee: https://doi.org/10.1007/978-3-032-05162-2_3
  url: https://dblp.org/rec/conf/miccai/WangDWLWOZ25
  abstract: Registration of diffusion MRI tractography is an essential step for analyzing
    group similarities and variations in the brain's white matter (WM). Streamline-based
    registration approaches can leverage the 3D geometric information of fiber pathways
    to enable spatial alignment after registration. Existing methods usually rely
    on the optimization of the spatial distances to identify the optimal transformation.
    However, such methods overlook point connectivity patterns within the streamline
    itself, limiting their ability to identify anatomical correspondences across tractography
    datasets. In this work, we propose a novel unsupervised approach using deep learning
    to perform streamline-based dMRI tractography registration. The overall idea is
    to identify corresponding keypoint pairs across subjects for spatial alignment
    of tractography datasets. We model tractography as point clouds to leverage the
    graph connectivity along streamlines. We propose a novel keypoint detection method
    for streamlines, framed as a probabilistic classification task to identify anatomically
    consistent correspondences across unstructured streamline sets. In the experiments,
    we compare several existing methods and show highly effective and efficient tractography
    registration performance.
