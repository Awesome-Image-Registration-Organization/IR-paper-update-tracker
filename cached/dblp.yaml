- author: Alexander Bigalke, Lasse Hansen, Mattias P. Heinrich
  title: Adapting the Mean Teacher for Keypoint-Based Lung Registration Under Geometric
    Domain Shifts.
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/BigalkeHH22
  doi: 10.1007/978-3-031-16446-0_27
  ee: https://doi.org/10.1007/978-3-031-16446-0_27
  url: https://dblp.org/rec/conf/miccai/BigalkeHH22
  abstract: Recent deep learning-based methods for medical image registration achieve
    results that are competitive with conventional optimization algorithms at reduced
    run times. However, deep neural networks generally require plenty of labeled training
    data and are vulnerable to domain shifts between training and test data. While
    typical intensity shifts can be mitigated by keypoint-based registration, these
    methods still suffer from geometric domain shifts, for instance, due to different
    fields of view. As a remedy, in this work, we present a novel approach to geometric
    domain adaptation for image registration, adapting a model from a labeled source
    to an unlabeled target domain. We build on a keypoint-based registration model,
    combining graph convolutions for geometric feature learning with loopy belief
    optimization, and propose to reduce the domain shift through self-ensembling.
    To this end, we embed the model into the Mean Teacher paradigm. We extend the
    Mean Teacher to this context by 1) adapting the stochastic augmentation scheme
    and 2) combining learned feature extraction with differentiable optimization.
    This enables us to guide the learning process in the unlabeled target domain by
    enforcing consistent predictions of the learning student and the temporally averaged
    teacher model. We evaluate the method for exhale-to-inhale lung CT registration
    under two challenging adaptation scenarios (DIR-Lab 4D CT to COPD, COPD to Learn2Reg).
    Our method consistently improves on the baseline model by 50%/47% while even matching
    the accuracy of models trained on target data. Source code is available at https://github.com/multimodallearning/registration-da-mean-teacher.
