- author: Kaidong Zhang, Jialun Peng, Jingjing Fu, Dong Liu 0002
  title: Exploiting Optical Flow Guidance for Transformer-Based Video Inpainting.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2024'
  type: Journal Articles
  access: closed
  key: journals/pami/ZhangPF024
  doi: 10.1109/TPAMI.2024.3361010
  ee: https://doi.org/10.1109/TPAMI.2024.3361010
  url: https://dblp.org/rec/journals/pami/ZhangPF024
  abstract: Transformers have been widely used for video processing owing to the multi-head
    self attention (MHSA) mechanism. However, the MHSA mechanism encounters an intrinsic
    difficulty for video inpainting, since the features associated with the corrupted
    regions are degraded and incur inaccurate self attention. This problem, termed
    query degradation, may be mitigated by first completing optical flows and then
    using the flows to guide the self attention, which was verified in our previous
    work – flow-guided transformer (FGT). We further exploit the flow guidance and
    propose FGT++ to pursue more effective and efficient video inpainting. First,
    we design a lightweight flow completion network by using local aggregation and
    edge loss. Second, to address the query degradation, we propose a flow guidance
    feature integration module, which uses the motion discrepancy to enhance the features,
    together with a flow-guided feature propagation module that warps the features
    according to the flows. Third, we decouple the transformer along the temporal
    and spatial dimensions, where flows are used to select the tokens through a temporally
    deformable MHSA mechanism, and global tokens are combined with the inner-window
    local tokens through a dual-perspective MHSA mechanism. FGT++ is experimentally
    evaluated to be outperforming the existing video inpainting networks qualitatively
    and quantitatively.
  related_code: ''
- author: Aleix Boquet-Pujadas, Jean-Christophe Olivo-Marin
  title: Reformulating Optical Flow to Solve Image-Based Inverse Problems and Quantify
    Uncertainty.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: open
  key: journals/pami/BoquetPujadasO23
  doi: 10.1109/TPAMI.2022.3202855
  ee: https://doi.org/10.1109/TPAMI.2022.3202855
  url: https://dblp.org/rec/journals/pami/BoquetPujadasO23
  abstract: 'From meteorology to medical imaging and cell mechanics, many scientific
    domains use inverse problems (IPs) to extract physical measurements from image
    movement. To this end, motion estimation methods such as optical flow (OF) pre-process
    images into motion data to feed the IP, which then inverts for the measurements
    through a physical model. However, this combined OFIP pipeline exacerbates the
    ill-posedness inherent to each technique, propagating errors and preventing uncertainty
    quantification. We introduce a Bayesian PDE-constrained framework that transforms
    visual information directly into physical measurements in the context of probability
    distributions. The posterior mean is a constrained IP that tracks brightness while
    satisfying the physical model, thereby translating the aperture problem from the
    motion to the underlying physics; whereas the posterior covariance derives measurement
    error out of image noise. As we illustrate with traction force microscopy, our
    approach offers several advantages: more accurate reconstructions; unprecedented
    flexibility in experiment design (e.g., arbitrary boundary conditions); and the
    exclusivity of measurement error, central to empirical science, yet still unavailable
    under the OFIP strategy.'
  related_code: ''
- author: Zelin Zhang, Anthony J. Yezzi, Guillermo Gallego 0002
  title: Formulating Event-Based Image Reconstruction as a Linear Inverse Problem
    With Deep Regularization Using Optical Flow.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2023'
  type: Journal Articles
  access: open
  key: journals/pami/ZhangYG23
  doi: 10.1109/TPAMI.2022.3230727
  ee: https://doi.org/10.1109/TPAMI.2022.3230727
  url: https://dblp.org/rec/journals/pami/ZhangYG23
  abstract: Event cameras are novel bio-inspired sensors that measure per-pixel brightness
    differences asynchronously. Recovering brightness from events is appealing since
    the reconstructed images inherit the high dynamic range (HDR) and high-speed properties
    of events; hence they can be used in many robotic vision applications and to generate
    slow-motion HDR videos. However, state-of-the-art methods tackle this problem
    by training an event-to-image Recurrent Neural Network (RNN), which lacks explainability
    and is difficult to tune. In this work we show, for the first time, how tackling
    the combined problem of motion and brightness estimation leads us to formulate
    event-based image reconstruction as a linear inverse problem that can be solved
    without training an image reconstruction RNN. Instead, classical and learning-based
    regularizers are used to solve the problem and remove artifacts from the reconstructed
    images. The experiments show that the proposed approach generates images with
    visual quality on par with state-of-the-art methods despite only using data from
    a short time interval. State-of-the-art results are achieved using an image denoising
    Convolutional Neural Network (CNN) as the regularization function. The proposed
    regularized formulation and solvers have a unifying character because they can
    be applied also to reconstruct brightness from the second derivative. Additionally,
    the formulation is attractive because it can be naturally combined with super-resolution,
    motion-segmentation and color demosaicing. Code is available at https://github.com/tub-rip/event_based_image_rec_inverse_problem
  related_code: https://github.com/tub-rip/event_based_image_rec_inverse_problem
- author: David B. de Jong, Federico Paredes-Vallés, Guido C. H. E. de Croon
  title: How Do Neural Networks Estimate Optical Flow? A Neuropsychology-Inspired
    Study.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2022'
  type: Journal Articles
  access: closed
  key: journals/pami/JongPC22
  doi: 10.1109/TPAMI.2021.3083538
  ee: https://doi.org/10.1109/TPAMI.2021.3083538
  url: https://dblp.org/rec/journals/pami/JongPC22
  abstract: End-to-end trained convolutional neural networks have led to a breakthrough
    in optical flow estimation. The most recent advances focus on improving the optical
    flow estimation by improving the architecture and setting a new benchmark on the
    publicly available MPI-Sintel dataset. Instead, in this article, we investigate
    how deep neural networks estimate optical flow. A better understanding of how
    these networks function is important for (i) assessing their generalization capabilities
    to unseen inputs, and (ii) suggesting changes to improve their performance. For
    our investigation, we focus on FlowNetS, as it is the prototype of an encoder-decoder
    neural network for optical flow estimation. Furthermore, we use a filter identification
    method that has played a major role in uncovering the motion filters present in
    animal brains in neuropsychological research. The method shows that the filters
    in the deepest layer of FlowNetS are sensitive to a variety of motion patterns.
    Not only do we find translation filters, as demonstrated in animal brains, but
    thanks to the easier measurements in artificial neural networks, we even unveil
    dilation, rotation, and occlusion filters. Furthermore, we find similarities in
    the refinement part of the network and the perceptual filling-in process which
    occurs in the mammal primary visual cortex.
  related_code: ''
- author: Pengpeng Liu, Michael R. Lyu, Irwin King, Jia Xu 0011
  title: 'Learning by Distillation: A Self-Supervised Learning Framework for Optical
    Flow Estimation.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2022'
  type: Journal Articles
  access: closed
  key: journals/pami/LiuLKX22
  doi: 10.1109/TPAMI.2021.3085525
  ee: https://doi.org/10.1109/TPAMI.2021.3085525
  url: https://dblp.org/rec/journals/pami/LiuLKX22
  abstract: 'We present DistillFlow, a knowledge distillation approach to learning
    optical flow. DistillFlow trains multiple teacher models and a student model,
    where challenging transformations are applied to the input of the student model
    to generate hallucinated occlusions as well as less confident predictions. Then,
    a self-supervised learning framework is constructed: confident predictions from
    teacher models are served as annotations to guide the student model to learn optical
    flow for those less confident predictions. The self-supervised learning framework
    enables us to effectively learn optical flow from unlabeled data, not only for
    non-occluded pixels, but also for occluded pixels. DistillFlow achieves state-of-the-art
    unsupervised learning performance on both KITTI and Sintel datasets. Our self-supervised
    pre-trained model also provides an excellent initialization for supervised fine-tuning,
    suggesting an alternate training paradigm in contrast to current supervised learning
    methods that highly rely on pre-training on synthetic data. At the time of writing,
    our fine-tuned models ranked 1st among all monocular methods on the KITTI 2015
    benchmark, and outperform all published methods on the Sintel Final benchmark.
    More importantly, we demonstrate the generalization capability of DistillFlow
    in three aspects: framework generalization, correspondence generalization and
    cross-dataset generalization. Our code and models will be available on https://github.com/ppliuboy/DistillFlow.'
  related_code: https://github.com/ppliuboy/DistillFlow
- author: Mingfang Zhang 0002, Yinqiang Zheng, Feng Lu 0005
  title: Optical Flow in the Dark.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2022'
  type: Journal Articles
  access: closed
  key: journals/pami/ZhangZL22
  doi: 10.1109/TPAMI.2021.3130302
  ee: https://doi.org/10.1109/TPAMI.2021.3130302
  url: https://dblp.org/rec/journals/pami/ZhangZL22
  abstract: Optical flow estimation in low-light conditions is a challenging task
    for existing methods and current optical flow datasets lack low-light samples.
    Even if the dark images are enhanced before estimation, which could achieve great
    visual perception, it still leads to suboptimal optical flow results because information
    like motion consistency may be broken during the enhancement. We propose to apply
    a novel training policy to learn optical flow directly from new synthetic and
    real low-light images. Specifically, first, we design a method to collect a new
    optical flow dataset in multiple exposures with shared optical flow pseudo labels.
    Then we apply a two-step process to create a synthetic low-light optical flow
    dataset, based on an existing bright one, by simulating low-light raw features
    from the multi-exposure raw images we collected. To extend the data diversity,
    we also include published low-light raw videos without optical flow labels. In
    our training pipeline, with the three datasets, we create two teacher-student
    pairs to progressively obtain optical flow labels for all data. Finally, we apply
    a mix-up training policy with our diversified datasets to produce low-light-robust
    optical flow models for release. The experiments show that our method can relatively
    maintain the optical flow accuracy as the image exposure descends and the generalization
    ability of our method is tested with different cameras in multiple practical scenes.
  related_code: ''
- author: Jingyu Chen, Xin Yang 0008, Qizeng Jia, Chunyuan Liao
  title: 'DENAO: Monocular Depth Estimation Network With Auxiliary Optical Flow.'
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2021'
  type: Journal Articles
  access: closed
  key: journals/pami/ChenYJL21
  doi: 10.1109/TPAMI.2020.2977021
