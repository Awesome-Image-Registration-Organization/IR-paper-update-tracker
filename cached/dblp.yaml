- author: Lin Bie, Shouan Pan, Siqi Li 0001, Yining Zhao, Yue Gao 0002
  title: 'GraphI2P: Image-to-Point Cloud Registration with Exploring Pattern of Correspondence
    via Graph Learning.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/BieP0Z025
  doi: 10.1109/CVPR52734.2025.02064
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Bie_GraphI2P_Image-to-Point_Cloud_Registration_with_Exploring_Pattern_of_Correspondence_via_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/BieP0Z025
  abstract: Although the fusion of images and LiDAR point clouds is crucial to many
    applications in computer vision, the relative poses of cameras and LiDAR scanners
    are often unknown. However, due to the modality and domain gap between images
    and LiDAR point clouds, Image-to-Point Cloud Registration is a significant challenge,
    especially when the image and point cloud come from non-synchronized frames. To
    tackle these issues, we introduce the virtual point cloud as a bridge to alleviate
    the cross-modality gap between images and LiDAR point clouds. In this way, the
    modality gap is converted to the domain gap of point clouds. Moreover, we introduce
    a virtual-spherical representation achieving orthogonal decoupling between pixel
    location and predicted depth. As for the domain gap, we propose a distribution-based
    adaptive sample module to generate a unified distribution of two types of point
    clouds. Then, we explore the correct correspondence pattern consistency and prune
    the false correspondences through a graph-based selection process. Experimental
    results demonstrate that our method outperforms the state-of-the-art methods by
    more than 10.77% and 12.53% performance on the KITTI Odometry and nuScenes datasets,
    respectively. The results demonstrate that our method can effectively solve non-synchronized
    random-frame registration.
  related_code: ''
- author: Xinxing Cheng, Tianyang Zhang 0003, Wenqi Lu 0001, Qingjie Meng, Alejandro
    F. Frangi, Jinming Duan 0001
  title: 'SACB-Net: Spatial-awareness Convolutions for Medical Image Registration.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/Cheng00MF025
  doi: 10.1109/CVPR52734.2025.00493
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Cheng_SACB-Net_Spatial-awareness_Convolutions_for_Medical_Image_Registration_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/Cheng00MF025
  abstract: Deep learning-based image registration methods have shown state-of-the-art
    performance and rapid inference speeds. Despite these advances, many existing
    approaches fall short in capturing spatially varying information in non-local
    regions of feature maps due to the reliance on spatially-shared convolution kernels.
    This limitation leads to suboptimal estimation of deformation fields. In this
    paper, we propose a 3D Spatial-Awareness Convolution Block (SACB) to enhance the
    spatial information within feature representations. Our SACB estimates the spatial
    clusters within feature maps by leveraging feature similarity and subsequently
    parameterizes the adaptive convolution kernels across diverse regions. This adaptive
    mechanism generates the convolution kernels (weights and biases) tailored to spatial
    variations, thereby enabling the network to effectively capture spatially varying
    information. Building on SACB, we introduce a pyramid flow estimator (named SACB-Net)
    that integrates SACBs to facilitate multi-scale flow composition, particularly
    addressing large deformations. Experimental results on the brain IXI and LPBA
    datasets as well as Abdomen CT datasets demonstrate the effectiveness of SACB
    and the superiority of SACB-Net over the state-of-the-art learning-based registration
    methods. The code is available at https://github.com/x-xc/SACB_Net.
  related_code: https://github.com/x-xc/SACB_Net
- author: Johan Edstedt, André Mateus 0001, Alberto Jaenal
  title: 'ColabSfM: Collaborative Structure-from-Motion by Point Cloud Registration.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/Edstedt0J25
  doi: 10.1109/CVPR52734.2025.00616
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Edstedt_ColabSfM_Collaborative_Structure-from-Motion_by_Point_Cloud_Registration_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/Edstedt0J25
  abstract: Structure-from-Motion (SfM) is the task of estimating 3D structure and
    camera poses from images. We define Collaborative SfM (ColabSfM) as sharing distributed
    SfM reconstructions. Sharing maps requires estimating a joint reference frame,
    which is typically referred to as registration. However, there is a lack of scalable
    methods and training datasets for registering SfM reconstructions. In this paper,
    we tackle this challenge by proposing the scalable task of point cloud registration
    for SfM reconstructions. We find that current registration methods cannot register
    SfM point clouds when trained on existing datasets. To this end, we propose a
    SfM registration dataset generation pipeline, leveraging partial reconstructions
    from synthetically generated camera trajectories for each scene. Finally, we propose
    a simple but impactful neural refiner on top of the SotA registration method RoITr
    that yields significant improvements, which we call RefineRoITr. Our extensive
    experimental evaluation shows that our proposed pipeline and model enables ColabSfM.
    Code is available at https://github.com/EricssonResearch/ColabSfM
  related_code: https://github.com/EricssonResearch/ColabSfM
- author: Kexue Fu 0001, Mingzhi Yuan, Changwei Wang 0001, Weiguang Pang, Jing Chi,
    Manning Wang, Longxiang Gao
  title: Dual Focus-Attention Transformer for Robust Point Cloud Registration.
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/FuY0PCWG25
  doi: 10.1109/CVPR52734.2025.01099
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Fu_Dual_Focus-Attention_Transformer_for_Robust_Point_Cloud_Registration_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/FuY0PCWG25
  abstract: Recently, coarse-to-fine methods for point cloud registration have achieved
    great success, but few works deeply explore the impact of feature interaction
    at both coarse and fine scales. By visualizing attention scores and correspondences,
    we find that existing methods fail to achieve effective feature aggregation at
    the two scales during the feature interaction. To tackle this issue, we propose
    a Dual Focus-Attention Transformer framework, which only focuses on points relevant
    to the current point for feature interaction, avoiding interactions with irrelevant
    points. For the coarse scale, we design a superpoint focus-attention transformer
    guided by sparse keypoints, which are selected from the neighborhood of superpoints.
    For the fine scale, we only perform feature interaction between the point sets
    that belong to the same superpoint. Experiments show that our method achieve the
    state-of-the-art performance on three standard benchmarks. The code and pre-trained
    models are available at https://github.com/fukexue/DFAT.git.
  related_code: https://github.com/fukexue/DFAT.git
- author: Thomas Hastings Greer, Lin Tian 0001, François-Xavier Vialard, Roland Kwitt,
    Raúl San José Estépar, Marc Niethammer
  title: 'CARL: A Framework for Equivariant Image Registration.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/Greer0VKEN25
  doi: 10.1109/CVPR52734.2025.02423
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Greer_CARL_A_Framework_for_Equivariant_Image_Registration_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/Greer0VKEN25
  abstract: Image registration estimates spatial correspondences between image pairs.
    These estimates are typically obtained via numerical optimization or regression
    by a deep network. A desirable property is that a correspondence estimate (e.g.,
    the true oracle correspondence) for an image pair is maintained under deformations
    of the input images. Formally, the estimator should be equivariant to a desired
    class of image transformations. In this work, we present careful analyses of equivariance
    properties in the context of multi-step deep registration networks. Based on these
    analyses we 1) introduce the notions of [U, U] equivariance (network equivariance
    to the same deformations of the input images) and [W, U] equivariance (where input
    images can undergo different deformations); we 2) show that in a suitable multi-step
    registration setup it is sufficient for overall [W, U] equivariance if the first
    step has [W, U] equivariance and all others have [U, U] equivariance; we 3) show
    that common displacement-predicting networks only exhibit [U, U] equivariance
    to translations instead of the more powerful [W, U] equivariance; and we 4) show
    how to achieve multi-step [W, U] equivariance via a coordinate-attention mechanism
    combined with displacement-predicting networks. Our approach obtains excellent
    practical performance for 3D abdomen, lung, and brain medical image registration.
    We match or outperform state-of-the-art (SOTA) registration approaches on all
    the datasets with a particularly strong performance for the challenging abdomen
    registration.
  related_code: ''
- author: Haobo Jiang, Jin Xie 0001, Jian Yang 0003, Liang Yu, Jianmin Zheng
  title: Zero-shot RGB-D Point Cloud Registration with Pre-trained Large Vision Model.
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/JiangXYYZ25
  doi: 10.1109/CVPR52734.2025.01579
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Jiang_Zero-shot_RGB-D_Point_Cloud_Registration_with_Pre-trained_Large_Vision_Model_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/JiangXYYZ25
  abstract: This paper introduces ZeroMatch, a novel zero-shot RGB-D point cloud registration
    framework, aimed at achieving robust 3D matching on unseen data without any task-specific
    training. Our core idea is to utilize the powerful zero-shot image representation
    of Stable Diffusion, achieved through extensive pre-training on large-scale data,
    to enhance point-cloud geometric descriptors for robust matching. Specifically,
    we combine the handcrafted geometric descriptor FPFH with Stable-Diffusion features
    to create point descriptors that are both locally and contextually aware, enabling
    reliable RGB-D registration with zero-shot capability. This approach is based
    on our observation that Stable-Diffusion features effectively encode discriminative
    global contextual cues, naturally alleviating the feature ambiguity that FPFH
    often encounters in scenes with repetitive patterns or low overlap. To further
    enhance cross-view consistency of Stable-Diffusion features for improved matching,
    we propose a coupled-image input mode that concatenates the source and target
    images into a single input, replacing the original single-image mode. This design
    achieves both inter-image and prompt-to-image consistency attentions, facilitating
    robust cross-view feature interaction and alignment. Finally, we leverage feature
    nearest neighbors to construct putative correspondences for hypothesize-and-verify
    transformation estimation. Extensive experiments on 3DMatch, ScanNet, and ScanLoNet
    verify the excellent zero-shot matching ability of our method. [Code]
  related_code: ''
- author: Kim Jun-Seong, GeonU Kim, Kim Yu-Ji, Yu-Chiang Frank Wang, Jaesung Choe,
    Tae-Hyun Oh
  title: 'Dr. Splat: Directly Referring 3D Gaussian Splatting via Direct Language
    Embedding Registration.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/Jun-SeongKYWCO25
