- author: Lukas Bösiger, Mihai Dusmanu, Marc Pollefeys, Zuria Bauer
  title: 'MaRINeR: Enhancing Novel Views by Matching Rendered Images with Nearby References.'
  venue: ECCV
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/BosigerDPB24
  doi: 10.1007/978-3-031-72673-6_5
  ee: https://doi.org/10.1007/978-3-031-72673-6_5
  url: https://dblp.org/rec/conf/eccv/BosigerDPB24
  abstract: Rendering realistic images from 3D reconstruction is an essential task
    of many Computer Vision and Robotics pipelines, notably for mixed-reality applications
    as well as training autonomous agents in simulated environments. However, the
    quality of novel views heavily depends of the source reconstruction which is often
    imperfect due to noisy or missing geometry and appearance. Inspired by the recent
    success of reference-based super-resolution networks, we propose MaRINeR, a refinement
    method that leverages information of a nearby mapping image to improve the rendering
    of a target viewpoint. We first establish matches between the raw rendered image
    of the scene geometry from the target viewpoint and the nearby reference based
    on deep features, followed by hierarchical detail transfer. We show improved renderings
    in quantitative metrics and qualitative examples from both explicit and implicit
    scene representations. We further employ our method on the downstream tasks of
    pseudo-ground-truth validation, synthetic data enhancement and detail recovery
    for renderings of reduced 3D reconstructions.
  related_code: ''
- author: Vincent Leroy 0003, Yohann Cabon, Jérôme Revaud
  title: Grounding Image Matching in 3D with MASt3R.
  venue: ECCV
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/eccv/LeroyCR24
  doi: 10.1007/978-3-031-73220-1_5
  ee: https://doi.org/10.1007/978-3-031-73220-1_5
  url: https://dblp.org/rec/conf/eccv/LeroyCR24
  abstract: Image Matching is a core component of all best-performing algorithms and
    pipelines in 3D vision. Yet despite matching being fundamentally a 3D problem,
    intrinsically linked to camera pose and scene geometry, it is typically treated
    as a 2D problem. This makes sense as the goal of matching is to establish correspondences
    between 2D pixel fields, but also seems like a potentially hazardous choice. In
    this work, we take a different stance and propose to cast matching as a 3D task
    with DUSt3R, a recent and powerful 3D reconstruction framework based on Transformers.
    Based on pointmaps regression, this method displayed impressive robustness in
    matching views with extreme viewpoint changes, yet with limited accuracy. We aim
    here to improve the matching capabilities of such an approach while preserving
    its robustness. We thus propose to augment the DUSt3R network with a new head
    that outputs dense local features, trained with an additional matching loss. We
    further address the issue of quadratic complexity of dense matching, which becomes
    prohibitively slow for downstream applications if not carefully treated. We introduce
    a fast reciprocal matching scheme that not only accelerates matching by orders
    of magnitude, but also comes with theoretical guarantees and, lastly, yields improved
    results. Extensive experiments show that our approach, coined MASt3R, significantly
    outperforms the state of the art on multiple matching tasks. In particular, it
    beats the best published methods by 30% (absolute improvement) in VCRE AUC on
    the extremely challenging Map-free localization dataset.
  related_code: ''
