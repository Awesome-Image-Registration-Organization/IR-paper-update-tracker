- author: Mingyuan Meng, Lei Bi 0001, Dagan Feng 0001, Jinman Kim
  title: Non-iterative Coarse-to-Fine Registration Based on Single-Pass Deep Cumulative
    Learning.
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/MengBFK22
  doi: 10.1007/978-3-031-16446-0_9
  ee: https://doi.org/10.1007/978-3-031-16446-0_9
  url: https://dblp.org/rec/conf/miccai/MengBFK22
  abstract: 'Deformable image registration is a crucial step in medical image analysis
    for finding a non-linear spatial transformation between a pair of fixed and moving
    images. Deep registration methods based on Convolutional Neural Networks (CNNs)
    have been widely used as they can perform image registration in a fast and end-to-end
    manner. However, these methods usually have limited performance for image pairs
    with large deformations. Recently, iterative deep registration methods have been
    used to alleviate this limitation, where the transformations are iteratively learned
    in a coarse-to-fine manner. However, iterative methods inevitably prolong the
    registration runtime, and tend to learn separate image features for each iteration,
    which hinders the features from being leveraged to facilitate the registration
    at later iterations. In this study, we propose a Non-Iterative Coarse-to-finE
    registration Network (NICE-Net) for deformable image registration. In the NICE-Net,
    we propose: (i) a Single-pass Deep Cumulative Learning (SDCL) decoder that can
    cumulatively learn coarse-to-fine transformations within a single pass (iteration)
    of the network, and (ii) a Selectively-propagated Feature Learning (SFL) encoder
    that can learn common image features for the whole coarse-to-fine registration
    process and selectively propagate the features as needed. Extensive experiments
    on six public datasets of 3D brain Magnetic Resonance Imaging (MRI) show that
    our proposed NICE-Net can outperform state-of-the-art iterative deep registration
    methods while only requiring similar runtime to non-iterative methods.'
- author: Guillaume Mestdagh, Stéphane Cotin
  title: An Optimal Control Problem for Elastic Registration and Force Estimation
    in Augmented Surgery.
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/MestdaghC22
  doi: 10.1007/978-3-031-16449-1_8
  ee: https://doi.org/10.1007/978-3-031-16449-1_8
  url: https://dblp.org/rec/conf/miccai/MestdaghC22
  abstract: The nonrigid alignment between a pre-operative biomechanical model and
    an intra-operative observation is a critical step to track the motion of a soft
    organ in augmented surgery. While many elastic registration proce-dures introduce
    artiﬁcial forces into the direct physical model to drive the registration, we
    propose in this paper a method to reconstruct the surface loading that actually
    generated the observed deformation. The registration problem is formulated as
    an optimal control problem where the unknown is the surface force distribution
    that applies on the organ and the resulting deformation is computed using an hyperelastic
    model. Advan-tages of this approach include a greater control over the set of
    admissible force distributions, in particular the opportunity to choose where
    forces should apply, thus promoting physically-consistent displacement ﬁelds.
    The optimization problem is solved using a standard adjoint method. We present
    registration results with experimental phantom data showing that our procedure
    is competitive in terms of accuracy. In an example of application, we estimate
    the forces applied by a surgery tool on the organ. Such an estimation is relevant
    in the context of robotic surgery systems, where robotic arms usually do not allow
    force measurements, and providing force feedback remains a challenge.
- author: Tony C. W. Mok, Albert C. S. Chung
  title: Unsupervised Deformable Image Registration with Absent Correspondences in
    Pre-operative and Post-recurrence Brain Tumor MRI Scans.
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/MokC22
  doi: 10.1007/978-3-031-16446-0_3
  ee: https://doi.org/10.1007/978-3-031-16446-0_3
  url: https://dblp.org/rec/conf/miccai/MokC22
  abstract: Registration of pre-operative and post-recurrence brain images is often
    needed to evaluate the effectiveness of brain gliomas treatment. While recent
    deep learning-based deformable registration methods have achieved remarkable success
    with healthy brain images, most of them would be unable to accurately align images
    with pathologies due to the absent correspondences in the reference image. In
    this paper, we propose a deep learning-based deformable registration method that
    jointly estimates regions with absent correspondence and bidirectional deformation
    fields. A forward-backward consistency constraint is used to aid in the localization
    of the resection and recurrence region from voxels with absence correspondences
    in the two images. Results on 3D clinical data from the BraTS-Reg challenge demonstrate
    our method can improve image alignment compared to traditional and deep learning-based
    registration approaches with or without cost function masking strategy. The source
    code is available at https://github.com/cwmok/DIRAC.
- author: Huaqi Qiu, Kerstin Hammernik, Chen Qin, Chen Chen 0042, Daniel Rueckert
  title: Embedding Gradient-Based Optimization in Image Registration Networks.
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/QiuHQCR22
  doi: 10.1007/978-3-031-16446-0_6
  ee: https://doi.org/10.1007/978-3-031-16446-0_6
  url: https://dblp.org/rec/conf/miccai/QiuHQCR22
  abstract: . Deep learning (DL) image registration methods amortize the costly pair-wise
    iterative optimization by training deep neural networks to predict the optimal
    transformation in one fast forward-pass. In this work, we bridge the gap between
    traditional iterative energy optimization-based registration and network-based
    registration, and propose Gradient Descent Network for Image Registration (GraDIRN).
    Our proposed approach trains a DL network that embeds unrolled multi-resolution
    gradient-based energy optimization in its forward pass, which explicitly enforces
    image dissimilarity minimization in its update steps. Extensive evaluations were
    performed on registration tasks using 2D cardiac MR and 3D brain MR images. We
    demonstrate that our approach achieved state-of-the-art registration performance
    while using fewer learned parameters, with good data eﬃciency and domain robustness.
- author: Ziyi Shen, Qianye Yang, Yuming Shen, Francesco Giganti, Vasilis Stavrinides,
    Richard E. Fan, Caroline M. Moore, Mirabela Rusu, Geoffrey A. Sonn, Philip H.
    S. Torr, Dean C. Barratt, Yipeng Hu
  title: Collaborative Quantization Embeddings for Intra-subject Prostate MR Image
    Registration.
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/ShenYSGSFMRSTBH22
  doi: 10.1007/978-3-031-16446-0_23
  ee: https://doi.org/10.1007/978-3-031-16446-0_23
  url: https://dblp.org/rec/conf/miccai/ShenYSGSFMRSTBH22
  abstract: Image registration is useful for quantifying morphological changes in
    longitudinal MR images from prostate cancer patients. This paper describes a development
    in improving the learning-based registration algorithms, for this challenging
    clinical application often with highly variable yet limited training data. First,
    we report that the latent space can be clustered into a much lower dimensional
    space than that commonly found as bottleneck features at the deep layer of a trained
    registration network. Based on this observation, we propose a hierarchical quantization
    method, discretizing the learned feature vectors using a jointly-trained dictionary
    with a constrained size, in order to improve the generalisation of the registration
    networks. Furthermore, a novel collaborative dictionary is independently optimised
    to incorporate additional prior information, such as the segmentation of the gland
    or other regions of interest, in the latent quantized space. Based on 216 real
    clinical images from 86 prostate cancer patients, we show the efficacy of both
    the designed components. Improved registration accuracy was obtained with statistical
    significance, in terms of both Dice on gland and target registration error on
    corresponding landmarks, the latter of which achieved 5.46 mm, an improvement
    of 28.7\% from the baseline without quantization. Experimental results also show
    that the difference in performance was indeed minimised between training and testing
    data.
