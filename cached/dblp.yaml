- author: Dingrong Wang, Soheil Azadvar, Jon S. Heiselman, Xiajun Jiang, Michael I.
    Miga, Linwei Wang
  title: 'LIBR+: Improving Intraoperative Liver Registration by Learning the Residual
    of Biomechanics-Based Deformable Registration.'
  venue: MICCAI
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/WangAHJMW24
  doi: 10.1007/978-3-031-72089-5_34
  ee: https://doi.org/10.1007/978-3-031-72089-5_34
  url: https://dblp.org/rec/conf/miccai/WangAHJMW24
  abstract: The surgical environment imposes unique challenges to the intraoperative
    registration of organ shapes to their preoperatively-imaged geometry. Biomechanical
    model-based registration remains popular, while deep learning solutions remain
    limited due to the sparsity and variability of intraoperative measurements and
    the limited ground-truth deformation of an organ that can be obtained during the
    surgery. In this paper, we propose a novel \textit{hybrid} registration approach
    that leverage a linearized iterative boundary reconstruction (LIBR) method based
    on linear elastic biomechanics, and use deep neural networks to learn its residual
    to the ground-truth deformation (LIBR+). We further formulate a dual-branch spline-residual
    graph convolutional neural network (SR-GCN) to assimilate information from sparse
    and variable intraoperative measurements and effectively propagate it through
    the geometry of the 3D organ. Experiments on a large intraoperative liver registration
    dataset demonstrated the consistent improvements achieved by LIBR+ in comparison
    to existing rigid, biomechnical model-based non-rigid, and deep-learning based
    non-rigid approaches to intraoperative liver registration.
- author: Benjamin Billot, Ramya Muthukrishnan, Esra Abaci Turk, Patricia Ellen Grant,
    Nicholas Ayache, Hervé Delingette, Polina Golland
  title: Spatial Regularisation for Improved Accuracy and Interpretability in Keypoint-Based
    Registration.
  venue: MICCAI
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/BillotMTGADG25
  doi: 10.1007/978-3-032-05185-1_56
  ee: https://doi.org/10.1007/978-3-032-05185-1_56
  url: https://dblp.org/rec/conf/miccai/BillotMTGADG25
  abstract: Unsupervised registration strategies bypass requirements in ground truth
    transforms or segmentations by optimising similarity metrics between fixed and
    moved volumes. Among these methods, a recent subclass of approaches based on unsupervised
    keypoint detection stand out as very promising for interpretability. Specifically,
    these methods train a network to predict feature maps for fixed and moving images,
    from which explainable centres of mass are computed to obtain point clouds, that
    are then aligned in closed-form. However, the features returned by the network
    often yield spatially diffuse patterns that are hard to interpret, thus undermining
    the purpose of keypoint-based registration. Here, we propose a three-fold loss
    to regularise the spatial distribution of the features. First, we use the KL divergence
    to model features as point spread functions that we interpret as probabilistic
    keypoints. Then, we sharpen the spatial distributions of these features to increase
    the precision of the detected landmarks. Finally, we introduce a new repulsive
    loss across keypoints to encourage spatial diversity. Overall, our loss considerably
    improves the interpretability of the features, which now correspond to precise
    and anatomically meaningful landmarks. We demonstrate our three-fold loss in foetal
    rigid motion tracking and brain MRI affine registration tasks, where it not only
    outperforms state-of-the-art unsupervised strategies, but also bridges the gap
    with state-of-the-art supervised methods. Our code is available at https://github.com/BenBillot/spatial_regularisation.
