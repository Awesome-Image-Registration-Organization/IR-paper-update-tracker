- author: Siyoon Jin, Jisu Nam, Jiyoung Kim, Dahyun Chung, Yeong-Seok Kim, Joonhyung
    Park, Heonjeong Chu, Seungryong Kim
  title: 'AM-Adapter: Appearance Matching Adapter for Exemplar-Based Semantic Image
    Synthesis In-the-Wild.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/JinNKCKPCK25
  doi: 10.1109/ICCV51701.2025.01586
  ee: https://doi.org/10.1109/ICCV51701.2025.01586
  url: https://dblp.org/rec/conf/iccv/JinNKCKPCK25
  abstract: 'Exemplar-based semantic image synthesis generates images aligned with
    semantic content while preserving the appearance of an exemplar. Conventional
    structure-guidance models like ControlNet, are limited as they rely solely on
    text prompts to control appearance and cannot utilize exemplar images as input.
    Recent tuning-free approaches address this by transferring local appearance via
    implicit cross-image matching in the augmented self-attention mechanism of pre-trained
    diffusion models. However, prior works are often restricted to single-object cases
    or foreground object appearance transfer, struggling with complex scenes involving
    multiple objects. To overcome this, we propose AM-Adapter (Appearance Matching
    Adapter) to address exemplar-based semantic image synthesis in-the-wild, enabling
    multi-object appearance transfer from a single scene-level image. AM-Adapter automatically
    transfers local appearances from the scene-level input. AM-Adapter alternatively
    provides controllability to map user-defined object details to specific locations
    in the synthesized images. Our learnable framework enhances cross-image matching
    within augmented self-attention by integrating semantic information from segmentation
    maps. To disentangle generation and matching, we adopt stage-wise training. We
    first train the structure-guidance and generation networks, followed by training
    the matching adapter while keeping the others frozen. During inference, we introduce
    an automated exemplar retrieval method for selecting exemplar image-segmentation
    pairs efficiently. Despite utilizing minimal learnable parameters, AM-Adapter
    achieves state-of-the-art performance, excelling in both semantic alignment and
    local appearance fidelity. Extensive ablations validate our design choices. Code
    and weights will be released.: https://cvlab-kaist.github.io/AM-Adapter/'
  related_code: ''
- author: Zizhuo Li, Yifan Lu, Linfeng Tang, Shihua Zhang, Jiayi Ma 0001
  title: 'CoMatch: Dynamic Covisibility-Aware Transformer for Bilateral Subpixel-Level
    Semi-Dense Image Matching.'
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LiLTZM25
  doi: 10.1109/ICCV51701.2025.01721
  ee: https://doi.org/10.1109/ICCV51701.2025.01721
  url: https://dblp.org/rec/conf/iccv/LiLTZM25
  abstract: This prospective study proposes CoMatch, a novel semidense image matcher
    with dynamic covisibility awareness and bilateral subpixel accuracy. Firstly,
    observing that modeling context interaction over the entire coarse feature map
    elicits highly redundant computation due to the neighboring representation similarity
    of tokens, a covisibilityguided token condenser is introduced to adaptively aggregate
    tokens in light of their covisibility scores that are $d y$ namically estimated,
    thereby ensuring computational efficiency while improving the representational
    capacity of aggregated tokens simultaneously. Secondly, considering that feature
    interaction with non-covisible areas is distracting, which may degrade feature
    distinctiveness, a covisibilityassisted attention mechanism is deployed to selectively
    suppress irrelevant message broadcast from non-covisible reduced tokens, resulting
    in robust and compact attention to relevant rather than all ones. Thirdly, we
    find that at the fine-level stage, current methods adjust only the target view's
    keypoints to subpixel level, while those in the source view remain restricted
    at the coarse level and thus not informative enough, detrimental to keypoint location-sensitive
    usages. A simple yet potent fine correlation module is developed to refine matching
    candidates in both source and target views to subpixel level, attaining attractive
    performance improvement. Thorough experimentation across an array of public benchmarks
    affirms CoMatch's promising accuracy, efficiency, and generalizability. Code is
    available at https://github.com/ZizhuoLi/CoMatch.
  related_code: https://github.com/ZizhuoLi/CoMatch
- author: Yanzuo Lu, Yuxi Ren, Xin Xia 0014, Shanchuan Lin, Xing Wang, Xuefeng Xiao
    0001, Andy J. Ma, Xiaohua Xie, Jian-Huang Lai
  title: Adversarial Distribution Matching for Diffusion Distillation Towards Efficient
    Image and Video Synthesis.
  venue: ICCV
  year: '2025'
  type: Conference and Workshop Papers
