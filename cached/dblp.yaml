- author: Guha Balakrishnan, Amy Zhao, Mert R. Sabuncu, John V. Guttag, Adrian V.
    Dalca
  title: An Unsupervised Learning Model for Deformable Medical Image Registration.
  venue: CVPR
  year: '2018'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/BalakrishnanZSG18
  doi: 10.1109/CVPR.2018.00964
  ee: http://openaccess.thecvf.com/content_cvpr_2018/html/Balakrishnan_An_Unsupervised_Learning_CVPR_2018_paper.html
  url: https://dblp.org/rec/conf/cvpr/BalakrishnanZSG18
  abstract: We present a fast learning-based algorithm for deformable, pairwise 3D
    medical image registration. Current registration methods optimize an objective
    function independently for each pair of images, which can be time-consuming for
    large data. We define registration as a parametric function, and optimize its
    parameters given a set of images from a collection of interest. Given a new pair
    of scans, we can quickly compute a registration field by directly evaluating the
    function using the learned parameters. We model this function using a CNN, and
    use a spatial transform layer to reconstruct one image from another while imposing
    smoothness constraints on the registration field. The proposed method does not
    require supervised information such as ground truth registration fields or anatomical
    landmarks. We demonstrate registration accuracy comparable to state-of-the-art
    3D image registration, while operating orders of magnitude faster in practice.
    Our method promises to significantly speed up medical image analysis and processing
    pipelines, while facilitating novel directions in learning-based registration
    and its applications. Our code is available at https://github.com/balakg/voxelmorph.
