- author: Thomas Daniels 0002, Maarten Bosteels, Pieter Robberechts, Jesse Davis
  title: 'RegCheck: A Real-Time Approach for Flagging Potentially Malicious Domain
    Name Registrations.'
  venue: KDD
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/kdd/0002BRD25
  doi: 10.1145/3711896.3737260
  ee: https://doi.org/10.1145/3711896.3737260
  url: https://dblp.org/rec/conf/kdd/0002BRD25
  abstract: Miscreants use domain names for malicious purposes such as phishing websites
    or fake webshops. Reactive approaches such as blocklists play an important role
    in fighting such abuse but have limitations, namely that the domains are typically
    only included in such a list after abuse has been reported (e.g., there may already
    be some victims). We propose RegCheck, a system designed to proactively flag suspicious
    domains at registration time. The core of RegCheck is a machine learning classifier
    that assesses the risk that the domain name will be used for malicious purposes
    based on characteristics known at the time of registration. Based on this assessment,
    it flags some registrations and requires them to undergo additional verification
    prior to the domain name being activated. The system has been developed collaboratively
    between SIDN (.nl) and DNS Belgium (.be) and has been deployed as a real-time
    system at the .be registry since March 2024. Since its deployment, the registry
    has witnessed a decrease in the number of .be domain name registrations that have
    been revoked for breaching the terms and conditions, indicating a decline in the
    number of active malicious registrations.
  related_code: ''
- author: Yao Su 0003, Zhentian Qian, Lei Ma, Lifang He 0001, Xiangnan Kong
  title: One-shot Joint Extraction, Registration and Segmentation of Neuroimaging
    Data.
  venue: KDD
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/kdd/0003QM0K23
  doi: 10.1145/3580305.3599452
  ee: https://doi.org/10.1145/3580305.3599452
  url: https://dblp.org/rec/conf/kdd/0003QM0K23
  abstract: Brain extraction, registration and segmentation are indispensable preprocessing
    steps in neuroimaging studies. The aim is to extract the brain from raw imaging
    scans (i.e., extraction step), align it with a target brain image (i.e., registration
    step) and label the anatomical brain regions (i.e., segmentation step). Conventional
    studies typically focus on developing separate methods for the extraction, registration
    and segmentation tasks in a supervised setting. The performance of these methods
    is largely contingent on the quantity of training samples and the extent of visual
    inspections carried out by experts for error correction. Nevertheless, collecting
    voxel-level labels and performing manual quality control on high-dimensional neuroimages
    (e.g., 3D MRI) are expensive and time-consuming in many medical studies. In this
    paper, we study the problem of one-shot joint extraction, registration and segmentation
    in neuroimaging data, which exploits only one labeled template image (a.k.a. atlas)
    and a few unlabeled raw images for training. We propose a unified end-to-end framework,
    called JERS, to jointly optimize the extraction, registration and segmentation
    tasks, allowing feedback among them. Specifically, we use a group of extraction,
    registration and segmentation modules to learn the extraction mask, transformation
    and segmentation mask, where modules are interconnected and mutually reinforced
    by self-supervision. Empirical results on real-world datasets demonstrate that
    our proposed method performs exceptionally in the extraction, registration and
    segmentation tasks.
  related_code: ''
- author: Wenchong He, Zhe Jiang 0001, Marcus Kriby, Yiqun Xie, Xiaowei Jia, Da Yan
    0001, Yang Zhou 0001
  title: Quantifying and Reducing Registration Uncertainty of Spatial Vector Labels
    on Earth Imagery.
  venue: KDD
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/kdd/He0KXJ0022
  doi: 10.1145/3534678.3539410
  ee: https://doi.org/10.1145/3534678.3539410
  url: https://dblp.org/rec/conf/kdd/He0KXJ0022
  abstract: Given raster imagery features and imperfect vector training labels with
    registration uncertainty, this paper studies a deep learning framework that can
    quantify and reduce the registration uncertainty of training labels as well as
    train neural network parameters simultaneously. The problem is important in broad
    applications such as streamline classification on Earth imagery or tissue segmentation
    on medical imagery, whereby annotating precise vector labels is expensive and
    time-consuming. However, the problem is challenging due to the gap between the
    vector representation of class labels and the raster representation of image features
    and the need for training neural networks with uncertain label locations. Existing
    research on uncertain training labels often focuses on uncertainty in label class
    semantics or characterizes label registration uncertainty at the pixel level (not
    contiguous vectors). To fill the gap, this paper proposes a novel learning framework
    that explicitly quantifies vector labels' registration uncertainty. We propose
    a registration-uncertainty-aware loss function and design an iterative uncertainty
    reduction algorithm by re-estimating the posterior of true vector label locations
    distribution based on a Gaussian process. Evaluations on real-world datasets in
    National Hydrography Dataset refinement show that the proposed approach significantly
    outperforms several baselines in the registration uncertainty estimations performance
    and classification performance.
  related_code: ''
- author: Yao Su 0003, Zhentian Qian, Lifang He 0001, Xiangnan Kong
  title: 'ERNet: Unsupervised Collective Extraction and Registration in Neuroimaging
    Data.'
  venue: KDD
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/kdd/SuQ0K22
  doi: 10.1145/3534678.3539227
  ee: https://doi.org/10.1145/3534678.3539227
  url: https://dblp.org/rec/conf/kdd/SuQ0K22
  abstract: Brain extraction and registration are important preprocessing steps in
    neuroimaging data analysis, where the goal is to extract the brain regions from
    MRI scans (ie extraction step) and align them with a target brain image (ie registration
    step). Conventional research mainly focuses on developing methods for the extraction
    and registration tasks separately under supervised settings. The performance of
    these methods highly depends on the amount of training samples and visual inspections
    performed by experts for error correction. However, in many medical studies, collecting
    voxel-level labels and conducting manual quality control in high-dimensional neuroimages
    (eg 3D MRI) are very expensive and time-consuming. Moreover, brain extraction
    and registration are highly related tasks in neuroimaging data and should be solved
    collectively. In this paper, we study the problem of unsupervised collective extraction
    and registration in neuroimaging data. We propose a unified end-to-end framework,
    called ERNet (Extraction-Registration Network), to jointly optimize the extraction
    and registration tasks, allowing feedback between them. Specifically, we use a
    pair of multi-stage extraction and registration modules to learn the extraction
    mask and transformation, where the extraction network improves the extraction
    accuracy incrementally and the registration network successively warps the extracted
    image until it is well-aligned with the target image. Experiment results on real-world
    datasets show that our proposed method can effectively improve the performance
    on extraction and registration tasks in neuroimaging data.
  related_code: ''
- author: Zhe Jiang 0001, Wenchong He, Marcus Stephen Kirby, Sultan Asiri, Da Yan
    0001
  title: Weakly Supervised Spatial Deep Learning based on Imperfect Vector Labels
    with Registration Errors.
  venue: KDD
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/kdd/0001HKA021
  doi: 10.1145/3447548.3467301
  ee: https://doi.org/10.1145/3447548.3467301
  url: https://dblp.org/rec/conf/kdd/0001HKA021
  abstract: This paper studies weakly supervised learning on spatial raster data based
    on imperfect vector training labels. Given raster feature imagery and imperfect
    (weak) vector labels with location registration errors, our goal is to learn a
    deep learning model for pixel classification and refine vector labels simultaneously.
    The problem is important in many geoscience applications such as streamline delineation
    and road mapping from earth imagery, where annotating imperfect coarse vector
    labels is far more efficient than drawing precise labels. But the problem is challenging
    due to the misalignment of vector labels with raster feature pixels and the need
    to infer true vector label location while learning neural network parameters.
    Existing works on weakly supervised learning often focus on noise and errors in
    label semantics, assuming label locations to be either correct or irrelevant (e.g.,
    identical and independently distributed). A few works exist on label registration
    errors, but these methods often focus on label misalignment on object segment
    boundaries at the pixel level without guaranteeing vector continuity. To fill
    the gap, this paper proposes a spatial learning framework based on Expectation-Maximization
    that iteratively updates deep neural network parameters while inferring true vector
    label locations. Specifically, inference of true vector locations is based on
    both the current pixel class predictions and the geometric properties of vectors.
    Evaluations on real-world high-resolution remote sensing datasets in National
    Hydrography Dataset (NHD) refinement show that the proposed framework outperforms
    baseline methods in classification accuracy and refined vector quality.
  related_code: ''
- author: Xiao Liang, Zheng Yang, Binghui Wang, Shaofeng Hu, Zijie Yang, Dong Yuan
    0006, Neil Zhenqiang Gong, Qi Li 0002, Fang He
  title: 'Unveiling Fake Accounts at the Time of Registration: An Unsupervised Approach.'
  venue: KDD
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/kdd/LiangYWHYYGLH21
  doi: 10.1145/3447548.3467094
  ee: https://doi.org/10.1145/3447548.3467094
  url: https://dblp.org/rec/conf/kdd/LiangYWHYYGLH21
  abstract: Online social networks (OSNs) are plagued by fake accounts. Existing fake
    account detection methods either require a manually labeled training set, which
    is time-consuming and costly, or rely on rich information of OSN accounts, e.g.,
    content and behaviors, which incurs significant delay in detecting fake accounts.
    In this work, we propose UFA (Unveiling Fake Accounts) to detect fake accounts
    immediately after they are registered in an unsupervised fashion. First, through
    a measurement study on the registration patterns on a real-world registration
    dataset, we observe that fake accounts tend to cluster on outlier registration
    patterns, e.g., IP and phone numbers. Then, we design an unsupervised learning
    algorithm to learn weights for all registration accounts and their features that
    reveal outlier registration patterns. Next, we construct a registration graph
    to capture the correlation between registration accounts, and utilize a community
    detection method to detect fake accounts via analyzing the registration graph
    structure. We evaluate UFA using real-world WeChat datasets. Our results demonstrate
    that UFA achieves a precision 94% with a recall ~80%, while a supervised variant
    requires 600K manual labels to obtain the comparable performance. Moreover, UFA
    has been deployed by WeChat to detect fake accounts for more than one year. UFA
    detects 500K fake accounts per day with a precision ~93% on average, via manual
    verification by the WeChat security team.
