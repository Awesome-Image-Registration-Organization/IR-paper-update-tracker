  title: 'Database Annotation with Few Examples: An Atlas-Based Framework Using Diffeomorphic
    Registration of 3D Trees.'
  venue: MICCAI
  year: '2020'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/AntonsantiBJG20
