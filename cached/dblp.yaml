  abstract: Sparse-to-dense interpolation for optical flow is a fundamental phase
    in the pipeline of most of the leading optical flow estimation algorithms. The
    current state-of-the-art method for interpolation, EpicFlow, is a local average
    method based on an edge aware geodesic distance. We propose a new data-driven
    sparse-to-dense interpolation algorithm based on a fully convolutional network.
    We draw inspiration from the filling-in process in the visual cortex and introduce
    lateral dependencies between neurons and multi-layer supervision into our learning
    process. We also show the importance of the image contour to the learning process.
