- author: Yinuo Jiang, Xiuchuan Tang, Cheng Cheng, Ye Yuan
  title: A robust inlier identification algorithm for point cloud registration via
    𝓁0-minimization.
  venue: NeurIPS
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/JiangTCY24
  doi: 10.52202/079017-2016
  ee: http://papers.nips.cc/paper_files/paper/2024/hash/735c847a07bf6dd4486ca1ace242a88c-Abstract-Conference.html
  url: https://dblp.org/rec/conf/nips/JiangTCY24
  abstract: Correspondences in point cloud registration are prone to outliers, significantly
    reducing registration accuracy and highlighting the need for precise inlier identification.
    In this paper, we propose a robust inlier identification algorithm for point cloud
    registration by reformulating the conventional registration problem as an alignment
    error ℓ 0 -minimization problem. The ℓ 0 -minimization problem is formulated for
    each local set, where those local sets are built on a compatibility graph of input
    correspondences. To resolve the ℓ 0 -minimization, we develop a novel two-stage
    decoupling strategy, which first decouples the alignment error into a rotation
    fitting error and a translation fitting error. Second, null-space matrices are
    employed to decouple inlier identification from the estimation of rotation and
    translation respectively, thereby applying Bayes Theorem to ℓ 0 -minimization
    problems and solving for fitting errors. Correspondences with the smallest errors
    are identified as inliers to generate a transformation hypothesis for each local
    set. The best hypothesis is selected to perform registration. We demonstrate that
    the proposed inlier identification algorithm is robust under high outlier ratios
    and noise through experiments. Extensive results on the KITTI, 3DMatch, and 3DLoMatch
    datasets demonstrate that our method achieves state-of-the-art performance compared
    to both traditional and learning-based methods in various indoor and outdoor scenes.
- author: Chengwei Ren, Yifan Feng 0001, Weixiang Zhang, Xiao-Ping (Steven) Zhang,
    Yue Gao 0002
  title: Multi-scale Consistency for Robust 3D Registration via Hierarchical Sinkhorn
    Tree.
  venue: NeurIPS
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/RenFZZG24
  doi: 10.52202/079017-2913
  ee: http://papers.nips.cc/paper_files/paper/2024/hash/a70ee7ea485e4fd36abbfc4adf591c28-Abstract-Conference.html
  url: https://dblp.org/rec/conf/nips/RenFZZG24
  abstract: We study the problem of retrieving accurate correspondence through multi-scale
    consistency (MSC) for robust point cloud registration. Existing works in a coarse-to-fine
    manner either suffer from severe noisy correspondences caused by unreliable coarse
    matching or struggle to form outlier-free coarse-level correspondence sets. To
    tackle this, we present H ierarchical S inkhorn T ree (HST), a pruned tree structure
    designed to hierarchically measure the local consistency of each coarse correspondence
    across multiple feature scales, thereby filtering out the local dissimilar ones.
    In this way, we convert the modeling of MSC for each correspondence into a BFS
    traversal with pruning of a K-ary tree rooted at the superpoint, with its K nearest
    neighbors in the feature pyramid serving as child nodes. To achieve efficient
    pruning and accurate vicinity characterization, we further propose a novel overlap-aware
    Sinkhorn Distance, which retains only the most likely overlapping points for local
    measurement and next level exploration. The modeling process essentially involves
    traversing a pair of HSTs synchronously and aggregating the consistency measures
    of corresponding tree nodes. Extensive experiments demonstrate HST consistently
    outperforms the state-of-the-art methods on both indoor and outdoor benchmarks.
- author: Kezheng Xiong, Haoen Xiang, Qingshan Xu, Chenglu Wen, Siqi Shen, Jonathan
    Jun Li, Cheng Wang 0003
  title: Mining and Transferring Feature-Geometry Coherence for Unsupervised Point
    Cloud Registration.
  venue: NeurIPS
  year: '2024'
  type: Conference and Workshop Papers
  access: open
  key: conf/nips/XiongXXWSLW24
  doi: 10.52202/079017-1118
  ee: http://papers.nips.cc/paper_files/paper/2024/hash/3e9034dd5420660d86c8c360c35a895e-Abstract-Conference.html
  url: https://dblp.org/rec/conf/nips/XiongXXWSLW24
