- author: Robert J. Schneider, Douglas P. Perrin, Nikolay V. Vasilyev, Gerald R. Marx,
    Pedro J. del Nido, Robert D. Howe
  title: Real-time image-based rigid registration of three-dimensional ultrasound.
  venue: Medical Image Anal.
  year: '2012'
  type: Journal Articles
  access: closed
  key: journals/mia/SchneiderPVMNH12
  doi: 10.1016/J.MEDIA.2011.10.004
  ee: https://doi.org/10.1016/j.media.2011.10.004
  url: https://dblp.org/rec/journals/mia/SchneiderPVMNH12
  abstract: Registration of three-dimensional ultrasound (3DUS) volumes is necessary
    in several applications, such as when stitching volumes to expand the field of
    view or when stabilizing a temporal sequence of volumes to cancel out motion of
    the probe or anatomy. Current systems that register 3DUS volumes either use external
    tracking systems (electromagnetic or optical), which add expense and impose limitations
    on acquisitions, or are image-based methods that operate offline and are incapable
    of providing immediate feedback to clinicians. This paper presents a real-time
    image-based algorithm for rigid registration of 3DUS volumes designed for acquisitions
    in which small probe displacements occur between frames. Described is a method
    for feature detection and descriptor formation that takes into account the characteristics
    of 3DUS imaging. Volumes are registered by determining a correspondence between
    these features. A global set of features is maintained and integrated into the
    registration, which limits the accumulation of registration error. The system
    operates in real-time (i.e. volumes are registered as fast or faster than they
    are acquired) by using an accelerated framework on a graphics processing unit.
    The algorithm’s parameter selection and performance is analyzed and validated
    in studies which use both water tank and clinical images. The resulting registration
    accuracy is comparable to similar feature-based registration methods, but in contrast
    to these methods, can register 3DUS volumes in real-time.
