- author: Anand Rangarajan 0001, Haili Chui, James S. Duncan
  title: Rigid point feature registration using mutual information.
  venue: Medical Image Anal.
  year: '1999'
  type: Journal Articles
  access: closed
  key: journals/mia/RangarajanCD99
  doi: 10.1016/S1361-8415(99)80034-6
  ee: https://doi.org/10.1016/S1361-8415(99)80034-6
  url: https://dblp.org/rec/journals/mia/RangarajanCD99
  abstract: We have developed a new mutual information-based registration method for
    matching unlabeled point features. In contrast to earlier mutual information-based
    registration methods, which estimate the mutual information using image intensity
    information, our approach uses the point feature location information. A novel
    aspect of our approach is the emergence of correspondence (between the two sets
    of features) as a natural by-product of joint density estimation. We have applied
    this algorithm to the problem of geometric alignment of primate autoradiographs.
    We also present preliminary results on three-dimensional robust matching of sulci
    derived from anatomical magnetic resonance images. Finally, we present an experimental
    comparison between the mutual information approach and other recent approaches
    which explicitly parameterize feature correspondence.
