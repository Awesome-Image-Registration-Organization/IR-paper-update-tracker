- author: Xuri Ge, Linqing Li, Songpei Xu, Kaiwen Zheng, Yaoqin He, Junchen Fu, Joemon
    M. Jose
  title: The DenseCap-Guided Attention Network For Image-Text Matching.
  venue: WWW
  year: '2025'
  type: Conference and Workshop Papers
  access: closed
  key: conf/www/GeLXZHFJ25
  doi: 10.1145/3701716.3717564
  ee: https://doi.org/10.1145/3701716.3717564
  url: https://dblp.org/rec/conf/www/GeLXZHFJ25
  abstract: Image-text matching is a typical cross-modal task, which has recently
    attracted great interest in multimedia and computer vision. Previous image-text
    matching methods mostly rely on coarse appearance features to guide the learning
    of image and text monotonous representations whereby attention-aware mechanism
    is introduced for image-text matching. Such coarse feature guided representations
    lack fine-grained and diverse semantic information for linking images and sentences
    which are widely regarded as the important cues in aligning the image-text pairs,
    leading to mismatches between images and texts at a fine-grained level. In this
    paper, we propose a novel Densecap-guided Attention Network, termed DAN, as the
    bridge that allows the integration of fine-grained and diverse dense caption representations
    as mediation to link images and texts. In particular, the dense captions are first
    extracted from the given image by a densecap-parser. Then, a densecap-guided attention
    module is designed to mine the fine-grained and discriminate correspondence of
    image and sentence. Finally, a graph-structured matching network is utilized to
    learn the associations and alignments between visual and textual attention-aware
    features. Quantitative results show that the proposed DAN can outperform the state-of-the-art
    and alternative approaches under various standard evaluation metrics on two public
    benchmarks, Microsoft COCO and Flickr30K.
  related_code: ''
- author: Yi Shao, Jiande Sun 0001, Ye Jiang 0001, Jing Li 0046
  title: Dual-grained Text-Image Olfactory Matching Model with Mutual Promotion Stages.
  venue: WWW
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/www/Shao0JL23
  doi: 10.1145/3543873.3587649
  ee: https://doi.org/10.1145/3543873.3587649
  url: https://dblp.org/rec/conf/www/Shao0JL23
  abstract: Olfactory experience has great advantages in awakening human memories
    and emotions, which may even surpass vision in some cases. Studies have proved
    that olfactory scene descriptions in images and text content can also arouse human
    olfactory imagination, but there are still few studies on solving related problems
    from the perspective of computer vision and NLP. This paper proposes a multimodal
    model that can detect similar olfactory experience in paired text-image samples.
    The model builds two stages, coarse-grained and fine-grained. The model adopts
    the feature fusion method based on pre-trained CLIP for coarse-grained matching
    training to obtain a preliminary feature extractor to promote fine-grained matching
    training, and then uses the similarity calculation method based on stacked cross
    attention for fine-grained matching training to obtain the final feature extractor
    which in turn promotes coarse-grained matching training. Finally, we manually
    build an approximate olfactory nouns list during fine-grained matching training,
    which not only yields significantly better performance when fed back to the fine-grained
    matching process, but this noun list can be used for future research. Experiments
    on the MUSTI task dataset of MediaEval2022 prove that the coarse-grained and fine-grained
    matching stages in proposed model both perform well, and both F1 measures exceed
    the existing baseline models.
  related_code: ''
- author: Abhimanyu Dubey, Esteban Moro, Manuel Cebrián, Iyad Rahwan
  title: 'MemeSequencer: Sparse Matching for Embedding Image Macros.'
  venue: WWW
  year: '2018'
  type: Conference and Workshop Papers
  access: closed
  key: conf/www/DubeyMCR18
  doi: 10.1145/3178876.3186021
  ee: https://doi.org/10.1145/3178876.3186021
  url: https://dblp.org/rec/conf/www/DubeyMCR18
  abstract: The analysis of the creation, mutation, and propagation of social media
    content on the Internet is an essential problem in computational social science,
    affecting areas ranging from marketing to political mobilization. A first step
    towards understanding the evolution of images online is the analysis of rapidly
    modifying and propagating memetic imagery or "memes". However, a pitfall in proceeding
    with such an investigation is the current incapability to produce a robust semantic
    space for such imagery, capable of understanding differences in Image Macros.
    In this study, we provide a first step in the systematic study of image evolution
    on the Internet, by proposing an algorithm based on sparse representations and
    deep learning to decouple various types of content in such images and produce
    a rich semantic embedding. We demonstrate the benefits of our approach on a variety
    of tasks pertaining to memes and Image Macros, such as image clustering, image
    retrieval, topic prediction and virality prediction, surpassing the existing methods
    on each. In addition to its utility on quantitative tasks, our method opens up
    the possibility of obtaining the first large-scale understanding of the evolution
    and propagation of memetic imagery.
  related_code: ''
