- author: Takahiro Maeda 0001, Norimichi Ukita
  title: 'MotionAug: Augmentation with Physical Correction for Human Motion Prediction.'
  venue: CVPR
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/MaedaU22
  doi: 10.1109/CVPR52688.2022.00632
  ee: https://doi.org/10.1109/CVPR52688.2022.00632
  url: https://dblp.org/rec/conf/cvpr/MaedaU22
  abstract: This paper presents a motion data augmentation scheme incorporating motion
    synthesis encouraging diversity and motion correction imposing physical plausibility.
    This motion synthesis consists of our modified Variational AutoEncoder (VAE) and
    Inverse Kinematics (IK). In this VAE, our proposed sampling-near-samples method
    generates various valid motions even with insufficient training motion data. Our
    IK-based motion synthesis method allows us to generate a variety of motions semi-automatically.
    Since these two schemes generate unrealistic artifacts in the synthesized motions,
    our motion correction rectifies them. This motion correction scheme consists of
    imitation learning with physics simulation and subsequent motion debiasing. For
    this imitation learning, we propose the PD-residual force that significantly accelerates
    the training process. Furthermore, our motion debiasing successfully offsets the
    motion bias induced by imitation learning to maximize the effect of augmentation.
    As a result, our method outperforms previous noise-based motion augmentation methods
    by a large margin on both Recurrent Neural Network-based and Graph Convolutional
    Network-based human motion prediction models. The code is available at https://github.com/meaten/MotionAug.
  related_code: https://github.com/meaten/MotionAug
- author: Wenke Xia, Ruoxuan Feng, Dong Wang 0028, Di Hu 0001
  title: 'Phoenix: A Motion-based Self-Reflection Framework for Fine-grained Robotic
    Action Correction.'
  venue: CVPR
  year: '2025'
  type: Conference and Workshop Papers
  access: open
  key: conf/cvpr/XiaF0025
  doi: 10.1109/CVPR52734.2025.00655
  ee: https://openaccess.thecvf.com/content/CVPR2025/html/Xia_Phoenix_A_Motion-based_Self-Reflection_Framework_for_Fine-grained_Robotic_Action_Correction_CVPR_2025_paper.html
  url: https://dblp.org/rec/conf/cvpr/XiaF0025
  abstract: Building a generalizable self-correction system is crucial for robots
    to recover from failures. Despite advancements in Multimodal Large Language Models
    (MLLMs) that empower robots with semantic reflection ability for failure, translating
    semantic reflection into "how to correct" fine-grained robotic actions remains
    a significant challenge. To address this gap, we build the Phoenix framework,
    which leverages motion instruction as a bridge to connect high-level semantic
    reflection with low-level robotic action correction. In this motion-based self-reflection
    framework, we start with a dual-process motion adjustment mechanism with MLLMs
    to translate the semantic reflection into coarse-grained motion instruction adjustment.
    To leverage this motion instruction for guiding "how to correct" fine-grained
    robotic actions, a multi-task motion-conditioned diffusion policy is proposed
    to integrate visual observations for high-frequency robotic action correction.
    By combining these two models, we could shift the demand for generalization capability
    from the low-level manipulation policy to the MLLMs-Driven motion adjustment model
    and facilitate precise, fine-grained robotic action correction. Utilizing this
    framework, we further develop a lifelong learning method to automatically improve
    the model’s capability from interactions with dynamic environments. The experiments
    conducted in both the RoboMimic simulation and real-world scenarios prove the
    superior generalization and robustness of our framework across a variety of manipulation
    tasks. Our code is released at https://github.com/GeWu-Lab/Motion-Based-Self-Reflection-Framework.
  related_code: https://github.com/GeWu-Lab/Motion-Based-Self-Reflection-Framework
