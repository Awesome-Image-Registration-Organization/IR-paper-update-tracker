- author: Guillaume Mestdagh, Stéphane Cotin
  title: An Optimal Control Problem for Elastic Registration and Force Estimation
    in Augmented Surgery.
  venue: MICCAI
  year: '2022'
  type: Conference and Workshop Papers
  access: closed
  key: conf/miccai/MestdaghC22
  doi: 10.1007/978-3-031-16449-1_8
