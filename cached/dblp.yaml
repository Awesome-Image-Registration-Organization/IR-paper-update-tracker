  abstract: Registration of pre-operative and post-recurrence brain images is often
    needed to evaluate the effectiveness of brain gliomas treatment. While recent
    deep learning-based deformable registration methods have achieved remarkable success
    with healthy brain images, most of them would be unable to accurately align images
    with pathologies due to the absent correspondences in the reference image. In
    this paper, we propose a deep learning-based deformable registration method that
    jointly estimates regions with absent correspondence and bidirectional deformation
    fields. A forward-backward consistency constraint is used to aid in the localization
    of the resection and recurrence region from voxels with absence correspondences
    in the two images. Results on 3D clinical data from the BraTS-Reg challenge demonstrate
    our method can improve image alignment compared to traditional and deep learning-based
    registration approaches with or without cost function masking strategy. The source
    code is available at https://github.com/cwmok/DIRAC.
