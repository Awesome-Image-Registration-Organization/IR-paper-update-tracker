- author: Yan Huang 0008, Jingdong Wang 0001, Liang Wang 0001
  title: Few-Shot Image and Sentence Matching via Aligned Cross-Modal Memory.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2022'
  type: Journal Articles
  access: closed
  key: journals/pami/HuangWW22
  doi: 10.1109/TPAMI.2021.3052490
  ee: https://doi.org/10.1109/TPAMI.2021.3052490
  url: https://dblp.org/rec/journals/pami/HuangWW22
  abstract: Image and sentence matching has attracted much attention recently, and
    many effective methods have been proposed to deal with it. But even the current
    state-of-the-arts still cannot well associate those challenging pairs of images
    and sentences containing few-shot content in their regions and words. In fact,
    such a few-shot matching problem is seldom studied and has become a bottleneck
    for further performance improvement in real-world applications. In this work,
    we formulate this challenging problem as few-shot image and sentence matching,
    and accordingly propose an Aligned Cross-Modal Memory (ACMM) model to deal with
    it. The model can not only softly align few-shot regions and words in a weakly-supervised
    manner, but also persistently store and update cross-modal prototypical representations
    of few-shot classes as references, without using any groundtruth region-word correspondence.
    The model can also adaptively balance the relative importance between few-shot
    and common content in the image and sentence, which leads to better measurement
    of overall similarity. We perform extensive experiments in terms of both few-shot
    and conventional image and sentence matching, and demonstrate the effectiveness
    of the proposed model by achieving the state-of-the-art results on two public
    benchmark datasets.
  related_code: ''
- author: Yan Huang 0008, Qi Wu 0001, Wei Wang 0115, Liang Wang 0001
  title: Image and Sentence Matching via Semantic Concepts and Order Learning.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2020'
  type: Journal Articles
  access: closed
  key: journals/pami/HuangWWW20
  doi: 10.1109/TPAMI.2018.2883466
  ee: https://doi.org/10.1109/TPAMI.2018.2883466
  url: https://dblp.org/rec/journals/pami/HuangWWW20
  abstract: 'Image and sentence matching has made great progress recently, but it
    remains challenging due to the existing large visual-semantic discrepancy. This
    mainly arises from two aspects: 1) images consist of unstructured content which
    is not semantically abstract as the words in the sentences, so they are not directly
    comparable, and 2) arranging semantic concepts in different semantic order could
    lead to quite diverse meanings. The words in the sentences are sequentially arranged
    in a grammatical manner, while the semantic concepts in the images are usually
    unorganized. In this work, we propose a semantic concepts and order learning framework
    for image and sentence matching, which can improve the image representation by
    first predicting semantic concepts and then organizing them in a correct semantic
    order. Given an image, we first use a multi-regional multi-label CNN to predict
    its included semantic concepts in terms of object, property and action. These
    word-level semantic concepts are directly comparable with the words of noun, adjective
    and verb in the matched sentence. Then, to organize these concepts and make them
    express similar meanings as the matched sentence, we use a context-modulated attentional
    LSTM to learn the semantic order. It regards the predicted semantic concepts and
    image global scene as context at each timestep, and selectively attends to concept-related
    image regions by referring to the context in a sequential order. To further enhance
    the semantic order, we perform additional sentence generation on the image representation,
    by using the groundtruth order in the matched sentence as supervision. After obtaining
    the improved image representation, we learn the sentence representation with a
    conventional LSTM, and then jointly perform image and sentence matching and sentence
    generation for model learning. Extensive experiments demonstrate the effectiveness
    of our learned semantic concepts and order, by achieving the state-of-the-art
    results on two public benchmark datasets.'
  related_code: ''
- author: Hae-Gon Jeon, Jaesik Park, Gyeongmin Choe, Jinsun Park, Yunsu Bok, Yu-Wing
    Tai, In So Kweon
  title: Depth from a Light Field Image with Learning-Based Matching Costs.
  venue: IEEE Trans. Pattern Anal. Mach. Intell.
  year: '2019'
  type: Journal Articles
  access: closed
  key: journals/pami/JeonPCPBTK19
  doi: 10.1109/TPAMI.2018.2794979
  ee: https://doi.org/10.1109/TPAMI.2018.2794979
  url: https://dblp.org/rec/journals/pami/JeonPCPBTK19
  abstract: One of the core applications of light field imaging is depth estimation.
    To acquire a depth map, existing approaches apply a single photo-consistency measure
    to an entire light field. However, this is not an optimal choice because of the
    non-uniform light field degradations produced by limitations in the hardware design.
    In this paper, we introduce a pipeline that automatically determines the best
    configuration for photo-consistency measure, which leads to the most reliable
    depth label from the light field. We analyzed the practical factors affecting
    degradation in lenslet light field cameras, and designed a learning based framework
    that can retrieve the best cost measure and optimal depth label. To enhance the
    reliability of our method, we augmented an existing light field benchmark to simulate
    realistic source dependent noise, aberrations, and vignetting artifacts. The augmented
    dataset was used for the training and validation of the proposed approach. Our
    method was competitive with several state-of-the-art methods for the benchmark
    and real-world light field datasets.
