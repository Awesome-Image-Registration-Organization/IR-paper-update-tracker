- author: Weixiao Liu, Hongtao Wu, Gregory S. Chirikjian
  title: 'LSG-CPD: Coherent Point Drift with Local Surface Geometry for Point Cloud
    Registration.'
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LiuWC21
  doi: 10.1109/ICCV48922.2021.01501
  ee: https://doi.org/10.1109/ICCV48922.2021.01501
  url: https://dblp.org/rec/conf/iccv/LiuWC21
  abstract: Probabilistic point cloud registration methods are becoming more popular
    because of their robustness. However, unlike point-to-plane variants of iterative
    closest point (ICP) which incorporate local surface geometric information such
    as surface normals, most probabilistic methods (e.g., coherent point drift (CPD))
    ignore such information and build Gaussian mixture models (GMMs) with isotropic
    Gaussian covariances. This results in sphere-like GMM components which only penalize
    the point-to-point distance between the two point clouds. In this paper, we propose
    a novel method called CPD with Local Surface Geometry (LSG-CPD) for rigid point
    cloud registration. Our method adaptively adds different levels of point-to-plane
    penalization on top of the point-to-point penalization based on the flatness of
    the local surface. This results in GMM components with anisotropic covariances.
    We formulate point cloud registration as a maximum likelihood estimation (MLE)
    problem and solve it with the Expectation-Maximization (EM) algorithm. In the
    E step, we demonstrate that the computation can be recast into simple matrix manipulations
    and efficiently computed on a GPU. In the M step, we perform an unconstrained
    optimization on a matrix Lie group to efficiently update the rigid transformation
    of the registration. The proposed method outperforms state-of-the-art algorithms
    in terms of accuracy and robustness on various datasets captured with range scanners,
    RGBD cameras, and LiDARs. Also, it is significantly faster than modern implementations
    of CPD. The source code is available at https://github.com/ChirikjianLab/LSG-CPD.git.
  related_code: https://github.com/ChirikjianLab/LSG-CPD.git
- author: Taewon Min, Chonghyuk Song, Eunseok Kim, Inwook Shim
  title: Distinctiveness oriented Positional Equilibrium for Point Cloud Registration.
  venue: ICCV
  year: '2021'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/MinSKS21
  doi: 10.1109/ICCV48922.2021.00544
  ee: https://doi.org/10.1109/ICCV48922.2021.00544
  url: https://dblp.org/rec/conf/iccv/MinSKS21
  abstract: Recent state-of-the-art learning-based approaches to point cloud registration
    have largely been based on graph neural networks (GNN). However, these prominent
    GNN backbones suffer from the indistinguishable features problem associated with
    oversmoothing and structural ambiguity of the high-level features, a crucial bottleneck
    to point cloud registration that has evaded scrutiny in the recent relevant literature.
    To address this issue, we propose the Distinctiveness oriented Positional Equilibrium
    (DoPE) module, a novel positional embedding scheme that significantly improves
    the distinctiveness of the high-level features within both the source and target
    point clouds, resulting in superior point matching and hence registration accuracy.
    Specifically, we use the DoPE module in an iterative registration framework, whereby
    the two point clouds are gradually registered via rigid transformations that are
    computed from DoPE’s position-aware features. With every successive iteration,
    the DoPE module feeds increasingly consistent positional information to would-be
    corresponding pairs, which in turn enhances the resulting point-to-point correspondence
    predictions used to estimate the rigid transformation. Within only a few iterations,
    the network converges to a desired equilibrium, where the positional embeddings
    given to matching pairs become essentially identical. We validate the effectiveness
    of DoPE through comprehensive experiments on various registration benchmarks,
    registration task settings, and prominent backbones, yielding unprecedented performance
    improvement across all combinations.
