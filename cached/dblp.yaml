    Ting, Joey Tianyi Zhou, Yong Liu 0026, Rick Siow Mong Goh, Cher Heng Tan
  title: Contrastive domain adaptation with consistency match for automated pneumonia
    diagnosis.
  venue: Medical Image Anal.
  year: '2023'
  type: Journal Articles
  access: closed
  key: journals/mia/FengWXWFLZLCSTZ23
  doi: 10.1016/J.MEDIA.2022.102664
  ee: https://doi.org/10.1016/j.media.2022.102664
  url: https://dblp.org/rec/journals/mia/FengWXWFLZLCSTZ23
  abstract: Pneumonia can be difficult to diagnose since its symptoms are too variable,
    and the radiographic signs are often very similar to those seen in other illnesses
    such as a cold or influenza. Deep neural networks have shown promising performance
    in automated pneumonia diagnosis using chest X-ray radiography, allowing mass
    screening and early intervention to reduce the severe cases and death toll. However,
    they usually require many well-labelled chest X-ray images for training to achieve
    high diagnostic accuracy. To reduce the need for training data and annotation
    resources, we propose a novel method called Contrastive Domain Adaptation with
    Consistency Match (CDACM). It transfers the knowledge from different but relevant
    datasets to the unlabelled small-size target dataset and improves the semantic
    quality of the learnt representations. Specifically, we design a conditional domain
    adversarial network to exploit discriminative information conveyed in the predictions
    to mitigate the domain gap between the source and target datasets. Furthermore,
    due to the small scale of the target dataset, we construct a feature cloud for
    each target sample and leverage contrastive learning to extract more discriminative
    features. Lastly, we propose adaptive feature cloud expansion to push the decision
    boundary to a low-density area. Unlike most existing transfer learning methods
    that aim only to mitigate the domain gap, our method instead simultaneously considers
    the domain gap and the data deficiency problem of the target dataset. The conditional
    domain adaptation and the feature cloud generation of our method are learning
    jointly to extract discriminative features in an end-to-end manner. Besides, the
    adaptive feature cloud expansion improves the model's generalisation ability in
    the target domain. Extensive experiments on pneumonia and COVID-19 diagnosis tasks
    demonstrate that our method outperforms several state-of-the-art unsupervised
    domain adaptation approaches, which verifies the effectiveness of CDACM for automated
    pneumonia diagnosis using chest X-ray imaging.
