- author: Juan Eugenio Iglesias, Marc Modat, Loïc Peter, Allison Stevens, Roberto
    Annunziata, Tom Vercauteren, Ed S. Lein, Bruce Fischl, Sébastien Ourselin
  title: Joint registration and synthesis using a probabilistic model for alignment
    of MRI and histological sections.
  venue: Medical Image Anal.
