- author: Mingyuan Meng, Dagan Feng 0001, Lei Bi 0001, Jinman Kim
  title: Correlation-aware Coarse-to-fine MLPs for Deformable Medical Image Registration.
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/Meng00K24
  doi: 10.1109/CVPR52733.2024.00921
  ee: https://doi.org/10.1109/CVPR52733.2024.00921
  url: https://dblp.org/rec/conf/cvpr/Meng00K24
  abstract: Deformable image registration is a fundamental step for medical image
    analysis. Recently, transformers have been used for registration and outperformed
    Convolutional Neural Networks (CNNs). Transformers can capture long-range dependence
    among image features, which have been shown beneficial for registration. However,
    due to the high computation/memory loads of self-attention, transformers are typically
    used at downsampled feature resolutions and cannot capture fine-grained long-range
    dependence at the full image resolution. This limits deformable registration as
    it necessitates precise dense correspondence between each image pixel. Multi-layer
    Perceptrons (MLPs) without self-attention are efficient in computation/memory
    usage, enabling the feasibility of capturing fine-grained long-range dependence
    at full resolution. Nevertheless, MLPs have not been extensively explored for
    image registration and are lacking the consideration of inductive bias crucial
    for medical registration tasks. In this study, we propose the first correlation-aware
    MLP-based registration network (CorrMLP) for deformable medical image registration.
    Our CorrMLP introduces a correlation-aware multi-window MLP block in a novel coarse-to-fine
    registration architecture, which captures fine-grained multi-range dependence
    to perform correlation-aware coarse-to-fine registration. Extensive experiments
    with seven public medical datasets show that our CorrMLP outperforms state-of-the-art
    deformable registration methods.
- author: Tony C. W. Mok, Zi Li, Yunhao Bai, Jianpeng Zhang, Wei Liu 0127, Yan-Jie
    Zhou, Ke Yan 0006, Dakai Jin, Yu Shi, Xiaoli Yin, Le Lu 0001, Ling Zhang 0002
  title: Modality-Agnostic Structural Image Representation Learning for Deformable
    Multi-Modality Medical Image Registration.
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/MokLBZLZ0JSY0024
  doi: 10.1109/CVPR52733.2024.01066
  ee: https://doi.org/10.1109/CVPR52733.2024.01066
  url: https://dblp.org/rec/conf/cvpr/MokLBZLZ0JSY0024
  abstract: Establishing dense anatomical correspondence across distinct imaging modalities
    is a foundational yet challenging procedure for numerous medical image analysis
    studies and image-guided radiotherapy. Existing multimodality image registration
    algorithms rely on statistical-based similarity measures or local structural image
    representations. However, the former is sensitive to locally varying noise, while
    the latter is not discriminative enough to cope with complex anatomical structures
    in multimodal scans, causing ambiguity in determining the anatomical correspon-dence
    across scans with different modalities. In this paper, we propose a modality-agnostic
    structural representation learning method, which leverages Deep Neighbour-hood
    Self-similarity (DNS) and anatomy-aware contrastive learning to learn discriminative
    and contrast-invariance deep structural image representations (DSIR) without the
    need for anatomical delineations or pre-aligned training images. We evaluate our
    method on multiphase CT, abdomen MR-CT, and brain MR T1w-T2w registration. Comprehensive
    results demonstrate that our method is superior to the conventional local structural
    representation and statistical-based similarity measures in terms of discriminability
    and accuracy.
- author: Juncheng Mu, Lin Bie, Shaoyi Du, Yue Gao 0002
  title: 'ColorPCR: Color Point Cloud Registration with Multi-Stage Geometric-Color
    Fusion.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/MuBD024
  doi: 10.1109/CVPR52733.2024.01990
  ee: https://doi.org/10.1109/CVPR52733.2024.01990
  url: https://dblp.org/rec/conf/cvpr/MuBD024
  abstract: ''
- author: Zekun Qian, Ruize Han, Wei Feng 0005, Song Wang 0002
  title: 'From a Bird&apos;s Eye View to See: Joint Camera and Subject Registration
    without the Camera Calibration.'
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/QianH0024
  doi: 10.1109/CVPR52733.2024.00088
  ee: https://doi.org/10.1109/CVPR52733.2024.00088
  url: https://dblp.org/rec/conf/cvpr/QianH0024
  abstract: 'We tackle a new problem of multi-view camera and sub-ject registration
    in the bird’ s eye view (BEV) without pregiven camera calibration, which promotes
    the multi-view subject registration problem to a new calibration-free stage. This
    greatly alleviates the limitation in many practical applications. However, this
    is a very challenging problem since its only input is several RGB images from
    different first-person views (FPVs), without the BEV image and the calibration
    of the FPVs, while the output is a unified plane aggregated from all views with
    the positions and orientations of both the subjects and cameras in a BEV. For
    this purpose, we propose an end-to-end framework solving cam-era and subject registration
    together by taking advantage of their mutual dependence, whose main idea is as
    below: i) creating a subject view-transform module (VTM) to project each pedestrian
    from FPV to a virtual BEV, ii) deriving a multi-view geometry-based spatial alignment
    module (SAM) to estimate the relative camera pose in a unified BEV, iii) selecting
    and refining the subject and camera registration results within the unified BEV.
    We collect a new large-scale synthetic dataset with rich annotations for training
    and evaluation. Additionally, we also collect a real dataset for cross-domain
    evaluation. The experimental results show the remarkable effectiveness of our
    method. The code and proposed datasets are available at BEVSee.'
- author: Zhiyuan Yu, Zheng Qin 0002, Lintao Zheng, Kai Xu 0004
  title: Learning Instance-Aware Correspondences for Robust Multi-Instance Point Cloud
    Registration in Cluttered Scenes.
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/Yu0Z024
  doi: 10.1109/CVPR52733.2024.01854
  ee: https://doi.org/10.1109/CVPR52733.2024.01854
  url: https://dblp.org/rec/conf/cvpr/Yu0Z024
  abstract: Multi-instance point cloud registration estimates the poses of multiple
    instances of a model point cloud in a scene point cloud. Extracting accurate point
    correspondences is to the center of the problem. Existing approaches usually treat
    the scene point cloud as a whole, overlooking the separation of instances. Therefore,
    point features could be easily polluted by other points from the back-ground or
    different instances, leading to inaccurate correspondences oblivious to separate
    instances, especially in cluttered scenes. In this work, we propose MIRETR, Multi-Instance
    REgistration TRansformer, a coarse-to-fine approach to the extraction of instance-aware
    correspondences. At the coarse level, it jointly learns instance-aware superpoint
    features and predicts per-instance masks. With instance masks, the influence from
    outside of the instance being concerned is minimized, such that highly reliable
    superpoint correspondences can be extracted. The superpoint correspondences are
    then extended to instance candidates at the fine level according to the instance
    masks. At last, an efficient candidate selection and refinement algorithm is devised
    to obtain the final registrations. Extensive experiments on three public benchmarks
    demonstrate the efficacy of our approach. In particular, MIRETR outperforms the
    state of the arts by 16.6 points on F1 score on the challenging ROBI benchmark.
    Code and models are available at https://github.com/zhiyuanYU134/MIRETR.
- author: Yongzhe Yuan, Yue Wu 0004, Xiaolong Fan, Maoguo Gong, Qiguang Miao, Wenping
    Ma 0001
  title: Inlier Confidence Calibration for Point Cloud Registration.
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/Yuan0FGM024
  doi: 10.1109/CVPR52733.2024.00508
  ee: https://doi.org/10.1109/CVPR52733.2024.00508
  url: https://dblp.org/rec/conf/cvpr/Yuan0FGM024
  abstract: ''
- author: Mingyang Zhao 0001, Jingen Jiang 0001, Lei Ma 0008, Shiqing Xin, Gaofeng
    Meng, Dong-Ming Yan 0001
  title: Correspondence-Free Non-Rigid Point Set Registration Using Unsupervised Clustering
    Analysis.
  venue: CVPR
  year: '2024'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/ZhaoJ0XM024
  doi: 10.1109/CVPR52733.2024.02003
  ee: https://doi.org/10.1109/CVPR52733.2024.02003
  url: https://dblp.org/rec/conf/cvpr/ZhaoJ0XM024
  abstract: This paper presents a novel non-rigid point set registration method that
    is inspired by unsupervised clustering analysis. Unlike previous approaches that
    treat the source and target point sets as separate entities, we develop a holistic
    framework where they are formulated as clustering centroids and clustering members,
    separately. We then adopt Tikhonov regularization with an $\ell_{1}$-induced Laplacian
    kernel instead of the commonly used Gaussian kernel to ensure smooth and more
    robust displacement fields. Our formulation delivers closed-form solutions, theoretical
    guarantees, independence from dimensions, and the ability to handle large deformations.
    Subsequently, we introduce a clustering-improved Nyström method to effectively
    reduce the computational complexity and storage of the Gram matrix to linear,
    while providing a rigorous bound for the low-rank approximation. Our method achieves
    high accuracy results across various scenarios and surpasses competitors by a
    significant margin, particularly on shapes with sub-stantial deformations. Additionally,
    we demonstrate the versatility of our method in challenging tasks such as shape
    transfer and medical registration. [Code release]
- author: Zheng Qin 0002, Hao Yu 0010, Changjian Wang, Yuxing Peng 0001, Kai Xu 0004
  title: Deep Graph-based Spatial Consistency for Robust Non-rigid Point Cloud Registration.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/00020W0023
  doi: 10.1109/CVPR52729.2023.00522
  ee: https://doi.org/10.1109/CVPR52729.2023.00522
  url: https://dblp.org/rec/conf/cvpr/00020W0023
  abstract: We study the problem of outlier correspondence pruning for non-rigid point
    cloud registration. In rigid registration, spatial consistency has been a commonly
    used criterion to discriminate outliers from inliers. It measures the compatibility
    of two correspondences by the discrepancy between the respective distances in
    two point clouds. However, spatial consistency no longer holds in non-rigid cases
    and outlier rejection for non-rigid registration has not been well studied. In
    this work, we propose Graph-based Spatial Consistency Network (GraphSCNet) to
    filter outliers for non-rigid registration. Our method is based on the fact that
    non-rigid deformations are usually locally rigid, or local shape preserving. We
    first design a local spatial consistency measure over the deformation graph of
    the point cloud, which evaluates the spatial compatibility only between the correspondences
    in the vicinity of a graph node. An attention-based non-rigid correspondence embedding
    module is then devised to learn a robust representation of non-rigid correspondences
    from local spatial consistency. Despite its simplicity, GraphSCNet effectively
    improves the quality of the putative correspondences and attains state-of-the-art
    performance on three challenging benchmarks. Our code and models are available
    at https://github.com/qinzheng93/GraphSCNet.
- author: Sheng Ao, Qingyong Hu, Hanyun Wang, Kai Xu 0004, Yulan Guo
  title: 'BUFFER: Balancing Accuracy, Efficiency, and Generalizability in Point Cloud
    Registration.'
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/AoHW0G23
  doi: 10.1109/CVPR52729.2023.00127
  ee: https://doi.org/10.1109/CVPR52729.2023.00127
  url: https://dblp.org/rec/conf/cvpr/AoHW0G23
  abstract: 'An ideal point cloud registration framework should have superior accuracy,
    acceptable efficiency, and strong generalizability: However, this is highly challenging
    since existing registration techniques are either not accurate enough, far from
    efficient, or generalized poorly. It remains an open question that how to achieve
    a satisfying balance between this three key elements. In this paper, we propose
    BUFFER, a point cloud registration method for balancing accuracy, efficiency,
    and generalizability. The key to our approach is to take advantage of both point-wise
    and patch-wise techniques, while overcoming the inherent drawbacks simultaneously.
    Different from a simple combination of existing methods, each component of our
    network has been carefully crafted to tackle specific issues. Specifically, a
    Point-wise Learner is first introduced to enhance computational efficiency by
    predicting keypoints and improving the representation capacity of features by
    estimating point orientations, a Patch-wise Embedder which leverages a lightweight
    local feature learner is then deployed to extract efficient and general patch
    features. Additionally, an Inliers Generator which combines simple neural layers
    and general features is presented to search inlier correspondences. Extensive
    experiments on real-world scenarios demonstrate that our method achieves the best
    of both worlds in accuracy, efficiency, and generalization. In particular, our
    method not only reaches the highest success rate on unseen domains, but also is
    almost 30 times faster than the strong baselines specializing in generalization.
    Code is available at https://github.com/aosheng1996/BUFFER.'
- author: Timo Bolkart, Tianye Li, Michael J. Black
  title: Instant Multi-View Head Capture through Learnable Registration.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/BolkartLB23
  doi: 10.1109/CVPR52729.2023.00081
  ee: https://doi.org/10.1109/CVPR52729.2023.00081
  url: https://dblp.org/rec/conf/cvpr/BolkartLB23
  abstract: Existing methods for capturing datasets of 3D heads in dense semantic
    correspondence are slow and commonly address the problem in two separate steps;
    multi-view stereo (MVS) reconstruction followed by non-rigid registration. To
    simplify this process, we introduce TEMPEH (Towards Estimation of 3D Meshes from
    Performances of Expressive Heads) to directly infer 3D heads in dense correspondence
    from calibrated multi-view images. Registering datasets of 3D scans typically
    requires manual parameter tuning to find the right balance between accurately
    fitting the scans' surfaces and being robust to scanning noise and outliers. Instead,
    we propose to jointly register a 3D head dataset while training TEMPEH. Specifically,
    during training, we minimize a geometric loss commonly used for surface registration,
    effectively leveraging TEMPEH as a regularizer. Our multi-view head inference
    builds on a volumetric feature representation that samples and fuses features
    from each view using camera calibration information. To account for partial occlusions
    and a large capture volume that enables head movements, we use view-and surface-aware
    feature fusion, and a spatial transformer-based head localization module, respectively.
    We use raw MVS scans as supervision during training, but, once trained, TEMPEH
    directly predicts 3D heads in dense correspondence without requiring scans. Predicting
    one head takes about 0.3 seconds with a median reconstruction error of 0.26 mm,
    64% lower than the current state-of-the-art. This enables the efficient capture
    of large datasets containing multiple people and diverse facial motions. Code,
    model, and data are publicly available at https://tempeh.is.tue.mpg.de.
- author: Yue Chen, Xingyu Chen, Xuan Wang 0009, Qi Zhang 0029, Yu Guo 0006, Ying
    Shan, Fei Wang 0008
  title: Local-to-Global Registration for Bundle-Adjusting Neural Radiance Fields.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/ChenCWZ0S023
  doi: 10.1109/CVPR52729.2023.00799
  ee: https://doi.org/10.1109/CVPR52729.2023.00799
  url: https://dblp.org/rec/conf/cvpr/ChenCWZ0S023
  abstract: 'Neural Radiance Fields (NeRF) have achieved photorealistic novel views
    synthesis; however, the requirement of accurate camera poses limits its application.
    Despite analysis-by-synthesis extensions for jointly learning neural3D representations
    and registering camera frames exist, they are susceptible to suboptimal solutions
    if poorly initialized. We propose L2G-NeRF, a Local-to-Global registration method
    for bundle-adjusting Neural Radiance Fields: first, a pixel-wise flexible alignment,
    followed by a framewise constrained parametric alignment. Pixel-wise local alignment
    is learned in an unsupervised way via a deep network which optimizes photometric
    reconstruction errors. framewise global alignment is performed using differentiable
    parameter estimation solvers on the pixel-wise correspondences to find a global
    transformation. Experiments on synthetic and real-world data show that our method
    outperforms the current state-of-the-art in terms of high-fidelity reconstruction
    and resolving large camera pose misalignment. Our module is an easy-to-use plugin
    that can be applied to NeRF variants and other neural field applications. The
    Code and supplementary materials are available at https://rover-xingyu.github.io/L2G-NeRF/.'
- author: Can Gümeli, Angela Dai, Matthias Nießner
  title: 'ObjectMatch: Robust Registration using Canonical Object Correspondences.'
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/GumeliDN23
  doi: 10.1109/CVPR52729.2023.01257
  ee: https://doi.org/10.1109/CVPR52729.2023.01257
  url: https://dblp.org/rec/conf/cvpr/GumeliDN23
  abstract: We present ObjectMatch11https://cangumeli.github.io/ObjectMatch/, a semantic
    and object-centric camera pose estimator for RGB-D SLAM pipelines. Modern camera
    pose estimators rely on direct correspondences of overlapping regions between
    frames; however, they cannot align camera frames with little or no overlap. In
    this work, we propose to leverage indirect correspondences obtained via semantic
    object identification. For instance, when an object is seen from the front in
    one frame and from the back in another frame, we can provide additional pose constraints
    through canonical object correspondences. We first propose a neural network to
    predict such correspondences on a per-pixel level, which we then combine in our
    energy formulation with state-of-the-art keypoint matching solved with a joint
    Gauss-Newton optimization. In a pairwise setting, our method improves registration
    recall of state-of-the-art feature matching, including from 24% to 45% in pairs
    with 10% or less inter-frame overlap. In registering RGB-D sequences, our method
    outperforms cutting-edge SLAM baselines in challenging, low-frame-rate scenarios,
    achieving more than 35% reduction in trajectory error in multiple scenes.
- author: Haobo Jiang, Zheng Dang, Zhen Wei 0001, Jin Xie 0001, Jian Yang 0003, Mathieu
    Salzmann
  title: Robust Outlier Rejection for 3D Registration with Variational Bayes.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/JiangDWXYS23
  doi: 10.1109/CVPR52729.2023.00117
  ee: https://doi.org/10.1109/CVPR52729.2023.00117
  url: https://dblp.org/rec/conf/cvpr/JiangDWXYS23
  abstract: Learning-based outlier (mismatched correspondence) rejection for robust
    3D registration generally formulates the outlier removal as an inlier/outlier
    classification problem. The core for this to be successful is to learn the discriminative
    inlier/outlier feature representations. In this paper, we develop a novel variational
    non-local network-based outlier rejection framework for robust alignment. By reformulating
    the non-local feature learning with variational Bayesian inference, the Bayesian-driven
    long-range dependencies can be modeled to aggregate discriminative geometric context
    information for inlier/outlier distinction. Specifically, to achieve such Bayesian-driven
    contextual dependencies, each query/key/value component in our nonlocal network
    predicts a prior feature distribution and a posterior one. Embedded with the inlier/outlier
    label, the posterior feature distribution is label-dependent and discriminative.
    Thus, pushing the prior to be close to the discriminative posterior in the training
    step enables the features sampled from this prior at test time to model highquality
    long-range dependencies. Notably, to achieve effective posterior feature guidance,
    a specific probabilistic graphical model is designed over our non-local model,
    which lets us derive a variational low bound as our optimization objective for
    model training. Finally, we propose a voting-based inlier searching strategy to
    cluster the high-quality hypothetical inliers for transformation estimation. Extensive
    experiments on 3DMatch, 3DLoMatch, and KITTI datasets verify the effectiveness
    of our method. Code is available at https://github.com/Jiang-HB/VBReg.
- author: Guofeng Mei, Hao Tang 0005, Xiaoshui Huang, Weijie Wang, Juan Liu 0006,
    Jian Zhang 0002, Luc Van Gool, Qiang Wu 0001
  title: Unsupervised Deep Probabilistic Approach for Partial Point Cloud Registration.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/Mei0HWLZG023
  doi: 10.1109/CVPR52729.2023.01308
  ee: https://doi.org/10.1109/CVPR52729.2023.01308
  url: https://dblp.org/rec/conf/cvpr/Mei0HWLZG023
  abstract: 'Deep point cloud registration methods face challenges to partial overlaps
    and rely on labeled data. To address these issues, we propose UDPReg, an unsupervised
    deep probabilistic registration framework for point clouds with partial overlaps.
    Specifically, we first adopt a network to learn posterior probability distributions
    of Gaussian mixture models (GMMs) from point clouds. To handle partial point cloud
    registration, we apply the Sinkhorn algorithm to predict the distribution-level
    correspondences under the constraint of the mixing weights of GMMs. To enable
    unsupervised learning, we design three distribution consistency-based losses:
    self-consistency, cross-consistency, and local contrastive. The self-consistency
    loss is formulated by encouraging GMMs in Euclidean and feature spaces to share
    identical posterior distributions. The cross-consistency loss derives from the
    fact that the points of two partially overlapping point clouds belonging to the
    same clusters share the cluster centroids. The cross-consistency loss allows the
    network to flexibly learn a transformation-invariant posterior distribution of
    two aligned point clouds. The local contrastive loss facilitates the network to
    extract discriminative local features. Our UDPReg achieves competitive performance
    on the 3DMatch/3DLoMatch and ModelNet/ModelLoNet benchmarks.'
- author: Haiping Wang 0004, Yuan Liu 0025, Zhen Dong 0005, Yulan Guo, Yu-Shen Liu,
    Wenping Wang 0001, Bisheng Yang
  title: Robust Multiview Point Cloud Registration with Reliable Pose Graph Initialization
    and History Reweighting.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/WangLDGLWY23
  doi: 10.1109/CVPR52729.2023.00917
  ee: https://doi.org/10.1109/CVPR52729.2023.00917
  url: https://dblp.org/rec/conf/cvpr/WangLDGLWY23
  abstract: In this paper, we present a new method for the multi-view registration
    of point cloud. Previous multiview registration methods rely on exhaustive pairwise
    registration to construct a densely-connected pose graph and apply Iteratively
    Reweighted Least Square (IRLS) on the pose graph to compute the scan poses. However,
    constructing a densely-connected graph is time-consuming and contains lots of
    outlier edges, which makes the subsequent IRLS struggle to find correct poses.
    To address the above problems, we first propose to use a neural network to estimate
    the overlap between scan pairs, which enables us to construct a sparse but reliable
    pose graph. Then, we design a novel history reweighting function in the IRLS scheme,
    which has strong robustness to outlier edges on the graph. In comparison with
    existing multiview registration methods, our method achieves 11% higher registration
    recall on the 3DMatch dataset and ~ 13% lower registration errors on the ScanNet
    dataset while reducing ~ 70% required pairwise registrations. Comprehensive ablation
    studies are conducted to demonstrate the effectiveness of our designs. The source
    code is available at https://github.com/WHU-USI3DV/SGHR.
- author: Junle Yu, Luwei Ren, Wenhui Zhou 0001, Yu Zhang 0280, Lili Lin, Guojun Dai
  title: 'PEAL: Prior-embedded Explicit Attention Learning for Low-overlap Point Cloud
    Registration.'
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/YuRZZLD23
  doi: 10.1109/CVPR52729.2023.01698
  ee: https://doi.org/10.1109/CVPR52729.2023.01698
  url: https://dblp.org/rec/conf/cvpr/YuRZZLD23
  abstract: Learning distinctive point-wise features is critical for low-overlap point
    cloud registration. Recently, it has achieved huge success in incorporating Transformer
    into point cloud feature representation, which usually adopts a self-attention
    module to learn intra-point-cloud features first, then utilizes a cross-attention
    module to perform feature exchange between input point clouds. The advantage of
    Transformer models mainly benefits from the use of self-attention to capture the
    global correlations in feature space. However, these global correlations may involve
    ambiguity for point cloud registration task, especially in indoor low-overlap
    scenarios, because the correlations with an extensive range of non-overlapping
    points may degrade the feature distinctiveness. To address this issue, we present
    PEAL, a Prior-embedded Explicit Attention Learning model. By incorporating prior
    knowledge into the learning process, the points are divided into two parts. One
    includes points lying in the putative overlapping region and the other includes
    points located in the putative non-overlapping region. Then PEAL explicitly learns
    one-way attention with the putative overlapping points. This simplistic design
    attains surprising performance, significantly relieving the aforementioned feature
    ambiguity. Our method improves the Registration Recall by 6+% on the challenging
    3DLoMatch benchmark and achieves state-of-the-art performance on Feature Matching
    Recall, Inlier Ratio, and Registration Recall on both 3DMatch and 3DLoMatch.
- author: Xiyu Zhang 0001, Jiaqi Yang 0002, Shikun Zhang, Yanning Zhang 0001
  title: 3D Registration with Maximal Cliques.
  venue: CVPR
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/cvpr/Zhang0ZZ23
  doi: 10.1109/CVPR52729.2023.01702
  ee: https://doi.org/10.1109/CVPR52729.2023.01702
  url: https://dblp.org/rec/conf/cvpr/Zhang0ZZ23
  abstract: 'As a fundamental problem in computer vision, 3D point cloud registration
    (PCR) aims to seek the optimal pose to align a point cloud pair. In this paper,
    we present a 3D registration method with maximal cliques (MAC). The key insight
    is to loosen the previous maximum clique constraint, and mine more local consensus
    information in a graph for accurate pose hypotheses generation: 1) A compatibility
    graph is constructed to render the affinity relationship between initial correspondences.
    2) We search for maximal cliques in the graph, each of which represents a consensus
    set. We perform node-guided clique selection then, where each node corresponds
    to the maximal clique with the greatest graph weight. 3) Transformation hypotheses
    are computed for the selected cliques by the SVD algorithm and the best hypothesis
    is used to perform registration. Extensive experiments on U3M, 3DMatch, 3DLoMatch
    and KITTI demonstrate that MAC effectively increases registration accuracy, outperforms
    various state-of-the-art methods and boosts the performance of deep-learned methods.
    MAC combined with deep-learned methods achieves state-of-the-art registration
    recall of 95.7% /78.9% on 3DMatch /3DLoMatch.'
registra%20venue%3AICCV%3A:
- author: Yu Chen, Gim Hee Lee
  title: 'DReg-NeRF: Deep Registration for Neural Radiance Fields.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ChenL23
  doi: 10.1109/ICCV51070.2023.02075
  ee: https://doi.org/10.1109/ICCV51070.2023.02075
  url: https://dblp.org/rec/conf/iccv/ChenL23
  abstract: Although Neural Radiance Fields (NeRF) is popular in the computer vision
    community recently, registering multiple NeRFs has yet to gain much attention.
    Unlike the existing work, NeRF2NeRF [14], which is based on traditional optimization
    methods and needs human annotated keypoints, we propose DReg-NeRF to solve the
    NeRF registration problem on object-centric scenes without human intervention.
    After training NeRF models, our DReg-NeRF first extracts features from the occupancy
    grid in NeRF. Subsequently, our DReg-NeRF utilizes a transformer architecture
    with self-attention and cross-attention layers to learn the relations between
    pairwise NeRF blocks. In contrast to state-of-the-art (SOTA) point cloud registration
    methods, the decoupled correspondences are supervised by surface fields without
    any ground truth overlapping labels. We construct a novel view synthesis dataset
    with 1,700+ 3D objects obtained from Objaverse to train our network. When evaluated
    on the test set, our proposed method beats the SOTA point cloud registration methods
    by a large margin with a mean RPE = 9.67° and a mean RTE = 0.038. Our code is
    available at https://github.com/AIBluefisher/DReg-NeRF.
- author: Guangyan Chen, Meiling Wang 0002, Li Yuan 0007, Yi Yang 0009, Yufeng Yue
  title: Rethinking Point Cloud Registration as Masking and Reconstruction.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ChenWYYY23
  doi: 10.1109/ICCV51070.2023.01624
  ee: https://doi.org/10.1109/ICCV51070.2023.01624
  url: https://dblp.org/rec/conf/iccv/ChenWYYY23
  abstract: Point cloud registration is essential in computer vision and robotics.
    In this paper, a critical observation is made that the invisible parts of each
    point cloud can be directly utilized as inherent masks, and the aligned point
    cloud pair can be regarded as the reconstruction target. Motivated by this observation,
    we rethink the point cloud registration problem as a masking and reconstruction
    task. To this end, a generic and concise auxiliary training network, the Masked
    Reconstruction Auxiliary Network (MRA), is proposed. The MRA reconstructs the
    complete point cloud by separately using the encoded features of each point cloud
    obtained from the backbone, guiding the contextual features in the backbone to
    capture fine-grained geometric details and the overall structures of point cloud
    pairs. Unlike recently developed high-performing methods that incorporate specific
    encoding methods into transformer models, which sacrifice versatility and introduce
    significant computational complexity during the inference process, our MRA can
    be easily inserted into other methods to further improve registration accuracy.
    Additionally, the MRA is detached after training, thereby avoiding extra computational
    complexity during the inference process. Building upon the MRA, we present a novel
    transformer-based method, the Masked Reconstruction Transformer (MRT), which achieves
    both precise and efficient alignment using standard transformers. Extensive experiments
    conducted on the 3DMatch, ModelNet40, and KITTI datasets demonstrate the superior
    performance of our MRT over state-of-the-art methods. Codes are available at https://github.com/CGuangyan-BIT/MRA.
- author: Suyi Chen, Hao Xu 0018, Ru Li 0002, Guanghui Liu 0001, Chi-Wing Fu, Shuaicheng
    Liu
  title: 'SIRA-PCR: Sim-to-Real Adaptation for 3D Point Cloud Registration.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/ChenXL0FL23
  doi: 10.1109/ICCV51070.2023.01324
  ee: https://doi.org/10.1109/ICCV51070.2023.01324
  url: https://dblp.org/rec/conf/iccv/ChenXL0FL23
  abstract: Point cloud registration is essential for many applications. However,
    existing real datasets require extremely tedious and costly annotations, yet may
    not provide accurate camera poses. For the synthetic datasets, they are mainly
    object-level, so the trained models may not generalize well to real scenes. We
    design SIRA-PCR, a new approach to 3D point cloud registration. First, we build
    a synthetic scene-level 3D registration dataset, specifically designed with physically-based
    and random strategies to arrange diverse objects. Second, we account for variations
    in different sensing mechanisms and layout placements, then formulate a sim-to-real
    adaptation framework with an adaptive re-sample module to simulate patterns in
    real point clouds. To our best knowledge, this is the first work that explores
    sim-to-real adaptation for point cloud registration. Extensive experiments show
    the SOTA performance of SIRA-PCR on widely-used indoor and out-door datasets.
    The code and dataset will be released on https://github.com/Chen-Suyi/SIRA_Pytorc.h
- author: Zheng Dang, Mathieu Salzmann
  title: 'AutoSynth: Learning to Generate 3D Training Data for Object Point Cloud
    Registration.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/DangS23
  doi: 10.1109/ICCV51070.2023.00827
  ee: https://doi.org/10.1109/ICCV51070.2023.00827
  url: https://dblp.org/rec/conf/iccv/DangS23
  abstract: In the current deep learning paradigm, the amount and quality of training
    data are as critical as the network architecture and its training details. However,
    collecting, processing, and annotating real data at scale is difficult, expensive,
    and time-consuming, particularly for tasks such as 3D object registration. While
    synthetic datasets can be created, they require expertise to design and include
    a limited number of categories. In this paper, we introduce a new approach called
    AutoSynth, which automatically generates 3D training data for point cloud registration.
    Specifically, AutoSynth automatically curates an optimal dataset by exploring
    a search space encompassing millions of potential datasets with diverse 3D shapes
    at a low cost. To achieve this, we generate synthetic 3D datasets by assembling
    shape primitives, and develop a meta-learning strategy to search for the best
    training data for 3D registration on real point clouds. For this search to remain
    tractable, we replace the point cloud registration network with a much smaller
    surrogate network, leading to a 4056.43 times speedup. We demonstrate the generality
    of our approach by implementing it with two different point cloud registration
    networks, BPNet [13] and IDAM [34]. Our results on TUD-L [26], LINEMOD [23] and
    Occluded-LINEMOD [7] evidence that a neural network trained on our searched dataset
    yields consistently better performance than the same one trained on the widely
    used ModelNet40 dataset [65].
- author: Qihua Dong, Hao Du 0006, Ying Song, Yan Xu 0001, Jing Liao 0001
  title: Preserving Tumor Volumes for Unsupervised Medical Image Registration.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/DongDS0023
  doi: 10.1109/ICCV51070.2023.01939
  ee: https://doi.org/10.1109/ICCV51070.2023.01939
  url: https://dblp.org/rec/conf/iccv/DongDS0023
  abstract: 'Medical image registration is a critical task that estimates the spatial
    correspondence between pairs of images. However, current traditional and deep-learning-based
    methods rely on similarity measures to generate a deforming field, which often
    results in disproportionate volume changes in dissimilar regions, especially in
    tumor regions. These changes can significantly alter the tumor size and underlying
    anatomy, which limits the practical use of image registration in clinical diagnosis.
    To address this issue, we have formulated image registration with tumors as a
    constraint problem that preserves tumor volumes while maximizing image similarity
    in other normal regions. Our proposed strategy involves a two-stage process. In
    the first stage, we use similarity-based registration to identify potential tumor
    regions by their volume change, generating a soft tumor mask accordingly. In the
    second stage, we propose a volume-preserving registration with a novel adaptive
    volume-preserving loss that penalizes the change in size adaptively based on the
    masks calculated from the previous stage. Our approach balances image similarity
    and volume preservation in different regions, i.e., normal and tumor regions,
    by using soft tumor masks to adjust the imposition of volume-preserving loss on
    each one. This ensures that the tumor volume is preserved during the registration
    process. We have evaluated our strategy on various datasets and network architectures,
    demonstrating that our method successfully preserves the tumor volume while achieving
    comparable registration results with state-of-the-art methods. Our codes is available
    at: https://dddraxxx.github.io/Volume-Preserving-Registration/.'
- author: Bin Duan, Ming Zhong 0008, Yan Yan 0002
  title: Towards Saner Deep Image Registration.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/DuanZ023
  doi: 10.1109/ICCV51070.2023.01145
  ee: https://doi.org/10.1109/ICCV51070.2023.01145
  url: https://dblp.org/rec/conf/iccv/DuanZ023
  abstract: With recent advances in computing hardware and surges of deep-learning
    architectures, learning-based deep image registration methods have surpassed their
    traditional counterparts, in terms of metric performance and inference time. However,
    these methods focus on improving performance measurements such as Dice, resulting
    in less attention given to model behaviors that are equally desirable for registrations,
    especially for medical imaging. This paper investigates these behaviors for popular
    learning-based deep registrations under a sanity-checking microscope. We find
    that most existing registrations suffer from low inverse consistency and nondiscrimination
    of identical pairs due to overly optimized image similarities. To rectify these
    behaviors, we propose a novel regularization-based sanity-enforcer method that
    imposes two sanity checks on the deep model to reduce its inverse consistency
    errors and increase its discriminative power simultaneously. Moreover, we derive
    a set of theoretical guarantees for our sanity-checked image registration method,
    with experimental results supporting our theoretical findings and their effectiveness
    in increasing the sanity of models without sacrificing any performance.
- author: Ahmed Hatem, Yiming Qian, Yang Wang 0003
  title: 'Point-TTA: Test-Time Adaptation for Point Cloud Registration Using Multitask
    Meta-Auxiliary Learning.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/HatemQW23
  doi: 10.1109/ICCV51070.2023.01512
  ee: https://doi.org/10.1109/ICCV51070.2023.01512
  url: https://dblp.org/rec/conf/iccv/HatemQW23
  abstract: We present Point-TTA, a novel test-time adaptation framework for point
    cloud registration (PCR) that improves the generalization and the performance
    of registration models. While learning-based approaches have achieved impressive
    progress, generalization to unknown testing environments remains a major challenge
    due to the variations in 3D scans. Existing methods typically train a generic
    model and the same trained model is applied on each instance during testing. This
    could be sub-optimal since it is difficult for the same model to handle all the
    variations during testing. In this paper, we propose a test-time adaptation approach
    for PCR. Our model can adapt to unseen distributions at test-time without requiring
    any prior knowledge of the test data. Concretely, we design three self-supervised
    auxiliary tasks that are optimized jointly with the primary PCR task. Given a
    test instance, we adapt our model using these auxiliary tasks and the updated
    model is used to perform the inference. During training, our model is trained
    using a meta-auxiliary learning approach, such that the adapted model via auxiliary
    tasks improves the accuracy of the primary task. Experimental results demonstrate
    the effectiveness of our approach in improving generalization of point cloud registration
    and outperforming other state-of-the-art approaches.
- author: Mattias P. Heinrich, Alexander Bigalke, Christoph Großbröhmer, Lasse Hansen
  title: 'Chasing clouds: Differentiable volumetric rasterisation of point clouds
    as a highly efficient and accurate loss for large-scale deformable 3D registration.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/HeinrichBGH23
  doi: 10.1109/ICCV51070.2023.00737
  ee: https://doi.org/10.1109/ICCV51070.2023.00737
  url: https://dblp.org/rec/conf/iccv/HeinrichBGH23
  abstract: 'Learning-based registration for large-scale 3D point clouds has been
    shown to improve robustness and accuracy compared to classical methods and can
    be trained without supervision for locally rigid problems. However, for tasks
    with highly deformable structures, such as alignment of pulmonary vascular trees
    for medical diagnostics, previous approaches of self-supervision with regularisation
    and point distance losses have failed to succeed, leading to the need for complex
    synthetic augmentation strategies to obtain reliably strong supervision. In this
    work, we introduce a novel Differentiable Volumetric Rasterisation of point Clouds
    (DiVRoC) that overcomes those limitations and offers a highly efficient and accurate
    loss for large-scale deformable 3D registration. DiVRoC drastically reduces the
    computational complexity for measuring point cloud distances for high-resolution
    data with over 100k 3D points and can also be employed to extrapolate and regularise
    sparse motion fields, as loss in a self-training setting and as objective function
    in instance optimisation. DiVRoC can be successfully embedded into geometric registration
    networks, including PointPWC-Net and other graph CNNs. Our approach yields new
    state-of-the-art accuracy on the challenging PVT dataset in three different settings
    without training with manual ground truth: 1) unsupervised metric-based learning
    2) self-supervised learning with pseudo labels generated by self-training and
    3) optimisation based alignment without learning. https://github.com/mattiaspaul/ChasingClouds'
- author: Haobo Jiang, Zheng Dang, Shuo Gu, Jin Xie 0001, Mathieu Salzmann, Jian Yang
    0003
  title: Center-Based Decoupled Point Cloud Registration for 6D Object Pose Estimation.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/JiangDGXSY23
  doi: 10.1109/ICCV51070.2023.00317
  ee: https://doi.org/10.1109/ICCV51070.2023.00317
  url: https://dblp.org/rec/conf/iccv/JiangDGXSY23
  abstract: In this paper, we propose a novel center-based decoupled point cloud registration
    framework for robust 6D object pose estimation in real-world scenarios. Our method
    decouples the translation from the entire transformation by predicting the object
    center and estimating the rotation in a center-aware manner. This center offset-based
    translation estimation is correspondence-free, freeing us from the difficulty
    of constructing correspondences in challenging scenarios, thus improving robustness.
    To obtain reliable center predictions, we use a multi-view (bird’s eye view and
    front view) object shape description of the source-point features, with both views
    jointly voting for the object center. Additionally, we propose an effective shape
    embedding module to augment the source features, largely completing the missing
    shape information due to partial scanning, thus facilitating the center prediction.
    With the center-aligned source and model point clouds, the rotation predictor
    utilizes feature similarity to establish putative correspondences for SVD-based
    rotation estimation. In particular, we introduce a center-aware hybrid feature
    descriptor with a normal correction technique to extract discriminative, part-aware
    features for high-quality correspondence construction. Our experiments show that
    our method outperforms the state-of-the-art methods by a large margin on real-world
    datasets such as TUD-L, LINEMOD, and Occluded-LINEMOD. Code is available at https://github.com/JiangHB/CenterReg.
- author: Minhao Li, Zheng Qin 0002, Zhirui Gao, Renjiao Yi, Chenyang Zhu 0002, Yulan
    Guo, Kai Xu 0004
  title: '2D3D-MATR: 2D-3D Matching Transformer for Detection-free Registration between
    Images and Point Clouds.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LiQGY0GX23
  doi: 10.1109/ICCV51070.2023.01299
  ee: https://doi.org/10.1109/ICCV51070.2023.01299
  url: https://dblp.org/rec/conf/iccv/LiQGY0GX23
  abstract: The commonly adopted detect-then-match approach to registration finds
    difficulties in the cross-modality cases due to the incompatible keypoint detection
    and inconsistent feature description. We propose, 2D3D-MATR, a detection-free
    method for accurate and robust registration between images and point clouds. Our
    method adopts a coarse-to-fine pipeline where it first computes coarse correspondences
    between downsampled patches of the input image and the point cloud and then extends
    them to form dense correspondences between pixels and points within the patch
    region. The coarse-level patch matching is based on transformer which jointly
    learns global contextual constraints with self-attention and cross-modality correlations
    with cross-attention. To resolve the scale ambiguity in patch matching, we construct
    a multi-scale pyramid for each image patch and learn to find for each point patch
    the best matching image patch at a proper resolution level. Extensive experiments
    on two public benchmarks demonstrate that 2D3D-MATR outperforms the previous state-of-the-art
    P2-Net by around 20 percentage points on inlier ratio and over 10 points on registration
    recall. Our code and models are available at https://github.com/minhaolee/2D3DMATR.
- author: Jiuming Liu, Guangming Wang 0001, Zhe Liu 0022, Chaokang Jiang, Marc Pollefeys,
    Hesheng Wang 0001
  title: 'RegFormer: An Efficient Projection-Aware Transformer Network for Large-Scale
    Point Cloud Registration.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LiuW0JP023
  doi: 10.1109/ICCV51070.2023.00776
  ee: https://doi.org/10.1109/ICCV51070.2023.00776
  url: https://dblp.org/rec/conf/iccv/LiuW0JP023
  abstract: 'Although point cloud registration has achieved remarkable advances in
    object-level and indoor scenes, large-scale registration methods are rarely explored.
    Challenges mainly arise from the huge point number, complex distribution, and
    outliers of outdoor LiDAR scans. In addition, most existing registration works
    generally adopt a two-stage paradigm: They first find correspondences by extracting
    discriminative local features and then leverage estimators (eg. RANSAC) to filter
    outliers, which are highly dependent on well-designed descriptors and post-processing
    choices. To address these problems, we propose an end-to-end transformer network
    (RegFormer) for large-scale point cloud alignment without any further post-processing.
    Specifically, a projection-aware hierarchical transformer is proposed to capture
    long-range dependencies and filter outliers by extracting point features globally.
    Our transformer has linear complexity, which guarantees high efficiency even for
    large-scale scenes. Furthermore, to effectively reduce mismatches, a bijective
    association transformer is designed for regressing the initial transformation.
    Extensive experiments on KITTI and NuScenes datasets demonstrate that our RegFormer
    achieves competitive performance in terms of both accuracy and efficiency. Codes
    are available at https://github.com/IRMVLab/RegFormer.'
- author: Quan Liu 0006, Hongzi Zhu, Yunsong Zhou, Hongyang Li 0001, Shan Chang, Minyi
    Guo
  title: Density-invariant Features for Distant Point Cloud Registration.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/LiuZZLCG23
  doi: 10.1109/ICCV51070.2023.01670
  ee: https://doi.org/10.1109/ICCV51070.2023.01670
  url: https://dblp.org/rec/conf/iccv/LiuZZLCG23
  abstract: Registration of distant outdoor LiDAR point clouds is crucial to extending
    the 3D vision of collaborative autonomous vehicles, and yet is challenging due
    to small overlapping area and a huge disparity between observed point densities.
    In this paper, we propose Group-wise Contrastive Learning (GCL) scheme to extract
    density-invariant geometric features to register distant outdoor LiDAR point clouds.
    We mark through theoretical analysis and experiments that, contrastive positives
    should be independent and identically distributed (i.i.d.), in order to train
    density-invariant feature extractors. We propose upon the conclusion a simple
    yet effective training scheme to force the feature of multiple point clouds in
    the same spatial location (referred to as positive groups) to be similar, which
    naturally avoids the sampling bias introduced by a pair of point clouds to conform
    with the i.i.d. principle. The resulting fully-convolutional feature extractor
    is more powerful and density-invariant than state-of-the-art methods, improving
    the registration recall of distant scenarios on KITTI and nuScenes benchmarks
    by 40.9% and 26.9%, respectively. Code is available at https://github.com/liuQuan98/GCL.
- author: Jiepeng Wang 0001, Congyi Zhang 0001, Peng Wang 0099, Xin Li 0003, Peter
    J. Cobb, Christian Theobalt, Wenping Wang 0001
  title: Batch-based Model Registration for Fast 3D Sherd Reconstruction.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/WangZWLCTW23
  doi: 10.1109/ICCV51070.2023.01335
  ee: https://doi.org/10.1109/ICCV51070.2023.01335
  url: https://dblp.org/rec/conf/iccv/WangZWLCTW23
  abstract: '3D reconstruction techniques have widely been used for digital documentation
    of archaeological fragments. However, efficient digital capture of fragments remains
    as a challenge. In this work, we aim to develop a portable, high-throughput, and
    accurate reconstruction system for efficient digitization of fragments excavated
    in archaeological sites. To realize high-throughput digitization of large numbers
    of objects, an effective strategy is to perform scanning and reconstruction in
    batches. However, effective batch-based scanning and reconstruction face two key
    challenges: 1) how to correlate partial scans of the same object from multiple
    batch scans, and 2) how to register and reconstruct complete models from partial
    scans that exhibit only small overlaps. To tackle these two challenges, we develop
    a new batch-based matching algorithm that pairs the front and back sides of the
    fragments, and a new Bilateral Boundary ICP algorithm that can register partial
    scans sharing very narrow overlapping regions. Extensive validation in labs and
    testing in excavation sites demonstrate that these designs enable efficient batch-based
    scanning for fragments. We show that such a batch-based scanning and reconstruction
    pipeline can have immediate applications on digitizing sherds in archaeological
    excavations. Our project page: https://jiepengwang.github.io/FIRES/.'
- author: Mingzhi Yuan, Kexue Fu 0001, Zhihao Li, Yucong Meng, Manning Wang
  title: 'PointMBF: A Multi-scale Bidirectional Fusion Network for Unsupervised RGB-D
    Point Cloud Registration.'
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccv/YuanFLMW23
  doi: 10.1109/ICCV51070.2023.01622
  ee: https://doi.org/10.1109/ICCV51070.2023.01622
  url: https://dblp.org/rec/conf/iccv/YuanFLMW23
  abstract: Point cloud registration is a task to estimate the rigid transformation
    between two unaligned scans, which plays an important role in many computer vision
    applications. Previous learning-based works commonly focus on supervised registration,
    which have limitations in practice. Recently, with the advance of inexpensive
    RGB-D sensors, several learning-based works utilize RGB-D data to achieve unsupervised
    registration. However, most of existing unsupervised methods follow a cascaded
    design or fuse RGB-D data in a unidirectional manner, which do not fully exploit
    the complementary information in the RGB-D data. To leverage the complementary
    information more effectively, we propose a network implementing multi-scale bidirectional
    fusion between RGB images and point clouds generated from depth images. By bidirectionally
    fusing visual and geometric features in multi-scales, more distinctive deep features
    for correspondence estimation can be obtained, making our registration more accurate.
    Extensive experiments on ScanNet and 3DMatch demonstrate that our method achieves
    new state-of-the-art performance. Code will be released at https://github.com/phdymz/PointMBF.
- author: Chi Xu 0003, Shogo Tsuji, Yasushi Makihara, Xiang Li 0028, Yasushi Yagi
  title: Occluded Gait Recognition via Silhouette Registration Guided by Automated
    Occlusion Degree Estimation.
  venue: ICCV
  year: '2023'
  type: Conference and Workshop Papers
  access: closed
  key: conf/iccvw/0003TMLY23
  doi: 10.1109/ICCVW60793.2023.00344
  ee: https://doi.org/10.1109/ICCVW60793.2023.00344
  url: https://dblp.org/rec/conf/iccvw/0003TMLY23
  abstract: Gait recognition tasks often face significant difficulties caused by partial
    occlusions of the human body. To address this challenge, we propose a silhouette
    registration method based on flexible estimation of the spatial scale associated
    with the occluding elements. Existing appearance-based methods require prior knowledge
    about the spatial scale of the human body in relation to the input image, or a
    bounding box that includes the actual full body. In our method, the region corresponding
    to the silhouette of the body is estimated directly from visible body parts within
    the image. This estimate is then used to normalize and register the human body
    by adapting it to the scale of the occlusions. To reduce the occlusion difference
    between elements of a matching pair, which may lead to substantial intra-subject
    variation when the difference is large, we use a pairwise mask to extract common
    visible regions for subsequent feature learning and matching. Experiments on the
    synthetic occluded OU-MVLP dataset demonstrate the effectiveness of the proposed
    method, which successfully improves recognition performance when matching pairs
    present occlusion differences. We discuss specific characteristics of the proposed
    silhouette registration and pairwise masking methods with the aid of detailed
    quantitative and qualitative evaluations, in the hope of providing useful insights
    for future research on this topic.
