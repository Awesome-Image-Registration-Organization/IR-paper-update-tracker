- author: Wolfgang Wein, Shelby Brunke, Ali Khamene, Matthew R. Callstrom, Nassir
    Navab
  title: Automatic CT-ultrasound registration for diagnostic imaging and image-guided
    intervention.
  venue: Medical Image Anal.
  year: '2008'
  type: Journal Articles
  access: closed
  key: journals/mia/WeinBKCN08
  doi: 10.1016/J.MEDIA.2008.06.006
  ee: https://doi.org/10.1016/j.media.2008.06.006
  url: https://dblp.org/rec/journals/mia/WeinBKCN08
  abstract: The fusion of tracked ultrasound with CT has benefits for a variety of
    clinical applications, however extensive manual effort is usually required for
    correct registration. We developed new methods that allow one to simulate medical
    ultrasound from CT in real-time, reproducing the majority of ultrasonic imaging
    effects. They are combined with a robust similarity measure that assesses the
    correlation of a combination of signals extracted from CT with ultrasound, without
    knowing the influence of each signal. This serves as the foundation of a fully
    automatic registration, that aligns a 3D ultrasound sweep with the corresponding
    tomographic modality using a rigid or an affine transformation model, without
    any manual interaction. These techniques were evaluated in a study involving 25
    patients with indeterminate lesions in liver and kidney. The clinical setup, acquisition
    and registration workflow is described, along with the evaluation of the registration
    accuracy with respect to physician-defined Ground Truth. Our new algorithm correctly
    registers without any manual interaction in 76% of the cases, the average RMS
    TRE over multiple target lesions throughout the liver is 8.1mm.
