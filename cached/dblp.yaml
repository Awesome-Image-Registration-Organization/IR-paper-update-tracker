  url: https://dblp.org/rec/journals/mia/DritsasCGS24
  abstract: Today, fitting bespoke hearing aids involves injecting silicone into patients'
    ears to produce ear canal molds. These are subsequently 3D scanned to create digital
    ear canal impressions. However, before digital impressions can be used they require
    a substantial amount of effort in manual 3D editing. In this article, we present
    computational methods to pre-process ear canal impressions. The aim is to create
    automation tools to assist the hearing aid design, manufacturing and fitting processes
    as well as normalizing anatomical data to assist the study of the outer ear canal's
    morphology. The methods include classifying the handedness of the impression into
    left and right ear types, orienting the geometries onto the same coordinate system
    sense, and removing extraneous artifacts introduced by the silicone mold. We investigate
    the use of convolutional neural networks for performing these semantic tasks and
    evaluate their accuracy using a dataset of 3000 ear canal impressions. The neural
    networks proved highly effective at performing these tasks with 95.8% adjusted
    accuracy in classification, 92.3% within 20° angular error in registration and
    93.4% intersection over union in segmentation.
