  title: 'Flow network tracking for spatiotemporal and periodic point matching: Applied
    to cardiac motion analysis.'
  venue: Medical Image Anal.
  year: '2019'
  type: Journal Articles
  access: closed
  key: journals/mia/ParajuliLTSBAEJ19
  doi: 10.1016/J.MEDIA.2019.04.007
