  url: https://dblp.org/rec/journals/ijcv/MaJFJY21
  abstract: AbstractAs a fundamental and critical task in various visual applications,
    image matching can identify then correspond the same or similar structure/content
    from two or more images. Over the past decades, growing amount and diversity of
    methods have been proposed for image matching, particularly with the development
    of deep learning techniques over the recent years. However, it may leave several
    open questions about which method would be a suitable choice for specific applications
    with respect to different scenarios and task requirements and how to design better
    image matching methods with superior performance in accuracy, robustness and efficiency.
    This encourages us to conduct a comprehensive and systematic review and analysis
    for those classical and latest techniques. Following the feature-based image matching
    pipeline, we first introduce feature detection, description, and matching techniques
    from handcrafted methods to trainable ones and provide an analysis of the development
    of these methods in theory and practice. Secondly, we briefly introduce several
    typical image matching-based applications for a comprehensive understanding of
    the significance of image matching. In addition, we also provide a comprehensive
    and objective comparison of these classical and latest techniques through extensive
    experiments on representative datasets. Finally, we conclude with the current
    status of image matching technologies and deliver insightful discussions and prospects
    for future works. This survey can serve as a reference for (but not limited to)
    researchers and engineers in image matching and related fields.
